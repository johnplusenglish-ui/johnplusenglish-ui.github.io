      {q:'La cinghia di distribuzione non ha bisogno di manutenzione periodica',a:'F'},
      {q:'Il liquido dei freni deve essere sostituito periodicamente perché assorbe umidità nel tempo',a:'V'},
      {q:'Il liquido dei freni non va mai rabboccato',a:'F'},
      {q:'I freni a disco si usurano più uniformemente dei freni a tamburo',a:'V'},
      {q:'Le pastiglie dei freni devono essere sostituite quando il loro spessore scende sotto il limite previsto',a:'V'},
      {q:'L\'olio del cambio non necessita di sostituzione periodica',a:'F'},
      {q:'Prima di un lungo viaggio è buona norma controllare i livelli dei fluidi, la pressione degli pneumatici e i dispositivi di illuminazione',a:'V'},
    ]
  },
  {
    id:'merci', name:'Trasporto e consegna merci', examQ:1,
    questions:[
      {q:'Il conducente è responsabile della sicurezza del carico durante il trasporto',a:'V'},
      {q:'Il carico deve essere assicurato in modo da non spostarsi durante il trasporto',a:'V'},
      {q:'Il conducente deve verificare che il carico sia correttamente sistemato e fissato prima di partire',a:'V'},
      {q:'Un carico mal distribuito può compromettere la stabilità del veicolo',a:'V'},
      {q:'Il conducente non ha responsabilità sul modo in cui il carico è stato sistemato da terzi',a:'F'},
      {q:'Il carico può sporgere posteriormente dal veicolo per una lunghezza illimitata',a:'F'},
      {q:'Il carico che sporge posteriormente oltre un certo limite deve essere segnalato con appositi dispositivi',a:'V'},
      {q:'Il peso del carico non influisce sulla distanza di frenata del veicolo',a:'F'},
      {q:'La lettera di vettura (CMR) è il documento che accompagna le merci nel trasporto internazionale su strada',a:'V'},
      {q:'Il conducente deve consegnare le merci solo al destinatario indicato nella lettera di vettura',a:'V'},
    ]
  },
];

const EXAM_DISTRIBUTION = [
  {id:'guida-riposo',n:2},{id:'cronotachigrafo',n:3},{id:'incidente',n:2},
  {id:'dimensioni',n:3},{id:'rimorchi',n:2},{id:'motori',n:5},
  {id:'pneumatici',n:4},{id:'freni',n:3},{id:'guasti',n:3},
  {id:'manutenzione',n:3},{id:'merci',n:1},
];
const EXAM_TOTAL=40,EXAM_MINUTES=40,EXAM_MAX_ERRORS=4;

let S={mode:null,topicId:null,questions:[],idx:0,score:0,errors:0,answers:[],timer:null,secondsLeft:0,finished:false};
let stats=JSON.parse(localStorage.getItem('quizStats')||'{}');

function buildMenu(){
  const list=document.getElementById('topic-list');
  TOPICS.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='topic-btn';
    btn.innerHTML=`<span>${t.name}</span><div class="meta"><span class="badge">${t.questions.length} dom.</span><span class="arr">›</span></div>`;
    btn.onclick=()=>startQuiz(t.id,'practice');
    list.appendChild(btn);
  });
}

function showTab(tab){
  document.querySelectorAll('.nav-tab').forEach((el,i)=>el.classList.toggle('active',['menu','stats'][i]===tab));
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById(tab+'-screen').classList.add('active');
  if(tab==='stats')renderStats();
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz(topicId,mode){
  let questions;
  if(topicId==='all'){questions=shuffle(TOPICS.flatMap(t=>t.questions.map(q=>({...q,topicId:t.id}))));}
  else{const t=TOPICS.find(t=>t.id===topicId);questions=shuffle(t.questions.map(q=>({...q,topicId})));}
  S={mode,topicId,questions,idx:0,score:0,errors:0,answers:[],timer:null,secondsLeft:0,finished:false};
  const name=topicId==='all'?'Tutte le domande':TOPICS.find(t=>t.id===topicId)?.name;
  document.getElementById('quiz-topic-name').textContent=name;
  document.getElementById('quiz-mode-badge').textContent='🎯 Pratica';
  document.getElementById('timer-bar').style.display='none';
  showQuizScreen();renderQuestion();
}

function startExam(){
  let questions=[];
  EXAM_DISTRIBUTION.forEach(({id,n})=>{
    const t=TOPICS.find(t=>t.id===id);if(!t)return;
    const pool=shuffle(t.questions);
    for(let i=0;i<Math.min(n,pool.length);i++)questions.push({...pool[i],topicId:id});
  });
  if(questions.length<EXAM_TOTAL){
    const extra=shuffle(TOPICS.flatMap(t=>t.questions.map(q=>({...q,topicId:t.id}))));
    for(const q of extra){if(questions.length>=EXAM_TOTAL)break;if(!questions.find(x=>x.q===q.q))questions.push(q);}
  }
  questions=shuffle(questions.slice(0,EXAM_TOTAL));
  S={mode:'exam',topicId:'exam',questions,idx:0,score:0,errors:0,answers:[],timer:null,secondsLeft:EXAM_MINUTES*60,finished:false};
  document.getElementById('quiz-topic-name').textContent='Simulazione Esame';
  document.getElementById('quiz-mode-badge').textContent='🎓 Esame ufficiale';
  document.getElementById('timer-bar').style.display='flex';
  updateTimerDisplay();startTimer();
  showQuizScreen();renderQuestion();
}

function showQuizScreen(){
  document.querySelectorAll('.nav-tab').forEach(el=>el.style.display='none');
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('results-screen').style.display='none';
  document.getElementById('quiz-screen').classList.add('active');
}

function renderQuestion(){
  const q=S.questions[S.idx];
  document.getElementById('q-counter').textContent=`Domanda ${S.idx+1} di ${S.questions.length}`;
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('progress-fill').style.width=((S.idx/S.questions.length)*100)+'%';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').className='next-btn';
  const bv=document.getElementById('btn-v'),bf=document.getElementById('btn-f');
  bv.className='vf-btn vero';bf.className='vf-btn falso';
  bv.disabled=false;bf.disabled=false;
  if(S.mode==='exam'){
    document.getElementById('error-count').textContent=`${S.errors} / ${EXAM_MAX_ERRORS}`;
    document.getElementById('error-count').className='error-count'+(S.errors>=3?' danger':'');
  }
}

function answer(choice){
  if(S.finished)return;
  const q=S.questions[S.idx];
  const ok=choice===q.a;
  if(ok)S.score++;else S.errors++;
  S.answers.push({q:q.q,given:choice,correct:q.a,ok,topicId:q.topicId});
  if(!stats[q.topicId])stats[q.topicId]={correct:0,total:0};
  stats[q.topicId].total++;
  if(ok)stats[q.topicId].correct++;
  localStorage.setItem('quizStats',JSON.stringify(stats));
  const bv=document.getElementById('btn-v'),bf=document.getElementById('btn-f');
  bv.disabled=true;bf.disabled=true;
  if(ok){
    (choice==='V'?bv:bf).className='vf-btn correct';
    document.getElementById('feedback').className='feedback correct';
    document.getElementById('feedback').textContent='✓ Corretto!';
  }else{
    (choice==='V'?bv:bf).className='vf-btn wrong';
    (choice==='V'?bf:bv).className='vf-btn reveal';
    document.getElementById('feedback').className='feedback wrong';
    document.getElementById('feedback').textContent=`✗ Sbagliato — era ${q.a==='V'?'VERO':'FALSO'}`;
  }
  if(S.mode==='exam'){
    document.getElementById('error-count').textContent=`${S.errors} / ${EXAM_MAX_ERRORS}`;
    document.getElementById('error-count').className='error-count'+(S.errors>=3?' danger':'');
    if(S.errors>EXAM_MAX_ERRORS){
      document.getElementById('next-btn').textContent='Vedi risultati (non superato)';
      document.getElementById('next-btn').className='next-btn visible';
      return;
    }
  }
  const isLast=S.idx>=S.questions.length-1;
  document.getElementById('next-btn').className='next-btn visible';
  document.getElementById('next-btn').textContent=isLast?'Vedi risultati':'Avanti →';
}

function nextQuestion(){
  S.idx++;
  if(S.idx<S.questions.length&&!(S.mode==='exam'&&S.errors>EXAM_MAX_ERRORS))renderQuestion();
  else showResults();
}

function startTimer(){
  if(S.timer)clearInterval(S.timer);
  S.timer=setInterval(()=>{
    S.secondsLeft--;updateTimerDisplay();
    if(S.secondsLeft<=0){clearInterval(S.timer);showResults();}
  },1000);
}

function updateTimerDisplay(){
  const m=Math.floor(S.secondsLeft/60),s=S.secondsLeft%60;
  const el=document.getElementById('timer-display');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='timer-display'+(S.secondsLeft<120?' warning':'');
}

function showResults(){
  S.finished=true;
  if(S.timer)clearInterval(S.timer);
  document.getElementById('progress-fill').style.width='100%';
  const total=S.questions.length;
  const pct=Math.round((S.score/total)*100);
  document.getElementById('res-pct').textContent=pct+'%';
  let msg,sub;
  if(S.mode==='exam'&&S.errors<=EXAM_MAX_ERRORS){msg='🏆 ESAME SUPERATO!';sub=`${S.score} corrette · ${S.errors} errori su ${EXAM_MAX_ERRORS} consentiti`;}
  else if(S.mode==='exam'&&S.errors>EXAM_MAX_ERRORS){msg='❌ Esame non superato';sub=`${S.errors} errori — il massimo consentito è ${EXAM_MAX_ERRORS}. Riprova!`;}
  else if(pct===100){msg='🏆 Perfetto!';sub='Tutte le risposte corrette.';}
  else if(pct>=80){msg='👍 Molto bene!';sub=`${S.score} su ${total} corrette.`;}
  else if(pct>=60){msg='📚 Continua a studiare';sub=`${S.score} su ${total} corrette.`;}
  else{msg='❌ Ripassa il materiale';sub=`${S.score} su ${total} corrette.`;}
  document.getElementById('res-msg').textContent=msg;
  document.getElementById('res-sub').textContent=sub;
  document.getElementById('retry-btn').onclick=()=>{if(S.mode==='exam')startExam();else startQuiz(S.topicId,'practice');};
  const list=document.getElementById('review-list');
  list.innerHTML='<div style="font-weight:700;font-size:.8rem;margin-bottom:10px;color:#555">Riepilogo risposta per risposta:</div>';
  S.answers.forEach(a=>{
    const div=document.createElement('div');
    div.className='review-item'+(a.ok?'':' wrong');
    div.innerHTML=`<div class="ri-status">${a.ok?'✓ Corretto':'✗ Sbagliato'}</div><div>${a.q}</div>${!a.ok?`<div class="ri-answer">Risposta corretta: ${a.correct==='V'?'VERO':'FALSO'}</div>`:''}`;
    list.appendChild(div);
  });
  document.querySelectorAll('.nav-tab').forEach(el=>el.style.display='');
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('results-screen').style.display='block';
  window.scrollTo(0,0);
}

function exitQuiz(){
  if(S.timer)clearInterval(S.timer);
  document.querySelectorAll('.nav-tab').forEach(el=>el.style.display='');
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('results-screen').style.display='none';
  document.getElementById('menu-screen').classList.add('active');
  document.querySelectorAll('.nav-tab')[0].classList.add('active');
  window.scrollTo(0,0);
}

function renderStats(){
  const el=document.getElementById('stats-content');
  const hasData=Object.values(stats).some(s=>s.total>0);
  if(!hasData){el.innerHTML='<div class="stats-empty">Nessuna sessione effettuata ancora.<br>Fai pratica per vedere le statistiche.</div>';return;}
  let html='<div class="stats-card"><h3>Prestazioni per argomento</h3>';
  TOPICS.forEach(t=>{
    const s=stats[t.id];if(!s||s.total===0)return;
    const pct=Math.round((s.correct/s.total)*100);
    const barClass=pct>=75?'good':pct>=50?'':'bad';
    html+=`<div class="stat-row"><div class="stat-name">${t.name}</div><div class="stat-bar-wrap"><div class="stat-bar ${barClass}" style="width:${pct}%"></div></div><div class="stat-pct">${pct}%</div></div>`;
  });
  const tQ=Object.values(stats).reduce((a,s)=>a+s.total,0);
  const tC=Object.values(stats).reduce((a,s)=>a+s.correct,0);
  const tP=tQ?Math.round((tC/tQ)*100):0;
  html+=`</div><div class="stats-card"><h3>Totale</h3><div class="stat-row"><div class="stat-name">Domande risposte</div><div class="stat-pct">${tQ}</div></div><div class="stat-row"><div class="stat-name">Corrette</div><div class="stat-pct">${tC} (${tP}%)</div></div></div>`;
  el.innerHTML=html;
  const clearBtn=document.createElement('button');
  clearBtn.className='clear-btn';clearBtn.textContent='🗑 Cancella statistiche';
  clearBtn.onclick=()=>{if(confirm('Cancellare tutte le statistiche?')){stats={};localStorage.setItem('quizStats','{}');renderStats();}};
  el.querySelector('.stats-card').appendChild(clearBtn);
}

// PWA service worker for offline
if('serviceWorker' in navigator){
  const sw=`const C='qpc-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add(location.pathname))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{caches.open(C).then(c=>c.put(e.request,res.clone()));return res;}))))`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

buildMenu();
</script>
</body>
</html>
