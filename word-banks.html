<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Banks — John + English</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#4A90D9;--sky-light:#E8F2FD;--sea:#2EC4B6;--sea-light:#E4F8F6;
  --cream:#FFFCF7;--ink:#2D3047;--muted:#7A7D8E;--border:#E8E5DF;--card:#fff;
  --radius:14px;--radius-sm:10px;
  --shadow-sm:0 1px 3px rgba(45,48,71,.06);--shadow-md:0 4px 14px rgba(45,48,71,.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:28px 28px;opacity:.4;pointer-events:none;z-index:0}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,252,247,.88);backdrop-filter:blur(16px);border-bottom:1.5px solid var(--border);padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--sky)}
.nav-links a{font-size:.85rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .15s}
.nav-links a:hover{color:var(--ink)}

.main{max-width:560px;margin:0 auto;padding:7rem 2rem 5rem;position:relative;z-index:1}
.section-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sky);margin-bottom:.4rem}
h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,2.8rem);font-weight:400;line-height:1.1;margin-bottom:2rem}

.list{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.section-head{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.4rem 1rem;background:var(--cream);border-bottom:1.5px solid var(--border)}
.row{display:flex;align-items:center;gap:.75rem;padding:.6rem 1rem;border-bottom:1px solid var(--border);text-decoration:none;color:var(--ink);transition:background .12s}
.row:last-child{border-bottom:none}
.row:not(.soon):hover{background:var(--sky-light)}
.row.soon{opacity:.45;cursor:default}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.row-name{font-size:.9rem;font-weight:700;flex:1}
.row-count{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted)}
.row-arr{font-size:.85rem;color:var(--muted);transition:transform .15s}
.row:not(.soon):hover .row-arr{transform:translateX(3px)}

@media(max-width:600px){.main{padding:6rem 1.2rem 4rem}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">John + <span>English</span></a>
  <div class="nav-links"><a href="index.html">Home</a></div>
</nav>

<div class="main">
  <div class="section-label">Resources</div>
  <h1>Word Banks</h1>

  <div class="list">
    <div class="section-head">Available now</div>

    <a class="row" href="word-bank-work.html">
      <div class="dot" style="background:#4A90D9"></div>
      <span class="row-name">Work &amp; Careers</span>
      <span class="row-count">105 items</span>
      <span class="row-arr">›</span>
    </a>

    <a class="row" href="word-bank-home.html">
      <div class="dot" style="background:#2EC4B6"></div>
      <span class="row-name">Home &amp; Housework</span>
      <span class="row-count">80 items</span>
      <span class="row-arr">›</span>
    </a>

    <div class="section-head">Coming soon</div>

    <div class="row soon">
      <div class="dot" style="background:var(--border)"></div>
      <span class="row-name">Technology</span>
    </div>

    <div class="row soon">
      <div class="dot" style="background:var(--border)"></div>
      <span class="row-name">Health &amp; Wellbeing</span>
    </div>

    <div class="row soon">
      <div class="dot" style="background:var(--border)"></div>
      <span class="row-name">Travel &amp; Transport</span>
    </div>

    <div class="row soon">
      <div class="dot" style="background:var(--border)"></div>
      <span class="row-name">Society &amp; Social Issues</span>
    </div>

  </div>
</div>

</body>
</html>
