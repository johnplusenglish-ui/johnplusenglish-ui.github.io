<p class="subtitle">Tap ✗ to cross out idioms you don't want. When done, tap "Copy kept" to get a pasteable list. Your cuts save automatically.</p>

<div class="controls">

    <button class="lvl-filter on b1" data-l="1">B1</button>

  <button id="btnExpand">Expand all</button>
  <button id="btnCollapse">Collapse all</button>
  <button class="danger" id="btnReset">Reset all</button>
  <button class="primary" id="btnExport">Copy kept</button>
  <div class="stats" id="stats"></div>
</div>

<div id="catList"></div>

<div class="output-area">

</div>

  for (var c = 0; c < DATA.length; c++) {

      total++;
      if (!cut[uid(DATA[c].n, DATA[c].items[i].i)]) kept++;
    }
  }
  document.getElementById("stats").textContent = kept + " kept / " + (total - kept) + " cut / " + total + " total";
}

function escHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function render() {
  var el = document.getElementById("catList");
  var h = "";
  for (var c = 0; c < DATA.length; c++) {
    var cat = DATA[c];
    var visible = [];
    for (var i = 0; i < cat.items.length; i++) {
      if (visLevels[cat.items[i].l]) visible.push(cat.items[i]);
    }
    if (visible.length === 0) continue;
    var keptCount = 0;
    for (var i = 0; i < visible.length; i++) {
      if (!cut[uid(cat.n, visible[i].i)]) keptCount++;
    }
    h += '<div class="cat-section" data-ci="' + c + '">';
    h += '<div class="cat-header">';
    h += '<span>' + escHtml(cat.e) + ' ' + escHtml(cat.n) + '</span>';
    h += '<span class="count">' + keptCount + '/' + visible.length + ' kept</span></div>';
    h += '<div class="cat-body">';
    for (var i = 0; i < visible.length; i++) {
      var x = visible[i];
      var id = uid(cat.n, x.i);
      var isCut = !!cut[id];
      h += '<div class="row' + (isCut ? ' cut' : '') + '" data-id="' + escHtml(id) + '">';
      h += '<span class="lvl ' + LC[x.l] + '">' + LN[x.l] + '</span>';
      h += '<span class="item-text">';
      h += '<span class="item-name">' + escHtml(x.i) + '</span>';
      h += '<span class="item-def">' + escHtml(x.d) + '</span>';
      h += '<span class="item-ex">' + escHtml(x.e) + '</span>';
      h += '</span>';
      h += '<button class="x-btn">' + (isCut ? '↩' : '✗') + '</button>';
      h += '</div>';
    }
    h += '</div></div>';
  }
  el.innerHTML = h;
  updateStats();
}

// Event delegation for toggling cuts
document.getElementById("catList").addEventListener("click", function(e) {
  var btn = e.target;
  if (!btn.classList.contains("x-btn")) return;
  var row = btn.parentElement;
  var id = row.getAttribute("data-id");
  if (cut[id]) {
    delete cut[id];
    row.classList.remove("cut");
    btn.textContent = "\u2717";
  } else {
    cut[id] = true;
    row.classList.add("cut");
    btn.textContent = "\u21A9";
  }
  saveCuts();
  updateStats();
  // Update cat count
  var section = row.parentElement.parentElement;
  var rows = section.querySelectorAll(".row");
  var kept = 0;
  for (var i = 0; i < rows.length; i++) { if (!rows[i].classList.contains("cut")) kept++; }
  section.querySelector(".count").textContent = kept + "/" + rows.length + " kept";
});

// Toggle categories
document.getElementById("catList").addEventListener("click", function(e) {
  var hdr = e.target.closest(".cat-header");
  if (!hdr) return;
  var body = hdr.nextElementSibling;
  if (body) body.classList.toggle("open");
});

// Level filters
var filterBtns = document.querySelectorAll(".lvl-filter");
for (var i = 0; i < filterBtns.length; i++) {
  filterBtns[i].addEventListener("click", function() {
    var l = parseInt(this.getAttribute("data-l"));
    var count = 0;
    for (var k in visLevels) { if (visLevels[k]) count++; }
    if (this.classList.contains("on")) {
      if (count > 1) { visLevels[l] = false; this.classList.remove("on"); }
    } else {
      visLevels[l] = true; this.classList.add("on");
    }
    render();
  });
}

document.getElementById("btnExpand").addEventListener("click", function() {
  var bodies = document.querySelectorAll(".cat-body");
  for (var i = 0; i < bodies.length; i++) bodies[i].classList.add("open");
});
document.getElementById("btnCollapse").addEventListener("click", function() {
  var bodies = document.querySelectorAll(".cat-body");
  for (var i = 0; i < bodies.length; i++) bodies[i].classList.remove("open");
});
document.getElementById("btnReset").addEventListener("click", function() {
  if (confirm("Reset all? This will un-cross everything.")) { cut = {}; saveCuts(); render(); }
});
document.getElementById("btnExport").addEventListener("click", function() {
  var lines = [];
  var count = 0;
  for (var c = 0; c < DATA.length; c++) {
    var cat = DATA[c];
    var kept = [];
    for (var i = 0; i < cat.items.length; i++) {
      if (!cut[uid(cat.n, cat.items[i].i)]) kept.push(cat.items[i]);
    }
    if (kept.length === 0) continue;
    lines.push("## " + cat.e + " " + cat.n);
    for (var i = 0; i < kept.length; i++) {
      lines.push(LN[kept[i].l] + " | " + kept[i].i + " | " + kept[i].d + " | " + kept[i].e);
      count++;
    }
    lines.push("");
  }
  var text = lines.join("\n");
  document.getElementById("output").value = text;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      alert("Copied " + count + " items to clipboard!");
    }, function() {
      document.getElementById("output").select();
      alert(count + " items ready in the box below. Select all and copy.");
    });
  } else {
    document.getElementById("output").select();
    alert(count + " items ready in the box below. Select all and copy.");
  }
});

render();
</script>
</body>
</html>
