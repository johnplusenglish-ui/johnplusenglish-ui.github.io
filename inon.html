<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IN or ON? — JohnPlusEnglish</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #2176FF;
    --orange: #FF9100;
    --red: #EF233C;
    --yellow: #FFDD4A;
    --dark: #1A1A2E;
    --mid: #3A3A52;
    --grey: #888899;
    --light: #F2F2F7;
    --correct: #1DD3B0;
    --wrong: #EF233C;
  }

  body { font-family: 'Outfit', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }

  /* ── HEADER ── */
  .site-header { background: var(--dark); padding: 22px 40px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: #fff; }
  .logo span { color: var(--yellow); }
  .brand-dots { display: flex; gap: 8px; }
  .brand-dots span { width: 11px; height: 11px; border-radius: 50%; display: block; }
  .brand-dots span:nth-child(1) { background: var(--red); }
  .brand-dots span:nth-child(2) { background: var(--yellow); }
  .brand-dots span:nth-child(3) { background: var(--blue); }

  /* ── HERO ── */
  .hero { background: var(--dark); padding: 0 40px 0; text-align: center; }
  .hero h1 { font-size: clamp(50px, 9vw, 86px); font-weight: 900; letter-spacing: -0.04em; line-height: 1; color: #fff; padding-top: 4px; }
  .hero h1 .in { color: var(--blue); }
  .hero h1 .or { color: rgba(255,255,255,0.2); font-weight: 300; font-size: 0.48em; vertical-align: middle; margin: 0 10px; }
  .hero h1 .on { color: var(--orange); }

  /* ── TABS ── */
  .tab-bar {
    background: var(--dark);
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 18px 24px 0;
  }
  .tab-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 700;
    border: none; border-radius: 12px 12px 0 0;
    padding: 11px 32px;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.45);
  }
  .tab-btn:hover { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.7); }
  .tab-btn.active { background: var(--light); color: var(--dark); }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── QUIZ HERO ADDITIONS ── */
  .quiz-sub-bar {
    background: var(--light);
    border-bottom: 1px solid #e2e2ec;
    padding: 14px 24px;
  }
  .hero-sub { font-size: 17px; font-weight: 400; color: rgba(255,255,255,0.4); margin-top: 6px; padding-bottom: 0; }
  .progress-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 100px; height: 5px; margin: 16px auto 0; max-width: 420px; overflow: hidden; }
  .progress-bar-fill { height: 5px; border-radius: 100px; background: linear-gradient(90deg, var(--blue), var(--orange)); transition: width 0.35s ease; width: 0%; }
  .progress-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.3); margin-top: 8px; letter-spacing: 0.06em; padding-bottom: 18px; }

  /* ── SCORE ── */
  .score-wrap { display: flex; justify-content: center; gap: 12px; padding: 18px 24px 0; }
  .score-badge { display: flex; align-items: center; gap: 7px; background: #fff; border-radius: 100px; padding: 7px 18px; font-size: 15px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .score-badge .dot { width: 9px; height: 9px; border-radius: 50%; }
  .score-badge.cb .dot { background: var(--correct); }
  .score-badge.wb .dot { background: var(--wrong); }

  /* ── QUIZ QUESTIONS ── */
  .questions-container { max-width: 840px; margin: 22px auto 60px; padding: 0 18px; display: flex; flex-direction: column; gap: 9px; }
  .section-divider { padding: 8px 0 2px; }
  .section-label { font-size: 11px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: #bbb; padding-top: 10px; border-top: 1.5px solid #e2e2ec; }

  .q-card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 6px rgba(26,26,46,0.055); border: 2px solid transparent; transition: border-color 0.25s, background 0.25s; }
  .q-card.correct { border-color: var(--correct); background: #f0fdf9; }
  .q-card.wrong   { border-color: var(--wrong);   background: #fff4f4; }
  .card-main { display: flex; gap: 14px; align-items: flex-start; padding: 15px 18px 14px; }
  .q-num { font-size: 14px; font-weight: 800; color: #ccc; width: 26px; flex-shrink: 0; padding-top: 4px; text-align: right; }
  .q-body { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .q-sentence { font-size: 18px; font-weight: 500; color: var(--dark); line-height: 1.55; }

  .blank-token { display: inline-block; min-width: 48px; height: 30px; line-height: 30px; text-align: center; border-radius: 6px; border: 2px dashed #ccc; background: var(--light); font-size: 14px; font-weight: 800; color: transparent; vertical-align: middle; margin: 0 2px; transition: all 0.2s; }
  .blank-token.has-in  { border: 2px solid var(--blue);    background: rgba(33,118,255,0.09);  color: var(--blue); }
  .blank-token.has-on  { border: 2px solid var(--orange);  background: rgba(255,145,0,0.09);   color: var(--orange); }
  .blank-token.ok      { border: 2px solid var(--correct); background: rgba(29,211,176,0.11);  color: var(--correct); }
  .blank-token.bad     { border: 2px solid var(--wrong);   background: rgba(239,35,60,0.09);   color: var(--wrong); text-decoration: line-through; }
  .correction { font-size: 13px; font-weight: 800; color: var(--correct); margin-left: 4px; }

  .toggle-row { display: flex; gap: 7px; align-items: center; }
  .toggle-btn { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 800; border: 2px solid #e0e0eb; border-radius: 8px; background: #fff; color: #bbb; padding: 4px 16px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; }
  .toggle-btn:hover:not(:disabled) { border-color: #aaa; color: #555; }
  .toggle-btn.active-in  { background: var(--blue);   border-color: var(--blue);   color: #fff; }
  .toggle-btn.active-on  { background: var(--orange); border-color: var(--orange); color: #fff; }
  .toggle-btn:disabled   { opacity: 0.45; cursor: default; }

  .reset-one-row { display: flex; justify-content: flex-end; padding: 0 18px 12px 58px; }
  .reset-one-btn { font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; border: 1.5px solid #e0e0eb; border-radius: 100px; background: #fff; color: #aaa; padding: 4px 14px; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; }
  .reset-one-btn:hover { border-color: var(--red); color: var(--red); background: #fff5f5; }

  @keyframes popIn {
    0%   { transform: scale(0.85); opacity: 0.4; }
    60%  { transform: scale(1.12); }
    100% { transform: scale(1);    opacity: 1; }
  }
  @keyframes jiggle {
    0%,100% { transform: translateX(0); }
    15%     { transform: translateX(-6px) rotate(-1.5deg); }
    35%     { transform: translateX(6px)  rotate(1.5deg); }
    55%     { transform: translateX(-4px) rotate(-1deg); }
    75%     { transform: translateX(4px)  rotate(1deg); }
  }
  .anim-pop    { animation: popIn   0.28s cubic-bezier(0.22,1,0.36,1) both; }
  .anim-jiggle { animation: jiggle  0.45s ease both; }

  .explain-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 18px 0 58px; cursor: pointer; user-select: none; border-top: 1px solid rgba(0,0,0,0.05); background: transparent; min-height: 0; overflow: hidden; max-height: 0; transition: max-height 0.3s ease, padding 0.3s ease; }
  .q-card.answered .explain-bar { max-height: 44px; padding-top: 9px; padding-bottom: 9px; }
  .explain-bar:hover { background: rgba(0,0,0,0.025); }
  .explain-trigger { font-size: 13px; font-weight: 700; color: var(--grey); letter-spacing: 0.03em; display: flex; align-items: center; gap: 6px; }
  .explain-trigger .chevron { display: inline-block; font-size: 11px; transition: transform 0.22s; color: var(--grey); }
  .explain-bar.open .chevron { transform: rotate(180deg); }
  .explain-panel { max-height: 0; overflow: hidden; transition: max-height 0.32s ease, padding 0.32s ease; padding: 0 18px 0 58px; background: rgba(0,0,0,0.018); }
  .explain-panel.open { max-height: 200px; padding-top: 12px; padding-bottom: 14px; }
  .explain-text { font-size: 15px; font-weight: 400; color: #444; line-height: 1.6; }
  .explain-text strong { font-weight: 700; color: var(--dark); }
  .explain-text .rule-tag { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 5px; padding: 2px 8px; margin-right: 6px; vertical-align: middle; }
  .explain-text .rule-tag.in  { background: rgba(33,118,255,0.12);  color: var(--blue); }
  .explain-text .rule-tag.on  { background: rgba(255,145,0,0.14);   color: #cc6a00; }

  .actions { display: flex; justify-content: center; gap: 12px; padding: 0 18px 18px; max-width: 840px; margin: 0 auto; flex-wrap: wrap; }
  .btn { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; border: none; border-radius: 100px; padding: 12px 30px; cursor: pointer; transition: all 0.18s; }
  .btn-reset { background: #fff; color: var(--dark); border: 2px solid #e0e0eb; }
  .btn-reset:hover { border-color: var(--dark); }

  .results-screen { display: none; max-width: 480px; margin: 28px auto 60px; padding: 0 18px; text-align: center; }
  .results-screen.visible { display: block; }
  .result-card { background: #fff; border-radius: 24px; padding: 40px 32px; box-shadow: 0 8px 40px rgba(26,26,46,0.1); }
  .result-emoji { font-size: 60px; margin-bottom: 12px; }
  .result-score { font-size: 72px; font-weight: 900; letter-spacing: -0.05em; line-height: 1; margin-bottom: 6px; }
  .result-label { font-size: 16px; color: var(--grey); margin-bottom: 24px; }
  .result-breakdown { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
  .breakdown-pill { border-radius: 100px; padding: 8px 20px; font-size: 15px; font-weight: 700; }
  .breakdown-pill.c { background: rgba(29,211,176,0.13); color: var(--correct); }
  .breakdown-pill.w { background: rgba(239,35,60,0.1);   color: var(--wrong); }
  .btn-dark { background: var(--dark); color: #fff; }
  .btn-dark:hover { background: var(--mid); transform: translateY(-2px); }

  /* ═══════════════════════════════════════
     FLASHCARD TAB
  ═══════════════════════════════════════ */
  .fc-shell {
    max-width: 700px;
    margin: 40px auto 60px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* counter + shuffle */
  .fc-topbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .fc-counter {
    font-size: 15px;
    font-weight: 700;
    color: var(--grey);
    letter-spacing: 0.05em;
  }
  .fc-counter span { color: var(--dark); }
  .fc-shuffle-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 700;
    border: 2px solid #e0e0eb; border-radius: 100px;
    background: #fff; color: var(--grey);
    padding: 7px 20px; cursor: pointer;
    transition: all 0.15s;
  }
  .fc-shuffle-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* THE CARD */
  .fc-card-wrap {
    width: 100%;
  }
  .fc-card {
    width: 100%;
    min-height: 360px;
    position: relative;
    cursor: pointer;
    border-radius: 24px;
    -webkit-tap-highlight-color: transparent;
  }

  .fc-face {
    width: 100%;
    min-height: 360px;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 48px;
    box-shadow: 0 12px 48px rgba(26,26,46,0.13);
    text-align: center;
  }
  .fc-face.fc-hidden { display: none; }

  /* FRONT */
  .fc-front {
    background: var(--dark);
  }
  .fc-hint {
    font-size: 12px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.25); margin-bottom: 24px;
  }
  .fc-sentence {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 600;
    color: #fff;
    line-height: 1.5;
  }
  .fc-blank {
    display: inline-block;
    width: 72px; height: 42px; line-height: 42px;
    border-radius: 10px;
    border: 3px dashed rgba(255,255,255,0.3);
    vertical-align: middle;
    margin: 0 6px;
  }
  .fc-tap-hint {
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.2);
    margin-top: 32px;
    letter-spacing: 0.06em;
  }
  .fc-group-tag {
    font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 100px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.3);
    margin-bottom: 20px;
  }

  /* BACK */
  .fc-back {
    background: #fff;
  }
  .fc-answer-label {
    font-size: 12px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
    color: #ccc; margin-bottom: 16px;
  }
  .fc-answer {
    font-size: clamp(64px, 14vw, 96px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 20px;
  }
  .fc-answer.is-in { color: var(--blue); }
  .fc-answer.is-on { color: var(--orange); }
  .fc-full-sentence {
    font-size: 18px; font-weight: 500;
    color: var(--mid); line-height: 1.55;
    margin-bottom: 18px;
  }
  .fc-filled-blank {
    font-weight: 900;
    font-style: normal;
  }
  .fc-filled-blank.is-in { color: var(--blue); }
  .fc-filled-blank.is-on { color: var(--orange); }
  .fc-explanation {
    font-size: 14px; font-weight: 400;
    color: #777; line-height: 1.55;
    border-top: 1px solid #f0f0f0;
    padding-top: 16px;
    margin-top: 4px;
    max-width: 500px;
  }
  .fc-explanation .rule-tag { display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 5px; padding: 2px 7px; margin-right: 5px; vertical-align: middle; }
  .fc-explanation .rule-tag.in { background: rgba(33,118,255,0.12); color: var(--blue); }
  .fc-explanation .rule-tag.on { background: rgba(255,145,0,0.14); color: #cc6a00; }

  /* slide animation on card swap */
  @keyframes fcSlideIn {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .fc-card-wrap.sliding .fc-card { animation: fcSlideIn 0.28s cubic-bezier(0.22,1,0.36,1) both; }

  /* NAV BUTTONS */
  .fc-nav {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .fc-nav-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 22px; font-weight: 700;
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2.5px solid #e0e0eb;
    background: #fff;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .fc-nav-btn:hover { border-color: var(--blue); color: var(--blue); transform: scale(1.08); }
  .fc-nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
  .fc-nav-btn.big {
    width: 68px; height: 68px;
    font-size: 28px;
    background: var(--dark);
    border-color: var(--dark);
    color: #fff;
  }
  .fc-nav-btn.big:hover { background: var(--mid); border-color: var(--mid); transform: scale(1.06); }

  /* progress dots */
  .fc-dots {
    display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;
    max-width: 320px;
  }
  .fc-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ddd;
    transition: background 0.2s;
  }
  .fc-dot.seen { background: var(--blue); }
  .fc-dot.current { background: var(--orange); transform: scale(1.3); }

  @media (max-width: 520px) {
    .site-header { padding: 16px 16px; }
    .tab-btn { font-size: 13px; padding: 9px 20px; }
    .fc-face { padding: 28px 24px; }
    .fc-sentence { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo">John<span>Plus</span>English</div>
  <div class="brand-dots"><span></span><span></span><span></span></div>
</header>

<!-- HERO + TABS -->
<div class="hero">
  <h1><span class="in">IN</span><span class="or">or</span><span class="on">ON</span></h1>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('quiz')">📝 Quiz</button>
    <button class="tab-btn" onclick="switchTab('flash')">🃏 Flashcards</button>
  </div>
</div>

<!-- ══════════ QUIZ TAB ══════════ -->
<div class="tab-panel active" id="tab-quiz">
  <div style="background:var(--dark); padding-bottom:18px; text-align:center;">
    <p class="hero-sub">Choose IN or ON — instant feedback on every answer.</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <p class="progress-label" id="progressLabel">0 / 99 answered</p>
  </div>

  <div class="score-wrap">
    <div class="score-badge cb"><span class="dot"></span><span id="scoreCorrect">0</span> correct</div>
    <div class="score-badge wb"><span class="dot"></span><span id="scoreWrong">0</span> wrong</div>
  </div>

  <div class="questions-container" id="questionsContainer"></div>

  <div class="actions">
    <button class="btn btn-reset" onclick="resetAll()">Reset all</button>
  </div>

  <div class="results-screen" id="resultsScreen">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <div class="result-score" id="resultScore">—</div>
      <div class="result-label"  id="resultLabel"></div>
      <div class="result-breakdown">
        <div class="breakdown-pill c" id="breakCorrect">—</div>
        <div class="breakdown-pill w" id="breakWrong">—</div>
      </div>
      <button class="btn btn-dark" onclick="resetAll()">Try again</button>
    </div>
  </div>
</div>

<!-- ══════════ FLASHCARD TAB ══════════ -->
<div class="tab-panel" id="tab-flash">
  <div class="fc-shell">
    <div class="fc-topbar">
      <div class="fc-counter">Card <span id="fcNum">1</span> of <span id="fcTotal">99</span></div>
      <button class="fc-shuffle-btn" onclick="fcShuffle()">⇄ Shuffle</button>
    </div>

    <div class="fc-card-wrap" id="fcWrap">
      <div class="fc-card" id="fcCard">
        <!-- content injected by fcRender() -->
      </div>
    </div>

    <!-- dots -->
    <div class="fc-dots" id="fcDots"></div>

    <!-- nav -->
    <div class="fc-nav">
      <button class="fc-nav-btn" id="fcPrev" onclick="fcGo(-1)">←</button>
      <button class="fc-nav-btn big" onclick="fcFlip()">↕</button>
      <button class="fc-nav-btn" id="fcNext" onclick="fcGo(1)">→</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════
const questions = [
  { pre:"Could you come", post:"Friday?", answer:"on", group:"Time expressions",
    exp:`<span class="rule-tag on">ON</span> Use <strong>on</strong> with specific days and dates: <em>on Friday, on Monday, on 3rd June</em>.` },
  { pre:"Sure!", post:"the morning or the afternoon?", answer:"in", group:"Time expressions",
    exp:`<span class="rule-tag in">IN</span> Use <strong>in</strong> with parts of the day: <em>in the morning, in the afternoon, in the evening</em>. (Exception: <em>at night, at noon</em>.)` },
  { pre:"", post:"the evening if you can, but not at night.", answer:"in", group:"Time expressions",
    exp:`<span class="rule-tag in">IN</span> <strong>in the evening</strong> — same rule as morning/afternoon. Note the contrast with <em>at night</em>, which uses <strong>at</strong>.` },
  { pre:"Julia turns 25", post:"a few days.", answer:"in", group:"Time expressions",
    exp:`<span class="rule-tag in">IN</span> Use <strong>in</strong> for future periods: <em>in a few days, in a week, in a moment</em>.` },
  { pre:"I thought her birthday is", post:"August.", answer:"in", group:"Time expressions",
    exp:`<span class="rule-tag in">IN</span> Use <strong>in</strong> with months, years, seasons, and centuries: <em>in August, in 2024, in summer, in the 20th century</em>.` },
  { pre:"I hope to see you", post:"summer.", answer:"in", group:"Time expressions",
    exp:`<span class="rule-tag in">IN</span> Seasons take <strong>in</strong>: <em>in spring, in summer, in autumn, in winter</em>.` },
  { pre:"", post:"what decade was he born?", answer:"in", group:"Time expressions",
    exp:`<span class="rule-tag in">IN</span> Decades and centuries take <strong>in</strong>: <em>in the 1990s, in what decade, in the 20th century</em>.` },
  { pre:"I was born", post:"1985.", answer:"in", group:"Time expressions",
    exp:`<span class="rule-tag in">IN</span> Years take <strong>in</strong>: <em>in 1985, in 2001</em>. Think of the year as a container of time.` },
  { pre:"", post:"the 20th century, of course.", answer:"in", group:"Time expressions",

// QUIZ STATE
// ══════════════════════════════════════════════════════════════
let userAnswers  = Array(questions.length).fill(null);
let answerState  = Array(questions.length).fill(null);
let expandedExp  = Array(questions.length).fill(false);
let scoreCorrect = 0;
let scoreWrong   = 0;

// ══════════════════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
  if (tab === 'flash') fcRender();
}

// ══════════════════════════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════════════════════════
function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  let currentGroup = '';

  questions.forEach((q, i) => {
    if (q.group !== currentGroup) {
      currentGroup = q.group;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<div class="section-label">${currentGroup}</div>`;
      container.appendChild(div);
    }

    const ans   = userAnswers[i];
    const state = answerState[i];
    const tokClass = state === 'correct' ? 'ok' : state === 'wrong' ? 'bad' : ans ? (ans === 'in' ? 'has-in' : 'has-on') : '';
    const tokText  = ans ? ans.toUpperCase() : '';
    const corrText = (state === 'wrong') ? '→ ' + q.answer.toUpperCase() : '';
    const cardClass = state === 'correct' ? 'q-card correct answered' : state === 'wrong' ? 'q-card wrong answered' : ans ? 'q-card answered' : 'q-card';
    const inDisabled = state !== null ? 'disabled' : '';
    const onDisabled = state !== null ? 'disabled' : '';
    const inActive   = ans === 'in' ? 'active-in' : '';
    const onActive   = ans === 'on' ? 'active-on' : '';
    const expOpen    = expandedExp[i] ? 'open' : '';
    const sentence   = `${q.pre ? q.pre + ' ' : ''}<span class="blank-token ${tokClass}" id="tok-${i}">${tokText}</span><span class="correction" id="corr-${i}">${corrText}</span> ${q.post}`;

    const card = document.createElement('div');
    card.className = cardClass;
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="card-main">
        <div class="q-num">${i + 1}</div>
        <div class="q-body">
          <div class="q-sentence">${sentence}</div>
          <div class="toggle-row" id="trow-${i}">
            <button class="toggle-btn ${inActive}" id="btn-in-${i}" onclick="pick(${i},'in')" ${inDisabled}>IN</button>
            <button class="toggle-btn ${onActive}" id="btn-on-${i}" onclick="pick(${i},'on')" ${onDisabled}>ON</button>
          </div>
        </div>
      </div>
      <div class="explain-bar ${expOpen}" id="expbar-${i}" onclick="toggleExplain(${i})">
        <span class="explain-trigger"><span class="chevron">▼</span> Why?</span>
      </div>
      <div class="explain-panel ${expOpen}" id="exppanel-${i}">
        <div class="explain-text">${q.exp}</div>
      </div>
      ${state !== null ? `<div class="reset-one-row"><button class="reset-one-btn" onclick="resetOne(${i})">↺ Try again</button></div>` : ''}
    `;
    container.appendChild(card);
  });
}

function pick(i, choice) {
  if (answerState[i] !== null) return;
  userAnswers[i] = choice;
  const correct  = choice === questions[i].answer;
  answerState[i] = correct ? 'correct' : 'wrong';
  if (correct) scoreCorrect++;
  else         scoreWrong++;

  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreWrong').textContent   = scoreWrong;

  const card  = document.getElementById(`card-${i}`);
  const tok   = document.getElementById(`tok-${i}`);
  const corr  = document.getElementById(`corr-${i}`);
  const btnIn = document.getElementById(`btn-in-${i}`);
  const btnOn = document.getElementById(`btn-on-${i}`);
  btnIn.disabled = true;
  btnOn.disabled = true;

  if (correct) {
    card.classList.add('correct', 'answered');
    tok.className = 'blank-token ok anim-pop';
    tok.textContent = choice.toUpperCase();
  } else {
    card.classList.add('wrong', 'answered');
    tok.className = 'blank-token bad anim-jiggle';
    tok.textContent = choice.toUpperCase();
    corr.textContent = '→ ' + questions[i].answer.toUpperCase();
  }
  tok.addEventListener('animationend', () => { tok.classList.remove('anim-pop', 'anim-jiggle'); }, { once: true });

  const resetRow = document.createElement('div');
  resetRow.className = 'reset-one-row';
  resetRow.innerHTML = `<button class="reset-one-btn" onclick="resetOne(${i})">↺ Try again</button>`;
  card.appendChild(resetRow);

  updateProgress();
  checkCompletion();
}

function toggleExplain(i) {
  expandedExp[i] = !expandedExp[i];
  document.getElementById(`expbar-${i}`).classList.toggle('open', expandedExp[i]);
  document.getElementById(`exppanel-${i}`).classList.toggle('open', expandedExp[i]);
}

function updateProgress() {
  const answered = answerState.filter(a => a !== null).length;
  document.getElementById('progressBar').style.width = (answered / questions.length * 100) + '%';
  document.getElementById('progressLabel').textContent = `${answered} / ${questions.length} answered`;
}

function checkCompletion() {
  if (answerState.filter(a => a !== null).length < questions.length) return;
  const pct   = Math.round(scoreCorrect / questions.length * 100);
  const emoji = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
  const label = pct === 100 ? 'Perfect score!' : pct >= 80 ? 'Excellent work!' : pct >= 60 ? 'Good effort — review the ones you missed.' : 'Keep practising!';
  const col   = pct >= 80 ? 'var(--blue)' : pct >= 60 ? 'var(--orange)' : 'var(--red)';
  document.getElementById('resultEmoji').textContent  = emoji;
  document.getElementById('resultScore').textContent  = pct + '%';
  document.getElementById('resultScore').style.color  = col;
  document.getElementById('resultLabel').textContent  = label;
  document.getElementById('breakCorrect').textContent = scoreCorrect + ' correct';
  document.getElementById('breakWrong').textContent   = scoreWrong + ' wrong';
  const rs = document.getElementById('resultsScreen');
  rs.classList.add('visible');
  setTimeout(() => rs.scrollIntoView({ behavior: 'smooth' }), 200);
}

function resetOne(i) {
  if (answerState[i] === 'correct') scoreCorrect = Math.max(0, scoreCorrect - 1);
  if (answerState[i] === 'wrong')   scoreWrong   = Math.max(0, scoreWrong - 1);
  userAnswers[i] = null;
  answerState[i] = null;
  expandedExp[i] = false;
  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreWrong').textContent   = scoreWrong;

  const q    = questions[i];
  const card = document.getElementById(`card-${i}`);
  card.className = 'q-card';
  card.innerHTML = `
    <div class="card-main">
      <div class="q-num">${i + 1}</div>
      <div class="q-body">
        <div class="q-sentence">${q.pre ? q.pre + ' ' : ''}<span class="blank-token" id="tok-${i}"></span><span class="correction" id="corr-${i}"></span> ${q.post}</div>
        <div class="toggle-row" id="trow-${i}">
          <button class="toggle-btn" id="btn-in-${i}" onclick="pick(${i},'in')">IN</button>
          <button class="toggle-btn" id="btn-on-${i}" onclick="pick(${i},'on')">ON</button>
        </div>
      </div>
    </div>
    <div class="explain-bar" id="expbar-${i}" onclick="toggleExplain(${i})">
      <span class="explain-trigger"><span class="chevron">▼</span> Why?</span>
    </div>
    <div class="explain-panel" id="exppanel-${i}">
      <div class="explain-text">${q.exp}</div>
    </div>
  `;
  updateProgress();
}

function resetAll() {
  userAnswers  = Array(questions.length).fill(null);
  answerState  = Array(questions.length).fill(null);
  expandedExp  = Array(questions.length).fill(false);
  scoreCorrect = 0; scoreWrong = 0;
  document.getElementById('scoreCorrect').textContent = '0';
  document.getElementById('scoreWrong').textContent   = '0';
  document.getElementById('resultsScreen').classList.remove('visible');
  updateProgress();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════════════
// FLASHCARDS
// ══════════════════════════════════════════════════════════════
let fcDeck   = [];   // shuffled indices
let fcIndex  = 0;    // current position in deck
let fcIsFlipped = false;

function fcInitDeck() {
  fcDeck = [...Array(questions.length).keys()];
}

function fcShuffle() {
  fcInitDeck();
  for (let i = fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcDeck[i], fcDeck[j]] = [fcDeck[j], fcDeck[i]];
  }
  fcIndex = 0;
  fcRender();
}

function fcRender() {
  if (!fcDeck.length) { fcInitDeck(); }

  const q   = questions[fcDeck[fcIndex]];
  const ans = q.answer.toUpperCase();

  const frontSentence = (q.pre ? q.pre + ' ' : '') +
    '<span class="fc-blank"></span> ' + q.post;

  const filledSentence = (q.pre ? q.pre + ' ' : '') +
    `<strong class="fc-filled-blank is-${q.answer}">${ans}</strong> ` + q.post;

  document.getElementById('fcNum').textContent   = fcIndex + 1;
  document.getElementById('fcTotal').textContent = fcDeck.length;
  document.getElementById('fcPrev').disabled     = fcIndex === 0;
  document.getElementById('fcNext').disabled     = fcIndex === fcDeck.length - 1;

  fcIsFlipped = false;

  document.getElementById('fcCard').innerHTML = `
    <div class="fc-face fc-front" id="fcFront">
      <div class="fc-group-tag">${q.group}</div>
      <div class="fc-sentence">${frontSentence}</div>
      <div class="fc-tap-hint">↕ tap to reveal</div>
    </div>
    <div class="fc-face fc-back fc-hidden" id="fcBack">
      <div class="fc-answer-label">ANSWER</div>
      <div class="fc-answer is-${q.answer}">${ans}</div>
      <div class="fc-full-sentence">${filledSentence}</div>
      <div class="fc-explanation">${q.exp}</div>
    </div>
  `;

  fcRenderDots();
}

function fcRenderDots() {
  const dots = document.getElementById('fcDots');
  const total = fcDeck.length;
  const maxDots = 33;
  dots.innerHTML = '';
  if (total <= maxDots) {
    for (let i = 0; i < total; i++) {
      const d = document.createElement('span');
      d.className = 'fc-dot' + (i < fcIndex ? ' seen' : i === fcIndex ? ' current' : '');
      dots.appendChild(d);
    }
  } else {
    // show window of dots around current
    const half = Math.floor(maxDots / 2);
    let start = Math.max(0, fcIndex - half);
    let end   = Math.min(total - 1, start + maxDots - 1);
    start     = Math.max(0, end - maxDots + 1);
    for (let i = start; i <= end; i++) {
      const d = document.createElement('span');
      d.className = 'fc-dot' + (i < fcIndex ? ' seen' : i === fcIndex ? ' current' : '');
      dots.appendChild(d);
    }
  }
}

function fcFlip() {
  fcIsFlipped = !fcIsFlipped;
  document.getElementById('fcFront').classList.toggle('fc-hidden', fcIsFlipped);
  document.getElementById('fcBack').classList.toggle('fc-hidden', !fcIsFlipped);
}

function fcGo(dir) {
  const newIndex = fcIndex + dir;
  if (newIndex < 0 || newIndex >= fcDeck.length) return;
  fcIndex = newIndex;
  fcRender();
}

function fcGo(dir) {
  const newIndex = fcIndex + dir;
  if (newIndex < 0 || newIndex >= fcDeck.length) return;
  fcIndex = newIndex;
  fcRender();
}

// keyboard support for flashcards
document.addEventListener('keydown', e => {
  if (!document.getElementById('tab-flash').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') fcGo(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   fcGo(-1);
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); fcFlip(); }
});

// ── INIT ──
renderQuestions();
updateProgress();
fcShuffle();

// Flip via event delegation on the wrapper (survives innerHTML rebuilds)
document.getElementById('fcWrap').addEventListener('click', function(e) {
  // don't flip if clicking nav buttons
  if (e.target.closest('.fc-nav-btn')) return;
  fcFlip();
});
document.getElementById('fcWrap').addEventListener('touchend', function(e) {
  if (e.target.closest('.fc-nav-btn')) return;
  e.preventDefault();
  fcFlip();
});
</script>
