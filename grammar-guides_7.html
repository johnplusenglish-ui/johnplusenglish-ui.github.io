<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Guides — John + English</title>
<meta name="description" content="Clear, deep grammar explanations from A1 to C1 — rules, forms, examples, common errors and real use notes.">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--sun:#FFB347;--sky:#2176FF;--sky-light:#E8EEFF;--sea:#1DD3B0;--sea-light:#E4F8F6;--coral:#FF6B6B;--coral-light:#FFE8E8;--lavender:#9B72CF;--lavender-light:#F0E8FA;--cream:#F7F6F3;--ink:#2D3047;--muted:#7A7D8E;--border:#E8E5DF;--card:#fff;--radius:14px;--radius-sm:10px;--shadow-sm:0 1px 3px rgba(45,48,71,.06);--shadow-md:0 4px 14px rgba(45,48,71,.08)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-y:auto}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:28px 28px;opacity:.4;pointer-events:none;z-index:0}

/* ── Nav ── */
.topnav{position:fixed;top:0;left:0;right:0;height:52px;z-index:200;background:rgba(247,246,243,.88);backdrop-filter:blur(16px);border-bottom:1.5px solid #E8E5DF;padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-.02em;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--sky)}
.topnav-links{display:flex;gap:1.2rem;align-items:center}
.topnav-links a{font-size:.8rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .2s}
.topnav-links a:hover{color:var(--sky)}

/* ── Layout ── */
.main{padding-top:52px;position:relative;z-index:1}
.wrap{max-width:960px;margin:0 auto;padding:0 2rem 4rem}

/* ── Back link ── */
.back-link-wrap{max-width:960px;margin:0 auto;padding:1.2rem 2rem 0;position:relative;z-index:1}
.back-link{display:inline-flex;align-items:center;gap:.35rem;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .15s}
.back-link:hover{color:var(--ink)}

/* ── Hero ── */
.hero{position:relative;padding:1.6rem 2rem 1.4rem;max-width:960px;margin:0 auto;text-align:center;z-index:1}
.hero-badge{display:inline-flex;align-items:center;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sky);background:var(--sky-light);padding:.3rem .9rem;border-radius:20px;margin-bottom:.7rem}
.hero h1{font-size:clamp(1.8rem,3.6vw,2.6rem);line-height:1.1;letter-spacing:-.02em;margin-bottom:.6rem;font-weight:900}
.hero h1 em{font-style:italic;color:var(--sky);position:relative}
.hero h1 em::after{content:'';position:absolute;bottom:3px;left:-2px;right:-2px;height:6px;background:var(--sky);opacity:.2;border-radius:4px;z-index:-1}
.hero-sub{font-size:.95rem;color:var(--muted);max-width:580px;margin:0 auto;line-height:1.6}

/* ── Level tabs ── */
.tabs-wrap{position:sticky;top:52px;z-index:100;background:var(--cream);padding:1rem 2rem .8rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tabs{display:flex;gap:6px;background:var(--card);border-radius:100px;padding:5px;max-width:fit-content;margin:0 auto;border:1.5px solid var(--border);box-shadow:var(--shadow-sm);flex-wrap:wrap;justify-content:center}
.tab{font-family:'Outfit',sans-serif;padding:8px 20px;border-radius:100px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--sky);color:#fff;box-shadow:var(--shadow-sm)}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:1.5rem}
.search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-input{width:100%;font-family:'Outfit',sans-serif;font-size:.95rem;padding:.7rem 1rem .7rem 2.6rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--ink);outline:none;transition:border-color .15s;box-shadow:var(--shadow-sm)}
.search-input:focus{border-color:var(--sky)}
.search-input::placeholder{color:var(--muted)}
.search-results-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.8rem;display:none}

/* ── Topic cards ── */
.topic-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;box-shadow:var(--shadow-sm);overflow:hidden}
.topic-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.3rem;cursor:pointer;gap:1rem;transition:background .15s;user-select:none}
.topic-header:hover{background:var(--cream)}
.topic-header-left{display:flex;align-items:center;gap:.8rem}
.topic-num{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--sky);background:var(--sky-light);padding:.2rem .5rem;border-radius:5px;font-weight:700;flex-shrink:0}
.topic-title{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;color:var(--ink)}
.topic-level-badge{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;padding:.15rem .5rem;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.badge-a1{background:#FFF3E0;color:#c97800}
.badge-a2{background:#E8EEFF;color:#1a5fd4}
.badge-b1{background:#E4F8F6;color:#0A8A76}
.badge-b2{background:var(--sea-light);color:var(--sea)}
.badge-c1{background:var(--lavender-light);color:var(--lavender)}
.topic-chevron{color:var(--muted);transition:transform .25s;flex-shrink:0;font-size:1.1rem}
.topic-card.open .topic-chevron{transform:rotate(180deg)}
.topic-body{display:none;padding:0 1.3rem 1.3rem;border-top:1px solid var(--border)}
.topic-card.open .topic-body{display:block;animation:fadeIn .2s ease}

/* ── Topic body sections ── */
.section-label{font-family:'JetBrains Mono',monospace;font-size:.63rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sky);margin-bottom:.4rem;font-weight:600;margin-top:1.1rem}
.rule-box{background:var(--sky-light);border:1.5px solid rgba(33,118,255,.15);border-radius:var(--radius-sm);padding:.9rem 1.1rem;margin-bottom:.8rem}
.rule-box p{font-size:.9rem;margin-bottom:.4rem;line-height:1.6}
.rule-box p:last-child{margin-bottom:0}
.rule-box strong{color:var(--sky);font-weight:700}
.rule-box code{font-family:'JetBrains Mono',monospace;font-size:.82rem;background:rgba(33,118,255,.1);padding:.1rem .35rem;border-radius:4px;color:var(--sky)}

.form-table{width:100%;border-collapse:collapse;margin-bottom:.9rem;font-size:.88rem}
.form-table th{font-family:'JetBrains Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.5rem .8rem;text-align:left;border-bottom:1.5px solid var(--border);background:var(--cream);font-weight:600}
.form-table td{padding:.5rem .8rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
.form-table tr:last-child td{border-bottom:none}
.form-table tr:hover td{background:rgba(33,118,255,.03)}
.form-table code{font-family:'JetBrains Mono',monospace;font-size:.82rem;background:var(--sky-light);padding:.1rem .35rem;border-radius:4px;color:var(--sky)}

.example-list{list-style:none;padding:0;margin-bottom:.9rem}
.example-list li{font-size:.9rem;padding:.4rem 0;border-bottom:1px dotted var(--border);line-height:1.6;font-style:italic}
.example-list li:last-child{border-bottom:none}
.example-list li::before{content:'›';color:var(--sky);margin-right:.5rem;font-style:normal;font-weight:700}

.error-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.9rem}
.error-item{border-radius:var(--radius-sm);padding:.7rem .9rem;font-size:.85rem}
.error-wrong{background:rgba(255,107,107,.07);border:1px solid rgba(255,107,107,.2)}
.error-wrong::before{content:'✗ ';color:var(--coral);font-weight:700}
.error-right{background:rgba(29,211,176,.07);border:1px solid rgba(29,211,176,.2)}
.error-right::before{content:'✓ ';color:var(--sea);font-weight:700}
.error-item del{color:var(--coral);text-decoration:line-through}
.error-item strong{color:var(--sea)}

.note-box{background:var(--cream);border:1.5px solid var(--border);border-left:3px solid var(--sky);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:.8rem 1rem;margin-bottom:.9rem;font-size:.88rem;line-height:1.6}
.note-box strong{color:var(--sky)}

.contrast-box{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.9rem}
.contrast-col{background:var(--cream);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.8rem 1rem}
.contrast-col h5{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;font-weight:700}
.contrast-col ul{list-style:none;padding:0;margin:0}
.contrast-col li{font-size:.85rem;padding:.25rem 0;border-bottom:1px dotted var(--border);line-height:1.5;font-style:italic}
.contrast-col li:last-child{border-bottom:none}

.search-highlight{background:rgba(255,179,71,.4);border-radius:2px;padding:0 1px}

/* ── No results ── */
.no-results{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.95rem}

@media(max-width:680px){
  .topnav{padding:0 1rem}
  .hero{padding:1.4rem 1rem 1rem}
  .wrap{padding:0 1rem 3rem}
  .tabs-wrap{padding:.8rem 1rem .6rem}
  .tab{padding:6px 12px;font-size:.74rem}
  .error-grid{grid-template-columns:1fr}
  .contrast-box{grid-template-columns:1fr}
}

/* ── Print button ── */
.gg-print-btn{font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;padding:.45rem 1rem;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--ink);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.4rem}
.gg-print-btn:hover{border-color:var(--ink);background:var(--cream)}
.gg-print-btn svg{flex-shrink:0}
/* ── Print modal ── */
.gg-modal-overlay{display:none;position:fixed;inset:0;background:rgba(45,48,71,.4);z-index:300;align-items:center;justify-content:center}
.gg-modal{background:#fff;border-radius:16px;max-width:460px;width:92%;padding:1.8rem;box-shadow:0 20px 60px rgba(45,48,71,.25)}
.gg-modal-title{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:.3rem}
.gg-modal-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.2rem}
.gg-modal-opts{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
.gg-modal-opt{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--cream);transition:border-color .15s}
.gg-modal-opt:hover{border-color:var(--sky)}
.gg-modal-opt input{margin-top:3px;accent-color:var(--sky);cursor:pointer;flex-shrink:0}
.gg-modal-opt-text{font-size:.88rem;font-weight:600}
.gg-modal-opt-desc{font-size:.75rem;color:var(--muted)}
.gg-modal-footer{display:flex;justify-content:flex-end;gap:.6rem;padding-top:1rem;border-top:1px solid var(--border)}
.gg-modal-btn{font-family:'Outfit',sans-serif;font-weight:600;font-size:.85rem;padding:.55rem 1.2rem;border-radius:10px;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--ink);transition:all .15s}
.gg-modal-btn:hover{border-color:var(--ink)}
.gg-modal-btn-go{background:var(--sky);color:#fff;border-color:var(--sky)}
.gg-modal-btn-go:hover{background:#1a5fd4}
@media print{.topnav,.tabs-wrap,.search-wrap,.gg-print-btn,.topic-header .topic-chevron,body::before{display:none!important}
.topic-body{display:block!important;border-top:1px solid var(--border)}
.topic-card{page-break-inside:avoid;margin-bottom:1rem}
body{background:#fff}}
</style>
</head>

<script>
var TOPICS = [
  {id:"a1-present-simple",level:"a1",title:"Present Simple",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the present simple for facts, habits, routines, and general truths. Add <strong>-s/-es</strong> to the verb for third person singular (he/she/it).</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>I / you / we / they</td><td><code>work</code></td></tr><tr><td>he / she / it</td><td><code>works</code></td></tr><tr><td>Negative</td><td><code>don't / doesn't + infinitive</code></td></tr><tr><td>Question</td><td><code>Do / Does + subject + infinitive?</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>She works in a hospital.</li><li>I don't drink coffee.</li><li>Does he live near here? — Yes, he does.</li><li>Water boils at 100°C.</li><li>We usually eat dinner at seven.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">He work every day.</div><div class="error-item error-right">He works every day.</div><div class="error-item error-wrong">She don't like fish.</div><div class="error-item error-right">She doesn't like fish.</div><div class="error-item error-wrong">Does she works here?</div><div class="error-item error-right">Does she work here?</div></div><div class="note-box"><strong>Note:</strong> Time expressions: <strong>always, usually, often, sometimes, rarely, never, every day, on Mondays.</strong> Don't confuse with present continuous — present simple describes permanent situations or habits, not actions happening right now.</div>`},
  {id:"a1-present-continuous",level:"a1",title:"Present Continuous",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the present continuous for actions <strong>happening right now</strong>, temporary situations, or changing situations. Form: <code>be + verb-ing</code>.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>I</td><td><code>am working</code></td></tr><tr><td>he / she / it</td><td><code>is working</code></td></tr><tr><td>we / you / they</td><td><code>are working</code></td></tr><tr><td>Negative</td><td><code>isn't / aren't + verb-ing</code></td></tr><tr><td>Question</td><td><code>Is/Are + subject + verb-ing?</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>She's talking on the phone right now.</li><li>They're living in Madrid for a few months.</li><li>Are you listening? — Yes, I am.</li><li>The weather is getting warmer.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I am agree with you.</div><div class="error-item error-right">I agree with you. (no -ing with stative verbs)</div><div class="error-item error-wrong">She is having a car.</div><div class="error-item error-right">She has a car. (no -ing with stative verbs)</div><div class="error-item error-wrong">He working now.</div><div class="error-item error-right">He is working now.</div></div><div class="note-box"><strong>Note:</strong> <strong>Stative verbs</strong> don't use -ing: know, believe, understand, like, love, hate, want, need, seem, contain, own, have (possession). Say 'I understand', never 'I am understanding'.</div>`},
  {id:"a1-past-simple",level:"a1",title:"Past Simple",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the past simple for completed actions in the past. Regular verbs add <strong>-ed</strong>. Irregular verbs must be memorised.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Regular</td><td><code>worked, played, lived, stopped</code></td></tr><tr><td>Irregular</td><td><code>went, came, saw, bought, had, was/were</code></td></tr><tr><td>Negative</td><td><code>didn't + infinitive</code></td></tr><tr><td>Question</td><td><code>Did + subject + infinitive?</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>She visited Paris last summer.</li><li>I didn't sleep well last night.</li><li>Did you see the film? — Yes, I did.</li><li>He was tired so he went to bed early.</li><li>We bought some souvenirs.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She didn't went to school.</div><div class="error-item error-right">She didn't go to school.</div><div class="error-item error-wrong">Did he came yesterday?</div><div class="error-item error-right">Did he come yesterday?</div><div class="error-item error-wrong">I was go to the shops.</div><div class="error-item error-right">I went to the shops.</div></div><div class="note-box"><strong>Note:</strong> Spelling rules: double the final consonant for short vowel sounds (<em>stopped, planned</em>). Drop the -e before -ed (<em>liked, used</em>). Change -y to -ied after consonants (<em>studied, tried</em>).</div>`},
  {id:"a1-to-be",level:"a1",title:"To be \u2014 am / is / are",body:`<div class="section-label">Rule</div><div class="rule-box"><p>'To be' is the most important irregular verb. It's used to describe identity, nationality, occupation, location, age, and states.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>I</td><td><code>am</code> / <code>I'm</code></td></tr><tr><td>he / she / it</td><td><code>is</code> / <code>he's</code></td></tr><tr><td>we / you / they</td><td><code>are</code> / <code>we're</code></td></tr><tr><td>Negative</td><td><code>isn't / aren't / I'm not</code></td></tr><tr><td>Past</td><td><code>was / were</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I'm from Spain. She's a teacher.</li><li>They're very tired today.</li><li>Where is he from? — He's from Brazil.</li><li>We were at home yesterday.</li><li>Is she married? — No, she isn't.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">He is have a dog.</div><div class="error-item error-right">He has a dog.</div><div class="error-item error-wrong">I am 30 years.</div><div class="error-item error-right">I am 30 years old.</div><div class="error-item error-wrong">They was happy.</div><div class="error-item error-right">They were happy.</div></div><div class="note-box"><strong>Note:</strong> Don't confuse 'is' with 'has' — 'be' describes a state or quality; 'have' describes possession. 'She's cold' = she feels cold. 'She has a cold' = she is ill.</div>`},
  {id:"a1-articles",level:"a1",title:"Articles \u2014 a / an / the",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use <strong>a/an</strong> for singular countable nouns mentioned for the first time. Use <strong>the</strong> when the listener knows which one. Use <strong>no article</strong> with plural or uncountable nouns in general statements.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>a / an</td><td>First mention, or one of many: <em>I saw a dog.</em></td></tr><tr><td>the</td><td>Specific, known to listener: <em>The dog was black.</em></td></tr><tr><td>no article</td><td>General or uncountable: <em>Dogs are loyal. / I like music.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I bought a book. The book was really interesting.</li><li>Can you close the window? (= we know which one)</li><li>She plays the piano. (instrument)</li><li>I love coffee. (general) vs I loved the coffee you made. (specific)</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She is a teacher at the school near here. She is teacher.</div><div class="error-item error-right">She is a teacher.</div><div class="error-item error-wrong">I go to the bed at eleven.</div><div class="error-item error-right">I go to bed at eleven.</div><div class="error-item error-wrong">He bought new car.</div><div class="error-item error-right">He bought a new car.</div></div><div class="note-box"><strong>Note:</strong> Use <em>an</em> before vowel sounds: <em>an apple, an hour</em> (silent h), <em>an umbrella</em>. Use <em>a</em> before consonant sounds: <em>a university</em> (sounds like 'y').</div>`},
  {id:"a1-there-is",level:"a1",title:"There is / There are",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use <strong>there is</strong> with singular or uncountable nouns and <strong>there are</strong> with plural nouns to say something exists or is located somewhere.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Singular</td><td><code>There is / There's a...</code></td></tr><tr><td>Plural</td><td><code>There are some...</code></td></tr><tr><td>Negative</td><td><code>There isn't / There aren't any...</code></td></tr><tr><td>Question</td><td><code>Is there a...? / Are there any...?</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>There's a cinema near my house.</li><li>Are there any good restaurants here? — Yes, there are.</li><li>There isn't any milk in the fridge.</li><li>There were a lot of people at the party.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">It is a problem.</div><div class="error-item error-right">There is a problem.</div><div class="error-item error-wrong">There is many cars.</div><div class="error-item error-right">There are many cars.</div><div class="error-item error-wrong">Is there some bread?</div><div class="error-item error-right">Is there any bread?</div></div><div class="note-box"><strong>Note:</strong> Don't use 'it is' to describe existence — this is a very common error across all L1 backgrounds. 'There is a problem' vs 'It is a problem' have different meanings. The first introduces the problem; the second comments on something already known.</div>`},
  {id:"a1-imperatives",level:"a1",title:"Imperatives",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the imperative to give instructions, directions, orders, or advice. Use the base form of the verb. For negative imperatives, add <strong>don't</strong>.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Positive</td><td><code>Open the door. / Come here. / Be careful.</code></td></tr><tr><td>Negative</td><td><code>Don't run. / Don't be late.</code></td></tr><tr><td>Polite</td><td><code>Please sit down. / Do sit down.</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>Turn left at the traffic lights.</li><li>Don't touch that — it's hot!</li><li>Please wait outside.</li><li>Be quiet, everyone.</li><li>Have a seat.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">You open the window.</div><div class="error-item error-right">Open the window. (no subject needed)</div><div class="error-item error-wrong">Don't to run in the corridor.</div><div class="error-item error-right">Don't run in the corridor.</div></div><div class="note-box"><strong>Note:</strong> The subject 'you' is understood and not stated. Adding 'please' or 'do' (Do come in!) makes the imperative more polite. Imperatives are also used in recipes, instructions, and directions.</div>`},
  {id:"a1-possessives",level:"a1",title:"Possessive adjectives and 's",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use <strong>possessive adjectives</strong> (my, your, his, her, its, our, their) before a noun. Use <strong>'s</strong> after a name or noun to show belonging.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>I → my</td><td>This is <em>my</em> bag.</td></tr><tr><td>you → your</td><td>What's <em>your</em> name?</td></tr><tr><td>he → his</td><td><em>His</em> brother is tall.</td></tr><tr><td>she → her</td><td><em>Her</em> job is interesting.</td></tr><tr><td>we → our</td><td><em>Our</em> teacher is great.</td></tr><tr><td>they → their</td><td><em>Their</em> house is big.</td></tr><tr><td>noun + 's</td><td>Sophie's book. / The dog's tail.</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>This is my sister. Her name is Laura.</li><li>We missed our train.</li><li>John's car broke down yesterday.</li><li>The cat's food bowl is empty.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She lost her's keys.</div><div class="error-item error-right">She lost her keys. (no apostrophe)</div><div class="error-item error-wrong">Its a good idea.</div><div class="error-item error-right">It's a good idea. / Its colour is nice.</div><div class="error-item error-wrong">The book of John</div><div class="error-item error-right">John's book</div></div><div class="note-box"><strong>Note:</strong> Don't confuse <em>its</em> (possessive: <em>The dog ate its food</em>) with <em>it's</em> (contraction of 'it is': <em>It's cold today</em>). The apostrophe in <em>it's</em> means letters are missing, not possession.</div>`},
  {id:"a2-future",level:"a2",title:"Future \u2014 will and going to",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use <strong>will</strong> for predictions and spontaneous decisions. Use <strong>going to</strong> for plans and intentions already decided, or predictions based on current evidence.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>will — prediction/decision</td><td><code>I'll / She'll / They'll + infinitive</code></td></tr><tr><td>going to — plan/intention</td><td><code>am/is/are going to + infinitive</code></td></tr><tr><td>going to — evidence-based prediction</td><td>Look at those clouds — it's going to rain.</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I'll have the pasta, please. (spontaneous decision)</li><li>We're going to visit Italy in August. (plan)</li><li>She's going to have a baby. (evidence)</li><li>I think it'll be cold tomorrow. (prediction)</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I will to go out tonight.</div><div class="error-item error-right">I'm going to go out tonight. / I'll go out tonight.</div><div class="error-item error-wrong">Look — she going to fall!</div><div class="error-item error-right">Look — she's going to fall!</div><div class="error-item error-wrong">Will you going to the party?</div><div class="error-item error-right">Are you going to the party?</div></div><div class="note-box"><strong>Note:</strong> Present continuous is also used for fixed future arrangements: <em>I'm meeting her on Friday</em> — something already arranged. This is different from going to (intention) and will (prediction).</div>`},
  {id:"a2-past-continuous",level:"a2",title:"Past Continuous",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the past continuous for actions <strong>in progress at a specific time</strong> in the past, or for background actions interrupted by a main event.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>I / he / she / it</td><td><code>was + verb-ing</code></td></tr><tr><td>we / you / they</td><td><code>were + verb-ing</code></td></tr><tr><td>Interrupted action</td><td><code>was/were -ing</code> + when + <code>past simple</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I was watching TV when she called.</li><li>At eight o'clock yesterday, we were having dinner.</li><li>While he was cooking, the phone rang.</li><li>They were laughing and talking — it was a good evening.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I was watch TV.</div><div class="error-item error-right">I was watching TV.</div><div class="error-item error-wrong">When I arrived, she cooked dinner.</div><div class="error-item error-right">When I arrived, she was cooking dinner. (background action)</div><div class="error-item error-wrong">I was play tennis at 3pm.</div><div class="error-item error-right">I was playing tennis at 3pm.</div></div><div class="note-box"><strong>Note:</strong> Use 'when' + past simple for the interrupting action. Use 'while' + past continuous for simultaneous actions. Both express the same idea — the choice is often stylistic.</div>`},
  {id:"a2-comparatives",level:"a2",title:"Comparatives and Superlatives",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use <strong>comparatives</strong> to compare two things and <strong>superlatives</strong> for the most extreme in a group.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Short adjectives</td><td><code>-er / -est</code>: fast → faster → the fastest</td></tr><tr><td>Long adjectives</td><td><code>more/most + adj</code>: expensive → more expensive → the most expensive</td></tr><tr><td>Irregular</td><td>good → better → the best / bad → worse → the worst / far → further → the furthest</td></tr><tr><td>Comparing</td><td><code>adj + -er + than</code> / <code>as + adj + as</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>She's taller than her brother.</li><li>This is the most expensive restaurant in the city.</li><li>My new phone is better than the old one.</li><li>He's not as tall as his father.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She is more tall than me.</div><div class="error-item error-right">She is taller than me.</div><div class="error-item error-wrong">This is the most good option.</div><div class="error-item error-right">This is the best option.</div><div class="error-item error-wrong">He runs faster as me.</div><div class="error-item error-right">He runs faster than me.</div></div><div class="note-box"><strong>Note:</strong> Double the final consonant for short adjectives ending in vowel + consonant: <em>big → bigger</em>. Adjectives ending in -y: <em>happy → happier → happiest</em>. Note: 'as … as' for equal comparisons: <em>He's as tall as me.</em></div>`},
  {id:"a2-modals",level:"a2",title:"Modal verbs \u2014 can, could, should, must",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Modal verbs express ability, permission, advice, and obligation. They are followed by the <strong>bare infinitive</strong> and don't add -s in third person.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>can</td><td>ability / permission: <em>I can swim. Can I leave?</em></td></tr><tr><td>could</td><td>past ability / polite request: <em>I could play piano as a child. Could you help me?</em></td></tr><tr><td>should</td><td>advice / recommendation: <em>You should see a doctor.</em></td></tr><tr><td>must</td><td>strong obligation (speaker's feeling): <em>I must call her.</em></td></tr><tr><td>have to</td><td>external obligation: <em>I have to wear a uniform at work.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>She can speak four languages.</li><li>You should eat more vegetables.</li><li>I must remember to call him — it's urgent.</li><li>You mustn't park here. (prohibition)</li><li>Could you pass the salt, please?</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She can to swim.</div><div class="error-item error-right">She can swim.</div><div class="error-item error-wrong">He should to study more.</div><div class="error-item error-right">He should study more.</div><div class="error-item error-wrong">You must to leave now.</div><div class="error-item error-right">You must leave now.</div></div><div class="note-box"><strong>Note:</strong> Must vs have to: <em>must</em> comes from the speaker's own sense of obligation; <em>have to</em> is imposed by external rules. Mustn't = prohibition. Don't have to = no obligation (not the same as mustn't).</div>`},
  {id:"a2-prepositions-time",level:"a2",title:"Prepositions of time \u2014 in, on, at",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use <strong>at</strong> for precise times, <strong>on</strong> for days and dates, and <strong>in</strong> for longer periods.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>at</td><td>Times, holidays: <em>at 8 o'clock, at Christmas, at night, at the weekend</em></td></tr><tr><td>on</td><td>Days, dates: <em>on Monday, on 15th March, on my birthday</em></td></tr><tr><td>in</td><td>Months, years, seasons, periods: <em>in June, in 2020, in winter, in the morning</em></td></tr><tr><td>no preposition</td><td>last/next/this/every: <em>last week, next Monday, this morning</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I start work at nine.</li><li>We met on a Tuesday in October.</li><li>She was born in 1995.</li><li>See you next Friday — no preposition needed.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I'll see you in Monday.</div><div class="error-item error-right">I'll see you on Monday.</div><div class="error-item error-wrong">She arrived at the morning.</div><div class="error-item error-right">She arrived in the morning.</div><div class="error-item error-wrong">We met on 2019.</div><div class="error-item error-right">We met in 2019.</div></div><div class="note-box"><strong>Note:</strong> British English: <em>at the weekend</em>. American English: <em>on the weekend</em>. Both are acceptable. No preposition with 'last', 'next', 'this', 'every': <em>I went last Saturday</em>.</div>`},
  {id:"a2-countable-uncountable",level:"a2",title:"Countable and Uncountable Nouns",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Countable nouns can be counted and have a plural form. Uncountable nouns cannot be counted directly — use <strong>some, any, much, a little</strong>, or measurement expressions.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Countable</td><td>a book / books / some books / how many?</td></tr><tr><td>Uncountable</td><td>water / some water / how much? / a glass of water</td></tr><tr><td>some/any</td><td>some = positive; any = negative and question</td></tr><tr><td>much/many</td><td>much + uncountable; many + countable</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I need some advice. (not 'an advice')</li><li>Have you got any money? — Yes, I've got some.</li><li>There isn't much time left.</li><li>I don't have many friends here yet.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She gave me a good advice.</div><div class="error-item error-right">She gave me some good advice.</div><div class="error-item error-wrong">I have too many luggages.</div><div class="error-item error-right">I have too much luggage.</div><div class="error-item error-wrong">How much books do you have?</div><div class="error-item error-right">How many books do you have?</div></div><div class="note-box"><strong>Note:</strong> Common uncountable nouns learners often treat as countable: <em>advice, information, news, furniture, luggage, research, progress, money, music, weather, knowledge, equipment, food, traffic</em>. A useful expression for countables: <em>a piece of advice, a bit of news</em>.</div>`},
  {id:"a2-present-perfect-intro",level:"a2",title:"Present Perfect \u2014 introduction",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the present perfect to connect the past with the present — an action that happened at an unspecified time before now, or a past action with a present result.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Positive</td><td><code>have/has + past participle</code></td></tr><tr><td>Negative</td><td><code>haven't/hasn't + past participle</code></td></tr><tr><td>Question</td><td><code>Have/Has + subject + past participle?</code></td></tr><tr><td>Key words</td><td>ever, never, already, yet, just, before</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>Have you ever been to Japan?</li><li>I've already finished my homework.</li><li>She hasn't called yet.</li><li>He's just arrived — he's at the door now.</li><li>I've lost my keys. (result: I can't get in)</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I have seen him yesterday.</div><div class="error-item error-right">I saw him yesterday. (specific time → past simple)</div><div class="error-item error-wrong">Did you ever eat sushi?</div><div class="error-item error-right">Have you ever eaten sushi?</div><div class="error-item error-wrong">She has went to the shops.</div><div class="error-item error-right">She has gone to the shops.</div></div><div class="note-box"><strong>Note:</strong> When there's a specific time expression (yesterday, last week, in 2010), use past simple. Present perfect = no specific time or the time is unimportant. The most common error is using present perfect with a specific past time.</div>`},
  {id:"a2-questions",level:"a2",title:"Question formation",body:`<div class="section-label">Rule</div><div class="rule-box"><p>In most questions, <strong>invert the subject and auxiliary verb</strong>. When there is no auxiliary, use <strong>do/does/did</strong>. Wh- questions use a question word before the auxiliary.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Yes/no questions</td><td><code>Are you ready? / Did she leave? / Can he swim?</code></td></tr><tr><td>Wh- questions</td><td><code>Where do you live? / What did he say?</code></td></tr><tr><td>Subject questions</td><td><code>Who called? / What happened?</code> (no inversion)</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>Where does she work? — She works in a bank.</li><li>Did you enjoy the film? — Yes, I did.</li><li>What time does the train leave?</li><li>Who told you that? (subject question — no do/does)</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">Where she works?</div><div class="error-item error-right">Where does she work?</div><div class="error-item error-wrong">What you did yesterday?</div><div class="error-item error-right">What did you do yesterday?</div><div class="error-item error-wrong">Why he didn't come?</div><div class="error-item error-right">Why didn't he come?</div></div><div class="note-box"><strong>Note:</strong> Subject questions: when 'who' or 'what' is the subject, no auxiliary is needed: <em>Who wrote this?</em> (not 'Who did write?'). Compare: <em>What did you see?</em> (object) vs <em>What happened?</em> (subject).</div>`},
  {id:"b1-present-perfect-cont",level:"b1",title:"Present Perfect Continuous",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the present perfect continuous to describe an action that <strong>started in the past and is still continuing now</strong>, or a recent action with a visible present result. Emphasises duration.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Positive</td><td><code>have/has + been + verb-ing</code></td></tr><tr><td>Negative</td><td><code>haven't/hasn't been + verb-ing</code></td></tr><tr><td>With since/for</td><td>since = point in time; for = duration</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I've been learning Spanish for three years.</li><li>She's been waiting since ten o'clock.</li><li>You look tired — have you been working all night?</li><li>He's been running — look how red his face is!</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I have been knowing her for years.</div><div class="error-item error-right">I have known her for years. (stative verb — no continuous)</div><div class="error-item error-wrong">She has been working here since five years.</div><div class="error-item error-right">She has been working here for five years.</div><div class="error-item error-wrong">I've been read this book.</div><div class="error-item error-right">I've been reading this book.</div></div><div class="note-box"><strong>Note:</strong> Present perfect simple vs continuous: <em>I've written three emails</em> (completed, number matters) vs <em>I've been writing emails all morning</em> (focus on duration, not completion). Stative verbs (know, believe, own, like) don't use the continuous.</div>`},
  {id:"b1-narrative-tenses",level:"b1",title:"Narrative Tenses",body:`<div class="section-label">Rule</div><div class="rule-box"><p>When telling a story in the past, use three tenses together: <strong>past simple</strong> for main events, <strong>past continuous</strong> for background/interrupted actions, and <strong>past perfect</strong> for events that happened before the main story.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Past simple</td><td>main events in sequence: <em>She arrived, opened the door, and walked in.</em></td></tr><tr><td>Past continuous</td><td>background / interrupted: <em>It was raining. She was waiting when he arrived.</em></td></tr><tr><td>Past perfect</td><td>earlier backstory: <em>She had forgotten her keys at home.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I was walking home when I suddenly noticed that I had left my bag at the café.</li><li>The film had already started when we got to the cinema.</li><li>She was exhausted because she had been working all day.</li><li>While he was cooking, the smoke alarm went off.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">When I arrived, she already left.</div><div class="error-item error-right">When I arrived, she had already left.</div><div class="error-item error-wrong">I was going to the shop and I see my neighbour.</div><div class="error-item error-right">I was going to the shop when I saw my neighbour.</div><div class="error-item error-wrong">The party started before we arrived.</div><div class="error-item error-right">The party had started before we arrived.</div></div><div class="note-box"><strong>Note:</strong> The past perfect 'had done' is essential for showing that one past event happened before another. Without it, the sequence becomes ambiguous. You don't need it for every sentence — use it when the sequence matters.</div>`},
  {id:"b1-zero-first-conditional",level:"b1",title:"Zero and First Conditionals",body:`<div class="section-label">Rule</div><div class="rule-box"><p>The <strong>zero conditional</strong> describes facts and general truths. The <strong>first conditional</strong> describes real or likely future situations.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Zero conditional</td><td><code>If + present simple, present simple</code>: <em>If you heat water, it boils.</em></td></tr><tr><td>First conditional</td><td><code>If + present simple, will + infinitive</code>: <em>If it rains, I'll stay home.</em></td></tr><tr><td>With unless</td><td><code>Unless</code> = if not: <em>Unless you hurry, you'll be late.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>If you press this button, the machine stops. (zero)</li><li>If she passes the exam, she'll celebrate. (first)</li><li>I won't go unless you come with me.</li><li>If he calls, tell him I'm busy.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">If it will rain, I'll stay home.</div><div class="error-item error-right">If it rains, I'll stay home. (no will in if-clause)</div><div class="error-item error-wrong">If I will see her, I tell you.</div><div class="error-item error-right">If I see her, I'll tell you.</div><div class="error-item error-wrong">Unless you don't call me, I'll be worried.</div><div class="error-item error-right">Unless you call me, I'll be worried.</div></div><div class="note-box"><strong>Note:</strong> Never use 'will' in the if-clause of conditional sentences (unless it means 'willingness': <em>If you will wait a moment…</em>). 'Unless' is 'if not' but be careful: <em>Unless you study</em> = <em>If you don't study</em>.</div>`},
  {id:"b1-second-conditional",level:"b1",title:"Second Conditional",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the second conditional for <strong>hypothetical or unlikely present/future situations</strong> — imagining how things would be if they were different.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Structure</td><td><code>If + past simple, would + infinitive</code></td></tr><tr><td>With were</td><td><em>If I were you</em> (formal) / <em>If I was you</em> (informal)</td></tr><tr><td>Negative</td><td><em>If she didn't have to work, she'd travel more.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>If I had more money, I'd buy a bigger house.</li><li>What would you do if you lost your job?</li><li>If I were you, I wouldn't say that.</li><li>She'd be happier if she had more free time.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">If I would have more time, I'd exercise more.</div><div class="error-item error-right">If I had more time, I'd exercise more.</div><div class="error-item error-wrong">If I am rich, I will travel everywhere.</div><div class="error-item error-right">If I were rich, I would travel everywhere.</div><div class="error-item error-wrong">What would you do if you will lose your job?</div><div class="error-item error-right">What would you do if you lost your job?</div></div><div class="note-box"><strong>Note:</strong> The difference between first and second conditional is about how likely the situation is: <em>If I win the lottery, I'll buy a house</em> (realistic possibility) vs <em>If I won the lottery, I'd buy a house</em> (imaginary, unlikely). Both are grammatically correct — it's about your attitude.</div>`},
  {id:"b1-reported-speech",level:"b1",title:"Reported Speech",body:`<div class="section-label">Rule</div><div class="rule-box"><p>When reporting what someone said, <strong>shift tenses back</strong> (backshift) and change time expressions and pronouns. Use a reporting verb (said, told, asked, explained).</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Present simple → past simple</td><td>'I work here.' → She said she worked there.</td></tr><tr><td>Present continuous → past continuous</td><td>'I'm waiting.' → He said he was waiting.</td></tr><tr><td>Will → would</td><td>'I'll call.' → She said she would call.</td></tr><tr><td>Can → could</td><td>'I can help.' → He said he could help.</td></tr><tr><td>told + object</td><td>She told me (that) she was busy. (NOT 'told that')</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>'I'm tired.' → She said she was tired.</li><li>'I'll be late.' → He told me he would be late.</li><li>'I can't come.' → She said she couldn't come.</li><li>'Are you ready?' → He asked if I was ready.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She told that she was busy.</div><div class="error-item error-right">She said (that) she was busy. / She told me she was busy.</div><div class="error-item error-wrong">He said me to wait.</div><div class="error-item error-right">He told me to wait.</div><div class="error-item error-wrong">She said she will call later.</div><div class="error-item error-right">She said she would call later.</div></div><div class="note-box"><strong>Note:</strong> Reporting verbs with infinitive (say, tell, warn, advise, ask): <em>He told me to wait.</em> Reporting questions: use 'if' or 'whether' for yes/no questions; use the question word for wh-questions. Don't use question word order: <em>She asked where I lived</em> (not 'where did I live').</div>`},
  {id:"b1-used-to",level:"b1",title:"Used to / Would \u2014 past habits",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use <strong>used to</strong> for past habits and past states that are now finished. Use <strong>would</strong> only for past habits (not states).</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>used to + infinitive</td><td>past habits and states: <em>I used to live in London.</em></td></tr><tr><td>would + infinitive</td><td>repeated past actions only: <em>Every summer, we would go to the beach.</em></td></tr><tr><td>Negative</td><td><em>I didn't use to like vegetables.</em></td></tr><tr><td>Question</td><td><em>Did you use to play football?</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I used to smoke, but I quit two years ago.</li><li>She used to be shy — she's very confident now.</li><li>When I was young, I would cycle to school every day.</li><li>Did you use to live near here?</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I use to go to the gym.</div><div class="error-item error-right">I used to go to the gym.</div><div class="error-item error-wrong">I am used to wake up early.</div><div class="error-item error-right">I am used to waking up early. (different meaning — habitual now)</div><div class="error-item error-wrong">I would know him well.</div><div class="error-item error-right">I used to know him well. (not 'would' for states)</div></div><div class="note-box"><strong>Note:</strong> <em>Used to + infinitive</em> = past habit (gone now). <em>Be/get used to + -ing</em> = being accustomed to something (present habit or adjustment). Don't confuse: <em>I used to cycle to work</em> (past habit) vs <em>I am used to cycling to work</em> (it's normal now).</div>`},
  {id:"b1-gerunds-infinitives",level:"b1",title:"Gerunds and Infinitives",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Some verbs are followed by the <strong>-ing form (gerund)</strong>, others by the <strong>to + infinitive</strong>. Some can take both with different meanings.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Verb + -ing</td><td>enjoy, avoid, finish, mind, suggest, consider, miss, practise, keep, deny</td></tr><tr><td>Verb + to infinitive</td><td>want, decide, hope, agree, plan, refuse, need, seem, manage, expect</td></tr><tr><td>Verb + both (same meaning)</td><td>like, love, hate, prefer, begin, start, continue</td></tr><tr><td>Verb + both (different meaning)</td><td>stop, remember, try, forget, mean, regret</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I enjoy reading, but I avoid watching the news.</li><li>She decided to leave early.</li><li>He stopped smoking. (gave up the habit)</li><li>He stopped to smoke. (stopped another action to have a cigarette)</li><li>I remember meeting her at a conference.</li><li>Remember to lock the door. (don't forget to do it)</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I enjoy to read.</div><div class="error-item error-right">I enjoy reading.</div><div class="error-item error-wrong">She suggested to go.</div><div class="error-item error-right">She suggested going.</div><div class="error-item error-wrong">He managed finishing on time.</div><div class="error-item error-right">He managed to finish on time.</div></div><div class="note-box"><strong>Note:</strong> The meaning-change pairs (stop, remember, try, forget, regret) are the most important for Cambridge exams. <em>Try -ing</em> = experiment with something; <em>Try to + infinitive</em> = attempt something difficult. <em>Regret doing</em> = sorry about something past; <em>Regret to tell</em> = sorry about saying something now.</div>`},
  {id:"b1-passive-intro",level:"b1",title:"Passive Voice",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the passive when the <strong>action is more important than who did it</strong>, or when the agent is unknown or obvious. Form: <code>be + past participle</code>.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Present simple passive</td><td>Coffee is grown in Brazil.</td></tr><tr><td>Past simple passive</td><td>The letter was written by Shakespeare.</td></tr><tr><td>Present perfect passive</td><td>The road has been repaired.</td></tr><tr><td>Modal passive</td><td>The work must be finished by Friday.</td></tr><tr><td>By + agent</td><td>Use 'by' only when the agent is important: <em>It was designed by Gaudí.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>English is spoken in over 60 countries.</li><li>The building was built in 1920.</li><li>The car has been stolen.</li><li>The essay must be submitted by noon.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">The book was wrote by Tolkien.</div><div class="error-item error-right">The book was written by Tolkien.</div><div class="error-item error-wrong">The cake made by my mum.</div><div class="error-item error-right">The cake was made by my mum.</div><div class="error-item error-wrong">It was build in 1900.</div><div class="error-item error-right">It was built in 1900.</div></div><div class="note-box"><strong>Note:</strong> 80% of English passives don't include an agent. Only add 'by + agent' when it adds important information. Avoid overusing the passive — it can make writing sound unnatural in informal contexts.</div>`},
  {id:"b2-present-perfect-advanced",level:"b2",title:"Present Perfect \u2014 advanced use",body:`<div class="section-label">Rule</div><div class="rule-box"><p>At B2 level, the present perfect is used not just for experience, but for <strong>recent news</strong>, <strong>personal record</strong>, <strong>changes over time</strong>, and <strong>incomplete time periods</strong>.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Recent news</td><td>Scientists have discovered a new planet.</td></tr><tr><td>Change over time</td><td>Life has become much more expensive.</td></tr><tr><td>Incomplete period</td><td>I've had three coffees today. (today isn't finished)</td></tr><tr><td>With superlatives</td><td>It's the best film I've ever seen.</td></tr><tr><td>With first/second time</td><td>This is the first time I've tried sushi.</td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>The government has announced new measures.</li><li>Technology has transformed the way we communicate.</li><li>This is the third time he's been late this week.</li><li>Have you heard? They've broken up.</li><li>It's the most expensive hotel I've ever stayed in.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">This is the best film I ever saw.</div><div class="error-item error-right">This is the best film I've ever seen.</div><div class="error-item error-wrong">I've seen him yesterday.</div><div class="error-item error-right">I saw him yesterday.</div><div class="error-item error-wrong">It's the first time I see this.</div><div class="error-item error-right">It's the first time I've seen this.</div></div><div class="note-box"><strong>Note:</strong> After 'this is the first/second/only time...' always use the present perfect: <em>This is the first time I've tried this.</em> After superlatives ('the best, the worst, the most'), use present perfect: <em>the most beautiful place I've ever visited.</em></div>`},
  {id:"b2-third-conditional",level:"b2",title:"Third Conditional",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the third conditional to talk about <strong>imaginary situations in the past</strong> — things that didn't happen and their hypothetical results.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Structure</td><td><code>If + past perfect, would have + past participle</code></td></tr><tr><td>Short form</td><td><code>If I'd known, I would've told you.</code></td></tr><tr><td>Other modals</td><td>could have, might have: <em>If you'd asked, I might have helped.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>If she had studied harder, she would have passed.</li><li>We wouldn't have been late if we'd taken a taxi.</li><li>If he had apologised, she might have forgiven him.</li><li>What would you have done if you hadn't got the job?</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">If I would have known, I'd have helped.</div><div class="error-item error-right">If I had known, I would have helped.</div><div class="error-item error-wrong">If she studied harder, she would have passed.</div><div class="error-item error-right">If she had studied harder, she would have passed.</div><div class="error-item error-wrong">If I had more money yesterday, I would buy it.</div><div class="error-item error-right">If I had had more money, I would have bought it.</div></div><div class="note-box"><strong>Note:</strong> Both clauses refer to the past: the if-clause uses past perfect, the main clause uses would/could/might have. A common error is using 'would have' in both clauses. The third conditional expresses regret, criticism, or speculation about the past.</div>`},
  {id:"b2-mixed-conditionals",level:"b2",title:"Mixed Conditionals",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Mixed conditionals combine a <strong>past hypothetical</strong> condition with a <strong>present result</strong> (or vice versa), crossing the time reference of both clauses.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Past condition → present result</td><td><code>If + past perfect, would + infinitive</code></td></tr><tr><td>Present condition → past result</td><td><code>If + past simple, would have + past participle</code></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>If I had studied medicine, I would be a doctor now. (past decision → present state)</li><li>If I weren't so shy, I would have spoken to her. (present character → past result)</li><li>If he had worked harder at school, he wouldn't be struggling now.</li><li>If you were more organised, you would have finished by now.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">If I studied medicine, I would have been a doctor.</div><div class="error-item error-right">If I had studied medicine, I would be a doctor now.</div><div class="error-item error-wrong">If I had more confidence, I would have spoken to her.</div><div class="error-item error-right">If I were more confident, I would have spoken to her.</div></div><div class="note-box"><strong>Note:</strong> The key to mixed conditionals is identifying which time period each clause belongs to. The if-clause and main clause can refer to different times — this is what makes them 'mixed'. They're used to show how a past cause has a present consequence, or a present state has a past consequence.</div>`},
  {id:"b2-wish-regret",level:"b2",title:"Wish, if only and regret",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use <strong>wish / if only</strong> to express wishes about present or past situations that cannot easily be changed.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Wish + past simple</td><td>present wish: <em>I wish I had more time.</em></td></tr><tr><td>Wish + past perfect</td><td>past regret: <em>I wish I had studied harder.</em></td></tr><tr><td>Wish + would</td><td>wish for change in someone's behaviour: <em>I wish you would listen.</em></td></tr><tr><td>If only</td><td>same as wish, but stronger emotion: <em>If only I'd taken that job!</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I wish I could play the guitar.</li><li>I wish I hadn't said that — it was unkind.</li><li>I wish he would stop interrupting.</li><li>If only I'd saved more money when I was young.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I wish I can speak better English.</div><div class="error-item error-right">I wish I could speak better English.</div><div class="error-item error-wrong">I wish I would have more time.</div><div class="error-item error-right">I wish I had more time. (present wish — not 'would')</div><div class="error-item error-wrong">I wish I didn't say that.</div><div class="error-item error-right">I wish I hadn't said that. (past regret → past perfect)</div></div><div class="note-box"><strong>Note:</strong> <em>I wish + past simple</em> is for present wishes (things you want to change now). <em>I wish + past perfect</em> is for past regrets (things that can't be changed). <em>I wish + would</em> is for expressing frustration about habits or lack of change. Don't use 'wish I would' for yourself.</div>`},
  {id:"b2-relative-clauses",level:"b2",title:"Relative Clauses",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Relative clauses add information about a noun. <strong>Defining</strong> clauses identify which one; <strong>non-defining</strong> clauses add extra information about something already identified.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>who</td><td>people: <em>the woman who called</em></td></tr><tr><td>which</td><td>things: <em>the car which broke down</em></td></tr><tr><td>that</td><td>people/things in defining clauses: <em>the book that I read</em></td></tr><tr><td>whose</td><td>possession: <em>the colleague whose idea won</em></td></tr><tr><td>where</td><td>places: <em>the city where I grew up</em></td></tr><tr><td>when</td><td>times: <em>the year when it all changed</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>The woman who lives next door is a doctor.</li><li>That's the company where I used to work.</li><li>My sister, who lives in Rome, is visiting next week. (non-defining — commas)</li><li>The report, which took three months to write, was excellent.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">The man which called is my boss.</div><div class="error-item error-right">The man who called is my boss.</div><div class="error-item error-wrong">The city where I was born it has changed.</div><div class="error-item error-right">The city where I was born has changed. (no extra 'it')</div><div class="error-item error-wrong">My brother, that lives in London, is a lawyer.</div><div class="error-item error-right">My brother, who lives in London, is a lawyer. ('that' not used in non-defining)</div></div><div class="note-box"><strong>Note:</strong> Non-defining relative clauses are separated by commas and add non-essential information. They can't use 'that'. Defining clauses don't use commas and identify which one. Compare: <em>The teacher who teaches maths</em> (defines which teacher) vs <em>My teacher, who teaches maths</em> (adds info about an already-identified person).</div>`},
  {id:"b2-modal-deduction",level:"b2",title:"Modal verbs \u2014 deduction and speculation",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use modals to make deductions about <strong>present</strong> or <strong>past</strong> situations based on available evidence.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>must (present)</td><td>certain positive: <em>She must be tired — she's been up all night.</em></td></tr><tr><td>can't/couldn't (present)</td><td>certain negative: <em>That can't be right.</em></td></tr><tr><td>might/could/may (present)</td><td>possible: <em>He might be at work.</em></td></tr><tr><td>must have (past)</td><td>certain positive: <em>She must have left already.</em></td></tr><tr><td>can't have (past)</td><td>certain negative: <em>He can't have forgotten.</em></td></tr><tr><td>might/could have (past)</td><td>possible: <em>She might have taken the wrong bus.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>You must be exhausted after that long flight.</li><li>That can't be true — I don't believe it.</li><li>He might have missed the train.</li><li>The lights are on — she must have come home already.</li><li>She could have taken a different route.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She must have went home.</div><div class="error-item error-right">She must have gone home.</div><div class="error-item error-wrong">He can't have eat all that food.</div><div class="error-item error-right">He can't have eaten all that food.</div><div class="error-item error-wrong">It must be raining yesterday.</div><div class="error-item error-right">It must have been raining yesterday.</div></div><div class="note-box"><strong>Note:</strong> The certainty scale: <em>must/can't</em> (very certain) → <em>should</em> (fairly certain) → <em>might/may/could</em> (possible) → <em>can't</em> (impossible). In past deductions, always use <em>modal + have + past participle</em>.</div>`},
  {id:"b2-causative",level:"b2",title:"Causative \u2014 have/get something done",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Use the causative to describe a service done <strong>for you by someone else</strong>. The emphasis is on the result, not on who performs the action.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>have something done</td><td><code>have + object + past participle</code>: <em>I had my car repaired.</em></td></tr><tr><td>get something done</td><td><code>get + object + past participle</code> (slightly informal): <em>I got my hair cut.</em></td></tr><tr><td>have someone do</td><td><code>have + person + infinitive</code>: <em>I had the plumber fix the pipe.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I'm going to have my flat painted next week.</li><li>She gets her nails done every month.</li><li>They had their roof repaired after the storm.</li><li>Can you get the document translated by tomorrow?</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I had my car to repair.</div><div class="error-item error-right">I had my car repaired.</div><div class="error-item error-wrong">She cut her hair.</div><div class="error-item error-right">She had her hair cut. (if done by a hairdresser)</div><div class="error-item error-wrong">I got repaired my bike.</div><div class="error-item error-right">I got my bike repaired.</div></div><div class="note-box"><strong>Note:</strong> Distinguish between <em>She cut her hair</em> (she did it herself) and <em>She had her hair cut</em> (a hairdresser did it). The word order is strict: <em>have/get + object + past participle</em>.</div>`},
  {id:"c1-inversion",level:"c1",title:"Inversion for emphasis",body:`<div class="section-label">Rule</div><div class="rule-box"><p>In formal or emphatic English, <strong>invert the subject and auxiliary</strong> after negative or restrictive adverbials placed at the start of a sentence.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Never/Rarely/Seldom</td><td><em>Never have I seen such dedication.</em></td></tr><tr><td>Not only … but also</td><td><em>Not only did she win, but she also broke the record.</em></td></tr><tr><td>Only when/after/by</td><td><em>Only when I left did I realise what I'd lost.</em></td></tr><tr><td>Hardly/Scarcely/No sooner</td><td><em>Hardly had I sat down when the phone rang.</em></td></tr><tr><td>Under no circumstances</td><td><em>Under no circumstances should you sign without reading it.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>Never before had the team played so well.</li><li>Rarely does she complain, but this time she was furious.</li><li>Not only is the food excellent, but the service is outstanding too.</li><li>Only by working together can we solve this.</li><li>Scarcely had she closed the door when the alarm went off.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">Never I have seen this before.</div><div class="error-item error-right">Never have I seen this before.</div><div class="error-item error-wrong">Not only she is smart, but she's kind too.</div><div class="error-item error-right">Not only is she smart, but she's also kind.</div><div class="error-item error-wrong">Rarely I go to the cinema.</div><div class="error-item error-right">Rarely do I go to the cinema.</div></div><div class="note-box"><strong>Note:</strong> Inversion is a formal register feature — most natural in academic writing, speeches, and formal reports. It is used for emphasis and stylistic effect. Start with the most accessible forms: <em>Never have I…</em> and <em>Not only… but also…</em></div>`},
  {id:"c1-emphasis-cleft",level:"c1",title:"Cleft sentences and emphasis",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Cleft sentences divide a simple sentence into two clauses to <strong>emphasise one element</strong>. There are two main types: <strong>it-clefts</strong> and <strong>wh-clefts (pseudo-clefts)</strong>.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>It-cleft</td><td><code>It was + emphasis + that/who + rest</code>: <em>It was John who told me.</em></td></tr><tr><td>Wh-cleft</td><td><code>What + clause + is/was + emphasis</code>: <em>What I need is a break.</em></td></tr><tr><td>All-cleft</td><td><em>All I want is a quiet evening.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>It was the lack of communication that caused the problem.</li><li>What surprised me most was her reaction.</li><li>It was in Paris that they first met.</li><li>What the team needs is stronger leadership.</li><li>All she asked for was a little patience.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">It was John who he told me.</div><div class="error-item error-right">It was John who told me. (no extra pronoun)</div><div class="error-item error-wrong">What I want it is more time.</div><div class="error-item error-right">What I want is more time. (no extra 'it')</div></div><div class="note-box"><strong>Note:</strong> Cleft sentences are a powerful tool for emphasis and precision in both writing and speech. They're particularly useful in discursive essays when you want to highlight a specific cause or point. The structure <em>It is X that/who…</em> is the most common and versatile.</div>`},
  {id:"c1-subjunctive",level:"c1",title:"The subjunctive",body:`<div class="section-label">Rule</div><div class="rule-box"><p>The subjunctive uses the <strong>base form of the verb</strong> (without -s, -ed, or auxiliaries). It appears in formal recommendations, suggestions, and after certain expressions.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Recommend/suggest/insist/demand that</td><td><em>The committee recommends that he resign.</em></td></tr><tr><td>It is essential/vital/important that</td><td><em>It is vital that she be informed.</em></td></tr><tr><td>Were (hypothetical)</td><td><em>If she were to leave, we'd be in trouble.</em></td></tr><tr><td>As if/as though + were</td><td><em>He talks as if he were the boss.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I suggest that everyone attend the meeting.</li><li>It is essential that the contract be signed today.</li><li>She insists that he tell the truth.</li><li>If I were to resign, who would do my job?</li><li>He behaves as though he were above the law.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I suggest that he resigns immediately.</div><div class="error-item error-right">I suggest that he resign immediately.</div><div class="error-item error-wrong">It is vital that she is informed.</div><div class="error-item error-right">It is vital that she be informed. (formal)</div><div class="error-item error-wrong">He acts as if he is in charge.</div><div class="error-item error-right">He acts as if he were in charge. (hypothetical)</div></div><div class="note-box"><strong>Note:</strong> The subjunctive is more common in American English than British English. In informal British English, <em>should + infinitive</em> is often used instead: <em>I suggest that he should resign.</em> However, the base form subjunctive is increasingly seen in formal British writing and is expected at C1+ level.</div>`},
  {id:"c1-emphasis-do",level:"c1",title:"Emphasis with do/does/did",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Add <strong>do, does, or did</strong> to an affirmative verb for emphasis, contrast, or to insist on the truth of something.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Present simple</td><td><em>I do like her — I just find her tiring.</em></td></tr><tr><td>Past simple</td><td><em>I did send the email — check your spam.</em></td></tr><tr><td>Imperative</td><td><em>Do come in. Do sit down. (polite emphasis)</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I do understand your concerns, but I can't agree.</li><li>She did call — I heard the phone ring.</li><li>Do be careful — it's icy outside.</li><li>He does work hard, but he lacks focus.</li><li>I did warn you about this.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I do thinking this is wrong.</div><div class="error-item error-right">I do think this is wrong. (bare infinitive, not -ing)</div><div class="error-item error-wrong">She does works very hard.</div><div class="error-item error-right">She does work very hard. (bare infinitive, no -s)</div></div><div class="note-box"><strong>Note:</strong> Emphatic do is particularly useful for: (1) contradicting a previous statement, (2) conceding a point before making a counterargument, (3) insisting something happened. In writing, it can be used sparingly for stylistic effect.</div>`},
  {id:"c1-advanced-passives",level:"c1",title:"Advanced passives",body:`<div class="section-label">Rule</div><div class="rule-box"><p>At C1 level, the passive is used in more complex constructions including <strong>reporting verbs</strong>, <strong>it-passive structures</strong>, and <strong>double-object passives</strong>.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Reporting verb passive (formal)</td><td><em>It is believed that… / It is reported that…</em></td></tr><tr><td>Subject of reporting verb</td><td><em>He is thought to be the best candidate.</em></td></tr><tr><td>Double object passive</td><td><em>She was given a prize. / He was offered the job.</em></td></tr><tr><td>Passive infinitive</td><td><em>The work needs to be done. / She asked to be notified.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>It is widely believed that climate change is accelerating.</li><li>The CEO is said to be considering resignation.</li><li>He was given very little time to respond.</li><li>She was told nothing about the decision.</li><li>The report is expected to be published next month.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">It is believed to be true. It is believed that it is true.</div><div class="error-item error-right">Both are correct — choose based on context.</div><div class="error-item error-wrong">He was given to a prize.</div><div class="error-item error-right">He was given a prize. (no preposition)</div><div class="error-item error-wrong">She was offered of a promotion.</div><div class="error-item error-right">She was offered a promotion.</div></div><div class="note-box"><strong>Note:</strong> The structure <em>It is said/believed/reported/thought/known + that clause</em> is used to report information without attributing it to a specific source — v
