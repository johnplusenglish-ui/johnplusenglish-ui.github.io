ery common in news and academic writing. The personal passive (<em>He is said to be...</em>) is also common and equally formal.</div>`},
  {id:"c1-conditionals-advanced",level:"c1",title:"Advanced conditionals",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Beyond the four main conditionals, English has several less common but important conditional structures used in formal and idiomatic contexts.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Unless</td><td><em>Unless you confirm, I'll assume you're not coming.</em></td></tr><tr><td>Provided/as long as</td><td><em>I'll help you provided you ask nicely.</em></td></tr><tr><td>Suppose/imagine</td><td><em>Suppose he refuses — what then?</em></td></tr><tr><td>Were to (more formal)</td><td><em>If he were to resign, it would cause chaos.</em></td></tr><tr><td>Should (formal, less certain)</td><td><em>If you should need any help, please call.</em></td></tr><tr><td>Inverted conditional (no 'if')</td><td><em>Should you need help, call me. / Were I in your position, I'd leave.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I'll attend provided I'm not required to speak.</li><li>Suppose they miss the deadline — what are the consequences?</li><li>Were the company to go bankrupt, hundreds would lose their jobs.</li><li>Should you change your mind, don't hesitate to contact us.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">Unless you don't confirm, I'll assume you're not coming.</div><div class="error-item error-right">Unless you confirm… (unless = if not, so 'don't' is redundant)</div><div class="error-item error-wrong">Should he calls, tell him I'm out.</div><div class="error-item error-right">Should he call, tell him I'm out. (base form after should)</div></div><div class="note-box"><strong>Note:</strong> Inverted conditionals (without 'if') are a formal register marker. <em>Should you require assistance</em> = <em>If you need help</em>. <em>Were I to leave</em> = <em>If I were to leave</em>. These appear frequently in business writing, formal letters, and academic texts.</div>`},
  {id:"c1-noun-phrases",level:"c1",title:"Complex noun phrases and nominalisation",body:`<div class="section-label">Rule</div><div class="rule-box"><p><strong>Nominalisation</strong> — turning verbs or adjectives into nouns — is a key feature of formal and academic writing. It creates more complex noun phrases and a more formal register.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Verb → noun</td><td><em>decide → decision, develop → development, fail → failure</em></td></tr><tr><td>Adjective → noun</td><td><em>significant → significance, possible → possibility, difficult → difficulty</em></td></tr><tr><td>Pre-modification</td><td><em>a long-awaited government decision</em></td></tr><tr><td>Post-modification</td><td><em>the decision reached after months of negotiation</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>The failure to act quickly led to serious consequences. (not 'Not acting quickly caused...')</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">The government decided to invest has had good effects.</div><div class="error-item error-right">The government's decision to invest has had positive effects.</div></div><div class="note-box"><strong>Note:</strong> Nominalisation is not always better — it can make writing opaque if overused. The key is to recognise it in academic texts and deploy it strategically in formal writing tasks (C1/C2 essays, reports). Common in: newspaper headlines, academic writing, formal reports, legal documents.</div>`},
  {id:"b1-question-tags",level:"b1",title:"Question Tags",body:`<div class="section-label">Rule</div><div class="rule-box"><p>A question tag is a short question added to the end of a statement to check information, seek agreement, or soften a statement. The tag uses the same auxiliary as the main clause, but reversed.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Positive → negative tag</td><td>You're coming, <em>aren't you?</em></td></tr><tr><td>Negative → positive tag</td><td>She isn't here, <em>is she?</em></td></tr><tr><td>Past simple</td><td>He called, <em>didn't he?</em></td></tr><tr><td>Modal verb</td><td>They can swim, <em>can't they?</em></td></tr><tr><td>I am → aren't I</td><td>I'm late, <em>aren't I?</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>It's a beautiful day, isn't it?</li><li>You haven't met her before, have you?</li><li>She was at the party, wasn't she?</li><li>Let's go, shall we?</li><li>Don't be late, will you?</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">You like it, isn't it?</div><div class="error-item error-right">You like it, don't you?</div><div class="error-item error-wrong">He's coming, doesn't he?</div><div class="error-item error-right">He's coming, isn't he?</div><div class="error-item error-wrong">They went home, don't they?</div><div class="error-item error-right">They went home, didn't they?</div></div><div class="note-box"><strong>Note:</strong> Intonation changes the meaning: falling intonation = expecting agreement; rising = genuine question. The tag must match the auxiliary of the main clause. 'I am late, aren't I?' is the only irregular form.</div>`},
  {id:"b1-modals-obligation",level:"b1",title:"Modals of Obligation and Permission",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Modal verbs express degrees of obligation, prohibition, and permission. The key contrast is <strong>mustn't</strong> (prohibited) vs <strong>don't have to</strong> (not required).</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>must</td><td>strong obligation (internal): <em>I must call her.</em></td></tr><tr><td>have to</td><td>external obligation: <em>I have to wear a uniform.</em></td></tr><tr><td>should/ought to</td><td>advice: <em>You should see a doctor.</em></td></tr><tr><td>mustn't</td><td>prohibition: <em>You mustn't park here.</em></td></tr><tr><td>don't have to</td><td>no obligation (optional): <em>You don't have to come.</em></td></tr><tr><td>can/may</td><td>permission: <em>Can I leave?</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>You must submit the form by Friday.</li><li>I have to wear a tie at work. (external rule)</li><li>You mustn't tell anyone — it's a secret.</li><li>You don't have to come if you're busy. (it's optional)</li><li>You should rest — you look exhausted.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">You mustn't to worry.</div><div class="error-item error-right">You mustn't worry.</div><div class="error-item error-wrong">I don't must go.</div><div class="error-item error-right">I don't have to go.</div><div class="error-item error-wrong">You don't have to park here. (meaning: prohibited)</div><div class="error-item error-right">You mustn't park here. (prohibition)</div></div><div class="note-box"><strong>Note:</strong> <strong>mustn't</strong> = it is not allowed (prohibition); <strong>don't have to</strong> = it is not necessary (no obligation). These are completely different meanings. <em>You don't have to wear a tie</em> ≠ <em>You mustn't wear a tie.</em></div>`},
  {id:"b1-phrasal-verbs",level:"b1",title:"Phrasal Verbs",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Phrasal verbs combine a verb with one or two particles to create a new meaning. They are central to informal English and cannot always be predicted from the individual words.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>Intransitive (no object)</td><td><em>He gave up. / She broke down.</em></td></tr><tr><td>Transitive separable</td><td><em>Turn the TV off. / Turn off the TV. / Turn it off.</em></td></tr><tr><td>Transitive inseparable</td><td><em>Look after the children.</em> (NOT look the children after)</td></tr><tr><td>Two particles</td><td><em>I can't put up with it.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>She gave up smoking after twenty years.</li><li>Can you look after my bag for a minute?</li><li>He came across an old photo while clearing out the attic.</li><li>I'm really looking forward to the holiday.</li><li>It took her a long time to get over the disappointment.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">She gave smoking up.</div><div class="error-item error-right">She gave up smoking. (inseparable)</div><div class="error-item error-wrong">Look the children after.</div><div class="error-item error-right">Look after the children. (inseparable)</div><div class="error-item error-wrong">I put it up with.</div><div class="error-item error-right">I put up with it. (two-particle — always inseparable)</div></div><div class="note-box"><strong>Note:</strong> With separable verbs, a pronoun MUST go in the middle: <em>Turn it off</em> (not 'Turn off it'). Two-particle phrasal verbs (put up with, look forward to, get on with) are always inseparable. Learning separability is as important as learning the meaning.</div>`},
  {id:"b2-so-such",level:"b2",title:"So, Such, Too, Enough",body:`<div class="section-label">Rule</div><div class="rule-box"><p>These four words express degree but with different structures. Confusing them is one of the most common B2 errors.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Example</th></tr></thead><tbody><tr><td>so + adjective/adverb</td><td><em>It was so cold. / She ran so quickly.</em></td></tr><tr><td>such + (a/an) + (adj) + noun</td><td><em>It was such a cold day. / Such good news!</em></td></tr><tr><td>too + adjective/adverb</td><td><em>It's too hot to eat.</em> (more than needed)</td></tr><tr><td>adjective/adverb + enough</td><td><em>It's warm enough to swim.</em> (sufficient)</td></tr><tr><td>enough + noun</td><td><em>We have enough time.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>The film was so long that I fell asleep.</li><li>It was such a long film that I fell asleep.</li><li>The coffee is too hot to drink.</li><li>She isn't old enough to vote.</li><li>We don't have enough money.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">It was so a good film.</div><div class="error-item error-right">It was such a good film.</div><div class="error-item error-wrong">She is such nice.</div><div class="error-item error-right">She is so nice. / She is such a nice person.</div><div class="error-item error-wrong">It's too enough hot.</div><div class="error-item error-right">It's too hot. / It's hot enough.</div><div class="error-item error-wrong">He speaks enough fast.</div><div class="error-item error-right">He speaks fast enough.</div></div><div class="note-box"><strong>Note:</strong> <strong>so</strong> + adjective/adverb; <strong>such</strong> + noun phrase. 'So cold' vs 'such a cold day'. <strong>Too</strong> implies a negative result: <em>too hot to drink</em> = you can't drink it. <strong>Enough</strong> follows adjectives but precedes nouns: <em>good enough</em>, <em>enough time</em>.</div>`},
  {id:"b2-subject-verb-agreement",level:"b2",title:"Subject-Verb Agreement",body:`<div class="section-label">Rule</div><div class="rule-box"><p>The verb must agree with its subject. Some nouns that look plural take singular verbs; some that look singular take plural verbs.</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Category</th><th>Example</th></tr></thead><tbody><tr><td>Singular (looks plural)</td><td>news, maths, physics, politics — <em>The news is on.</em></td></tr><tr><td>Plural (looks singular)</td><td>police, people, staff — <em>The police are here.</em></td></tr><tr><td>Collective (both possible)</td><td>team, family, government — <em>The team is/are playing.</em></td></tr><tr><td>Indefinite pronouns</td><td>everyone, someone, nobody — <em>Everyone is welcome.</em></td></tr><tr><td>Either/neither</td><td><em>Neither answer is correct.</em></td></tr><tr><td>A number of</td><td><em>A number of people were present.</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>The news was shocking today.</li><li>The police are looking for a suspect.</li><li>Everyone has to sign the form.</li><li>Neither of the options seems ideal.</li><li>A large number of students have applied.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">The news are very bad.</div><div class="error-item error-right">The news is very bad.</div><div class="error-item error-wrong">The police is coming.</div><div class="error-item error-right">The police are coming.</div><div class="error-item error-wrong">Everyone are invited.</div><div class="error-item error-right">Everyone is invited.</div><div class="error-item error-wrong">Neither of them are correct.</div><div class="error-item error-right">Neither of them is correct.</div></div><div class="note-box"><strong>Note:</strong> British English: 'the team are playing' (individuals); American: 'the team is playing' (unit). Both acceptable — be consistent. Most commonly tested: <em>the news is, the police are, everyone is</em>.</div>`},
  {id:"b2-determiners-quantifiers",level:"b2",title:"Determiners and Quantifiers",body:`<div class="section-label">Rule</div><div class="rule-box"><p>Quantifiers express amounts. Choice depends on countability and whether the meaning is positive (some) or negative (not enough).</p></div><div class="section-label">Form</div><table class="form-table"><thead><tr><th>Form</th><th>Use</th></tr></thead><tbody><tr><td>many / few / fewer</td><td>countable: <em>many friends / few mistakes / fewer cars</em></td></tr><tr><td>much / little / less</td><td>uncountable: <em>much time / little money / less traffic</em></td></tr><tr><td>a few / a little</td><td>positive small amount: <em>a few ideas / a little help</em></td></tr><tr><td>few / little (no 'a')</td><td>negative: not enough: <em>few people came / little progress</em></td></tr><tr><td>a lot of / plenty of</td><td>both countable and uncountable</td></tr><tr><td>no / none of</td><td>both: <em>no time / none of the answers</em></td></tr></tbody></table><div class="section-label">Examples</div><ul class="example-list"><li>I have a little time — enough for a quick coffee. (positive)</li><li>There was little response to the appeal. (not enough)</li><li>A few students stayed late. (some — positive)</li><li>Few students passed. (not many — negative)</li><li>We have plenty of options.</li></ul><div class="section-label">Common errors</div><div class="error-grid"><div class="error-item error-wrong">I have less friends now.</div><div class="error-item error-right">I have fewer friends now. (countable)</div><div class="error-item error-wrong">There is few milk left.</div><div class="error-item error-right">There is little milk left. (uncountable)</div><div class="error-item error-wrong">She has a little books.</div><div class="error-item error-right">She has a few books. (countable)</div><div class="error-item error-wrong">Much people were there.</div><div class="error-item error-right">Many people were there.</div></div><div class="note-box"><strong>Note:</strong> <em>A few / a little</em> = positive (better than nothing); <em>few / little</em> without 'a' = negative (not enough). Fewer vs less: use <em>fewer</em> for countable (<em>fewer cars</em>), <em>less</em> for uncountable (<em>less traffic</em>). Frequently tested at B2 and C1.</div>`}];

// ── Render ──
var currentLevel = 'all';
var searchTerm = '';

function levelLabel(l){
  return {a1:'A1',a2:'A2',b1:'B1',b2:'B2',c1:'C1'}[l] || l.toUpperCase();
}
function badgeClass(l){
  return 'badge-'+l;
}

function highlight(text, term){
  if(!term) return text;
  var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<span class="search-highlight">$1</span>');
}

function render(){
  var container = document.getElementById('topicsContainer');
  var noResults = document.getElementById('noResults');
  var label = document.getElementById('searchLabel');
  container.innerHTML = '';

  var filtered = TOPICS.filter(function(t){
    var levelOk = currentLevel === 'all' || t.level === currentLevel;
    var searchOk = !searchTerm || t.title.toLowerCase().indexOf(searchTerm.toLowerCase()) !== -1 || t.body.toLowerCase().indexOf(searchTerm.toLowerCase()) !== -1;
    return levelOk && searchOk;
  });

  if(filtered.length === 0){
    noResults.style.display = 'block';
    label.style.display = 'none';
    return;
  }
  noResults.style.display = 'none';

  if(searchTerm){
    label.textContent = filtered.length + ' result' + (filtered.length === 1 ? '' : 's') + ' for "' + searchTerm + '"';
    label.style.display = 'block';
  } else {
    label.style.display = 'none';
  }

  var num = 0;
  filtered.forEach(function(t){
    num++;
    var div = document.createElement('div');
    div.className = 'topic-card';
    div.id = 'card-' + t.id;
    var titleDisplay = searchTerm ? highlight(t.title, searchTerm) : t.title;
    div.innerHTML =
      '<div class="topic-header" onclick="toggleCard(this)">' +
        '<div class="topic-header-left">' +
          '<span class="topic-num">' + String(num).padStart(2,'0') + '</span>' +
          '<span class="topic-title">' + titleDisplay + '</span>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:.5rem">' +
          '<span class="topic-level-badge ' + badgeClass(t.level) + '">' + levelLabel(t.level) + '</span>' +
          '<span class="topic-chevron">▾</span>' +
        '</div>' +
      '</div>' +
      '<div class="topic-body">' + (searchTerm ? highlight(t.body, searchTerm) : t.body) + '</div>';
    container.appendChild(div);
  });
}

function toggleCard(header){
  var card = header.parentElement;
  var isOpen = card.classList.contains('open');
  // Close all others
  document.querySelectorAll('.topic-card.open').forEach(function(c){ c.classList.remove('open'); });
  if(!isOpen) card.classList.add('open');
}

// ── Level tabs ──
document.querySelectorAll('.tab').forEach(function(tab){
  tab.addEventListener('click', function(){
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    currentLevel = tab.dataset.tab;
    render();
  });
});

// ── Search ──
var searchTimer;
document.getElementById('grammarSearch').addEventListener('input', function(){
  clearTimeout(searchTimer);
  var val = this.value.trim();
  searchTimer = setTimeout(function(){
    searchTerm = val;
    if(val){
      // When searching, show all levels
      document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
      document.querySelector('[data-tab="all"]').classList.add('active');
      currentLevel = 'all';
    }
    render();
  }, 200);
});

// Initial render
render();
</script>

<script>
(function(){
  var LEVEL_NAMES = {a1:'A1 Beginner',a2:'A2 Elementary',b1:'B1 Pre-intermediate',b2:'B2 Upper-intermediate',c1:'C1 Advanced',all:'All Levels'};

  window.openGGPrint = function(){
    var LEVEL_NAMES = {a1:'A1 Beginner',a2:'A2 Elementary',b1:'B1 Pre-intermediate',b2:'B2 Upper-intermediate',c1:'C1 Advanced',all:'All Levels'};

    // Check if a topic is open
    var openCard = document.querySelector('.topic-card.open');
    var topicOpt = document.getElementById('ggOptTopic');
    if(openCard){
      var topicId = openCard.id.replace('card-','');
      var topic = TOPICS.find(function(t){ return t.id===topicId; });
      if(topic){
        document.getElementById('ggTopicLabel').textContent = topic.title;
        document.getElementById('ggTopicDesc').textContent = (LEVEL_NAMES[topic.level]||topic.level.toUpperCase()) + ' — single topic';
        topicOpt.style.display = 'flex';
        document.querySelector('[name=ggScope][value=topic]').checked = true;
      }
    } else {
      topicOpt.style.display = 'none';
      document.querySelector('[name=ggScope][value=level]').checked = true;
    }

    // Update level label — hide if 'all' (would duplicate the All levels option)
    var level = currentLevel;
    var ggLevelRow = document.querySelector('[name=ggScope][value=level]').closest('label');
    if(level === 'all'){
      ggLevelRow.style.display = 'none';
    } else {
      ggLevelRow.style.display = 'flex';
      var count = TOPICS.filter(function(t){return t.level===level;}).length;
      document.getElementById('ggLevelLabel').textContent = LEVEL_NAMES[level] || level.toUpperCase();
      document.getElementById('ggLevelDesc').textContent = count + ' topics';
    }

    document.getElementById('ggPrintOverlay').style.display = 'flex';
  };

  window.doGGPrint = function(){
    var scope = document.querySelector('[name=ggScope]:checked').value;
    document.getElementById('ggPrintOverlay').style.display = 'none';

    // Determine which topics to print
    var topics = [];
    if(scope === 'topic'){
      var openCard = document.querySelector('.topic-card.open');
      if(!openCard){ alert('No topic is open. Open a topic first.'); return; }
      var topicId = openCard.id.replace('card-','');
      var found = TOPICS.find(function(t){ return t.id===topicId; });
      if(!found){ alert('Topic not found.'); return; }
      topics = [found];
    } else if(scope === 'level'){
      topics = currentLevel==='all' ? TOPICS : TOPICS.filter(function(t){ return t.level===currentLevel; });
    } else {
      topics = TOPICS;
    }

    if(!topics.length){ alert('No topics to print.'); return; }

    // Open window directly in click handler
    var pw = window.open('','_blank','width=900,height=700');
    if(!pw){ alert('Pop-up blocked. Please allow pop-ups.'); return; }

    var LEVEL_LABELS = {a1:'A1',a2:'A2',b1:'B1',b2:'B2',c1:'C1'};
    var css = 'body{font-family:Outfit,sans-serif;color:#2D3047;padding:2rem;max-width:800px;margin:0 auto;line-height:1.55}'
      +'.print-header{margin-bottom:1.5rem;padding-bottom:.8rem;border-bottom:2px solid #2D3047}'
      +'.print-header h1{font-size:1.5rem;font-weight:800;margin:0 0 .2rem}'
      +'.print-header p{font-size:.75rem;color:#7A7D8E;margin:0}'
      +'.topic{margin-bottom:1.5rem;page-break-inside:avoid;border:1px solid #E8E5DF;border-radius:10px;overflow:hidden}'
      +'.topic-head{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;background:#F7F6F3;border-bottom:1px solid #E8E5DF}'
      +'.topic-num{font-family:JetBrains Mono,monospace;font-size:.62rem;color:#2176FF;background:#E8EEFF;padding:.15rem .45rem;border-radius:4px;font-weight:700}'
      +'.topic-title{font-weight:800;font-size:1rem}'
      +'.level-badge{font-family:JetBrains Mono,monospace;font-size:.58rem;font-weight:700;padding:.12rem .42rem;border-radius:4px;text-transform:uppercase;margin-left:auto}'
      +'.badge-a1{background:#FFF3E0;color:#c97800}.badge-a2{background:#E8EEFF;color:#1a5fd4}'
      +'.badge-b1{background:#E4F8F6;color:#0A8A76}.badge-b2{background:#E4F8F6;color:#1DD3B0}'
      +'.badge-c1{background:#F0E8FA;color:#9B72CF}'
      +'.topic-body{padding:.8rem 1rem}'
      +'.section-label{font-family:JetBrains Mono,monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#2176FF;margin-bottom:.3rem;font-weight:600;margin-top:.9rem}'
      +'.section-label:first-child{margin-top:0}'
      +'.rule-box{background:#E8EEFF;border:1px solid rgba(33,118,255,.15);border-radius:8px;padding:.7rem .9rem;margin-bottom:.7rem;font-size:.86rem}'
      +'.rule-box strong{color:#2176FF}.rule-box code{font-family:JetBrains Mono,monospace;font-size:.8rem;background:rgba(33,118,255,.12);padding:.1rem .3rem;border-radius:3px;color:#2176FF}'
      +'.form-table{width:100%;border-collapse:collapse;margin-bottom:.7rem;font-size:.84rem}'
      +'.form-table th{font-family:JetBrains Mono,monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:#7A7D8E;padding:.4rem .7rem;text-align:left;border-bottom:1.5px solid #E8E5DF;background:#F7F6F3;font-weight:600}'
      +'.form-table td{padding:.4rem .7rem;border-bottom:1px solid #E8E5DF;vertical-align:top}'
      +'.form-table tr:last-child td{border-bottom:none}'
      +'.form-table code{font-family:JetBrains Mono,monospace;font-size:.8rem;background:#E8EEFF;padding:.1rem .3rem;border-radius:3px;color:#2176FF}'
      +'.example-list{list-style:none;padding:0;margin-bottom:.7rem}'
      +'.example-list li{font-size:.86rem;padding:.3rem 0;border-bottom:1px dotted #E8E5DF;font-style:italic}'
      +'.example-list li:last-child{border-bottom:none}'
      +'.example-list li::before{content:"› ";color:#2176FF;font-style:normal;font-weight:700}'
      +'.error-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.7rem}'
      +'.error-item{border-radius:7px;padding:.55rem .75rem;font-size:.82rem}'
      +'.error-wrong{background:rgba(255,107,107,.07);border:1px solid rgba(255,107,107,.2)}'
      +'.error-wrong::before{content:"✗ ";color:#FF6B6B;font-weight:700}'
      +'.error-right{background:rgba(29,211,176,.07);border:1px solid rgba(29,211,176,.2)}'
      +'.error-right::before{content:"✓ ";color:#1DD3B0;font-weight:700}'
      +'.note-box{background:#F7F6F3;border:1px solid #E8E5DF;border-left:3px solid #2176FF;border-radius:0 8px 8px 0;padding:.65rem .9rem;font-size:.84rem;line-height:1.55}'
      +'.note-box strong{color:#2176FF}'
      +'@media print{body{padding:0}.topic{page-break-inside:avoid}}';

    var LEVEL_NAMES3 = {a1:'A1 Beginner',a2:'A2 Elementary',b1:'B1 Pre-intermediate',b2:'B2 Upper-intermediate',c1:'C1 Advanced',all:'All Levels'};
    var scopeLabel = scope==='topic' ? topics[0].title : scope==='all' ? 'All topics (A1–C1)' : (LEVEL_NAMES3[currentLevel]||currentLevel.toUpperCase());
    var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"><title>Grammar Guides<\/title><style>'+css+'<\/style><\/head><body>';
    h += '<div class="print-header"><h1>Grammar Guides<\/h1><p>'+scopeLabel+' · '+topics.length+' topics · johnplusenglish.com<\/p><\/div>';

    topics.forEach(function(t, i){
      h += '<div class="topic"><div class="topic-head">';
      h += '<span class="topic-num">'+(i+1<10?'0'+(i+1):i+1)+'<\/span>';
      h += '<span class="topic-title">'+t.title+'<\/span>';
      h += '<span class="level-badge badge-'+t.level+'">'+( LEVEL_LABELS[t.level]||t.level.toUpperCase())+'<\/span>';
      h += '<\/div><div class="topic-body">'+t.body+'<\/div><\/div>';
    });

    h += '<\/body><\/html>';
    pw.document.write(h);
    pw.document.close();
    pw.focus();
    setTimeout(function(){ pw.print(); }, 500);
  };

  // Also add per-card print buttons when cards open
  var origToggle = window.toggleCard;
  window.toggleCard = function(header){
    origToggle(header);
    var card = header.parentElement;
    var btn = header.querySelector('.card-print-btn');
    if(!card.classList.contains('open')){
      // Hide print button when card closes
      if(btn) btn.style.display = 'none';
      return;
    }
    // Show or create print button when card opens
    if(btn){ btn.style.display = 'inline-flex'; return; }
    var newBtn = document.createElement('button');
        newBtn.className = 'card-print-btn';
        newBtn.title = 'Print this topic';
        newBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>';
        newBtn.style.cssText = 'background:none;border:1.5px solid var(--border);border-radius:7px;padding:.3rem .5rem;cursor:pointer;color:var(--muted);transition:all .15s;display:inline-flex;align-items:center;flex-shrink:0;margin-left:.5rem';
        newBtn.onmouseover = function(){ btn.style.borderColor='var(--sky)'; btn.style.color='var(--sky)'; };
        newBtn.onmouseout = function(){ btn.style.borderColor='var(--border)'; btn.style.color='var(--muted)'; };
        newBtn.onclick = function(e){
          e.stopPropagation();
          var topicId = card.id.replace('card-','');
          var topic = TOPICS.find(function(t){ return t.id===topicId; });
          if(!topic) return;
          var pw = window.open('','_blank','width=800,height=600');
          if(!pw){ alert('Pop-up blocked.'); return; }
          var LEVEL_LABELS2 = {a1:'A1',a2:'A2',b1:'B1',b2:'B2',c1:'C1'};
          var h2 = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+topic.title+'<\/title>';
          h2 += '<style>body{font-family:Outfit,sans-serif;color:#2D3047;padding:2rem;max-width:700px;margin:0 auto;line-height:1.55}';
          h2 += '.ph{margin-bottom:1.2rem;padding-bottom:.7rem;border-bottom:2px solid #2D3047}.ph h1{font-size:1.3rem;font-weight:800;margin:0 0 .15rem}.ph p{font-size:.72rem;color:#7A7D8E;margin:0}';
          h2 += '.section-label{font-family:JetBrains Mono,monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#2176FF;margin:.9rem 0 .3rem;font-weight:600;display:block}';
          h2 += '.rule-box{background:#E8EEFF;border:1px solid rgba(33,118,255,.15);border-radius:8px;padding:.7rem .9rem;margin-bottom:.7rem;font-size:.87rem}';
          h2 += '.rule-box strong{color:#2176FF}.rule-box code{font-family:JetBrains Mono,monospace;font-size:.8rem;background:rgba(33,118,255,.12);padding:.1rem .3rem;border-radius:3px;color:#2176FF}';
          h2 += '.form-table{width:100%;border-collapse:collapse;margin-bottom:.7rem;font-size:.84rem}';
          h2 += '.form-table th{font-family:JetBrains Mono,monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:#7A7D8E;padding:.4rem .7rem;text-align:left;border-bottom:1.5px solid #E8E5DF;background:#F7F6F3;font-weight:600}';
          h2 += '.form-table td{padding:.4rem .7rem;border-bottom:1px solid #E8E5DF;vertical-align:top}';
          h2 += '.form-table tr:last-child td{border-bottom:none}';
          h2 += '.form-table code{font-family:JetBrains Mono,monospace;font-size:.8rem;background:#E8EEFF;padding:.1rem .3rem;border-radius:3px;color:#2176FF}';
          h2 += '.example-list{list-style:none;padding:0;margin-bottom:.7rem}';
          h2 += '.example-list li{font-size:.87rem;padding:.3rem 0;border-bottom:1px dotted #E8E5DF;font-style:italic}';
          h2 += '.example-list li:last-child{border-bottom:none}';
          h2 += '.example-list li::before{content:"› ";color:#2176FF;font-style:normal;font-weight:700}';
          h2 += '.error-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.7rem}';
          h2 += '.error-item{border-radius:7px;padding:.55rem .75rem;font-size:.83rem}';
          h2 += '.error-wrong{background:rgba(255,107,107,.07);border:1px solid rgba(255,107,107,.2)}';
          h2 += '.error-wrong::before{content:"✗ ";color:#FF6B6B;font-weight:700}';
          h2 += '.error-right{background:rgba(29,211,176,.07);border:1px solid rgba(29,211,176,.2)}';
          h2 += '.error-right::before{content:"✓ ";color:#1DD3B0;font-weight:700}';
          h2 += '.note-box{background:#F7F6F3;border:1px solid #E8E5DF;border-left:3px solid #2176FF;border-radius:0 8px 8px 0;padding:.65rem .9rem;font-size:.84rem;line-height:1.55}';
          h2 += '.note-box strong{color:#2176FF}';
          h2 += '@media print{body{padding:0}}<\/style><\/head><body>';
          h2 += '<div class="ph"><h1>'+topic.title+'<\/h1><p>'+(LEVEL_LABELS2[topic.level]||topic.level.toUpperCase())+' · johnplusenglish.com<\/p><\/div>';
          h2 += topic.body;
          h2 += '<\/body><\/html>';
          pw.document.write(h2);
          pw.document.close();
          pw.focus();
          setTimeout(function(){ pw.print(); }, 400);
        };
        // Insert before the chevron
        var chevron = header.querySelector('.topic-chevron');
        header.querySelector('div:last-child').insertBefore(newBtn, chevron);
  };
})();
