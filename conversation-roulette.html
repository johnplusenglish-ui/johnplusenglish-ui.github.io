<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Roulette · John+English</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sun:#FFB347;--sky:#2176FF;--sky-light:#E8EEFF;
  --sea:#1DD3B0;--sea-light:#E4FBF7;
  --coral:#FF6B6B;--coral-light:#FFE8E8;
  --lavender:#9B72CF;--lavender-light:#F0E8FA;
  --cream:#F7F6F3;--ink:#2D3047;--muted:#7A7D8E;
  --border:#E8E5DF;--card:#fff;--radius:14px;
  --shadow-sm:0 1px 3px rgba(45,48,71,.06);
  --shadow-md:0 4px 12px rgba(45,48,71,.08);
  --shadow-lg:0 8px 36px rgba(45,48,71,.16)
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:28px 28px;opacity:.4;pointer-events:none;z-index:0}
.topnav{position:fixed;top:0;left:0;right:0;height:52px;z-index:200;background:rgba(247,246,243,.88);backdrop-filter:blur(16px);border-bottom:1.5px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--sky)}
.topnav-links{display:flex;gap:1.2rem}
.topnav-links a{font-size:.8rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .2s}
.topnav-links a:hover{color:var(--sky)}
.back-link-wrap{max-width:800px;margin:0 auto;padding:4.2rem 2rem 0;position:relative;z-index:1}
.wf-back-link{display:inline-flex;align-items:center;gap:.35rem;font-size:.82rem;font-weight:600;color:var(--muted);text-decoration:none}
.wf-back-link:hover{color:var(--ink)}
.hero{padding:1.4rem 2rem 1.8rem;max-width:800px;margin:0 auto;text-align:center;position:relative;z-index:1}
.hero-badge{display:inline-flex;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .9rem;border-radius:20px;margin-bottom:.7rem;color:var(--sun);background:#FFF5E6;border:1px solid rgba(255,179,71,.25)}
.hero h1{font-size:clamp(1.8rem,3.6vw,2.6rem);line-height:1.1;letter-spacing:-.02em;margin-bottom:.6rem;font-weight:900}
.hero-sub{font-size:.95rem;color:var(--muted);max-width:460px;margin:0 auto;line-height:1.6}
.main{max-width:800px;margin:0 auto;padding:0 2rem 4rem;position:relative;z-index:1}

/* THREE WHEELS */
.wheels-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.8rem}
.wheel{background:var(--card);border-radius:18px;border:2px solid var(--border);box-shadow:var(--shadow-md);overflow:hidden;transition:border-color .2s}
.wheel:hover{border-color:var(--border)}
.wheel-header{padding:.7rem 1rem;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.wheel-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.wheel-label.topic{color:var(--sky)}
.wheel-label.person{color:var(--lavender)}
.wheel-label.register{color:var(--coral)}
.wheel-reroll{font-family:'JetBrains Mono',monospace;font-size:.55rem;font-weight:700;color:var(--muted);background:var(--cream);border:1px solid var(--border);border-radius:4px;padding:.13rem .38rem;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.04em}
.wheel-reroll:hover{border-color:var(--ink);color:var(--ink)}

.wheel-face{padding:1.4rem 1rem 1.2rem;text-align:center;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;cursor:pointer}
.wheel-emoji{font-size:2.2rem;line-height:1;transition:transform .15s}
.wheel:hover .wheel-emoji{transform:scale(1.08)}
.wheel-value{font-size:.92rem;font-weight:700;color:var(--ink);line-height:1.3;text-align:center}
.wheel.spinning .wheel-emoji{animation:spin .4s ease-out}
.wheel.spinning .wheel-value{opacity:.3}
@keyframes spin{0%{transform:rotate(0) scale(1)}30%{transform:rotate(-12deg) scale(.9)}60%{transform:rotate(8deg) scale(1.05)}100%{transform:rotate(0) scale(1)}}

/* SPIN ALL */
.spin-wrap{display:flex;justify-content:center;margin-bottom:1.8rem}
.btn-spin{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:800;padding:.85rem 2.8rem;border-radius:14px;border:none;background:var(--ink);color:#fff;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:.55rem;letter-spacing:-.01em;box-shadow:0 4px 18px rgba(45,48,71,.22)}
.btn-spin:hover{background:#1a1d2e;transform:translateY(-2px);box-shadow:0 8px 28px rgba(45,48,71,.28)}
.btn-spin:active{transform:scale(.97)}
.btn-spin svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* RESULT CARD */
.result-card{background:var(--card);border-radius:20px;border:2px solid var(--border);box-shadow:var(--shadow-lg);overflow:hidden;margin-bottom:1.6rem;display:none}
.result-card.show{display:block}
.result-header{padding:.8rem 1.4rem;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:.6rem}
.result-dot{width:8px;height:8px;border-radius:50%;background:var(--sea);flex-shrink:0}
.result-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.result-body{padding:1.4rem 1.6rem}
.result-scenario{font-size:1.1rem;font-weight:700;color:var(--ink);line-height:1.5;margin-bottom:1rem}
.result-tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.result-tag{font-size:.8rem;font-weight:600;padding:.3rem .75rem;border-radius:8px;display:flex;align-items:center;gap:.3rem}
.result-tag.topic-tag{background:var(--sky-light);color:var(--sky)}
.result-tag.person-tag{background:var(--lavender-light);color:var(--lavender)}
.result-tag.register-tag{background:var(--coral-light);color:var(--coral)}
.result-tip{font-size:.85rem;color:var(--muted);line-height:1.6;padding:.75rem .9rem;background:var(--cream);border-radius:10px;border-left:3px solid var(--border)}

/* TIMER */
.timer-section{display:flex;flex-direction:column;align-items:center;gap:.9rem;margin-bottom:1.6rem}
.timer-ring{position:relative;width:110px;height:110px;cursor:pointer}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:6}
.timer-bg{stroke:var(--border)}
.timer-progress{stroke:var(--ink);stroke-linecap:round;transition:stroke-dashoffset .1s linear;stroke-dasharray:308;stroke-dashoffset:0}
.timer-ring.warning .timer-progress{stroke:var(--sun)}
.timer-ring.danger .timer-progress{stroke:var(--coral)}
.timer-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-secs{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--ink);line-height:1}
.timer-hint{font-size:.62rem;color:var(--muted);margin-top:.15rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.timer-presets{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;align-items:center}
.preset-btn{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;padding:.28rem .7rem;border-radius:6px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.preset-btn:hover{border-color:var(--ink);color:var(--ink)}
.preset-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.filter-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}

@media(max-width:640px){
  .wheels-row{grid-template-columns:1fr}
  .topnav{padding:0 1.2rem}
  .back-link-wrap,.hero,.main{padding-left:1.2rem;padding-right:1.2rem}
}
</style>
</head>
<body>
<nav class="topnav">
  <a href="index.html" class="nav-logo">john<span>+</span>english</a>
  <div class="topnav-links"><a href="index.html">Home</a><a href="index.html#group-fun">Fun Tools</a></div>
</nav>
<div class="back-link-wrap">
  <a href="index.html" class="wf-back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Home
  </a>
</div>
<section class="hero">
  <span class="hero-badge">Fun Tools</span>
  <h1>Conversation Roulette</h1>
  <p class="hero-sub">Spin three wheels — a topic, a person to speak to, and a register. Then talk.</p>
</section>
<div class="main">

  <div class="wheels-row">
    <div class="wheel" id="wheel0">
      <div class="wheel-header">
        <span class="wheel-label topic">Topic</span>
        <button class="wheel-reroll" onclick="spinOne(0)">re-spin</button>
      </div>
      <div class="wheel-face" onclick="spinOne(0)">
        <div class="wheel-emoji" id="emoji0">🎲</div>
        <div class="wheel-value" id="val0">Spin to start</div>
      </div>
    </div>
    <div class="wheel" id="wheel1">
      <div class="wheel-header">
        <span class="wheel-label person">Person</span>
        <button class="wheel-reroll" onclick="spinOne(1)">re-spin</button>
      </div>
      <div class="wheel-face" onclick="spinOne(1)">
        <div class="wheel-emoji" id="emoji1">🎲</div>
        <div class="wheel-value" id="val1">Spin to start</div>
      </div>
    </div>
    <div class="wheel" id="wheel2">
      <div class="wheel-header">
        <span class="wheel-label register">Register</span>
        <button class="wheel-reroll" onclick="spinOne(2)">re-spin</button>
      </div>
      <div class="wheel-face" onclick="spinOne(2)">
        <div class="wheel-emoji" id="emoji2">🎲</div>
        <div class="wheel-value" id="val2">Spin to start</div>
      </div>
    </div>
  </div>

  <div class="spin-wrap">
    <button class="btn-spin" onclick="spinAll()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="8" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="16" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="8" cy="16" r="1.2" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg>
      Spin all three
    </button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-dot"></div>
      <span class="result-label">Your scenario</span>
    </div>
    <div class="result-body">
      <div class="result-scenario" id="resultScenario"></div>
      <div class="result-tags" id="resultTags"></div>
      <div class="result-tip" id="resultTip"></div>
    </div>
  </div>

  <div class="timer-section">
    <div class="timer-ring" id="timerRing" onclick="toggleTimer()">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle class="timer-bg" cx="55" cy="55" r="49"/>
        <circle class="timer-progress" id="timerArc" cx="55" cy="55" r="49"/>
      </svg>
      <div class="timer-display">
        <div class="timer-secs" id="timerDisplay">60</div>
        <div class="timer-hint" id="timerHint">tap to start</div>
      </div>
    </div>
    <div class="timer-presets">
      <span class="filter-label">Timer</span>
      <button class="preset-btn" onclick="setDuration(30,this)">30s</button>
      <button class="preset-btn active" onclick="setDuration(60,this)">60s</button>
      <button class="preset-btn" onclick="setDuration(90,this)">90s</button>
      <button class="preset-btn" onclick="setDuration(120,this)">2 min</button>
      <button class="preset-btn" onclick="setDuration(0,this)">No timer</button>
    </div>
  </div>

</div>
<script>
var WHEELS = [
  {
    name:'topic',
    items:[
      {emoji:'🏖️',val:'a holiday that went wrong'},
      {emoji:'💼',val:'asking for a pay rise'},
      {emoji:'🏠',val:'a problem with your flat or house'},
      {emoji:'🚂',val:'being late for something important'},
      {emoji:'🎂',val:'organising a surprise party'},
      {emoji:'💔',val:'a recent argument with someone close'},
      {emoji:'🍽️',val:'recommending a restaurant'},
      {emoji:'📱',val:'your phone has been stolen'},
      {emoji:'🐕',val:'your neighbour\'s dog won\'t stop barking'},
      {emoji:'✈️',val:'your flight has just been cancelled'},
      {emoji:'🏥',val:'waiting for an important test result'},
      {emoji:'🎓',val:'deciding whether to go back to study'},
      {emoji:'😴',val:'you haven\'t slept properly in a week'},
      {emoji:'🔑',val:'you\'ve been locked out'},
      {emoji:'📦',val:'a package that never arrived'},
      {emoji:'💸',val:'asking to borrow money'},
      {emoji:'🎉',val:'a party that got completely out of hand'},
      {emoji:'🧳',val:'you\'re thinking about moving abroad'},
      {emoji:'🚗',val:'a minor car accident'},
      {emoji:'👔',val:'a job interview tomorrow'},
      {emoji:'🍕',val:'a disagreement about something trivial'},
      {emoji:'🌧️',val:'your plans have been ruined by the weather'},
      {emoji:'📝',val:'asking for an extension on a deadline'},
      {emoji:'🤒',val:'calling in sick when you\'re not that ill'},
      {emoji:'🛒',val:'a very long and frustrating queue'},
      {emoji:'💻',val:'your laptop has just died mid-project'},
      {emoji:'🎬',val:'trying to convince someone to watch your favourite film'},
      {emoji:'🏃',val:'you\'ve just started trying to get fit'},
      {emoji:'👴',val:'giving advice to someone much older than you'},
      {emoji:'🧹',val:'complaining about a messy shared space'},
    ]
  },
  {
    name:'person',
    items:[
      {emoji:'👔',val:'your boss'},
      {emoji:'👶',val:'a five-year-old child'},
      {emoji:'👴',val:'your grandparent'},
      {emoji:'🤝',val:'someone you\'ve just met at a party'},
      {emoji:'😤',val:'a very impatient customer'},
      {emoji:'🧑‍⚕️',val:'a doctor'},
      {emoji:'👮',val:'a police officer'},
      {emoji:'🧑‍🏫',val:'a teacher or professor'},
      {emoji:'🎤',val:'a journalist interviewing you'},
      {emoji:'😍',val:'someone you\'re trying to impress'},
      {emoji:'🤨',val:'someone who doesn\'t believe you'},
      {emoji:'💼',val:'a job interviewer'},
      {emoji:'🤗',val:'your best friend'},
      {emoji:'😐',val:'someone who doesn\'t care at all'},
      {emoji:'👑',val:'a very important VIP guest'},
      {emoji:'🧓',val:'an elderly neighbour'},
      {emoji:'🤓',val:'an expert who knows much more than you'},
      {emoji:'😠',val:'someone who is already annoyed'},
      {emoji:'🌍',val:'someone who doesn\'t speak English well'},
      {emoji:'👶',val:'a teenager who thinks you\'re out of touch'},
      {emoji:'🤵',val:'a very formal official'},
      {emoji:'🎭',val:'someone who thinks they\'re always right'},
      {emoji:'😴',val:'someone who is extremely tired and distracted'},
      {emoji:'🥳',val:'a very enthusiastic stranger'},
      {emoji:'🤐',val:'someone who responds only in one-word answers'},
    ]
  },
  {
    name:'register',
    items:[
      {emoji:'😎',val:'very casual — like texting a friend'},
      {emoji:'🧐',val:'formal and professional'},
      {emoji:'🤫',val:'urgent and secretive'},
      {emoji:'😄',val:'enthusiastic and upbeat'},
      {emoji:'😬',val:'awkward and uncomfortable'},
      {emoji:'🙄',val:'reluctant — you don\'t really want to have this conversation'},
      {emoji:'😰',val:'nervous and apologetic'},
      {emoji:'💪',val:'confident and assertive'},
      {emoji:'🥺',val:'desperate — you really need this to go well'},
      {emoji:'😡',val:'frustrated — you\'ve had to explain this three times already'},
      {emoji:'🤷',val:'vague and non-committal'},
      {emoji:'🎭',val:'overly dramatic'},
      {emoji:'🧊',val:'cold and businesslike'},
      {emoji:'🥱',val:'bored — you couldn\'t care less'},
      {emoji:'🤩',val:'trying too hard to be impressive'},
    ]
  }
];

// Scenario sentence templates
var TEMPLATES = [
  function(t,p,r){return 'You are talking to '+p+' about '+t+'. Your tone is '+r+'.';},
  function(t,p,r){return 'Imagine you are speaking with '+p+'. The subject is '+t+'. You should come across as '+r+'.';},
  function(t,p,r){return p.charAt(0).toUpperCase()+p.slice(1)+' is in front of you. You need to talk to them about '+t+'. Be '+r+'.';},
];

// Register tips
var TIPS = {
  'very casual — like texting a friend':'Use contractions, informal vocabulary, and natural fillers. Don\'t worry about being too precise.',
  'formal and professional':'Full sentences, polite hedging ("I was wondering if...", "Would it be possible to..."), no slang.',
  'urgent and secretive':'Keep your voice low, speak quickly, choose words carefully. Urgency changes your word order and rhythm.',
  'enthusiastic and upbeat':'Use intensifiers (absolutely, definitely, really), open body language, positive framing of everything.',
  'awkward and uncomfortable':'Hesitate, use fillers, avoid eye contact, trail off. This is harder than it sounds.',
  'reluctant — you don\'t really want to have this conversation':'Short answers, passive constructions, vague vocabulary. You\'re cooperating but barely.',
  'nervous and apologetic':'Lots of "sorry", softeners, checking the other person is ok with what you\'re saying.',
  'confident and assertive':'Direct sentences, active verbs, minimal hedging. State your position clearly.',
  'desperate — you really need this to go well':'Over-explaining, repeating yourself, over-polite. Watch the language of persuasion.',
  'frustrated — you\'ve had to explain this three times already':'Controlled but tense. Word choice becomes more precise and clipped.',
  'vague and non-committal':'Hedge everything. "Maybe", "possibly", "I\'m not sure", "it depends". Never commit.',
  'overly dramatic':'Exaggerate everything. The vocabulary of extreme situations applied to ordinary ones.',
  'cold and businesslike':'Transactional language. No small talk. Only what needs to be said.',
  'bored — you couldn\'t care less':'Minimal engagement. Short answers. "Yeah." "Fine." "Whatever."',
  'trying too hard to be impressive':'Over-formal vocabulary in the wrong register. Trying to use idioms you\'re not quite sure of.',
};

var current = [null,null,null];
var timerDuration=60,timerRemaining=60,timerInterval=null,timerRunning=false;

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function spinOne(idx){
  var wheel=document.getElementById('wheel'+idx);
  wheel.classList.add('spinning');
  var ticks=0;
  var iv=setInterval(function(){
    var item=pick(WHEELS[idx].items);
    document.getElementById('emoji'+idx).textContent=item.emoji;
    document.getElementById('val'+idx).textContent=item.val;
    ticks++;
    if(ticks>=10){
      clearInterval(iv);
      var final=pick(WHEELS[idx].items);
      document.getElementById('emoji'+idx).textContent=final.emoji;
      document.getElementById('val'+idx).textContent=final.val;
      current[idx]=final;
      wheel.classList.remove('spinning');
      if(current[0]&&current[1]&&current[2]) buildResult();
    }
  },55);
}

function spinAll(){
  stopTimer();timerRemaining=timerDuration;updateTimerDisplay();
  document.getElementById('timerRing').classList.remove('warning','danger');
  document.getElementById('timerHint').textContent=timerDuration>0?'tap to start':'no timer';
  document.getElementById('resultCard').classList.remove('show');
  spinOne(0);
  setTimeout(function(){spinOne(1);},80);
  setTimeout(function(){spinOne(2);},160);
}

function buildResult(){
  var t=current[0].val, p=current[1].val, r=current[2].val;
  var tmpl=TEMPLATES[Math.floor(Math.random()*TEMPLATES.length)];
  document.getElementById('resultScenario').textContent=tmpl(t,p,r);
  document.getElementById('resultTags').innerHTML=
    '<span class="result-tag topic-tag">'+current[0].emoji+' '+t+'</span>'
    +'<span class="result-tag person-tag">'+current[1].emoji+' '+p+'</span>'
    +'<span class="result-tag register-tag">'+current[2].emoji+' '+r+'</span>';
  var tip=TIPS[r]||'Pay attention to how this register changes your vocabulary, sentence length, and tone.';
  document.getElementById('resultTip').textContent='💬 Language tip: '+tip;
  document.getElementById('resultCard').classList.add('show');
}

function setDuration(s,btn){
  timerDuration=s;timerRemaining=s;
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');stopTimer();
  document.getElementById('timerRing').classList.remove('warning','danger');
  if(s===0){document.getElementById('timerDisplay').textContent='--';document.getElementById('timerHint').textContent='no timer';}
  else{updateTimerDisplay();document.getElementById('timerHint').textContent='tap to start';}
}
function toggleTimer(){if(timerDuration===0)return;timerRunning?stopTimer():startTimer();}
function startTimer(){
  if(timerDuration===0)return;
  if(timerRemaining<=0)timerRemaining=timerDuration;
  timerRunning=true;document.getElementById('timerHint').textContent='tap to pause';
  timerInterval=setInterval(function(){timerRemaining--;updateTimerDisplay();if(timerRemaining<=0){stopTimer();timerExpired();}},1000);
}
function stopTimer(){clearInterval(timerInterval);timerRunning=false;if(timerDuration>0&&timerRemaining>0)document.getElementById('timerHint').textContent='tap to start';}
function timerExpired(){
  document.getElementById('timerHint').textContent='time\'s up!';
  document.getElementById('timerRing').classList.add('danger');
  var f=0,iv=setInterval(function(){
    var r=document.getElementById('timerRing');
    r.style.opacity=r.style.opacity==='0.4'?'1':'0.4';
    if(++f>5){clearInterval(iv);r.style.opacity='1';}
  },200);
}
function updateTimerDisplay(){
  if(timerDuration===0)return;
  document.getElementById('timerDisplay').textContent=timerRemaining;
  var r=timerRemaining/timerDuration;
  document.getElementById('timerArc').style.strokeDashoffset=308*(1-r);
  var ring=document.getElementById('timerRing');ring.classList.remove('warning','danger');
  if(r<=0.25)ring.classList.add('danger');else if(r<=0.5)ring.classList.add('warning');
}
</script>
</body>
</html>
