<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work &amp; Careers — Word Bank — John + English</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#4A90D9;--sky-light:#E8F2FD;--sea:#2EC4B6;--sea-light:#E4F8F6;
  --coral:#FF6B6B;--coral-light:#FFE8E8;--lavender:#9B72CF;--lavender-light:#F0E8FA;
  --cream:#FFFCF7;--ink:#2D3047;--muted:#7A7D8E;--border:#E8E5DF;--card:#fff;
  --radius:14px;--radius-sm:10px;
  --shadow-sm:0 1px 3px rgba(45,48,71,.06);--shadow-md:0 4px 14px rgba(45,48,71,.08);
  --accent:#4A90D9;--accent-light:#E8F2FD;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:28px 28px;opacity:.4;pointer-events:none;z-index:0}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,252,247,.88);backdrop-filter:blur(16px);border-bottom:1.5px solid var(--border);padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--sky)}
.nav-links{display:flex;gap:1.8rem}
.nav-links a{font-size:.85rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--sky)}

.page-header{padding:5.5rem 2rem 1.5rem;max-width:900px;margin:0 auto;position:relative;z-index:1}
.back-link{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:1.2rem;transition:color .2s}
.back-link:hover{color:var(--sky)}
.back-link svg{width:14px;height:14px}
.topic-hero{display:flex;align-items:flex-start;gap:1.2rem}
.topic-icon{width:52px;height:52px;border-radius:12px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topic-icon svg{width:24px;height:24px;stroke-width:1.8;fill:none;stroke:currentColor}
.section-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.3rem}
.page-header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:400;line-height:1.1;margin-bottom:.4rem}
.page-header p{color:var(--muted);font-size:.9rem;max-width:540px;line-height:1.6}
.header-meta{margin-top:.8rem}
.meta-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted)}

.tabs-wrap{max-width:900px;margin:0 auto;padding:0 2rem;position:relative;z-index:1}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:2rem;align-items:center}
.tab{font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;padding:.7rem 1.4rem;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:color .2s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.main{max-width:900px;margin:0 auto;padding:0 2rem 4rem;position:relative;z-index:1}
.panel{display:none}
.panel.active{display:block}

/* Filter bar */
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.cat-btn{font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;padding:.4rem 1rem;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;transition:all .18s}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Tier sections */
.cat-section{margin-bottom:1.4rem;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.cat-header{display:flex;align-items:center;justify-content:space-between;gap:.7rem;padding:.5rem 1rem;background:var(--accent-light);border-bottom:1.5px solid var(--border);border-left:3px solid var(--accent);cursor:pointer;user-select:none}
.cat-header:hover{filter:brightness(.97)}
.cat-title{font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--accent)}
.cat-chevron{color:var(--accent);transition:transform .2s;font-size:.75rem;opacity:.7;flex-shrink:0}
.cat-section.collapsed .cat-chevron{transform:rotate(-90deg)}
.cat-section.collapsed .cat-body{display:none}

/* POS sub-headers */
.pos-group{margin-bottom:.1rem}
.pos-subhead{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:.38rem 1rem .3rem;border-bottom:1px solid var(--border);border-top:1px solid var(--border);border-left:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.pos-subhead:hover{filter:brightness(.96)}
.pos-chevron{transition:transform .2s;font-size:.65rem;opacity:.6;flex-shrink:0}
.pos-group.collapsed .pos-chevron{transform:rotate(-90deg)}
.pos-group.collapsed .word-list-inner{display:none}
.pos-group:first-child .pos-subhead{border-top:none}

/* Word rows - Option D */
.word-list{width:100%}
.word-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;padding:.5rem 1rem}
.word-row:last-child{border-bottom:none}
.word-row:hover{background:var(--accent-light)}
.word-row.open{background:var(--accent-light)}
.wr-main{display:flex;align-items:baseline;gap:.5rem}
.wr-term{font-weight:800;font-size:.88rem;line-height:1.4}
.wr-def{font-size:.8rem;color:var(--muted);line-height:1.4;margin-top:.15rem}
.wr-ex{display:none;font-size:.78rem;font-style:italic;color:var(--muted);margin-top:.25rem;padding:.3rem .5rem;border-left:2px solid var(--border);line-height:1.5}
.word-row.open .wr-ex{display:block}

/* Conversation */
.conv-controls{display:flex;align-items:center;gap:.5rem;margin-bottom:1.2rem}
.conv-ctrl-label{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-right:.2rem}
.conv-hide-btn{font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;padding:.35rem .8rem;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;transition:all .18s}
.conv-hide-btn:hover{border-color:var(--ink);color:var(--ink)}
.conv-hide-btn.active-a{background:var(--sky);border-color:var(--sky);color:#fff}
.conv-hide-btn.active-b{background:var(--sea);border-color:var(--sea);color:#fff}
.hide-a .conv-speaker-a ~ span{visibility:hidden}
.hide-b .conv-speaker-b ~ span{visibility:hidden}
.conv-section{margin-bottom:1.4rem;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.conv-header{display:flex;align-items:center;gap:.7rem;padding:.5rem 1rem;background:var(--sea-light);border-bottom:1.5px solid var(--border);border-left:3px solid var(--sea)}
.conv-title{font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--sea)}
.conv-entry{border-bottom:1px solid var(--border);padding:.65rem 1rem}
.conv-entry:last-child{border-bottom:none}
.conv-dialogue{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.35rem}
.conv-line{font-size:.82rem;line-height:1.5;display:grid;grid-template-columns:16px 1fr;gap:.5rem}
.conv-speaker{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;padding-top:.18rem}
.conv-speaker-a{color:var(--sky)}
.conv-speaker-b{color:var(--sea)}
.conv-note{font-size:.73rem;color:var(--muted);font-style:italic;padding-left:24px}


/* ── Print button ── */
.print-btn{margin-left:auto;display:inline-flex;align-items:center;gap:.45rem;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:600;padding:.45rem .9rem;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--ink);cursor:pointer;transition:all .18s;flex-shrink:0}
.print-btn:hover{border-color:var(--ink);background:var(--ink);color:var(--cream)}
@media print{.print-btn{display:none}}

/* ── Print modal ── */
.print-modal-backdrop{position:fixed;inset:0;background:rgba(45,48,71,.5);backdrop-filter:blur(3px);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
.print-modal-backdrop.open{display:flex}
.print-modal{background:var(--card);border-radius:var(--radius);max-width:440px;width:100%;padding:1.8rem;box-shadow:0 20px 60px rgba(45,48,71,.25);max-height:90vh;overflow-y:auto}
.print-modal h3{font-family:'DM Serif Display',serif;font-size:1.4rem;font-weight:400;color:var(--ink);margin-bottom:.3rem}
.print-modal-desc{font-size:.85rem;color:var(--muted);margin-bottom:1.4rem}
.print-field{margin-bottom:1.1rem}
.print-field-label{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:block}
.print-opts{display:flex;flex-direction:column;gap:.4rem}
.print-opt{display:flex;align-items:flex-start;gap:.6rem;padding:.65rem .8rem;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:#fff}
.print-opt:hover{border-color:var(--muted);background:var(--cream)}
.print-opt input{margin:.15rem 0 0 0;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.print-opt-content{flex:1;display:flex;flex-direction:column;gap:.1rem}
.print-opt-title{font-size:.9rem;font-weight:700;color:var(--ink);line-height:1.3}
.print-opt-desc{font-size:.78rem;color:var(--muted);line-height:1.4}
.print-opt:has(input:checked){border-color:var(--accent);background:var(--accent-light)}
.print-opt:has(input:checked) .print-opt-title{color:var(--accent)}
.print-actions{display:flex;gap:.6rem;margin-top:1.4rem;justify-content:flex-end}
.print-btn-cancel{font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;padding:.6rem 1.2rem;border-radius:10px;cursor:pointer;background:var(--card);border:1.5px solid var(--border);color:var(--muted);transition:all .15s}
.print-btn-cancel:hover{border-color:var(--muted);color:var(--ink)}
.print-btn-go{font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;padding:.6rem 1.2rem;border-radius:10px;cursor:pointer;background:var(--accent);border:1.5px solid var(--accent);color:#fff;transition:opacity .15s}
.print-btn-go:hover{opacity:.85}

.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
@media(max-width:600px){.page-header{padding:5rem 1.2rem 1.2rem}.main,.tabs-wrap{padding:0 1.2rem 3rem}}
</style>
</head>

  <div class="panel" id="panel-conversation">
    <div class="conv-controls">
      <span class="conv-ctrl-label">Practise</span>
      <button class="conv-hide-btn" id="conv-hide-a" onclick="toggleHide('A')">Hide A</button>

    </div>
    <div id="conv-content"></div>

</div>

<script>
const CATEGORIES = [
  { key: 'tier1', label: 'Tier 1 — Essential',     pos: '' },
  { key: 'tier2', label: 'Tier 2 — Intermediate',  pos: '' },
  { key: 'tier3', label: 'Tier 3 — Advanced',      pos: '' },
];

// Each entry: [term, pos, definition, example, level]
const DATA = {
  tier1: [
    // Nouns
    ['job',              'n.',      'a paid position of regular employment',                                          'She\'s been looking for a job since finishing university.',                    'B2'],
    ['work',             'n.',      'activity involving mental or physical effort done to earn money',                'How\'s work going? — Busy, but I\'m enjoying it.',                           'B2'],
    ['salary',           'n.',      'a fixed regular payment for employment, usually monthly',                       'His salary doubled when he moved to the private sector.',                     'B2'],
    ['boss',             'n.',      'a person\'s manager or employer',                                               'My boss asked me to stay late to finish the report.',                         'B2'],
    ['colleague',        'n.',      'a person you work with',                                                        'She gets on well with all her colleagues.',                                    'B2'],
    ['employee',         'n.',      'a person who works for someone else in exchange for payment',                   'The company has over two hundred employees.',                                 'B2'],
    ['employer',         'n.',      'a person or organisation that employs people',                                   'Your employer is legally required to provide a safe working environment.',    'B2'],
    ['career',           'n.',      'the series of jobs a person has over their working life',                       'She\'s built an impressive career in finance over twenty years.',             'B2'],
    ['contract',         'n.',      'a formal agreement between employer and employee',                              'Always read your contract carefully before signing.',                         'B2'],
    ['interview',        'n.',      'a formal meeting to assess a candidate for a job',                              'He was nervous before the interview but it went well.',                       'B2'],
    ['CV',               'n.',      'a document summarising your education, skills, and work history',               'Make sure your CV is up to date before applying.',                           'B2'],
    ['deadline',         'n.',      'the latest time by which something must be completed',                          'The deadline is Friday — there\'s no time to waste.',                         'B2'],
    ['promotion',        'n.',      'advancement to a higher position or rank',                                      'She was offered a promotion after just two years.',                           'B2'],
    ['pay rise',         'n.',      'an increase in salary',                                                         'She asked for a pay rise after her annual appraisal.',                       'B2'],
    ['skills',           'n.',      'abilities or expertise that enable you to do a job well',                       'Strong communication skills are essential in most workplaces.',               'B2'],
    ['experience',       'n.',      'knowledge or skill gained through doing a job over time',                       'The role requires at least two years of relevant experience.',                'B2'],
    ['shift',            'n.',      'a set period of time worked, especially in a job with rotating hours',          'She works the night shift three times a week.',                              'B2'],
    ['overtime',         'n.',      'time worked beyond normal hours, usually paid at a higher rate',                'He\'s been doing overtime to meet the project deadline.',                    'B2'],
    ['office',           'n.',      'a room or building where people work at desks',                                 'She works in an open-plan office in the city centre.',                       'B2'],
    ['meeting',          'n.',      'a gathering of people to discuss something at work',                            'We have a team meeting every Monday morning.',                                'B2'],
    // Adjectives
    ['employed',         'adj.',    'having a paid job',                                                             'She\'s been fully employed since graduating three years ago.',               'B2'],
    ['unemployed',       'adj.',    'without a paid job; out of work',                                               'He\'s been unemployed for six months and is actively looking.',              'B2'],
    ['full-time',        'adj.',    'working or involving the standard number of hours per week',                    'She\'s looking for a full-time position in marketing.',                      'B2'],
    ['part-time',        'adj.',    'working fewer hours than the standard working week',                            'He works part-time while studying for his degree.',                          'B2'],
    ['experienced',      'adj.',    'having knowledge and skill from doing something for a long time',               'We\'re looking for an experienced project manager.',                         'B2'],
    ['skilled',          'adj.',    'having the ability to do something well, especially through training',          'Skilled workers are in high demand in the construction industry.',           'B2'],
    ['senior',           'adj.',    'at a high or higher level within an organisation',                              'She\'s a senior manager with responsibility for a team of fifteen.',         'B2'],
    ['junior',           'adj.',    'at a low or lower level within an organisation; less experienced',              'He started as a junior developer and worked his way up.',                    'B2'],
    // Verbs
    ['work',             'v.',      'to do a job or task, especially for money',                                     'She works for a large international bank.',                                   'B2'],
    ['apply',            'v.',      'to formally request to be considered for a job',                                'I applied for three jobs this week.',                                         'B2'],
    ['hire',             'v.',      'to employ someone for a job',                                                   'They\'re hiring ten new staff for the summer.',                              'B2'],
    ['fire',             'v.',      'to dismiss someone from their job',                                             'He was fired for repeatedly missing deadlines.',                             'B2'],
    ['quit',             'v.',      'to leave a job, often without much notice',                                     'She quit her job and went travelling for a year.',                           'B2'],
    ['retire',           'v.',      'to stop working permanently, usually at a certain age',                         'He plans to retire at sixty-five.',                                          'B2'],
    ['earn',             'v.',      'to receive money in exchange for work',                                         'She earns considerably more since changing companies.',                      'B2'],
    ['manage',           'v.',      'to be in charge of a team or organisation',                                     'He manages a team of twelve people across two offices.',                     'B2'],
    ['commute',          'v.',      'to travel regularly between home and work',                                     'She commutes two hours each way by train.',                                   'B2'],
    ['train',            'v.',      'to teach or learn the skills needed for a job',                                 'New staff are trained over their first two weeks.',                          'B2'],
    // Phrasal verbs
    ['take on',          'phr.v.', 'to accept new work or employ new staff',                                        'The company decided to take on twenty new apprentices.',                      'B2'],
    ['hand in',          'phr.v.', 'to formally submit something, such as a resignation or work',                   'She handed in her notice after ten years at the firm.',                      'B2'],
    // Collocations
    ['get a job',        'colloc.', 'to successfully obtain employment',                                             'It took him three months to get a job after graduating.',                    'B2'],

    ['be out of work',   'colloc.', 'to be unemployed',                                                              'He\'s been out of work since the factory closed.',                          'B2'],
    ['go to work',       'colloc.', 'to travel to your place of work',                                               'She goes to work by bike when the weather\'s good.',                        'B2'],
    // Idioms & slang
    ['get the sack',     'idiom',   'to be dismissed from a job (informal)',                                          'He got the sack after arriving late for the third time.',                    'B2'],
    ['on sick leave',    'phrase',  'absent from work due to illness',                                                'He\'s been on sick leave for the past two weeks.',                          'B2'],
    ['on annual leave',  'phrase',  'taking authorised holiday from work',                                            'I\'m afraid she\'s on annual leave until next Monday.',                     'B2'],
  ],
  tier2: [
    // Nouns
    ['workload',         'n.',      'the amount of work a person is expected to do',                                  'Her workload has increased significantly since the merger.',                 'B2'],
    ['redundancy',       'n.',      'the state of being made unemployed because the job is no longer needed',         'He was offered voluntary redundancy after the restructure.',                 'C1'],
    ['appraisal',        'n.',      'a formal assessment of an employee\'s performance',                              'Her annual appraisal highlighted strengths and areas for improvement.',      'C1'],
    ['initiative',       'n.',      'the ability to act independently without prompting',                             'She showed real initiative by identifying the problem early.',                'B2'],
    ['incentive',        'n.',      'something that motivates someone to work harder or behave in a certain way',     'A performance bonus is a powerful incentive for staff.',                    'B2'],
    ['vacancy',          'n.',      'a job or position that is available and needs to be filled',                     'There are two vacancies in the marketing department.',                       'B2'],
    ['reference',        'n.',      'a statement from a previous employer confirming your work history',              'She asked her old manager for a reference before applying.',                 'B2'],
    // Adjectives
    ['rewarding',        'adj.',    'providing personal satisfaction or a sense of accomplishment',                   'She finds working with children deeply rewarding.',                         'B2'],
    ['demanding',        'adj.',    'requiring a lot of skill, time, or effort',                                      'Teaching can be one of the most demanding jobs there is.',                  'B2'],
    ['self-employed',    'adj.',    'working for oneself rather than for an employer',                                 'As a freelancer, he has been self-employed for five years.',                'B2'],
    ['flexible',         'adj.',    'able to adapt working hours or conditions to suit the employee',                  'The role requires someone flexible who can handle shifting priorities.',    'B2'],
    ['motivated',        'adj.',    'having a strong desire to do or achieve something',                               'She\'s highly motivated and rarely needs to be chased for work.',          'B2'],
    // Verbs

// ── State ──
let activeCat = 'all';
let hiddenSpeaker = null;

// ── Helpers ──
function slugify(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

// ── Browse ──
function renderBrowse() {
  const container = document.getElementById('browse-content');
  const cats = activeCat === 'all' ? CATEGORIES : CATEGORIES.filter(c=>c.key===activeCat);
  let html = ''; let total = 0;
  cats.forEach(cat => {
    const entries = DATA[cat.key]||[];
    if (!entries.length) return;
    total += entries.length;
    html += `<div class="cat-section"><div class="cat-header"><span class="cat-title">${cat.label}</span></div><div class="word-list">`;
    const groups = {};
    entries.forEach(([term,pos,def,ex],i)=>{ if(!groups[pos]) groups[pos]=[]; groups[pos].push({term,pos,def,ex,i}); });
    POS_ORDER.forEach(pos=>{
      if (!groups[pos]) return;
      const label = POS_LABELS[pos]||pos;
      const [fg,bg] = POS_COLORS[pos]||['var(--muted)','var(--cream)'];
      html += `<div class="pos-group"><div class="pos-subhead" style="color:${fg};background:${bg};border-left-color:${fg}">${label}</div>`;
      groups[pos].forEach(({term,def,ex,i})=>{
        html += `<div class="word-row" onclick="toggleRow(this)">
          <div class="wr-main"><span class="wr-term">${term}</span></div>
          <div class="wr-def">${def}</div>
          ${ex ? `<div class="wr-ex">${ex}</div>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div></div>`;
  });
  if (!html) html = '<div class="empty-state">No items.</div>';
  container.innerHTML = html;
  document.getElementById('totalCount').textContent = total + ' items';
}

function toggleRow(row){ row.classList.toggle('open'); }

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBrowse();
}

// ── Conversation ──
function renderConversation() {
  const container = document.getElementById('conv-content');
  let html = '';
  CONV_DATA.forEach(section => {
    html += `<div class="conv-section"><div class="conv-header" onclick="toggleCat(this)"><span class="conv-title">${section.group}</span><span class="cat-chevron" style="color:var(--sea)">&#9660;</span></div><div class="cat-body">`;
    section.entries.forEach(e => {
      const lines = e.lines.map((l,i) => {
        const scls = i===0?'conv-speaker-a':'conv-speaker-b';
        const lbl = i===0?'A':'B';
        return `<div class="conv-line"><span class="conv-speaker ${scls}">${lbl}</span><span>${l[1]}</span></div>`;
      }).join('');
      html += `<div class="conv-entry"><div class="conv-dialogue">${lines}</div><div class="conv-note">${e.note}</div></div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function toggleHide(speaker) {
  const container = document.getElementById('conv-content');
  const btn = document.getElementById('conv-hide-'+speaker.toLowerCase());
  if (hiddenSpeaker === speaker) {
    hiddenSpeaker = null;
    container.classList.remove('hide-a','hide-b');
    document.getElementById('conv-hide-a').classList.remove('active-a');
    document.getElementById('conv-hide-b').classList.remove('active-b');
  } else {
    hiddenSpeaker = speaker;
    container.classList.remove('hide-a','hide-b');
    container.classList.add('hide-'+speaker.toLowerCase());
    document.getElementById('conv-hide-a').classList.remove('active-a');
    document.getElementById('conv-hide-b').classList.remove('active-b');
    btn.classList.add('active-'+speaker.toLowerCase());
  }
}

// ── Tab switch ──
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── PRINT ──
function openPrintModal() {
  var scope = document.querySelector('input[name="wbScope"]:checked').value;
  toggleFormatField(scope);
  document.getElementById('printModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePrintModal(e) {
  if (e && e.target !== document.getElementById('printModal')) return;
  document.getElementById('printModal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('change', function(e) {
  if (e.target.name === 'wbScope') toggleFormatField(e.target.value);
});
function toggleFormatField(scope) {
  document.getElementById('print-format-field').style.display = scope === 'conversation' ? 'none' : '';
}

function executePrint() {
  var scope = document.querySelector('input[name="wbScope"]:checked').value;
  var format = document.querySelector('input[name="wbFormat"]:checked').value;
  var topic = 'Work & Careers';

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<title>' + topic + ' — Word Bank</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">'
    + '<style>'
    + '@page{margin:1.4cm 1.8cm}'
    + '*{margin:0;padding:0;box-sizing:border-box}'
    + 'body{font-family:Nunito,sans-serif;color:#2D3047;font-size:10pt;line-height:1.5}'
    + '.header{display:flex;align-items:baseline;justify-content:space-between;border-bottom:2pt solid #E8E5DF;padding-bottom:4pt;margin-bottom:10pt;page-break-after:avoid}'
    + 'h1{font-family:"DM Serif Display",serif;font-size:17pt;font-weight:400}'
    + '.meta{font-family:"JetBrains Mono",monospace;font-size:7.5pt;color:#7A7D8E}'
    + '.tier{margin-bottom:16pt;break-inside:avoid-page}'
    + '.tier-name{font-family:"JetBrains Mono",monospace;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#4A90D9;padding:3pt 0;border-bottom:1.5pt solid #E8E5DF;margin-bottom:4pt}'
    + '.pos-name{font-family:"JetBrains Mono",monospace;font-size:6.5pt;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7A7D8E;margin:6pt 0 2pt;padding-top:4pt;border-top:0.5pt solid #f0ede8}'
    + '.pos-name:first-child{border-top:none;margin-top:0}'
    + 'table{width:100%;border-collapse:collapse;margin-bottom:4pt}'
    + 'td{padding:3pt 5pt;vertical-align:top;border-bottom:0.5pt solid #f5f3ef;font-size:10pt}'
    + 'td.term{font-weight:800;width:26%}'
    + 'td.def{color:#555;width:40%}'
    + 'td.ex{font-style:italic;color:#888;width:34%}'
    + 'td.ws-line{border-bottom:1pt solid #bbb;min-width:200pt}'
    + '.conv-group{margin-bottom:14pt;break-inside:avoid}'
    + '.conv-group-name{font-family:"JetBrains Mono",monospace;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#2EC4B6;padding:3pt 0;border-bottom:1.5pt solid #E8E5DF;margin-bottom:6pt}'
    + '.conv-entry{margin-bottom:8pt}'
    + '.conv-line{display:grid;grid-template-columns:14pt 1fr;gap:3pt;font-size:10pt;line-height:1.6}'
    + '.spk{font-family:"JetBrains Mono",monospace;font-size:7pt;font-weight:700;padding-top:2pt}'
    + '.spk-a{color:#4A90D9}.spk-b{color:#2EC4B6}'
    + '.conv-note{font-size:8.5pt;font-style:italic;color:#7A7D8E;margin-top:2pt;padding-left:17pt}'
    + '</style></head><body>'
    + '<div class="header"><h1>' + topic + '</h1>'
    + '<span class="meta">' + (scope==='conversation' ? 'Conversation Exchanges' : (scope==='all'?'All Tiers':CATEGORIES.find(function(c){return c.key===scope;}).label)) + '</span></div>';

  if (scope === 'conversation') {
    // header already printed above
    CONV_DATA.forEach(function(section) {
      html += '<div class="conv-group"><div class="conv-group-name">' + section.group + '</div>';
      section.entries.forEach(function(e) {
        html += '<div class="conv-entry">';
        e.lines.forEach(function(l, i) {
          var scls = i === 0 ? 'spk-a' : 'spk-b';
          var lbl = i === 0 ? 'A' : 'B';
          html += '<div class="conv-line"><span class="spk ' + scls + '">' + lbl + '</span><span>' + l[1] + '</span></div>';
        });
        html += '<div class="conv-note">' + e.note + '</div></div>';
      });
      html += '</div>';
    });
  } else {
    var tiers = scope === 'all' ? ['tier1','tier2','tier3'] : [scope];
    // header already printed above
    tiers.forEach(function(tk) {
      var cat = CATEGORIES.find(function(c){return c.key===tk;});
      if (!cat) return;
      var entries = DATA[tk]||[];
      if (!entries.length) return;
      html += '<div class="tier"><div class="tier-name">' + cat.label + '</div>';
      // Group by pos
      var groups = {};
      entries.forEach(function(e){ if(!groups[e[1]]) groups[e[1]]=[]; groups[e[1]].push(e); });
      POS_ORDER.forEach(function(pos) {
        if (!groups[pos]) return;
        html += '<div class="pos-name">' + (POS_LABELS[pos]||pos) + '</div><table>';
        groups[pos].forEach(function(e) {
          if (format === 'full') {
            html += '<tr><td class="term">' + e[0] + '</td><td class="def">' + e[2] + '</td><td class="ex">' + (e[3]||'') + '</td></tr>';
          } else if (format === 'compact') {
            html += '<tr><td class="term">' + e[0] + '</td><td class="def">' + e[2] + '</td></tr>';
          } else {
            html += '<tr><td class="term">' + e[0] + '</td><td class="ws-line"></td></tr>';
          }
        });
        html += '</table>';
      });
      html += '</div>';
    });
  }

  html += '</body></html>';
  var win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
  win.onload = function(){ win.focus(); win.print(); };
  document.getElementById('printModal').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleCat(hdr) {
  hdr.parentElement.classList.toggle('collapsed');
}
function togglePos(hdr) {
  hdr.parentElement.classList.toggle('collapsed');
}

// ── Init ──
renderBrowse();
renderConversation();
</script>

          <div class="print-opt-content">
            <span class="print-opt-title">Full reference</span>
            <span class="print-opt-desc">Term, definition, and example sentence</span>
          </div>
        </label>
        <label class="print-opt">
          <input type="radio" name="wbFormat" value="compact">
          <div class="print-opt-content">
            <span class="print-opt-title">Compact</span>
            <span class="print-opt-desc">Term and definition only</span>
          </div>
        </label>
        <label class="print-opt">
          <input type="radio" name="wbFormat" value="worksheet">
          <div class="print-opt-content">
            <span class="print-opt-title">Worksheet</span>
            <span class="print-opt-desc">Terms listed with blank lines for definitions</span>
          </div>
        </label>
      </div>
    </div>
    <div class="print-actions">
      <button class="print-btn-cancel" onclick="closePrintModal()">Cancel</button>
      <button class="print-btn-go" onclick="executePrint()">Print</button>
    </div>
  </div>
</div>
</body>
</html>
