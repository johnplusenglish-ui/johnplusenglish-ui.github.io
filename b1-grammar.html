<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B1 Grammar — JohnPlusEnglish</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#2176FF;--sea:#1DD3B0;--coral:#FF6B6B;--sun:#FFB347;--lav:#9B72CF;
  --cream:#F7F6F3;--ink:#2D3047;--ink2:#4A4E6B;--ink3:#8B8FA8;
  --a1:#FF6B6B;--a1bg:#FFEEEE;--a1dark:#C0001A;
  --radius:14px;--radius-sm:8px;
  --card-shadow:0 1px 3px rgba(45,48,71,.07),0 4px 16px rgba(45,48,71,.05);
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:15px}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:13px 32px;background:#fff;border-bottom:1px solid #E8E6E0;position:sticky;top:0;z-index:200;}
.logo{font-weight:900;font-size:17px;letter-spacing:-0.02em}
.logo span{color:var(--sky)}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;padding:6px 12px;border-radius:20px;border:1px solid #E8E6E0;background:transparent;transition:all .15s;font-family:'Outfit',sans-serif;}
.nav-back:hover{background:var(--cream);color:var(--ink)}
.nav-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)}
.nav-breadcrumb span{color:var(--sky);font-weight:600}
.nav-breadcrumb .sep{opacity:.4;color:var(--ink3)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 53px)}
.sidebar{background:#fff;border-right:1px solid #E8E6E0;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-head{padding:20px 20px 14px;border-bottom:1px solid #F0EEE8;}
.level-pill{display:inline-flex;align-items:center;gap:5px;background:var(--a1bg);color:var(--a1);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px;}
.sidebar-head h2{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
.sidebar-head p{font-size:12px;color:var(--ink3);margin-top:3px;line-height:1.45}
.topic-nav{padding:8px 0;flex:1}
.topic-link{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background .12s;border:none;background:transparent;width:100%;text-align:left;font-family:'Outfit',sans-serif;}
.topic-link:hover{background:#F7F6F3}
.topic-link.active{background:var(--a1bg)}
.topic-link.done .tl-check{background:var(--sea);border-color:var(--sea);color:#fff}
.tl-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3);width:16px;flex-shrink:0}
.tl-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #D4D2CA;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;color:var(--sea);transition:all .2s;}
.topic-link.active .tl-check{border-color:var(--a1)}
.tl-name{font-size:13px;color:var(--ink2);font-weight:400;line-height:1.3}
.topic-link.active .tl-name{color:var(--a1);font-weight:600}
.topic-link.done .tl-name{color:var(--ink3)}
.sidebar-foot{padding:14px 20px;border-top:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.prog-bar{flex:1;height:4px;background:#E8E6E0;border-radius:2px;margin-right:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--sea);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-text{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink3);white-space:nowrap}
.main{padding:0;overflow:visible}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-hero{padding:36px 40px 28px;border-bottom:1px solid #E8E6E0;background:linear-gradient(135deg,#fff 0%,#F2F7FF 100%);}
.lesson-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.level-tag{background:var(--a1bg);color:var(--a1);font-weight:700}
.lesson-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3)}
.lesson-hero h1{font-size:32px;font-weight:900;letter-spacing:-.03em;color:var(--ink);line-height:1.1;margin-bottom:8px}
.lesson-hero p{font-size:15px;color:var(--ink2);line-height:1.6;max-width:580px}
.lesson-toolbar{display:flex;align-items:center;gap:8px;margin-top:20px;}
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--sky);color:#fff}
.btn-primary:hover{background:#1a6ae8;transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--ink2);border:1px solid #E0DED8}
.btn-ghost:hover{background:var(--cream)}
.btn-done{background:var(--sea);color:#fff}
.btn-done:hover{background:#17b89e;transform:translateY(-1px)}
.lesson-body{padding:32px 40px;display:flex;flex-direction:column;gap:8px}
.section-label{display:flex;align-items:center;gap:10px;margin-bottom:0;margin-top:8px;padding:9px 14px;background:var(--ink);border-radius:6px;cursor:pointer;user-select:none;transition:background .15s;}
.section-label:hover{background:#2D3047}
.btn-toggle-all{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);background:transparent;border:1px solid #D8D6D0;border-radius:20px;padding:5px 14px;cursor:pointer;transition:all .15s;}
.btn-toggle-all:hover{background:var(--cream);color:var(--ink);border-color:#B0AEA6;}
.section-label-chevron{margin-left:auto;display:flex;align-items:center;color:rgba(255,255,255,.5);transition:transform .2s;}
.section-label.collapsed .section-label-chevron{transform:rotate(-90deg)}
.section-body{overflow:visible;transition:max-height .25s ease,opacity .2s ease,margin-top .2s ease;max-height:4000px;opacity:1;margin-top:14px;}
.section-body.collapsed{max-height:0;opacity:0;margin-top:0;overflow:hidden;}
.section-label-icon{display:flex;align-items:center;color:#fff;flex-shrink:0}
.section-label h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#fff}
.explain-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;padding:26px 28px;box-shadow:var(--card-shadow);}
.explain-lead{font-size:16px;font-weight:600;color:var(--ink);line-height:1.55;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #F0EEE8;}
.explain-lead em{font-style:normal;color:var(--sky);font-weight:700}
.explain-body{font-size:14px;color:var(--ink2);line-height:1.8}
.explain-body p{margin-bottom:14px}
.explain-body p:last-child{margin-bottom:0}
.explain-body .rule{display:flex;gap:14px;align-items:flex-start;background:var(--cream);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
.explain-body .rule:last-of-type{margin-bottom:0}


.explain-body .rule-text{font-size:14px;color:var(--ink2);line-height:1.7}
.explain-body .rule-text strong{color:var(--ink)}
.explain-body .rule-text em{font-style:normal;color:var(--a1);font-weight:600}
.explain-body .rule-num:empty{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--a1);margin-top:6px;}
.explain-body .rule-num:not(:empty){flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--a1);font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.explain-body .note{background:var(--a1bg);border-left:3px solid var(--a1);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:14px;font-size:13px;color:var(--ink2);line-height:1.65}
.explain-body .note strong{color:var(--ink)}
.explain-body .rule{display:flex;gap:14px;align-items:flex-start;background:var(--cream);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
.explain-body .rule:last-of-type{margin-bottom:0}


.explain-body .rule-text{font-size:14px;color:var(--ink2);line-height:1.7}
.explain-body .rule-text strong{color:var(--ink)}
.explain-body .rule-text em{font-style:normal;color:var(--a1);font-weight:600}
.explain-body .rule-num:empty{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--a1);margin-top:6px;}
.explain-body .rule-num:not(:empty){flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--a1);font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.explain-body .note{background:var(--a1bg);border-left:3px solid var(--a1);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:14px;font-size:13px;color:var(--ink2);line-height:1.65}
.explain-body .note strong{color:var(--ink)}
.form-table{width:100%;border-collapse:collapse;font-size:14px}
.form-table th{background:#EEF2FF;color:var(--ink);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;text-align:left;}
.form-table th:first-child{border-radius:8px 0 0 0}
.form-table th:last-child{border-radius:0 8px 0 0}
.form-table td{padding:11px 14px;border-bottom:1px solid #F0EEE8;color:var(--ink2);font-size:14px}
.form-table tr:last-child td{border-bottom:none}
.form-table tr:nth-child(even) td{background:#FAFAF8}
.form-table .subject{font-weight:700;color:var(--ink)}
.form-table .form{color:var(--ink2)}
.form-table .neg{color:var(--ink2)}
.form-table .example{color:var(--ink2);font-style:italic}
.form-table .example{color:var(--ink2);font-style:italic}
.examples-grid{display:grid;gap:10px}
.example-item{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.ex-marker{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px;}
.ex-marker.pos{background:#E8F8F5;color:var(--sea)}
.ex-marker.neg{background:#FFF0F0;color:var(--coral)}
.ex-marker.q{background:var(--a1bg);color:var(--sky)}
.ex-eng{font-size:14px;font-weight:600;color:var(--ink)}
.ex-note{font-size:12px;color:var(--ink3);margin-top:2px}
.error-card{background:#fff;border-radius:var(--radius);padding:20px 22px;border:1px solid #E0DED8;}
.error-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:14px}
.error-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.error-bad,.error-good{border-radius:var(--radius-sm);padding:11px 14px}
.error-bad{background:#FFF5F5;border:1px solid #FCDADA}
.error-good{background:#F0FBF8;border:1px solid #C0EDE4}
.error-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.error-bad .error-label{color:var(--coral)}
.error-good .error-label{color:#0F7A6A}
.error-text{font-size:14px;color:var(--ink);font-weight:500;font-style:italic}
.error-bad .error-text{color:#B84040}
.error-good .error-text{color:#0F5A4A}
.error-reason{font-size:13px;color:var(--ink3);margin-top:10px;margin-bottom:4px;grid-column:1/-1;padding:0 2px}
.exercise-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;overflow:visible;box-shadow:var(--card-shadow);}
.ex-card-header{padding:16px 20px;border-bottom:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.ex-card-title{font-size:14px;font-weight:700;color:var(--ink)}
.ex-card-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.ex-type-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:#F0F0F0;color:var(--ink3)}
.ex-card-body{padding:20px}
.gap-sentence{font-size:15px;color:var(--ink);line-height:2.4;margin-bottom:4px;display:flex;align-items:baseline;flex-wrap:wrap;gap:4px;}
.gap-sentence:last-child{margin-bottom:0}
.gap-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-right:4px}
.gap-input{display:inline-block;border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.gap-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.gap-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.gap-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.gap-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:baseline}
.gap-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.gap-reveal.show{opacity:1}
.mc-question{margin-bottom:20px}
.mc-question:last-child{margin-bottom:0}
.mc-text{font-size:14px;color:var(--ink);margin-bottom:10px;font-weight:500}
.mc-options{display:flex;flex-wrap:wrap;gap:8px}
.mc-opt{font-family:'Outfit',sans-serif;font-size:13px;padding:7px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.mc-opt:hover{border-color:var(--sky);color:var(--sky);background:var(--a1bg)}
.mc-opt.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600}
.mc-opt.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.mc-feedback{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:6px;display:none}
.mc-feedback.show{display:block}
.mc-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.mc-feedback.bad{background:#FFF0F0;color:#B84040}
.ec-item{margin-bottom:16px}
.ec-item:last-child{margin-bottom:0}
.ec-sentence{font-size:14px;background:#FFF8F0;border:1px solid #FFD8B0;border-radius:var(--radius-sm);padding:11px 14px;color:var(--ink);font-weight:500;margin-bottom:8px;}
.ec-input-row{display:flex;gap:8px;align-items:center}
.ec-input{flex:1;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.ec-input:focus{border-color:var(--sky)}
.ec-input.correct{border-color:var(--sea);background:#F0FBF8}
.ec-input.wrong{border-color:var(--coral);background:#FFF5F5}
.check-row{display:flex;gap:8px;margin-top:16px}
.btn-check{background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 20px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-check:hover{background:#1a6ae8}
.btn-reset{background:var(--cream);color:var(--ink3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:20px;border:1px solid #E0DED8;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#EDEBE5;color:var(--ink)}
.score-badge{display:none;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;margin-top:12px;}
.score-badge.show{display:inline-flex}
.score-badge.full{background:#E8F8F5;color:#0F7A6A}
.score-badge.partial{background:#FFF8E8;color:#8B6000}
.score-badge.low{background:#FFF0F0;color:#B84040}
.lesson-footer{padding:24px 40px;border-top:1px solid #E8E6E0;display:flex;align-items:center;justify-content:space-between;background:#fff;}
.footer-hint{font-size:12px;color:var(--ink3)}
.footer-nav{display:flex;gap:8px}
.real-use{background:linear-gradient(135deg,var(--a1bg) 0%,#F8F0FF 100%);border-radius:var(--radius);border:1px solid #C8DEFF;padding:20px 24px;}
.real-use h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sky);margin-bottom:12px}
.real-use ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.real-use li{font-size:13px;color:var(--ink2);line-height:1.6;padding-left:20px;position:relative;}
.real-use li::before{content:'→';position:absolute;left:0;color:var(--sky);font-weight:700}

/* ── JOHN\'S TIP ── */
.johns-tip{
  background:#FFFBF0;border:1.5px solid #FFD97A;border-radius:var(--radius);
  padding:18px 20px;display:flex;gap:14px;align-items:flex-start;
}
.tip-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--sky);color:#fff;
  font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:-.02em;
}
.tip-body{}
.tip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#B8860B;margin-bottom:5px}
.tip-text{font-size:13px;color:#5A4500;line-height:1.65}
.tip-text strong{color:#3A2D00;font-weight:700}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .lesson-hero{padding:24px 20px 20px}
  .lesson-body{padding:24px 20px}
  .lesson-footer{padding:16px 20px}
  .error-row{grid-template-columns:1fr}
}

/* ── SENTENCE BUILDER ── */
.sb-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:12px;}
.sb-word{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.sb-word:hover{border-color:var(--sky);color:var(--sky)}
.sb-word.used{opacity:.3;pointer-events:none;}
.sb-slot{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:10px 12px;border:2px dashed #C8DEFF;border-radius:var(--radius-sm);background:#FAFCFF;margin-bottom:12px;align-items:center;}
.sb-placed{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:var(--a1bg);border:1.5px solid var(--sky);border-radius:20px;cursor:pointer;color:var(--sky);user-select:none;transition:all .15s;}
.sb-placed:hover{background:#FFE8E8;border-color:var(--coral);color:var(--coral)}
.sb-sentence{margin-bottom:20px}
.sb-sentence:last-child{margin-bottom:0}
.sb-sentence-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-bottom:6px}
.sb-context{font-size:13px;color:var(--ink3);margin-bottom:8px;font-style:italic}
.sb-result{font-size:12px;margin-top:6px;padding:6px 12px;border-radius:6px;display:none}
.sb-result.show{display:block}
.sb-result.ok{background:#E8F8F5;color:#0F7A6A}
.sb-result.bad{background:#FFF0F0;color:#B84040}

/* ── MATCHING ── */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.match-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:8px;}
.match-item{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid #E0DED8;cursor:pointer;transition:all .15s;background:#fff;color:var(--ink2);font-family:'Outfit',sans-serif;text-align:left;width:100%;margin-bottom:6px;display:block;}
.match-item:last-child{margin-bottom:0}
.match-item:hover{border-color:var(--sky);color:var(--sky)}
.match-item.selected{border-color:var(--sky);background:var(--a1bg);color:var(--sky);font-weight:600}
.match-item.matched{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600;pointer-events:none;cursor:default;}
.match-item.wrong-flash{border-color:var(--coral)!important;background:#FFF0F0!important;color:var(--coral)!important}
.match-pairs{margin-top:12px;}
.match-pair-line{font-size:12px;display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #F0EEE8;color:var(--ink3);}
.match-pair-line:last-child{border-bottom:none}

/* ── TRANSFORMATION ── */
.transform-item{margin-bottom:16px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.transform-item:last-child{margin-bottom:0}
.transform-original{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:8px;line-height:1.5}
.transform-keyword{display:inline-block;background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin:0 2px;}
.transform-input{width:100%;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.transform-input:focus{border-color:var(--sky)}
.transform-input.correct{border-color:var(--sea);background:#F0FBF8}
.transform-input.wrong{border-color:var(--coral);background:#FFF5F5}
.transform-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:5px;opacity:0;transition:opacity .2s;min-height:16px}
.transform-reveal.show{opacity:1}

/* ── CATEGORISATION ── */
.cat-bank{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:14px;min-height:48px;}
.cat-word{font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.cat-word:hover{border-color:var(--sky);color:var(--sky)}
.cat-word.placed{opacity:.3;pointer-events:none;}
.cat-columns{display:grid;gap:10px;margin-bottom:12px;}
.cat-col{border-radius:var(--radius-sm);border:2px dashed #D0CEC8;padding:10px 12px;min-height:80px;transition:border-color .2s;}
.cat-col-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #E0DED8;}
.cat-placed{font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:4px 11px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;user-select:none;transition:all .15s;display:inline-block;margin:3px;}
.cat-placed:hover{opacity:.65}
.cat-col.checked-correct .cat-col-head{color:#0F7A6A}
.cat-col.checked-correct{border-color:var(--sea);border-style:solid;}
.cat-col.checked-wrong{border-color:var(--coral);border-style:solid;}

/* ── CONVERSATION FILL ── */
.convo-wrap{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;overflow:hidden;margin-bottom:12px;}
.convo-line{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid #F5F3EF;}
.convo-line:last-child{border-bottom:none}
.convo-speaker{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;width:28px;flex-shrink:0;padding-top:3px;}
.convo-speaker.a{color:var(--sky)}
.convo-speaker.b{color:var(--lav)}
.convo-text{font-size:14px;color:var(--ink);line-height:1.7;flex:1}
.convo-input{border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.convo-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.convo-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.convo-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.convo-gwrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:middle}
.convo-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.convo-reveal.show{opacity:1}

/* ── TRUE / FALSE / NOT GIVEN ── */
.tf-item{margin-bottom:10px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.tf-item:last-child{margin-bottom:0}
.tf-context{font-size:12px;color:var(--ink3);margin-bottom:6px;font-style:italic;line-height:1.5}
.tf-statement{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:10px;line-height:1.5}
.tf-options{display:flex;gap:8px;flex-wrap:wrap;}
.tf-btn{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.tf-btn:hover{border-color:var(--sky);background:var(--a1bg);color:var(--sky)}
.tf-btn.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A}
.tf-btn.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.tf-feedback{font-size:12px;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.tf-feedback.show{display:block}
.tf-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.tf-feedback.bad{background:#FFF0F0;color:#B84040}

.rich-section{margin-bottom:20px;}
.rich-section:last-child{margin-bottom:0}
.rich-heading{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--a1);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--a1bg);}
.rich-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:0;}
.rich-table th{background:var(--a1bg);color:var(--ink);font-weight:700;padding:8px 12px;text-align:left;font-size:12px;}
.rich-table td{padding:8px 12px;border-bottom:1px solid #F0EEE8;color:var(--ink2);vertical-align:top;line-height:1.55;}
.rich-table tr:last-child td{border-bottom:none;}
.rich-table td:first-child{font-weight:600;color:var(--ink);}
.rich-table td em{font-style:italic;color:var(--ink2);}
.rich-table td strong{color:var(--ink);}
.colloc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.colloc-card{background:var(--a1bg);border-radius:var(--radius-sm);padding:10px 12px;}
.colloc-card-head{font-size:11px;font-weight:700;color:var(--a1);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.colloc-card-items{font-size:13px;color:var(--ink2);line-height:1.8;}
.certainty-scale{display:flex;flex-direction:column;gap:6px;}
.certainty-row{display:flex;align-items:flex-start;gap:12px;padding:8px 12px;border-radius:var(--radius-sm);background:var(--cream);}
.certainty-modal{font-weight:700;color:#fff;background:var(--a1);padding:3px 10px;border-radius:4px;font-size:12px;min-width:140px;text-align:center;flex-shrink:0;margin-top:2px;}
.certainty-meaning{font-size:13px;color:var(--ink2);}
.certainty-eg{font-size:12px;color:var(--ink3);font-style:italic;margin-top:2px;}
.transform-demo{display:flex;flex-direction:column;gap:6px;}
.transform-demo-row{display:grid;grid-template-columns:1fr 20px 1fr;gap:8px;align-items:center;background:var(--cream);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;}
.transform-demo-row .tdl{color:var(--ink2);}
.transform-demo-row .tdarrow{color:var(--ink3);text-align:center;font-weight:700;}
.transform-demo-row .tdr{color:var(--a1);font-weight:600;}
.meaning-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.meaning-pair:last-child{margin-bottom:0}
.meaning-box{background:var(--cream);border-radius:var(--radius-sm);padding:10px 12px;}
.meaning-box-head{font-size:11px;font-weight:700;color:var(--a1);margin-bottom:5px;}
.meaning-box-eg{font-size:13px;color:var(--ink);font-style:italic;}
.meaning-box-note{font-size:12px;color:var(--ink3);margin-top:3px;}

<script>
// ── HELPER ──
const tip = (t) => `<div class="johns-tip"><div class="tip-avatar">J</div><div class="tip-body"><div class="tip-label">John's tip</div><div class="tip-text">${t}</div></div></div>`;

// ── LESSON DATA ──
const lessons = [
{id:"ppc",title:"Present perfect continuous",subtitle:"I've been working, she's been waiting",intro:"Still happening, or just finished. Focus on the activity, not the result.",desc:"The present perfect continuous connects an ongoing or recently finished activity to the present. Unlike the present perfect simple, it emphasises duration and the activity itself.",tip:"The key question is: <strong>result or activity?</strong> <em>\"I've read the report\"</em> = result, it's done. <em>\"I've been reading the report\"</em> = activity, I may still be doing it. At B1, students need to feel this distinction, not just know the rule.",explanation:"<p>The present perfect continuous is formed with <strong>have/has + been + verb-ing</strong>. It connects a past activity to the present \u2014 either still ongoing or very recently finished.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Duration up to now</strong> \u2014 an activity that started in the past and is still continuing. <em>\"I've been learning English for three years.\"</em> / <em>\"She's been working here since 2020.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Recent activity with present result</strong> \u2014 something just stopped but its effects are visible now. <em>\"You look tired \u2014 have you been running?\"</em> / <em>\"My eyes are red because I've been crying.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Repeated or continuous activity</strong> \u2014 something happening repeatedly over a period. <em>\"I've been calling you all morning!\"</em> / <em>\"They've been arguing a lot lately.\"</em></div></div>\n<div class=\"note\"><strong>Simple vs continuous:</strong><br>\n<em>\"I've read three chapters.\"</em> \u2014 completed, focus on quantity/result.<br>\n<em>\"I've been reading for an hour.\"</em> \u2014 focus on the activity and duration.<br>\nState verbs (know, love, believe, own) don't use the continuous: <em>\"I've known her for years.\"</em> \u2014 never <em>\"I've been knowing her.\"</em></div>",table:{headers:["Form","I / You / We / They","He / She / It"],rows:[["Positive","I've been working","She's been waiting"],["Negative","I haven't been sleeping","He hasn't been eating well"],["Question","Have you been waiting long?","Has she been crying?"],["Key words","for, since, all morning/day/week, lately, recently","\u2014"]]},examples:[{type:"pos",eng:"I've been studying for four hours.",note:"Duration \u2014 still studying or just stopped."},{type:"pos",eng:"She's been living in Madrid since 2019.",note:"Ongoing situation \u2014 still living there."},{type:"pos",eng:"You look exhausted. Have you been working out?",note:"Recent activity visible in the present."},{type:"neg",eng:"He hasn't been sleeping well lately.",note:"Ongoing negative pattern."},{type:"q",eng:"How long have you been learning English?",note:"Asking about duration of ongoing activity."},{type:"q",eng:"Have you been waiting long? Sorry I'm late.",note:"Asking about a recent activity."}],errors:[{bad:"I've been knowing her for years.",good:"I've known her for years.",reason:"Know is a state verb \u2014 no continuous form in any tense, including present perfect."},{bad:"She has been finished the report.",good:"She has finished the report.",reason:"Finished is a result \u2014 use present perfect simple. Continuous would suggest it's still in progress."},{bad:"How long are you waiting?",good:"How long have you been waiting?",reason:"Duration up to now \u2014 present perfect continuous, not present continuous."},{bad:"I've been here since two hours.",good:"I've been here for two hours.",reason:"For + duration. Since + starting point (a date or time)."},{bad:"They've been arguing since a long time.",good:"They've been arguing for a long time.",reason:"A long time is a duration, not a starting point \u2014 use for."}],realUse:["\"I've been thinking about you.\" \u2014 romantic/emotional weight from the continuous.","\"She's been promoted.\" \u2014 NO. This is a result, not an activity. Present perfect simple.","\"The economy has been growing for two years.\" \u2014 ongoing trend, common in news.","\"What have you been up to?\" \u2014 very common question about recent activity."],exercises:[{type:"gap",title:"Form the present perfect continuous",sub:"Fill each gap with the present perfect continuous form of the verb in brackets.",items:[{answer:"have been waiting",before:"I ",after:" for you for half an hour! (wait)"},{answer:"has been raining",before:"It ",after:" all day. (rain)"},{answer:"have been working",before:"They ",after:" on this project since January. (work)"},{answer:"has been feeling",before:"She ",after:" unwell lately. (feel)"},{answer:"have been trying",before:"I ",after:" to call you all morning. (try)"},{answer:"has been living",before:"He ",after:" in Barcelona for five years. (live)"},{answer:"have been studying",before:"We ",after:" for the exam all week. (study)"},{answer:"has been crying",before:"Her eyes are red \u2014 she ",after:". (cry)"}]},{type:"mc",title:"Simple or continuous?",sub:"Choose the most natural form.",items:[{q:"I _____ three cups of coffee today. (result/quantity)",opts:["'ve been drinking","'ve drunk","'ve been drunk","drink"],answer:"'ve drunk",explanation:"Three cups = completed quantity/result \u2192 present perfect simple."},{q:"I _____ coffee all morning. (activity/duration)",opts:["drunk","'ve drunk","'ve been drinking","drink"],answer:"'ve been drinking",explanation:"All morning = duration of activity \u2192 present perfect continuous."},{q:"She _____ French for two years and she's really good now.",opts:["has learned","has been learning","is learning","learned"],answer:"has been learning",explanation:"Duration of an ongoing activity \u2192 present perfect continuous."},{q:"He _____ the report. Here it is.",opts:["has been finishing","has finished","finished","is finishing"],answer:"has finished",explanation:"Result (here it is) \u2192 present perfect simple."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"She started crying an hour ago and is still crying.",keyword:"been",answer:"She has been crying for an hour."},{original:"They started arguing last week and are still arguing.",keyword:"have",answer:"They have been arguing since last week."},{original:"You started waiting some time ago. Ask how long.",keyword:"How long have",answer:"How long have you been waiting?"},{original:"I called you many times this morning.",keyword:"been",answer:"I've been calling you all morning."},{original:"You noticed she looks tired. Ask if she has been working late.",keyword:"Have",answer:"Have you been working late?"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I've been knowing her since school.",correct:"I've known her since school.",hint:"Know is a state verb \u2014 no continuous form."},{wrong:"She has been finished her homework.",correct:"She has finished her homework.",hint:"Finished = result, not activity \u2192 simple."},{wrong:"How long are you waiting?",correct:"How long have you been waiting?",hint:"Duration up to now \u2192 present perfect continuous."},{wrong:"I've been here since two hours.",correct:"I've been here for two hours.",hint:"Duration \u2192 for, not since."},{wrong:"He has been won three prizes.",correct:"He has won three prizes.",hint:"Win = result, not activity \u2192 simple."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using the correct form \u2014 present perfect simple or continuous.",lines:[{speaker:"A",text:"You look exhausted. [Have you been working] all night?"},{speaker:"B",text:"Yes \u2014 I [have been trying] to finish this report. I [haven't slept] properly in days."},{speaker:"A",text:"How long [have you been doing] this job?"},{speaker:"B",text:"Three years. I [have learned] a lot, but it [has been] very intense lately."}]}]},

{id:"pastperfect",title:"Past perfect",subtitle:"I had already eaten, she had never seen",intro:"The past before the past. Putting events in the right order.",desc:"The past perfect describes an action that happened before another past action. It is the tense of sequence \u2014 it tells us which thing happened first.",tip:"Students often ask: <em>can't I just use the past simple twice?</em> Sometimes yes \u2014 if the order is clear from context. But when you need to signal that something happened <em>before</em> something else in the past, the past perfect does that work. <strong>\"When I arrived, she left\"</strong> (she left after I arrived) vs <strong>\"When I arrived, she had left\"</strong> (she was already gone).",explanation:"<p>The past perfect is formed with <strong>had + past participle</strong> \u2014 the same participle as the present perfect. It describes an action that happened <strong>before another past action or moment</strong>.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Sequencing past events</strong> \u2014 when two things happened in the past and you need to be clear which came first. <em>\"When I arrived, she had already left.\"</em> She left first \u2014 that is the past perfect event.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Past context for a story</strong> \u2014 providing background before the main narrative. <em>\"He was nervous because he had never spoken in public before.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>With reporting and conditionals</strong> \u2014 in reported speech and third conditional. <em>\"She said she had already eaten.\"</em> / <em>\"If I had known, I would have called.\"</em></div></div>\n<div class=\"note\"><strong>Sequence words that signal past perfect:</strong> already, just, never, yet, by the time, before, after, when, as soon as, once.<br>\n<em>\"By the time he arrived, we had finished.\"</em> \u2014 by the time almost always triggers past perfect for the earlier event.<br>\nThe past perfect is not always necessary \u2014 if <em>before</em> or <em>after</em> makes the order obvious, past simple is acceptable: <em>\"I ate before she arrived.\"</em></div>",table:{headers:["Form","All subjects"],rows:[["Positive","I/you/he/she/we/they had finished \u2014 I'd finished"],["Negative","I hadn't eaten. / She hadn't arrived."],["Question","Had you met before? / Had she left?"],["Short answer","Yes, I had. / No, she hadn't."],["Common with","already, just, never, yet, by the time, when, before, after"]]},examples:[{type:"pos",eng:"By the time we arrived, the film had already started.",note:"By the time + past simple, past perfect for the earlier event."},{type:"pos",eng:"She was exhausted because she had worked all night.",note:"Background explanation for a past state."},{type:"pos",eng:"I had never eaten sushi before that trip.",note:"First-time experience at a point in the past."},{type:"neg",eng:"He hadn't read the report when the meeting started.",note:"Something not done before a past moment."},{type:"q",eng:"Had you met her before the conference?",note:"Asking about an event before a specific past time."},{type:"q",eng:"Why were you nervous? Had something happened?",note:"Asking about the cause of a past state."}],errors:[{bad:"When I arrived, she already left.",good:"When I arrived, she had already left.",reason:"Already with a past event signals the past perfect \u2014 she left before you arrived."},{bad:"I didn't eat because I hadn't hungry.",good:"I didn't eat because I wasn't hungry.",reason:"Hungry is an adjective, not a verb \u2014 use wasn't, not hadn't."},{bad:"By the time they came, we finished.",good:"By the time they came, we had finished.",reason:"By the time almost always requires past perfect for the completed earlier action."},{bad:"She told me she finished already.",good:"She told me she had already finished.",reason:"In reported speech, past simple shifts back to past perfect."}],realUse:["\"I had no idea.\" \u2014 very common fixed expression.","\"If only I had known...\" \u2014 regret about the past.","\"It was the first time I had ever...\" \u2014 describing a first-time past experience.","\"By the time the ambulance arrived, he had already recovered.\" \u2014 news/narrative register."],exercises:[{type:"gap",title:"Past perfect \u2014 form",sub:"Fill each gap with the past perfect form of the verb in brackets.",items:[{answer:"had already started",before:"By the time we arrived, the film ",after:". (already start)"},{answer:"had never tried",before:"It was the first time she ",after:" Thai food. (never try)"},{answer:"hadn't slept",before:"He was exhausted because he ",after:" for two days. (not sleep)"},{answer:"had finished",before:"When I called, they ",after:" the meeting. (finish)"},{answer:"had been",before:"She told me she ",after:" to Paris three times. (be)"},{answer:"hadn't eaten",before:"I was starving \u2014 I ",after:" since breakfast. (not eat)"},{answer:"had forgotten",before:"He looked embarrassed. He ",after:" her name. (forget)"},{answer:"had just left",before:"When I arrived, she ",after:". (just leave)"}]},{type:"mc",title:"Past simple or past perfect?",sub:"Choose the correct tense.",items:[{q:"When I _____ home, my flatmate _____ already cooked dinner.",opts:["got / had","had got / had","got / has","had got / has"],answer:"got / had",explanation:"Two past events \u2014 got home is the reference point, had cooked happened before it."},{q:"She was nervous because she _____ never spoken to such a large audience.",opts:["has","had","didn't","was"],answer:"had",explanation:"Background explanation before a past event \u2014 past perfect."},{q:"By the time the police _____, the thieves _____ escaped.",opts:["arrived / had","had arrived / had","arrived / have","had arrived / have"],answer:"arrived / had",explanation:"By the time + past simple, past perfect for the earlier completed action."},{q:"I _____ a coffee before I _____ to the office.",opts:["had / went","had / had gone","have had / went","had had / went"],answer:"had had / went",explanation:"Had a coffee happened first \u2014 past perfect. Then went to office \u2014 past simple."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"She left. Then I arrived.",keyword:"by the time",answer:"By the time I arrived, she had left."},{original:"He never visited Rome before that trip.",keyword:"had never",answer:"He had never visited Rome before that trip."},{original:"They finished dinner. Then we arrived.",keyword:"already",answer:"When we arrived, they had already finished dinner."},{original:"I didn't know her. Then we met at the conference.",keyword:"hadn't",answer:"I hadn't met her before the conference."},{original:"She studied hard. That's why she passed.",keyword:"because",answer:"She passed because she had studied hard."}]},{type:"tf",title:"Sequence of events",sub:"Is the statement true, false, or not given?",items:[{context:"When I arrived, she had already left.",statement:"She left after I arrived.",answer:"False",explanation:"Had already left = she left BEFORE I arrived. Past perfect = the earlier event."},{context:"By the time the doctor arrived, the patient had recovered.",statement:"The doctor arrived before the patient recovered.",answer:"False",explanation:"Had recovered = the patient recovered BEFORE the doctor arrived."},{context:"I hadn't eaten since breakfast.",statement:"The speaker ate something at breakfast.",answer:"True",explanation:"Hadn't eaten since breakfast = breakfast was the last meal \u2014 they did eat breakfast."},{context:"It was the first time she had ever seen the sea.",statement:"She had seen the sea before.",answer:"False",explanation:"First time + past perfect = she had never seen it before that moment."},{context:"He was late because he had missed the bus.",statement:"Missing the bus happened before he was late.",answer:"True",explanation:"Had missed = past perfect, the earlier event. Being late came after."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"When I arrived, she already left.",correct:"When I arrived, she had already left.",hint:"Already + past event before another past event \u2192 past perfect."},{wrong:"By the time they came, we finished.",correct:"By the time they came, we had finished.",hint:"By the time \u2192 past perfect for the earlier action."},{wrong:"It was the first time I seen that film.",correct:"It was the first time I had seen that film.",hint:"First time + past event \u2192 past perfect."},{wrong:"She told me she finished the report.",correct:"She told me she had finished the report.",hint:"Reported speech: past simple \u2192 past perfect."},{wrong:"He hadn't hungry so he didn't eat.",correct:"He wasn't hungry so he didn't eat.",hint:"Hungry is an adjective \u2014 use wasn't."}]}]},

{id:"usedto",title:"Used to / would",subtitle:"I used to live there, we would always meet",intro:"Talking about past habits and states that no longer exist.",desc:"Both used to and would can describe past habits \u2014 but they are not always interchangeable. Getting this distinction right is a genuine B1 skill.",tip:"The trap: students learn <em>used to</em> and apply it everywhere for the past. <em>Would</em> is more literary, more sophisticated \u2014 and it can only describe repeated <em>actions</em>, never states. <strong>\"I would be shy\"</strong> is wrong. <strong>\"I used to be shy\"</strong> is the only option for past states.",explanation:"<p><strong>Used to</strong> and <strong>would</strong> both describe past habits and repeated actions that no longer happen. But they work differently.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Used to</strong> \u2014 past habits AND past states. The most versatile form. <em>\"I used to smoke.\"</em> (habit) / <em>\"We used to live near the sea.\"</em> (state) / <em>\"She used to be very shy.\"</em> (state)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Would</strong> \u2014 past habits and repeated actions only. More literary/nostalgic in tone. <em>\"Every summer, we would drive to the coast.\"</em> / <em>\"He would always bring flowers.\"</em> Cannot be used for states.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Neither implies</strong> the habit still continues \u2014 both signal it has stopped. If it still continues, use the present simple or present continuous.</div></div>\n<div class=\"note\"><strong>Would for states \u2014 always wrong:</strong><br>\n<em>\"I would be shy as a child.\"</em> \u2717 \u2192 <em>\"I used to be shy.\"</em> \u2713<br>\n<em>\"We would live in Rome.\"</em> \u2717 \u2192 <em>\"We used to live in Rome.\"</em> \u2713<br>\nState verbs (be, have, know, live, believe, own) can only use <em>used to</em>, never <em>would</em>.<br>\n<strong>Negative and question forms:</strong> <em>didn't use to</em> / <em>Did you use to...?</em> \u2014 note: no final -d in these forms.</div>",table:{headers:["Form","Used to","Would"],rows:[["Positive","I used to play tennis.","We would meet every Friday."],["Negative","I didn't use to like it.","(would not used for negatives of habits)"],["Question","Did you use to live here?","(not used in questions about habits)"],["States","I used to be very shy. \u2713","I would be very shy. \u2717"],["Actions/habits","I used to run every day. \u2713","I would run every day. \u2713"],["Tone","Neutral","Nostalgic, literary, narrative"]]},examples:[{type:"pos",eng:"I used to hate vegetables as a child.",note:"Past state/attitude \u2014 used to only."},{type:"pos",eng:"Every evening, my grandmother would tell us stories.",note:"Repeated past action \u2014 would for nostalgic narrative."},{type:"pos",eng:"We used to have a dog, but he died.",note:"Past state (having) \u2014 used to only."},{type:"neg",eng:"She didn't use to drink coffee.",note:"Negative \u2014 didn't use to (no d at end)."},{type:"q",eng:"Did you use to live in the city?",note:"Question form \u2014 did you use to."},{type:"q",eng:"Where would you go on holiday as a child?",note:"Would in questions about repeated past actions."}],errors:[{bad:"I would be very nervous before exams.",good:"I used to be very nervous before exams.",reason:"Be is a state verb \u2014 would cannot describe past states."},{bad:"She didn't used to eat meat.",good:"She didn't use to eat meat.",reason:"After didn't, the -d is dropped: didn't use to."},{bad:"Did you used to play football?",good:"Did you use to play football?",reason:"After did, the -d is dropped: did you use to."},{bad:"I used to going to the gym every day.",good:"I used to go to the gym every day.",reason:"Used to + base form, not -ing."}],realUse:["\"Things used to be different.\" \u2014 general nostalgia.","\"She would always know what to say.\" \u2014 admiring a past quality (note: know = state \u2014 this is borderline; better: she always knew).","\"I didn't use to like jazz, but now I love it.\" \u2014 contrast between past and present.","\"We would spend summers at my aunt's house.\" \u2014 warm narrative memory."],exercises:[{type:"gap",title:"Used to or would?",sub:"Fill each gap with used to or would. Both may be correct in some cases \u2014 mark which is wrong.",items:[{answer:"used to be",before:"She ",after:" very quiet as a child. (state)"},{answer:"would / used to walk",before:"We ",after:" to school together every day. (habit \u2014 both OK)"},{answer:"used to have",before:"They ",after:" a house by the sea. (state)"},{answer:"would / used to read",before:"My father ",after:" to us every night. (repeated action \u2014 both OK)"},{answer:"used to believe",before:"I ",after:" in ghosts when I was young. (state)"},{answer:"would / used to play",before:"As children we ",after:" in the garden all day. (habit \u2014 both OK)"}]},{type:"mc",title:"Which is correct?",sub:"Choose the correct option.",items:[{q:"I _____ very shy as a teenager.",opts:["would be","used to be","used to being","would being"],answer:"used to be",explanation:"Be = state verb. Would cannot describe past states \u2014 only used to."},{q:"Every Sunday, my mother _____ us to the market.",opts:["used to take","would take","would be taking","used taking"],answer:"would take",explanation:"Repeated past action with nostalgic tone \u2014 would is natural. Used to also correct."},{q:"_____ you use to live near here?",opts:["Did","Would","Used","Have"],answer:"Did",explanation:"Question form of used to: Did + subject + use to (no d)."},{q:"She _____ own a caf\u00e9 in the old town.",opts:["would","used to","was used to","did use"],answer:"used to",explanation:"Own = state verb. Would cannot be used \u2014 only used to."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"As a child, she was very shy. Now she's confident.",keyword:"used to",answer:"She used to be very shy, but now she's confident."},{original:"He smoked, but he stopped years ago.",keyword:"used to",answer:"He used to smoke, but he stopped years ago."},{original:"Every Friday we had dinner together. It was a tradition.",keyword:"would",answer:"Every Friday we would have dinner together."},{original:"Did she live here before?",keyword:"use to",answer:"Did she use to live here?"},{original:"I didn't like fish when I was young.",keyword:"didn't use",answer:"I didn't use to like fish."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using used to or would.",lines:[{speaker:"A",text:"Do you miss your hometown?"},{speaker:"B",text:"Sometimes. Things [used to be] much simpler there. We [would spend] whole summers outside."},{speaker:"A",text:"[Did] you [use to] know everyone?"},{speaker:"B",text:"Pretty much! My grandmother [used to live] on the main square and we [would visit] her every Sunday."},{speaker:"A",text:"What [did] you [use to] do on Sundays?"},{speaker:"B",text:"She [would cook] this enormous lunch. The whole family [used to come]. I really miss it."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I would be very nervous in exams.",correct:"I used to be very nervous in exams.",hint:"Be = state \u2014 only used to."},{wrong:"She didn't used to eat meat.",correct:"She didn't use to eat meat.",hint:"After didn't: use to \u2014 no d."},{wrong:"Did you used to play here?",correct:"Did you use to play here?",hint:"After did: use to \u2014 no d."},{wrong:"I used to going to the gym.",correct:"I used to go to the gym.",hint:"Used to + base form."},{wrong:"We would live in a small village.",correct:"We used to live in a small village.",hint:"Live = state \u2014 only used to."}]}]},

{id:"passive",title:"Passive voice",subtitle:"The report was written, it is made in Spain",intro:"When the action matters more than who did it.",desc:"The passive shifts the focus from the doer to the receiver of the action. It is extremely common in English \u2014 especially in formal writing, news, and academic contexts.",tip:"Students often avoid the passive because it feels complex. But it is essential for natural English. <strong>\"Someone built this bridge in 1890\"</strong> sounds awkward \u2014 <strong>\"This bridge was built in 1890\"</strong> is how English actually works. The key is recognising when the doer is unknown, unimportant, or obvious.",explanation:"<p>The passive is formed with <strong>be + past participle</strong>. The tense of <em>be</em> changes to show when the action happened. The original subject (the doer) can be added with <em>by</em>, but is often omitted.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>When to use the passive:</strong> the doer is unknown (<em>\"My bike was stolen.\"</em>), unimportant (<em>\"The road is being repaired.\"</em>), or obvious from context (<em>\"He was arrested.\"</em> \u2014 clearly by police).</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>How to form it:</strong> take the object of the active sentence and make it the subject. Move the verb to be + past participle. The original subject becomes <em>by + agent</em> (or is dropped).<br><em>\"Workers build the cars.\"</em> \u2192 <em>\"The cars are built (by workers).\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Common tense forms:</strong> present simple passive (<em>is made</em>), past simple passive (<em>was built</em>), present perfect passive (<em>has been cancelled</em>), future passive (<em>will be announced</em>).</div></div>\n<div class=\"note\"><strong>The most common error</strong> is forgetting the past participle and using the base form or past simple instead.<br>\n<em>\"The report was write.\"</em> \u2717 \u2192 <em>\"The report was written.\"</em> \u2713<br>\n<em>\"The bridge was build.\"</em> \u2717 \u2192 <em>\"The bridge was built.\"</em> \u2713<br>\nAlso watch agreement: <em>\"The results was published.\"</em> \u2717 \u2192 <em>\"The results were published.\"</em> \u2713</div>",table:{headers:["Tense","Active","Passive"],rows:[["Present simple","They make it in Italy.","It is made in Italy."],["Past simple","Someone stole my bike.","My bike was stolen."],["Present continuous","They are repairing the road.","The road is being repaired."],["Present perfect","They have cancelled the flight.","The flight has been cancelled."],["Future (will)","They will announce the results.","The results will be announced."],["With by agent","Shakespeare wrote Hamlet.","Hamlet was written by Shakespeare."]]},examples:[{type:"pos",eng:"This bridge was built in 1890.",note:"Doer unknown/unimportant \u2014 passive more natural."},{type:"pos",eng:"The results will be published tomorrow.",note:"Future passive \u2014 will + be + past participle."},{type:"pos",eng:"Three people were arrested at the scene.",note:"Doer obvious (police) \u2014 by agent omitted."},{type:"neg",eng:"The meeting hasn't been confirmed yet.",note:"Present perfect passive \u2014 hasn't been + participle."},{type:"q",eng:"Was the film directed by Almod\u00f3var?",note:"Passive question \u2014 was + subject + past participle."},{type:"q",eng:"When was this painting made?",note:"Wh- passive question."}],errors:[{bad:"The letter was write by her.",good:"The letter was written by her.",reason:"Passive needs the past participle \u2014 write \u2192 written."},{bad:"The results was announced yesterday.",good:"The results were announced yesterday.",reason:"Results is plural \u2014 were, not was."},{bad:"My phone has been stole.",good:"My phone has been stolen.",reason:"Past participle of steal is stolen, not stole."},{bad:"The house is build in 1920.",good:"The house was built in 1920.",reason:"1920 = past \u2014 was built, not is built."}],realUse:["\"It is believed that...\" / \"It is thought that...\" \u2014 passive for distancing opinion.","\"Born and raised in...\" \u2014 passive in biography.","\"Mistakes were made.\" \u2014 classic passive for avoiding responsibility.","\"The match has been postponed.\" \u2014 news and announcements."],exercises:[{type:"gap",title:"Form the passive",sub:"Rewrite using the correct passive form of the verb in brackets.",items:[{answer:"is spoken",before:"English ",after:" in over 50 countries. (speak \u2014 present simple)"},{answer:"was built",before:"The Colosseum ",after:" in 70 AD. (build \u2014 past simple)"},{answer:"has been cancelled",before:"The concert ",after:". (cancel \u2014 present perfect)"},{answer:"is being repaired",before:"The road ",after:" at the moment. (repair \u2014 present continuous)"},{answer:"will be announced",before:"The winner ",after:" tomorrow. (announce \u2014 future)"},{answer:"were arrested",before:"Two suspects ",after:" last night. (arrest \u2014 past simple)"},{answer:"has been stolen",before:"My laptop ",after:". (steal \u2014 present perfect)"},{answer:"was directed",before:"The film ",after:" by Pedro Almod\u00f3var. (direct \u2014 past simple)"}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"Scientists have discovered a new species.",keyword:"has been",answer:"A new species has been discovered."},{original:"They will repair the bridge next year.",keyword:"will be",answer:"The bridge will be repaired next year."},{original:"Picasso painted Guernica in 1937.",keyword:"was painted",answer:"Guernica was painted by Picasso in 1937."},{original:"Someone has broken the window.",keyword:"has been",answer:"The window has been broken."},{original:"They are building a new hospital.",keyword:"is being",answer:"A new hospital is being built."}]},{type:"mc",title:"Choose the correct passive form",sub:"Choose the correct option.",items:[{q:"The new law _____ last week.",opts:["was passed","is passed","has pass","was passing"],answer:"was passed",explanation:"Last week = past simple passive: was + past participle."},{q:"Three people _____ in the accident.",opts:["were injured","was injured","are injured","have injure"],answer:"were injured",explanation:"Three people = plural \u2192 were. Past simple passive."},{q:"The results _____ yet.",opts:["haven't announced","haven't been announced","wasn't announced","aren't announced"],answer:"haven't been announced",explanation:"Yet + present perfect passive: haven't been + past participle."},{q:"This wine _____ in the Rioja region.",opts:["is produced","is produce","was produced","produces"],answer:"is produced",explanation:"General fact about how/where something is made \u2192 present simple passive."}]},{type:"tf",title:"Understanding the passive",sub:"Is the statement true, false, or not given?",items:[{context:"The Eiffel Tower was built in 1889.",statement:"We know who built the Eiffel Tower from this sentence.",answer:"Not given",explanation:"The passive omits the agent \u2014 the by clause is not included."},{context:"Three people were arrested.",statement:"The police made the arrests.",answer:"Not given",explanation:"The passive doesn't name the agent \u2014 it's implied but not stated."},{context:"The report has been sent.",statement:"Someone has already sent the report.",answer:"True",explanation:"Present perfect passive: has been sent = the action is complete."},{context:"The road is being repaired.",statement:"The repair work is finished.",answer:"False",explanation:"Is being repaired = present continuous passive \u2014 in progress, not finished."},{context:"Hamlet was written by Shakespeare.",statement:"Shakespeare wrote Hamlet.",answer:"True",explanation:"Active and passive say the same thing \u2014 just different focus."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"The letter was write by her assistant.",correct:"The letter was written by her assistant.",hint:"Past participle: write \u2192 written."},{wrong:"The results was announced yesterday.",correct:"The results were announced yesterday.",hint:"Plural subject \u2192 were."},{wrong:"My phone has been stole.",correct:"My phone has been stolen.",hint:"Past participle: steal \u2192 stolen."},{wrong:"The bridge is build in 1890.",correct:"The bridge was built in 1890.",hint:"1890 = past \u2192 was built."},{wrong:"She was born on Madrid.",correct:"She was born in Madrid.",hint:"Born in + city/country."}]}]},

{id:"modaldeduction",title:"Modal verbs: deduction",subtitle:"must be, can't be, might be",intro:"Using modals to express certainty and uncertainty about the present.",desc:"At A2 you learnt can, should, must for ability, advice, and obligation. At B1 the modals take on a new job: expressing how certain you are about something \u2014 without stating it as fact.",tip:"The three-level system is the key thing to master: <strong>must be</strong> (almost certain it's true), <strong>might/could be</strong> (possible), <strong>can't be</strong> (almost certain it's false). Students often use <em>must</em> for strong certainty but forget that the negative of deduction is <em>can't</em>, not <em>mustn't</em>. <em>\"It mustn't be true\"</em> means prohibition \u2014 <em>\"It can't be true\"</em> means logical impossibility.",explanation:"<p>Modal verbs are used for logical deduction \u2014 expressing how certain or uncertain you are about a present situation. All are followed by the <strong>base form</strong>.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Must be</strong> \u2014 strong positive deduction. Almost certain it is true based on evidence. <em>\"She's been working for 16 hours \u2014 she must be exhausted.\"</em> / <em>\"That must be John \u2014 I recognise his voice.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Can't be</strong> \u2014 strong negative deduction. Almost certain it is NOT true. <em>\"He can't be hungry \u2014 he just ate.\"</em> / <em>\"That can't be right \u2014 the numbers don't add up.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Might be / could be / may be</strong> \u2014 weak deduction. It is possible but not certain either way. <em>\"She might be in a meeting.\"</em> / <em>\"It could be a mistake.\"</em></div></div>\n<div class=\"note\"><strong>Must vs can't \u2014 the deduction pair:</strong><br>\n<em>\"That must be expensive.\"</em> (I'm fairly sure it is.)<br>\n<em>\"That can't be expensive.\"</em> (I'm fairly sure it isn't.)<br>\n<strong>Never use mustn't for negative deduction</strong> \u2014 mustn't = prohibition (you are not allowed to). For deduction, always use can't.<br>\n<strong>Past deduction:</strong> must have + past participle, can't have + past participle, might have + past participle. <em>\"She must have left already.\"</em></div>",table:{headers:["Certainty level","Positive","Negative"],rows:[["Strong certainty \u2014 true","must be","\u2014"],["Strong certainty \u2014 false","\u2014","can't be / couldn't be"],["Possibility","might be / could be / may be","might not be / may not be"],["Past deduction (strong)","must have + pp","can't have + pp"],["Past deduction (weak)","might have + pp","might not have + pp"]]},examples:[{type:"pos",eng:"You've been travelling all day \u2014 you must be tired.",note:"Evidence \u2192 strong deduction."},{type:"pos",eng:"That can't be right \u2014 I checked it twice.",note:"Logical impossibility based on evidence."},{type:"pos",eng:"She's not answering \u2014 she might be in a meeting.",note:"Possible explanation, not certain."},{type:"pos",eng:"He must have left \u2014 his coat is gone.",note:"Past deduction from present evidence."},{type:"q",eng:"Where do you think she is? \u2014 She could be at the gym.",note:"Speculating about location."},{type:"q",eng:"Who can that be at this hour?",note:"Rhetorical question expressing surprise."}],errors:[{bad:"She mustn't be at home \u2014 the lights are off.",good:"She can't be at home \u2014 the lights are off.",reason:"Mustn't = prohibition. Can't = negative deduction."},{bad:"He must be not tired \u2014 he slept all day.",good:"He can't be tired \u2014 he slept all day.",reason:"Negative deduction \u2192 can't be, not must not be."},{bad:"It might be not true.",good:"It might not be true.",reason:"Modal + not: might not be, not might be not."},{bad:"She must have went already.",good:"She must have gone already.",reason:"Past deduction: must have + past participle \u2014 not past simple."}],realUse:["\"You must be joking!\" \u2014 strong disbelief (almost rhetorical).","\"It could be anything.\" \u2014 admitting total uncertainty.","\"That can't be right.\" \u2014 polite way of disagreeing.","\"He might have missed his train.\" \u2014 gentle past speculation."],richLabel:"Reference tables",richLabel:"Collocation reference",richLabel:"Pattern reference",richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Certainty scale \u2014 present deduction</div>\n<div class=\"certainty-scale\">\n<div class=\"certainty-row\"><div class=\"certainty-modal\">must be</div><div><div class=\"certainty-meaning\">Almost certain it IS true \u2014 strong positive deduction</div><div class=\"certainty-eg\">\"She's been up since 5am \u2014 she must be exhausted.\"</div></div></div>\n<div class=\"certainty-row\"><div class=\"certainty-modal\">should be</div><div><div class=\"certainty-meaning\">Expected to be true based on what's normal</div><div class=\"certainty-eg\">\"The meeting's at 3 \u2014 he should be here by now.\"</div></div></div>\n<div class=\"certainty-row\"><div class=\"certainty-modal\">might / could / may be</div><div><div class=\"certainty-meaning\">Possible \u2014 we don't know either way</div><div class=\"certainty-eg\">\"She's not answering \u2014 she might be in a meeting.\"</div></div></div>\n<div class=\"certainty-row\"><div class=\"certainty-modal\">can't / couldn't be</div><div><div class=\"certainty-meaning\">Almost certain it IS NOT true \u2014 strong negative deduction</div><div class=\"certainty-eg\">\"He just ate \u2014 he can't be hungry.\"</div></div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Past deduction (modal + have + past participle)</div>\n<div class=\"certainty-scale\">\n<div class=\"certainty-row\"><div class=\"certainty-modal\">must have + pp</div><div><div class=\"certainty-meaning\">Almost certain it happened</div><div class=\"certainty-eg\">\"She's not here \u2014 she must have left already.\"</div></div></div>\n<div class=\"certainty-row\"><div class=\"certainty-modal\">might/may have + pp</div><div><div class=\"certainty-meaning\">Possibly happened</div><div class=\"certainty-eg\">\"He might have misunderstood.\"</div></div></div>\n<div class=\"certainty-row\"><div class=\"certainty-modal\">can't/couldn't have + pp</div><div><div class=\"certainty-meaning\">Almost certain it didn't happen</div><div class=\"certainty-eg\">\"He can't have done it \u2014 he was with me.\"</div></div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">\u26a0 Critical: mustn't \u2260 can't for deduction</div>\n<table class=\"rich-table\"><tbody>\n<tr><td><strong>can't be</strong> \u2713</td><td>Negative deduction: <em>\"That can't be right.\"</em></td></tr>\n<tr><td><strong>mustn't be</strong> \u2717</td><td>This means PROHIBITION, not deduction: <em>\"You mustn't be late\"</em> = not allowed</td></tr>\n</tbody></table>\n</div>",exercises:[{type:"gap",title:"Must be, can't be, or might be?",sub:"Fill each gap with must be, can't be, or might be/could be.",items:[{answer:"must be",before:"She's been awake for 24 hours \u2014 she ",after:" exhausted."},{answer:"can't be",before:"That ",after:" John \u2014 John is in London this week."},{answer:"might be / could be",before:"I'm not sure where he is \u2014 he ",after:" at the gym."},{answer:"must be",before:"The restaurant is always full \u2014 the food ",after:" really good."},{answer:"can't be",before:"She ",after:" 50 \u2014 she looks about 35."},{answer:"might be / could be",before:"There's someone at the door \u2014 it ",after:" the delivery."}]},{type:"mc",title:"Which modal for deduction?",sub:"Choose the correct deduction modal.",items:[{q:"He just ate a huge meal. He _____ hungry.",opts:["must be","can't be","might be","mustn't be"],answer:"can't be",explanation:"Strong negative deduction \u2014 can't be, never mustn't be."},{q:"She passed every exam without studying. She _____ very clever.",opts:["can't be","mustn't be","must be","might not be"],answer:"must be",explanation:"Strong positive deduction from evidence."},{q:"I'm not sure \u2014 it _____ a misunderstanding.",opts:["must be","can't be","could be","mustn't be"],answer:"could be",explanation:"Uncertainty \u2014 might be or could be."},{q:"He _____ left \u2014 his car is still outside.",opts:["must have","can't have","might have","should have"],answer:"can't have",explanation:"Evidence (car still there) \u2192 strong negative past deduction: can't have left."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["she","must","be","very","tired","after","that","journey"],answer:"she must be very tired after that journey",context:"Strong positive deduction."},{words:["that","can't","be","right","\u2014","check","it","again"],answer:"that can't be right \u2014 check it again",context:"Strong negative deduction."},{words:["he","might","have","missed","his","train"],answer:"he might have missed his train",context:"Weak past deduction."},{words:["it","must","have","been","a","mistake"],answer:"it must have been a mistake",context:"Strong past deduction."}]},{type:"tf",title:"Logical deduction \u2014 valid or not?",sub:"Based on the evidence, is the deduction true, false, or not given?",items:[{context:"She's been awake since 5am and it's now 11pm. She must be exhausted.",statement:"The deduction is logically supported by the evidence.",answer:"True",explanation:"18 hours awake = strong evidence. Must be = logical deduction from evidence."},{context:"He just ate a three-course meal. He can't be hungry.",statement:"He might be hungry.",answer:"False",explanation:"Can't be = strong negative deduction. Evidence makes hunger very unlikely."},{context:"She's not answering her phone. She might be in a meeting.",statement:"She is definitely in a meeting.",answer:"False",explanation:"Might be = possibility only, not certainty."},{context:"The lights are off and the car is gone. They must have gone out.",statement:"This is a past deduction.",answer:"True",explanation:"Must have gone = must have + past participle = past deduction."},{context:"That can't be John \u2014 John is in Tokyo this week.",statement:"The speaker is certain it is not John.",answer:"True",explanation:"Can't be = strong negative deduction \u2014 almost certain it is not John."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She mustn't be at home \u2014 the lights are off.",correct:"She can't be at home \u2014 the lights are off.",hint:"Negative deduction \u2192 can't, not mustn't."},{wrong:"He must be not tired \u2014 he slept all day.",correct:"He can't be tired \u2014 he slept all day.",hint:"Negative deduction \u2192 can't be."},{wrong:"It might be not true.",correct:"It might not be true.",hint:"Modal + not: not goes after the modal."},{wrong:"She must have went already.",correct:"She must have gone already.",hint:"Must have + past participle \u2014 gone, not went."},{wrong:"That could to be a problem.",correct:"That could be a problem.",hint:"Modal + base form \u2014 no to."}]}]},

{id:"reportedspeech",title:"Reported speech",subtitle:"She said that, he told me to",intro:"Reporting what someone said \u2014 without quoting them word for word.",desc:"Reported speech shifts the tense back in time and changes pronouns and time expressions. It is essential for everyday conversation \u2014 we report what people say constantly.",tip:"The key insight is that the tense shift is logical, not arbitrary. If someone said something in the past, from your current perspective it happened even further back \u2014 so the tense steps back one level. Present \u2192 past. Past \u2192 past perfect. Will \u2192 would. The pronouns also shift to match the new speaker's perspective.",explanation:"<p>In reported speech, we report what someone said without quoting them directly. The tense typically shifts back one step, and pronouns/time expressions change to match the new perspective.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Tense backshift:</strong> present simple \u2192 past simple. Present continuous \u2192 past continuous. Past simple \u2192 past perfect. Will \u2192 would. Can \u2192 could. Must \u2192 had to.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Pronoun shift:</strong> I \u2192 he/she. We \u2192 they. My \u2192 his/her. You (= listener) \u2192 I/he/she depending on context.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Time expression shift:</strong> now \u2192 then. Today \u2192 that day. Yesterday \u2192 the day before / the previous day. Tomorrow \u2192 the next day / the following day. Here \u2192 there. This \u2192 that.</div></div>\n<div class=\"note\"><strong>Say vs tell:</strong> <em>say</em> does not need an object (<em>\"She said she was tired.\"</em>). <em>tell</em> must have an object (<em>\"She told me she was tired.\"</em> \u2014 never <em>\"She told she was tired.\"</em>)<br>\n<strong>No backshift needed</strong> when the situation is still true or the reporting verb is present tense: <em>\"He says he lives in Paris.\"</em> (still true now \u2014 no shift needed).</div>",table:{headers:["Direct speech","Reported speech","Shift"],rows:[["\"I am tired.\"","She said she was tired.","am \u2192 was"],["\"I'm working.\"","He said he was working.","is working \u2192 was working"],["\"I went to Rome.\"","She said she had gone to Rome.","went \u2192 had gone"],["\"I will call you.\"","He said he would call me.","will \u2192 would"],["\"I can help.\"","She said she could help.","can \u2192 could"],["\"Come here tomorrow.\"","He told me to go there the next day.","tomorrow \u2192 the next day / here \u2192 there"]]},examples:[{type:"pos",eng:"She said she was feeling much better.",note:"I am feeling \u2192 she was feeling (present continuous \u2192 past continuous)."},{type:"pos",eng:"He told me he had already seen the film.",note:"I have seen \u2192 he had seen (present perfect \u2192 past perfect)."},{type:"pos",eng:"They said they would come the next day.",note:"We will come tomorrow \u2192 they would come the next day."},{type:"neg",eng:"She said she couldn't make it to the meeting.",note:"I can't \u2192 she couldn't (can \u2192 could)."},{type:"q",eng:"She asked me where I lived.",note:"Where do you live? \u2192 where I lived (question \u2192 statement word order)."},{type:"q",eng:"He asked whether/if I had eaten.",note:"Have you eaten? \u2192 if/whether I had eaten."}],errors:[{bad:"She said me she was tired.",good:"She told me she was tired.",reason:"Tell must have an object \u2014 told me. Say does not take an object: she said she was tired."},{bad:"He said that he will come.",good:"He said that he would come.",reason:"Will shifts to would in reported speech."},{bad:"She asked me where did I live.",good:"She asked me where I lived.",reason:"Reported questions use statement word order \u2014 no inversion, no do/did."},{bad:"He told she was late.",good:"He told her she was late. / He said she was late.",reason:"Tell must be followed by a person object \u2014 told her."}],realUse:["\"She said she'd think about it.\" \u2014 will \u2192 would in everyday indirect reporting.","\"He asked if I was free.\" \u2014 yes/no questions use if/whether.","\"They announced that the event had been cancelled.\" \u2014 formal reporting.","\"My teacher told us to study harder.\" \u2014 reporting commands: told + object + to + infinitive."],exercises:[{type:"gap",title:"Tense backshift",sub:"Report what each person said. Change the tense and pronouns.",items:[{answer:"she was studying",before:"\"I'm studying.\" \u2192 She said ",after:"."},{answer:"he had forgotten",before:"\"I forgot.\" \u2192 He said ",after:" his keys."},{answer:"she would call",before:"\"I'll call you.\" \u2192 She said ",after:" me."},{answer:"they could help",before:"\"We can help.\" \u2192 They said ",after:"."},{answer:"he had been working",before:"\"I've been working all day.\" \u2192 He said ",after:" all day."},{answer:"she didn't know",before:"\"I don't know.\" \u2192 She said ",after:"."}]},{type:"transform",title:"Direct to reported speech",sub:"Rewrite each sentence as reported speech.",items:[{original:"\"I'm very tired,\" she said.",keyword:"said",answer:"She said she was very tired."},{original:"\"I'll be there at eight,\" he told me.",keyword:"told",answer:"He told me he would be there at eight."},{original:"\"We have already eaten,\" they said.",keyword:"said",answer:"They said they had already eaten."},{original:"\"Where do you live?\" she asked me.",keyword:"asked",answer:"She asked me where I lived."},{original:"\"Don't be late!\" the teacher told us.",keyword:"told",answer:"The teacher told us not to be late."}]},{type:"mc",title:"Say, tell, or ask?",sub:"Choose the correct reporting verb.",items:[{q:"She _____ me she would be late.",opts:["said","told","asked","spoke"],answer:"told",explanation:"Tell + object (me) + clause. Say does not take a per
