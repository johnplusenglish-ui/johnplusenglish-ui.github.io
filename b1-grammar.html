sonal object."},{q:"He _____ he was feeling better.",opts:["told","asked","said","spoke"],answer:"said",explanation:"Say does not take a personal object \u2014 said (that) he was feeling better."},{q:"She _____ whether I had eaten.",opts:["said","told","asked","spoke"],answer:"asked",explanation:"Asking a question \u2192 asked (+ if/whether for yes/no questions)."},{q:"They _____ us to be quiet.",opts:["said","told","asked","ordered"],answer:"told",explanation:"Reporting a command \u2192 told + object + to + infinitive."}]},{type:"convo",title:"Reported speech in context",sub:"Report what each person said. Fill the gaps with the correct reported speech form.",lines:[{speaker:"A",text:"Maria said: 'I am working on the report.' \u2192 Maria said she [was working] on the report."},{speaker:"B",text:"The manager said: 'We will announce the results tomorrow.' \u2192 The manager said they [would announce] the results the next day."},{speaker:"C",text:"John told me: 'I have already sent the email.' \u2192 John told me he [had already sent] the email."},{speaker:"D",text:"She asked: 'Can you come to the meeting?' \u2192 She asked if I [could come] to the meeting."},{speaker:"E",text:"The boss said: 'Don't be late.' \u2192 The boss told us [not to be] late."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She said me she was tired.",correct:"She told me she was tired.",hint:"Tell + object. Say has no object."},{wrong:"He said that he will come.",correct:"He said that he would come.",hint:"Will \u2192 would in reported speech."},{wrong:"She asked me where did I live.",correct:"She asked me where I lived.",hint:"Reported questions: statement word order."},{wrong:"He told she was late.",correct:"He told her she was late.",hint:"Tell must have a person object."},{wrong:"She said to me that she is happy.",correct:"She told me that she was happy.",hint:"Said to me \u2192 told me. Tense shifts back."}]}]},

{id:"firstconditional",title:"Conditionals: zero & first",subtitle:"If it rains, I'll stay in",intro:"Real conditions \u2014 things that are possible or likely.",desc:"The zero and first conditionals deal with real, possible situations. Zero = always true (general fact). First = possible future result.",tip:"The most persistent error is using <em>will</em> in the <em>if</em> clause. <strong>\"If it will rain, I'll stay in\"</strong> is wrong in English. The <em>if</em> clause uses the present simple \u2014 the <em>will</em> goes in the result clause only. This is the single rule that unlocks both conditionals.",explanation:"<p>Conditionals describe the relationship between a condition and its result. Zero and first conditionals deal with real, possible situations.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Zero conditional</strong> \u2014 general truths, scientific facts, things that are always true. If + present simple, present simple. <em>\"If you heat water to 100\u00b0C, it boils.\"</em> / <em>\"If I don't sleep enough, I get headaches.\"</em> The result is always the same.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>First conditional</strong> \u2014 real and likely future situations. If + present simple, will + base verb. <em>\"If it rains, I'll take an umbrella.\"</em> / <em>\"If she calls, tell her I'm busy.\"</em> The condition is possible \u2014 we are talking about a specific future situation.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Variations in the result clause:</strong> instead of will, you can use can, may, might, should, or an imperative. <em>\"If you're late, call me.\"</em> / <em>\"If she's there, you might see her.\"</em></div></div>\n<div class=\"note\"><strong>Never use will in the if clause:</strong><br>\n<em>\"If it will rain, I'll stay in.\"</em> \u2717 \u2192 <em>\"If it rains, I'll stay in.\"</em> \u2713<br>\nThis applies to unless, when, before, after, until, as soon as too \u2014 all time/condition conjunctions use present simple for future meaning.<br>\n<strong>Unless = if not:</strong> <em>\"I won't go unless you come.\"</em> = <em>\"I won't go if you don't come.\"</em></div>",table:{headers:["Type","If clause","Result clause","Use"],rows:[["Zero","present simple","present simple","Always true / general fact"],["First","present simple","will + base verb","Real, likely future situation"],["First variation","present simple","can/might/should + base verb","Possibility or advice"],["First variation","present simple","imperative","Instruction given a condition"],["Unless","present simple","will + base verb","= if not: unless you hurry, we'll be late"]]},examples:[{type:"pos",eng:"If you mix blue and yellow, you get green.",note:"Zero conditional \u2014 scientific/general truth."},{type:"pos",eng:"If I finish early, I'll call you.",note:"First conditional \u2014 real, specific future possibility."},{type:"pos",eng:"If she's not there, leave a message.",note:"First conditional with imperative in result clause."},{type:"pos",eng:"Unless you hurry, we'll miss the train.",note:"Unless = if you don't hurry."},{type:"q",eng:"What will you do if they say no?",note:"Asking about a first conditional future plan."},{type:"q",eng:"If I helped you, would you return the favour?",note:"Second conditional \u2014 hypothetical (preview of next lesson)."}],errors:[{bad:"If it will rain, we'll cancel the picnic.",good:"If it rains, we'll cancel the picnic.",reason:"Never will in the if clause \u2014 present simple instead."},{bad:"If you will be late, call me.",good:"If you are late, call me.",reason:"Same rule \u2014 present simple in the if clause."},{bad:"Unless you won't come, I'll go alone.",good:"Unless you come, I'll go alone.",reason:"Unless already contains the negative \u2014 don't add won't."},{bad:"I'll tell her if she will arrive.",good:"I'll tell her when she arrives.",reason:"Time clauses (when, before, after) also use present simple for future."}],realUse:["\"If you need anything, just ask.\" \u2014 open offer.","\"Unless something changes, we'll have to cancel.\" \u2014 formal/professional context.","\"What if it rains?\" \u2014 casual spoken conditional question.","\"If I were you...\" \u2014 second conditional (hypothetical advice \u2014 next lesson)."],exercises:[{type:"gap",title:"Zero and first conditional",sub:"Fill each gap with the correct form.",items:[{answer:"boils",before:"If you heat water to 100\u00b0C, it ",after:". (boil \u2014 zero)"},{answer:"will get",before:"If you don't study, you ",after:" a bad grade. (get \u2014 first)"},{answer:"rains",before:"I'll take an umbrella if it ",after:". (rain \u2014 first)"},{answer:"press",before:"If you ",after:" this button, the door opens. (press \u2014 zero)"},{answer:"will call",before:"If she's free, she ",after:" you. (call \u2014 first)"},{answer:"freeze",before:"Water ",after:" if the temperature drops below zero. (freeze \u2014 zero)"},{answer:"will be",before:"If we leave now, we ",after:" there by seven. (be \u2014 first)"},{answer:"don't come",before:"I won't go unless you ",after:". (come \u2014 first/unless)"}]},{type:"mc",title:"Spot the error",sub:"Choose the correct sentence.",items:[{q:"Which is correct?",opts:["If it will rain, we'll stay in.","If it rains, we'll stay in.","If it rained, we'll stay in.","If it will rain, we would stay in."],answer:"If it rains, we'll stay in.",explanation:"Present simple in the if clause \u2014 never will. First conditional: if + present simple, will + base."},{q:"Which is correct?",opts:["Unless you won't hurry, we'll be late.","Unless you don't hurry, we'll be late.","Unless you hurry, we'll be late.","Unless you hurried, we'll be late."],answer:"Unless you hurry, we'll be late.",explanation:"Unless already means 'if not' \u2014 don't add don't/won't."},{q:"___ you press the red button, the alarm goes off.",opts:["If","Unless","When","While"],answer:"If",explanation:"General truth about what always happens \u2192 zero conditional with if."},{q:"What will you do if they _____ the offer?",opts:["will refuse","refused","refuse","are refusing"],answer:"refuse",explanation:"First conditional: present simple in the if clause."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"I won't go if you don't come.",keyword:"Unless",answer:"Unless you come, I won't go."},{original:"Mix red and blue \u2014 you get purple. (always true)",keyword:"If",answer:"If you mix red and blue, you get purple."},{original:"Study hard now and you'll pass.",keyword:"If",answer:"If you study hard, you'll pass."},{original:"Don't touch that \u2014 you'll burn yourself.",keyword:"If",answer:"If you touch that, you'll burn yourself."},{original:"What happens when you don't sleep enough?",keyword:"If",answer:"If you don't sleep enough, you feel terrible."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using the first conditional.",lines:[{speaker:"A",text:"If the weather [is] good this weekend, do you want to go hiking?"},{speaker:"B",text:"Sure! But if it [rains], I'd rather stay in."},{speaker:"A",text:"If we go, I [will bring] the food if you bring the drinks."},{speaker:"B",text:"Deal. If we [leave] early we can get a good spot."},{speaker:"A",text:"What [will] we do if the car [doesn't start]? It's been making a noise."},{speaker:"B",text:"If that [happens], we'll take the train. No problem."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"If it will be cold, I'll wear a coat.",correct:"If it is cold, I'll wear a coat.",hint:"No will in the if clause."},{wrong:"Unless you won't hurry, we'll miss it.",correct:"Unless you hurry, we'll miss it.",hint:"Unless = if not \u2014 don't add won't."},{wrong:"I'll call her when she will arrive.",correct:"I'll call her when she arrives.",hint:"When + future meaning = present simple."},{wrong:"If you will help me, I'll be grateful.",correct:"If you help me, I'll be grateful.",hint:"Present simple in the if clause."},{wrong:"Water freeze if it gets cold enough.",correct:"Water freezes if it gets cold enough.",hint:"Zero conditional \u2014 he/she/it needs -s."}]}]},

{id:"secondconditional",title:"Conditionals: second",subtitle:"If I had money, I'd travel",intro:"Imaginary, hypothetical, or unlikely situations.",desc:"The second conditional is for things that are not real \u2014 either impossible, very unlikely, or contrary to the present facts. It is the conditional of dreams, wishes, advice, and polite requests.",tip:"Students mix up first and second conditional because they both talk about the future. The key is <em>how real is the situation?</em> <strong>\"If I win the lottery\"</strong> (first \u2014 possible, however unlikely) vs <strong>\"If I won the lottery\"</strong> (second \u2014 treating it as hypothetical/imaginary). The second conditional uses <em>past tense</em> to signal unreality \u2014 not past time.",explanation:"<p>The second conditional describes <strong>imaginary, hypothetical, or unlikely situations</strong> and their results. The past tense in the if clause signals that the situation is not real \u2014 it does not refer to the past.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Structure:</strong> If + past simple, would + base verb. <em>\"If I had more time, I would learn the piano.\"</em> (I don't have more time \u2014 this is hypothetical.) <em>\"If she lived in Madrid, she would visit me.\"</em> (She doesn't live in Madrid.)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>If I were you...</strong> \u2014 the most common advice structure in English. Always <em>were</em>, not <em>was</em>, in formal and exam contexts (though <em>was</em> is heard in informal speech). <em>\"If I were you, I'd talk to her directly.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Could and might</strong> can replace would in the result clause when the result is possible rather than certain. <em>\"If I had more money, I might travel more.\"</em> / <em>\"If she asked, he could help.\"</em></div></div>\n<div class=\"note\"><strong>First vs second conditional \u2014 the real vs imaginary test:</strong><br>\n<em>\"If I win the lottery, I'll buy a house.\"</em> \u2014 first conditional. I buy tickets; it could happen.<br>\n<em>\"If I won the lottery, I'd buy a house.\"</em> \u2014 second conditional. Treated as a dream/fantasy.<br>\n<strong>Would never goes in the if clause</strong> (except very formal: <em>\"If you would like...\"</em>). In the if clause, use the past simple.</div>",table:{headers:["Form","If clause","Result clause"],rows:[["Second conditional","past simple","would + base verb"],["With were","If I were you / If she were here","I'd / she would..."],["With could/might","past simple","could / might + base verb"],["Contracted form","\u2014","I'd = I would / she'd = she would"],["First vs second","present simple (real/possible)","past simple (unreal/hypothetical)"]]},examples:[{type:"pos",eng:"If I had a car, I'd drive to work.",note:"I don't have a car \u2014 hypothetical."},{type:"pos",eng:"If I were you, I'd apologise immediately.",note:"Advice structure \u2014 were (not was) in formal/exam English."},{type:"pos",eng:"She'd be much happier if she had a different job.",note:"Result clause first \u2014 equally correct order."},{type:"pos",eng:"If they offered me the job, I might accept.",note:"Might instead of would \u2014 less certain result."},{type:"q",eng:"What would you do if you lost your job?",note:"Hypothetical question \u2014 asking for imagined response."},{type:"q",eng:"If you could live anywhere, where would it be?",note:"Could in the if clause \u2014 imaginary ability."}],errors:[{bad:"If I would have money, I'd travel.",good:"If I had money, I'd travel.",reason:"Would never goes in the if clause \u2014 past simple instead."},{bad:"If I was you, I wouldn't do that.",good:"If I were you, I wouldn't do that.",reason:"Were is preferred with I in the second conditional in formal/exam contexts."},{bad:"If she would ask, I'd help.",good:"If she asked, I'd help.",reason:"Past simple in the if clause \u2014 not would."},{bad:"I would go if I will have time.",good:"I would go if I had time.",reason:"Past simple in the if clause \u2014 not will or would."}],realUse:["\"What would you do if...?\" \u2014 one of the most common conversation starters.","\"If I were in your position...\" \u2014 empathetic advice.","\"I'd love to, but...\" \u2014 I would love to \u2014 second conditional in social refusals.","\"If only things were different.\" \u2014 wish/regret (leads into the wish lesson)."],exercises:[{type:"gap",title:"Second conditional \u2014 form",sub:"Fill each gap with the correct second conditional form.",items:[{answer:"had",before:"If I ",after:" more time, I'd learn the piano. (have)"},{answer:"would tell",before:"If I knew the answer, I ",after:" you. (tell)"},{answer:"were",before:"If I ",after:" you, I'd apologise. (be)"},{answer:"could travel",before:"If money were no problem, I ",after:" the world. (travel \u2014 use could)"},{answer:"would be",before:"She ",after:" much happier if she changed jobs. (be)"},{answer:"lived",before:"If he ",after:" closer, we'd see him more often. (live)"},{answer:"would you do",before:"What ",after:" if you lost your passport? (do)"},{answer:"spoke",before:"I'd get the job if I ",after:" better English. (speak)"}]},{type:"mc",title:"First or second conditional?",sub:"Choose the correct form.",items:[{q:"If it _____ tomorrow, we'll cancel the barbecue.",opts:["rained","would rain","rains","rain"],answer:"rains",explanation:"Real possibility about tomorrow \u2192 first conditional: present simple in if clause."},{q:"If I _____ a million euros, I'd buy a house by the sea.",opts:["win","won","would win","have won"],answer:"won",explanation:"Hypothetical/dream scenario \u2192 second conditional: past simple in if clause."},{q:"If I were you, I _____ tell him the truth.",opts:["will","would","am going to","can"],answer:"would",explanation:"Second conditional result clause \u2192 would + base form."},{q:"She _____ more if she _____ a better salary.",opts:["saves / gets","would save / got","will save / gets","saved / will get"],answer:"would save / got",explanation:"Second conditional \u2014 hypothetical: would + base / past simple."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"I don't have a car, so I can't drive to work.",keyword:"If",answer:"If I had a car, I could drive to work."},{original:"She doesn't know the answer, so she can't help.",keyword:"If",answer:"If she knew the answer, she could help."},{original:"My advice to you: talk to her directly.",keyword:"If I were",answer:"If I were you, I'd talk to her directly."},{original:"He doesn't speak Spanish, so he can't apply.",keyword:"If",answer:"If he spoke Spanish, he could apply."},{original:"What will you do if you lose your job? (hypothetical)",keyword:"would",answer:"What would you do if you lost your job?"}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using the second conditional.",lines:[{speaker:"A",text:"If you [could live] anywhere in the world, where [would] you choose?"},{speaker:"B",text:"If I [had] the choice, I [would move] to somewhere warm. Maybe Portugal."},{speaker:"A",text:"Really? What [would] you do there?"},{speaker:"B",text:"I [would open] a small caf\u00e9. If I [weren't] in this job, that's what I'd do."},{speaker:"A",text:"That sounds amazing. If I [had] more money, I [would come] with you!"},{speaker:"B",text:"If only it [were] that simple."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"If I would have money, I'd travel.",correct:"If I had money, I'd travel.",hint:"No would in the if clause \u2014 past simple."},{wrong:"If I was you, I'd be more careful.",correct:"If I were you, I'd be more careful.",hint:"Were (not was) with I in second conditional."},{wrong:"If she would ask, I'd help her.",correct:"If she asked, I'd help her.",hint:"Past simple in the if clause."},{wrong:"What would you do if you will lose your job?",correct:"What would you do if you lost your job?",hint:"Past simple in the if clause \u2014 not will."},{wrong:"I'd come if I would have time.",correct:"I'd come if I had time.",hint:"Past simple in the if clause."}]}]},

{id:"nondefining",title:"Relative clauses: non-defining",subtitle:"My teacher, who is from Dublin, ...",intro:"Adding extra information \u2014 information the sentence can survive without.",desc:"At A2 you learnt defining relative clauses, which identify which person or thing you mean. Non-defining clauses add extra, bonus information about something already identified. The comma is the signal.",tip:"The comma is not optional decoration \u2014 it changes the meaning entirely. <em>\"My sister who lives in London\"</em> implies I have multiple sisters (the clause identifies which one). <em>\"My sister, who lives in London,\"</em> implies I have only one sister (the clause adds extra information). Students who learned Spanish will recognise this distinction \u2014 it works the same way.",explanation:"<p>Non-defining relative clauses add <strong>extra information</strong> about a noun that is already fully identified. They are separated from the main clause by <strong>commas</strong> and the information inside them could be removed without changing the core meaning of the sentence.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Commas are essential.</strong> They signal that the clause contains extra, non-essential information. Without commas, the clause becomes defining (essential to identify the noun).<br><em>\"My brother, who lives in Berlin, is a doctor.\"</em> \u2014 I have one brother. Extra info: he lives in Berlin.<br><em>\"My brother who lives in Berlin is a doctor.\"</em> \u2014 I have multiple brothers. The clause identifies which one.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Never use that</strong> in non-defining relative clauses. Only who (people), which (things), whose (possession), where (places). <em>\"The Prado, which is in Madrid, is my favourite museum.\"</em> \u2014 never <em>\"The Prado, that is in Madrid...\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Which can refer to the whole previous clause</strong> \u2014 a very common pattern. <em>\"She passed all her exams, which was a great surprise.\"</em> The <em>which</em> refers to the whole fact of passing, not just one noun.</div></div>\n<div class=\"note\"><strong>Defining vs non-defining at a glance:</strong><br>\nDefining (no commas): <em>\"The woman who called is my sister.\"</em> \u2014 identifies which woman.<br>\nNon-defining (commas): <em>\"Maria, who called this morning, is my sister.\"</em> \u2014 Maria is already identified; the clause adds info.<br>\n<strong>That is never used in non-defining clauses</strong> \u2014 this is a common exam error.</div>",table:{headers:["Type","Commas","That allowed?","Purpose"],rows:[["Defining","No commas","Yes","Identifies which person/thing"],["Non-defining","Commas required","No \u2014 who/which/whose/where only","Adds extra information"],["Which for whole clause","Comma before which","\u2014","Refers to the previous whole idea"],["Whose","Commas if non-defining","\u2014","Possession: her name, whose work I admire,..."]]},examples:[{type:"pos",eng:"My teacher, who is from Dublin, speaks four languages.",note:"Non-defining \u2014 teacher already identified by my. Extra info added."},{type:"pos",eng:"The Eiffel Tower, which was built in 1889, attracts millions of tourists.",note:"The Eiffel Tower is already fully identified. Which, not that."},{type:"pos",eng:"She passed all her exams, which made her parents very proud.",note:"Which refers to the whole fact of passing \u2014 a very common pattern."},{type:"pos",eng:"My boss, whose opinion I respect, suggested a different approach.",note:"Whose = possessive \u2014 her opinion."},{type:"neg",eng:"The meeting, which I had prepared for carefully, was cancelled.",note:"Extra information about a specific, identified meeting."},{type:"q",eng:"Hemingway, who won the Nobel Prize in 1954, is one of my favourite writers.",note:"The writer is already identified \u2014 the clause adds a biographical detail."}],errors:[{bad:"My sister, that lives in London, is a nurse.",good:"My sister, who lives in London, is a nurse.",reason:"Non-defining relative clauses never use that \u2014 only who, which, whose, where."},{bad:"The Prado, that is in Madrid, is worth a visit.",good:"The Prado, which is in Madrid, is worth a visit.",reason:"Non-defining clause about a thing \u2014 which, not that."},{bad:"She won the prize which made her very happy.",good:"She won the prize, which made her very happy.",reason:"Which referring to the whole clause needs a comma before it."},{bad:"My mother who is very patient helped me.",good:"My mother, who is very patient, helped me.",reason:"I have one mother \u2014 the clause adds info, not identification. Commas needed."}],realUse:["\"Paris, which I visited last spring, is beautiful.\" \u2014 travel writing register.","\"John, who you met at the conference, has been promoted.\" \u2014 business update.","\"She apologised, which surprised everyone.\" \u2014 which for a whole previous idea.","\"The report, whose findings were controversial, was leaked.\" \u2014 formal/academic register."],exercises:[{type:"gap",title:"Add the relative pronoun",sub:"Fill each gap with who, which, or whose.",items:[{answer:"who",before:"My neighbour, ",after:" is a retired teacher, helps me with English."},{answer:"which",before:"The film, ",after:" won three Oscars, is now on streaming."},{answer:"whose",before:"My colleague, ",after:" husband is a chef, always brings amazing food."},{answer:"which",before:"She quit her job, ",after:" shocked everyone."},{answer:"who",before:"Pablo Picasso, ",after:" was born in M\u00e1laga, became one of the most influential artists of the 20th century."},{answer:"which",before:"The conference, ",after:" takes place every year in Vienna, attracts thousands of delegates."}]},{type:"builder",title:"Combine the sentences",sub:"Join the two sentences using a non-defining relative clause.",items:[{words:["My","sister","who","is","a","doctor","lives","in","Barcelona"],answer:"My sister, who is a doctor, lives in Barcelona.",context:"Add commas \u2014 the clause gives extra info about an already-identified sister."},{words:["The","Alhambra","which","was","built","in","the","14th","century","is","in","Granada"],answer:"The Alhambra, which was built in the 14th century, is in Granada.",context:"Non-defining \u2014 the Alhambra is already fully identified."},{words:["She","passed","her","driving","test","which","was","a","huge","relief"],answer:"She passed her driving test, which was a huge relief.",context:"Which refers to the whole previous fact."},{words:["My","boss","whose","feedback","is","always","useful","suggested","a","change"],answer:"My boss, whose feedback is always useful, suggested a change.",context:"Whose = possessive."}]},{type:"mc",title:"Defining or non-defining?",sub:"Choose the correct sentence.",items:[{q:"I have one brother. Which is correct?",opts:["My brother who lives in Rome called me.","My brother, who lives in Rome, called me.","My brother, that lives in Rome, called me.","My brother which lives in Rome called me."],answer:"My brother, who lives in Rome, called me.",explanation:"One brother = already identified \u2192 non-defining with commas. Never that."},{q:"I have several cousins. Which identifies which cousin?",opts:["My cousin, who works in London, is visiting.","My cousin who works in London is visiting.","My cousin that works in London is visiting.","My cousin, that works in London, is visiting."],answer:"My cousin who works in London is visiting.",explanation:"Multiple cousins \u2192 defining clause (no commas) to identify which one."},{q:"Which sentence uses which correctly for a whole idea?",opts:["She won, which was unexpected.","She won which was unexpected.","She won, that was unexpected.","She won that was unexpected."],answer:"She won, which was unexpected.",explanation:"Which referring to the whole previous clause needs a comma and cannot use that."}]},{type:"tf",title:"Defining or non-defining?",sub:"Read each sentence. Is the statement true, false, or not given?",items:[{context:"The book that I recommended is out of stock.",statement:"The relative clause tells us which specific book is meant.",answer:"True",explanation:"No commas = defining clause. Essential information to identify which book."},{context:"My colleague, who has worked here for ten years, is leaving.",statement:"The speaker has more than one colleague.",answer:"Not given",explanation:"Commas signal non-defining \u2014 but we can't know how many colleagues they have."},{context:"The hotel where we stayed was excellent.",statement:"This is a defining relative clause.",answer:"True",explanation:"No commas = defining. It identifies which hotel."},{context:"Shakespeare, who was born in Stratford-upon-Avon, is England's most famous playwright.",statement:"The clause could be removed without changing the core meaning.",answer:"True",explanation:"Commas = non-defining. Shakespeare is already identified. The birth detail is extra."},{context:"People who don't read miss out on a lot.",statement:"The relative clause applies to all people.",answer:"False",explanation:"Defining clause \u2014 who don't read identifies a specific group, not all people."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"My father, that is a doctor, retired last year.",correct:"My father, who is a doctor, retired last year.",hint:"Non-defining relative clauses never use that."},{wrong:"The Prado, that is in Madrid, has amazing paintings.",correct:"The Prado, which is in Madrid, has amazing paintings.",hint:"Non-defining about a thing \u2014 which, not that."},{wrong:"She got promoted which made her very happy.",correct:"She got promoted, which made her very happy.",hint:"Which for a whole idea needs a comma."},{wrong:"My best friend who I've known for 20 years is getting married.",correct:"My best friend, who I've known for 20 years, is getting married.",hint:"Best friend = already identified \u2014 non-defining needs commas."}]}]},

{id:"gerundsinfinitives",title:"Gerunds and infinitives",subtitle:"I enjoy swimming, I want to swim",intro:"When to use the -ing form and when to use to + infinitive.",desc:"One of the most important areas of B1 grammar \u2014 and one of the most difficult, because there is no single rule. The choice between gerund and infinitive often depends on which verb comes before it.",tip:"There is no universal logic \u2014 students need to learn which verbs take which form. But some patterns help: verbs about <em>feelings towards activities</em> (enjoy, love, hate, avoid, miss) tend to take the gerund. Verbs about <em>future intentions or plans</em> (want, hope, plan, decide, would like) tend to take the infinitive. After <em>prepositions</em>, always gerund.",explanation:"<p>Some verbs are followed by the gerund (-ing form), others by the infinitive (to + base verb), and some can take both. The choice often changes the meaning.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Verbs + gerund (-ing):</strong> enjoy, love, hate, like (in general), miss, avoid, finish, suggest, consider, practise, keep, mind, can't stand, imagine, deny, admit. <em>\"I enjoy running.\"</em> / <em>\"She avoids eating late.\"</em> / <em>\"He admitted lying.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Verbs + infinitive (to + base):</strong> want, need, hope, plan, decide, agree, refuse, manage, offer, promise, expect, would like, forget, learn, afford, fail. <em>\"I want to leave.\"</em> / <em>\"She managed to pass.\"</em> / <em>\"He refused to apologise.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Verbs + both (different meanings):</strong> remember, forget, stop, try, regret.<br><em>\"I remember meeting her.\"</em> (memory of a past event) vs <em>\"I remembered to call.\"</em> (didn't forget to do it)<br><em>\"She stopped smoking.\"</em> (quit) vs <em>\"She stopped to smoke.\"</em> (paused in order to smoke)</div></div>\n<div class=\"note\"><strong>After prepositions \u2014 always gerund:</strong><br>\n<em>\"I'm interested in learning.\"</em> / <em>\"She left without saying goodbye.\"</em> / <em>\"Thanks for helping.\"</em> / <em>\"He's good at cooking.\"</em><br>\n<strong>The to in infinitive is NOT a preposition</strong> \u2014 it is part of the verb form. <em>\"I look forward to seeing you.\"</em> \u2014 here <em>to</em> IS a preposition, so seeing (gerund) follows, not the base form.</div>",table:{headers:["Category","Examples","Form"],rows:[["Verb + gerund","enjoy, avoid, finish, miss, practise, consider, suggest, admit, deny, keep","verb + -ing: I enjoy running."],["Verb + infinitive","want, hope, plan, decide, manage, refuse, agree, afford, expect, fail","verb + to + base: I want to go."],["Verb + both (meaning changes)","remember, forget, stop, try, regret","remember to do (duty) / remember doing (memory)"],["Adjective + infinitive","happy, ready, able, difficult, easy, important","I'm happy to help. / It's easy to forget."],["Preposition + gerund","interested in, good at, tired of, before, after, without, instead of","After preposition \u2014 always -ing."],["Verb + object + infinitive","want, ask, tell, advise, expect, allow, help","I want you to come. / She told him to leave."]]},examples:[{type:"pos",eng:"I really enjoy cooking \u2014 it relaxes me.",note:"Enjoy + gerund."},{type:"pos",eng:"She managed to finish the report on time.",note:"Manage + infinitive."},{type:"pos",eng:"I remember meeting her at a party years ago.",note:"Remember + gerund = memory of a past event."},{type:"pos",eng:"Did you remember to lock the door?",note:"Remember + infinitive = didn't forget to do it."},{type:"pos",eng:"He's very good at explaining things.",note:"Adjective good at + preposition + gerund."},{type:"neg",eng:"I can't afford to take a holiday this year.",note:"Can't afford + infinitive."}],errors:[{bad:"I enjoy to cook at weekends.",good:"I enjoy cooking at weekends.",reason:"Enjoy + gerund \u2014 never infinitive."},{bad:"She avoided to make eye contact.",good:"She avoided making eye contact.",reason:"Avoid + gerund."},{bad:"I'm looking forward to see you.",good:"I'm looking forward to seeing you.",reason:"To here is a preposition (part of look forward to) \u2014 followed by gerund."},{bad:"He suggested to go out for dinner.",good:"He suggested going out for dinner.",reason:"Suggest + gerund \u2014 never infinitive."}],realUse:["\"I'm thinking of applying.\" \u2014 preposition of + gerund.","\"Would you mind opening the window?\" \u2014 mind + gerund.","\"I tried calling but there was no answer.\" \u2014 tried + gerund = attempted the action.","\"I tried to call but my phone was dead.\" \u2014 tried + infinitive = made an attempt.","\"She ended up staying.\" \u2014 end up + gerund (very common spoken English)."],richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Verb + gerund (-ing)</div>\n<div class=\"colloc-grid\">\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">Feelings about activities</div><div class=\"colloc-card-items\">enjoy \u00b7 love \u00b7 hate \u00b7 like (general) \u00b7 miss \u00b7 can't stand \u00b7 don't mind</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">Avoidance & stopping</div><div class=\"colloc-card-items\">avoid \u00b7 stop \u00b7 give up \u00b7 put off \u00b7 delay \u00b7 postpone \u00b7 resist</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">Suggesting & recommending</div><div class=\"colloc-card-items\">suggest \u00b7 recommend \u00b7 consider \u00b7 propose \u00b7 admit \u00b7 deny \u00b7 imagine</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">Other -ing verbs</div><div class=\"colloc-card-items\">finish \u00b7 practise \u00b7 keep \u00b7 risk \u00b7 involve \u00b7 mention \u00b7 regret (past)</div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Verb + infinitive (to + base)</div>\n<div class=\"colloc-grid\">\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">Intention & decision</div><div class=\"colloc-card-items\">want \u00b7 decide \u00b7 plan \u00b7 intend \u00b7 hope \u00b7 wish \u00b7 choose \u00b7 prepare</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">Ability & attempt</div><div class=\"colloc-card-items\">manage \u00b7 try \u00b7 fail \u00b7 attempt \u00b7 learn \u00b7 afford \u00b7 struggle \u00b7 pretend</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">Agreement & refusal</div><div class=\"colloc-card-items\">agree \u00b7 refuse \u00b7 offer \u00b7 promise \u00b7 threaten \u00b7 expect \u00b7 claim</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">Other to-infinitive</div><div class=\"colloc-card-items\">need \u00b7 seem \u00b7 appear \u00b7 tend \u00b7 happen \u00b7 deserve \u00b7 bother</div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Verbs with meaning change \u2014 both forms</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">remember + -ing</div><div class=\"meaning-box-eg\">\"I remember meeting her.\"</div><div class=\"meaning-box-note\">Memory of a past event</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">remember + to</div><div class=\"meaning-box-eg\">\"Remember to lock up.\"</div><div class=\"meaning-box-note\">Don't forget to do it</div></div>\n</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">stop + -ing</div><div class=\"meaning-box-eg\">\"She stopped smoking.\"</div><div class=\"meaning-box-note\">Quit the habit entirely</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">stop + to</div><div class=\"meaning-box-eg\">\"She stopped to smoke.\"</div><div class=\"meaning-box-note\">Paused in order to smoke</div></div>\n</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">try + -ing</div><div class=\"meaning-box-eg\">\"Try adding more salt.\"</div><div class=\"meaning-box-note\">Experiment \u2014 see if it helps</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">try + to</div><div class=\"meaning-box-eg\">\"I tried to open it.\"</div><div class=\"meaning-box-note\">Made an effort to do it</div></div>\n</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">forget + -ing</div><div class=\"meaning-box-eg\">\"I'll never forget seeing it.\"</div><div class=\"meaning-box-note\">Memory of a past experience</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">forget + to</div><div class=\"meaning-box-eg\">\"Don't forget to call.\"</div><div class=\"meaning-box-note\">Fail to remember to do it</div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">After prepositions \u2014 always gerund</div>\n<table class=\"rich-table\"><tbody>\n<tr><td>good/bad/brilliant <strong>at</strong></td><td><em>She's good at explaining things.</em></td></tr>\n<tr><td>interested/involved <strong>in</strong></td><td><em>I'm interested in learning more.</em></td></tr>\n<tr><td>without / before / after / instead of</td><td><em>She left without saying goodbye.</em></td></tr>\n<tr><td>look forward <strong>to</strong></td><td><em>I look forward to hearing from you.</em> \u2014 <strong>to</strong> is a preposition here, not part of the infinitive</td></tr>\n</tbody></table>\n</div>",exercises:[{type:"gap",title:"Gerund or infinitive?",sub:"Fill each gap with the gerund or infinitive form of the verb in brackets.",items:[{answer:"swimming",before:"I really enjoy ",after:" in the sea. (swim \u2014 gerund)"},{answer:"to leave",before:"She decided ",after:" early. (leave \u2014 infinitive)"},{answer:"arguing",before:"They kept ",after:" about the same things. (argue \u2014 gerund)"},{answer:"to finish",before:"He managed ",after:" on time. (finish \u2014 infinitive)"},{answer:"going",before:"I'm thinking of ",after:" to Rome next month. (go \u2014 gerund after preposition)"},{answer:"to apologise",before:"She refused ",after:". (apologise \u2014 infinitive)"},{answer:"to afford",before:"I can't ",after:" a new car right now. (afford \u2014 infinitive)"},{answer:"speaking",before:"She's very good at ",after:" in public. (speak \u2014 gerund after at)"}]},{type:"mc",title:"Gerund or infinitive \u2014 meaning change",sub:"Choose the correct form. Note the meaning difference.",items:[{q:"I remember _____ her at the conference. (I have a memory of this)",opts:["to meet","meeting","meet","to meeting"],answer:"meeting",explanation:"Remember + gerund = you have a memory of the past event."},{q:"Did you remember _____ the oven off? (don't forget to do it)",opts:["turning","to turn","turn","turned"],answer:"to turn",explanation:"Remember + infinitive = didn't forget to do the task."},{q:"She stopped _____ when the doctor told her to.",opts:["to smoke","smoke","smoking","smoked"],answer:"smoking",explanation:"Stop + gerund = quit the habit entirely."},{q:"He stopped _____ a map. (he paused in order to do this)",opts:["checking","to check","check","checked"],answer:"to check",explanation:"Stop + infinitive = paused in order to perform the action."}]},{type:"categorise",title:"Gerund or infinitive?",sub:"Click a verb, then click the correct column.",categories:[{name:"verb + gerund (-ing)",items:["enjoy","avoid","finish","suggest","keep","mind","practise","miss"]},{name:"verb + infinitive (to...)",items:["want","decide","manage","refuse","hope","plan","agree","afford"]},{name:"preposition \u2192 always gerund",items:["good at","interested in","without","instead of","after","before"]}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue with the gerund or infinitive form.",lines:[{speaker:"A",text:"Have you decided [to apply] for that job yet?"},{speaker:"B",text:"I'm considering [applying], but I keep [putting] it off."},{speaker:"A",text:"You should stop [worrying] and just do it. What's the worst that can happen?"},{speaker:"B",text:"I know. I really want [to improve] my situation. I can't afford [to miss] this opportunity."},{speaker:"A",text:"Exactly. I suggest [sending] the application this week."},{speaker:"B",text:"You're right. I'll try [to finish] it tonight. Thanks for [helping] me think it through."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I enjoy to run in the mornings.",correct:"I enjoy running in the mornings.",hint:"Enjoy + gerund."},{wrong:"She avoided to make eye contact.",correct:"She avoided making eye contact.",hint:"Avoid + gerund."},{wrong:"I'm looking forward to see you.",correct:"I'm looking forward to seeing you.",hint:"Look forward to \u2014 to is a preposition here \u2014 gerund follows."},{wrong:"He suggested to go to the cinema.",correct:"He suggested going to the cinema.",hint:"Suggest + gerund."},{wrong:"I'm tired of to wait.",correct:"I'm tired of waiting.",hint:"Preposition of \u2192 gerund."}]}]},

{id:"causative",title:"Causative: have / get",subtitle:"I had my hair cut, she got it fixed",intro:"Describing services done for you by someone else.",desc:"The causative is used when you arrange for someone else to do something for you \u2014 you don't do it yourself. It is common in everyday English but absent from many languages, causing students to reach for awkward alternatives.",tip:"The structure looks deceptively like the passive, but it has an important difference \u2014 there is a subject who caused the action to happen. <strong>\"My car was repaired\"</strong> (passive \u2014 we don't know why or who decided). <strong>\"I had my car repaired\"</strong> (causative \u2014 I arranged it, someone did it for me).",explanation:"<p>The causative uses <strong>have/get + object + past participle</strong> to describe an action that you arrange for someone else to do on your behalf.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Have + object + past participle</strong> \u2014 the standard form. <em>\"I had my hair cut.\"</em> / <em>\"She had her car serviced.\"</em> / <em>\"We're having the house painted.\"</em> (currently in progress)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Get + object + past participle</strong> \u2014 more informal, common in spoken English. <em>\"I need to get my phone fixed.\"</em> / <em>\"She got her nails done.\"</em> Often implies more effort or difficulty in arranging it.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Tense changes</strong> come from <em>have/get</em>, not the past participle. The participle stays the same. <em>\"I had it repaired.\" / \"I'm having it repaired.\" / \"I'll have it repaired.\" / \"I've had it repaired.\"</em></div></div>\n<div class=\"note\"><strong>Structure breakdown:</strong><br>\nSubject + have/get + object + past participle (+ by + agent, optional)<br>\n<em>\"I had my photo taken (by a professional photographer).\"</em><br>\n<strong>Compare with passive:</strong> <em>\"My photo was taken.\"</em> \u2014 no mention of who arranged it.<br>\n<em>\"I had my photo taken.\"</em> \u2014 I arranged it, someone did it for me.</div>",table:{headers:["Tense","Have causative","Get causative"],rows:[["Present simple","I have my car serviced every year.","I get my nails done every month."],["Past simple","She had her hair cut yesterday.","He got his suit dry-cleaned."],["Present continuous","We're having the house painted.","I'm getting my laptop repaired."],["Future (will)","I'll have it delivered.","I'll get it sorted."],["Present perfect","Have you had your eyes tested?","She's already got it fixed."]]},examples:[{type:"pos",eng:"I'm going to have my hair cut this afternoon.",note:"Arranged appointment \u2014 someone else will cut it."},{type:"pos",eng:"She had her car repaired at the local garage.",note:"Past causative \u2014 she arranged it, the garage did it."},{type:"pos",eng:"We need to get the boiler checked before winter.",note:"Get causative \u2014 informal, common in spoken English."},{type:"pos",eng:"He has his suits made in Savile Row.",note:"Luxury causative \u2014 arrangement for a bespoke service."},{type:"q",eng:"Have you had your eyes tested recently?",note:"Asking about a past arranged service."},{type:"q",eng:"When did you last get your hair done?",note:"Informal spoken question about a service."}],errors:[{bad:"I had my hair cutting yesterday.",good:"I had my hair cut yesterday.",reason:"Causative: have + object + past participle \u2014 not -ing."},{bad:"She got repaired her phone.",good:"She got her phone repaired.",reason:"Object must come directly after get/have, before the past participle."},{bad:"I had cut my hair.",good:"I had my hair cut.",reason:"Causative word order: had + object (my hair) + past participle (cut)."},{bad:"We painted the house by a professional.",good:"We had the house painted by a professional.",reason:"Someone else did it \u2014 causative needed. Without have/get, it sounds like you painted it yourself."}],realUse:["\"I need to get this looked at.\" \u2014 informal, suggesting a problem needs attention.","\"She's having a dress made for the wedding.\" \u2014 bespoke/custom service.","\"Have you had your blood pressure checked?\" \u2014 health context.","\"I'll get it sorted.\" \u2014 very common British English for arranging something."],exercises:[{type:"gap",title:"Form the causative",sub:"Fill each gap using have or get + object + past participle.",items:[{answer:"had my hair cut",before:"I ",after:" at the salon yesterday. (cut)"},{answer:"having the house painted",before:"We're ",after:" at the moment. (paint)"},{answer:"get my eyes tested",before:"I need to ",after:" \u2014 I can't see well. (test)"},{answer:"had her laptop repaired",before:"She ",after:" last week. (repair)"},{answer:"have my suit dry-cleaned",before:"I want to ",after:" before the wedding. (dry-clean)"},{answer:"getting the boiler checked",before:"We're ",after:" tomorrow. (check)"}]},{type:"mc",title:"Choose the correct causative",sub:"Choose the correct form.",items:[{q:"I need to _____ \u2014 it's been making a strange noise.",opts:["have my car checked","have checked my car","my car have checked","check my car have"],answer:"have my car checked",explanation:"Causative: have + object (my car) + past participle (checked)."},{q:"She _____ for the wedding. She looks beautiful.",opts:["had her hair done","had done her hair","did her hair","has her hair doing"],answer:"had her hair done",explanation:"Have + object + past participle. Object (her hair) comes before the participle."},{q:"They _____ every year before winter.",opts:["have the heating serviced","have serviced the heating","serviced the heating have","get serviced the heating"],answer:"have the heating serviced",explanation:"Have + object + past participle \u2014 object (the heating) comes before participle."},{q:"I _____ \u2014 I can't get the lid off.",opts:["need to get this jar opened","need to get opened this jar","need this jar to open","get this jar to open"],answer:"need to get this jar opened",explanation:"Get + object (this jar) + past participle (opened)."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"A mechanic fixed my car.",keyword:"had",answer:"I had my car fixed (by a mechanic)."},{original:"A photographer is taking her photos right now.",keyword:"having",answer:"She is having her photos taken."},{original:"Someone delivers fresh bread to our house every morning.",keyword:"have",answer:"We have fresh bread delivered every morning."},{original:"A plumber will fix the pipes tomorrow.",keyword:"get",answer:"I'll get the pipes fixed tomorrow."},{original:"Did a dentist check your teeth recently?",keyword:"Have you had",answer:"Have you had your teeth checked recently?"}]},{type:"tf",title:"Causative or not?",sub:"Is the statement about a causative structure true, false, or not given?",items:[{context:"I had my car repaired yesterday.",statement:"I repaired the car myself.",answer:"False",explanation:"Causative: I had it repaired = I arranged for someone else to do it."},{context:"She's having her portrait painted.",statement:"The painting is in progress now.",answer:"True",explanation:"Is having = present continuous causative \u2014 the action is currently happening."},{context:"I need to get my eyes tested.",statement:"The speaker will test their own eyes.",answer:"False",explanation:"Get causative: get my eyes tested = someone else will do the testing."},{context:"They had the house built in 2005.",statement:"They built the house themselves.",answer:"False",explanation:"Had the house built = causative \u2014 they arranged for builders to build it."},{context:"Have you had your hair done recently?",statement:"This question uses the causative structure.",answer:"True",explanation:"Had your hair done = have + object + past participle \u2014 causative."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I had my hair cutting yesterday.",correct:"I had my hair cut yesterday.",hint:"Have + object + past participle \u2014 not -ing."},{wrong:"She got repaired her phone.",correct:"She got her phone repaired.",hint:"Object must come after get/have, before the participle."},{wrong:"I had cut my hair.",correct:"I had my hair cut.",hint:"Causative order: had + object (my hair) + participle (cut)."},{wrong:"We painted the house by a company.",correct:"We had the house painted by a company.",hint:"Someone else did it \u2014 causative needed."}]}]},

{id:"quantifiersb1",title:"Quantifiers: too, enough, plenty of",subtitle:"too much, not enough, plenty of time",intro:"Expressing excess, sufficiency, and abundance with precision.",desc:"At A2 you learnt some/any/much/many/a lot of. At B1 the key additions are too, enough, and plenty of \u2014 three quantifiers that add a judgement about whether the amount is right, too much, or sufficient.",tip:"Too is the most misused: students confuse it with <em>very</em>. <strong>\"It's very hot\"</strong> is neutral \u2014 just describing. <strong>\"It's too hot\"</strong> means it's a problem, more than is acceptable. <em>Too</em> always implies a negative consequence. If there is no problem, use <em>very</em>.",explanation:"<p>These three quantifiers make judgements about quantity \u2014 whether something is more than needed, less than needed, or just right/plenty.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Too</strong> \u2014 more than is acceptable or desirable. Always implies a problem or negative result. <em>\"It's too cold to go out.\"</em> / <em>\"He spoke too quickly for me to understand.\"</em> / <em>\"There are too many people.\"</em> / <em>\"There's too much noise.\"</em><br>Structure: too + adjective/adverb OR too much/many + noun.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Enough</strong> \u2014 the right amount, or sufficient. In positive sentences = sufficient. In negatives/questions = insufficient. <em>\"I have enough money.\"</em> / <em>\"She isn't old enough to vote.\"</em> / <em>\"He didn't work hard enough.\"</em><br>Structure: enough + noun OR adjective/adverb + enough (enough comes AFTER adjectives).</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Plenty of</strong> \u2014 more than enough, abundance. Used in positive sentences. <em>\"There's plenty of time.\"</em> / <em>\"We have plenty of food.\"</em> / <em>\"Don't rush \u2014 there are plenty of seats.\"</em> Works with both countable and uncountable nouns.</div></div>\n<div class=\"note\"><strong>Too vs very \u2014 critical distinction:</strong><br>\n<em>\"It's very hot.\"</em> = neutral observation. No implied problem.<br>\n<em>\"It's too hot.\"</em> = problem. Too hot to do something, more than is acceptable.<br>\n<strong>Enough position:</strong> before nouns (<em>enough money</em>) but AFTER adjectives and adverbs (<em>old enough, quickly enough</em>). Students often put it before the adjective.<br>\n<em>\"She's enough tall.\"</em> \u2717 \u2192 <em>\"She's tall enough.\"</em> \u2713</div>",table:{headers:["Quantifier","Use","Position","Example"],rows:[["too","excess \u2014 more than desirable (problem implied)","too + adj/adv | too much/many + noun","It's too cold. / Too many people."],["enough","sufficiency \u2014 the right amount","enough + noun | adj/adv + enough","Enough money. / Old enough."],["not enough","insufficient \u2014 less than needed","not enough + noun | not adj/adv + enough","Not enough time. / Not warm enough."],["plenty of","abundance \u2014 more than enough","plenty of + noun (countable or uncountable)","Plenty of food. / Plenty of options."],["too much","excess with uncountable nouns","too much + uncountable","Too much noise. / Too much work."],["too many","excess with countable nouns","too many + countable plural","Too many emails. / Too many people."]]},examples:[{type:"pos",eng:"The coffee is too hot to drink right now.",note:"Too + adjective + to + infinitive \u2014 implies a problem."},{type:"pos",eng:"She's old enough to make her own decisions.",note:"Adjective + enough \u2014 enough after the adjective."},{type:"pos",eng:"There's plenty of time \u2014 don't rush.",note:"Plenty of = more than enough. Reassuring."},{type:"neg",eng:"I don't have enough money to buy it.",note:"Not enough = insufficient."},{type:"neg",eng:"He didn't run fast enough to qualify.",note:"Adverb + enough \u2014 enough after the adverb."},{type:"q",eng:"Is there enough milk for everyone?",note:"Asking about sufficiency."}],errors:[{bad:"She's enough old to drive.",good:"She's old enough to drive.",reason:"Enough comes after the adjective \u2014 old enough."},{bad:"It's very cold for swimming \u2014 let's not go.",good:"It's too cold for swimming \u2014 let's not go.",reason:"A problem with a consequence \u2192 too, not very."},{bad:"There's too many food.",good:"There's too much food.",reason:"Food is uncountable \u2014 too much, not too many."},{bad:"We have plenty time.",good:"We have plenty of time.",reason:"Plenty of \u2014 always needs of before the noun."}],realUse:["\"There's never enough time.\" \u2014 one of the most universal complaints.","\"That's more than enough, thank you.\" \u2014 polite refusal of more food/help.","\"He talks too much.\" \u2014 common complaint, too + much.","\"Is there enough for everyone?\" \u2014 practical question at meals/events."],exercises:[{type:"gap",title:"Too, enough, or plenty of?",sub:"Fill each gap with too, too much, too many, enough, or plenty of.",items:[{answer:"too",before:"This coffee is ",after:" hot to drink. (excess \u2014 problem)"},{answer:"enough",before:"Do we have ",after:" chairs for everyone? (sufficient)"},{answer:"too many",before:"There are ",after:" people in this room. (excess \u2014 countable)"},{answer:"plenty of",before:"Don't worry \u2014 there's ",after:" food. (more than enough)"},{answer:"too much",before:"He eats ",after:" sugar. (excess \u2014 uncountable)"},{answer:"enough",before:"She isn't old ",after:" to vote. (after adjective \u2014 sufficient)"},{answer:"too",before:"The music is ",after:" loud \u2014 I can't concentrate."},{answer:"plenty of",before:"We have ",after:" time before the train. (abundance)"}]},{type:"mc",title:"Too vs very",sub:"Choose the correct word.",items:[{q:"The film was _____ long \u2014 I fell asleep.",opts:["very","too","enough","plenty"],answer:"too",explanation:"Fell asleep = negative consequence \u2192 too (excess with a problem)."},{q:"The weather is _____ hot today \u2014 perfect for the beach!",opts:["too","enough","very","plenty"],answer:"very",explanation:"Perfect for the beach = positive, no problem \u2192 very, not too."},{q:"She speaks _____ quickly for me to follow.",opts:["very","enough","too","plenty"],answer:"too",explanation:"For me to follow = result of the excess \u2192 too + adverb."},{q:"He's _____ talented \u2014 everyone loves his work.",opts:["too","enough","plenty","very"],answer:"very",explanation:"Everyone loves his work = positive \u2192 very, not too."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"I can't lift this \u2014 it's too heavy.",keyword:"enough",answer:"This isn't light enough for me to lift."},{original:"She's not old enough to drive.",keyword:"too",answer:"She's too young to drive."},{original:"There's a lot of food \u2014 don't worry.",keyword:"plenty",answer:"There's plenty of food \u2014 don't worry."},{original:"I can't hear \u2014 the music is very loud.",keyword:"too",answer:"The music is too loud \u2014 I can't hear."},{original:"We don't have enough time.",keyword:"too",answer:"There's too little time."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["the","coffee","is","too","hot","to","drink"],answer:"the coffee is too hot to drink",context:"Too + adjective + to infinitive."},{words:["she","isn't","old","enough","to","drive"],answer:"she isn't old enough to drive",context:"Adjective + enough + to infinitive."},{words:["there","is","plenty","of","time","don't","rush"],answer:"there is plenty of time don't rush",context:"Plenty of + noun."},{words:["he","speaks","too","quickly","for","me","to","follow"],answer:"he speaks too quickly for me to follow",context:"Too + adverb + for + object + to infinitive."},{words:["we","don't","have","enough","money","to","go","on","holiday"],answer:"we don't have enough money to go on holiday",context:"Enough + noun + to infinitive."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She's enough tall to reach it.",correct:"She's tall enough to reach it.",hint:"Enough comes after the adjective."},{wrong:"It's very cold \u2014 I can't go out.",correct:"It's too cold to go out.",hint:"Can't go out = negative result \u2192 too."},{wrong:"There are too much people.",correct:"There are too many people.",hint:"People is countable \u2192 too many."},{wrong:"We have plenty time before the train.",correct:"We have plenty of time before the train.",hint:"Plenty of \u2014 always needs of."},{wrong:"I don't have enough money for buying it.",correct:"I don't have enough money to buy it.",hint:"Enough + noun + to + infinitive."}]}]},

{id:"linkingwords",title:"Linking words \u2014 advanced",subtitle:"despite, whereas, nevertheless",intro:"Moving beyond because and but to more sophisticated connectors.",desc:"At A2 you learnt because, so, but, although, when, if. At B1 these are expanded with more formal and nuanced connectors that allow for richer, more sophisticated expression \u2014 especially in writing.",tip:"The most common B1 error is using <em>despite</em> with a clause instead of a noun/gerund. <strong>\"Despite it was raining\"</strong> is wrong. <strong>\"Despite the rain\"</strong> or <strong>\"Despite the fact that it was raining\"</strong> are correct. Despite is followed by a noun or gerund \u2014 never a full clause with a subject and verb.",explanation:"<p>Linking words show the logical relationship between ideas. At B1 we extend the A2 set with more formal and nuanced connectors.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Despite / in spite of</strong> \u2014 contrast, despite a difficulty. Followed by noun or gerund \u2014 NEVER a clause. <em>\"Despite the rain, we went out.\"</em> / <em>\"In spite of feeling ill, she worked.\"</em> / <em>\"Despite the fact that it was raining, we went out.\"</em> (if you need a clause, add <em>the fact that</em>)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>However / nevertheless / nonetheless</strong> \u2014 contrast between two separate sentences. Unlike <em>but</em> and <em>although</em>, these connect two independent sentences. <em>\"The project was difficult. However, we completed it on time.\"</em> Always preceded by a full stop or semicolon, followed by a comma.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Whereas / while</strong> \u2014 direct contrast between two parallel facts. <em>\"She loves cities, whereas I prefer the countryside.\"</em> / <em>\"Prices have risen, while wages have stayed the same.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Therefore / as a result / consequently</strong> \u2014 result or consequence. More formal than <em>so</em>. <em>\"The roads were icy. Therefore, the match was cancelled.\"</em></div></div>\n<div class=\"note\"><strong>Despite vs although \u2014 the key difference:</strong><br>\n<em>Although</em> + full clause (subject + verb): <em>\"Although it was raining, we went out.\"</em><br>\n<em>Despite</em> + noun/gerund: <em>\"Despite the rain, we went out.\"</em><br>\n<em>\"Despite it was raining\"</em> \u2717 \u2014 never despite + subject + verb.</div>",table:{headers:["Connector","Type","Structure","Example"],rows:[["despite / in spite of","contrast","+ noun / gerund","Despite the rain, we went."],["however / nevertheless","contrast (between sentences)","full stop + however/nevertheless + comma","It was hard. However, we succeeded."],["whereas / while","parallel contrast","clause + whereas/while + clause","She likes cities, whereas I prefer villages."],["therefore / as a result / consequently","result/consequence","full stop + connector + comma","The roads were icy. Therefore, we stayed."],["furthermore / moreover","addition (more formal than also)","full stop + connector + comma","The plan is cheap. Furthermore, it is effective."],["in addition","addition","in addition + comma + clause","In addition, the report needs updating."]]},examples:[{type:"pos",eng:"Despite feeling tired, she finished the presentation.",note:"Despite + gerund \u2014 not despite she was tired."},{type:"pos",eng:"The salary was low. Nevertheless, she accepted the job.",note:"Nevertheless connects two independent sentences."},{type:"pos",eng:"He earns a lot, whereas his brother struggles financially.",note:"Whereas \u2014 direct contrast between two parallel facts."},{type:"pos",eng:"The data was unclear. Therefore, the results are inconclusive.",note:"Therefore \u2014 formal result connector between sentences."},{type:"pos",eng:"Despite the fact that it was expensive, they bought it.",note:"Despite the fact that \u2014 if you need a clause after despite."},{type:"neg",eng:"She studied hard. However, she didn't pass.",note:"However after a full stop, comma after however."}],errors:[{bad:"Despite it was raining, we went out.",good:"Despite the rain, we went out.",reason:"Despite + noun/gerund \u2014 never despite + subject + verb clause."},{bad:"Although it was cold, but I went out.",good:"Although it was cold, I went out.",reason:"Although already expresses contrast \u2014 never add but as well. One connector is enough."},{bad:"The results were poor, nevertheless the team continued.",good:"The results were poor. Nevertheless, the team continued.",reason:"Nevertheless connects two separate sentences \u2014 needs a full stop before it, not a comma."},{bad:"She failed the exam, therefore she was upset.",good:"She failed the exam. Therefore, she was upset.",reason:"Therefore needs a full stop before it \u2014 it begins a new sentence."}],realUse:["\"The project was delayed. However, we delivered on time.\" \u2014 business/professional writing.","\"Despite numerous setbacks, the team succeeded.\" \u2014 formal/journalistic register.","\"Costs have increased, whereas productivity has fallen.\" \u2014 economic/analytical writing.","\"The results were positive. Furthermore, they exceeded expectations.\" \u2014 formal addition."],richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Contrast & concession</div>\n<table class=\"rich-table\"><thead><tr><th>Connector</th><th>Structure</th><th>Example</th></tr></thead><tbody>\n<tr><td>Despite / in spite of</td><td>+ noun or gerund</td><td><em>Despite the rain, we went out. / Despite feeling ill, she worked.</em></td></tr>\n<tr><td>Although / even though</td><td>+ full clause</td><td><em>Although it was expensive, I bought it.</em></td></tr>\n<tr><td>However / nevertheless</td><td>New sentence + comma</td><td><em>It was hard. However, we succeeded.</em></td></tr>\n<tr><td>Whereas / while</td><td>Contrast in same sentence</td><td><em>She loves cities, whereas I prefer villages.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Result & consequence</div>\n<table class=\"rich-table\"><thead><tr><th>Connector</th><th>Structure</th><th>Example</th></tr></thead><tbody>\n<tr><td>Therefore / as a result / consequently</td><td>New sentence + comma</td><td><em>The roads were icy. Therefore, the match was cancelled.</em></td></tr>\n<tr><td>So</td><td>Joins two clauses (comma before)</td><td><em>She was tired, so she went home.</em></td></tr>\n<tr><td>Because / since / as</td><td>+ full clause (reason)</td><td><em>I stayed in because I was ill.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Addition</div>\n<table class=\"rich-table\"><thead><tr><th>Connector</th><th>Use</th><th>Example</th></tr></thead><tbody>\n<tr><td>Furthermore / moreover / in addition</td><td>Formal \u2014 new sentence</td><td><em>The plan is costly. Furthermore, it is untested.</em></td></tr>\n<tr><td>What is more</td><td>Emphatic addition</td><td><em>It's expensive. What is more, it won't work.</em></td></tr>\n<tr><td>Not only... but also</td><td>Double emphasis</td><td><em>Not only is it slow, but it is also unreliable.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">\u26a0 Critical rules</div>\n<table class=\"rich-table\"><tbody>\n<tr><td>Despite + noun/gerund \u2713</td><td><em>Despite the rain. / Despite raining.</em> \u2014 NOT despite it rained \u2717</td></tr>\n<tr><td>However \u2014 new sentence only</td><td><em>It was hard. However, we managed.</em> \u2014 NOT <em>it was hard, however we managed \u2717</em></td></tr>\n<tr><td>Although \u2014 never with but</td><td><em>Although it was cold, I went out.</em> \u2014 NOT <em>although... but \u2717</em></td></tr>\n<tr><td>Unless = if not</td><td><em>Unless you come</em> = if you don't come. Don't add don't/won't inside unless.</td></tr>\n</tbody></table>\n</div>",exercises:[{type:"gap",title:"Choose the correct connector",sub:"Fill each gap with despite, however, whereas, therefore, or furthermore.",items:[{answer:"Despite",before:"",after:" the bad weather, the event was a success."},{answer:"however",before:"The film was long. ",after:", it was never boring."},{answer:"whereas",before:"Some students prefer grammar exercises, ",after:" others prefer conversation."},{answer:"Therefore",before:"The evidence was inconclusive. ",after:", no decision was made."},{answer:"Despite",before:"",after:" working hard, he failed the exam."},{answer:"Furthermore",before:"The location is perfect. ",after:", the price is reasonable."},{answer:"whereas",before:"Rents in the city are high, ",after:" rural areas are much cheaper."},{answer:"however",before:"The solution seemed simple. ",after:", it proved very difficult in practice."}]},{type:"mc",title:"Despite, although, or however?",sub:"Choose the correct connector.",items:[{q:"_____ the high price, they decided to buy it.",opts:["Although","Despite","However","Whereas"],answer:"Despite",explanation:"Despite + noun (the high price). Although would need a full clause."},{q:"_____ she was nervous, she gave an excellent presentation.",opts:["Despite","However","Although","Therefore"],answer:"Although",explanation:"Although + full clause (subject + verb). Not despite."},{q:"The plan was approved. _____, several concerns were raised.",opts:["Although","Despite","However","Whereas"],answer:"However",explanation:"However connects two independent sentences \u2014 preceded by full stop."},{q:"He earns well _____ his colleague struggles on minimum wage.",opts:["however","despite","therefore","whereas"],answer:"whereas",explanation:"Whereas \u2014 direct contrast between two parallel facts in the same sentence."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"Although it was expensive, we bought it.",keyword:"Despite",answer:"Despite the high price, we bought it."},{original:"She was tired, but she kept working.",keyword:"Despite",answer:"Despite being tired, she kept working."},{original:"He worked hard, so he passed.",keyword:"therefore",answer:"He worked hard. Therefore, he passed."},{original:"Although she earns more, she saves less.",keyword:"whereas",answer:"She earns more, whereas she saves less."},{original:"The hotel was expensive. Also, it was in a bad location.",keyword:"Furthermore",answer:"The hotel was expensive. Furthermore, it was in a bad location."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue with despite, however, whereas, or therefore.",lines:[{speaker:"A",text:"How did the project go?"},{speaker:"B",text:"[Despite] a difficult start, we finished on time. [However], the client wanted changes at the last minute."},{speaker:"A",text:"That's frustrating. [Whereas] our team always delivers, theirs seems disorganised."},{speaker:"B",text:"Exactly. The budget was also tight. [Therefore], we had to cut some features."},{speaker:"A",text:"[Despite] all that, I think the result was good."},{speaker:"B",text:"Agreed. [However], I hope the next project is smoother."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Despite it was cold, we went for a walk.",correct:"Despite the cold, we went for a walk.",hint:"Despite + noun/gerund \u2014 not despite + clause."},{wrong:"However she was tired, she finished.",correct:"Although she was tired, she finished.",hint:"However connects sentences \u2014 use although for clauses."},{wrong:"The roads were icy, therefore the match was cancelled.",correct:"The roads were icy. Therefore, the match was cancelled.",hint:"Therefore needs a full stop before it, comma after."},{wrong:"Whereas he works hard but earns little.",correct:"He works hard, whereas he earns little.",hint:"Whereas already expresses contrast \u2014 don't add but."}]}]},

{id:"wish",title:"Wish / if only",subtitle:"I wish I knew, if only I had more time",intro:"Expressing regret, dissatisfaction, and longing for things to be different.",desc:"Wish and if only are used when reality is not what we want it to be. Like the second conditional, they use past tense to signal unreality \u2014 not past time.",tip:"The parallel with the second conditional is exact and helps enormously: <em>\"If I had more money, I would...\"</em> \u2014 same idea as <em>\"I wish I had more money.\"</em> Both use the past tense to signal: this is not my reality. The tense shift is about unreality, not time.",explanation:"<p>Wish and if only express a desire for things to be different from the present reality, or regret about a past situation. Like conditionals, they use tense shift to signal unreality.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Wish + past simple</strong> \u2014 dissatisfaction with the present, desire for things to be different now. <em>\"I wish I spoke Spanish.\"</em> (I don't speak Spanish \u2014 I want to.) / <em>\"I wish it wasn't so cold.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Wish + could</strong> \u2014 wishing for an ability you don't currently have. <em>\"I wish I could drive.\"</em> / <em>\"She wishes she could afford it.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Wish + would</strong> \u2014 expressing frustration about someone's behaviour, or a desire for a change. <em>\"I wish you would listen!\"</em> / <em>\"I wish it would stop raining.\"</em> Note: wish + would is NOT used with the same subject. <em>\"I wish I would...\"</em> is wrong \u2014 use wish + past simple for your own situation.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Wish + past perfect</strong> \u2014 regret about a past situation that cannot be changed. <em>\"I wish I had studied harder.\"</em> / <em>\"She wishes she hadn't said that.\"</em></div></div>\n<div class=\"note\"><strong>If only</strong> = more emphatic version of wish. Same grammar, stronger feeling.<br>\n<em>\"If only I had more time!\"</em> / <em>\"If only I hadn't said that.\"</em><br>\n<strong>Wish + was or were?</strong> Formally, <em>were</em> is preferred after wish (mirroring the second conditional). <em>\"I wish I were taller.\"</em> In informal speech, <em>was</em> is common and widely accepted.</div>",table:{headers:["Structure","Use","Example"],rows:[["wish + past simple","dissatisfaction with present situation","I wish I lived nearer."],["wish + could","wishing for a present ability","I wish I could sing."],["wish + would","frustration with someone's behaviour or desire for change","I wish you would stop interrupting."],["wish + past perfect","regret about a past event","I wish I had studied harder."],["if only + past simple","emphatic dissatisfaction with present","If only I had more time!"],["if only + past perfect","emphatic regret about the past","If only I hadn't said that."]]},examples:[{type:"pos",eng:"I wish I spoke French \u2014 it would be so useful.",note:"Wish + past simple \u2014 present dissatisfaction."},{type:"pos",eng:"She wishes she could afford to travel more.",note:"Wish + could \u2014 wishing for an ability."},{type:"pos",eng:"I wish you would turn that music down!",note:"Wish + would \u2014 frustration about someone else's behaviour."},{type:"pos",eng:"I wish I had taken that job when I had the chance.",note:"Wish + past perfect \u2014 regret about a past decision."},{type:"pos",eng:"If only I had more time to spend with my family.",note:"If only \u2014 more emphatic, same grammar as wish."},{type:"neg",eng:"I wish I hadn't eaten so much \u2014 I feel terrible.",note:"Wish + past perfect negative \u2014 regret."}],errors:[{bad:"I wish I would speak better English.",good:"I wish I spoke better English.",reason:"Wish + would cannot have the same subject for I. Use past simple for your own situation."},{bad:"I wish I can drive.",good:"I wish I could drive.",reason:"Ability wish \u2192 wish + could, not can."},{bad:"If only I study harder last year.",good:"If only I had studied harder last year.",reason:"Regret about the past \u2192 wish/if only + past perfect."},{bad:"I wish it stops raining.",good:"I wish it would stop raining.",reason:"Wishing for a change to happen \u2192 wish + would for external situations."}],realUse:["\"I wish I'd known sooner.\" \u2014 very common regret expression.","\"If only I could turn back time.\" \u2014 melodramatic but genuinely used.","\"I wish people would be more considerate.\" \u2014 social frustration.","\"Don't you wish you were here?\" \u2014 famous holiday postcard phrase."],exercises:[{type:"gap",title:"Wish/if only \u2014 present and past",sub:"Fill each gap with the correct form.",items:[{answer:"spoke",before:"I wish I ",after:" Italian. (speak \u2014 present wish)"},{answer:"could drive",before:"She wishes she ",after:". (ability wish)"},{answer:"would listen",before:"I wish you ",after:" for once! (frustration wish)"},{answer:"hadn't said",before:"I wish I ",after:" that \u2014 it was hurtful. (past regret)"},{answer:"had studied",before:"If only I ",after:" harder at school. (past regret)"},{answer:"were / was",before:"I wish it ",after:" warmer today. (present wish \u2014 temperature)"},{answer:"would stop",before:"I wish this rain ",after:". (desire for external change)"},{answer:"had taken",before:"She wishes she ",after:" the job when she had the chance. (past regret)"}]},{type:"mc",title:"Which form after wish?",sub:"Choose the correct form.",items:[{q:"I wish I _____ to work by bike. (I can't currently)",opts:["can cycle","could cycle","would cycle","cycled"],answer:"could cycle",explanation:"Wishing for an ability you don't currently have \u2192 wish + could."},{q:"I wish you _____ interrupting me all the time!",opt
