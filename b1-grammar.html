s:["stopped","would stop","stop","had stopped"],answer:"would stop",explanation:"Frustration about someone else's repeated behaviour \u2192 wish + would."},{q:"I wish I _____ that. It caused so many problems.",opts:["didn't say","wouldn't say","hadn't said","don't say"],answer:"hadn't said",explanation:"Regret about a past action \u2192 wish + past perfect negative."},{q:"If only she _____ the truth earlier.",opts:["told","would tell","had told","tells"],answer:"had told",explanation:"Regret that she didn't tell the truth in the past \u2192 if only + past perfect."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"I don't have a bigger flat. I want one.",keyword:"I wish",answer:"I wish I had a bigger flat."},{original:"I can't play the guitar. I'd love to.",keyword:"I wish",answer:"I wish I could play the guitar."},{original:"You always interrupt me. Please stop.",keyword:"I wish you",answer:"I wish you would stop interrupting me."},{original:"I didn't apply for the job. I regret it.",keyword:"I wish",answer:"I wish I had applied for the job."},{original:"She didn't tell me. I'm annoyed she didn't.",keyword:"If only",answer:"If only she had told me."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using wish or if only.",lines:[{speaker:"A",text:"I [wish] I could speak Spanish fluently."},{speaker:"B",text:"Me too. [If only] we had studied harder at school."},{speaker:"A",text:"I know. I [wish] I [hadn't] dropped it in the third year."},{speaker:"B",text:"At least you can still learn. I [wish] I [had] more time. Work takes everything."},{speaker:"A",text:"[If only] weekends were longer!"},{speaker:"B",text:"Absolutely. I [wish] things [were] different. But what can you do?"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I wish I would speak better English.",correct:"I wish I spoke better English.",hint:"Same subject \u2014 use past simple, not would."},{wrong:"I wish I can drive.",correct:"I wish I could drive.",hint:"Ability wish \u2192 could, not can."},{wrong:"If only I study harder last year.",correct:"If only I had studied harder last year.",hint:"Past regret \u2192 past perfect."},{wrong:"I wish it stops raining.",correct:"I wish it would stop raining.",hint:"Desire for external change \u2192 wish + would."},{wrong:"She wishes she hasn't said that.",correct:"She wishes she hadn't said that.",hint:"Past regret \u2192 past perfect negative."}]}]},

{id:"prepositionsb1",title:"Prepositions: fixed expressions",subtitle:"good at, interested in, on time, by accident",intro:"Prepositions in common collocations, phrases, and fixed expressions.",desc:"At B1 the challenge with prepositions is less about in/on/at and more about the fixed combinations that cannot be predicted from rules. These must be learnt as chunks \u2014 the logic often does not translate from other languages.",tip:"The honest truth about fixed preposition expressions: there is no shortcut. But there are patterns \u2014 <em>at</em> tends to appear with skills and activities (good at, bad at, surprised at), <em>in</em> with involvement and interest (interested in, involved in, believe in), <em>of</em> with feelings and relationships (afraid of, fond of, proud of). Learning them in groups helps.",explanation:"<p>Many verbs, adjectives, and nouns in English have fixed prepositions that must be memorised. These cannot always be predicted from the meaning \u2014 they are collocations.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Adjective + preposition</strong> \u2014 fixed combinations: <em>good/bad/brilliant at, interested in, afraid/scared of, proud/ashamed of, responsible for, famous for, keen on, tired of, similar to, different from, excited about, worried about, satisfied with, dependent on.</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Verb + preposition</strong> \u2014 fixed combinations: <em>agree with/on, apologise for, apply for, believe in, belong to, care about/for, complain about, concentrate on, deal with, depend on, insist on, laugh at, look forward to, rely on, succeed in, suffer from, think about/of.</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Fixed prepositional phrases</strong> \u2014 time and manner expressions: <em>on time</em> (punctual) vs <em>in time</em> (before it's too late), <em>by accident/mistake</em>, <em>by chance</em>, <em>in the end</em>, <em>at last</em>, <em>on purpose</em>, <em>in a hurry</em>, <em>in trouble</em>, <em>at risk</em>, <em>in charge of</em>, <em>at least</em>.</div></div>\n<div class=\"note\"><strong>On time vs in time:</strong><br>\n<em>On time</em> = punctual, at the scheduled time. <em>\"The train arrived on time.\"</em><br>\n<em>In time</em> = before it's too late, with enough time to spare. <em>\"We got there in time to catch the train.\"</em><br>\n<strong>By accident vs on purpose:</strong><br>\n<em>By accident / by mistake</em> = unintentional. <em>\"I deleted it by accident.\"</em><br>\n<em>On purpose</em> = intentional, deliberate. <em>\"She did it on purpose.\"</em></div>",table:{headers:["Category","Preposition","Examples"],rows:[["Adjective + prep","at","good at, bad at, brilliant at, surprised at, shocked at"],["Adjective + prep","of","afraid of, scared of, proud of, ashamed of, fond of, tired of, aware of"],["Adjective + prep","about","excited about, worried about, enthusiastic about, serious about"],["Adjective + prep","for","famous for, responsible for, sorry for, grateful for"],["Adjective + prep","with","satisfied with, pleased with, bored with, familiar with"],["Adjective + prep","in","interested in, involved in, experienced in"],["Verb + prep","for","apply for, apologise for, wait for, look for, pay for, thank for"],["Verb + prep","on","depend on, rely on, insist on, concentrate on, agree on"],["Verb + prep","about","think about, worry about, complain about, care about"],["Fixed phrases","on/in/by","on time, in time, by accident, on purpose, in the end, at last"]]},examples:[{type:"pos",eng:"She's very good at explaining complex ideas.",note:"Good at + gerund \u2014 fixed preposition."},{type:"pos",eng:"He's been interested in astronomy since he was a child.",note:"Interested in \u2014 fixed adjective + preposition."},{type:"pos",eng:"I deleted the file by accident \u2014 I'm sorry.",note:"By accident = unintentional."},{type:"pos",eng:"The train arrived on time, which was a pleasant surprise.",note:"On time = punctual, at the scheduled time."},{type:"pos",eng:"We got to the airport in time to catch our flight.",note:"In time = before it was too late."},{type:"neg",eng:"I don't agree with their decision.",note:"Agree with (a person or decision)."}],errors:[{bad:"She's good in maths.",good:"She's good at maths.",reason:"Good at \u2014 fixed preposition. Good in is not standard."},{bad:"I'm interested about history.",good:"I'm interested in history.",reason:"Interested in \u2014 always in, not about."},{bad:"He did it by purpose.",good:"He did it on purpose.",reason:"Intentional action \u2192 on purpose. By accident is the opposite."},{bad:"We arrived on time to catch the bus.",good:"We arrived in time to catch the bus.",reason:"In time = before it was too late (enough time to spare)."}],realUse:["\"I look forward to hearing from you.\" \u2014 email sign-off \u2014 to is a preposition here (gerund follows).","\"She's really into music.\" \u2014 into = very interested in (informal).","\"In the end, everything worked out.\" \u2014 fixed phrase for final result.","\"At least it's not raining.\" \u2014 silver lining expression."],richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Adjective + preposition</div>\n<div class=\"colloc-grid\">\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">at</div><div class=\"colloc-card-items\">good at \u00b7 bad at \u00b7 brilliant at \u00b7 surprised at \u00b7 shocked at \u00b7 angry at</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">of</div><div class=\"colloc-card-items\">afraid of \u00b7 proud of \u00b7 tired of \u00b7 fond of \u00b7 ashamed of \u00b7 aware of \u00b7 capable of</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">about</div><div class=\"colloc-card-items\">worried about \u00b7 excited about \u00b7 serious about \u00b7 enthusiastic about \u00b7 right about</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">for</div><div class=\"colloc-card-items\">famous for \u00b7 responsible for \u00b7 sorry for \u00b7 grateful for \u00b7 ready for \u00b7 suitable for</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">with</div><div class=\"colloc-card-items\">satisfied with \u00b7 pleased with \u00b7 bored with \u00b7 familiar with \u00b7 disappointed with</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">in</div><div class=\"colloc-card-items\">interested in \u00b7 involved in \u00b7 experienced in \u00b7 successful in \u00b7 disappointed in</div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Verb + preposition</div>\n<div class=\"colloc-grid\">\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">for</div><div class=\"colloc-card-items\">apply for \u00b7 apologise for \u00b7 wait for \u00b7 look for \u00b7 pay for \u00b7 thank for \u00b7 hope for</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">on</div><div class=\"colloc-card-items\">depend on \u00b7 rely on \u00b7 insist on \u00b7 concentrate on \u00b7 agree on \u00b7 work on \u00b7 spend on</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">about</div><div class=\"colloc-card-items\">think about \u00b7 worry about \u00b7 complain about \u00b7 care about \u00b7 know about \u00b7 talk about</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">with</div><div class=\"colloc-card-items\">agree with \u00b7 deal with \u00b7 help with \u00b7 argue with \u00b7 compare with \u00b7 face with</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">in</div><div class=\"colloc-card-items\">believe in \u00b7 succeed in \u00b7 result in \u00b7 specialise in \u00b7 participate in \u00b7 invest in</div></div>\n<div class=\"colloc-card\"><div class=\"colloc-card-head\">to applied ",after:" the job last week."},{answer:"on",before:"You can always rely ",after:" her."},{answer:"about",before:"He keeps complaining ",after:" the same things."},{answer:"for",before:"She apologised ",after:" being late."},{answer:"on",before:"Let's concentrate ",after:" the main issue."},{answer:"in",before:"I don't believe ",after:" coincidences."},{answer:"with",before:"Do you agree ",after:" what he said?"},{answer:"to",before:"I'm looking forward ",after:" seeing you."}]},{type:"mc",title:"On time or in time?",sub:"Choose the correct phrase.",items:[{q:"The meeting started _____. Everyone was there at 9 sharp.",opts:["in time","on time","by time","at time"],answer:"on time",explanation:"On time = punctual, at the scheduled moment."},{q:"We ran to the station and got there _____ to catch the last train.",opts:["on time","by time","in time","at time"],answer:"in time",explanation:"In time = before it was too late, with time to spare."},{q:"She broke the vase _____. It was an accident.",opts:["on purpose","by accident","in purpose","at purpose"],answer:"by accident",explanation:"By accident / by mistake = unintentional."},{q:"He knew the answer \u2014 he got it wrong _____.",opts:["by accident","in purpose","on purpose","by purpose"],answer:"on purpose",explanation:"On purpose = deliberate, intentional."}]},{type:"categorise",title:"Which preposition?",sub:"Click a phrase, then click the correct column.",categories:[{name:"at",items:["good at","brilliant at","surprised at","bad at","shocked at"]},{name:"of",items:["afraid of","proud of","tired of","fond of","ashamed of"]},{name:"about",items:["worried about","excited about","serious about","enthusiastic about"]},{name:"for",items:["famous for","responsible for","sorry for","apply for","wait for"]}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She's very good in cooking.",correct:"She's very good at cooking.",hint:"Good at \u2014 always at."},{wrong:"I'm very interested // ── STICKY LESSON BAR ──
function updateSticky(l){
  document.getElementById('sticky-title').textContent = l.title;
  document.getElementById('sticky-intro').textContent = l.intro.replace(/<[^>]+>/g,'');
  document.getElementById('sticky-level').textContent = document.querySelector('.level-tag') ? document.querySelector('.level-tag').textContent : '';
}
const stickyBar = document.getElementById('lesson-sticky');
const heroObserver = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    stickyBar.classList.toggle('visible', !e.isIntersecting);
  });
},{threshold:0,rootMargin:'-53px 0px 0px 0px'});
function observeHero(){
  const hero = document.querySelector('.lesson-hero');
  if(hero) heroObserver.observe(hero);
}

// ── PRINT ──
function printLesson(){
  const labels = document.querySelectorAll('.section-label');
  const wasCollapsed = [];
  labels.forEach((label,i)=>{
    const body = label.nextElementSibling;
    wasCollapsed[i] = label.classList.contains('collapsed');
    if(wasCollapsed[i]){
      label.classList.remove('collapsed');
      if(body) body.classList.remove('collapsed');
    }
  });
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      labels.forEach((label,i)=>{
        if(wasCollapsed[i]){
          label.classList.add('collapsed');
          const body = label.nextElementSibling;
          if(body) body.classList.add('collapsed');
        }
      });
    }, 500);
  }, 150);
}

// ── COLLAPSIBLE SECTIONS ──
function toggleAllSections(btn){
  const isOpen = btn.textContent === 'Open all';
  document.querySelectorAll('.section-label').forEach(label=>{
    const body = label.nextElementSibling;
    if(body && body.classList.contains('section-body')){
      if(isOpen){ label.classList.remove('collapsed'); body.classList.remove('collapsed'); }
      else { label.classList.add('collapsed'); body.classList.add('collapsed'); }
    }
  });
  btn.textContent = isOpen ? 'Close all' : 'Open all';
}

function toggleSection(label){
  label.classList.toggle('collapsed');
  const body = label.nextElementSibling;
  if(body && body.classList.contains('section-body')){
    body.classList.toggle('collapsed');
  }
}

// ── SIDEBAR ──
function buildSidebar(){
  const nav = document.getElementById('topic-nav');
  nav.innerHTML = lessons.map((l,i)=>`
    <button class="topic-link${i===current?' active':''}${done.includes(l.id)?' done':''}" onclick="goto(${i})">
      <span class="tl-num">${String(i+1).padStart(2,'0')}</span>
      <span class="tl-check">${done.includes(l.id)?'✓':''}</span>
      <span class="tl-name">${l.title}<br><small style="font-size:11px;opacity:.6">${l.subtitle}</small></span>
    </button>`).join('');
  const pct = (done.length/lessons.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done.length}/${lessons.length}`;
}

// ── BUILD LESSON ──
function buildLesson(l, idx){
  const isLast = idx===lessons.length-1;
  const isDone = done.includes(l.id);

  const tableHTML = `<table class="form-table">
    <thead><tr>${l.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${l.table.rows.map(r=>`<tr>${r.map((c,ci)=>`<td class="${ci===0?'subject':ci===1?'form':ci===2?'neg':'example'}">${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;

  const exHTML = l.examples.map(e=>`
    <div class="example-item">
      <div class="ex-marker ${e.type}">${e.type==='pos'?'+':e.type==='neg'?'−':'?'}</div>
      <div><div class="ex-eng">${e.eng}</div><div class="ex-note">${e.note}</div></div>
    </div>`).join('');

  const errHTML = l.errors.map(e=>`
    <div class="error-row">
      <div class="error-bad"><div class="error-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Wrong</div><div class="error-text">${e.bad}</div></div>
      <div class="error-good"><div class="error-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Correct</div><div class="error-text">${e.good}</div></div>
    </div>
    `).join('');

  const realHTML = l.realUse.map(r=>`<li>${r}</li>`).join('');

  const exerciseHTML = l.exercises.map((ex,ei)=>{

    // ── GAP FILL ──
    if(ex.type==='gap'){
      const items = ex.items.map((it,ii)=>`
        <div class="gap-sentence">
          <span class="gap-num">${ii+1}.</span>
          <span>${(it.before||'').replace(/_+\s*$/,'').trimEnd()}</span>
          <span class="gap-wrap">
            <input class="gap-input" id="gap-${l.id}-${ei}-${ii}" data-answer="${it.answer}" placeholder="" autocomplete="off" style="width:${Math.max(4,it.answer.length+1)}ch">
            <span class="gap-reveal" id="gap-rev-${l.id}-${ei}-${ii}"></span>
          </span>
          <span>${(it.after||'').replace(/^\s*_+/,'').trimStart()}</span>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Gap fill</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkGap('${l.id}',${ei},${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetGap('${l.id}',${ei},${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-gap-${l.id}-${ei}"></div>
        </div></div>`;
    }

    // ── MULTIPLE CHOICE ──
    if(ex.type==='mc'){
      const items = ex.items.map((it,ii)=>`
        <div class="mc-question" id="mc-${l.id}-${ei}-${ii}">
          <div class="mc-text">${ii+1}. ${it.q}</div>
          <div class="mc-options">${it.opts.map(o=>`<button class="mc-opt" onclick="pickMC('${l.id}',${ei},${ii},'${o.replace(/'/g,"'")}','${it.answer.replace(/'/g,"'")}','${it.explanation.replace(/'/g,"'")}')" data-opt="${o}">${o}</button>`).join('')}</div>
          <div class="mc-feedback" id="mcfb-${l.id}-${ei}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Multiple choice</span>
        </div>
        <div class="ex-card-body">${items}</div></div>`;
    }

    // ── ERROR CORRECTION ──
    if(ex.type==='ec'){
      const items = ex.items.map((it,ii)=>`
        <div class="ec-item">
          <div class="ec-sentence">✗ ${it.wrong}</div>
          <div class="ec-input-row">
            <input class="ec-input" id="ec-${l.id}-${ei}-${ii}" data-answer="${it.correct}" placeholder="Write the correct sentence…">
          </div>
          <div style="font-size:11px;color:var(--ink3);margin-top:4px">Hint: ${it.hint}</div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Error correction</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkEC('${l.id}',${ei},${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetEC('${l.id}',${ei},${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-ec-${l.id}-${ei}"></div>
        </div></div>`;
    }

    // ── SENTENCE BUILDER ──
    if(ex.type==='builder'){
      const sid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>{
        const shuffled = [...it.words].sort(()=>Math.random()-.5);
        const wordBtns = shuffled.map((w,wi)=>`<button class="sb-word" id="sbw-${sid}-${ii}-${wi}" data-word="${w}" onclick="sbClick('${sid}',${ii},${wi})">${w}</button>`).join('');
        return `<div class="sb-sentence" id="sb-sent-${sid}-${ii}">
          <div class="sb-sentence-num">${ii+1}.</div>
          ${it.context?`<div class="sb-context">${it.context}</div>`:''}
          <div class="sb-slot" id="sb-slot-${sid}-${ii}"></div>
          <div class="sb-bank" id="sb-bank-${sid}-${ii}">${wordBtns}</div>
          <div class="sb-result" id="sb-res-${sid}-${ii}"></div>
        </div>`;
      }).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Sentence builder</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkBuilder('${sid}',${ex.items.length},${JSON.stringify(ex.items.map(i=>i.answer)).replace(/"/g,'&quot;')})">Check answers</button>
            <button class="btn-reset" onclick="resetBuilder('${sid}',${ex.items.length},${JSON.stringify(ex.items.map(i=>i.words)).replace(/"/g,'&quot;')})">Reset</button>
          </div>
          <div class="score-badge" id="score-sb-${sid}"></div>
        </div></div>`;
    }

    // ── MATCHING ──
    if(ex.type==='match'){
      const mid = `${l.id}-${ei}`;
      const leftBtns = ex.pairs.map((p,pi)=>`<button class="match-item" id="ml-${mid}-${pi}" data-idx="${pi}" data-side="left" onclick="matchClick('${mid}',${pi},'left')">${p.left}</button>`).join('');
      const rightShuffled = ex.pairs.map((p,pi)=>({text:p.right,idx:pi})).sort(()=>Math.random()-.5);
      const rightBtns = rightShuffled.map((p,ri)=>`<button class="match-item" id="mr-${mid}-${ri}" data-idx="${p.idx}" data-side="right" onclick="matchClick('${mid}',${ri},'right')">${p.text}</button>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Matching</span>
        </div>
        <div class="ex-card-body">
          <div class="match-cols">
            <div><div class="match-col-head">${ex.leftHead||'A'}</div>${leftBtns}</div>
            <div><div class="match-col-head">${ex.rightHead||'B'}</div>${rightBtns}</div>
          </div>
          <div class="score-badge" id="score-match-${mid}"></div>
        </div></div>`;
    }

    // ── TRANSFORMATION ──
    if(ex.type==='transform'){
      const tid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>`
        <div class="transform-item">
          <div class="transform-original">${ii+1}. ${it.original}<br><span style="font-size:12px;color:var(--ink3)">Use: <span class="transform-keyword">${it.keyword}</span></span></div>
          <input class="transform-input" id="tr-${tid}-${ii}" data-answer="${it.answer}" placeholder="Rewrite the sentence…">
          <div class="transform-reveal" id="tr-rev-${tid}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Transformation</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkTransform('${tid}',${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetTransform('${tid}',${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-tr-${tid}"></div>
        </div></div>`;
    }

    // ── CATEGORISATION ──
    if(ex.type==='categorise'){
      const cid = `${l.id}-${ei}`;
      const allWords = ex.categories.flatMap((c,ci)=>c.items.map(w=>({w,ci}))).sort(()=>Math.random()-.5);
      const wordBtns = allWords.map((item,wi)=>`<button class="cat-word" id="cw-${cid}-${wi}" data-cat="${item.ci}" onclick="catClick('${cid}',${wi})">${item.w}</button>`).join('');
      const cols = ex.categories.map((c,ci)=>`
        <div class="cat-col" id="cc-${cid}-${ci}" onclick="catColClick('${cid}',${ci})" style="cursor:pointer">
          <div class="cat-col-head" style="color:${['var(--sky)','var(--sea)','var(--sun)','var(--lav)'][ci]||'var(--ink3)'}">${c.name}</div>
          <div class="cat-col-items" id="cc-items-${cid}-${ci}"></div>
        </div>`).join('');
      const colStyle = `grid-template-columns:repeat(${ex.categories.length},1fr)`;
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Categorise</span>
        </div>
        <div class="ex-card-body">
          <div class="cat-bank" id="cb-${cid}">${wordBtns}</div>
          <div class="cat-columns" style="${colStyle}">${cols}</div>
          <div class="check-row">
            <button class="btn-check" onclick="checkCat('${cid}',${ex.categories.length})">Check answers</button>
            <button class="btn-reset" onclick="resetCat('${cid}',${ex.categories.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-cat-${cid}"></div>
        </div></div>`;
    }

    // ── CONVERSATION FILL ──
    if(ex.type==='convo'){
      const cvid = `${l.id}-${ei}`;
      let gapCount = 0;
      const lines = ex.lines.map((line,li)=>{
        const spk = line.speaker==='A'?'a':'b';
        const text = line.text.replace(/\[([^\]]+)\]/g,(match,ans)=>{
          const gi = gapCount++;
          return `<span class="convo-gwrap"><input class="convo-input" id="cv-${cvid}-${gi}" data-answer="${ans}" autocomplete="off" style="width:${Math.max(4,ans.replace(/\//g,'').split('/')[0].length+1)}ch"><span class="convo-reveal" id="cv-rev-${cvid}-${gi}"></span></span>`;
        });
        return `<div class="convo-line"><span class="convo-speaker ${spk}">${line.speaker}</span><span class="convo-text">${text}</span></div>`;
      }).join('');
      const total = gapCount;
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Conversation</span>
        </div>
        <div class="ex-card-body">
          <div class="convo-wrap">${lines}</div>
          <div class="check-row">
            <button class="btn-check" onclick="checkConvo('${cvid}',${total})">Check answers</button>
            <button class="btn-reset" onclick="resetConvo('${cvid}',${total})">Reset</button>
          </div>
          <div class="score-badge" id="score-cv-${cvid}"></div>
        </div></div>`;
    }

    // ── TRUE / FALSE / NOT GIVEN ──
    if(ex.type==='tf'){
      const tfid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>`
        <div class="tf-item">
          ${it.context?`<div class="tf-context">"${it.context}"</div>`:''}
          <div class="tf-statement">${ii+1}. ${it.statement}</div>
          <div class="tf-options">
            ${['True','False','Not given'].map(opt=>`<button class="tf-btn" onclick="pickTF('${tfid}',${ii},'${opt}','${it.answer}','${it.explanation.replace(/'/g,"'")}') ">${opt}</button>`).join('')}
          </div>
          <div class="tf-feedback" id="tf-fb-${tfid}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">True / False</span>
        </div>
        <div class="ex-card-body">${items}</div></div>`;
    }

  }).join('');

  return `
  <div class="lesson-hero">
    <div class="lesson-meta">
      <span class="level-tag">B1</span>
      <span class="lesson-num">Topic ${idx+1} of ${lessons.length}</span>
    </div>
    <h1>${l.title} <span style="color:var(--ink3);font-weight:400;font-size:22px">— ${l.subtitle}</span></h1>
    <p>${l.desc}</p>
    <div class="lesson-toolbar">
      <button class="btn ${isDone?'btn-done':'btn-primary'}" onclick="markDone('${l.id}',${idx})" id="done-btn-${l.id}">
        ${isDone?'✓ Completed':'Mark as complete'}
      </button>
      <button class="btn btn-ghost" onclick="printLesson()">Print lesson</button>
    </div>
  </div>
  <div class="lesson-body">
    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span><h2>Explanation</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="explain-card">
          <div class="explain-lead">${l.intro}</div>
          <div class="explain-body">${l.explanation}</div>
        </div>
        ${tip(l.tip)}
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span><h2>${l.richContent ? (l.richLabel||'Reference') : 'Form & structure'}</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        ${l.richContent ? `<div class="explain-card">${l.richContent}</div>` : `<div class="explain-card" style="padding:0;overflow:hidden">${tableHTML}</div>`}
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span><h2>Examples</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="examples-grid">${exHTML}</div>
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span><h2>Common errors</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="error-card"><h3>What learners get wrong — and why</h3>${errHTML}</div>
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1 4-10z"/></svg></span><h2>In real use</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="real-use"><h3>Native speaker patterns</h3><ul>${realHTML}</ul></div>
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="14 2 18 6 7 17 3 17 3 13 14 2"/><line x1="3" y1="22" x2="21" y2="22"/></svg></span><h2>Practice</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div style="display:flex;flex-direction:column;gap:16px">${exerciseHTML}</div>
      </div>
    </div>

  </div>
  <div class="lesson-footer">
    <div class="footer-hint">${isDone?"✓ You've completed this topic.":"Complete the exercises above, then mark this topic as done."}</div>
    <div class="footer-nav">
      ${idx>0?`<button class="btn btn-ghost" onclick="goto(${idx-1})">← Previous</button>`:''}
      ${!isLast?`<button class="btn btn-primary" onclick="goto(${idx+1})">Next topic →</button>`:`<button class="btn btn-done" onclick="alert('You\'ve completed the full B1 course! 🎉')">Finish B1 🎉</button>`}
    </div>
  </div>`;
}

// ── NAVIGATION ──
function goto(i){
  current=i;
  const main=document.getElementById('main');
  main.innerHTML=buildLesson(lessons[i],i);
  updateSticky(lessons[i]);
  observeHero();
  main.style.animation='none';
  main.offsetHeight;
  main.style.animation='fadeUp .25s ease forwards';
  document.getElementById('breadcrumb-topic').textContent=lessons[i].title;
  buildSidebar();
  window.scrollTo(0,0);
}

// ── MARK DONE ──
function markDone(id,idx){
  if(!done.includes(id)){done.push(id);localStorage.setItem('jpe-b1-done',JSON.stringify(done));}
  goto(idx);
}

// ── GAP FILL ──
function checkGap(lid,ei,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`gap-${lid}-${ei}-${i}`);
    const rev=document.getElementById(`gap-rev-${lid}-${ei}-${i}`);
    const accepted=inp.dataset.answer.toLowerCase().split('/').map(a=>a.trim());
    const val=inp.value.toLowerCase().trim();
    const ok=accepted.includes(val)||(val===''&&accepted.includes('—'));
    if(ok){inp.className='gap-input correct';rev.className='gap-reveal';correct++;}
    else{inp.className='gap-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='gap-reveal show';}
  }
  const badge=document.getElementById(`score-gap-${lid}-${ei}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetGap(lid,ei,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`gap-${lid}-${ei}-${i}`);
    const rev=document.getElementById(`gap-rev-${lid}-${ei}-${i}`);
    inp.value='';inp.className='gap-input';rev.textContent='';rev.className='gap-reveal';
  }
  document.getElementById(`score-gap-${lid}-${ei}`).className='score-badge';
}

// ── MULTIPLE CHOICE ──
function pickMC(lid,ei,qi,choice,answer,explanation){
  const container=document.getElementById(`mc-${lid}-${ei}-${qi}`);
  container.querySelectorAll('.mc-opt').forEach(o=>{
    o.classList.remove('correct-ans','wrong-ans');
    if(o.dataset.opt===answer) o.classList.add('correct-ans');
    if(o.dataset.opt===choice&&choice!==answer) o.classList.add('wrong-ans');
  });
  const fb=document.getElementById(`mcfb-${lid}-${ei}-${qi}`);
  fb.textContent=explanation;
  fb.className=`mc-feedback show ${choice===answer?'ok':'bad'}`;
}

// ── ERROR CORRECTION ──
function checkEC(lid,ei,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`ec-${lid}-${ei}-${i}`);
    const ans=inp.dataset.answer.toLowerCase().replace(/[.!?,]/g,'').trim();
    const val=inp.value.toLowerCase().replace(/[.!?,]/g,'').trim();
    if(val===ans){inp.className='ec-input correct';correct++;}
    else inp.className='ec-input wrong';
  }
  const badge=document.getElementById(`score-ec-${lid}-${ei}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetEC(lid,ei,count){
  for(let i=0;i<count;i++){const inp=document.getElementById(`ec-${lid}-${ei}-${i}`);inp.value='';inp.className='ec-input';}
  document.getElementById(`score-ec-${lid}-${ei}`).className='score-badge';
}

// ── SENTENCE BUILDER ──
const sbState={};
function sbClick(sid,si,wi){
  if(!sbState[sid]) sbState[sid]={};
  if(!sbState[sid][si]) sbState[sid][si]=[];
  const wordEl=document.getElementById(`sbw-${sid}-${si}-${wi}`);
  const word=wordEl.dataset.word;
  sbState[sid][si].push({word,wi});
  wordEl.classList.add('used');
  const slot=document.getElementById(`sb-slot-${sid}-${si}`);
  const placed=document.createElement('button');
  placed.className='sb-placed';
  placed.textContent=word;
  placed.onclick=()=>sbRemove(sid,si,wi,placed);
  slot.appendChild(placed);
}
function sbRemove(sid,si,wi,el){
  const wordEl=document.getElementById(`sbw-${sid}-${si}-${wi}`);
  wordEl.classList.remove('used');
  sbState[sid][si]=sbState[sid][si].filter(x=>x.wi!==wi);
  el.remove();
}
function checkBuilder(sid,count,answersJson){
  const answers=JSON.parse(answersJson.replace(/&quot;/g,'"'));
  let correct=0;
  for(let i=0;i<count;i++){
    const placed=(sbState[sid]&&sbState[sid][i])||[];
    const built=placed.map(x=>x.word).join(' ').toLowerCase().trim();
    const ans=answers[i].toLowerCase().trim();
    const res=document.getElementById(`sb-res-${sid}-${i}`);
    if(built===ans){res.textContent='✓ Correct!';res.className='sb-result show ok';correct++;}
    else{res.textContent=`✗ Answer: ${answers[i]}`;res.className='sb-result show bad';}
  }
  const badge=document.getElementById(`score-sb-${sid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetBuilder(sid,count,wordsJson){
  const words=JSON.parse(wordsJson.replace(/&quot;/g,'"'));
  sbState[sid]={};
  for(let i=0;i<count;i++){
    document.getElementById(`sb-slot-${sid}-${i}`).innerHTML='';
    document.getElementById(`sb-res-${sid}-${i}`).className='sb-result';
    const bank=document.getElementById(`sb-bank-${sid}-${i}`);
    const shuffled=[...words[i]].sort(()=>Math.random()-.5);
    bank.innerHTML=shuffled.map((w,wi)=>`<button class="sb-word" id="sbw-${sid}-${i}-${wi}" data-word="${w}" onclick="sbClick('${sid}',${i},${wi})">${w}</button>`).join('');
  }
  document.getElementById(`score-sb-${sid}`).className='score-badge';
}

// ── MATCHING ──
const matchState={};
function matchClick(mid,idx,side){
  if(!matchState[mid]) matchState[mid]={left:null,right:null};
  const elId=side==='left'?`ml-${mid}-${idx}`:`mr-${mid}-${idx}`;
  const el=document.getElementById(elId);
  if(el.classList.contains('matched')) return;
  // deselect same side
  document.querySelectorAll(`[id^="m${side==='left'?'l':'r'}-${mid}-"]`).forEach(e=>{if(!e.classList.contains('matched'))e.classList.remove('selected')});
  el.classList.add('selected');
  matchState[mid][side]={idx,elId};
  const ms=matchState[mid];
  if(ms.left&&ms.right){
    const leftEl=document.getElementById(ms.left.elId);
    const rightEl=document.getElementById(ms.right.elId);
    const leftDataIdx=leftEl.dataset.idx;
    const rightDataIdx=rightEl.dataset.idx;
    if(leftDataIdx===rightDataIdx){
      leftEl.classList.remove('selected');rightEl.classList.remove('selected');
      leftEl.classList.add('matched');rightEl.classList.add('matched');
      // check if all matched
      const total=document.querySelectorAll(`[id^="ml-${mid}-"]`).length;
      const matched=document.querySelectorAll(`[id^="ml-${mid}-"].matched`).length;
      const badge=document.getElementById(`score-match-${mid}`);
      if(matched===total){badge.textContent=`${total}/${total} — all matched! 🎉`;badge.className='score-badge show full';}
    } else {
      leftEl.classList.add('wrong-flash');rightEl.classList.add('wrong-flash');
      setTimeout(()=>{leftEl.classList.remove('wrong-flash','selected');rightEl.classList.remove('wrong-flash','selected');},600);
    }
    matchState[mid]={left:null,right:null};
  }
}

// ── TRANSFORMATION ──
function checkTransform(tid,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`tr-${tid}-${i}`);
    const rev=document.getElementById(`tr-rev-${tid}-${i}`);
    const ans=inp.dataset.answer.toLowerCase().replace(/[.!?,]/g,'').trim();
    const val=inp.value.toLowerCase().replace(/[.!?,]/g,'').trim();
    if(val===ans){inp.className='transform-input correct';rev.className='transform-reveal';correct++;}
    else{inp.className='transform-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='transform-reveal show';}
  }
  const badge=document.getElementById(`score-tr-${tid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetTransform(tid,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`tr-${tid}-${i}`);
    const rev=document.getElementById(`tr-rev-${tid}-${i}`);
    inp.value='';inp.className='transform-input';rev.textContent='';rev.className='transform-reveal';
  }
  document.getElementById(`score-tr-${tid}`).className='score-badge';
}

// ── CATEGORISATION ──
const catState={};
function catClick(cid,wi){
  if(!catState[cid]) catState[cid]={selected:null,placed:{}};
  const cs=catState[cid];
  const wordEl=document.getElementById(`cw-${cid}-${wi}`);
  if(wordEl.classList.contains('placed')) return;
  // find which column was most recently clicked (use a pending col)
  if(cs.pendingCol===undefined||cs.pendingCol===null){
    // first select the word
    document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>e.style.outline='');
    wordEl.style.outline='2px solid var(--sky)';
    cs.selectedWord={wi,word:wordEl.textContent,cat:parseInt(wordEl.dataset.cat)};
  }
}
function catColClick(cid,ci){
  if(!catState[cid]) catState[cid]={selectedWord:null,placed:{}};
  const cs=catState[cid];
  if(!cs.selectedWord) return;
  const {wi,word}=cs.selectedWord;
  const wordEl=document.getElementById(`cw-${cid}-${wi}`);
  wordEl.classList.add('placed');
  wordEl.style.outline='';
  const colItems=document.getElementById(`cc-items-${cid}-${ci}`);
  const placed=document.createElement('button');
  placed.className='cat-placed';
  placed.textContent=word;
  placed.dataset.wi=wi;
  placed.dataset.ci=String(ci);
  placed.dataset.correctCat=String(cs.selectedWord.cat);
  placed.style.background='var(--a1bg)';placed.style.borderColor='var(--sky)';placed.style.color='var(--sky)';
  placed.onclick=()=>{
    wordEl.classList.remove('placed');wordEl.style.outline='';
    placed.remove();
    if(catState[cid].placed[wi]) delete catState[cid].placed[wi];
  };
  colItems.appendChild(placed);
  cs.placed[wi]={ci,correctCat:cs.selectedWord.cat};
  cs.selectedWord=null;
  document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>e.style.outline='');
}
function checkCat(cid,numCols){
  const cs=catState[cid]||{placed:{}};
  let correct=0,total=0;
  // check each placed item
  for(const wi in cs.placed){
    const {ci,correctCat}=cs.placed[wi];
    const wordEl=document.getElementById(`cw-${cid}-${wi}`);
    total++;
    if(ci===correctCat) correct++;
  }
  // also count unplaced items (wrong — left in bank)
  document.querySelectorAll(`[id^="cw-${cid}-"]:not(.placed)`).forEach(()=>total++);
  // colour the columns
  for(let ci=0;ci<numCols;ci++){
    const col=document.getElementById(`cc-${cid}-${ci}`);
    const items=document.getElementById(`cc-items-${cid}-${ci}`);
    let colCorrect=true;
    items.querySelectorAll('.cat-placed').forEach(p=>{
      const correctCat=parseInt(p.dataset.correctCat);
      const placedIn=parseInt(p.dataset.ci);
      if(correctCat!==placedIn){colCorrect=false;p.style.background='#FFF0F0';p.style.borderColor='var(--coral)';p.style.color='var(--coral)';}
      else{p.style.background='#E8F8F5';p.style.borderColor='var(--sea)';p.style.color='#0F7A6A';}
    });
  }
  const badge=document.getElementById(`score-cat-${cid}`);
  const pct=total>0?Math.round((correct/total)*100):0;
  badge.textContent=`${correct}/${total} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetCat(cid,numCols){
  catState[cid]={selectedWord:null,placed:{}};
  document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>{e.classList.remove('placed');e.style.outline='';});
  for(let ci=0;ci<numCols;ci++) document.getElementById(`cc-items-${cid}-${ci}`).innerHTML='';
  document.getElementById(`score-cat-${cid}`).className='score-badge';
}

// ── CONVERSATION FILL ──
function checkConvo(cvid,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`cv-${cvid}-${i}`);
    const rev=document.getElementById(`cv-rev-${cvid}-${i}`);
    const accepted=inp.dataset.answer.toLowerCase().split('/').map(a=>a.trim());
    const val=inp.value.toLowerCase().trim();
    if(accepted.includes(val)){inp.className='convo-input correct';rev.className='convo-reveal';correct++;}
    else{inp.className='convo-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='convo-reveal show';}
  }
  const badge=document.getElementById(`score-cv-${cvid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetConvo(cvid,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`cv-${cvid}-${i}`);
    const rev=document.getElementById(`cv-rev-${cvid}-${i}`);
    inp.value='';inp.className='convo-input';rev.textContent='';rev.className='convo-reveal';
  }
  document.getElementById(`score-cv-${cvid}`).className='score-badge';
}

// ── TRUE / FALSE / NOT GIVEN ──
function pickTF(tfid,qi,choice,answer,explanation){
  const item=document.getElementById(`tf-fb-${tfid}-${qi}`).parentElement;
  item.querySelectorAll('.tf-btn').forEach(b=>{
    b.classList.remove('correct-ans','wrong-ans');
    if(b.textContent===answer) b.classList.add('correct-ans');
    if(b.textContent===choice&&choice!==answer) b.classList.add('wrong-ans');
  });
  const fb=document.getElementById(`tf-fb-${tfid}-${qi}`);
  fb.textContent=explanation;
  fb.className=`tf-feedback show ${choice===answer?'ok':'bad'}`;
}

// ── INIT ──
buildSidebar();
goto(0);

</script>
