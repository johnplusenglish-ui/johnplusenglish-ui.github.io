<style>
:root {

  --accent: #b45309;
  --accent-light: #fef3c7;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --blue: #2563eb;
  --blue-bg: #dbeafe;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}

.app{max-width:820px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* Header */
header{text-align:center;margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:2px solid var(--ink)}
.brand{font-family:'Outfit',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem}
.brand a{color:var(--accent);text-decoration:none}
header h1{font-family:'Crimson Pro',serif;font-size:clamp(2rem,5vw,2.8rem);line-height:1.15;letter-spacing:-0.02em;margin-bottom:0.4rem}
header p{color:var(--muted);font-size:0.92rem;font-weight:300}

/* Phase: select */
#selectPhase{}
.phase-title{font-family:'Crimson Pro',serif;font-size:1.4rem;margin-bottom:0.3rem}
.phase-desc{color:var(--muted);font-size:0.88rem;margin-bottom:1.5rem;font-weight:300}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.6rem;margin-bottom:1.5rem}
.cat-btn{
  font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:400;
  padding:0.6rem 0.9rem;border:1.5px solid var(--border);border-radius:4px;
  background:var(--card);color:var(--ink);cursor:pointer;transition:all 0.15s;
  text-align:left;display:flex;align-items:center;gap:0.5rem;
}
.cat-btn:hover{border-color:var(--ink)}
.cat-btn.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:500}
.cat-btn .cat-count{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted);margin-left:auto;flex-shrink:0}
.cat-btn.selected .cat-count{color:var(--accent)}

.controls{display:flex;gap:0.8rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.btn{
  font-family:'Outfit',sans-serif;font-weight:600;font-size:0.85rem;
  padding:0.6rem 1.5rem;border:1.5px solid var(--ink);border-radius:4px;
  cursor:pointer;transition:all 0.15s;background:var(--ink);color:var(--bg);
}
.btn:hover{opacity:0.85}
.btn.secondary{background:transparent;color:var(--ink)}
.btn.secondary:hover{background:var(--ink);color:var(--bg)}
.btn:disabled{opacity:0.3;cursor:default}
.select-info{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--muted)}

.mode-row{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.mode-btn{
  font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:500;
  padding:0.5rem 1rem;border:1.5px solid var(--border);border-radius:4px;
  background:var(--card);color:var(--ink);cursor:pointer;transition:all 0.15s;
}
.mode-btn:hover{border-color:var(--ink)}
.mode-btn.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* Quiz phase */
#quizPhase{display:none}
.progress-bar{background:var(--border);height:5px;border-radius:3px;margin-bottom:0.3rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width 0.4s ease;width:0%}
.progress-text{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);text-align:right;margin-bottom:2rem}

.q-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:5px;
  padding:1.5rem 1.8rem;margin-bottom:1.2rem;transition:border-color 0.3s;
}
.q-card.correct{border-color:var(--green);background:var(--green-bg)}
.q-card.wrong{border-color:var(--red);background:var(--red-bg)}
.q-meta{display:flex;gap:0.8rem;align-items:center;margin-bottom:0.6rem;flex-wrap:wrap}
.q-num{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.05em}
.q-type{font-size:0.7rem;font-weight:500;padding:0.15rem 0.5rem;border-radius:3px;background:var(--blue-bg);color:var(--blue)}
.q-cat{font-size:0.7rem;color:var(--muted);font-style:italic}
.q-sentence{font-family:'Crimson Pro',serif;font-size:1.15rem;line-height:1.7;margin-bottom:1rem}
.q-sentence .gap{
  display:inline-block;min-width:80px;border-bottom:2px dashed var(--accent);
  text-align:center;color:var(--green);font-weight:600;padding:0 0.2rem;
  font-family:'Outfit',sans-serif;font-size:0.95rem;
}
.q-def{font-size:0.85rem;color:var(--muted);margin-bottom:1rem;font-style:italic}

.input-row{display:flex;gap:0.5rem;align-items:center}
.q-input{
  font-family:'Outfit',sans-serif;font-size:0.92rem;padding:0.55rem 0.9rem;
  border:1.5px solid var(--border);border-radius:4px;flex:1;min-width:120px;
  background:transparent;color:var(--ink);outline:none;transition:border-color 0.2s;
}
.q-input:focus{border-color:var(--ink)}
.q-input:disabled{opacity:0.6}

.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem}
@media(max-width:500px){.mc-grid{grid-template-columns:1fr}}
.mc-btn{
  font-family:'Outfit',sans-serif;font-size:0.88rem;padding:0.6rem 0.9rem;
  border:1.5px solid var(--border);border-radius:4px;background:transparent;
  color:var(--ink);cursor:pointer;transition:all 0.15s;text-align:left;
}
.mc-btn:hover:not(.disabled){border-color:var(--ink)}
.mc-btn.selected{border-color:var(--accent);background:var(--accent-light)}
.mc-btn.right{border-color:var(--green);background:var(--green-bg)}
.mc-btn.wrong-pick{border-color:var(--red);background:var(--red-bg)}
.mc-btn.disabled{cursor:default;opacity:0.85}

.feedback{font-size:0.85rem;padding:0.5rem 0.8rem;border-radius:3px;margin-top:0.7rem;display:none;line-height:1.5}
.feedback.show{display:block;animation:fadeIn 0.25s ease}
.feedback.correct{background:var(--green-bg);color:#166534}
.feedback.wrong{background:var(--red-bg);color:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Results */
.results{display:none;text-align:center;padding:2rem;background:var(--card);border:2px solid var(--ink);border-radius:5px;margin-top:2rem}
.results.show{display:block;animation:fadeIn 0.4s ease}
.results h2{font-family:'Crimson Pro',serif;font-size:1.8rem;margin-bottom:0.3rem}
.results .score{font-family:'JetBrains Mono',monospace;font-size:3rem;font-weight:600;color:var(--accent);margin:0.6rem 0}
.results .score.great{color:var(--green)}
.results p{color:var(--muted);font-size:0.92rem}

@media(max-width:600px){
  .app{padding:1.5rem 1rem 3rem}
  .cat-grid{grid-template-columns:1fr}
  .q-card{padding:1.2rem}
}
</style>
</head>

</div>
</div>

er aware of or connected to", "The policy is out of touch ___ reality.", "with"]]};

let state = {
  selected: new Set(),
  mode: 'type',
  maxQ: 20,
  questions: [],
  answered: 0,
  correct: 0
};

// Build category grid
const grid = document.getElementById('catGrid');
Object.keys(DATA).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.dataset.cat = cat;
  const label = cat.replace(/^\d+\.\s*/, '');
  btn.innerHTML = `<span>${label}</span><span class="cat-count">${DATA[cat].length}</span>`;
  btn.onclick = () => toggleCat(cat, btn);
  grid.appendChild(btn);
});

function toggleCat(cat, btn) {
  if (state.selected.has(cat)) { state.selected.delete(cat); btn.classList.remove('selected'); }
  else { state.selected.add(cat); btn.classList.add('selected'); }
  updateInfo();
}

function selectAll() {
  document.querySelectorAll('.cat-btn').forEach(b => { b.classList.add('selected'); state.selected.add(b.dataset.cat); });
  updateInfo();
}
function selectNone() {
  document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('selected'); });
  state.selected.clear();
  updateInfo();
}

function updateInfo() {
  let total = 0;
  state.selected.forEach(c => total += DATA[c].length);
  document.getElementById('selectInfo').textContent = `${state.selected.size} selected · ${total} questions`;
  document.getElementById('startBtn').disabled = state.selected.size === 0;
}

function setMode(m, btn) {
  state.mode = m;
  btn.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function setCount(n, btn) {
  state.maxQ = n;
  btn.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getDistractors(answer, allPreps) {
  const common = ['to','for','of','with','in','on','at','from','about','by','against','into','between','over','towards','through','after','under'];
  let pool = common.filter(p => p !== answer.toLowerCase());
  // Add some from the dataset
  const extra = allPreps.filter(p => p !== answer.toLowerCase());
  pool = [...new Set([...pool, ...extra])];
  shuffle(pool);
  return pool.slice(0, 3);
}

function startQuiz() {
  let pool = [];
  let allPreps = new Set();
  state.selected.forEach(cat => {
    DATA[cat].forEach(entry => {
      if (entry[4] && entry[4].length > 0) {
        pool.push({ combo: entry[0], type: entry[1], def: entry[2], sentence: entry[3], answer: entry[4], cat: cat.replace(/^\d+\.\s*/, '') });
        allPreps.add(entry[4].toLowerCase());
      }
    });
  });

  shuffle(pool);
  if (state.maxQ > 0 && state.maxQ < pool.length) pool = pool.slice(0, state.maxQ);
  state.questions = pool;
  state.answered = 0;
  state.correct = 0;

  document.getElementById('selectPhase').style.display = 'none';
  document.getElementById('quizPhase').style.display = 'block';
  document.getElementById('results').classList.remove('show');

  const container = document.getElementById('quizCards');
  container.innerHTML = '';

  const allPrepsArr = [...allPreps];

  pool.forEach((q, i) => {
    const isType = state.mode === 'type' || (state.mode === 'mix' && Math.random() > 0.5);
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qcard_' + i;

    const sentenceHtml = q.sentence.replace('___', '<span class="gap" id="gap_' + i + '">&nbsp;</span>');

    let inputHtml = '';
    if (isType) {
      inputHtml = `<div class="input-row">
        <input class="q-input" type="text" id="inp_${i}" placeholder="Type the preposition…" onkeydown="if(event.key==='Enter')checkType(${i})">
        <button class="btn" onclick="checkType(${i})">Check</button>
      </div>`;
    } else {
      const distractors = getDistractors(q.answer, allPrepsArr);
      const opts = shuffle([q.answer.toLowerCase(), ...distractors]);
      inputHtml = `<div class="mc-grid">${opts.map((o, oi) =>
        `<button class="mc-btn" id="mc_${i}_${oi}" onclick="checkMC(${i},${oi},'${o}','${q.answer.toLowerCase()}')">${o}</button>`
      ).join('')}</div>`;
    }

    card.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${i+1} / ${pool.length}</span>
        <span class="q-type">${q.type}</span>
        <span class="q-cat">${q.cat}</span>
      </div>
      <div class="q-def">${q.combo} — ${q.def}</div>
      <div class="q-sentence">${sentenceHtml}</div>
      ${inputHtml}
      <div class="feedback" id="fb_${i}"></div>
    `;
    container.appendChild(card);
  });

  updateProgress();
  window.scrollTo({top: 0});
}

function checkType(i) {
  const q = state.questions[i];
  const input = document.getElementById('inp_' + i);
  if (input.disabled) return;
  const val = input.value.trim().toLowerCase();
  if (!val) return;

  const correct = val === q.answer.toLowerCase();
  input.disabled = true;
  input.parentElement.querySelector('.btn').disabled = true;
  const card = document.getElementById('qcard_' + i);
  const fb = document.getElementById('fb_' + i);
  const gap = document.getElementById('gap_' + i);

  if (correct) {
    card.classList.add('correct');
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct!';
    gap.textContent = q.answer;
    state.correct++;
  } else {
    card.classList.add('wrong');
    fb.className = 'feedback show wrong';
    fb.textContent = '✗ The answer is: ' + q.answer;
    gap.textContent = q.answer;
  }
  state.answered++;
  updateProgress();
}

function checkMC(i, oi, picked, answer) {
  const q = state.questions[i];
  const card = document.getElementById('qcard_' + i);
  if (card.classList.contains('correct') || card.classList.contains('wrong')) return;

  const correct = picked === answer;
  const fb = document.getElementById('fb_' + i);
  const gap = document.getElementById('gap_' + i);

  // Disable all MC buttons
  card.querySelectorAll('.mc-btn').forEach((b, bi) => {
    b.classList.add('disabled');
    if (b.textContent.trim() === answer) b.classList.add('right');
  });
  if (!correct) document.getElementById('mc_' + i + '_' + oi).classList.add('wrong-pick');

  if (correct) {
    card.classList.add('correct');
    fb.className = 'feedback show correct';
    fb.textContent = '✓ Correct!';
    state.correct++;
  } else {
    card.classList.add('wrong');
    fb.className = 'feedback show wrong';
    fb.textContent = '✗ The answer is: ' + q.answer;
  }
  gap.textContent = q.answer;
  state.answered++;
  updateProgress();
}

function updateProgress() {
  const total = state.questions.length;
  const pct = total > 0 ? Math.round((state.answered / total) * 100) : 0;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pText').textContent = `${state.answered} / ${total} · ${state.correct} correct`;
  if (state.answered === total && total > 0) showResults();
}

function showResults() {
  const pct = Math.round((state.correct / state.questions.length) * 100);
  const el = document.getElementById('results');
  const score = document.getElementById('finalScore');
  const msg = document.getElementById('finalMsg');
  score.textContent = pct + '%';
  score.className = 'score' + (pct >= 70 ? ' great' : '');
  if (pct === 100) msg.textContent = 'Perfect! Outstanding work.';
  else if (pct >= 80) msg.textContent = 'Great job! Just a few to review.';
  else if (pct >= 60) msg.textContent = 'Good effort — review the red items.';
  else msg.textContent = 'Keep practising — you\'ll get there!';
  el.classList.add('show');
}

function reset() {
  document.getElementById('selectPhase').style.display = 'block';
  document.getElementById('quizPhase').style.display = 'none';
  window.scrollTo({top: 0});
}
</script>
