verb + be + emphasis. No 'what' after all."},{q:"Correct the error: 'What I want it is a solution.'",opts:["What I want is a solution.","It is a solution what I want.","What I want that is a solution.","What is I want is a solution."],answer:"What I want is a solution.",explanation:"Wh-cleft: no extra pronoun (it) before be."}]},{type:"builder",title:"Build the cleft sentence",sub:"Put the words in the correct order.",items:[{words:["it","was","her","generosity","that","impressed","me","most"],answer:"it was her generosity that impressed me most",context:"It-cleft emphasising her generosity."},{words:["what","this","study","shows","is","that","exercise","reduces","stress"],answer:"what this study shows is that exercise reduces stress",context:"Wh-cleft \u2014 academic."},{words:["all","I","need","is","a","decent","night's","sleep"],answer:"all I need is a decent night's sleep",context:"All-cleft."},{words:["it","wasn't","the","money","that","motivated","her","but","the","challenge"],answer:"it wasn't the money that motivated her but the challenge",context:"Negative it-cleft with contrast."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"Her reaction surprised me most.",keyword:"What",answer:"What surprised me most was her reaction."},{original:"The report was submitted on Friday, not Thursday.",keyword:"It was",answer:"It was on Friday that the report was submitted."},{original:"He only wanted recognition.",keyword:"All",answer:"All he wanted was recognition."},{original:"The lack of communication caused the problem.",keyword:"It was",answer:"It was the lack of communication that caused the problem."},{original:"She finds the ambiguity most frustrating.",keyword:"What",answer:"What she finds most frustrating is the ambiguity."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"It was John that he called me.",correct:"It was John who called me.",hint:"Person in subject position of relative clause \u2192 who."},{wrong:"What I need it is more time.",correct:"What I need is more time.",hint:"No extra pronoun before be in wh-cleft."},{wrong:"It was yesterday when she arrived.",correct:"It was yesterday that she arrived.",hint:"It-cleft with time expression \u2192 that."},{wrong:"All what he wanted was respect.",correct:"All he wanted was respect.",hint:"All-cleft: no what after all."},{wrong:"It is her talent impresses me.",correct:"It is her talent that impresses me.",hint:"It-cleft needs that (or who/which) before the verb."}]}]},

{id:"linkingb2",title:"Linking words \u2014 advanced",subtitle:"notwithstanding, admittedly, by contrast",intro:"Sophisticated connectors for formal writing and advanced discourse.",desc:"At B1 you learnt despite, whereas, however, therefore. At B2 the range expands significantly \u2014 particularly for formal and academic writing. These connectors signal nuanced logical relationships: concession, qualification, contrast, exemplification, clarification.",tip:"The key B2 skill is not just knowing these connectors but using them correctly in terms of position and punctuation. <em>Admittedly, nevertheless, however</em> all go at the start of a sentence with a comma. <em>Nevertheless</em> is stronger than <em>however</em>. <em>Notwithstanding</em> works like despite (preposition) but is more formal. <em>By contrast</em> is more emphatic than <em>on the other hand</em>.",explanation:"<p>Advanced linking expressions for formal writing, academic essays, and professional communication.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Concession and qualification:</strong><br>\n<em>Admittedly</em> = I acknowledge this point (even though it goes against my argument). <em>\"Admittedly, the evidence is limited.\"</em><br>\n<em>Nevertheless / nonetheless</em> = strong contrast despite concession. <em>\"The data is incomplete. Nevertheless, certain trends are clear.\"</em><br>\n<em>That said / having said that</em> = informal spoken equivalent of nevertheless. <em>\"It's expensive. That said, the quality is exceptional.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Contrast and comparison:</strong><br>\n<em>By contrast / in contrast</em> = sharper contrast than <em>on the other hand</em>. <em>\"Sales rose in Europe. By contrast, Asian markets saw a decline.\"</em><br>\n<em>Conversely</em> = the opposite is true. <em>\"Higher prices reduce demand. Conversely, lower prices stimulate it.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Addition and emphasis:</strong><br>\n<em>What is more / moreover / furthermore</em> = adding a stronger or additional point. <em>\"The plan is costly. What is more, it is unlikely to succeed.\"</em><br>\n<em>Indeed</em> = emphatic addition or confirmation. <em>\"This is a serious problem. Indeed, it may be the most serious we face.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Exemplification and clarification:</strong><br>\n<em>Notably / in particular</em> = highlighting a specific example. <em>\"Several issues arose, notably the question of funding.\"</em><br>\n<em>That is to say / namely</em> = clarifying or specifying. <em>\"One country stood out, namely Portugal.\"</em><br>\n<em>In other words</em> = restating more simply. <em>\"The project was a failure \u2014 in other words, we wasted a year.\"</em></div></div>\n<div class=\"note\"><strong>Notwithstanding</strong> is a formal preposition/adverb meaning 'despite' or 'in spite of'. As a preposition it follows or precedes the noun phrase: <em>\"Notwithstanding the difficulties, we succeeded.\"</em> / <em>\"The decision was made, the risks notwithstanding.\"</em> It is more formal than <em>despite</em>.<br>\n<strong>Position matters:</strong> Most of these connectors go at the start of a new sentence or clause, followed by a comma. They generally cannot join two clauses with only a comma between them (comma splice). Use a full stop or semicolon before them.</div>",table:{headers:["Connector","Function","Position/Structure"],rows:[["admittedly","acknowledge a point that may weaken your argument","Start of sentence + comma"],["nevertheless / nonetheless","strong contrast/concession (= despite this)","Start of sentence + comma"],["that said / having said that","informal spoken concession","Start of sentence + comma"],["by contrast / in contrast","sharp contrast","Start of sentence + comma"],["conversely","the opposite is true","Start of sentence + comma"],["what is more / moreover","add a stronger point","Start of sentence + comma"],["indeed","emphatic confirmation or addition","Start of sentence/mid-clause + comma"],["notably / in particular","highlight specific example","Start of sentence or mid-clause"],["namely","specify exactly what/who","Before the specific item"],["notwithstanding","formal: despite / in spite of","Before noun phrase or after it"]]},examples:[{type:"pos",eng:"The methodology has limitations. Admittedly, the sample size was small.",note:"Admittedly \u2014 conceding a weakness before defending the argument."},{type:"pos",eng:"The results were inconclusive. Nevertheless, they provide a useful baseline.",note:"Nevertheless \u2014 strong pivot after concession."},{type:"pos",eng:"Costs rose sharply in Q3. By contrast, Q4 showed significant improvement.",note:"By contrast \u2014 sharp factual contrast between two periods."},{type:"pos",eng:"The plan is ambitious \u2014 indeed, some would say reckless.",note:"Indeed \u2014 emphatic addition, escalating the point."},{type:"pos",eng:"Several countries were involved, notably France and Germany.",note:"Notably \u2014 specifying examples."},{type:"pos",eng:"Notwithstanding the concerns raised, the committee approved the proposal.",note:"Notwithstanding \u2014 formal despite."}],errors:[{bad:"The evidence is strong, admittedly there are gaps.",good:"The evidence is strong. Admittedly, there are gaps.",reason:"Admittedly starts a new sentence \u2014 it cannot join two clauses with just a comma."},{bad:"Sales fell in Europe, by contrast Asian markets grew.",good:"Sales fell in Europe. By contrast, Asian markets grew.",reason:"By contrast starts a new sentence \u2014 needs a full stop before it."},{bad:"The results were poor, nevertheless the team continued.",good:"The results were poor. Nevertheless, the team continued.",reason:"Nevertheless starts a new sentence \u2014 full stop before it."},{bad:"Notably, France and Germany notably were the main contributors.",good:"Notably, France and Germany were the main contributors.",reason:"Don't use notably twice \u2014 once at the start is sufficient."}],realUse:["\"Admittedly, the approach is unconventional. That said, it has produced results.\" \u2014 two-step concession in essays.","\"The first phase was successful. Conversely, the second proved disastrous.\" \u2014 contrast in report writing.","\"Indeed, this represents a paradigm shift.\" \u2014 academic emphasis.","\"One solution presents itself, namely a complete overhaul of the system.\" \u2014 formal specification."],richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Concession & qualification</div>\n<table class=\"rich-table\"><thead><tr><th>Connector</th><th>Use</th><th>Structure</th><th>Example</th></tr></thead><tbody>\n<tr><td>Admittedly</td><td>Acknowledge a weakness in your argument</td><td>New sentence + comma</td><td><em>Admittedly, the sample was small.</em></td></tr>\n<tr><td>Nevertheless / nonetheless</td><td>Strong contrast despite concession</td><td>New sentence + comma</td><td><em>The data is limited. Nevertheless, trends are clear.</em></td></tr>\n<tr><td>That said / having said that</td><td>Informal concession pivot</td><td>New sentence</td><td><em>It's expensive. That said, the quality is superb.</em></td></tr>\n<tr><td>Notwithstanding</td><td>Formal: despite / in spite of</td><td>+ noun phrase (before or after)</td><td><em>Notwithstanding the risks, they proceeded.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Contrast & comparison</div>\n<table class=\"rich-table\"><thead><tr><th>Connector</th><th>Use</th><th>Example</th></tr></thead><tbody>\n<tr><td>By contrast / in contrast</td><td>Sharper factual contrast than \"on the other hand\"</td><td><em>Sales rose in Europe. By contrast, Asia saw decline.</em></td></tr>\n<tr><td>Conversely</td><td>The opposite is true</td><td><em>Higher rates slow inflation. Conversely, they can cause recession.</em></td></tr>\n<tr><td>Whereas</td><td>Direct parallel contrast within a sentence</td><td><em>She earns more, whereas she saves less.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Addition & emphasis</div>\n<table class=\"rich-table\"><thead><tr><th>Connector</th><th>Use</th><th>Example</th></tr></thead><tbody>\n<tr><td>What is more / moreover / furthermore</td><td>Adding a stronger point</td><td><em>The plan is costly. What is more, it is untested.</em></td></tr>\n<tr><td>Indeed</td><td>Emphatic confirmation or escalation</td><td><em>This is serious. Indeed, it may be the worst crisis yet.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Exemplification & clarification</div>\n<table class=\"rich-table\"><thead><tr><th>Connector</th><th>Use</th><th>Example</th></tr></thead><tbody>\n<tr><td>Notably / in particular</td><td>Highlight a specific example</td><td><em>Several issues arose, notably the question of funding.</em></td></tr>\n<tr><td>Namely</td><td>Specify exactly who/what</td><td><em>One country stood out, namely Portugal.</em></td></tr>\n<tr><td>That is to say / in other words</td><td>Restate or clarify</td><td><em>The project failed \u2014 in other words, a year was wasted.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">\u26a0 Punctuation rules</div>\n<table class=\"rich-table\"><tbody>\n<tr><td>Admittedly / Nevertheless / However / Therefore</td><td>Always <strong>full stop before, comma after</strong>. Never join two clauses with a comma alone.</td></tr>\n<tr><td>Notwithstanding</td><td>Preposition \u2014 directly before the noun phrase. No comma needed unless fronted.</td></tr>\n<tr><td>Whereas / while (contrast)</td><td>Join two clauses in the same sentence. Comma before whereas/while.</td></tr>\n</tbody></table>\n</div>",exercises:[{type:"gap",title:"Choose the correct connector",sub:"Fill each gap with the most appropriate advanced connector.",items:[{answer:"Admittedly",before:"",after:", the data has limitations, but the overall trend is clear."},{answer:"Nevertheless",before:"The project faced serious setbacks. ",after:", the team delivered on time."},{answer:"By contrast",before:"The northern region saw rapid growth. ",after:", the south experienced decline."},{answer:"indeed",before:"This is a serious issue \u2014 ",after:", the most serious the company has faced."},{answer:"notably",before:"Several problems emerged, ",after:" the question of long-term funding."},{answer:"Notwithstanding",before:"",after:" the risks involved, the committee approved the proposal."},{answer:"Conversely",before:"Higher interest rates slow inflation. ",after:", they can trigger recession."},{answer:"What is more",before:"The plan is expensive. ",after:", it is unlikely to succeed."}]},{type:"mc",title:"Which connector?",sub:"Choose the most appropriate connector.",items:[{q:"The methodology was sound. _____, the sample size was too small to be conclusive.",opts:["Admittedly","Conversely","Indeed","Namely"],answer:"Admittedly",explanation:"Admittedly = conceding a weakness while defending the overall position."},{q:"Sales in Europe rose sharply. _____, North American figures fell.",opts:["Indeed","Admittedly","By contrast","Notwithstanding"],answer:"By contrast",explanation:"By contrast = sharp factual contrast between two comparable things."},{q:"The report identified one critical risk, _____ the lack of adequate oversight.",opts:["namely","notably","conversely","what is more"],answer:"namely",explanation:"Namely = specifying exactly what the one thing is."},{q:"The results were disappointing. _____, they were far worse than last year.",opts:["Admittedly","Indeed","By contrast","Conversely"],answer:"Indeed",explanation:"Indeed = emphatic confirmation/escalation of the previous point."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the connector given.",items:[{original:"Despite the difficulties, the project succeeded.",keyword:"Notwithstanding",answer:"Notwithstanding the difficulties, the project succeeded."},{original:"Although the sample is small, the findings are significant.",keyword:"Admittedly",answer:"Admittedly, the sample is small. Nevertheless, the findings are significant."},{original:"The first experiment failed. The second succeeded.",keyword:"By contrast",answer:"The first experiment failed. By contrast, the second succeeded."},{original:"Several figures stand out \u2014 especially Martinez and Chen.",keyword:"notably",answer:"Several figures stand out, notably Martinez and Chen."},{original:"The plan is risky. It is also very expensive.",keyword:"What is more",answer:"The plan is risky. What is more, it is very expensive."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the academic discussion using the correct advanced linking expression.",lines:[{speaker:"A",text:"The study's findings are impressive. [Admittedly], the sample was small."},{speaker:"B",text:"[Nevertheless], the methodology was rigorous. [What is more], the results were replicated."},{speaker:"A",text:"True. [By contrast], earlier studies showed the opposite trend."},{speaker:"B",text:"[Indeed] \u2014 which is precisely why this is significant. [Notably], the effect was strongest in urban areas."},{speaker:"A",text:"One limitation stands out, [namely] the lack of longitudinal data."},{speaker:"B",text:"[Notwithstanding] that concern, I think the paper merits publication."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"The evidence is strong, admittedly there are gaps.",correct:"The evidence is strong. Admittedly, there are gaps.",hint:"Admittedly starts a new sentence \u2014 full stop before it."},{wrong:"Sales fell in Europe, by contrast Asian markets grew.",correct:"Sales fell in Europe. By contrast, Asian markets grew.",hint:"By contrast starts a new sentence."},{wrong:"The results were poor, nevertheless the team continued.",correct:"The results were poor. Nevertheless, the team continued.",hint:"Nevertheless starts a new sentence."},{wrong:"One country stood out, namely it was Portugal.",correct:"One country stood out, namely Portugal.",hint:"Namely is followed directly by the item \u2014 no it was."},{wrong:"Indeed the results were very impressive indeed.",correct:"Indeed, the results were very impressive.",hint:"Don't use indeed twice \u2014 once is enough."}]}]},

{id:"emphasis",title:"Emphatic structures",subtitle:"do/does/did, so...that, such...that, the + comparative",intro:"Grammatical tools for adding emphasis and intensity to statements.",desc:"Emphatic structures allow speakers and writers to add force, surprise, or intensity to what they say. They are common in both formal and informal English \u2014 from academic writing to emotional speech. At B2, productive control of these structures is expected.",tip:"The emphatic <em>do/does/did</em> is one of the most underused structures by non-native speakers. It is extremely natural in spoken English: <em>\"I do understand your concerns\"</em> (in a meeting), <em>\"She did call\"</em> (contradicting someone). Students learn it as a question auxiliary but rarely use it for emphasis in statements.",explanation:"<p>Emphatic structures add force, surprise, or intensity to statements. Several grammatical patterns achieve this effect.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Emphatic do/does/did</strong> \u2014 adding do/does/did to a positive statement for emphasis, contradiction, or concession. The main verb returns to base form.<br>\n<em>\"I do understand your point.\"</em> (emphasis \u2014 reassuring) / <em>\"She did call, despite what you think.\"</em> (contradiction) / <em>\"He does try his best, even if the results disappoint.\"</em> (concession)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>So + adjective/adverb + that</strong> \u2014 expressing degree with a result. <em>\"She spoke so quickly that I couldn't follow.\"</em> / <em>\"The problem is so serious that immediate action is required.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Such + (a/an) + (adjective) + noun + that</strong> \u2014 expressing degree with a noun focus. <em>\"It was such a complex problem that no one solution existed.\"</em> / <em>\"Such was the scale of the disaster that aid poured in from around the world.\"</em> (formal/inverted)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>The + comparative + the + comparative</strong> \u2014 parallel comparison expressing proportional relationship. <em>\"The more you practise, the better you get.\"</em> / <em>\"The earlier we start, the more time we'll have.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">5</div><div class=\"rule-text\"><strong>Emphatic reflexive pronouns</strong> \u2014 for exclusion or emphasis on personal involvement. <em>\"I'll do it myself.\"</em> / <em>\"The president himself attended.\"</em> / <em>\"She said so herself.\"</em></div></div>\n<div class=\"note\"><strong>So vs such:</strong> Both express degree, but different structures.<br>\n<em>So + adjective/adverb</em>: <em>\"It was so beautiful.\"</em><br>\n<em>Such + a/an + adjective + noun</em>: <em>\"It was such a beautiful place.\"</em><br>\n<em>\"Such beautiful scenery.\"</em> (uncountable/plural \u2014 no article)<br>\nA common error: <em>\"It was so a beautiful place.\"</em> \u2717 \u2192 <em>\"It was such a beautiful place.\"</em> \u2713</div>",table:{headers:["Structure","Example","Effect"],rows:[["Emphatic do/does/did","I do appreciate your help.","Reassurance, contradiction, concession"],["So + adj/adv + that","She was so tired that she fell asleep standing up.","Degree + result"],["Such (a/an) + adj + noun + that","It was such a shock that she couldn't speak.","Degree + result (noun focus)"],["Such was + noun + that","Such was the excitement that no one slept.","Formal/inverted degree"],["The + comp + the + comp","The harder you work, the luckier you get.","Proportional relationship"],["Reflexive for emphasis","He built it himself. / The CEO himself resigned.","Personal involvement or exclusion"]]},examples:[{type:"pos",eng:"I do appreciate how difficult this must be for you.",note:"Emphatic do \u2014 reassurance/acknowledgement."},{type:"pos",eng:"The report was so detailed that it took a week to review.",note:"So + adjective + that \u2014 degree and result."},{type:"pos",eng:"It was such an unexpected development that no one knew how to respond.",note:"Such a/an + adjective + noun + that."},{type:"pos",eng:"The more transparent the process, the more trust it will generate.",note:"The + comparative + the + comparative."},{type:"pos",eng:"Such was her determination that she refused to give up even after three failures.",note:"Such was (inverted) \u2014 formal/literary emphasis."},{type:"neg",eng:"She did say she'd come \u2014 I distinctly remember.",note:"Emphatic did for contradiction."}],errors:[{bad:"It was so a beautiful evening.",good:"It was such a beautiful evening.",reason:"Before a/an + adjective + noun \u2192 such. So is followed directly by the adjective without a noun."},{bad:"The more you practise, the more better you get.",good:"The more you practise, the better you get.",reason:"The + comparative \u2014 just the comparative form. Better already IS comparative. Not more better."},{bad:"Such the impact was great that everyone noticed.",good:"Such was the impact that everyone noticed.",reason:"Such was + noun \u2014 the verb be comes directly after such."},{bad:"She does lives in Madrid, I'm sure.",good:"She does live in Madrid, I'm sure.",reason:"Emphatic does + base form \u2014 not third person -s on the main verb."},{bad:"I did spoke to him about it.",good:"I did speak to him about it.",reason:"Emphatic did + base form \u2014 not past tense."}],realUse:["\"I do wish you'd told me.\" \u2014 emphatic do with wish \u2014 strong regret.","\"The longer this drags on, the worse it will get.\" \u2014 proportional warning.","\"Such was the response that a second edition had to be printed immediately.\" \u2014 publishing/commercial success.","\"She taught herself everything \u2014 entirely self-taught.\" \u2014 emphatic reflexive."],richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Emphatic do/does/did</div>\n<table class=\"rich-table\"><thead><tr><th>Use</th><th>Example</th></tr></thead><tbody>\n<tr><td>Reassurance / concession</td><td><em>\"I do understand your concerns.\"</em> / <em>\"He does try his best.\"</em></td></tr>\n<tr><td>Contradiction</td><td><em>\"She did call \u2014 I heard her.\"</em> / <em>\"I did send the email.\"</em></td></tr>\n<tr><td>Insistence</td><td><em>\"Do come in!\"</em> / <em>\"Do sit down.\"</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">So...that vs Such...that</div>\n<table class=\"rich-table\"><thead><tr><th>Structure</th><th>Follows</th><th>Example</th></tr></thead><tbody>\n<tr><td>so + adjective/adverb + that</td><td>Adjective or adverb \u2014 no noun</td><td><em>\"It was so cold that the pipes froze.\"</em> / <em>\"She spoke so quickly that I couldn't follow.\"</em></td></tr>\n<tr><td>such a/an + adjective + noun + that</td><td>Singular countable noun</td><td><em>\"It was such a shock that she wept.\"</em></td></tr>\n<tr><td>such + adjective + noun + that</td><td>Uncountable or plural noun</td><td><em>\"Such beautiful scenery that we stopped the car.\"</em></td></tr>\n<tr><td>Such was + noun + that</td><td>Formal/inverted \u2014 noun first</td><td><em>\"Such was the scale of the disaster that...\"</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">The + comparative + the + comparative</div>\n<div class=\"transform-demo\">\n<div class=\"transform-demo-row\"><div class=\"tdl\">As practice increases, performance improves.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">The more you practise, the better you get.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">As the problem gets harder, more people give up.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">The harder the problem, the more people give up.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">As costs rise, profit shrinks.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">The higher the costs, the lower the profit.</div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">\u26a0 So vs Such</div>\n<table class=\"rich-table\"><tbody>\n<tr><td><em>\"It was <strong>so</strong> a beautiful city.\"</em> \u2717</td><td>No noun directly after so \u2192 use such: <em>\"such a beautiful city\"</em> \u2713</td></tr>\n<tr><td><em>\"It was <strong>such</strong> cold.\"</em> \u2717</td><td>No noun \u2192 use so: <em>\"it was so cold\"</em> \u2713</td></tr>\n<tr><td><em>\"The more better you get\"</em> \u2717</td><td>The + comparative only: <em>\"the better you get\"</em> \u2713</td></tr>\n</tbody></table>\n</div>",exercises:[{type:"gap",title:"Emphatic structures",sub:"Fill each gap with the correct emphatic form.",items:[{answer:"do",before:"I ",after:" understand your concerns \u2014 please let me explain."},{answer:"such",before:"It was ",after:" a difficult decision that she couldn't sleep for days."},{answer:"so",before:"He spoke ",after:" quickly that nobody could follow him."},{answer:"the harder",before:"",after:" you work, the luckier you get."},{answer:"did",before:"She ",after:" warn us \u2014 we just didn't listen."},{answer:"such was",before:"",after:" the excitement that the whole city came out to celebrate."},{answer:"the more",before:"",after:" I learn, the more I realise how much I don't know."},{answer:"himself",before:"The prime minister ",after:" attended the ceremony."}]},{type:"mc",title:"So or such?",sub:"Choose the correct structure.",items:[{q:"It was _____ a challenging project that the whole team was exhausted.",opts:["so","such","very","too"],answer:"such",explanation:"Such + a + adjective + noun. 'Such a challenging project' \u2014 noun follows."},{q:"She was _____ tired that she fell asleep in the meeting.",opts:["such","very","so","too"],answer:"so",explanation:"So + adjective (no noun following directly). 'So tired' \u2014 adjective only."},{q:"It was _____ difficult terrain that the rescue took three days.",opts:["so","such","too","very"],answer:"such",explanation:"Such + adjective + noun (no article because terrain is uncountable)."},{q:"The traffic was _____ bad that I missed the flight.",opts:["such","very","so","much"],answer:"so",explanation:"So + adjective. 'So bad' \u2014 adjective without article/noun."}]},{type:"builder",title:"Build the emphatic sentence",sub:"Put the words in the correct order.",items:[{words:["the","more","you","read","the","better","your","writing","becomes"],answer:"the more you read the better your writing becomes",context:"Proportional comparative \u2014 the more...the better."},{words:["it","was","such","an","inspiring","speech","that","everyone","stood","up"],answer:"it was such an inspiring speech that everyone stood up",context:"Such a/an + adjective + noun + that."},{words:["I","do","think","you","should","reconsider","this","decision"],answer:"I do think you should reconsider this decision",context:"Emphatic do \u2014 strong recommendation."},{words:["such","was","the","impact","of","the","report","that","policy","changed"],answer:"such was the impact of the report that policy changed",context:"Such was \u2014 formal inverted degree."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"The film was very long and I fell asleep.",keyword:"so",answer:"The film was so long that I fell asleep."},{original:"It was a very shocking revelation and nobody spoke.",keyword:"such",answer:"It was such a shocking revelation that nobody spoke."},{original:"You really did help me enormously.",keyword:"do",answer:"You do help me enormously."},{original:"As practice increases, performance improves.",keyword:"the more",answer:"The more you practise, the better you perform."},{original:"The scale of the response was extraordinary \u2014 everyone donated.",keyword:"Such was",answer:"Such was the scale of the response that everyone donated."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"It was so a beautiful evening.",correct:"It was such a beautiful evening.",hint:"Before a/an + noun \u2192 such, not so."},{wrong:"The more you practice, the more better you get.",correct:"The more you practise, the better you get.",hint:"The + comparative \u2014 just the comparative, not more + comparative."},{wrong:"Such the impact was great that it changed everything.",correct:"Such was the impact that it changed everything.",hint:"Such was + noun \u2014 verb be comes after such."},{wrong:"She does lives in Madrid, I'm sure.",correct:"She does live in Madrid, I'm sure.",hint:"Emphatic does + base form \u2014 not third person -s."},{wrong:"I did spoke to him about it.",correct:"I did speak to him about it.",hint:"Emphatic did + base form."}]}]},

{id:"causativeadv",title:"Causative \u2014 advanced",subtitle:"have someone do, get something done, need doing",intro:"The full range of causative structures at B2.",desc:"At B1 you learnt have/get + object + past participle (the standard causative). At B2 the system expands to include: have/get + someone + do something (active causative), need/want + object + past participle, and the need + -ing structure. These distinctions matter both for meaning precision and for exam performance.",tip:"The key distinction that B2 adds to B1 is the <em>active causative</em>: <em>\"I had him fix it\"</em> \u2014 I arranged for a specific person to do it (active). Compare with <em>\"I had it fixed\"</em> \u2014 I arranged for it to be done (passive). The passive version hides the agent; the active version makes them explicit.",explanation:"<p>The causative system at B2 extends the B1 form to include active causative, need + -ing, and more complex arrangements.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Have/get + object + past participle</strong> (B1 review) \u2014 arrange for someone else to do something; the person doing it is not mentioned. <em>\"I had my car serviced.\"</em> / <em>\"She got her hair done.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Have/get + person + base verb (bare infinitive)</strong> \u2014 active causative; you cause a specific person to do something. <em>\"I'll have the technician check it.\"</em> / <em>\"She got her assistant to book the tickets.\"</em> (Note: get + person + to + infinitive; have + person + bare infinitive)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Need + -ing</strong> \u2014 something requires attention; the -ing form has a passive meaning. <em>\"The car needs servicing.\"</em> = the car needs to be serviced. <em>\"The report needs revising.\"</em> = the report needs to be revised. Common in British English for repairs and maintenance.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Want/would like + object + past participle</strong> \u2014 expressing a desire for a causative outcome. <em>\"I want this report checked by Friday.\"</em> / <em>\"She'd like the flat repainted.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">5</div><div class=\"rule-text\"><strong>Have something happen (unwanted causative)</strong> \u2014 something happened to you (often negative, unplanned). <em>\"She had her bag stolen.\"</em> / <em>\"He had his application rejected.\"</em> \u2014 same structure, but the meaning is something that happened to the subject, not something they arranged.</div></div>\n<div class=\"note\"><strong>Have + person + bare infinitive vs get + person + to + infinitive:</strong><br>\n<em>\"I had the plumber fix the leak.\"</em> \u2014 have + bare infinitive. More formal.<br>\n<em>\"I got the plumber to fix the leak.\"</em> \u2014 get + to + infinitive. More informal.<br>\n<strong>Need + -ing vs need to be + past participle:</strong><br>\n<em>\"The car needs servicing.\"</em> = <em>\"The car needs to be serviced.\"</em> \u2014 both equally correct.<br>\n<em>\"I need to service the car.\"</em> \u2014 different: I will do it myself.</div>",table:{headers:["Structure","Example","Meaning"],rows:[["have + object + pp","I had my hair cut.","Arrange for someone to do it (agent not mentioned)"],["get + object + pp","She got her laptop fixed.","Same \u2014 more informal"],["have + person + bare inf","I had the mechanic check the brakes.","Cause a specific person to do it (active, formal)"],["get + person + to + inf","She got her assistant to book it.","Cause a specific person to do it (active, informal)"],["need + -ing","The roof needs repairing.","Something requires attention (passive meaning)"],["want/would like + obj + pp","I want the report finished by Friday.","Express desire for a causative outcome"],["have + obj + pp (unwanted)","She had her bag stolen.","Something happened to the subject (not arranged)"]]},examples:[{type:"pos",eng:"I'll have the IT department look into the problem.",note:"Have + person + bare infinitive \u2014 active causative, formal."},{type:"pos",eng:"She got the designer to completely overhaul the website.",note:"Get + person + to + infinitive \u2014 active causative, informal."},{type:"pos",eng:"The boiler needs replacing \u2014 it's twenty years old.",note:"Need + -ing \u2014 passive meaning, British English."},{type:"pos",eng:"I'd like this document translated by Monday.",note:"Would like + object + past participle \u2014 causative desire."},{type:"pos",eng:"He had his phone stolen on the metro.",note:"Unwanted causative \u2014 it happened to him, he didn't arrange it."},{type:"neg",eng:"The brakes need checking \u2014 don't drive it until they've been seen to.",note:"Need + -ing for an urgent repair."}],errors:[{bad:"I got the mechanic fix my car.",good:"I got the mechanic to fix my car.",reason:"Get + person + to + infinitive \u2014 need to after get with a person."},{bad:"The report needs to revising.",good:"The report needs revising.",reason:"Need + -ing \u2014 just the gerund, no to before it."},{bad:"I had the technician to check the system.",good:"I had the technician check the system.",reason:"Have + person + bare infinitive \u2014 no to after have."},{bad:"She got her hair cutting last week.",good:"She got her hair cut last week.",reason:"Get + object + past participle \u2014 not -ing."},{bad:"The fence needs to be repairing.",good:"The fence needs repairing.",reason:"Need + -ing (not need to be + -ing). Repairing already has passive meaning here."}],realUse:["\"I'll have someone look into this for you.\" \u2014 formal customer service.","\"This needs sorting out.\" \u2014 very common informal British English.","\"She had everything arranged before anyone else had even woken up.\" \u2014 admiring efficiency.","\"He had his visa rejected at the last minute.\" \u2014 unwanted causative in a stressful narrative."],exercises:[{type:"gap",title:"Active and passive causative",sub:"Fill each gap with the correct causative form.",items:[{answer:"had the technician check",before:"I ",after:" the system before the launch. (have + person + bare inf)"},{answer:"got her assistant to book",before:"She ",after:" the flights. (get + person + to inf)"},{answer:"needs repainting",before:"The kitchen ",after:" \u2014 it's looking very tired. (need + -ing)"},{answer:"having her portrait painted",before:"She's ",after:" at the moment. (have + obj + pp \u2014 present continuous)"},{answer:"had his wallet stolen",before:"He ",after:" on the train. (unwanted causative)"},{answer:"want this finished",before:"I ",after:" by Friday. (want + obj + pp)"}]},{type:"mc",title:"Which causative?",sub:"Choose the correct form.",items:[{q:"I need _____ \u2014 it's making a strange noise.",opts:["my car to check","my car checking","to check my car have","have my car checked"],answer:"have my car checked",explanation:"Standard passive causative: have + object + past participle."},{q:"She _____ to update the spreadsheet.",opts:["had her colleague","got her colleague","had got her colleague","made her colleague"],answer:"got her colleague",explanation:"Get + person + to + infinitive \u2014 got her colleague to update."},{q:"The report _____ before submission.",opts:["needs to revising","needs revise","needs revising","need to be revise"],answer:"needs revising",explanation:"Need + -ing \u2014 passive meaning. Needs revising = needs to be revised."},{q:"I'm afraid she _____ at the border.",opts:["had her passport confiscating","got her passport confiscated","had confiscated her passport","had her passport confiscate"],answer:"got her passport confiscated",explanation:"Unwanted causative: got + object + past participle \u2014 something happened to her."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using the correct causative form.",lines:[{speaker:"A",text:"The office is a mess. I think we need [to have it redecorated]."},{speaker:"B",text:"Agreed. I'll [get someone to come in] and give us a quote."},{speaker:"A",text:"Also, the photocopier [needs servicing] \u2014 it's been jamming constantly."},{speaker:"B",text:"I'll [have the maintenance team look at] it this afternoon."},{speaker:"A",text:"And the security cameras \u2014 [have them checked] too."},{speaker:"B",text:"Good idea. I'll [get an engineer to test] the whole system."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"A mechanic checked the brakes for me.",keyword:"had",answer:"I had the brakes checked by a mechanic."},{original:"She arranged for the designer to redesign the logo.",keyword:"got",answer:"She got the designer to redesign the logo."},{original:"The data requires checking before submission.",keyword:"needs",answer:"The data needs checking before submission."},{original:"Someone stole her phone on the bus.",keyword:"had",answer:"She had her phone stolen on the bus."},{original:"He caused his assistant to prepare the presentation.",keyword:"had",answer:"He had his assistant prepare the presentation."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I got the mechanic fix my car.",correct:"I got the mechanic to fix my car.",hint:"Get + person + to + infinitive."},{wrong:"The report needs to revising.",correct:"The report needs revising.",hint:"Need + -ing \u2014 no to before gerund."},{wrong:"I had the technician to check the system.",correct:"I had the technician check the system.",hint:"Have + person + bare infinitive \u2014 no to."},{wrong:"She got her hair cutting last week.",correct:"She got her hair cut last week.",hint:"Get + object + past participle \u2014 not -ing."},{wrong:"The fence needs to be repairing.",correct:"The fence needs repairing.",hint:"Need + -ing (not need to be + -ing)."}]}]}

// ── STICKY LESSON BAR ──
function updateSticky(l){
  document.getElementById('sticky-title').textContent = l.title;
  document.getElementById('sticky-intro').textContent = l.intro.replace(/<[^>]+>/g,'');
  document.getElementById('sticky-level').textContent = document.querySelector('.level-tag') ? document.querySelector('.level-tag').textContent : '';
}
const stickyBar = document.getElementById('lesson-sticky');
const heroObserver = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    stickyBar.classList.toggle('visible', !e.isIntersecting);
  });
},{threshold:0,rootMargin:'-53px 0px 0px 0px'});
function observeHero(){
  const hero = document.querySelector('.lesson-hero');
  if(hero) heroObserver.observe(hero);
}

// ── PRINT ──
function printLesson(){
  const labels = document.querySelectorAll('.section-label');
  const wasCollapsed = [];
  labels.forEach((label,i)=>{
    const body = label.nextElementSibling;
    wasCollapsed[i] = label.classList.contains('collapsed');
    if(wasCollapsed[i]){
      label.classList.remove('collapsed');
      if(body) body.classList.remove('collapsed');
    }
  });
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      labels.forEach((label,i)=>{
        if(wasCollapsed[i]){
          label.classList.add('collapsed');
          const body = label.nextElementSibling;
          if(body) body.classList.add('collapsed');
        }
      });
    }, 500);
  }, 150);
}

// ── COLLAPSIBLE SECTIONS ──
function toggleAllSections(btn){
  const isOpen = btn.textContent === 'Open all';
  document.querySelectorAll('.section-label').forEach(label=>{
    const body = label.nextElementSibling;
    if(body && body.classList.contains('section-body')){
      if(isOpen){ label.classList.remove('collapsed'); body.classList.remove('collapsed'); }
      else { label.classList.add('collapsed'); body.classList.add('collapsed'); }
    }
  });
  btn.textContent = isOpen ? 'Close all' : 'Open all';
}

function toggleSection(label){
  label.classList.toggle('collapsed');
  const body = label.nextElementSibling;
  if(body && body.classList.contains('section-body')){
    body.classList.toggle('collapsed');
  }
}
// ── DONE STATE ──
const done = JSON.parse(localStorage.getItem('jpe-b2-done')||'[]');
let current = 0;

// ── SIDEBAR ──
function buildSidebar(){
  const nav = document.getElementById('topic-nav');
  nav.innerHTML = lessons.map((l,i)=>`
    <button class="topic-link${i===current?' active':''}${done.includes(l.id)?' done':''}" onclick="goto(${i})">
      <span class="tl-num">${String(i+1).padStart(2,'0')}</span>
      <span class="tl-check">${done.includes(l.id)?'✓':''}</span>
      <span class="tl-name">${l.title}<br><small style="font-size:11px;opacity:.6">${l.subtitle}</small></span>
    </button>`).join('');
  const pct = (done.length/lessons.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done.length}/${lessons.length}`;
}

// ── BUILD LESSON ──
function buildLesson(l, idx){
  const isLast = idx===lessons.length-1;
  const isDone = done.includes(l.id);

  const tableHTML = `<table class="form-table">
    <thead><tr>${l.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${l.table.rows.map(r=>`<tr>${r.map((c,ci)=>`<td class="${ci===0?'subject':ci===1?'form':ci===2?'neg':'example'}">${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;

  const exHTML = l.examples.map(e=>`
    <div class="example-item">
      <div class="ex-marker ${e.type}">${e.type==='pos'?'+':e.type==='neg'?'−':'?'}</div>
      <div><div class="ex-eng">${e.eng}</div><div class="ex-note">${e.note}</div></div>
    </div>`).join('');

  const errHTML = l.errors.map(e=>`
    <div class="error-row">
      <div class="error-bad"><div class="error-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Wrong</div><div class="error-text">${e.bad}</div></div>
      <div class="error-good"><div class="error-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Correct</div><div class="error-text">${e.good}</div></div>
    </div>
    `).join('');

  const realHTML = l.realUse.map(r=>`<li>${r}</li>`).join('');

  const exerciseHTML = l.exercises.map((ex,ei)=>{

    // ── GAP FILL ──
    if(ex.type==='gap'){
      const items = ex.items.map((it,ii)=>`
        <div class="gap-sentence">
          <span class="gap-num">${ii+1}.</span>
          <span>${(it.before||'').replace(/_+\s*$/,'').trimEnd()}</span>
          <span class="gap-wrap">
            <input class="gap-input" id="gap-${l.id}-${ei}-${ii}" data-answer="${it.answer}" placeholder="" autocomplete="off" style="width:${Math.max(4,it.answer.length+1)}ch">
            <span class="gap-reveal" id="gap-rev-${l.id}-${ei}-${ii}"></span>
          </span>
          <span>${(it.after||'').replace(/^\s*_+/,'').trimStart()}</span>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Gap fill</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkGap('${l.id}',${ei},${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetGap('${l.id}',${ei},${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-gap-${l.id}-${ei}"></div>
        </div></div>`;
    }

    // ── MULTIPLE CHOICE ──
    if(ex.type==='mc'){
      const items = ex.items.map((it,ii)=>`
        <div class="mc-question" id="mc-${l.id}-${ei}-${ii}">
          <div class="mc-text">${ii+1}. ${it.q}</div>
          <div class="mc-options">${it.opts.map(o=>`<button class="mc-opt" onclick="pickMC('${l.id}',${ei},${ii},'${o.replace(/'/g,"'")}','${it.answer.replace(/'/g,"'")}','${it.explanation.replace(/'/g,"'")}')" data-opt="${o}">${o}</button>`).join('')}</div>
          <div class="mc-feedback" id="mcfb-${l.id}-${ei}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Multiple choice</span>
        </div>
        <div class="ex-card-body">${items}</div></div>`;
    }

    // ── ERROR CORRECTION ──
    if(ex.type==='ec'){
      const items = ex.items.map((it,ii)=>`
        <div class="ec-item">
          <div class="ec-sentence">✗ ${it.wrong}</div>
          <div class="ec-input-row">
            <input class="ec-input" id="ec-${l.id}-${ei}-${ii}" data-answer="${it.correct}" placeholder="Write the correct sentence…">
          </div>
          <div style="font-size:11px;color:var(--ink3);margin-top:4px">Hint: ${it.hint}</div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Error correction</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkEC('${l.id}',${ei},${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetEC('${l.id}',${ei},${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-ec-${l.id}-${ei}"></div>
        </div></div>`;
    }

    // ── SENTENCE BUILDER ──
    if(ex.type==='builder'){
      const sid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>{
        const shuffled = [...it.words].sort(()=>Math.random()-.5);
        const wordBtns = shuffled.map((w,wi)=>`<button class="sb-word" id="sbw-${sid}-${ii}-${wi}" data-word="${w}" onclick="sbClick('${sid}',${ii},${wi})">${w}</button>`).join('');
        return `<div class="sb-sentence" id="sb-sent-${sid}-${ii}">
          <div class="sb-sentence-num">${ii+1}.</div>
          ${it.context?`<div class="sb-context">${it.context}</div>`:''}
          <div class="sb-slot" id="sb-slot-${sid}-${ii}"></div>
          <div class="sb-bank" id="sb-bank-${sid}-${ii}">${wordBtns}</div>
          <div class="sb-result" id="sb-res-${sid}-${ii}"></div>
        </div>`;
      }).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Sentence builder</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkBuilder('${sid}',${ex.items.length},${JSON.stringify(ex.items.map(i=>i.answer)).replace(/"/g,'&quot;')})">Check answers</button>
            <button class="btn-reset" onclick="resetBuilder('${sid}',${ex.items.length},${JSON.stringify(ex.items.map(i=>i.words)).replace(/"/g,'&quot;')})">Reset</button>
          </div>
          <div class="score-badge" id="score-sb-${sid}"></div>
        </div></div>`;
    }

    // ── MATCHING ──
    if(ex.type==='match'){
      const mid = `${l.id}-${ei}`;
      const leftBtns = ex.pairs.map((p,pi)=>`<button class="match-item" id="ml-${mid}-${pi}" data-idx="${pi}" data-side="left" onclick="matchClick('${mid}',${pi},'left')">${p.left}</button>`).join('');
      const rightShuffled = ex.pairs.map((p,pi)=>({text:p.right,idx:pi})).sort(()=>Math.random()-.5);
      const rightBtns = rightShuffled.map((p,ri)=>`<button class="match-item" id="mr-${mid}-${ri}" data-idx="${p.idx}" data-side="right" onclick="matchClick('${mid}',${ri},'right')">${p.text}</button>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Matching</span>
        </div>
        <div class="ex-card-body">
          <div class="match-cols">
            <div><div class="match-col-head">${ex.leftHead||'A'}</div>${leftBtns}</div>
            <div><div class="match-col-head">${ex.rightHead||'B'}</div>${rightBtns}</div>
          </div>
          <div class="score-badge" id="score-match-${mid}"></div>
        </div></div>`;
    }

    // ── TRANSFORMATION ──
    if(ex.type==='transform'){
      const tid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>`
        <div class="transform-item">
          <div class="transform-original">${ii+1}. ${it.original}<br><span style="font-size:12px;color:var(--ink3)">Use: <span class="transform-keyword">${it.keyword}</span></span></div>
          <input class="transform-input" id="tr-${tid}-${ii}" data-answer="${it.answer}" placeholder="Rewrite the sentence…">
          <div class="transform-reveal" id="tr-rev-${tid}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Transformation</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkTransform('${tid}',${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetTransform('${tid}',${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-tr-${tid}"></div>
        </div></div>`;
    }

    // ── CATEGORISATION ──
    if(ex.type==='categorise'){
      const cid = `${l.id}-${ei}`;
      const allWords = ex.categories.flatMap((c,ci)=>c.items.map(w=>({w,ci}))).sort(()=>Math.random()-.5);
      const wordBtns = allWords.map((item,wi)=>`<button class="cat-word" id="cw-${cid}-${wi}" data-cat="${item.ci}" onclick="catClick('${cid}',${wi})">${item.w}</button>`).join('');
      const cols = ex.categories.map((c,ci)=>`
        <div class="cat-col" id="cc-${cid}-${ci}" onclick="catColClick('${cid}',${ci})" style="cursor:pointer">
          <div class="cat-col-head" style="color:${['var(--sky)','var(--sea)','var(--sun)','var(--lav)'][ci]||'var(--ink3)'}">${c.name}</div>
          <div class="cat-col-items" id="cc-items-${cid}-${ci}"></div>
        </div>`).join('');
      const colStyle = `grid-template-columns:repeat(${ex.categories.length},1fr)`;
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Categorise</span>
        </div>
        <div class="ex-card-body">
          <div class="cat-bank" id="cb-${cid}">${wordBtns}</div>
          <div class="cat-columns" style="${colStyle}">${cols}</div>
          <div class="check-row">
            <button class="btn-check" onclick="checkCat('${cid}',${ex.categories.length})">Check answers</button>
            <button class="btn-reset" onclick="resetCat('${cid}',${ex.categories.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-cat-${cid}"></div>
        </div></div>`;
    }

    // ── CONVERSATION FILL ──
    if(ex.type==='convo'){
      const cvid = `${l.id}-${ei}`;
      let gapCount = 0;
      const lines = ex.lines.map((line,li)=>{
        const spk = line.speaker==='A'?'a':'b';
        const text = line.text.replace(/\[([^\]]+)\]/g,(match,ans)=>{
          const gi = gapCount++;
          return `<span class="convo-gwrap"><input class="convo-input" id="cv-${cvid}-${gi}" data-answer="${ans}" autocomplete="off" style="width:${Math.max(4,ans.replace(/\//g,'').split('/')[0].length+1)}ch"><span class="convo-reveal" id="cv-rev-${cvid}-${gi}"></span></span>`;
        });
        return `<div class="convo-line"><span class="convo-speaker ${spk}">${line.speaker}</span><span class="convo-text">${text}</span></div>`;
      }).join('');
      const total = gapCount;
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Conversation</span>
        </div>
        <div class="ex-card-body">
          <div class="convo-wrap">${lines}</div>
          <div class="check-row">
            <button class="btn-check" onclick="checkConvo('${cvid}',${total})">Check answers</button>
            <button class="btn-reset" onclick="resetConvo('${cvid}',${total})">Reset</button>
          </div>
          <div class="score-badge" id="score-cv-${cvid}"></div>
        </div></div>`;
    }

    // ── TRUE / FALSE / NOT GIVEN ──
    if(ex.type==='tf'){
      const tfid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>`
        <div class="tf-item">
          ${it.context?`<div class="tf-context">"${it.context}"</div>`:''}
          <div class="tf-statement">${ii+1}. ${it.statement}</div>
          <div class="tf-options">
            ${['True','False','Not given'].map(opt=>`<button class="tf-btn" onclick="pickTF('${tfid}',${ii},'${opt}','${it.answer}','${it.explanation.replace(/'/g,"'")}') ">${opt}</button>`).join('')}
          </div>
          <div class="tf-feedback" id="tf-fb-${tfid}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">True / False</span>
        </div>
        <div class="ex-card-body">${items}</div></div>`;
    }

  }).join('');

  return `
  <div class="lesson-hero">
    <div class="lesson-meta">
      <span class="level-tag">B2</span>
      <span class="lesson-num">Topic ${idx+1} of ${lessons.length}</span>
    </div>
    <h1>${l.title} <span style="color:var(--ink3);font-weight:400;font-size:22px">— ${l.subtitle}</span></h1>
    <p>${l.desc}</p>
    <div class="lesson-toolbar">
      <button class="btn ${isDone?'btn-done':'btn-primary'}" onclick="markDone('${l.id}',${idx})" id="done-btn-${l.id}">
        ${isDone?'✓ Completed':'Mark as complete'}
      </button>
      <button class="btn btn-ghost" onclick="printLesson()">Print lesson</button>
    </div>
  </div>
  <div class="lesson-body">
    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span><h2>Explanation</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="explain-card">
          <div class="explain-lead">${l.intro}</div>
          <div class="explain-body">${l.explanation}</div>
        </div>
        ${tip(l.tip)}
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span><h2>${l.richContent ? (l.richLabel||'Reference') : 'Form & structure'}</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        ${l.richContent ? `<div class="explain-card">${l.richContent}</div>` : `<div class="explain-card" style="padding:0;overflow:hidden">${tableHTML}</div>`}
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span><h2>Examples</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="examples-grid">${exHTML}</div>
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span><h2>Common errors</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="error-card"><h3>What learners get wrong — and why</h3>${errHTML}</div>
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1 4-10z"/></svg></span><h2>In real use</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="real-use"><h3>Native speaker patterns</h3><ul>${realHTML}</ul></div>
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="14 2 18 6 7 17 3 17 3 13 14 2"/><line x1="3" y1="22" x2="21" y2="22"/></svg></span><h2>Practice</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div style="display:flex;flex-direction:column;gap:16px">${exerciseHTML}</div>
      </div>
    </div>

  </div>
  <div class="lesson-footer">
    <div class="footer-hint">${isDone?"✓ You've completed this topic.":"Complete the exercises above, then mark this topic as done."}</div>
    <div class="footer-nav">
      ${idx>0?`<button class="btn btn-ghost" onclick="goto(${idx-1})">← Previous</button>`:''}
      ${!isLast?`<button class="btn btn-primary" onclick="goto(${idx+1})">Next topic →</button>`:`<button class="btn btn-done" onclick="alert('You\'ve completed the full B2 course! 🎉')">Finish B2 🎉</button>`}
    </div>
  </div>`;
}

// ── NAVIGATION ──
function goto(i){
  current=i;
  const main=document.getElementById('main');
  main.innerHTML=buildLesson(lessons[i],i);
  updateSticky(lessons[i]);
  observeHero();
  main.style.animation='none';
  main.offsetHeight;
  main.style.animation='fadeUp .25s ease forwards';
  document.getElementById('breadcrumb-topic').textContent=lessons[i].title;
  buildSidebar();
  window.scrollTo(0,0);
}

// ── MARK DONE ──
function markDone(id,idx){
  if(!done.includes(id)){done.push(id);localStorage.setItem('jpe-b2-done',JSON.stringify(done));}
  goto(idx);
}

// ── GAP FILL ──
function checkGap(lid,ei,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`gap-${lid}-${ei}-${i}`);
    const rev=document.getElementById(`gap-rev-${lid}-${ei}-${i}`);
    const accepted=inp.dataset.answer.toLowerCase().split('/').map(a=>a.trim());
    const val=inp.value.toLowerCase().trim();
    const ok=accepted.includes(val)||(val===''&&accepted.includes('—'));
    if(ok){inp.className='gap-input correct';rev.className='gap-reveal';correct++;}
    else{inp.className='gap-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='gap-reveal show';}
  }
  const badge=document.getElementById(`score-gap-${lid}-${ei}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetGap(lid,ei,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`gap-${lid}-${ei}-${i}`);
    const rev=document.getElementById(`gap-rev-${lid}-${ei}-${i}`);
    inp.value='';inp.className='gap-input';rev.textContent='';rev.className='gap-reveal';
  }
  document.getElementById(`score-gap-${lid}-${ei}`).className='score-badge';
}

// ── MULTIPLE CHOICE ──
function pickMC(lid,ei,qi,choice,answer,explanation){
  const container=document.getElementById(`mc-${lid}-${ei}-${qi}`);
  container.querySelectorAll('.mc-opt').forEach(o=>{
    o.classList.remove('correct-ans','wrong-ans');
    if(o.dataset.opt===answer) o.classList.add('correct-ans');
    if(o.dataset.opt===choice&&choice!==answer) o.classList.add('wrong-ans');
  });
  const fb=document.getElementById(`mcfb-${lid}-${ei}-${qi}`);
  fb.textContent=explanation;
  fb.className=`mc-feedback show ${choice===answer?'ok':'bad'}`;
}

// ── ERROR CORRECTION ──
function checkEC(lid,ei,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`ec-${lid}-${ei}-${i}`);
    const ans=inp.dataset.answer.toLowerCase().replace(/[.!?,]/g,'').trim();
    const val=inp.value.toLowerCase().replace(/[.!?,]/g,'').trim();
    if(val===ans){inp.className='ec-input correct';correct++;}
    else inp.className='ec-input wrong';
  }
  const badge=document.getElementById(`score-ec-${lid}-${ei}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetEC(lid,ei,count){
  for(let i=0;i<count;i++){const inp=document.getElementById(`ec-${lid}-${ei}-${i}`);inp.value='';inp.className='ec-input';}
  document.getElementById(`score-ec-${lid}-${ei}`).className='score-badge';
}

// ── SENTENCE BUILDER ──
const sbState={};
function sbClick(sid,si,wi){
  if(!sbState[sid]) sbState[sid]={};
  if(!sbState[sid][si]) sbState[sid][si]=[];
  const wordEl=document.getElementById(`sbw-${sid}-${si}-${wi}`);
  const word=wordEl.dataset.word;
  sbState[sid][si].push({word,wi});
  wordEl.classList.add('used');
  const slot=document.getElementById(`sb-slot-${sid}-${si}`);
  const placed=document.createElement('button');
  placed.className='sb-placed';
  placed.textContent=word;
  placed.onclick=()=>sbRemove(sid,si,wi,placed);
  slot.appendChild(placed);
}
function sbRemove(sid,si,wi,el){
  const wordEl=document.getElementById(`sbw-${sid}-${si}-${wi}`);
  wordEl.classList.remove('used');
  sbState[sid][si]=sbState[sid][si].filter(x=>x.wi!==wi);
  el.remove();
}
function checkBuilder(sid,count,answersJson){
  const answers=JSON.parse(answersJson.replace(/&quot;/g,'"'));
  let correct=0;
  for(let i=0;i<count;i++){
    const placed=(sbState[sid]&&sbState[sid][i])||[];
    const built=placed.map(x=>x.word).join(' ').toLowerCase().trim();
    const ans=answers[i].toLowerCase().trim();
    const res=document.getElementById(`sb-res-${sid}-${i}`);
    if(built===ans){res.textContent='✓ Correct!';res.className='sb-result show ok';correct++;}
    else{res.textContent=`✗ Answer: ${answers[i]}`;res.className='sb-result show bad';}
  }
  const badge=document.getElementById(`score-sb-${sid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetBuilder(sid,count,wordsJson){
  const words=JSON.parse(wordsJson.replace(/&quot;/g,'"'));
  sbState[sid]={};
  for(let i=0;i<count;i++){
    document.getElementById(`sb-slot-${sid}-${i}`).innerHTML='';
    document.getElementById(`sb-res-${sid}-${i}`).className='sb-result';
    const bank=document.getElementById(`sb-bank-${sid}-${i}`);
    const shuffled=[...words[i]].sort(()=>Math.random()-.5);
    bank.innerHTML=shuffled.map((w,wi)=>`<button class="sb-word" id="sbw-${sid}-${i}-${wi}" data-word="${w}" onclick="sbClick('${sid}',${i},${wi})">${w}</button>`).join('');
  }
  document.getElementById(`score-sb-${sid}`).className='score-badge';
}

// ── MATCHING ──
const matchState={};
function matchClick(mid,idx,side){
  if(!matchState[mid]) matchState[mid]={left:null,right:null};
  const elId=side==='left'?`ml-${mid}-${idx}`:`mr-${mid}-${idx}`;
  const el=document.getElementById(elId);
  if(el.classList.contains('matched')) return;
  // deselect same side
  document.querySelectorAll(`[id^="m${side==='left'?'l':'r'}-${mid}-"]`).forEach(e=>{if(!e.classList.contains('matched'))e.classList.remove('selected')});
  el.classList.add('selected');
  matchState[mid][side]={idx,elId};
  const ms=matchState[mid];
  if(ms.left&&ms.right){
    const leftEl=document.getElementById(ms.left.elId);
    const rightEl=document.getElementById(ms.right.elId);
    const leftDataIdx=leftEl.dataset.idx;
    const rightDataIdx=rightEl.dataset.idx;
    if(leftDataIdx===rightDataIdx){
      leftEl.classList.remove('selected');rightEl.classList.remove('selected');
      leftEl.classList.add('matched');rightEl.classList.add('matched');
      // check if all matched
      const total=document.querySelectorAll(`[id^="ml-${mid}-"]`).length;
      const matched=document.querySelectorAll(`[id^="ml-${mid}-"].matched`).length;
      const badge=document.getElementById(`score-match-${mid}`);
      if(matched===total){badge.textContent=`${total}/${total} — all matched! 🎉`;badge.className='score-badge show full';}
    } else {
      leftEl.classList.add('wrong-flash');rightEl.classList.add('wrong-flash');
      setTimeout(()=>{leftEl.classList.remove('wrong-flash','selected');rightEl.classList.remove('wrong-flash','selected');},600);
    }
    matchState[mid]={left:null,right:null};
  }
}

// ── TRANSFORMATION ──
function checkTransform(tid,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`tr-${tid}-${i}`);
    const rev=document.getElementById(`tr-rev-${tid}-${i}`);
    const ans=inp.dataset.answer.toLowerCase().replace(/[.!?,]/g,'').trim();
    const val=inp.value.toLowerCase().replace(/[.!?,]/g,'').trim();
    if(val===ans){inp.className='transform-input correct';rev.className='transform-reveal';correct++;}
    else{inp.className='transform-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='transform-reveal show';}
  }
  const badge=document.getElementById(`score-tr-${tid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetTransform(tid,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`tr-${tid}-${i}`);
    const rev=document.getElementById(`tr-rev-${tid}-${i}`);
    inp.value='';inp.className='transform-input';rev.textContent='';rev.className='transform-reveal';
  }
  document.getElementById(`score-tr-${tid}`).className='score-badge';
}

// ── CATEGORISATION ──
const catState={};
function catClick(cid,wi){
  if(!catState[cid]) catState[cid]={selected:null,placed:{}};
  const cs=catState[cid];
  const wordEl=document.getElementById(`cw-${cid}-${wi}`);
  if(wordEl.classList.contains('placed')) return;
  // find which column was most recently clicked (use a pending col)
  if(cs.pendingCol===undefined||cs.pendingCol===null){
    // first select the word
    document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>e.style.outline='');
    wordEl.style.outline='2px solid var(--sky)';
    cs.selectedWord={wi,word:wordEl.textContent,cat:parseInt(wordEl.dataset.cat)};
  }
}
function catColClick(cid,ci){
  if(!catState[cid]) catState[cid]={selectedWord:null,placed:{}};
  const cs=catState[cid];
  if(!cs.selectedWord) return;
  const {wi,word}=cs.selectedWord;
  const wordEl=document.getElementById(`cw-${cid}-${wi}`);
  wordEl.classList.add('placed');
  wordEl.style.outline='';
  const colItems=document.getElementById(`cc-items-${cid}-${ci}`);
  const placed=document.createElement('button');
  placed.className='cat-placed';
  placed.textContent=word;
  placed.dataset.wi=wi;
  placed.dataset.ci=String(ci);
  placed.dataset.correctCat=String(cs.selectedWord.cat);
  placed.style.background='var(--a1bg)';placed.style.borderColor='var(--sky)';placed.style.color='var(--sky)';
  placed.onclick=()=>{
    wordEl.classList.remove('placed');wordEl.style.outline='';
    placed.remove();
    if(catState[cid].placed[wi]) delete catState[cid].placed[wi];
  };
  colItems.appendChild(placed);
  cs.placed[wi]={ci,correctCat:cs.selectedWord.cat};
  cs.selectedWord=null;
  document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>e.style.outline='');
}
function checkCat(cid,numCols){
  const cs=catState[cid]||{placed:{}};
  let correct=0,total=0;
  // check each placed item
  for(const wi in cs.placed){
    const {ci,correctCat}=cs.placed[wi];
    const wordEl=document.getElementById(`cw-${cid}-${wi}`);
    total++;
    if(ci===correctCat) correct++;
  }
  // also count unplaced items (wrong — left in bank)
  document.querySelectorAll(`[id^="cw-${cid}-"]:not(.placed)`).forEach(()=>total++);
  // colour the columns
  for(let ci=0;ci<numCols;ci++){
    const col=document.getElementById(`cc-${cid}-${ci}`);
    const items=document.getElementById(`cc-items-${cid}-${ci}`);
    let colCorrect=true;
    items.querySelectorAll('.cat-placed').forEach(p=>{
      const correctCat=parseInt(p.dataset.correctCat);
      const placedIn=parseInt(p.dataset.ci);
      if(correctCat!==placedIn){colCorrect=false;p.style.background='#FFF0F0';p.style.borderColor='var(--coral)';p.style.color='var(--coral)';}
      else{p.style.background='#E8F8F5';p.style.borderColor='var(--sea)';p.style.color='#0F7A6A';}
    });
  }
  const badge=document.getElementById(`score-cat-${cid}`);
  const pct=total>0?Math.round((correct/total)*100):0;
  badge.textContent=`${correct}/${total} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetCat(cid,numCols){
  catState[cid]={selectedWord:null,placed:{}};
  document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>{e.classList.remove('placed');e.style.outline='';});
  for(let ci=0;ci<numCols;ci++) document.getElementById(`cc-items-${cid}-${ci}`).innerHTML='';
  document.getElementById(`score-cat-${cid}`).className='score-badge';
}

// ── CONVERSATION FILL ──
function checkConvo(cvid,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`cv-${cvid}-${i}`);
    const rev=document.getElementById(`cv-rev-${cvid}-${i}`);
    const accepted=inp.dataset.answer.toLowerCase().split('/').map(a=>a.trim());
    const val=inp.value.toLowerCase().trim();
    if(accepted.includes(val)){inp.className='convo-input correct';rev.className='convo-reveal';correct++;}
    else{inp.className='convo-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='convo-reveal show';}
  }
  const badge=document.getElementById(`score-cv-${cvid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetConvo(cvid,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`cv-${cvid}-${i}`);
    const rev=document.getElementById(`cv-rev-${cvid}-${i}`);
    inp.value='';inp.className='convo-input';rev.textContent='';rev.className='convo-reveal';
  }
  document.getElementById(`score-cv-${cvid}`).className='score-badge';
}

// ── TRUE / FALSE / NOT GIVEN ──
function pickTF(tfid,qi,choice,answer,explanation){
  const item=document.getElementById(`tf-fb-${tfid}-${qi}`).parentElement;
  item.querySelectorAll('.tf-btn').forEach(b=>{
    b.classList.remove('correct-ans','wrong-ans');
    if(b.textContent===answer) b.classList.add('correct-ans');
    if(b.textContent===choice&&choice!==answer) b.classList.add('wrong-ans');
  });
  const fb=document.getElementById(`tf-fb-${tfid}-${qi}`);
  fb.textContent=explanation;
  fb.className=`tf-feedback show ${choice===answer?'ok':'bad'}`;
}

// ── INIT ──
buildSidebar();
goto(0);

</script>
