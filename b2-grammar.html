<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Grammar — JohnPlusEnglish</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#2176FF;--sea:#1DD3B0;--coral:#FF6B6B;--sun:#FFB347;--lav:#9B72CF;
  --cream:#F7F6F3;--ink:#2D3047;--ink2:#4A4E6B;--ink3:#8B8FA8;
  --a1:#2EC4B6;--a1bg:#E6F9F7;--a1dark:#1A8A80;
  --radius:14px;--radius-sm:8px;
  --card-shadow:0 1px 3px rgba(45,48,71,.07),0 4px 16px rgba(45,48,71,.05);
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:15px}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:13px 32px;background:#fff;border-bottom:1px solid #E8E6E0;position:sticky;top:0;z-index:200;}
.logo{font-weight:900;font-size:17px;letter-spacing:-0.02em}
.logo span{color:var(--sky)}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;padding:6px 12px;border-radius:20px;border:1px solid #E8E6E0;background:transparent;transition:all .15s;font-family:'Outfit',sans-serif;}
.nav-back:hover{background:var(--cream);color:var(--ink)}
.nav-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)}
.nav-breadcrumb span{color:var(--sky);font-weight:600}
.nav-breadcrumb .sep{opacity:.4;color:var(--ink3)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 53px)}
.sidebar{background:#fff;border-right:1px solid #E8E6E0;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-head{padding:20px 20px 14px;border-bottom:1px solid #F0EEE8;}
.level-pill{display:inline-flex;align-items:center;gap:5px;background:var(--a1bg);color:var(--a1);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px;}
.sidebar-head h2{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
.sidebar-head p{font-size:12px;color:var(--ink3);margin-top:3px;line-height:1.45}
.topic-nav{padding:8px 0;flex:1}
.topic-link{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background .12s;border:none;background:transparent;width:100%;text-align:left;font-family:'Outfit',sans-serif;}
.topic-link:hover{background:#F7F6F3}
.topic-link.active{background:var(--a1bg)}
.topic-link.done .tl-check{background:var(--sea);border-color:var(--sea);color:#fff}
.tl-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3);width:16px;flex-shrink:0}
.tl-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #D4D2CA;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;color:var(--sea);transition:all .2s;}
.topic-link.active .tl-check{border-color:var(--a1)}
.tl-name{font-size:13px;color:var(--ink2);font-weight:400;line-height:1.3}
.topic-link.active .tl-name{color:var(--a1);font-weight:600}
.topic-link.done .tl-name{color:var(--ink3)}
.sidebar-foot{padding:14px 20px;border-top:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.prog-bar{flex:1;height:4px;background:#E8E6E0;border-radius:2px;margin-right:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--sea);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-text{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink3);white-space:nowrap}
.main{padding:0;overflow:visible}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-hero{padding:36px 40px 28px;border-bottom:1px solid #E8E6E0;background:linear-gradient(135deg,#fff 0%,#F2F7FF 100%);}
.lesson-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.level-tag{background:var(--a1bg);color:var(--a1);font-weight:700}
.lesson-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3)}
.lesson-hero h1{font-size:32px;font-weight:900;letter-spacing:-.03em;color:var(--ink);line-height:1.1;margin-bottom:8px}
.lesson-hero p{font-size:15px;color:var(--ink2);line-height:1.6;max-width:580px}
.lesson-toolbar{display:flex;align-items:center;gap:8px;margin-top:20px;}
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--sky);color:#fff}
.btn-primary:hover{background:#1a6ae8;transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--ink2);border:1px solid #E0DED8}
.btn-ghost:hover{background:var(--cream)}
.btn-done{background:var(--sea);color:#fff}
.btn-done:hover{background:#17b89e;transform:translateY(-1px)}
.lesson-body{padding:32px 40px;display:flex;flex-direction:column;gap:8px}
.section-label{display:flex;align-items:center;gap:10px;margin-bottom:0;margin-top:8px;padding:9px 14px;background:var(--ink);border-radius:6px;cursor:pointer;user-select:none;transition:background .15s;}
.section-label:hover{background:#2D3047}
.btn-toggle-all{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);background:transparent;border:1px solid #D8D6D0;border-radius:20px;padding:5px 14px;cursor:pointer;transition:all .15s;}
.btn-toggle-all:hover{background:var(--cream);color:var(--ink);border-color:#B0AEA6;}
.section-label-chevron{margin-left:auto;display:flex;align-items:center;color:rgba(255,255,255,.5);transition:transform .2s;}
.section-label.collapsed .section-label-chevron{transform:rotate(-90deg)}
.section-body{overflow:visible;transition:max-height .25s ease,opacity .2s ease,margin-top .2s ease;max-height:4000px;opacity:1;margin-top:14px;}
.section-body.collapsed{max-height:0;opacity:0;margin-top:0;overflow:hidden;}
.section-label-icon{display:flex;align-items:center;color:#fff;flex-shrink:0}
.section-label h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#fff}
.explain-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;padding:26px 28px;box-shadow:var(--card-shadow);}
.explain-lead{font-size:16px;font-weight:600;color:var(--ink);line-height:1.55;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #F0EEE8;}
.explain-lead em{font-style:normal;color:var(--sky);font-weight:700}
.explain-body{font-size:14px;color:var(--ink2);line-height:1.8}
.explain-body p{margin-bottom:14px}
.explain-body p:last-child{margin-bottom:0}
.explain-body .rule{display:flex;gap:14px;align-items:flex-start;background:var(--cream);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
.explain-body .rule:last-of-type{margin-bottom:0}


.explain-body .rule-text{font-size:14px;color:var(--ink2);line-height:1.7}
.explain-body .rule-text strong{color:var(--ink)}
.explain-body .rule-text em{font-style:normal;color:var(--a1);font-weight:600}
.explain-body .rule-num:empty{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--a1);margin-top:6px;}
.explain-body .rule-num:not(:empty){flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--a1);font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.explain-body .note{background:var(--a1bg);border-left:3px solid var(--a1);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:14px;font-size:13px;color:var(--ink2);line-height:1.65}
.explain-body .note strong{color:var(--ink)}
.explain-body .rule{display:flex;gap:14px;align-items:flex-start;background:var(--cream);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
.explain-body .rule:last-of-type{margin-bottom:0}


.explain-body .rule-text{font-size:14px;color:var(--ink2);line-height:1.7}
.explain-body .rule-text strong{color:var(--ink)}
.explain-body .rule-text em{font-style:normal;color:var(--a1);font-weight:600}
.explain-body .rule-num:empty{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--a1);margin-top:6px;}
.explain-body .rule-num:not(:empty){flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--a1);font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.explain-body .note{background:var(--a1bg);border-left:3px solid var(--a1);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:14px;font-size:13px;color:var(--ink2);line-height:1.65}
.explain-body .note strong{color:var(--ink)}
.form-table{width:100%;border-collapse:collapse;font-size:14px}
.form-table th{background:#EEF2FF;color:var(--ink);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;text-align:left;}
.form-table th:first-child{border-radius:8px 0 0 0}
.form-table th:last-child{border-radius:0 8px 0 0}
.form-table td{padding:11px 14px;border-bottom:1px solid #F0EEE8;color:var(--ink2);font-size:14px}
.form-table tr:last-child td{border-bottom:none}
.form-table tr:nth-child(even) td{background:#FAFAF8}
.form-table .subject{font-weight:700;color:var(--ink)}
.form-table .form{color:var(--ink2)}
.form-table .neg{color:var(--ink2)}
.form-table .example{color:var(--ink2);font-style:italic}
.form-table .example{color:var(--ink2);font-style:italic}
.examples-grid{display:grid;gap:10px}
.example-item{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.ex-marker{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px;}
.ex-marker.pos{background:#E8F8F5;color:var(--sea)}
.ex-marker.neg{background:#FFF0F0;color:var(--coral)}
.ex-marker.q{background:var(--a1bg);color:var(--sky)}
.ex-eng{font-size:14px;font-weight:600;color:var(--ink)}
.ex-note{font-size:12px;color:var(--ink3);margin-top:2px}
.error-card{background:#fff;border-radius:var(--radius);padding:20px 22px;border:1px solid #E0DED8;}
.error-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:14px}
.error-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.error-bad,.error-good{border-radius:var(--radius-sm);padding:11px 14px}
.error-bad{background:#FFF5F5;border:1px solid #FCDADA}
.error-good{background:#F0FBF8;border:1px solid #C0EDE4}
.error-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.error-bad .error-label{color:var(--coral)}
.error-good .error-label{color:#0F7A6A}
.error-text{font-size:14px;color:var(--ink);font-weight:500;font-style:italic}
.error-bad .error-text{color:#B84040}
.error-good .error-text{color:#0F5A4A}
.error-reason{font-size:13px;color:var(--ink3);margin-top:10px;margin-bottom:4px;grid-column:1/-1;padding:0 2px}
.exercise-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;overflow:visible;box-shadow:var(--card-shadow);}
.ex-card-header{padding:16px 20px;border-bottom:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.ex-card-title{font-size:14px;font-weight:700;color:var(--ink)}
.ex-card-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.ex-type-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:#F0F0F0;color:var(--ink3)}
.ex-card-body{padding:20px}
.gap-sentence{font-size:15px;color:var(--ink);line-height:2.4;margin-bottom:4px;display:flex;align-items:baseline;flex-wrap:wrap;gap:4px;}
.gap-sentence:last-child{margin-bottom:0}
.gap-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-right:4px}
.gap-input{display:inline-block;border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.gap-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.gap-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.gap-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.gap-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:baseline}
.gap-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.gap-reveal.show{opacity:1}
.mc-question{margin-bottom:20px}
.mc-question:last-child{margin-bottom:0}
.mc-text{font-size:14px;color:var(--ink);margin-bottom:10px;font-weight:500}
.mc-options{display:flex;flex-wrap:wrap;gap:8px}
.mc-opt{font-family:'Outfit',sans-serif;font-size:13px;padding:7px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.mc-opt:hover{border-color:var(--sky);color:var(--sky);background:var(--a1bg)}
.mc-opt.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600}
.mc-opt.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.mc-feedback{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:6px;display:none}
.mc-feedback.show{display:block}
.mc-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.mc-feedback.bad{background:#FFF0F0;color:#B84040}
.ec-item{margin-bottom:16px}
.ec-item:last-child{margin-bottom:0}
.ec-sentence{font-size:14px;background:#FFF8F0;border:1px solid #FFD8B0;border-radius:var(--radius-sm);padding:11px 14px;color:var(--ink);font-weight:500;margin-bottom:8px;}
.ec-input-row{display:flex;gap:8px;align-items:center}
.ec-input{flex:1;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.ec-input:focus{border-color:var(--sky)}
.ec-input.correct{border-color:var(--sea);background:#F0FBF8}
.ec-input.wrong{border-color:var(--coral);background:#FFF5F5}
.check-row{display:flex;gap:8px;margin-top:16px}
.btn-check{background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 20px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-check:hover{background:#1a6ae8}
.btn-reset{background:var(--cream);color:var(--ink3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:20px;border:1px solid #E0DED8;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#EDEBE5;color:var(--ink)}
.score-badge{display:none;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;margin-top:12px;}
.score-badge.show{display:inline-flex}
.score-badge.full{background:#E8F8F5;color:#0F7A6A}
.score-badge.partial{background:#FFF8E8;color:#8B6000}
.score-badge.low{background:#FFF0F0;color:#B84040}
.lesson-footer{padding:24px 40px;border-top:1px solid #E8E6E0;display:flex;align-items:center;justify-content:space-between;background:#fff;}
.footer-hint{font-size:12px;color:var(--ink3)}
.footer-nav{display:flex;gap:8px}
.real-use{background:linear-gradient(135deg,var(--a1bg) 0%,#F8F0FF 100%);border-radius:var(--radius);border:1px solid #C8DEFF;padding:20px 24px;}
.real-use h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sky);margin-bottom:12px}
.real-use ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.real-use li{font-size:13px;color:var(--ink2);line-height:1.6;padding-left:20px;position:relative;}
.real-use li::before{content:'→';position:absolute;left:0;color:var(--sky);font-weight:700}

/* ── JOHN\'S TIP ── */
.johns-tip{
  background:#FFFBF0;border:1.5px solid #FFD97A;border-radius:var(--radius);
  padding:18px 20px;display:flex;gap:14px;align-items:flex-start;
}
.tip-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--sky);color:#fff;
  font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:-.02em;
}
.tip-body{}
.tip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#B8860B;margin-bottom:5px}
.tip-text{font-size:13px;color:#5A4500;line-height:1.65}
.tip-text strong{color:#3A2D00;font-weight:700}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .lesson-hero{padding:24px 20px 20px}
  .lesson-body{padding:24px 20px}
  .lesson-footer{padding:16px 20px}
  .error-row{grid-template-columns:1fr}
}

/* ── SENTENCE BUILDER ── */
.sb-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:12px;}
.sb-word{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.sb-word:hover{border-color:var(--sky);color:var(--sky)}
.sb-word.used{opacity:.3;pointer-events:none;}
.sb-slot{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:10px 12px;border:2px dashed #C8DEFF;border-radius:var(--radius-sm);background:#FAFCFF;margin-bottom:12px;align-items:center;}
.sb-placed{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:var(--a1bg);border:1.5px solid var(--sky);border-radius:20px;cursor:pointer;color:var(--sky);user-select:none;transition:all .15s;}
.sb-placed:hover{background:#FFE8E8;border-color:var(--coral);color:var(--coral)}
.sb-sentence{margin-bottom:20px}
.sb-sentence:last-child{margin-bottom:0}
.sb-sentence-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-bottom:6px}
.sb-context{font-size:13px;color:var(--ink3);margin-bottom:8px;font-style:italic}
.sb-result{font-size:12px;margin-top:6px;padding:6px 12px;border-radius:6px;display:none}
.sb-result.show{display:block}
.sb-result.ok{background:#E8F8F5;color:#0F7A6A}
.sb-result.bad{background:#FFF0F0;color:#B84040}

/* ── MATCHING ── */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.match-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:8px;}
.match-item{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid #E0DED8;cursor:pointer;transition:all .15s;background:#fff;color:var(--ink2);font-family:'Outfit',sans-serif;text-align:left;width:100%;margin-bottom:6px;display:block;}
.match-item:last-child{margin-bottom:0}
.match-item:hover{border-color:var(--sky);color:var(--sky)}
.match-item.selected{border-color:var(--sky);background:var(--a1bg);color:var(--sky);font-weight:600}
.match-item.matched{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600;pointer-events:none;cursor:default;}
.match-item.wrong-flash{border-color:var(--coral)!important;background:#FFF0F0!important;color:var(--coral)!important}
.match-pairs{margin-top:12px;}
.match-pair-line{font-size:12px;display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #F0EEE8;color:var(--ink3);}
.match-pair-line:last-child{border-bottom:none}

/* ── TRANSFORMATION ── */
.transform-item{margin-bottom:16px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.transform-item:last-child{margin-bottom:0}
.transform-original{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:8px;line-height:1.5}
.transform-keyword{display:inline-block;background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin:0 2px;}
.transform-input{width:100%;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.transform-input:focus{border-color:var(--sky)}
.transform-input.correct{border-color:var(--sea);background:#F0FBF8}
.transform-input.wrong{border-color:var(--coral);background:#FFF5F5}
.transform-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:5px;opacity:0;transition:opacity .2s;min-height:16px}
.transform-reveal.show{opacity:1}

/* ── CATEGORISATION ── */
.cat-bank{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:14px;min-height:48px;}
.cat-word{font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.cat-word:hover{border-color:var(--sky);color:var(--sky)}
.cat-word.placed{opacity:.3;pointer-events:none;}
.cat-columns{display:grid;gap:10px;margin-bottom:12px;}
.cat-col{border-radius:var(--radius-sm);border:2px dashed #D0CEC8;padding:10px 12px;min-height:80px;transition:border-color .2s;}
.cat-col-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #E0DED8;}
.cat-placed{font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:4px 11px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;user-select:none;transition:all .15s;display:inline-block;margin:3px;}
.cat-placed:hover{opacity:.65}
.cat-col.checked-correct .cat-col-head{color:#0F7A6A}
.cat-col.checked-correct{border-color:var(--sea);border-style:solid;}
.cat-col.checked-wrong{border-color:var(--coral);border-style:solid;}

/* ── CONVERSATION FILL ── */
.convo-wrap{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;overflow:hidden;margin-bottom:12px;}
.convo-line{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid #F5F3EF;}
.convo-line:last-child{border-bottom:none}
.convo-speaker{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;width:28px;flex-shrink:0;padding-top:3px;}
.convo-speaker.a{color:var(--sky)}
.convo-speaker.b{color:var(--lav)}
.convo-text{font-size:14px;color:var(--ink);line-height:1.7;flex:1}
.convo-input{border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.convo-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.convo-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.convo-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.convo-gwrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:middle}
.convo-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.convo-reveal.show{opacity:1}

/* ── TRUE / FALSE / NOT GIVEN ── */
.tf-item{margin-bottom:10px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.tf-item:last-child{margin-bottom:0}
.tf-context{font-size:12px;color:var(--ink3);margin-bottom:6px;font-style:italic;line-height:1.5}
.tf-statement{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:10px;line-height:1.5}
.tf-options{display:flex;gap:8px;flex-wrap:wrap;}
.tf-btn{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.tf-btn:hover{border-color:var(--sky);background:var(--a1bg);color:var(--sky)}
.tf-btn.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A}
.tf-btn.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.tf-feedback{font-size:12px;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.tf-feedback.show{display:block}
.tf-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.tf-feedback.bad{background:#FFF0F0;color:#B84040}

.rich-section{margin-bottom:20px;}
.rich-section:last-child{margin-bottom:0}
.rich-heading{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--a1);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--a1bg);}
.rich-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:0;}
.rich-table th{background:var(--a1bg);color:var(--ink);font-weight:700;padding:8px 12px;text-align:left;font-size:12px;}
.rich-table td{padding:8px 12px;border-bottom:1px solid #F0EEE8;color:var(--ink2);vertical-align:top;line-height:1.55;}
.rich-table tr:last-child td{border-bottom:none;}
.rich-table td:first-child{font-weight:600;color:var(--ink);}
.rich-table td em{font-style:italic;color:var(--ink2);}
.rich-table td strong{color:var(--ink);}
.colloc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.colloc-card{background:var(--a1bg);border-radius:var(--radius-sm);padding:10px 12px;}
.colloc-card-head{font-size:11px;font-weight:700;color:var(--a1);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.colloc-card-items{font-size:13px;color:var(--ink2);line-height:1.8;}
.certainty-scale{display:flex;flex-direction:column;gap:6px;}
.certainty-row{display:flex;align-items:flex-start;gap:12px;padding:8px 12px;border-radius:var(--radius-sm);background:var(--cream);}
.certainty-modal{font-weight:700;color:#fff;background:var(--a1);padding:3px 10px;border-radius:4px;font-size:12px;min-width:140px;text-align:center;flex-shrink:0;margin-top:2px;}
.certainty-meaning{font-size:13px;color:var(--ink2);}
.certainty-eg{font-size:12px;color:var(--ink3);font-style:italic;margin-top:2px;}
.transform-demo{display:flex;flex-direction:column;gap:6px;}
.transform-demo-row{display:grid;grid-template-columns:1fr 20px 1fr;gap:8px;align-items:center;background:var(--cream);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;}
.transform-demo-row .tdl{color:var(--ink2);}
.transform-demo-row .tdarrow{color:var(--ink3);text-align:center;font-weight:700;}
.transform-demo-row .tdr{color:var(--a1);font-weight:600;}
.meaning-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.meaning-pair:last-child{margin-bottom:0}
.meaning-box{background:var(--cream);border-radius:var(--radius-sm);padding:10px 12px;}
.meaning-box-head{font-size:11px;font-weight:700;color:var(--a1);margin-bottom:5px;}
.meaning-box-eg{font-size:13px;color:var(--ink);font-style:italic;}
.meaning-box-note{font-size:12px;color:var(--ink3);margin-top:3px;}

<script>
// ── HELPER ──
const tip = (t) => `<div class="johns-tip"><div class="tip-avatar">J</div><div class="tip-body"><div class="tip-label">John's tip</div><div class="tip-text">${t}</div></div></div>`;

// ── LESSON DATA ──
const lessons = [
{id:"pps_ppc",title:"Present perfect: simple vs continuous",subtitle:"I've written three reports / I've been writing all day",intro:"The same tense family, but one focuses on results and the other on activity.",desc:"At B1 you learnt each form separately. At B2 the skill is choosing between them fluently \u2014 the contrast reveals a lot about what the speaker wants to emphasise.",tip:"The clearest test: <strong>can you measure a quantity or point to a completed result?</strong> If yes, use simple. <em>\"I've written three emails\"</em> (countable result). <em>\"I've been writing emails\"</em> (ongoing activity, no fixed quantity). State verbs (know, love, believe) never use the continuous form in either tense.",explanation:"<p>Both tenses connect the past to the present, but they differ in focus and emphasis.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Present perfect simple</strong> \u2014 focuses on the <em>result or completion</em> of an action. <em>\"I've finished the report.\"</em> (It's done.) / <em>\"She's written five novels.\"</em> (Countable achievement.) / <em>\"I've been to Paris.\"</em> (Life experience \u2014 a fact.)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Present perfect continuous</strong> \u2014 focuses on the <em>activity and duration</em>, often still ongoing or just finished. <em>\"I've been working on the report.\"</em> (Activity emphasis.) / <em>\"She's been writing all morning.\"</em> (Duration, possibly still happening.) / <em>\"You look tired \u2014 have you been running?\"</em> (Visible present result of recent activity.)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Adverbs as clues:</strong> <em>just, already, yet, ever, never</em> \u2192 simple. <em>all day/week/morning, for hours, lately, recently</em> \u2192 often continuous. <em>For/since</em> \u2192 both possible, with different nuances.</div></div>\n<div class=\"note\"><strong>The ambiguous cases:</strong><br>\n<em>\"I've worked here for ten years.\"</em> \u2014 simple: emphasis on the fact/duration as a completed state.<br>\n<em>\"I've been working here for ten years.\"</em> \u2014 continuous: emphasis on the ongoing activity.<br>\nBoth are correct. The continuous feels more dynamic and conversational; the simple more formal and factual.<br>\n<strong>State verbs (know, love, own, believe, understand)</strong> never use continuous: <em>\"I've known her for years.\"</em> \u2014 never <em>\"I've been knowing.\"</em></div>",table:{headers:["","Present perfect simple","Present perfect continuous"],rows:[["Focus","Result, completion, fact","Activity, duration, ongoing process"],["Form","have/has + past participle","have/has + been + verb-ing"],["Typical adverbs","just, already, yet, ever, never, three times","all day, for hours, lately, recently, all morning"],["With for/since","Duration as a fact","Duration as ongoing activity"],["State verbs","\u2713 I've known her for years","\u2717 I've been knowing her"],["Countable results","\u2713 She's written five books","\u2717 She's been writing five books"]]},examples:[{type:"pos",eng:"I've sent twenty emails today.",note:"Countable result \u2192 simple."},{type:"pos",eng:"I've been sending emails all morning.",note:"Activity duration \u2192 continuous."},{type:"pos",eng:"She's lived in Madrid since 2015.",note:"Ongoing state as fact \u2192 simple is natural."},{type:"pos",eng:"She's been living in Madrid since 2015.",note:"Ongoing activity \u2192 continuous emphasises the process."},{type:"q",eng:"Have you finished the report?",note:"Asking about completion \u2192 simple."},{type:"q",eng:"Have you been working on the report?",note:"Asking about the activity \u2192 continuous."}],errors:[{bad:"I've been knowing her for years.",good:"I've known her for years.",reason:"Know is a state verb \u2014 no continuous form in any tense."},{bad:"She's been writing three novels.",good:"She's written three novels.",reason:"Countable completed result \u2192 simple. Continuous doesn't quantify."},{bad:"Have you been ever to Tokyo?",good:"Have you ever been to Tokyo?",reason:"Ever always comes between have and the past participle."},{bad:"I've been finishing the report \u2014 here it is.",good:"I've finished the report \u2014 here it is.",reason:"Here it is = present visible result \u2192 simple. Continuous would suggest it's still in progress."}],realUse:["\"I've been thinking about what you said.\" \u2014 continuous for ongoing mental activity.","\"She's published three papers this year.\" \u2014 simple for countable academic achievements.","\"The economy has been growing steadily.\" \u2014 continuous for ongoing trend in news.","\"I've been meaning to call you.\" \u2014 fixed expression for an intention not yet acted on."],exercises:[{type:"gap",title:"Simple or continuous?",sub:"Fill each gap with the present perfect simple or continuous form of the verb in brackets.",items:[{answer:"have been waiting",before:"I ",after:" for over an hour. Where have you been? (wait \u2014 activity)"},{answer:"has written",before:"She ",after:" four bestsellers. (write \u2014 countable result)"},{answer:"have been thinking",before:"I ",after:" about your proposal all week. (think \u2014 ongoing)"},{answer:"has already finished",before:"He ",after:" the project. Here's the report. (finish \u2014 completed)"},{answer:"have known",before:"We ",after:" each other since university. (know \u2014 state verb)"},{answer:"has been raining",before:"It ",after:" all day \u2014 the streets are flooded. (rain \u2014 ongoing)"},{answer:"have visited",before:"I ",after:" Japan three times. (visit \u2014 life experience)"},{answer:"have been working",before:"They ",after:" on this problem for months. (work \u2014 ongoing activity)"}]},{type:"mc",title:"Which form \u2014 and why?",sub:"Choose the correct form. The reason matters.",items:[{q:"You look exhausted. What _____?",opts:["have you done","have you been doing","did you do","do you do"],answer:"have you been doing",explanation:"Visible present result of recent activity \u2014 continuous for the activity that caused the tiredness."},{q:"She _____ three languages since childhood.",opts:["has been speaking","has spoken","spoke","is speaking"],answer:"has spoken",explanation:"Speak here = acquired ability/fact about her life. Simple for life facts."},{q:"I _____ to finish this chapter.",opts:["tried","have tried","have been trying","was trying"],answer:"have been trying",explanation:"Ongoing effort, still in progress \u2014 continuous."},{q:"He _____ the same mistake five times today.",opts:["has been making","has made","is making","was making"],answer:"has made",explanation:"Five times = countable result \u2192 simple."}]},{type:"tf",title:"True, False, or Not given",sub:"Based on the sentence, is the statement true, false, or not given?",items:[{context:"I've been reading this book for three weeks.",statement:"The speaker has finished the book.",answer:"Not given",explanation:"Continuous = ongoing activity. We don't know if they've finished."},{context:"She's read the report.",statement:"The report has been completed.",answer:"True",explanation:"Simple = completed action. The report is done."},{context:"They've been building the new bridge for two years.",statement:"The bridge is finished.",answer:"False",explanation:"Continuous = still in progress. Been building suggests it's ongoing."},{context:"I've known him since school.",statement:"This sentence would be wrong with 'been knowing'.",answer:"True",explanation:"Know = state verb. State verbs never use the continuous form."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword given.",items:[{original:"She started writing the novel two years ago and hasn't finished.",keyword:"been",answer:"She has been writing the novel for two years."},{original:"He wrote four reports this week.",keyword:"has written",answer:"He has written four reports this week."},{original:"What activity caused you to look so tired?",keyword:"have you been",answer:"What have you been doing?"},{original:"How long ago did you start working here?",keyword:"have been",answer:"How long have you been working here?"},{original:"Did you finish the presentation? (asking for result)",keyword:"Have",answer:"Have you finished the presentation?"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I've been knowing her for twenty years.",correct:"I've known her for twenty years.",hint:"Know = state verb \u2014 no continuous form."},{wrong:"She's been writing three novels.",correct:"She's written three novels.",hint:"Countable result \u2192 simple."},{wrong:"Have you ever been living in another country?",correct:"Have you ever lived in another country?",hint:"Ever with life experience \u2192 simple."},{wrong:"I've been finishing the report \u2014 here it is.",correct:"I've finished the report \u2014 here it is.",hint:"Visible completed result \u2192 simple."},{wrong:"He has been won five awards.",correct:"He has won five awards.",hint:"Win = action verb with countable result \u2192 simple."}]}]},

{id:"pastperfcont",title:"Past perfect continuous",subtitle:"I had been working, she had been waiting",intro:"The activity that was in progress before something else happened in the past.",desc:"The past perfect continuous combines the logic of the past perfect (before a past moment) with the logic of the continuous (emphasis on activity and duration). It is the tense of background explanation.",tip:"Think of it as the past version of the present perfect continuous. If you can say <em>\"I've been working all day and I'm exhausted\"</em> (present), then <em>\"I had been working all day and I was exhausted\"</em> (past) follows the same logic. The continuous gives the background \u2014 the simple gives the event.",explanation:"<p>The past perfect continuous is formed with <strong>had been + verb-ing</strong>. It describes an activity that was in progress <strong>before a specific past moment</strong> \u2014 emphasising the duration or ongoing nature of that activity.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Duration before a past event</strong> \u2014 how long something had been happening before something else occurred. <em>\"She had been studying for six hours when she finally took a break.\"</em> / <em>\"By the time he arrived, we had been waiting for two hours.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Explanation for a past state</strong> \u2014 the activity explains why something was the way it was. <em>\"He was exhausted because he had been working all night.\"</em> / <em>\"Her eyes were red because she had been crying.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Interrupted past activity</strong> \u2014 something was in progress when a past event cut it off. <em>\"She had been writing the report when the power went out.\"</em></div></div>\n<div class=\"note\"><strong>Past perfect simple vs continuous:</strong><br>\n<em>\"He had read the report.\"</em> \u2014 simple: completed before a past moment. Focus on result.<br>\n<em>\"He had been reading the report.\"</em> \u2014 continuous: activity in progress before a past moment. Focus on duration/process.<br>\n<strong>State verbs don't use this form:</strong> <em>\"She had known him for years.\"</em> \u2014 never <em>\"She had been knowing.\"</em><br>\n<strong>For/since with this tense:</strong> <em>\"He had been waiting for two hours.\"</em> / <em>\"She had been living there since 2010.\"</em></div>",table:{headers:["Form","Example","Note"],rows:[["had been + verb-ing","I had been working all night.","All subjects \u2014 no exceptions"],["Negative","She hadn't been sleeping well.","\u2014"],["Question","Had they been waiting long?","\u2014"],["With for","He had been waiting for an hour.","Duration before the past event"],["With since","She had been living there since 2015.","Starting point before the past event"],["State verbs","She had known him for years. \u2713","Had been knowing \u2717 \u2014 never"]]},examples:[{type:"pos",eng:"She was exhausted because she had been working non-stop for twelve hours.",note:"Activity explains a past state."},{type:"pos",eng:"By the time the doctor arrived, he had been waiting for over an hour.",note:"Duration before a past moment \u2014 by the time + past perfect."},{type:"pos",eng:"The road was wet \u2014 it had been raining.",note:"Visible past evidence explained by a previous activity."},{type:"pos",eng:"She had been living in Paris for three years when she got the job offer.",note:"Ongoing situation before a past event."},{type:"neg",eng:"He hadn't been sleeping well, which explained his short temper.",note:"Negative ongoing activity as explanation."},{type:"q",eng:"Had they been arguing before you arrived?",note:"Asking about a past ongoing activity."}],errors:[{bad:"She had been known him for years.",good:"She had known him for years.",reason:"Know = state verb \u2014 past perfect simple, not continuous."},{bad:"By the time he arrived, I was waiting for two hours.",good:"By the time he arrived, I had been waiting for two hours.",reason:"Duration before a past moment \u2014 past perfect continuous needed."},{bad:"He was tired because he worked all night.",good:"He was tired because he had been working all night.",reason:"The working happened before being tired \u2014 needs past perfect. Continuous for the ongoing activity."},{bad:"They had been completed the project before the deadline.",good:"They had completed the project before the deadline.",reason:"Complete = result \u2192 past perfect simple, not continuous."}],realUse:["\"She had been rehearsing the speech for weeks before she finally delivered it.\" \u2014 performance narrative.","\"The company had been struggling financially for years before it finally collapsed.\" \u2014 business/news register.","\"He realised she had been lying to him all along.\" \u2014 dramatic revelation.","\"They had been corresponding by letter for two years before they finally met.\" \u2014 romantic/literary narrative."],exercises:[{type:"gap",title:"Past perfect continuous \u2014 form",sub:"Fill each gap with the past perfect continuous form of the verb in brackets.",items:[{answer:"had been waiting",before:"By the time she arrived, I ",after:" for over an hour. (wait)"},{answer:"had been working",before:"He was exhausted because he ",after:" all night. (work)"},{answer:"had been raining",before:"The streets were wet \u2014 it ",after:" all day. (rain)"},{answer:"had been studying",before:"She ",after:" for six hours when she finally took a break. (study)"},{answer:"hadn't been sleeping",before:"He looked terrible \u2014 he ",after:" well. (not sleep)"},{answer:"had been living",before:"They ",after:" in Rome for three years when the opportunity arose. (live)"},{answer:"had been arguing",before:"It was clear from their faces that they ",after:". (argue)"},{answer:"had been trying",before:"She ",after:" to reach him all morning before he finally answered. (try)"}]},{type:"mc",title:"Which past tense?",sub:"Choose the correct form.",items:[{q:"She was nervous because she _____ in public before.",opts:["never spoke","had never spoken","had never been speaking","never had spoken"],answer:"had never spoken",explanation:"First-time experience before a past moment \u2014 past perfect simple (never + state/result)."},{q:"By the time the ambulance arrived, he _____ for twenty minutes.",opts:["was bleeding","had bled","had been bleeding","bled"],answer:"had been bleeding",explanation:"Duration of ongoing activity before a past moment \u2192 past perfect continuous."},{q:"The meeting was tense \u2014 clearly they _____ before we arrived.",opts:["argued","have been arguing","had been arguing","had argued"],answer:"had been arguing",explanation:"Ongoing activity that explains the atmosphere when we arrived \u2014 past perfect continuous."},{q:"By 2020, she _____ the company for fifteen years.",opts:["ran","has run","had been running","had been run"],answer:"had been running",explanation:"Duration of an ongoing activity up to a past point \u2014 past perfect continuous."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"He started working at midnight. He stopped at 8am. He was very tired.",keyword:"had been",answer:"He was very tired because he had been working all night."},{original:"She started waiting at 2pm. He arrived at 4pm.",keyword:"had been waiting",answer:"She had been waiting for two hours when he arrived."},{original:"They started arguing before we got there.",keyword:"had been",answer:"They had been arguing before we got there."},{original:"It rained all night. That's why the road was flooded.",keyword:"had been",answer:"The road was flooded because it had been raining all night."},{original:"She started living in Madrid in 2015. She left in 2020.",keyword:"had been living",answer:"She had been living in Madrid for five years when she left."}]},{type:"tf",title:"True, False, or Not given",sub:"Is the statement true, false, or not given?",items:[{context:"By the time the ambulance arrived, he had been bleeding for twenty minutes.",statement:"The bleeding started before the ambulance arrived.",answer:"True",explanation:"Had been bleeding = past perfect continuous \u2014 the activity was in progress before the ambulance arrived."},{context:"She was exhausted because she had been working all night.",statement:"She worked all night and then she felt exhausted.",answer:"True",explanation:"Had been working (earlier) \u2192 was exhausted (result). The working preceded and caused the exhaustion."},{context:"He had been living in Rome for three years when he got the offer.",statement:"He was still living in Rome when the offer came.",answer:"True",explanation:"Had been living = ongoing situation up to a past moment \u2014 he was still there when the offer arrived."},{context:"They had been arguing before we arrived.",statement:"They stopped arguing when we arrived.",answer:"Not given",explanation:"Had been arguing = it was happening before we arrived. Whether it stopped when we arrived is not stated."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She had been known him for years before they fell out.",correct:"She had known him for years before they fell out.",hint:"Know = state verb \u2014 past perfect simple."},{wrong:"By the time he arrived, I was waiting for two hours.",correct:"By the time he arrived, I had been waiting for two hours.",hint:"Duration before a past moment \u2014 past perfect continuous."},{wrong:"He was tired because he worked all night.",correct:"He was tired because he had been working all night.",hint:"The activity happened before \u2014 past perfect continuous."},{wrong:"They had been completed the task before the deadline.",correct:"They had completed the task before the deadline.",hint:"Complete = result \u2192 past perfect simple."},{wrong:"Had she been known about the problem?",correct:"Had she known about the problem?",hint:"Know = state verb \u2014 simple."}]}]},

{id:"futureforms",title:"Future forms: contrast",subtitle:"will, going to, present continuous, future perfect",intro:"Six ways to talk about the future. Choosing the right one signals meaning, not just time.",desc:"At B2, students need to move beyond will vs going to and command the full range of future forms, including the future perfect and future continuous \u2014 both common in formal and academic writing.",tip:"The most common B2 error is overusing <em>will</em> for everything future. Each form has a specific communicative function. <em>\"I'm meeting her tomorrow\"</em> (arranged plan, diary entry) is more natural than <em>\"I will meet her tomorrow\"</em> in spoken English. The form you choose signals whether the situation is planned, predicted, spontaneous, or will be completed by a certain time.",explanation:"<p>English has multiple future forms, each with a distinct communicative function. Choosing the right one is a key B2 skill.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Will + base verb</strong> \u2014 spontaneous decisions, promises, general predictions, offers. <em>\"I'll call you back.\"</em> / <em>\"I think it will be fine.\"</em> / <em>\"I'll help you with that.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Going to + base verb</strong> \u2014 pre-decided plans/intentions, predictions from present evidence. <em>\"I'm going to quit.\"</em> (decided before) / <em>\"Look \u2014 it's going to rain!\"</em> (evidence visible)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Present continuous</strong> \u2014 fixed arrangements, diary plans (usually with another person involved). <em>\"I'm meeting the client at 3.\"</em> / <em>\"They're getting married in June.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Present simple</strong> \u2014 timetabled, scheduled events (transport, programmes). <em>\"The train leaves at 6.\"</em> / <em>\"The match starts at 8pm.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">5</div><div class=\"rule-text\"><strong>Future continuous (will be + -ing)</strong> \u2014 activity in progress at a future moment, or polite enquiry. <em>\"At this time tomorrow I'll be sitting on a beach.\"</em> / <em>\"Will you be using the car tonight?\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">6</div><div class=\"rule-text\"><strong>Future perfect (will have + past participle)</strong> \u2014 action completed before a future point. <em>\"By Friday, I will have finished the report.\"</em> / <em>\"By 2030, the technology will have changed completely.\"</em></div></div>\n<div class=\"note\"><strong>Future perfect vs future continuous:</strong><br>\n<em>\"I'll be working at 6pm.\"</em> \u2014 in progress at 6pm (continuous).<br>\n<em>\"I'll have finished by 6pm.\"</em> \u2014 completed before 6pm (perfect).<br>\n<strong>After time conjunctions</strong> (when, before, after, as soon as, until) \u2014 always present simple or present perfect for future meaning: <em>\"I'll call you when I arrive.\"</em> / <em>\"I'll email you once I've checked.\"</em></div>",table:{headers:["Form","Structure","Main use"],rows:[["Will","will + base verb","Spontaneous decisions, promises, predictions, offers"],["Going to","am/is/are + going to + base verb","Pre-decided plans, evidence-based predictions"],["Present continuous","am/is/are + verb-ing","Fixed arrangements, diary plans"],["Present simple","base verb (+ -s)","Timetabled events, schedules"],["Future continuous","will be + verb-ing","Activity in progress at a future moment; polite enquiry"],["Future perfect","will have + past participle","Action completed before a future point"]]},examples:[{type:"pos",eng:"By the time she retires, she will have worked here for forty years.",note:"Future perfect \u2014 completed before a future moment."},{type:"pos",eng:"This time next week, I'll be lying on a beach.",note:"Future continuous \u2014 in progress at a future time."},{type:"pos",eng:"The conference starts at 9 and finishes at 5.",note:"Present simple \u2014 scheduled event."},{type:"pos",eng:"I'm having lunch with the CEO tomorrow.",note:"Present continuous \u2014 fixed arrangement."},{type:"q",eng:"Will you be needing the meeting room this afternoon?",note:"Future continuous for polite enquiry."},{type:"q",eng:"Will she have finished the audit by Monday?",note:"Future perfect question."}],errors:[{bad:"I'll meet her tomorrow at three \u2014 it's in my diary.",good:"I'm meeting her tomorrow at three \u2014 it's in my diary.",reason:"Fixed diary arrangement with another person \u2192 present continuous is more natural."},{bad:"The train will leave at 8:15.",good:"The train leaves at 8:15.",reason:"Timetabled transport \u2192 present simple."},{bad:"By next year, I will finish the course.",good:"By next year, I will have finished the course.",reason:"Completed before a future point \u2192 future perfect."},{bad:"Will you be using the car tonight? (asking politely)",good:"Will you be using the car tonight?",reason:"Actually correct \u2014 future continuous for polite enquiry is right here."}],realUse:["\"By the time you read this, I will have left.\" \u2014 letter/note closing.","\"Will you be attending the conference?\" \u2014 polite formal enquiry.","\"This time tomorrow, the results will be coming in.\" \u2014 anticipation.","\"The deadline is Friday \u2014 I'll have it done by then.\" \u2014 commitment."],exercises:[{type:"gap",title:"Choose the correct future form",sub:"Fill each gap with the most appropriate future form of the verb in brackets.",items:[{answer:"will have finished",before:"By Friday, I ",after:" the report. (finish \u2014 completed before Friday)"},{answer:"'m meeting",before:"I ",after:" the director at noon tomorrow. It's in my diary. (meet \u2014 arrangement)"},{answer:"leaves",before:"The last train ",after:" at 11:47. (leave \u2014 timetable)"},{answer:"'ll be lying",before:"This time next week, I ",after:" on a beach. (lie \u2014 in progress at future moment)"},{answer:"'m going to resign",before:"I've made my decision \u2014 I ",after:". (resign \u2014 pre-decided)"},{answer:"will have been",before:"By 2030, this company ",after:" in business for a century. (be \u2014 completed by future point)"},{answer:"'ll get",before:"'There's no milk.' 'OK, I ",after:" some.' (get \u2014 spontaneous decision)"},{answer:"will be working",before:"Don't call at 6 \u2014 I ",after:" on the presentation. (work \u2014 in progress at that time)"}]},{type:"mc",title:"Which future form is most natural?",sub:"Choose the most appropriate option.",items:[{q:"I've decided \u2014 I _____ vegetarian. (pre-decided)",opts:["will go","go","'m going to go","'m going"],answer:"'m going to go",explanation:"Pre-decided intention \u2192 going to."},{q:"The film _____ at 8:30 and _____ at 10:45.",opts:["will start / will finish","starts / finishes","is starting / is finishing","started / finished"],answer:"starts / finishes",explanation:"Film timetable \u2192 present simple for both."},{q:"_____ you _____ the office tomorrow? (polite enquiry)",opts:["Will / visit","Are / visiting","Do / visit","Will / be visiting"],answer:"Will / be visiting",explanation:"Polite enquiry about plans \u2192 future continuous."},{q:"By the time she graduates, she _____ here for six years.",opts:["will study","is studying","will have been studying","has been studying"],answer:"will have been studying",explanation:"Duration completed before a future point \u2192 future perfect continuous."}]},{type:"categorise",title:"Which future form?",sub:"Click each sentence, then click the correct column.",categories:[{name:"Will",items:["I'll have the salad, please.","It will probably rain later.","I'll help you move the furniture."]},{name:"Going to",items:["She's going to have a baby.","Look out \u2014 you're going to fall!","I've decided \u2014 I'm going to apply."]},{name:"Present continuous",items:["I'm having dinner with clients tonight.","They're getting married in the spring.","We're flying to Madrid on Thursday."]},{name:"Future perfect",items:["By June, she will have completed the course.","They will have left by the time you arrive.","By 2050, temperatures will have risen significantly."]}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword given.",items:[{original:"She started the course and will still be doing it in June \u2014 she won't finish until July.",keyword:"will have",answer:"She will have been studying for a year by June."},{original:"They arranged to meet at the airport \u2014 it's confirmed.",keyword:"are meeting",answer:"They are meeting at the airport."},{original:"The match is scheduled for 8pm.",keyword:"starts",answer:"The match starts at 8pm."},{original:"I expect the work to be done before Monday.",keyword:"will have",answer:"I will have finished the work by Monday."},{original:"Don't call at 3 \u2014 I'll be in a meeting at that point.",keyword:"will be",answer:"I will be having a meeting at 3."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I'll meet the client at 2 \u2014 it's in my diary.",correct:"I'm meeting the client at 2 \u2014 it's in my diary.",hint:"Diary arrangement \u2192 present continuous."},{wrong:"The train will leave at 8:15.",correct:"The train leaves at 8:15.",hint:"Timetabled transport \u2192 present simple."},{wrong:"By next year, I will finish the project.",correct:"By next year, I will have finished the project.",hint:"Completed before a future point \u2192 future perfect."},{wrong:"I'll call you when I'll arrive.",correct:"I'll call you when I arrive.",hint:"After when/before/after \u2014 present simple for future."},{wrong:"Will you use the car tonight? (polite enquiry)",correct:"Will you be using the car tonight?",hint:"Polite enquiry about plans \u2192 future continuous."}]}]},

{id:"passiveadv",title:"Passive \u2014 advanced forms",subtitle:"it is believed, he is thought to, having been told",intro:"Beyond the basic passive \u2014 reporting structures, infinitives, and complex passive forms.",desc:"At B1 you learnt the core tense forms of the passive. At B2 the challenge is the more complex constructions: passive infinitives, passive reporting verbs, and the passive in subordinate clauses. These appear constantly in formal writing and news.",tip:"The passive with reporting verbs is one of the most productive B2 patterns. <strong>\"It is believed that climate change is accelerating\"</strong> or <strong>\"Climate change is believed to be accelerating\"</strong> \u2014 both are correct, both are passive, and both appear in academic and journalistic writing constantly. Mastering both structures is a genuine B2 target.",explanation:"<p>At B2, the passive extends beyond basic tense forms to include complex constructions used in formal registers.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Passive with reporting verbs</strong> \u2014 distancing the speaker from a claim. Two parallel structures:<br>\n<em>It + passive reporting verb + that clause:</em> <em>\"It is believed that the economy will recover.\"</em><br>\n<em>Subject + passive reporting verb + infinitive:</em> <em>\"The economy is believed to be recovering.\"</em><br>\nCommon verbs: <em>believe, say, think, consider, report, claim, allege, expect, know, understand.</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Passive infinitives</strong> \u2014 the infinitive in its passive form. <em>to be done, to have been done.</em><br>\n<em>\"The contract needs to be signed.\"</em> / <em>\"She expected to be promoted.\"</em> / <em>\"The work appears to have been completed.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Having been + past participle</strong> \u2014 passive participle clause for a completed action before the main verb. <em>\"Having been warned about the risks, she proceeded carefully.\"</em> / <em>\"Having been rejected twice, he almost gave up.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Get passive</strong> \u2014 informal passive, often for accidents or unexpected events. <em>\"She got promoted.\"</em> / <em>\"He got arrested.\"</em> / <em>\"The car got damaged in the storm.\"</em></div></div>\n<div class=\"note\"><strong>Tense in passive reporting structures:</strong><br>\nPresent infinitive = happening now or generally true: <em>\"He is said to live in Paris.\"</em><br>\nPerfect infinitive = happened before the reporting: <em>\"He is said to have lived in Paris.\"</em><br>\n<strong>Impersonal passive</strong> is standard in academic writing to avoid personal statements: instead of <em>\"I think...\"</em>, use <em>\"It is thought that...\"</em> or <em>\"It has been argued that...\"</em></div>",table:{headers:["Structure","Example","Register"],rows:[["It + passive reporting + that","It is believed that inflation will fall.","Formal/journalistic"],["Subject + passive reporting + infinitive","Inflation is believed to be falling.","Formal/journalistic"],["Passive infinitive (to be done)","The report needs to be submitted.","Neutral/formal"],["Passive perfect infinitive (to have been done)","The work appears to have been completed.","Formal"],["Having been + pp (participle clause)","Having been told the news, she wept.","Formal/literary"],["Get passive","She got promoted last month.","Informal/spoken"]]},examples:[{type:"pos",eng:"It is widely believed that artificial intelligence will transform the economy.",note:"Impersonal passive reporting \u2014 formal distancing."},{type:"pos",eng:"Artificial intelligence is widely believed to be transforming the economy.",note:"Subject as focus \u2014 same meaning, alternative structure."},{type:"pos",eng:"The report needs to be reviewed before submission.",note:"Passive infinitive \u2014 no agent needed."},{type:"pos",eng:"Having been awarded the prize, she gave a short speech.",note:"Having been + pp \u2014 completed action before the main event."},{type:"pos",eng:"He appears to have been involved in the scandal.",note:"Passive perfect infinitive \u2014 action before the reporting."},{type:"neg",eng:"The results are not expected to be released until next year.",note:"Passive reporting with negation."}],errors:[{bad:"The economy is believed that it will recover.",good:"The economy is believed to recover.",reason:"Subject + passive reporting verb + infinitive \u2014 no that clause after the subject form."},{bad:"Having been rejecting the offer, she sought alternatives.",good:"Having been rejected, she sought alternatives.",reason:"Having been + past participle \u2014 not -ing form of the action verb."},{bad:"She is said living in France.",good:"She is said to live in France.",reason:"Passive reporting verb + to + infinitive."},{bad:"The contract needs being signed.",good:"The contract needs to be signed.",reason:"Need + passive infinitive: needs to be + past participle."},{bad:"It is said him to have left the country.",good:"He is said to have left the country.",reason:"Subject + is said + to + infinitive. Not it + said + object."}],realUse:["\"It has been suggested that the meeting be postponed.\" \u2014 formal memo language.","\"The company is understood to be in financial difficulty.\" \u2014 journalistic distancing.","\"Having been given the green light, the team began immediately.\" \u2014 formal project narrative.","\"He's been asked to leave.\" \u2014 get/be passive in everyday spoken English."],exercises:[{type:"gap",title:"Passive reporting structures",sub:"Rewrite using the structure indicated in brackets.",items:[{answer:"It is believed that the company will be sold.",before:"People believe the company will be sold. \u2192 ",after:"(It + passive reporting)"},{answer:"The company is believed to be for sale.",before:"People believe the company is for sale. \u2192 ",after:"(Subject + passive reporting + infinitive)"},{answer:"It is reported that three people were injured.",before:"Reports say three people were injured. \u2192 ",after:"(It + passive reporting)"},{answer:"The prime minister is expected to resign.",before:"People expect the prime minister to resign. \u2192 ",after:"(Subject + passive reporting + infinitive)"},{answer:"It is thought that inflation will fall next year.",before:"Economists think inflation will fall next year. \u2192 ",after:"(It + passive reporting)"},{answer:"The suspect is alleged to have fled the country.",before:"Police allege the suspect fled the country. \u2192 ",after:"(Subject + passive reporting + perfect infinitive)"}]},{type:"mc",title:"Choose the correct form",sub:"Choose the correct passive structure.",items:[{q:"_____ that negotiations are continuing.",opts:["It is understood","It understands","They understand","Understanding is"],answer:"It is understood",explanation:"Impersonal passive reporting structure: It + passive verb + that."},{q:"The decision _____ by the end of the week.",opts:["is expected making","is expected to be made","expects to make","is expected made"],answer:"is expected to be made",explanation:"Subject + passive reporting + passive infinitive: is expected to be made."},{q:"_____ the promotion, she celebrated with her team.",opts:["Having offered","Having been offered","Being offered","Being given"],answer:"Having been offered",explanation:"Completed passive action before the main event \u2192 having been + past participle."},{q:"The building _____ to date from the 14th century.",opts:["is believed","is believing","believes","has believed"],answer:"is believed",explanation:"Subject + is believed + to infinitive \u2014 passive reporting."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"People say he committed the crime.",keyword:"alleged",answer:"He is alleged to have committed the crime."},{original:"Experts believe climate change is accelerating.",keyword:"It is",answer:"It is believed that climate change is accelerating."},{original:"The work was completed before she could check it.",keyword:"Having been",answer:"Having been completed, the work was submitted without her approval."},{original:"They expect the project to be finished by June.",keyword:"is expected",answer:"The project is expected to be finished by June."},{original:"She was told the news and immediately called her family.",keyword:"Having been",answer:"Having been told the news, she immediately called her family."}]},{type:"convo",title:"Passive reporting in context",sub:"Complete the news broadcast dialogue using passive reporting structures.",lines:[{speaker:"Anchor",text:"The economy \u2014 what [is believed] to be happening?"},{speaker:"Reporter",text:"It [is reported] that growth has slowed significantly. Several banks [are expected] to announce job cuts."},{speaker:"Anchor",text:"[It is alleged] that the government knew about this earlier?"},{speaker:"Reporter",text:"Yes. The finance minister [is said to have been] aware of the figures for months. [Having been] warned repeatedly, the government faces serious questions."},{speaker:"Anchor",text:"The minister herself \u2014 [is she expected] to resign?"},{speaker:"Reporter",text:"[It is understood] that she [will be asked] to appear before a committee next week."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"The economy is believed that it will recover.",correct:"The economy is believed to recover.",hint:"Subject + passive reporting + infinitive \u2014 no that clause."},{wrong:"Having been rejecting the offer, she sought alternatives.",correct:"Having been rejected, she sought alternatives.",hint:"Having been + past participle \u2014 not -ing."},{wrong:"It is said him to have left the country.",correct:"He is said to have left the country.",hint:"Subject + passive reporting + infinitive. Not it + said + object."},{wrong:"The contract needs being signed.",correct:"The contract needs to be signed.",hint:"Need + passive infinitive: needs to be + past participle."},{wrong:"She is thought living in Madrid.",correct:"She is thought to live in Madrid.",hint:"Passive reporting + to + infinitive."}]}]},

{id:"thirdmixed",title:"Conditionals: third & mixed",subtitle:"If I had known, I would have called / I would be",intro:"Past regret and the impossible mix of past and present.",desc:"At B1 you learnt the second conditional (hypothetical present/future). At B2, the third conditional adds regret about the past, and mixed conditionals blend time frames \u2014 past condition with present result, or present condition with past result.",tip:"The third conditional is the grammar of regret and hindsight. Every time someone says <em>\"If only I had...\"</em> or <em>\"I should have...\"</em>, they are expressing the same idea. The mixed conditional adds a twist: what if the past was different \u2014 how would the present be different? Or: given what is true now \u2014 what must have happened in the past?",explanation:"<p>Third and mixed conditionals extend the conditional system into the past and across time frames.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Third conditional</strong> \u2014 imaginary past. Something didn't happen; this is the regret or speculation about what would have been different. If + past perfect, would have + past participle.<br><em>\"If I had studied harder, I would have passed.\"</em> (I didn't study \u2014 I didn't pass.) <em>\"If she had called, I would have come.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Mixed conditional \u2014 past \u2192 present</strong> \u2014 a past condition with a present result. The past was different; that difference affects the present. If + past perfect, would + base verb.<br><em>\"If I had taken that job, I would be living in Tokyo now.\"</em> (I didn't take the job \u2014 I'm not in Tokyo.)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Mixed conditional \u2014 present \u2192 past</strong> \u2014 a present state explains a past result. If + past simple, would have + past participle.<br><em>\"If she were more careful, she wouldn't have made that mistake.\"</em> (She isn't careful \u2014 that's why she made the mistake.)</div></div>\n<div class=\"note\"><strong>Formal inversion in conditionals:</strong> In formal/written English, the <em>if</em> can be omitted and the auxiliary inverted.<br>\n<em>\"Had I known, I would have called.\"</em> = <em>\"If I had known...\"</em><br>\n<em>\"Were she to resign, the company would struggle.\"</em> = <em>\"If she were to resign...\"</em><br>\n<em>\"Should you need assistance, do not hesitate to contact us.\"</em> = <em>\"If you should need...\"</em><br>\nThis inversion is a key B2/C1 feature \u2014 common in formal letters and academic writing.</div>",table:{headers:["Type","If clause","Result clause","Time frame"],rows:[["Third conditional","past perfect","would have + pp","Past \u2192 past (both unreal)"],["Mixed 1: past \u2192 present","past perfect","would + base verb","Past unreal condition, present result"],["Mixed 2: present \u2192 past","past simple (were/didn't)","would have + pp","Present unreal state, past result"],["Formal inversion (3rd)","Had I known...","I would have called.","Formal/literary"],["Formal inversion (mixed)","Were she more careful...","she wouldn't have made that mistake.","Formal/literary"]]},examples:[{type:"pos",eng:"If I had taken that job, I would have been living in New York for five years by now.",note:"Third conditional \u2014 imaginary past leading to an imaginary present state."},{type:"pos",eng:"If I had studied medicine, I would be a doctor now.",note:"Mixed conditional \u2014 past decision affecting present reality."},{type:"pos",eng:"If she were more organised, she wouldn't have missed the deadline.",note:"Mixed conditional \u2014 present characteristic explaining a past result."},{type:"pos",eng:"Had we known about the problem earlier, we could have avoided the crisis.",note:"Formal inversion \u2014 had + subject + past participle."},{type:"neg",eng:"If they hadn't invested so heavily, they wouldn't be in such a strong position now.",note:"Past decision explains present advantage \u2014 mixed conditional."},{type:"q",eng:"What would you have done if you hadn't got the scholarship?",note:"Third conditional question \u2014 imaginary past."}],errors:[{bad:"If I would have known, I would have called you.",good:"If I had known, I would have called you.",reason:"Third conditional: if + past perfect \u2014 never would have in the if clause."},{bad:"If she studied more, she would have passed the exam.",good:"If she had studied more, she would have passed the exam.",reason:"Past unreal \u2192 past perfect in the if clause (third conditional)."},{bad:"Had I known, I would called you.",good:"Had I known, I would have called you.",reason:"Formal inversion: would have + past participle in the result clause."},{bad:"If I took that job, I would be in Paris now.",good:"If I had taken that job, I would be in Paris now.",reason:"Past decision \u2192 present situation: past perfect in if clause, would + base in result."}],realUse:["\"If you had arrived five minutes earlier, you would have seen her.\" \u2014 narrow miss narrative.","\"Had it not been for her help, I would never have succeeded.\" \u2014 formal gratitude.","\"If he were more confident, he wouldn't have let that opportunity slip.\" \u2014 present trait, past consequence.","\"Were I in your position, I would have acted differently.\" \u2014 formal advice with inversion."],exercises:[{type:"gap",title:"Third and mixed conditionals",sub:"Fill each gap with the correct conditional form.",items:[{answer:"had studied",before:"If I ",after:" harder, I would have passed the exam. (third conditional)"},{answer:"would be",before:"If she had taken the job, she ",after:" living in Tokyo now. (mixed \u2014 past \u2192 present)"},{answer:"wouldn't have made",before:"If he were more careful, he ",after:" that mistake. (mixed \u2014 present \u2192 past)"},{answer:"would have come",before:"If you had called, I ",after:" immediately. (third conditional)"},{answer:"had invested",before:"If they ",after:" earlier, they would be in a stronger position now. (mixed)"},{answer:"would have been",before:"If we hadn't moved, our children ",after:" educated in a different system. (third)"}]},{type:"mc",title:"Which conditional?",sub:"Choose the correct form.",items:[{q:"If she _____ the interview better, she would have got the job.",opts:["prepared","had prepared","would prepare","would have prepared"],answer:"had prepared",explanation:"Third conditional \u2014 past unreal: past perfect in if clause."},{q:"If I _____ taller, I would have become a basketball player.",opts:["am","were","had been","would be"],answer:"had been",explanation:"Mixed \u2014 present state (I'm not tall) linked to past result \u2192 past perfect in if clause."},{q:"If he _____ more careful, he wouldn't have crashed the car.",opts:["is","was","were","had been"],answer:"were",explanation:"Present characteristic explaining a past result \u2192 past simple (were) in if clause."},{q:"_____ I known about the problem, I would have dealt with it immediately.",opts:["Should","Had","If","Were"],answer:"Had",explanation:"Formal inversion of third conditional: Had + subject + past participle."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["if","she","had","taken","the","job","she","would","be","in","Paris","now"],answer:"if she had taken the job she would be in Paris now",context:"Mixed conditional \u2014 past decision, present result."},{words:["had","we","known","earlier","we","could","have","avoided","the","crisis"],answer:"had we known earlier we could have avoided the crisis",context:"Formal inversion of third conditional."},{words:["if","he","were","more","confident","he","wouldn't","have","made","that","mistake"],answer:"if he were more confident he wouldn't have made that mistake",context:"Mixed \u2014 present state, past consequence."},{words:["if","I","hadn't","met","her","my","life","would","be","very","different"],answer:"if I hadn't met her my life would be very different",context:"Mixed \u2014 past event, present result."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"I didn't know, so I didn't call you.",keyword:"had known",answer:"If I had known, I would have called you."},{original:"She didn't take the job. That's why she isn't in Tokyo.",keyword:"had taken",answer:"If she had taken the job, she would be in Tokyo now."},{original:"He's not careful \u2014 that's why he made the mistake.",keyword:"were",answer:"If he were more careful, he wouldn't have made that mistake."},{original:"Had it not been for your help, I would have failed.",keyword:"If",answer:"If it hadn't been for your help, I would have failed."},{original:"We knew about the problem and dealt with it. (what if we hadn't?)",keyword:"Had",answer:"Had we not known, we would not have dealt with it."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"If I would have known, I would have called.",correct:"If I had known, I would have called.",hint:"No would have in the if clause \u2014 past perfect."},{wrong:"If she studied more, she would have passed.",correct:"If she had studied more, she would have passed.",hint:"Third conditional \u2014 past perfect in if clause."},{wrong:"Had I known, I would called you.",correct:"Had I known, I would have called you.",hint:"Result clause: would have + past participle."},{wrong:"If I took that job, I would be in Paris now.",correct:"If I had taken that job, I would be in Paris now.",hint:"Past decision affecting present \u2014 past perfect in if clause."},{wrong:"Were she more careful, she didn't make that mistake.",correct:"Were she more careful, she wouldn't have made that mistake.",hint:"Result clause: wouldn't have + past participle."}]}]},

{id:"modalpast",title:"Modal verbs: past forms",subtitle:"should have, needn't have, could have, must have",intro:"Expressing past obligation, possibility, necessity, and deduction with modal perfects.",desc:"Modal perfects are one of the most distinctively English grammatical features \u2014 they pack a huge amount of meaning into a compact structure. Every modal verb can combine with <em>have + past participle</em> to create a past meaning, and each combination carries a specific nuance.",tip:"The four most important modal perfects and their differences: <strong>should have</strong> (you were obliged to but didn't \u2014 reproach), <strong>needn't have</strong> (you did something that wasn't necessary \u2014 mild waste), <strong>could have</strong> (it was possible but didn't happen \u2014 missed opportunity or criticism), <strong>must have</strong> (almost certain past deduction from evidence). These nuances are what separate B2 from B1.",explanation:"<p>Modal verbs + have + past participle express past meanings: obligation, possibility, necessity, and deduction.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Should have + pp</strong> \u2014 something that was the right thing to do but wasn't done (or was done when it shouldn't have been). Implies reproach or regret. <em>\"You should have called \u2014 I was worried.\"</em> / <em>\"She shouldn't have said that.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Could have + pp</strong> \u2014 something that was possible in the past but didn't happen. Can express: missed opportunity (<em>\"I could have been a doctor\"</em>), reproach (<em>\"You could have helped\"</em>), or speculation (<em>\"That could have been anyone\"</em>).</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Must have + pp</strong> \u2014 strong positive deduction about the past from presen
