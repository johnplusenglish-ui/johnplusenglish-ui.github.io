t or past evidence. <em>\"She looks exhausted \u2014 she must have been working all night.\"</em> / <em>\"He must have taken the wrong turn.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Can't/couldn't have + pp</strong> \u2014 strong negative past deduction. <em>\"He can't have done it \u2014 he was with me.\"</em> / <em>\"That couldn't have been her \u2014 she's abroad.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Needn't have + pp</strong> \u2014 something was done but it turned out to be unnecessary. <em>\"You needn't have cooked \u2014 we'd already eaten.\"</em> Compare: <em>didn't need to</em> = it wasn't necessary and it wasn't done.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Might/may have + pp</strong> \u2014 weak past deduction or possibility. <em>\"She might have misunderstood.\"</em> / <em>\"He may have left already.\"</em></div></div>\n<div class=\"note\"><strong>Needn't have vs didn't need to:</strong><br>\n<em>\"You needn't have brought flowers.\"</em> \u2014 you brought them, but it wasn't necessary.<br>\n<em>\"I didn't need to bring flowers, so I didn't.\"</em> \u2014 it wasn't necessary and I didn't do it.<br>\n<strong>Should have vs ought to have:</strong> Both express past obligation/reproach. <em>Ought to have</em> is slightly more formal but otherwise equivalent.</div>",table:{headers:["Modal perfect","Meaning","Example"],rows:[["should have + pp","obligation not fulfilled / reproach","You should have called. / She shouldn't have left."],["could have + pp","past possibility not realised / reproach","I could have been a doctor. / You could have helped."],["must have + pp","strong positive past deduction","She must have worked all night."],["can't/couldn't have + pp","strong negative past deduction","He can't have done it \u2014 he was here."],["needn't have + pp","unnecessary completed action","You needn't have cooked."],["might/may have + pp","weak past possibility or deduction","She might have misunderstood."],["would have + pp","imaginary past result (conditional)","If I'd known, I would have called."]]},examples:[{type:"pos",eng:"You should have told me \u2014 I would have helped.",note:"Obligation not fulfilled \u2014 reproach/regret."},{type:"pos",eng:"She must have been driving for hours \u2014 she looks exhausted.",note:"Strong past deduction from present evidence."},{type:"pos",eng:"You needn't have bought a present \u2014 just coming was enough.",note:"Action was done but turned out unnecessary."},{type:"pos",eng:"He can't have known about it \u2014 he seemed genuinely surprised.",note:"Strong negative past deduction."},{type:"pos",eng:"I could have applied for that grant, but I didn't think I was eligible.",note:"Past possibility not taken."},{type:"neg",eng:"She might not have received the message \u2014 the server was down.",note:"Weak negative past possibility."}],errors:[{bad:"You should had called earlier.",good:"You should have called earlier.",reason:"Modal perfect: should have + past participle \u2014 not had."},{bad:"He must had known about it.",good:"He must have known about it.",reason:"Must have + past participle."},{bad:"I needn't have to buy it.",good:"I needn't have bought it.",reason:"Needn't have + past participle \u2014 no to."},{bad:"She could have been avoid the accident.",good:"She could have avoided the accident.",reason:"Could have + past participle \u2014 one word, not split with been."}],realUse:["\"I should have known better.\" \u2014 fixed expression for self-reproach.","\"That must have been awkward.\" \u2014 empathising about a past experience.","\"You could have at least called.\" \u2014 expressing mild resentment.","\"It might have been worse.\" \u2014 silver lining after a bad event."],richLabel:"Reference tables",richLabel:"Pattern reference",richLabel:"Inversion triggers",richLabel:"Cleft structures",richLabel:"Emphasis structures",richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Modal perfect \u2014 the full system</div>\n<table class=\"rich-table\"><thead><tr><th>Form</th><th>Meaning</th><th>Example</th></tr></thead><tbody>\n<tr><td>should have + pp</td><td>Obligation not fulfilled \u2014 reproach or regret</td><td><em>\"You should have called.\"</em></td></tr>\n<tr><td>shouldn't have + pp</td><td>Something done that was wrong</td><td><em>\"She shouldn't have said that.\"</em></td></tr>\n<tr><td>could have + pp</td><td>Past possibility not realised; missed opportunity; reproach</td><td><em>\"I could have been a doctor.\"</em></td></tr>\n<tr><td>must have + pp</td><td>Strong positive past deduction</td><td><em>\"She must have worked all night.\"</em></td></tr>\n<tr><td>can't/couldn't have + pp</td><td>Strong negative past deduction</td><td><em>\"He can't have done it \u2014 he was here.\"</em></td></tr>\n<tr><td>needn't have + pp</td><td>Action was done but turned out unnecessary</td><td><em>\"You needn't have cooked.\"</em></td></tr>\n<tr><td>didn't need to</td><td>Action was unnecessary AND wasn't done</td><td><em>\"I didn't need to go, so I didn't.\"</em></td></tr>\n<tr><td>might/may have + pp</td><td>Weak past deduction or possibility</td><td><em>\"She might have misunderstood.\"</em></td></tr>\n<tr><td>would have + pp</td><td>Imaginary past result (3rd conditional)</td><td><em>\"If I'd known, I would have called.\"</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">\u26a0 Needn't have vs didn't need to</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">needn't have brought</div><div class=\"meaning-box-eg\">\"You needn't have brought flowers.\"</div><div class=\"meaning-box-note\">You DID bring them \u2014 but it wasn't necessary</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">didn't need to bring</div><div class=\"meaning-box-eg\">\"I didn't need to bring anything, so I didn't.\"</div><div class=\"meaning-box-note\">It wasn't necessary AND you didn't do it</div></div>\n</div>\n</div>",exercises:[{type:"gap",title:"Modal perfect \u2014 form",sub:"Fill each gap with the correct modal perfect form.",items:[{answer:"should have called",before:"You ",after:" \u2014 I was worried about you."},{answer:"must have been",before:"She looks terrible \u2014 she ",after:" awake all night."},{answer:"needn't have cooked",before:"You ",after:" \u2014 we'd already eaten."},{answer:"can't have known",before:"He ",after:" about it \u2014 he was as surprised as we were."},{answer:"could have taken",before:"I ",after:" a different route, but I wasn't paying attention."},{answer:"might have misunderstood",before:"She ",after:" \u2014 she seemed confused by your question."},{answer:"shouldn't have said",before:"He ",after:" that \u2014 it was very unkind."},{answer:"must have left",before:"She's not here \u2014 she ",after:" already."}]},{type:"mc",title:"Which modal perfect?",sub:"Choose the correct option.",items:[{q:"You _____ me \u2014 I had no idea what was happening. (obligation not fulfilled)",opts:["should have told","must have told","needn't have told","could have been telling"],answer:"should have told",explanation:"Obligation not fulfilled \u2014 reproach/regret \u2192 should have + pp."},{q:"She _____ the bus \u2014 she arrived with wet hair and out of breath. (deduction)",opts:["should have missed","might have missed","must have missed","can't have missed"],answer:"must have missed",explanation:"Strong positive deduction from evidence \u2192 must have + pp."},{q:"You _____ the whole thing out \u2014 a short note was enough. (unnecessary action done)",opts:["shouldn't have typed","needn't have typed","didn't need type","couldn't have typed"],answer:"needn't have typed",explanation:"It was done but wasn't necessary \u2192 needn't have + pp."},{q:"He _____ the robbery \u2014 he was in hospital at the time. (strong negative deduction)",opts:["shouldn't have done","must have done","can't have done","needn't have done"],answer:"can't have done",explanation:"Strong negative past deduction \u2192 can't have + pp."}]},{type:"tf",title:"True, False, or Not given",sub:"Is the statement true, false, or not given?",items:[{context:"You needn't have brought wine \u2014 we have plenty.",statement:"The speaker brought wine.",answer:"True",explanation:"Needn't have = action was done but was unnecessary. The wine was brought."},{context:"She must have left already \u2014 her coat is gone.",statement:"The speaker is certain she has left.",answer:"True",explanation:"Must have = strong positive deduction. The coat is the evidence."},{context:"He could have applied for the promotion.",statement:"He applied for the promotion.",answer:"False",explanation:"Could have = past possibility not realised. He didn't apply."},{context:"I didn't need to submit the report until Monday, so I took the weekend off.",statement:"The report was submitted on Monday.",answer:"Not given",explanation:"Didn't need to = it wasn't necessary. The report may or may not have been submitted \u2014 we don't know when."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"It was the right thing to do, but you didn't do it.",keyword:"should have",answer:"You should have done it."},{original:"She obviously worked all night \u2014 look at her.",keyword:"must have",answer:"She must have been working all night."},{original:"It wasn't necessary to bring flowers, but you did.",keyword:"needn't have",answer:"You needn't have brought flowers."},{original:"There's no way he knew \u2014 he was completely shocked.",keyword:"can't have",answer:"He can't have known about it."},{original:"It was possible for her to avoid the mistake.",keyword:"could have",answer:"She could have avoided the mistake."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"You should had called earlier.",correct:"You should have called earlier.",hint:"Should have + past participle \u2014 not had."},{wrong:"He must had known about it.",correct:"He must have known about it.",hint:"Must have + past participle."},{wrong:"I needn't have to do it.",correct:"I needn't have done it.",hint:"Needn't have + past participle \u2014 no to."},{wrong:"She could have been avoid the problem.",correct:"She could have avoided the problem.",hint:"Could have + past participle directly."},{wrong:"They might had misunderstood.",correct:"They might have misunderstood.",hint:"Might have + past participle."}]}]},

{id:"reportedspeechadv",title:"Reported speech \u2014 advanced",subtitle:"admit, deny, insist, warn, suggest",intro:"Beyond said and told \u2014 using precise reporting verbs.",desc:"At B1 you learnt basic reported speech with tense backshift and say/tell. At B2 the key upgrade is using a range of reporting verbs that do two jobs at once: they tell you what was said AND how it was said \u2014 whether someone admitted something, denied it, insisted, warned, or suggested.",tip:"The crucial thing about reporting verbs is that they each have their own grammatical pattern. <em>Admit, deny, suggest</em> take the gerund. <em>Insist, demand, recommend</em> take that + should or base form. <em>Warn, advise, tell, urge</em> take object + infinitive. Learning the verb categories is the work of B2.",explanation:"<p>Precise reporting verbs convey both the content and the manner of speech. Each group follows a different grammatical pattern.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Verb + that clause</strong> (with tense backshift): <em>say, claim, explain, state, admit, deny, insist, agree, argue, confirm, announce, warn.</em><br><em>\"She admitted that she had made a mistake.\"</em> / <em>\"He insisted that the decision was wrong.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Verb + gerund (-ing)</strong>: <em>admit, deny, suggest, recommend, propose, acknowledge, regret, mention.</em><br><em>\"She admitted making a mistake.\"</em> / <em>\"He denied having been there.\"</em> / <em>\"They suggested meeting earlier.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Verb + object + infinitive</strong>: <em>tell, warn, advise, ask, beg, encourage, persuade, remind, urge, instruct, order, forbid.</em><br><em>\"She warned him not to go.\"</em> / <em>\"He urged us to reconsider.\"</em> / <em>\"She reminded me to lock the door.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Verb + that + should/base form</strong> (subjunctive-like): <em>suggest, recommend, insist, demand, propose, request.</em><br><em>\"She suggested that he should apply.\"</em> / <em>\"They insisted that the work be completed.\"</em> (formal subjunctive)</div></div>\n<div class=\"note\"><strong>No tense backshift when:</strong> the situation is still true now, the reporting verb is present tense, or it's a scientific/general truth: <em>\"She said she lives in Madrid.\"</em> (still true) / <em>\"He says it works.\"</em> (present reporting).<br>\n<strong>Changes in reported speech:</strong> here \u2192 there | now \u2192 then | today \u2192 that day | tomorrow \u2192 the next day | this \u2192 that | come \u2192 go | bring \u2192 take.</div>",table:{headers:["Pattern","Verbs","Example"],rows:[["verb + that clause","say, claim, admit, insist, argue, confirm","He admitted that he had lied."],["verb + gerund","admit, deny, suggest, recommend, regret","She denied taking the money."],["verb + object + infinitive","tell, warn, advise, urge, beg, remind","He warned her not to trust them."],["verb + that + should/base","suggest, recommend, insist, demand","They insisted that it be done."],["verb + to infinitive","offer, refuse, threaten, promise, agree","She offered to help."],["verb + object + not to","warn, tell, advise, remind","She advised him not to go."]]},examples:[{type:"pos",eng:"She admitted having been present at the meeting.",note:"Admit + gerund \u2014 conceding a fact."},{type:"pos",eng:"He denied making any such promise.",note:"Deny + gerund \u2014 strong rejection of an accusation."},{type:"pos",eng:"They urged the government to take immediate action.",note:"Urge + object + infinitive \u2014 strong encouragement."},{type:"pos",eng:"She suggested that they should meet earlier.",note:"Suggest + that + should \u2014 recommendation."},{type:"pos",eng:"He warned her not to sign anything without reading it first.",note:"Warn + object + not to + infinitive."},{type:"neg",eng:"She refused to comment on the allegations.",note:"Refuse + infinitive \u2014 declining to do something."}],errors:[{bad:"She suggested to go out for dinner.",good:"She suggested going out for dinner.",reason:"Suggest + gerund \u2014 never suggest + infinitive."},{bad:"He denied to have taken the money.",good:"He denied having taken the money.",reason:"Deny + gerund \u2014 never deny + infinitive."},{bad:"She told to me not to worry.",good:"She told me not to worry.",reason:"Tell + object (no to before the object) + not to + infinitive."},{bad:"He warned that not to sign it.",good:"He warned her not to sign it.",reason:"Warn + object + not to + infinitive \u2014 needs a personal object."}],realUse:["\"She acknowledged that the policy had failed.\" \u2014 formal/political register.","\"He flatly denied any involvement.\" \u2014 journalistic \u2014 deny + noun.","\"The committee recommended that the proposal be rejected.\" \u2014 formal minutes.","\"She begged him not to tell anyone.\" \u2014 personal/emotional narrative."],exercises:[{type:"gap",title:"Reporting verbs \u2014 correct pattern",sub:"Rewrite each sentence using the reporting verb in brackets.",items:[{answer:"admitted making",before:"'I made a mistake,' she said. \u2192 She ",after:" a mistake. (admit + gerund)"},{answer:"denied having taken",before:"'I didn't take the money,' he said. \u2192 He ",after:" the money. (deny + gerund)"},{answer:"warned us not to go",before:"'Don't go out alone,' she said to us. \u2192 She ",after:" out alone. (warn + object + not to)"},{answer:"suggested meeting",before:"'Why don't we meet earlier?' she said. \u2192 She ",after:" earlier. (suggest + gerund)"},{answer:"urged the government to act",before:"'The government must act now,' they said. \u2192 They ",after:" immediately. (urge + object + infinitive)"},{answer:"insisted that the report should be reviewed",before:"'The report must be reviewed,' she said. \u2192 She ",after:". (insist + that + should)"}]},{type:"mc",title:"Which pattern?",sub:"Choose the correctly formed reported sentence.",items:[{q:"'I didn't steal it.' (deny)",opts:["He denied to steal it.","He denied stealing it.","He denied steal it.","He denied he stole it."],answer:"He denied stealing it.",explanation:"Deny + gerund \u2014 never infinitive."},{q:"'You should apply for the grant.' (suggest)",opts:["She suggested to apply.","She suggested that he should apply.","She suggested him to apply.","She suggested he applies."],answer:"She suggested that he should apply.",explanation:"Suggest + that + should + base verb. Suggest + gerund also correct: she suggested applying."},{q:"'Please don't tell anyone.' (beg)",opts:["She begged not to tell.","She begged him not to tell.","She begged that not tell.","She begged telling."],answer:"She begged him not to tell.",explanation:"Beg + object + not to + infinitive."},{q:"'I'll help you.' (offer)",opts:["She offered helping.","She offered to help.","She offered that she help.","She offered help."],answer:"She offered to help.",explanation:"Offer + to + infinitive."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the reporting verb given.",items:[{original:"'I was there,' she said.",keyword:"admitted",answer:"She admitted having been there."},{original:"'Don't sign anything without reading it,' he told her.",keyword:"warned",answer:"He warned her not to sign anything without reading it."},{original:"'I didn't send that email,' he said.",keyword:"denied",answer:"He denied having sent that email."},{original:"'Why don't we postpone the meeting?' she said.",keyword:"suggested",answer:"She suggested postponing the meeting."},{original:"'You must reconsider,' they said to us.",keyword:"urged",answer:"They urged us to reconsider."}]},{type:"tf",title:"Reporting verb patterns",sub:"Is the statement true, false, or not given?",items:[{context:"She denied having been at the scene.",statement:"She admitted she was at the scene.",answer:"False",explanation:"Deny = strong rejection. She said she was NOT there."},{context:"He urged the team to reconsider.",statement:"He told the team they had to reconsider.",answer:"False",explanation:"Urge = strong encouragement, not obligation. Urge \u2260 tell/order."},{context:"She suggested meeting earlier.",statement:"She proposed that they should meet later.",answer:"False",explanation:"Suggested meeting earlier = proposed an earlier time, not a later one."},{context:"He admitted making a mistake.",statement:"He accepts that he made an error.",answer:"True",explanation:"Admit = concede/accept. Admitted making = he acknowledged the mistake."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She suggested to go out for dinner.",correct:"She suggested going out for dinner.",hint:"Suggest + gerund \u2014 never infinitive."},{wrong:"He denied to have taken the money.",correct:"He denied having taken the money.",hint:"Deny + gerund."},{wrong:"She told to me not to worry.",correct:"She told me not to worry.",hint:"Tell + object (no to) + not to + infinitive."},{wrong:"He warned that not to sign it.",correct:"He warned her not to sign it.",hint:"Warn + personal object + not to + infinitive."},{wrong:"She admitted to lie about it.",correct:"She admitted lying about it.",hint:"Admit + gerund."}]}]},

{id:"relativesb2",title:"Relative clauses: full review",subtitle:"defining, non-defining, reduced",intro:"The complete picture \u2014 including reduced relative clauses and advanced patterns.",desc:"At B1 and B2 the relative clause system becomes fully productive. The key addition at B2 is the reduced relative clause \u2014 dropping the relative pronoun and verb to be, leaving a participle or adjective. This is extremely common in formal written English and makes writing more economical.",tip:"The reduced relative is where students often make errors in both directions \u2014 either failing to reduce when they could, or reducing incorrectly. <em>\"The woman who is sitting by the door\"</em> \u2192 <em>\"the woman sitting by the door\"</em> (active). <em>\"The report which was written by the team\"</em> \u2192 <em>\"the report written by the team\"</em> (passive). Only works when the relative clause has a form of <em>be</em>.",explanation:"<p>A full review of the relative clause system, including reduced relatives common in B2+ writing.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Defining relative clauses</strong> \u2014 no commas. Essential to identify which person/thing. <em>who, which, that, whose, where, when.</em> That can replace who/which. The pronoun can be omitted when it is the object of the clause: <em>\"The film (that) I saw was excellent.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Non-defining relative clauses</strong> \u2014 commas required. Extra information, not essential. <em>who, which, whose, where, when</em> \u2014 never <em>that</em>. <em>Which</em> can refer to the whole previous clause. <em>\"She passed her exams, which surprised everyone.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Reduced relative clauses</strong> \u2014 the relative pronoun + be is dropped, leaving a participle or adjective. Only possible when the relative clause contains a form of <em>be</em>.<br>\nActive: <em>\"the woman who is sitting...\"</em> \u2192 <em>\"the woman sitting...\"</em><br>\nPassive: <em>\"the report which was written...\"</em> \u2192 <em>\"the report written...\"</em><br>\nAdjective: <em>\"the issue which is most relevant...\"</em> \u2192 <em>\"the most relevant issue...\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Prepositions in relative clauses</strong> \u2014 formal English moves the preposition to before the pronoun: <em>\"the country in which she was born\"</em> (formal) vs <em>\"the country that she was born in\"</em> (informal). With <em>which</em> and <em>whom</em> only \u2014 never <em>\"in that\"</em>.</div></div>\n<div class=\"note\"><strong>Omission of the object pronoun:</strong><br>\n<em>\"The book (which/that) I recommended is excellent.\"</em> \u2014 object pronoun can be dropped.<br>\n<em>\"The woman who called is my sister.\"</em> \u2014 subject pronoun CANNOT be dropped.<br>\n<strong>When vs where vs which:</strong> when = times (<em>the day when</em>), where = places (<em>the city where</em>), which/that = things, who/that = people. These are often confused at B2.</div>",table:{headers:["Type","Pronouns","Commas","Notes"],rows:[["Defining","who, which, that, whose, where, when","No","that can replace who/which; object pronoun omissible"],["Non-defining","who, which, whose, where, when","Yes","Never that; which can refer to whole clause"],["Reduced active","participle (-ing)","Depends","Drop who/which + be: who is sitting \u2192 sitting"],["Reduced passive","past participle","Depends","Drop which was + pp: which was written \u2192 written"],["Prep + which/whom","in which, from whom, etc.","Depends","Formal English: moves prep before pronoun"],["Which for whole clause","which","Comma before","She failed, which upset her."]]},examples:[{type:"pos",eng:"The delegates attending the conference came from forty countries.",note:"Reduced active relative \u2014 who were attending \u2192 attending."},{type:"pos",eng:"The report submitted by the committee was highly critical.",note:"Reduced passive relative \u2014 which was submitted \u2192 submitted."},{type:"pos",eng:"The city in which she was born no longer exists.",note:"Formal preposition + which \u2014 more formal than 'the city she was born in'."},{type:"pos",eng:"She won the award, which came as a complete surprise.",note:"Non-defining which referring to the whole previous clause."},{type:"pos",eng:"The issues most relevant to this discussion are covered in chapter three.",note:"Reduced adjective relative \u2014 which are most relevant \u2192 most relevant."},{type:"neg",eng:"There was nobody whose advice she trusted.",note:"Defining whose \u2014 possession in a defining clause."}],errors:[{bad:"The woman sitting by the door, she is my manager.",good:"The woman sitting by the door is my manager.",reason:"Don't add a second subject pronoun after a relative clause."},{bad:"The city in that she grew up is beautiful.",good:"The city in which she grew up is beautiful.",reason:"Preposition + which \u2014 never preposition + that."},{bad:"He won the prize, that was unexpected.",good:"He won the prize, which was unexpected.",reason:"Non-defining clause referring to the whole event \u2014 which, not that."},{bad:"The data presented in the report it supports our findings.",good:"The data presented in the report supports our findings.",reason:"Don't repeat the subject after a reduced relative clause."},{bad:"This is the most relevant issue which it needs addressing.",good:"This is the most relevant issue that needs addressing.",reason:"Don't insert a subject pronoun inside the relative clause."}],realUse:["\"The figures quoted above suggest...\" \u2014 reduced passive in academic writing.","\"Anyone wishing to attend should register in advance.\" \u2014 reduced active in formal notices.","\"The research, much of which remains unpublished, is groundbreaking.\" \u2014 formal non-defining.","\"The town in which he was born has changed beyond recognition.\" \u2014 formal preposition + which."],exercises:[{type:"gap",title:"Reduce the relative clause",sub:"Rewrite the underlined relative clause as a reduced relative.",items:[{answer:"sitting",before:"The man ",after:" by the window is my colleague. (who is sitting)"},{answer:"written",before:"The letter ",after:" by the director arrived this morning. (which was written)"},{answer:"attending",before:"All delegates ",after:" the conference must register. (who are attending)"},{answer:"involved",before:"The companies ",after:" in the merger denied any wrongdoing. (which were involved)"},{answer:"most affected",before:"The communities ",after:" by the flood need urgent help. (which are most affected)"},{answer:"appointed",before:"The new manager ",after:" last month has already made changes. (who was appointed)"}]},{type:"mc",title:"Which relative structure?",sub:"Choose the correct option.",items:[{q:"This is the building _____ the treaty was signed.",opts:["that","which","in which","in that"],answer:"in which",explanation:"Preposition + which for place (formal). Never preposition + that."},{q:"She received an offer _____ she couldn't refuse.",opts:["which","in which","that she","\u2014"],answer:"\u2014",explanation:"Object pronoun can be omitted in defining relative clauses \u2014 the offer (that) she couldn't refuse."},{q:"The CEO resigned, _____ sent shockwaves through the industry.",opts:["that","which","who","whose"],answer:"which",explanation:"Non-defining which referring to the whole previous clause \u2014 CEO resigned."},{q:"The data _____ in the report supports our hypothesis.",opts:["that presented","presented","which it presents","presenting"],answer:"presented",explanation:"Reduced passive relative \u2014 the data (which was) presented."}]},{type:"builder",title:"Combine the sentences",sub:"Combine using the most appropriate relative structure.",items:[{words:["the","research","published","last","year","has","been","widely","cited"],answer:"the research published last year has been widely cited",context:"Reduced passive relative \u2014 which was published."},{words:["she","won","the","award",",","which","surprised","everyone"],answer:"she won the award , which surprised everyone",context:"Non-defining which for whole clause."},{words:["the","country","in","which","she","was","born","no","longer","exists"],answer:"the country in which she was born no longer exists",context:"Formal preposition + which."},{words:["the","delegates","attending","the","summit","represented","fifty","nations"],answer:"the delegates attending the summit represented fifty nations",context:"Reduced active relative \u2014 who were attending."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"The woman who is standing by the door is the director.",keyword:"standing",answer:"The woman standing by the door is the director."},{original:"The report that was submitted by the team was excellent.",keyword:"submitted",answer:"The report submitted by the team was excellent."},{original:"The city that she was born in has changed enormously.",keyword:"in which",answer:"The city in which she was born has changed enormously."},{original:"She passed all her exams. This surprised her family.",keyword:"which",answer:"She passed all her exams, which surprised her family."},{original:"The issues that are most important are covered first.",keyword:"most important",answer:"The most important issues are covered first."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"The woman sitting by the door she is my manager.",correct:"The woman sitting by the door is my manager.",hint:"Don't add a second subject pronoun after a relative clause."},{wrong:"The city in that she grew up is beautiful.",correct:"The city in which she grew up is beautiful.",hint:"Preposition + which \u2014 never preposition + that."},{wrong:"He won the prize, that was unexpected.",correct:"He won the prize, which was unexpected.",hint:"Non-defining clause for whole event \u2014 which, not that."},{wrong:"The data presented in the report it supports our findings.",correct:"The data presented in the report supports our findings.",hint:"Don't repeat the subject after a reduced relative."},{wrong:"This is the most relevant issue which it needs to be addressed.",correct:"This is the most relevant issue that needs to be addressed.",hint:"Don't add subject pronoun inside the relative clause."}]}]},

{id:"gerundsinfinadv",title:"Gerunds and infinitives \u2014 advanced",subtitle:"complex patterns, change of meaning, nominalised gerunds",intro:"Mastering the full range of verb + gerund/infinitive patterns at B2.",desc:"At B1 you learnt the basic verb lists. At B2 the focus shifts to: verbs that change meaning (remember/forget/stop/try/regret/go on), the use of the gerund as a subject or object noun, verbs that take an object + bare infinitive (make, let, see, hear, help), and the pattern after adjectives and nouns.",tip:"The bare infinitive after perception verbs is a common B2 point that trips students up. <em>\"I saw him run\"</em> (bare infinitive \u2014 the whole action) vs <em>\"I saw him running\"</em> (present participle \u2014 the action in progress). Both are correct but mean different things \u2014 seeing the whole event vs catching it mid-action.",explanation:"<p>At B2, the gerund/infinitive system extends to more complex patterns and subtler meaning distinctions.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Verbs with meaning change</strong> \u2014 the most important B2 pairs:<br>\n<em>remember + gerund</em> = recall a past event. <em>remember + infinitive</em> = not forget to do something.<br>\n<em>stop + gerund</em> = quit an activity. <em>stop + infinitive</em> = pause in order to do something.<br>\n<em>try + gerund</em> = experiment with something. <em>try + infinitive</em> = make an effort to do something.<br>\n<em>regret + gerund</em> = feel sorry about a past action. <em>regret + infinitive</em> = formal announcement: \"I regret to inform you...\"<br>\n<em>go on + gerund</em> = continue doing. <em>go on + infinitive</em> = move on to the next thing.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Perception verbs + bare infinitive or -ing</strong>: see, hear, watch, feel, notice, observe + object + bare infinitive (complete action) or + -ing (action in progress).<br>\n<em>\"I saw her leave.\"</em> (she left \u2014 complete) vs <em>\"I saw her leaving.\"</em> (she was in the process of leaving)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Make, let, help + bare infinitive</strong>: causative/permissive verbs take the bare infinitive.<br>\n<em>\"They made us wait.\"</em> / <em>\"She let him speak.\"</em> / <em>\"This helped me understand.\"</em> But in passive: <em>\"We were made to wait.\"</em> (to + infinitive in passive)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Gerund as subject or object noun</strong>: the gerund functions as a noun \u2014 it can be the subject of a sentence or follow a preposition.<br>\n<em>\"Swimming is good exercise.\"</em> / <em>\"Before leaving, check everything.\"</em> / <em>\"The thought of failing terrified her.\"</em></div></div>\n<div class=\"note\"><strong>Would rather + bare infinitive (own preference):</strong> <em>\"I'd rather go alone.\"</em><br>\n<strong>Would rather + past simple (other person):</strong> <em>\"I'd rather you didn't tell her.\"</em> \u2014 past simple signals hypothetical preference about someone else.<br>\n<strong>It's (high) time + past simple:</strong> <em>\"It's time you apologised.\"</em> / <em>\"It's high time the government acted.\"</em> \u2014 past simple signals urgency about present situation.</div>",table:{headers:["Pattern","Example","Note"],rows:[["remember + gerund","I remember meeting her.","Memory of past event"],["remember + infinitive","Remember to lock the door.","Don't forget to do it"],["stop + gerund","She stopped smoking.","Quit the habit"],["stop + infinitive","She stopped to smoke.","Paused in order to smoke"],["try + gerund","Try adding more salt.","Experiment \u2014 see if it helps"],["try + infinitive","I tried to open the door.","Made an effort"],["make + object + bare inf","They made us wait.","Force/compel"],["let + object + bare inf","Let him speak.","Permit"],["perception + bare inf","I saw him leave.","Complete action"],["perception + -ing","I saw him leaving.","Action in progress"]]},examples:[{type:"pos",eng:"I'll never forget meeting her for the first time.",note:"Forget + gerund = memory of past event."},{type:"pos",eng:"Don't forget to bring your passport.",note:"Forget + infinitive = don't fail to do it."},{type:"pos",eng:"He stopped to check his phone.",note:"Stop + infinitive = paused in order to do it."},{type:"pos",eng:"I heard her playing the piano next door.",note:"Perception + -ing = in progress (heard the activity)."},{type:"pos",eng:"I'd rather you didn't mention this to anyone.",note:"Would rather + other person + past simple."},{type:"pos",eng:"It's high time the government took action.",note:"It's high time + past simple \u2014 urgency about the present."}],errors:[{bad:"I remember to meet her at the conference.",good:"I remember meeting her at the conference.",reason:"Memory of a past event \u2192 remember + gerund."},{bad:"They made us to wait for hours.",good:"They made us wait for hours.",reason:"Make + object + bare infinitive \u2014 no to in active form."},{bad:"I saw him to leave the building.",good:"I saw him leave the building.",reason:"Perception verb + object + bare infinitive \u2014 no to."},{bad:"I'd rather you don't tell her.",good:"I'd rather you didn't tell her.",reason:"Would rather + another person = past simple (hypothetical)."},{bad:"It's high time she addresses this issue.",good:"It's high time she addressed this issue.",reason:"It's high time + past simple \u2014 urgency about the present, not present tense."}],realUse:["\"I regret to inform you that your application has been unsuccessful.\" \u2014 formal rejection letter.","\"She went on to become one of the most influential figures in her field.\" \u2014 biographical narrative.","\"What made you decide to apply?\" \u2014 make in question form.","\"I'd rather not say.\" \u2014 polite refusal."],richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Meaning-change verb pairs</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">remember + -ing</div><div class=\"meaning-box-eg\">\"I remember meeting her.\"</div><div class=\"meaning-box-note\">Memory of a past event</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">remember + to</div><div class=\"meaning-box-eg\">\"Remember to lock up.\"</div><div class=\"meaning-box-note\">Don't forget to do it</div></div>\n</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">stop + -ing</div><div class=\"meaning-box-eg\">\"He stopped smoking.\"</div><div class=\"meaning-box-note\">Quit the habit</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">stop + to</div><div class=\"meaning-box-eg\">\"He stopped to smoke.\"</div><div class=\"meaning-box-note\">Paused in order to smoke</div></div>\n</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">try + -ing</div><div class=\"meaning-box-eg\">\"Try adding garlic.\"</div><div class=\"meaning-box-note\">Experiment \u2014 see if it helps</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">try + to</div><div class=\"meaning-box-eg\">\"I tried to open it.\"</div><div class=\"meaning-box-note\">Made an effort (may have failed)</div></div>\n</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">regret + -ing</div><div class=\"meaning-box-eg\">\"I regret saying that.\"</div><div class=\"meaning-box-note\">Feel sorry about a past action</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">regret + to</div><div class=\"meaning-box-eg\">\"I regret to inform you...\"</div><div class=\"meaning-box-note\">Formal announcement \u2014 present action</div></div>\n</div>\n<div class=\"meaning-pair\">\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">go on + -ing</div><div class=\"meaning-box-eg\">\"She went on talking.\"</div><div class=\"meaning-box-note\">Continue doing the same thing</div></div>\n<div class=\"meaning-box\"><div class=\"meaning-box-head\">go on + to</div><div class=\"meaning-box-eg\">\"She went on to become director.\"</div><div class=\"meaning-box-note\">Move on to a new activity</div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Special patterns</div>\n<table class=\"rich-table\"><thead><tr><th>Pattern</th><th>Form</th><th>Example</th></tr></thead><tbody>\n<tr><td>Perception verbs (see, hear, watch, feel) + complete action</td><td>+ object + bare infinitive</td><td><em>\"I saw her leave.\"</em> \u2014 the whole event</td></tr>\n<tr><td>Perception verbs + action in progress</td><td>+ object + -ing</td><td><em>\"I saw her leaving.\"</em> \u2014 caught mid-action</td></tr>\n<tr><td>make + object</td><td>+ bare infinitive</td><td><em>\"They made us wait.\"</em> (passive: <em>were made to wait</em>)</td></tr>\n<tr><td>let + object</td><td>+ bare infinitive</td><td><em>\"Let him speak.\"</em></td></tr>\n<tr><td>would rather (self)</td><td>+ bare infinitive</td><td><em>\"I'd rather go alone.\"</em></td></tr>\n<tr><td>would rather (other person)</td><td>+ past simple</td><td><em>\"I'd rather you didn't mention it.\"</em></td></tr>\n<tr><td>it's (high) time</td><td>+ past simple</td><td><em>\"It's time you apologised.\"</em></td></tr>\n</tbody></table>\n</div>",exercises:[{type:"gap",title:"Gerund or infinitive \u2014 meaning change",sub:"Fill each gap with the gerund or infinitive. The meaning matters.",items:[{answer:"to lock",before:"Did you remember ",after:" the door? (don't forget to do it)"},{answer:"meeting",before:"I'll never forget ",after:" her for the first time. (memory of past event)"},{answer:"smoking",before:"He stopped ",after:" ten years ago. (quit the habit)"},{answer:"to buy",before:"She stopped ",after:" flowers on the way home. (paused in order to)"},{answer:"adding",before:"Try ",after:" more garlic \u2014 it might improve the flavour. (experiment)"},{answer:"to contact",before:"I tried ",after:" her but the line was busy. (attempt)"},{answer:"to inform",before:"I regret ",after:" you that the position has been filled. (formal announcement)"},{answer:"working",before:"He went on ",after:" for the same company for twenty years. (continue)"}]},{type:"mc",title:"Perception verbs and make/let",sub:"Choose the correct form.",items:[{q:"I heard her _____ the front door \u2014 she must have arrived.",opts:["to close","closing","close","closed"],answer:"close",explanation:"Heard + object + bare infinitive = the complete action. Also: closing would suggest you heard it in progress."},{q:"They made us _____ for three hours before the interview.",opts:["to wait","waiting","wait","waited"],answer:"wait",explanation:"Make + object + bare infinitive \u2014 no to in active. (In passive: were made to wait.)"},{q:"I'd rather you _____ anyone about this.",opts:["don't tell","didn't tell","not tell","won't tell"],answer:"didn't tell",explanation:"Would rather + other person = past simple to express hypothetical preference."},{q:"It's high time she _____ the situation.",opts:["addresses","has addressed","addressed","to address"],answer:"addressed",explanation:"It's high time + past simple \u2014 urgency about present situation."}]},{type:"tf",title:"True, False, or Not given",sub:"Is the statement true, false, or not given?",items:[{context:"I saw her leave the building at five.",statement:"I watched her whole departure from the building.",answer:"True",explanation:"Bare infinitive = complete action. I saw the whole event of her leaving."},{context:"I saw her leaving the building.",statement:"She had already left when I saw her.",answer:"False",explanation:"-ing form = action in progress. I caught the act of her leaving \u2014 she was in the process."},{context:"He tried calling her several times.",statement:"He was unable to call her.",answer:"False",explanation:"Try + gerund = experiment/attempt. He did call \u2014 the calls just didn't succeed. Try + infinitive would suggest the attempt itself was difficult."},{context:"It's time you apologised.",statement:"The speaker believes an apology is overdue.",answer:"True",explanation:"It's time + past simple signals that something should already have happened \u2014 it's overdue."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"I have a memory of meeting him at a conference.",keyword:"remember",answer:"I remember meeting him at a conference."},{original:"They forced us to sign the document.",keyword:"made",answer:"They made us sign the document."},{original:"My preference is that you don't mention this.",keyword:"rather",answer:"I'd rather you didn't mention this."},{original:"An apology is overdue \u2014 it should have happened already.",keyword:"time",answer:"It's high time you apologised."},{original:"She paused what she was doing and answered the phone.",keyword:"stopped",answer:"She stopped to answer the phone."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I remember to meet her at the conference.",correct:"I remember meeting her at the conference.",hint:"Memory of past event \u2192 gerund."},{wrong:"They made us to wait for an hour.",correct:"They made us wait for an hour.",hint:"Make + object + bare infinitive \u2014 no to."},{wrong:"I saw him to leave the building.",correct:"I saw him leave the building.",hint:"Perception verb + bare infinitive."},{wrong:"I'd rather you don't tell her.",correct:"I'd rather you didn't tell her.",hint:"Would rather + other person = past simple."},{wrong:"It's high time she addresses this issue.",correct:"It's high time she addressed this issue.",hint:"It's high time + past simple."}]}]},

{id:"wishb2",title:"Wish, if only & it's time",subtitle:"I wish I had, if only she hadn't, it's time you did",intro:"Expressing regret, dissatisfaction, and urgency \u2014 the full picture.",desc:"At B1 you learnt the core wish structures. At B2 we extend to the full system including wish + would for external irritation, wish + could, if only for emphasis, and the it's time / it's high time structure which triggers the past simple to express urgency.",tip:"The subtle distinctions at B2: <em>\"I wish I were taller\"</em> (permanent state \u2014 I can't change it) vs <em>\"I wish you would stop\"</em> (behaviour \u2014 I want it to change). The would form is for things that CAN change but are frustrating. Never <em>\"I wish I would\"</em> for your own situation \u2014 that requires past simple.",explanation:"<p>The full wish/if only/it's time system at B2.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Wish/if only + past simple</strong> \u2014 dissatisfaction with the present; desire for things to be different now. <em>\"I wish I spoke Italian.\"</em> / <em>\"If only I had more time!\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Wish/if only + past perfect</strong> \u2014 regret about a past action or situation that cannot be changed. <em>\"I wish I had taken that opportunity.\"</em> / <em>\"If only she hadn't said that.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Wish + would</strong> \u2014 frustration about someone else's current behaviour, or desire for an external change. Can also express a wish for something to happen. <em>\"I wish he would stop interrupting.\"</em> / <em>\"I wish it would stop raining.\"</em> Never with the same subject: not <em>\"I wish I would...\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>It's time / it's high time + past simple</strong> \u2014 expressing that something is overdue and should happen now. The past simple signals urgency about the present, not past meaning. <em>\"It's time you made a decision.\"</em> / <em>\"It's high time the government acted.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">5</div><div class=\"rule-text\"><strong>Would rather + bare infinitive</strong> (own preference) vs <strong>would rather + past simple</strong> (preference about someone else). <em>\"I'd rather go alone.\"</em> vs <em>\"I'd rather you came with me.\"</em></div></div>\n<div class=\"note\"><strong>Were vs was after wish:</strong> Formally, <em>were</em> is preferred: <em>\"I wish I were taller.\"</em> In informal speech, <em>was</em> is very common and widely accepted. In formal exams, <em>were</em> is preferred.<br>\n<strong>If only vs I wish:</strong> Same grammar, but <em>if only</em> expresses stronger emotion \u2014 longing, frustration, or regret. <em>I wish</em> can be more neutral.<br>\n<strong>How I wish vs I wish:</strong> <em>\"How I wish I could see her again!\"</em> \u2014 emphatic, literary or emotional register.</div>",table:{headers:["Structure","Use","Example"],rows:[["wish/if only + past simple","Present dissatisfaction","I wish I lived closer."],["wish/if only + past perfect","Past regret","If only I had applied earlier."],["wish + would","Frustration about others' behaviour","I wish you would listen."],["wish + could","Wishing for an ability","I wish I could play the piano."],["it's time + past simple","Something is overdue \u2014 urgency","It's time you made a decision."],["it's high time + past simple","More urgent/emphatic","It's high time this changed."],["would rather + bare inf (self)","Personal preference","I'd rather stay in tonight."],["would rather + past simple (other)","Preference about another person","I'd rather you didn't mention it."]]},examples:[{type:"pos",eng:"If only I had accepted the offer when I had the chance.",note:"Past regret about a decision \u2014 if only + past perfect."},{type:"pos",eng:"I wish people would be more considerate on public transport.",note:"Frustration about general behaviour \u2014 wish + would."},{type:"pos",eng:"It's high time this country invested in its infrastructure.",note:"Strong urgency \u2014 it's high time + past simple."},{type:"pos",eng:"I'd rather you didn't bring it up at dinner.",note:"Preference about someone else's behaviour \u2014 would rather + past simple."},{type:"pos",eng:"If only she were here \u2014 she'd know what to do.",note:"Present wish about someone's absence."},{type:"neg",eng:"I wish I hadn't sent that message \u2014 it came out wrong.",note:"Regret about a past action."}],errors:[{bad:"I wish I would be taller.",good:"I wish I were taller.",reason:"Same subject \u2014 use past simple (were), not would. Would is only for other people's behaviour."},{bad:"It's time you will apologise.",good:"It's time you apologised.",reason:"It's time + past simple \u2014 never future/will."},{bad:"I'd rather you don't tell her.",good:"I'd rather you didn't tell her.",reason:"Would rather + another person = past simple (hypothetical preference)."},{bad:"If only I didn't say that.",good:"If only I hadn't said that.",reason:"Regret about a past action \u2192 if only + past perfect."},{bad:"I wish it stops raining.",good:"I wish it would stop raining.",reason:"Desire for an external change \u2192 wish + would."}],realUse:["\"If only I'd listened to her \u2014 she was right all along.\" \u2014 narrative regret.","\"I wish this country would get its act together.\" \u2014 social/political frustration.","\"It's high time we had this conversation.\" \u2014 initiating a difficult discussion.","\"I'd rather not go into the details.\" \u2014 polite avoidance."],exercises:[{type:"gap",title:"Wish, if only, it's time",sub:"Fill each gap with the correct form.",items:[{answer:"spoke",before:"I wish I ",after:" better French. (present dissatisfaction \u2014 speak)"},{answer:"hadn't said",before:"If only I ",after:" that \u2014 it was so cruel. (past regret \u2014 say)"},{answer:"would stop",before:"I wish he ",after:" talking so loudly. (frustration \u2014 stop)"},{answer:"had taken",before:"I wish I ",after:" that job when I had the chance. (past regret \u2014 take)"},{answer:"made",before:"It's time you ",after:" a decision. (overdue \u2014 make)"},{answer:"didn't",before:"I'd rather you ",after:" come. (preference about other \u2014 negative)"},{answer:"could afford",before:"I wish I ",after:" a longer holiday. (ability wish \u2014 afford)"},{answer:"acted",before:"It's high time the government ",after:" on this issue. (urgency \u2014 act)"}]},{type:"mc",title:"Which structure?",sub:"Choose the correct form.",items:[{q:"I wish I _____ \u2014 it would be so useful.",opts:["could drive","can drive","would drive","drove"],answer:"could drive",explanation:"Wish for an ability you don't have \u2192 wish + could."},{q:"I wish you _____ your phone during dinner!",opts:["didn't check","don't check","wouldn't check","hadn't checked"],answer:"wouldn't check",explanation:"Frustration about ongoing behaviour \u2192 wish + would (negative)."},{q:"It's high time she _____ the truth.",opts:["tells","told","will tell","has told"],answer:"told",explanation:"It's high time + past simple \u2014 urgency/overdue."},{q:"If only we _____ the contract earlier.",opts:["read","have read","had read","would read"],answer:"had read",explanation:"Regret about past action \u2192 if only + past perfect."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using wish, if only, it's time, or would rather.",lines:[{speaker:"A",text:"I [wish] this project [were] over. I'm exhausted."},{speaker:"B",text:"I know. [If only] we [had started] earlier \u2014 we wouldn't be in this mess."},{speaker:"A",text:"I [wish] the client [would] stop changing their mind."},{speaker:"B",text:"Agreed. It's [time] we [had] a serious conversation with them."},{speaker:"A",text:"I'd [rather] you [did] that \u2014 you're better at difficult conversations."},{speaker:"B",text:"Fine. [If only] I [had] your optimism \u2014 I'm dreading it."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"I don't speak Arabic and I'd love to.",keyword:"wish",answer:"I wish I spoke Arabic."},{original:"You keep interrupting \u2014 please stop.",keyword:"wish",answer:"I wish you would stop interrupting."},{original:"A decision is long overdue.",keyword:"time",answer:"It's high time a decision was made."},{original:"My preference is that you don't bring this up.",keyword:"rather",answer:"I'd rather you didn't bring this up."},{original:"I regret not taking that opportunity.",keyword:"only",answer:"If only I had taken that opportunity."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I wish I would be taller.",correct:"I wish I were taller.",hint:"Same subject \u2014 past simple (were), not would."},{wrong:"It's time you will apologise.",correct:"It's time you apologised.",hint:"It's time + past simple \u2014 never will."},{wrong:"I'd rather you don't tell her.",correct:"I'd rather you didn't tell her.",hint:"Would rather + another person = past simple."},{wrong:"If only I didn't say that.",correct:"If only I hadn't said that.",hint:"Past regret \u2192 past perfect."},{wrong:"I wish the rain would stop. I wish I would have an umbrella.",correct:"I wish the rain would stop. I wish I had an umbrella.",hint:"Second wish: same subject \u2014 past simple for own situation."}]}]},

{id:"inversion",title:"Inversion for emphasis",subtitle:"Never have I, Not only did she, Hardly had they",intro:"Moving the auxiliary before the subject for dramatic emphasis and formal style.",desc:"Inversion takes the word order of questions and applies it to statements for emphasis. It is a hallmark of formal and literary English and appears constantly in B2/C1 texts \u2014 newspaper editorials, formal speeches, and academic writing. Recognising it is as important as producing it.",tip:"The pattern is always triggered by a negative or restrictive expression at the start. The rule: bring the auxiliary to the front. If there is no auxiliary, use do/does/did. The main verb stays in its normal position. Students often write the inverted auxiliary and then continue with normal statement word order \u2014 the inversion must apply to the entire auxiliary.",explanation:"<p>Inversion places an auxiliary verb before the subject to create emphasis or a formal register. It is triggered by negative or restrictive adverbials at the start of a clause.</p>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Never, rarely, seldom, barely, hardly, scarcely</strong> \u2014 negative frequency adverbs. <em>\"Never have I seen such courage.\"</em> / <em>\"Rarely does she make a mistake.\"</em> / <em>\"Hardly had she arrived when the trouble started.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Not only... but also, not until, not since, no sooner... than</strong> \u2014 restrictive negatives. <em>\"Not only did she pass, but she also came top.\"</em> / <em>\"Not until I read the report did I understand the scale of the problem.\"</em> / <em>\"No sooner had he sat down than the phone rang.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>Only after, only when, only by, only then</strong> \u2014 restrictive only-phrases. <em>\"Only after the meeting did she realise what had happened.\"</em> / <em>\"Only by working together can we solve this.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">\u00b7</div><div class=\"rule-text\"><strong>So/such... that</strong> with inversion: <em>\"So difficult was the task that many gave up.\"</em> / <em>\"Such was the scale of the disaster that international help was needed.\"</em></div></div>\n<div class=\"note\"><strong>How to form inversion:</strong><br>\n1. Move the negative/restrictive expression to the front.<br>\n2. Move the auxiliary (be, have, do, modal) before the subject.<br>\n3. If no auxiliary exists, add do/does/did.<br>\n<em>Normal: \"I have never seen anything like it.\"</em><br>\n<em>Inverted: \"Never have I seen anything like it.\"</em><br>\n<strong>Inversion does NOT apply in indirect/embedded clauses</strong>: <em>\"I didn't realise how rarely she made mistakes.\"</em> \u2014 no inversion after how.</div>",table:{headers:["Trigger","Normal word order","Inverted","Notes"],rows:[["Never","I have never seen...","Never have I seen...","Have moves before I"],["Rarely/Seldom","She rarely makes...","Rarely does she make...","Add does \u2014 no auxiliary"],["Hardly...when","She had hardly arrived when...","Hardly had she arrived when...","Had moves before she"],["No sooner...than","He had no sooner sat down than...","No sooner had he sat down than...","Had moves before he"],["Not only...but","She not only passed but also...","Not only did she pass but she also...","Add did \u2014 no auxiliary"],["Only after","She only realised after the meeting.","Only after the meeting did she realise.","Did moves before she"],["So + adj","The task was so difficult that...","So difficult was the task that...","Was moves before the task"]]},examples:[{type:"pos",eng:"Never have I encountered such professional dedication.",note:"Never + have + subject \u2014 formal/emphatic."},{type:"pos",eng:"Not only did she complete the project on time, but she also came in under budget.",note:"Not only did \u2014 both clauses get inversion in the first clause."},{type:"pos",eng:"Hardly had the meeting started when a fire alarm went off.",note:"Hardly...when \u2014 both parts of the structure needed."},{type:"pos",eng:"Only by collaborating closely can the two teams achieve this.",note:"Only by + gerund \u2014 inversion with modal."},{type:"pos",eng:"So severe was the drought that entire regions faced famine.",note:"So + adjective + was \u2014 dramatic effect."},{type:"neg",eng:"Not until she read the letter did she understand his intentions.",note:"Not until \u2014 inversion on the main clause, not the until clause."}],errors:[{bad:"Never I have seen such dedication.",good:"Never have I seen such dedication.",reason:"Inversion: auxiliary (have) must come before subject (I)."},{bad:"Not only she passed but also won a scholarship.",good:"Not only did she pass but she also won a scholarship.",reason:"Not only triggers inversion \u2014 did before she. Also: second clause needs its own subject."},{bad:"Hardly she had arrived when the trouble started.",good:"Hardly had she arrived when the trouble started.",reason:"Inversion: had must come before she."},{bad:"Only after she left, I realised the truth.",good:"Only after she left did I realise the truth.",reason:"Only after triggers inversion in the main clause \u2014 did before I."},{bad:"So the problem was complex that nobody could solve it.",good:"So complex was the problem that nobody could solve it.",reason:"So + adjective + was \u2014 the adjective comes first, then was."}],realUse:["\"So great was her relief that she wept.\" \u2014 literary/narrative climax.","\"Not since the 1930s has unemployment been so high.\" \u2014 journalistic.","\"Rarely, if ever, does this species venture beyond its habitat.\" \u2014 scientific writing.","\"No sooner had one crisis passed than another arose.\" \u2014 formal narrative."],richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Inversion triggers \u2192 structures</div>\n<table class=\"rich-table\"><thead><tr><th>Trigger</th><th>Inverted structure</th><th>Example</th></tr></thead><tbody>\n<tr><td>Never</td><td>Never + have/has/had + subject + pp</td><td><em>\"Never have I seen such courage.\"</em></td></tr>\n<tr><td>Rarely / seldom / barely</td><td>Rarely/Seldom + do/does/did + subject + base verb</td><td><em>\"Rarely does she make a mistake.\"</em></td></tr>\n<tr><td>Hardly / scarcely... when</td><td>Hardly/Scarcely + had + subject + pp + when</td><td><em>\"Hardly had she arrived when the trouble started.\"</em></td></tr>\n<tr><td>No sooner... than</td><td>No sooner + had + subject + pp + than</td><td><em>\"No sooner had he sat down than the phone rang.\"</em></td></tr>\n<tr><td>Not only... but also</td><td>Not only + did + subject + base verb</td><td><em>\"Not only did she pass, but she also came top.\"</em></td></tr>\n<tr><td>Not until</td><td>Not until [clause/phrase] + did/was + subject</td><td><em>\"Not until I read it did I understand.\"</em></td></tr>\n<tr><td>Only after / only when / only by</td><td>Only [phrase] + did/can + subject</td><td><em>\"Only after the meeting did she realise.\"</em></td></tr>\n<tr><td>So + adjective</td><td>So + adj + was/were + subject + that</td><td><em>\"So difficult was the task that many gave up.\"</em></td></tr>\n<tr><td>Such was</td><td>Such was + noun + that</td><td><em>\"Such was the chaos that no one knew what to do.\"</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Before \u2192 after: inversion in action</div>\n<div class=\"transform-demo\">\n<div class=\"transform-demo-row\"><div class=\"tdl\">I have never seen anything like it.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">Never have I seen anything like it.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">She not only passed but also won the prize.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">Not only did she pass, but she also won the prize.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">He had no sooner arrived than it started to rain.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">No sooner had he arrived than it started to rain.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">The problem was so complex that no solution was found.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">So complex was the problem that no solution was found.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">She only understood after reading the report.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">Only after reading the report did she understand.</div></div>\n</div>\n</div>",exercises:[{type:"gap",title:"Form the inversion",sub:"Rewrite each sentence beginning with the word or phrase given.",items:[{answer:"Never have I read",before:"I have never read such a gripping novel. \u2192 ",after:" such a gripping novel."},{answer:"Rarely does she make",before:"She rarely makes spelling errors. \u2192 ",after:" spelling errors."},{answer:"Not only did he apologise",before:"He not only apologised but also offered compensation. \u2192 ",after:" but he also offered compensation."},{answer:"Hardly had the ceremony begun",before:"The ceremony had hardly begun when it started to rain. \u2192 ",after:" when it started to rain."},{answer:"Only after reading the report",before:"She only understood the scale after reading the report. \u2192 ",after:" did she understand the scale."},{answer:"So complex was the problem",before:"The problem was so complex that no single solution existed. \u2192 ",after:" that no single solution existed."}]},{type:"mc",title:"Which is correct?",sub:"Choose the correctly inverted sentence.",items:[{q:"Normal: 'I had rarely felt so nervous.' Inverted:",opts:["Rarely I had felt so nervous.","Rarely had I felt so nervous.","Rarely I felt so nervous.","Rarely did I had felt so nervous."],answer:"Rarely had I felt so nervous.",explanation:"Rarely + auxiliary (had) + subject (I) \u2014 past perfect here."},{q:"Normal: 'She not only passed the exam but also broke the record.' Inverted:",opts:["Not only she passed the exam but also broke the record.","Not only did she pass the exam but she also broke the record.","Not only passed she the exam but also broke the record.","Not only has she passed the exam but also broke the record."],answer:"Not only did she pass the exam but she also broke the record.",explanation:"Not only + did (add auxiliary) + she + base form. Also no inversion in the but also clause."},{q:"Normal: 'We had no sooner arrived than it began to rain.' Inverted:",opts:["No sooner we had arrived than it began to rain.","No sooner had we arrived than it began to rain.","No sooner did we arrive than it began to rain.","No sooner we arrived than it began to rain."],answer:"No sooner had we arrived than it began to rain.",explanation:"No sooner + had (auxiliary) + we \u2014 past perfect. Both correct options work but had arrived is more formal."},{q:"'Only by _____ can we address this crisis.'",opts:["working together can","we working together","working together we","working together do we"],answer:"working together can",explanation:"Only by + gerund + auxiliary + subject \u2014 only by working together can we."}]},{type:"builder",title:"Build the inverted sentence",sub:"Put the words in the correct order.",items:[{words:["never","have","I","encountered","such","hostility"],answer:"never have I encountered such hostility",context:"Never + have + I."},{words:["not","only","did","she","refuse","but","she","also","complained"],answer:"not only did she refuse but she also complained",context:"Not only did + subject + base verb."},{words:["so","exhausted","was","he","that","he","fell","asleep","immediately"],answer:"so exhausted was he that he fell asleep immediately",context:"So + adjective + was + subject + that."},{words:["only","after","the","meeting","did","we","understand","the","implications"],answer:"only after the meeting did we understand the implications",context:"Only after + noun + did + subject."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite each sentence beginning with the inverted form using the keyword.",items:[{original:"I have never encountered such rudeness.",keyword:"Never",answer:"Never have I encountered such rudeness."},{original:"She not only apologised but also offered to pay.",keyword:"Not only",answer:"Not only did she apologise but she also offered to pay."},{original:"The delegates had no sooner arrived than the talks collapsed.",keyword:"No sooner",answer:"No sooner had the delegates arrived than the talks collapsed."},{original:"She only realised the truth after reading the letter.",keyword:"Only after",answer:"Only after reading the letter did she realise the truth."},{original:"The problem was so complex that no solution was found.",keyword:"So",answer:"So complex was the problem that no solution was found."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Never I have seen such dedication.",correct:"Never have I seen such dedication.",hint:"Inversion: auxiliary before subject \u2014 have before I."},{wrong:"Not only she passed but also won a scholarship.",correct:"Not only did she pass but she also won a scholarship.",hint:"Not only triggers inversion \u2014 did before she."},{wrong:"Hardly she had arrived when the trouble started.",correct:"Hardly had she arrived when the trouble started.",hint:"Inversion: had before she."},{wrong:"Only after she left, I realised the truth.",correct:"Only after she left did I realise the truth.",hint:"Only after triggers inversion \u2014 did before I."},{wrong:"So the problem was complex that nobody could solve it.",correct:"So complex was the problem that nobody could solve it.",hint:"So + adjective + was \u2014 adjective comes first."}]}]},

{id:"cleft",title:"Cleft sentences",subtitle:"It was John who called, What I need is rest",intro:"Splitting a sentence to put special emphasis on one part.",desc:"Cleft sentences take a simple idea and restructure it to place strong emphasis on one specific element. They are common in speech and formal writing, and they show sophisticated command of English syntax.",tip:"The name comes from the Latin for 'split' \u2014 you take a normal sentence and cleave it in two, inserting a focusing structure. Students often know clefts passively (can understand them) but don't produce them actively. At B2 the target is confident production in both speaking and writing.",explanation:"<p>Cleft sentences split a normal sentence to emphasise one particular element. There are two main types.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>It-cleft: It + be + emphasised element + relative clause.</strong><br>\n<em>\"It was John who called.\"</em> (not someone else \u2014 John specifically)<br>\n<em>\"It was yesterday that I saw her.\"</em> (not today or last week)<br>\n<em>\"It was the noise that woke me.\"</em> (not light or a smell)<br>\nThe emphasised element can be a person (who), thing (that/which), time (that/when), or place (that/where).</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Wh-cleft (pseudo-cleft): What/All + subject + verb + be + emphasis.</strong><br>\n<em>\"What I need is a long holiday.\"</em> / <em>\"What surprised me was her reaction.\"</em> / <em>\"All I want is a cup of tea.\"</em><br>\nThe <em>what</em> clause acts as the subject \u2014 followed by <em>be</em> + the new information.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Reverse wh-cleft:</strong> Emphasis + be + what/who + subject + verb.<br>\n<em>\"A long holiday is what I need.\"</em> / <em>\"Her reaction was what surprised me.\"</em> \u2014 same meaning as wh-cleft but reversed for stylistic variation.</div></div>\n<div class=\"note\"><strong>When to use clefts:</strong> to correct a misunderstanding (<em>\"No, it was Tuesday that we met, not Wednesday\"</em>), to highlight new/unexpected information, or to add rhetorical emphasis in formal speech or writing.<br>\n<strong>Register note:</strong> It-clefts are used in both formal and informal contexts. Wh-clefts feel slightly more formal and are very common in academic writing: <em>\"What this study demonstrates is that...\"</em></div>",table:{headers:["Type","Structure","Example"],rows:[["It-cleft","It + be + focus + relative clause","It was Maria who found the solution."],["It-cleft (time)","It + be + time expression + that","It was in 2019 that everything changed."],["Wh-cleft","What + S + V + be + focus","What I need is a long break."],["All-cleft","All + S + V + be + focus","All I want is the truth."],["Reverse wh-cleft","Focus + be + what + S + V","The truth is what I want."],["It-cleft (negative)","It + wasn't/isn't + focus + that","It wasn't the money that motivated her."]]},examples:[{type:"pos",eng:"It was the discovery of penicillin that transformed modern medicine.",note:"It-cleft emphasising cause \u2014 the discovery, not anything else."},{type:"pos",eng:"What this research shows is that early intervention makes a significant difference.",note:"Wh-cleft \u2014 common in academic writing."},{type:"pos",eng:"All she wanted was to be left alone.",note:"All-cleft \u2014 emphasises limitation/exclusivity."},{type:"pos",eng:"It wasn't the result that surprised us \u2014 it was the scale of it.",note:"Negative it-cleft for contrast."},{type:"pos",eng:"What I find most impressive is her consistency.",note:"Wh-cleft \u2014 highlighting opinion."},{type:"pos",eng:"It was only after years of research that the connection was established.",note:"It-cleft with time expression."}],errors:[{bad:"It was John that he called.",good:"It was John who called.",reason:"It-cleft with a person: who (not that he) \u2014 the subject form is needed."},{bad:"What I need it is a long holiday.",good:"What I need is a long holiday.",reason:"Wh-cleft: no extra pronoun (it) before is."},{bad:"It was yesterday when I saw her.",good:"It was yesterday that I saw her.",reason:"It-cleft with time: that (not when) in standard it-cleft."},{bad:"All what she wanted was to be left alone.",good:"All she wanted was to be left alone.",reason:"All-cleft does not need what \u2014 All + subject + verb + be + focus."}],realUse:["\"What this means for the future is unclear.\" \u2014 academic hedging.","\"It's not what you say but how you say it.\" \u2014 proverbial wh-cleft.","\"It was precisely this ambiguity that gave rise to the problem.\" \u2014 formal analysis.","\"All I'm asking for is a little respect.\" \u2014 emotional plea, very natural spoken English."],richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Cleft sentence types</div>\n<table class=\"rich-table\"><thead><tr><th>Type</th><th>Structure</th><th>Example</th></tr></thead><tbody>\n<tr><td>It-cleft (person)</td><td>It + was + focus + who + clause</td><td><em>\"It was Maria who found the solution.\"</em></td></tr>\n<tr><td>It-cleft (thing)</td><td>It + was + focus + that + clause</td><td><em>\"It was the noise that woke me.\"</em></td></tr>\n<tr><td>It-cleft (time/place)</td><td>It + was + time/place + that + clause</td><td><em>\"It was in 2019 that everything changed.\"</em></td></tr>\n<tr><td>Negative it-cleft</td><td>It + wasn't + focus + that + clause</td><td><em>\"It wasn't the money that motivated her.\"</em></td></tr>\n<tr><td>Wh-cleft</td><td>What + subject + verb + be + focus</td><td><em>\"What I need is a long holiday.\"</em></td></tr>\n<tr><td>All-cleft</td><td>All + subject + verb + be + focus</td><td><em>\"All she wanted was the truth.\"</em></td></tr>\n<tr><td>Reverse wh-cleft</td><td>Focus + be + what + subject + verb</td><td><em>\"A long holiday is what I need.\"</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Before \u2192 after: cleft in action</div>\n<div class=\"transform-demo\">\n<div class=\"transform-demo-row\"><div class=\"tdl\">Maria found the solution. (emphasise Maria)</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">It was Maria who found the solution.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">The noise woke me. (emphasise the noise)</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">It was the noise that woke me.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">I find her dedication most impressive.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">What I find most impressive is her dedication.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">She only wanted the truth.</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">All she wanted was the truth.</div></div>\n<div class=\"transform-demo-row\"><div class=\"tdl\">The company was founded in 2019. (emphasise 2019)</div><div class=\"tdarrow\">\u2192</div><div class=\"tdr\">It was in 2019 that the company was founded.</div></div>\n</div>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">\u26a0 Common errors</div>\n<table class=\"rich-table\"><tbody>\n<tr><td>It was John <strong>who</strong> called \u2713</td><td>Person in subject position \u2192 <strong>who</strong>, not that</td></tr>\n<tr><td>What I need <strong>is</strong> rest \u2713 \u2014 NOT <em>\"What I need it is rest\"</em></td><td>No extra pronoun before be in wh-cleft</td></tr>\n<tr><td>All she wanted <strong>was</strong> the truth \u2713 \u2014 NOT <em>\"All what she wanted\"</em></td><td>No what after All</td></tr>\n<tr><td>It was yesterday <strong>that</strong> I saw her \u2713 \u2014 NOT <em>\"when\"</em></td><td>Time expressions in it-clefts \u2192 that</td></tr>\n</tbody></table>\n</div>",exercises:[{type:"gap",title:"Form the cleft sentence",sub:"Rewrite using the cleft structure indicated in brackets.",items:[{answer:"It was Maria who discovered the error.",before:"Maria discovered the error. \u2192 ",after:"(It-cleft \u2014 emphasise Maria)"},{answer:"It was in 2019 that the company was founded.",before:"The company was founded in 2019. \u2192 ",after:"(It-cleft \u2014 emphasise the time)"},{answer:"What I find most impressive is her dedication.",before:"I find her dedication most impressive. \u2192 ",after:"(Wh-cleft)"},{answer:"All they wanted was a fair hearing.",before:"They only wanted a fair hearing. \u2192 ",after:"(All-cleft)"},{answer:"It wasn't the cost that bothered me \u2014 it was the principle.",before:"The principle bothered me, not the cost. \u2192 ",after:"(Negative it-cleft)"},{answer:"What this research demonstrates is that diet affects cognition.",before:"This research demonstrates that diet affects cognition. \u2192 ",after:"(Wh-cleft \u2014 academic)"}]},{type:"mc",title:"Which cleft structure?",sub:"Choose the correct cleft sentence.",items:[{q:"Emphasise 'the noise' in: 'The noise woke me.'",opts:["It was the noise that woke me.","It was the noise who woke me.","What woke me it was the noise.","It was the noise woke me."],answer:"It was the noise that woke me.",explanation:"It-cleft with a thing: It + was + the noise + that + verb."},{q:"'I find her persistence most admirable.' (wh-cleft)",opts:["It is her persistence that I find most admirable.","What I find most admirable is her persistence.","Her persistence is that I find admirable.","What is her persistence that I find admirable."],answer:"What I find most admirable is her persistence.",explanation:"Wh-cleft: What + subject + verb + be + emphasis."},{q:"'She only wanted the truth.' (all-cleft)",opts:["It was the truth that she wanted.","What she wanted all was the truth.","All she wanted was the truth.","All what she wanted was the truth."],answer:"All she wanted was the truth.",explanation:"All-cleft: All + subject +
