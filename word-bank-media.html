<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media &amp; News — Word Bank — John + English</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#2176FF;--sky-light:#E8EEFF;--sea:#1DD3B0;--sea-light:#E4FBF7;
  --coral:#FF6B6B;--coral-light:#FFE8E8;--lavender:#9B72CF;--lavender-light:#F0E8FA;
  --cream:#F7F6F3;--ink:#2D3047;--muted:#7A7D8E;--border:#E8E5DF;--card:#fff;
  --radius:14px;--radius-sm:10px;
  --shadow-sm:0 1px 3px rgba(45,48,71,.06);--shadow-md:0 4px 14px rgba(45,48,71,.08);
  --accent:#E07A5F;--accent-light:#FCEEE9;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:28px 28px;opacity:.4;pointer-events:none;z-index:0}
.topnav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(247,246,243,.88);backdrop-filter:blur(16px);border-bottom:1.5px solid var(--border);height:52px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-.02em;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--sky)}
.topnav-links{display:flex;gap:1.2rem;align-items:center}
.topnav-links a{font-size:.85rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .2s}
.topnav-links a:hover{color:var(--sky)}
.page-header{padding:5.5rem 2rem 1.5rem;max-width:900px;margin:0 auto;position:relative;z-index:1}
.back-link{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:1.2rem;transition:color .2s}
.back-link:hover{color:var(--sky)}
.back-link svg{width:14px;height:14px}
.topic-hero{display:flex;align-items:flex-start;gap:1.2rem}
.topic-icon{width:52px;height:52px;border-radius:12px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topic-icon svg{width:24px;height:24px;stroke-width:1.8;fill:none;stroke:currentColor}
.section-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.3rem}
.page-header h1{font-family:'Outfit',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:900;letter-spacing:-.01em;line-height:1.1;margin-bottom:.4rem}
.page-header p{color:var(--muted);font-size:.9rem;max-width:540px;line-height:1.6}
.header-meta{margin-top:.8rem}
.meta-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted)}
.tabs-wrap{max-width:900px;margin:0 auto;padding:0 2rem;position:relative;z-index:1}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:2rem;align-items:center}
.tab{font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;padding:.7rem 1.4rem;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:color .2s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{max-width:900px;margin:0 auto;padding:0 2rem 4rem;position:relative;z-index:1}
.panel{display:none}
.panel.active{display:block}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.cat-btn{font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:700;padding:.4rem 1rem;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;transition:all .18s}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-section{margin-bottom:1.4rem;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.cat-header{display:flex;align-items:center;justify-content:space-between;gap:.7rem;padding:.5rem 1rem;background:var(--accent-light);border-bottom:1.5px solid var(--border);border-left:3px solid var(--accent);cursor:pointer;user-select:none}
.cat-header:hover{filter:brightness(.97)}
.cat-title{font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--accent)}
.cat-chevron{color:var(--accent);transition:transform .2s;font-size:.75rem;opacity:.7;flex-shrink:0}
.cat-section.collapsed .cat-chevron{transform:rotate(-90deg)}
.cat-section.collapsed .cat-body{display:none}
.pos-group{margin-bottom:.1rem}
.pos-subhead{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:.38rem 1rem .3rem;border-bottom:1px solid var(--border);border-top:1px solid var(--border);border-left:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.pos-subhead:hover{filter:brightness(.96)}
.pos-chevron{transition:transform .2s;font-size:.65rem;opacity:.6;flex-shrink:0}
.pos-group.collapsed .pos-chevron{transform:rotate(-90deg)}
.pos-group.collapsed .pos-body{display:none}
.pos-group:first-child .pos-subhead{border-top:none}
.word-list{width:100%}
.word-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;padding:.5rem 1rem}
.word-row:last-child{border-bottom:none}
.word-row:hover{background:var(--accent-light)}
.word-row.open{background:var(--accent-light)}
.wr-main{display:flex;align-items:center;gap:.5rem}
.wr-term{font-weight:800;font-size:.88rem;line-height:1.4}
.wr-arr{margin-left:auto;font-size:1rem;color:var(--border);transition:transform .15s,color .15s;flex-shrink:0;padding-left:.5rem}
.word-row.open .wr-arr{transform:rotate(90deg);color:var(--muted)}
.wr-def{font-size:.8rem;color:var(--muted);line-height:1.4;margin-top:.15rem}
.wr-ex{display:none;font-size:.78rem;font-style:italic;color:var(--muted);margin-top:.25rem;padding:.3rem .5rem;border-left:2px solid var(--border);line-height:1.5}
.word-row.open .wr-ex{display:block}
.conv-controls{display:flex;align-items:center;gap:.5rem;margin-bottom:1.2rem}
.conv-ctrl-label{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-right:.2rem}
.conv-hide-btn{font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:700;padding:.35rem .8rem;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;transition:all .18s}
.conv-hide-btn:hover{border-color:var(--ink);color:var(--ink)}
.conv-hide-btn.active-a{background:var(--sky);border-color:var(--sky);color:#fff}
.conv-hide-btn.active-b{background:var(--sea);border-color:var(--sea);color:#fff}
.hide-a .conv-speaker-a ~ span{visibility:hidden}
.hide-b .conv-speaker-b ~ span{visibility:hidden}
.conv-section{margin-bottom:1.4rem;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.conv-section.collapsed .cat-body{display:none}
.conv-section.collapsed .cat-chevron{transform:rotate(-90deg)}
.conv-header{display:flex;align-items:center;justify-content:space-between;gap:.7rem;padding:.5rem 1rem;background:var(--sea-light);border-bottom:1.5px solid var(--border);border-left:3px solid var(--sea);cursor:pointer;user-select:none}
.conv-title{font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--sea)}
.conv-entry{border-bottom:1px solid var(--border);padding:.65rem 1rem}
.conv-entry:last-child{border-bottom:none}
.conv-dialogue{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.35rem}
.conv-line{font-size:.82rem;line-height:1.5;display:grid;grid-template-columns:16px 1fr;gap:.5rem}
.conv-speaker{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;padding-top:.18rem}
.conv-speaker-a{color:var(--sky)}
.conv-speaker-b{color:var(--sea)}
.conv-note{font-size:.73rem;color:var(--muted);font-style:italic;padding-left:24px}
.print-btn{margin-left:auto;display:inline-flex;align-items:center;gap:.45rem;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;padding:.45rem .9rem;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--ink);cursor:pointer;transition:all .18s;flex-shrink:0}
.print-btn:hover{border-color:var(--ink);background:var(--ink);color:var(--cream)}
@media print{.print-btn{display:none}}
.print-modal-backdrop{position:fixed;inset:0;background:rgba(45,48,71,.5);backdrop-filter:blur(3px);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
.print-modal-backdrop.open{display:flex}
.print-modal{background:var(--card);border-radius:var(--radius);max-width:440px;width:100%;padding:1.8rem;box-shadow:0 20px 60px rgba(45,48,71,.25);max-height:90vh;overflow-y:auto}
.print-modal h3{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:800;color:var(--ink);margin-bottom:.3rem}
.print-modal-desc{font-size:.85rem;color:var(--muted);margin-bottom:1.4rem}
.print-field{margin-bottom:1.1rem}
.print-field-label{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:block}
.print-opts{display:flex;flex-direction:column;gap:.4rem}
.print-opt{display:flex;align-items:flex-start;gap:.6rem;padding:.65rem .8rem;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:#fff}
.print-opt:hover{border-color:var(--muted);background:var(--cream)}
.print-opt input{margin:.15rem 0 0 0;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.print-opt-content{flex:1;display:flex;flex-direction:column;gap:.1rem}
.print-opt-title{font-size:.9rem;font-weight:700;color:var(--ink);line-height:1.3}
.print-opt-desc{font-size:.78rem;color:var(--muted);line-height:1.4}
.print-opt:has(input:checked){border-color:var(--accent);background:var(--accent-light)}
.print-opt:has(input:checked) .print-opt-title{color:var(--accent)}
.print-actions{display:flex;gap:.6rem;margin-top:1.4rem;justify-content:flex-end}
.print-btn-cancel{font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;padding:.6rem 1.2rem;border-radius:10px;cursor:pointer;background:var(--card);border:1.5px solid var(--border);color:var(--muted);transition:all .15s}
.print-btn-cancel:hover{border-color:var(--muted);color:var(--ink)}
.print-btn-go{font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;padding:.6rem 1.2rem;border-radius:10px;cursor:pointer;background:var(--accent);border:1.5px solid var(--accent);color:#fff;transition:opacity .15s}
.print-btn-go:hover{opacity:.85}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
.tap-hint{font-size:.75rem;color:var(--muted);margin-bottom:.8rem;font-style:italic}
@media(max-width:600px){.page-header{padding:5rem 1.2rem 1.2rem}.main,.tabs-wrap{padding:0 1.2rem 3rem}}
</style>
</head>

<div class="topnav">
  <a class="nav-logo" href="index.html">john<span>+</span>english</a>
  <div class="topnav-links">
    <a href="index.html">Home</a>

  </div>
</div>
<div class="page-header">
  <a class="back-link" href="word-banks.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Word Banks
  </a>
  <div class="topic-hero">
    <div class="topic-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 019-9"/><path d="M4 4a16 16 0 0116 16"/><circle cx="5" cy="19" r="2"/></svg></div>
    <div>
      <div class="section-label">Word Bank</div>
      <h1>Media &amp; News</h1>
      <p>Language for discussing journalism, social media, bias, and how information spreads.</p>
      <div class="header-meta"><span class="meta-count" id="totalCount"></span></div>
    </div>
  </div>
</div>
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse',this)">Browse</button>
    <button class="tab" onclick="switchTab('conversation',this)">Conversation</button>
    <button class="print-btn" onclick="openPrintModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print
    </button>
  </div>
</div>
<div class="main">
  <div class="panel active" id="panel-browse">
    <div class="filter-bar">
      <button class="cat-btn active" onclick="filterCat('all',this)">All</button>
      <button class="cat-btn" onclick="filterCat('tier1',this)">Tier 1 — Essential</button>
      <button class="cat-btn" onclick="filterCat('tier2',this)">Tier 2 — Intermediate</button>
      <button class="cat-btn" onclick="filterCat('tier3',this)">Tier 3 — Advanced</button>
    </div>
    <div id="browse-content"></div>
  </div>
  <div class="panel" id="panel-conversation">
    <div class="conv-controls">
      <span class="conv-ctrl-label">Practise</span>
      <button class="conv-hide-btn" id="conv-hide-a" onclick="toggleHide('A')">Hide A</button>
      <button class="conv-hide-btn" id="conv-hide-b" onclick="toggleHide('B')">Hide B</button>
    </div>
    <div id="conv-content"></div>
  </div>
</div>
<script>
const CATEGORIES = [
  { key: 'tier1', label: 'Tier 1 — Essential' },
  { key: 'tier2', label: 'Tier 2 — Intermediate' },
  { key: 'tier3', label: 'Tier 3 — Advanced' },
];
const DATA = {
tier1: [
    ['headline','n.','the title of a newspaper article, printed in large letters','The headline read: "Prime Minister Resigns After Scandal."'],
    ['article','n.','a piece of writing about a topic in a newspaper, magazine, or online','She read an interesting article about sleep science.'],
    ['report','n.','a factual account of an event or investigation published or broadcast','The report revealed widespread corruption in the industry.'],
    ['press','n.','newspapers and journalists considered collectively','The press has been highly critical of the government\'s response.'],
    ['source','n.','a person, book, or document that provides information','The journalist refused to reveal her source.'],
    ['broadcast','n.','a programme transmitted by television or radio','The emergency broadcast warned people to stay indoors.'],
    ['viral','adj.','(of content) spread rapidly and widely online','The clip went viral within hours of being posted.'],
    ['breaking','adj.','(of news) newly happening and being reported for the first time','We interrupt this programme to bring you breaking news.'],
    ['biased','adj.','unfairly favouring one side over another','The coverage was clearly biased towards the ruling party.'],
    ['publish','v.','to make information available to the public in print or online','The paper published the story despite threats from the company.'],
    ['share','v.','to post or forward content on social media','She shared the article without reading past the headline.'],
    ['keep up with','phr.v.','to stay informed about current events or developments','I try to keep up with the news but it\'s overwhelming.'],
    ['spread like wildfire','idiom','to become known very quickly by many people','The rumour spread like wildfire across social media.'],
  ],
  tier2: [
    ['coverage','n.','the way an event or topic is reported in the media','The media coverage of the trial was excessive.'],
    ['circulation','n.','the number of copies of a newspaper or magazine sold','The paper\'s circulation has fallen by half in ten years.'],
    ['censorship','n.','the suppression of information considered harmful or sensitive','Censorship of the press is a serious threat to democracy.'],
    ['tabloid','n.','a newspaper that focuses on sensational stories and celebrity gossip','The tabloids ran the story on their front pages for a week.'],
    ['credible','adj.','able to be believed or trusted as accurate','Only information from credible sources should be shared.'],
    ['sensationalist','adj.','presenting information in a way designed to shock or excite','The reporting was sensationalist and lacked any real evidence.'],
    ['misleading','adj.','giving a false or inaccurate impression','The headline was deliberately misleading.'],
    ['play down','phr.v.','to make something seem less important or serious than it is','The government tried to play down the severity of the crisis.'],
    ['blow out of proportion','phr.v.','to exaggerate the importance or seriousness of something','The whole thing was blown completely out of proportion by the media.'],
    ['fact-check','v.','to verify the accuracy of claims before publishing','Every claim in the article was thoroughly fact-checked.'],
    ['fake news','colloc.','false or misleading information presented as genuine reporting','Social media has made it harder to distinguish fake news from real news.'],
    ['freedom of the press','colloc.','the right of journalists to report without government interference','Freedom of the press is a cornerstone of any democracy.'],
    ['take with a pinch of salt','idiom','to not fully believe something because it may be exaggerated','Anything you read in the tabloids should be taken with a pinch of salt.'],
    ['no smoke without fire','idiom','if something is being said, there is probably some truth to it','I\'m not sure I believe all of it, but there\'s no smoke without fire.'],
  ],
  tier3: [
    ['propaganda','n.','information used to promote a particular political viewpoint, often misleadingly','The documentary explored how propaganda was used during the war.'],
    ['editorial','n.','a newspaper article expressing the editor\'s opinion on a current issue','The editorial called for immediate reform of the justice system.'],
    ['disinformation','n.','deliberately false information spread to deceive the public','Foreign agents used disinformation campaigns to influence the election.'],
    ['impartial','adj.','treating all sides equally and without bias','A good journalist should remain impartial, regardless of personal views.'],
    ['spin','v.','to present information in a way that favours a particular interpretation','The party tried to spin the results as a victory despite losing seats.'],
    ['whistleblower','n.','a person who exposes wrongdoing within an organisation','The whistleblower leaked documents showing the company had lied about safety.'],
    ['a mouthpiece','idiom','a person or publication that speaks on behalf of another, often uncritically','The newspaper is widely seen as a mouthpiece for the government.'],
    ['mud sticks','idiom','once an accusation is made, people tend to believe it even if disproved','He was cleared of all charges, but mud sticks.'],
  ],
};

const CONV_DATA = [];

const POS_COLORS = {"n.":["#2176FF","#F0EFEC"],"adj.":["#FF9100","#F0EFEC"],"v.":["#0FA67F","#F0EFEC"],"phr.v.":["#D946A8","#F0EFEC"],"colloc.":["#D4A017","#F0EFEC"],"idiom":["#CC2936","#F0EFEC"],"phrase":["#7A7D8E","#F0EFEC"],"slang":["#7B3FF2","#F0EFEC"]};
const POS_ORDER = ['n.','adj.','v.','phr.v.','colloc.','idiom','phrase','slang'];
const POS_LABELS = {'n.':'Nouns','adj.':'Adjectives','v.':'Verbs','phr.v.':'Phrasal Verbs','colloc.':'Collocations','idiom':'Idioms','phrase':'Set Phrases','slang':'Modern Slang'};
let activeCat = 'all';
let hiddenSpeaker = null;
function renderBrowse() {
  const container = document.getElementById('browse-content');
  const cats = activeCat === 'all' ? CATEGORIES : CATEGORIES.filter(c=>c.key===activeCat);
  let html = ''; let total = 0;
  const groups = {};
  cats.forEach(cat => {
    const entries = DATA[cat.key]||[];
    if (!entries.length) return;
    total += entries.length;
    entries.forEach(function(e){ var pos=e[1]; if(!groups[pos]) groups[pos]=[]; groups[pos].push(e); });
  });
  html += '<div class="cat-section"><div class="cat-body">';
  POS_ORDER.forEach(function(pos){
    if (!groups[pos]) return;
    var label = POS_LABELS[pos]||pos;
    var fg = (POS_COLORS[pos]||['var(--muted)'])[0];
    var bg = (POS_COLORS[pos]||['','var(--cream)'])[1];
    html += '<div class="pos-group collapsed">'
      + '<div class="pos-subhead" style="color:var(--muted);background:'+bg+';border-left-color:'+fg+'" onclick="togglePos(this)">'
      + label + '<span class="pos-chevron">&#9660;</span>'
      + '</div>'
      + '<div class="pos-body">';
    groups[pos].forEach(function(e){
      var term=e[0], def=e[2], ex=e[3]||'';
      html += '<div class="word-row" onclick="toggleRow(this)">'
        + '<div class="wr-main"><span class="wr-term">'+term+'</span><span class="wr-arr">&#8250;</span></div>'
        + '<div class="wr-def">'+def+'</div>'
        + (ex ? '<div class="wr-ex">'+ex+'</div>' : '')
        + '</div>';
    });
    html += '</div></div>';
  });
  html += '</div></div>';
  html = '<p class="tap-hint">Tap any word to see an example sentence.</p>' + html;
  if (!total) html = '<div class="empty-state">No items.</div>';
  container.innerHTML = html;
  document.getElementById('totalCount').textContent = total + ' items';
}

function toggleRow(row){ row.classList.toggle('open'); }
function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBrowse();
}
function renderConversation() {
  const container = document.getElementById('conv-content');
  let html = '';
  CONV_DATA.forEach(section => {
    html += '<div class="conv-section collapsed"><div class="conv-header" onclick="toggleCat(this)"><span class="conv-title">'+section.group+'</span><span class="cat-chevron" style="color:var(--sea)">&#9660;</span></div><div class="cat-body">';
    section.entries.forEach(e => {
      const lines = e.lines.map((l,i) => {
        const scls = i===0?'conv-speaker-a':'conv-speaker-b';
        const lbl = i===0?'A':'B';
        return '<div class="conv-line"><span class="conv-speaker '+scls+'">'+lbl+'</span><span>'+l[1]+'</span></div>';
      }).join('');
      html += '<div class="conv-entry"><div class="conv-dialogue">'+lines+'</div><div class="conv-note">'+e.note+'</div></div>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}
function toggleHide(speaker) {
  const container = document.getElementById('conv-content');
  if (hiddenSpeaker === speaker) {
    hiddenSpeaker = null;
    container.classList.remove('hide-a','hide-b');
    document.getElementById('conv-hide-a').classList.remove('active-a');
    document.getElementById('conv-hide-b').classList.remove('active-b');
  } else {
    hiddenSpeaker = speaker;
    container.classList.remove('hide-a','hide-b');
    container.classList.add('hide-'+speaker.toLowerCase());
    document.getElementById('conv-hide-a').classList.remove('active-a');
    document.getElementById('conv-hide-b').classList.remove('active-b');
    document.getElementById('conv-hide-'+speaker.toLowerCase()).classList.add('active-'+speaker.toLowerCase());
  }
}
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}
function toggleCat(hdr) { hdr.parentElement.classList.toggle('collapsed'); }
function togglePos(hdr) { hdr.parentElement.classList.toggle('collapsed'); }
function openPrintModal() {
  var scope = document.querySelector('input[name="wbScope"]:checked').value;
  document.getElementById('print-format-field').style.display = scope === 'conversation' ? 'none' : '';
  document.getElementById('printModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePrintModal(e) {
  if (e && e.target !== document.getElementById('printModal')) return;
  document.getElementById('printModal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('change', function(e) {
  if (e.target.name === 'wbScope') document.getElementById('print-format-field').style.display = e.target.value === 'conversation' ? 'none' : '';
});
function executePrint() {
  var scope = document.querySelector('input[name="wbScope"]:checked').value;
  var format = document.querySelector('input[name="wbFormat"]:checked').value;
  var topic = 'Media & News';
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+topic+' — Word Bank</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">'
    + '<style>@page{margin:1.4cm 1.8cm}*{margin:0;padding:0;box-sizing:border-box}'
    + 'body{font-family:Outfit,sans-serif;color:#2D3047;font-size:10pt;line-height:1.5}'
    + '.header{display:flex;align-items:baseline;justify-content:space-between;border-bottom:2pt solid #E8E5DF;padding-bottom:4pt;margin-bottom:10pt}'
    + 'h1{font-family:Outfit,sans-serif;font-size:17pt;font-weight:900}'
    + '.meta{font-family:"JetBrains Mono",monospace;font-size:7.5pt;color:#7A7D8E}'
    + '.tier{margin-bottom:16pt}'
    + '.tier-name{font-family:"JetBrains Mono",monospace;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#9B72CF;padding:3pt 0;border-bottom:1.5pt solid #E8E5DF;margin-bottom:4pt}'
    + '.pos-name{font-family:"JetBrains Mono",monospace;font-size:6.5pt;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7A7D8E;margin:6pt 0 2pt;padding-top:4pt;border-top:0.5pt solid #f0ede8}'
    + '.pos-name:first-child{border-top:none;margin-top:0}'
    + 'table{width:100%;border-collapse:collapse;margin-bottom:4pt}'
    + 'td{padding:3pt 5pt;vertical-align:top;border-bottom:0.5pt solid #f5f3ef;font-size:10pt}'
    + 'td.term{font-weight:800;width:26%}td.def{color:#555;width:40%}td.ex{font-style:italic;color:#888;width:34%}'
    + 'td.ws-line{border-bottom:1pt solid #bbb;min-width:200pt}'
    + '.conv-group{margin-bottom:14pt}'
    + '.conv-group-name{font-family:"JetBrains Mono",monospace;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#1DD3B0;padding:3pt 0;border-bottom:1.5pt solid #E8E5DF;margin-bottom:6pt}'
    + '.conv-entry{margin-bottom:8pt}'
    + '.conv-line{display:grid;grid-template-columns:14pt 1fr;gap:3pt;font-size:10pt;line-height:1.6}'
    + '.spk{font-family:"JetBrains Mono",monospace;font-size:7pt;font-weight:700;padding-top:2pt}'
    + '.spk-a{color:#2176FF}.spk-b{color:#1DD3B0}'
    + '.conv-note{font-size:8.5pt;font-style:italic;color:#7A7D8E;margin-top:2pt;padding-left:17pt}'
    + '</style></head><body>'
    + '<div class="header"><h1>'+topic+'</h1>'
    + '<span class="meta">'+(scope==='conversation'?'Conversation Exchanges':(scope==='all'?'All Tiers':CATEGORIES.find(function(c){return c.key===scope;}).label))+'</span></div>';
  if (scope === 'conversation') {
    CONV_DATA.forEach(function(section) {
      html += '<div class="conv-group"><div class="conv-group-name">'+section.group+'</div>';
      section.entries.forEach(function(e) {
        html += '<div class="conv-entry">';
        e.lines.forEach(function(l,i) {
          html += '<div class="conv-line"><span class="spk '+(i===0?'spk-a':'spk-b')+'">'+(i===0?'A':'B')+'</span><span>'+l[1]+'</span></div>';
        });
        html += '<div class="conv-note">'+e.note+'</div></div>';
      });
      html += '</div>';
    });
  } else {
    var tiers = scope === 'all' ? ['tier1','tier2','tier3'] : [scope];
    tiers.forEach(function(tk) {
      var cat = CATEGORIES.find(function(c){return c.key===tk;});
      if (!cat) return;
      var entries = DATA[tk]||[];
      if (!entries.length) return;
      html += '<div class="tier"><div class="tier-name">'+cat.label+'</div>';
      var groups = {};
      entries.forEach(function(e){ if(!groups[e[1]]) groups[e[1]]=[]; groups[e[1]].push(e); });
      ['n.','adj.','v.','phr.v.','colloc.','idiom','phrase','slang'].forEach(function(pos) {
        if (!groups[pos]) return;
        var pl = {'n.':'Nouns','adj.':'Adjectives','v.':'Verbs','phr.v.':'Phrasal Verbs','colloc.':'Collocations','idiom':'Idioms','phrase':'Set Phrases','slang':'Modern Slang'};
        html += '<div class="pos-name">'+pl[pos]+'</div><table>';
        groups[pos].forEach(function(e) {
          if (format==='full') html += '<tr><td class="term">'+e[0]+'</td><td class="def">'+e[2]+'</td><td class="ex">'+(e[3]||'')+'</td></tr>';
          else if (format==='compact') html += '<tr><td class="term">'+e[0]+'</td><td class="def">'+e[2]+'</td></tr>';
          else html += '<tr><td class="term">'+e[0]+'</td><td class="ws-line"></td></tr>';
        });
        html += '</table>';
      });
      html += '</div>';
    });
  }
  html += '</body></html>';
  var win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
  win.onload = function(){ win.focus(); win.print(); };
  document.getElementById('printModal').classList.remove('open');
  document.body.style.overflow = '';
}
renderBrowse();
renderConversation();
</script>
<div class="print-modal-backdrop" id="printModal" onclick="closePrintModal(event)">
  <div class="print-modal" onclick="event.stopPropagation()">
    <h3>Print word bank</h3>
    <p class="print-modal-desc">Choose what to print.</p>
    <div class="print-field">
      <label class="print-field-label">Scope</label>
      <div class="print-opts">
        <label class="print-opt"><input type="radio" name="wbScope" value="all" checked><div class="print-opt-content"><span class="print-opt-title">All tiers</span><span class="print-opt-desc">Everything — Tier 1, 2, and 3</span></div></label>
        <label class="print-opt"><input type="radio" name="wbScope" value="tier1"><div class="print-opt-content"><span class="print-opt-title">Tier 1 only</span><span class="print-opt-desc">Essential vocabulary</span></div></label>
        <label class="print-opt"><input type="radio" name="wbScope" value="tier2"><div class="print-opt-content"><span class="print-opt-title">Tier 2 only</span><span class="print-opt-desc">Intermediate vocabulary</span></div></label>
        <label class="print-opt"><input type="radio" name="wbScope" value="tier3"><div class="print-opt-content"><span class="print-opt-title">Tier 3 only</span><span class="print-opt-desc">Advanced vocabulary</span></div></label>
        <label class="print-opt"><input type="radio" name="wbScope" value="conversation"><div class="print-opt-content"><span class="print-opt-title">Conversation exchanges</span><span class="print-opt-desc">Dialogues and usage notes only</span></div></label>
      </div>
    </div>
    <div class="print-field" id="print-format-field">
      <label class="print-field-label">Format</label>
      <div class="print-opts">
        <label class="print-opt"><input type="radio" name="wbFormat" value="full" checked><div class="print-opt-content"><span class="print-opt-title">Full reference</span><span class="print-opt-desc">Term, definition, and example sentence</span></div></label>
        <label class="print-opt"><input type="radio" name="wbFormat" value="compact"><div class="print-opt-content"><span class="print-opt-title">Compact</span><span class="print-opt-desc">Term and definition only</span></div></label>
        <label class="print-opt"><input type="radio" name="wbFormat" value="worksheet"><div class="print-opt-content"><span class="print-opt-title">Worksheet</span><span class="print-opt-desc">Terms listed with blank lines for definitions</span></div></label>
      </div>
    </div>
    <div class="print-actions">
      <button class="print-btn-cancel" onclick="closePrintModal()">Cancel</button>
      <button class="print-btn-go" onclick="executePrint()">Print</button>
    </div>
  </div>
</div>
</body>
</html>
