<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A1 Grammar — JohnPlusEnglish</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#2176FF;--sea:#1DD3B0;--coral:#FF6B6B;--sun:#FFB347;--lav:#9B72CF;
  --cream:#F7F6F3;--ink:#2D3047;--ink2:#4A4E6B;--ink3:#8B8FA8;
  --a1:#F4A259;--a1bg:#FEF3E8;--a1dark:#B8651A;
  --radius:14px;--radius-sm:8px;
  --card-shadow:0 1px 3px rgba(45,48,71,.07),0 4px 16px rgba(45,48,71,.05);
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:15px}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:13px 32px;background:#fff;border-bottom:1px solid #E8E6E0;position:sticky;top:0;z-index:200;}
.logo{font-weight:900;font-size:17px;letter-spacing:-0.02em}
.logo span{color:var(--sky)}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;padding:6px 12px;border-radius:20px;border:1px solid #E8E6E0;background:transparent;transition:all .15s;font-family:'Outfit',sans-serif;}
.nav-back:hover{background:var(--cream);color:var(--ink)}
.nav-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)}
.nav-breadcrumb span{color:var(--sky);font-weight:600}
.nav-breadcrumb .sep{opacity:.4;color:var(--ink3)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 53px)}
.sidebar{background:#fff;border-right:1px solid #E8E6E0;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-head{padding:20px 20px 14px;border-bottom:1px solid #F0EEE8;}
.level-pill{display:inline-flex;align-items:center;gap:5px;background:var(--a1bg);color:var(--a1);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px;}
.sidebar-head h2{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
.sidebar-head p{font-size:12px;color:var(--ink3);margin-top:3px;line-height:1.45}
.topic-nav{padding:8px 0;flex:1}
.topic-link{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background .12s;border:none;background:transparent;width:100%;text-align:left;font-family:'Outfit',sans-serif;}
.topic-link:hover{background:#F7F6F3}
.topic-link.active{background:var(--a1bg)}
.topic-link.done .tl-check{background:var(--sea);border-color:var(--sea);color:#fff}
.tl-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3);width:16px;flex-shrink:0}
.tl-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #D4D2CA;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;color:var(--sea);transition:all .2s;}
.topic-link.active .tl-check{border-color:var(--a1)}
.tl-name{font-size:13px;color:var(--ink2);font-weight:400;line-height:1.3}
.topic-link.active .tl-name{color:var(--a1);font-weight:600}
.topic-link.done .tl-name{color:var(--ink3)}
.sidebar-foot{padding:14px 20px;border-top:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.prog-bar{flex:1;height:4px;background:#E8E6E0;border-radius:2px;margin-right:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--sea);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-text{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink3);white-space:nowrap}
.main{padding:0;overflow:visible}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-hero{padding:36px 40px 28px;border-bottom:1px solid #E8E6E0;background:linear-gradient(135deg,#fff 0%,#F2F7FF 100%);}
.lesson-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.level-tag{background:var(--a1bg);color:var(--a1);font-weight:700}
.lesson-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3)}
.lesson-hero h1{font-size:32px;font-weight:900;letter-spacing:-.03em;color:var(--ink);line-height:1.1;margin-bottom:8px}
.lesson-hero p{font-size:15px;color:var(--ink2);line-height:1.6;max-width:580px}
.lesson-toolbar{display:flex;align-items:center;gap:8px;margin-top:20px;}
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--sky);color:#fff}
.btn-primary:hover{background:#1a6ae8;transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--ink2);border:1px solid #E0DED8}
.btn-ghost:hover{background:var(--cream)}
.btn-done{background:var(--sea);color:#fff}
.btn-done:hover{background:#17b89e;transform:translateY(-1px)}
.lesson-body{padding:32px 40px;display:flex;flex-direction:column;gap:8px}
.section-label{display:flex;align-items:center;gap:10px;margin-bottom:0;margin-top:8px;padding:9px 14px;background:var(--ink);border-radius:6px;cursor:pointer;user-select:none;transition:background .15s;}
.section-label:hover{background:#2D3047}
.btn-toggle-all{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);background:transparent;border:1px solid #D8D6D0;border-radius:20px;padding:5px 14px;cursor:pointer;transition:all .15s;}
.btn-toggle-all:hover{background:var(--cream);color:var(--ink);border-color:#B0AEA6;}
.section-label-chevron{margin-left:auto;display:flex;align-items:center;color:rgba(255,255,255,.5);transition:transform .2s;}
.section-label.collapsed .section-label-chevron{transform:rotate(-90deg)}
.section-body{overflow:visible;transition:max-height .25s ease,opacity .2s ease,margin-top .2s ease;max-height:4000px;opacity:1;margin-top:14px;}
.section-body.collapsed{max-height:0;opacity:0;margin-top:0;overflow:hidden;}
.section-label-icon{display:flex;align-items:center;color:#fff;flex-shrink:0}
.section-label h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#fff}
.explain-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;padding:26px 28px;box-shadow:var(--card-shadow);}
.explain-lead{font-size:16px;font-weight:600;color:var(--ink);line-height:1.55;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #F0EEE8;}
.explain-lead em{font-style:normal;color:var(--sky);font-weight:700}
.explain-body{font-size:14px;color:var(--ink2);line-height:1.8}
.explain-body p{margin-bottom:14px}
.explain-body p:last-child{margin-bottom:0}
.explain-body .rule{display:flex;gap:14px;align-items:flex-start;background:var(--cream);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
.explain-body .rule:last-of-type{margin-bottom:0}


.explain-body .rule-text{font-size:14px;color:var(--ink2);line-height:1.7}
.explain-body .rule-text strong{color:var(--ink)}
.explain-body .rule-text em{font-style:normal;color:var(--a1);font-weight:600}
.explain-body .rule-num:empty{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--a1);margin-top:6px;}
.explain-body .rule-num:not(:empty){flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--a1);font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.explain-body .note{background:var(--a1bg);border-left:3px solid var(--a1);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:14px;font-size:13px;color:var(--ink2);line-height:1.65}
.explain-body .note strong{color:var(--ink)}
.form-table{width:100%;border-collapse:collapse;font-size:14px}
.form-table th{background:#EEF2FF;color:var(--ink);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;text-align:left;}
.form-table th:first-child{border-radius:8px 0 0 0}
.form-table th:last-child{border-radius:0 8px 0 0}
.form-table td{padding:11px 14px;border-bottom:1px solid #F0EEE8;color:var(--ink2);font-size:14px}
.form-table tr:last-child td{border-bottom:none}
.form-table tr:nth-child(even) td{background:#FAFAF8}
.form-table .subject{font-weight:700;color:var(--ink)}
.form-table .form{color:var(--ink2)}
.form-table .neg{color:var(--ink2)}
.form-table .example{color:var(--ink2);font-style:italic}
.form-table .example{color:var(--ink2);font-style:italic}
.examples-grid{display:grid;gap:10px}
.example-item{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.ex-marker{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px;}
.ex-marker.pos{background:#E8F8F5;color:var(--sea)}
.ex-marker.neg{background:#FFF0F0;color:var(--coral)}
.ex-marker.q{background:var(--a1bg);color:var(--sky)}
.ex-eng{font-size:14px;font-weight:600;color:var(--ink)}
.ex-note{font-size:12px;color:var(--ink3);margin-top:2px}
.error-card{background:#fff;border-radius:var(--radius);padding:20px 22px;border:1px solid #E0DED8;}
.error-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:14px}
.error-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.error-bad,.error-good{border-radius:var(--radius-sm);padding:11px 14px}
.error-bad{background:#FFF5F5;border:1px solid #FCDADA}
.error-good{background:#F0FBF8;border:1px solid #C0EDE4}
.error-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.error-bad .error-label{color:var(--coral)}
.error-good .error-label{color:#0F7A6A}
.error-text{font-size:14px;color:var(--ink);font-weight:500;font-style:italic}
.error-bad .error-text{color:#B84040}
.error-good .error-text{color:#0F5A4A}
.error-reason{font-size:13px;color:var(--ink3);margin-top:10px;margin-bottom:4px;grid-column:1/-1;padding:0 2px}
.exercise-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;overflow:visible;box-shadow:var(--card-shadow);}
.ex-card-header{padding:16px 20px;border-bottom:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.ex-card-title{font-size:14px;font-weight:700;color:var(--ink)}
.ex-card-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.ex-type-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:#F0F0F0;color:var(--ink3)}
.ex-card-body{padding:20px}
.gap-sentence{font-size:15px;color:var(--ink);line-height:2.4;margin-bottom:4px;display:flex;align-items:baseline;flex-wrap:wrap;gap:4px;}
.gap-sentence:last-child{margin-bottom:0}
.gap-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-right:4px}
.gap-input{display:inline-block;border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.gap-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.gap-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.gap-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.gap-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:baseline}
.gap-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.gap-reveal.show{opacity:1}
.mc-question{margin-bottom:20px}
.mc-question:last-child{margin-bottom:0}
.mc-text{font-size:14px;color:var(--ink);margin-bottom:10px;font-weight:500}
.mc-options{display:flex;flex-wrap:wrap;gap:8px}
.mc-opt{font-family:'Outfit',sans-serif;font-size:13px;padding:7px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.mc-opt:hover{border-color:var(--sky);color:var(--sky);background:var(--a1bg)}
.mc-opt.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600}
.mc-opt.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.mc-feedback{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:6px;display:none}
.mc-feedback.show{display:block}
.mc-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.mc-feedback.bad{background:#FFF0F0;color:#B84040}
.ec-item{margin-bottom:16px}
.ec-item:last-child{margin-bottom:0}
.ec-sentence{font-size:14px;background:#FFF8F0;border:1px solid #FFD8B0;border-radius:var(--radius-sm);padding:11px 14px;color:var(--ink);font-weight:500;margin-bottom:8px;}
.ec-input-row{display:flex;gap:8px;align-items:center}
.ec-input{flex:1;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.ec-input:focus{border-color:var(--sky)}
.ec-input.correct{border-color:var(--sea);background:#F0FBF8}
.ec-input.wrong{border-color:var(--coral);background:#FFF5F5}
.check-row{display:flex;gap:8px;margin-top:16px}
.btn-check{background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 20px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-check:hover{background:#1a6ae8}
.btn-reset{background:var(--cream);color:var(--ink3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:20px;border:1px solid #E0DED8;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#EDEBE5;color:var(--ink)}
.score-badge{display:none;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;margin-top:12px;}
.score-badge.show{display:inline-flex}
.score-badge.full{background:#E8F8F5;color:#0F7A6A}
.score-badge.partial{background:#FFF8E8;color:#8B6000}
.score-badge.low{background:#FFF0F0;color:#B84040}
.lesson-footer{padding:24px 40px;border-top:1px solid #E8E6E0;display:flex;align-items:center;justify-content:space-between;background:#fff;}
.footer-hint{font-size:12px;color:var(--ink3)}
.footer-nav{display:flex;gap:8px}
.real-use{background:linear-gradient(135deg,var(--a1bg) 0%,#F8F0FF 100%);border-radius:var(--radius);border:1px solid #C8DEFF;padding:20px 24px;}
.real-use h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sky);margin-bottom:12px}
.real-use ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.real-use li{font-size:13px;color:var(--ink2);line-height:1.6;padding-left:20px;position:relative;}
.real-use li::before{content:'→';position:absolute;left:0;color:var(--sky);font-weight:700}

/* ── JOHN\'S TIP ── */
.johns-tip{
  background:#FFFBF0;border:1.5px solid #FFD97A;border-radius:var(--radius);
  padding:18px 20px;display:flex;gap:14px;align-items:flex-start;
}
.tip-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--sky);color:#fff;
  font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:-.02em;
}
.tip-body{}
.tip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#B8860B;margin-bottom:5px}
.tip-text{font-size:13px;color:#5A4500;line-height:1.65}
.tip-text strong{color:#3A2D00;font-weight:700}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .lesson-hero{padding:24px 20px 20px}
  .lesson-body{padding:24px 20px}
  .lesson-footer{padding:16px 20px}
  .error-row{grid-template-columns:1fr}
}

/* ── SENTENCE BUILDER ── */
.sb-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:12px;}
.sb-word{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.sb-word:hover{border-color:var(--sky);color:var(--sky)}
.sb-word.used{opacity:.3;pointer-events:none;}
.sb-slot{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:10px 12px;border:2px dashed #C8DEFF;border-radius:var(--radius-sm);background:#FAFCFF;margin-bottom:12px;align-items:center;}
.sb-placed{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:var(--a1bg);border:1.5px solid var(--sky);border-radius:20px;cursor:pointer;color:var(--sky);user-select:none;transition:all .15s;}
.sb-placed:hover{background:#FFE8E8;border-color:var(--coral);color:var(--coral)}
.sb-sentence{margin-bottom:20px}
.sb-sentence:last-child{margin-bottom:0}
.sb-sentence-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-bottom:6px}
.sb-context{font-size:13px;color:var(--ink3);margin-bottom:8px;font-style:italic}
.sb-result{font-size:12px;margin-top:6px;padding:6px 12px;border-radius:6px;display:none}
.sb-result.show{display:block}
.sb-result.ok{background:#E8F8F5;color:#0F7A6A}
.sb-result.bad{background:#FFF0F0;color:#B84040}

/* ── MATCHING ── */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.match-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:8px;}
.match-item{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid #E0DED8;cursor:pointer;transition:all .15s;background:#fff;color:var(--ink2);font-family:'Outfit',sans-serif;text-align:left;width:100%;margin-bottom:6px;display:block;}
.match-item:last-child{margin-bottom:0}
.match-item:hover{border-color:var(--sky);color:var(--sky)}
.match-item.selected{border-color:var(--sky);background:var(--a1bg);color:var(--sky);font-weight:600}
.match-item.matched{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600;pointer-events:none;cursor:default;}
.match-item.wrong-flash{border-color:var(--coral)!important;background:#FFF0F0!important;color:var(--coral)!important}
.match-pairs{margin-top:12px;}
.match-pair-line{font-size:12px;display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #F0EEE8;color:var(--ink3);}
.match-pair-line:last-child{border-bottom:none}

/* ── TRANSFORMATION ── */
.transform-item{margin-bottom:16px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.transform-item:last-child{margin-bottom:0}
.transform-original{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:8px;line-height:1.5}
.transform-keyword{display:inline-block;background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin:0 2px;}
.transform-input{width:100%;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.transform-input:focus{border-color:var(--sky)}
.transform-input.correct{border-color:var(--sea);background:#F0FBF8}
.transform-input.wrong{border-color:var(--coral);background:#FFF5F5}
.transform-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:5px;opacity:0;transition:opacity .2s;min-height:16px}
.transform-reveal.show{opacity:1}

/* ── CATEGORISATION ── */
.cat-bank{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:14px;min-height:48px;}
.cat-word{font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.cat-word:hover{border-color:var(--sky);color:var(--sky)}
.cat-word.placed{opacity:.3;pointer-events:none;}
.cat-columns{display:grid;gap:10px;margin-bottom:12px;}
.cat-col{border-radius:var(--radius-sm);border:2px dashed #D0CEC8;padding:10px 12px;min-height:80px;transition:border-color .2s;}
.cat-col-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #E0DED8;}
.cat-placed{font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:4px 11px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;user-select:none;transition:all .15s;display:inline-block;margin:3px;}
.cat-placed:hover{opacity:.65}
.cat-col.checked-correct .cat-col-head{color:#0F7A6A}
.cat-col.checked-correct{border-color:var(--sea);border-style:solid;}
.cat-col.checked-wrong{border-color:var(--coral);border-style:solid;}

/* ── CONVERSATION FILL ── */
.convo-wrap{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;overflow:hidden;margin-bottom:12px;}
.convo-line{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid #F5F3EF;}
.convo-line:last-child{border-bottom:none}
.convo-speaker{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;width:28px;flex-shrink:0;padding-top:3px;}
.convo-speaker.a{color:var(--sky)}
.convo-speaker.b{color:var(--lav)}
.convo-text{font-size:14px;color:var(--ink);line-height:1.7;flex:1}
.convo-input{border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.convo-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.convo-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.convo-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.convo-gwrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:middle}
.convo-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.convo-reveal.show{opacity:1}

/* ── TRUE / FALSE / NOT GIVEN ── */
.tf-item{margin-bottom:10px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.tf-item:last-child{margin-bottom:0}
.tf-context{font-size:12px;color:var(--ink3);margin-bottom:6px;font-style:italic;line-height:1.5}
.tf-statement{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:10px;line-height:1.5}
.tf-options{display:flex;gap:8px;flex-wrap:wrap;}
.tf-btn{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.tf-btn:hover{border-color:var(--sky);background:var(--a1bg);color:var(--sky)}
.tf-btn.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A}
.tf-btn.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.tf-feedback{font-size:12px;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.tf-feedback.show{display:block}
.tf-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.tf-feedback.bad{background:#FFF0F0;color:#B84040}

.lesson-sticky{position:sticky;top:53px;z-index:100;background:#fff;border-bottom:1px solid #E8E6E0;padding:10px 40px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-100%);opacity:0;transition:transform .2s ease,opacity .2s ease;pointer-events:none;}
.lesson-sticky.visible{transform:translateY(0);opacity:1;pointer-events:auto;}
.sticky-title{font-size:14px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}
.sticky-sep{color:var(--ink3);font-size:13px;flex-shrink:0}
.sticky-intro{font-size:13px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.sticky-level{background:var(--a1bg);color:var(--a1);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
@media(max-width:600px){.lesson-sticky{padding:10px 16px;}.sticky-intro{display:none;}}

<script>
// ── HELPER ──
const tip = (t) => `<div class="johns-tip"><div class="tip-avatar">J</div><div class="tip-body"><div class="tip-label">John's tip</div><div class="tip-text">${t}</div></div></div>`;

// ── LESSON DATA ──
const lessons = [
{id:"be",title:"Verb to be",subtitle:"am / is / are",intro:"The single most important verb in English. Everything starts here.",desc:"Before you can say anything in English \u2014 introduce yourself, describe things, talk about your job or feelings \u2014 you need the verb <em>to be</em>. It has three present tense forms.",tip:"Watch out for short answers. If someone asks <strong>\"Are you ready?\"</strong> \u2014 say <strong>\"Yes, I am.\"</strong> Not \"Yes, I'm.\" You can't use a contraction in a short answer.",explanation:"<p>The verb <em>to be</em> is used to <strong>identify people and things</strong>, describe <strong>states, feelings and characteristics</strong>, and talk about <strong>jobs, nationalities and origins</strong>.</p>\n<p>Unlike most verbs, <em>to be</em> has three completely different present tense forms. They are not interchangeable \u2014 each belongs to a specific subject.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>am</strong> \u2014 only with <em>I</em>. Always. No exceptions.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>is</strong> \u2014 with <em>he, she, it</em>, and singular nouns. <em>\"The weather is nice.\"</em> / <em>\"My name is John.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>are</strong> \u2014 with <em>you, we, they</em>, and plural nouns. <em>\"They are my friends.\"</em> / <em>\"We are from Ukraine.\"</em></div></div>\n<div class=\"note\"><strong>Short answers with to be never contract:</strong> <em>\"Are you ready?\"</em> \u2192 <em>\"Yes, I am.\"</em> \u2014 NOT <em>\"Yes, I'm.\"</em> You can start a sentence with a contraction (I'm tired) but you cannot end one with it.</div>",table:{headers:["Subject","Full form","Contraction","Negative","Short negative"],rows:[["I","I am","I'm","I am not","I'm not"],["You","You are","You're","You are not","You aren't"],["He / She / It","He is","He's","He is not","He isn't"],["We","We are","We're","We are not","We aren't"],["They","They are","They're","They are not","They aren't"]]},examples:[{type:"pos",eng:"I'm a student.",note:"Contraction is more natural in speech."},{type:"pos",eng:"She is from Spain.",note:"Full form \u2014 also correct, slightly more formal."},{type:"neg",eng:"He isn't tired.",note:"Contraction of is + not."},{type:"neg",eng:"We aren't teachers.",note:"Contraction of are + not."},{type:"q",eng:"Are you ready?",note:"Invert subject and verb for questions."},{type:"q",eng:"Is she a doctor?",note:"Same inversion rule for he/she/it."}],errors:[{bad:"She teacher.",good:"She is a teacher.",reason:"The verb to be cannot be omitted in English."},{bad:"My name are John.",good:"My name is John.",reason:"\"My name\" is singular \u2014 always use \"is\"."},{bad:"He are my friend.",good:"He is my friend.",reason:"He/she/it always take is."},{bad:"Are you tired? Yes, I'm.",good:"Yes, I am.",reason:"Short answers with to be never use contractions."}],realUse:["\"I'm exhausted.\" / \"She's brilliant.\" \u2014 feelings and qualities","\"Where are you from?\" / \"I'm from Ukraine.\" \u2014 the most common A1 exchange","Contractions (I'm, you're, he's) are the default in spoken English","\"That's crazy.\" \u2014 \"that's\" = that is, used constantly in spoken English"],exercises:[{type:"gap",title:"Choose the correct form",sub:"Fill each gap with am, is, or are.",items:[{answer:"am",before:"I ",after:" a student."},{answer:"is",before:"She ",after:" from Spain."},{answer:"are",before:"They ",after:" my friends."},{answer:"is",before:"My dog ",after:" very friendly."},{answer:"are",before:"We ",after:" in the same class."},{answer:"is",before:"The weather ",after:" beautiful today."},{answer:"am",before:"I ",after:" not tired."},{answer:"are",before:"You ",after:" very kind."}]},{type:"gap",title:"Positives, negatives and questions",sub:"Fill each gap with the correct form of to be \u2014 positive, negative or question.",items:[{answer:"isn't",before:"He ",after:" at home. (negative)"},{answer:"aren't",before:"They ",after:" ready yet. (negative)"},{answer:"Is",before:"",after:" she a teacher? (question)"},{answer:"Are",before:"",after:" you from Italy? (question)"},{answer:"am not",before:"I ",after:" very happy today. (negative)"},{answer:"Is",before:"",after:" it cold outside? (question)"}]},{type:"mc",title:"Short answers",sub:"Choose the correct short answer.",items:[{q:"Are you from Spain? \u2014 ___",opts:["Yes, I'm.","Yes, I am.","Yes, am.","Yes, I is."],answer:"Yes, I am.",explanation:"Short answers with to be never use contractions \u2014 always the full form."},{q:"Is she a doctor? \u2014 ___",opts:["No, she isn't.","No, she aren't.","No, she not.","No, isn't."],answer:"No, she isn't.",explanation:"Negative short answer for she: No, she isn't."},{q:"Are they at home? \u2014 ___",opts:["Yes, they're.","Yes, are.","Yes, they are.","Yes, they is."],answer:"Yes, they are.",explanation:"Short answers with to be never use contractions."},{q:"Is it far? \u2014 ___",opts:["No, it not.","No, it isn't.","No, it aren't.","No, isn't it."],answer:"No, it isn't.",explanation:"No, it isn't. \u2014 correct negative short answer for it."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["she","is","not","a","teacher"],answer:"she is not a teacher",context:"Make a negative sentence."},{words:["are","you","ready","?"],answer:"are you ready ?",context:"Make a yes/no question."},{words:["where","are","you","from","?"],answer:"where are you from ?",context:"Make a wh- question with to be."},{words:["he","is","not","at","home"],answer:"he is not at home",context:"Make a negative sentence."},{words:["they","are","very","tired"],answer:"they are very tired",context:"Make a positive sentence."}]},{type:"ec",title:"Error correction",sub:"Each sentence has one error. Write the correct sentence.",items:[{wrong:"My name are John.",correct:"My name is John.",hint:"What is the subject \u2014 singular or plural?"},{wrong:"He are from Brazil.",correct:"He is from Brazil.",hint:"He/she/it \u2192 is."},{wrong:"Are you tired? Yes, I'm.",correct:"Yes, I am.",hint:"Short answers don't contract."},{wrong:"She not happy.",correct:"She is not happy.",hint:"The verb can't be omitted."},{wrong:"We is very busy.",correct:"We are very busy.",hint:"We \u2192 are."},{wrong:"Is they at school?",correct:"Are they at school?",hint:"They \u2192 are, not is."}]}]},

{id:"pronouns",title:"Subject pronouns",subtitle:"I, you, he, she, it, we, they",intro:"Every English sentence needs a subject. These seven words are the foundation.",desc:"In English, the subject must always be stated explicitly \u2014 you cannot drop it, even when it seems obvious. This trips up speakers of Spanish, Italian, Russian and many other languages.",tip:"Don't forget <strong>it</strong>! In many languages you can drop the subject \u2014 \"Is raining\", \"Is cold.\" In English, you always need it: <strong>\"It's raining.\"</strong> No subject = not a complete sentence.",explanation:"<p>Subject pronouns replace a noun as the <strong>subject of a verb</strong>. In English, the subject must always be stated \u2014 you cannot drop it, even when it seems obvious. This is different from Spanish, Italian, Russian, and many other languages where the subject pronoun is optional.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>I, you, he, she, we, they</strong> \u2014 straightforward replacements for people and groups.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>It</strong> \u2014 for things, animals, and as a <em>dummy subject</em> for weather, time, distance, and impersonal statements. There is no real noun behind <em>it</em> \u2014 it just fills the subject slot. <em>\"It's raining.\"</em> / <em>\"It's five o'clock.\"</em> / <em>\"It's far.\"</em> Many languages drop this entirely. English never does.</div></div>\n<div class=\"note\"><strong>Never drop the subject in English.</strong><br>\nSpanish: <em>\"Es tarde.\"</em> &nbsp;\u2192&nbsp; English: <em>\"It is late.\"</em> \u2014 the <em>it</em> is required.<br>\nSpanish: <em>\"Tengo hambre.\"</em> &nbsp;\u2192&nbsp; English: <em>\"I am hungry.\"</em> \u2014 the <em>I</em> is required.</div>",table:{headers:["Pronoun","Refers to","Example"],rows:[["I","the speaker","I live in Madrid."],["you","singular or plural listener","You speak really well."],["he","male person","He is my brother."],["she","female person","She works at a hospital."],["it","thing, animal, or impersonal subject","It is cold today."],["we","speaker + others","We are from Ukraine."],["they","group not including speaker","They are in the garden."]]},examples:[{type:"pos",eng:"It's raining.",note:"\"It\" as a weather subject \u2014 no equivalent noun."},{type:"pos",eng:"She and I are both teachers.",note:"When combining with I, put the other person first."},{type:"pos",eng:"They are my students.",note:"Can refer to a group of people or things."},{type:"neg",eng:"He isn't here today.",note:"\"He\" for a named male person."},{type:"q",eng:"Is it far from here?",note:"\"It\" for distance \u2014 impersonal use."},{type:"q",eng:"Do they speak English?",note:"\"They\" for a group previously mentioned."}],errors:[{bad:"Is cold.",good:"It is cold.",reason:"English needs a subject pronoun for weather and time."},{bad:"Me and John are friends.",good:"John and I are friends.",reason:"As a subject, use \"I\" not \"me\". Put the other person first."},{bad:"My dog, he is friendly.",good:"My dog is friendly.",reason:"Don't use a pronoun AND a noun as subject \u2014 it's redundant."},{bad:"The company, they decided...",good:"The company decided...",reason:"Remove the redundant pronoun."}],realUse:["\"It's me.\" \u2014 answering a knock at the door. \"It\" has no real referent.","\"They said the weather will improve.\" \u2014 impersonal they.","\"You\" is both singular and plural in English.","\"One should always be polite.\" \u2014 formal impersonal subject."],exercises:[{type:"gap",title:"Subject pronouns",sub:"Fill each gap with the correct subject pronoun.",items:[{answer:"She",before:"My sister is a doctor. ",after:" works at a hospital."},{answer:"They",before:"John and Maria are Spanish. ",after:" live in Madrid."},{answer:"It",before:"",after:" is five o'clock."},{answer:"I",before:"My brother and ",after:" are very close."},{answer:"We",before:"",after:" are all from Ukraine."},{answer:"It",before:"The book is on the table. ",after:" is very interesting."},{answer:"He",before:"That's my teacher. ",after:" is very funny."},{answer:"They",before:"I have two cats. ",after:" are very lazy."}]},{type:"categorise",title:"Categorise the pronouns",sub:"Click a pronoun, then click the correct column.",categories:[{name:"Singular",items:["I","you","he","she","it"]},{name:"Plural",items:["we","they"]},{name:"Both singular and plural",items:["you (pl.)"]}]},{type:"mc",title:"Choose the correct pronoun",sub:"Choose the correct subject pronoun.",items:[{q:"___ is raining outside.",opts:["He","She","It","They"],answer:"It",explanation:"\"It\" is used as a dummy subject for weather."},{q:"___ and I are best friends. (Anna)",opts:["Me","Her","She","Hers"],answer:"She",explanation:"Subject pronoun needed \u2014 she, not her. And other person first."},{q:"The company announced ___ new strategy.",opts:["their","they","it","its"],answer:"its",explanation:"Possessive pronoun for a company/institution is its."},{q:"My parents called. ___ want me to come home.",opts:["It","He","She","They"],answer:"They",explanation:"My parents = a group \u2192 they."}]},{type:"tf",title:"True, False, or Not given",sub:"Read the sentence. Is the statement true, false, or not given?",items:[{context:"It's raining.",statement:"\"It\" in this sentence refers to the sky.",answer:"False",explanation:"\"It\" here is a dummy subject with no real referent."},{context:"Me and Anna are best friends.",statement:"This sentence contains a grammar error.",answer:"True",explanation:"Correct form is \"Anna and I\" \u2014 subject pronoun, other person first."},{context:"They are coming to the party.",statement:"We know exactly who they are.",answer:"Not given",explanation:"Without context, we can't know who they refers to."},{context:"She and I are both teachers.",statement:"The speaker is a teacher.",answer:"True",explanation:"\"I\" is the speaker \u2014 confirmed as a teacher."}]},{type:"ec",title:"Error correction",sub:"One error per sentence. Write the correct version.",items:[{wrong:"Is cold today.",correct:"It is cold today.",hint:"What subject is missing?"},{wrong:"Me and Carlos are friends.",correct:"Carlos and I are friends.",hint:"Subject pronoun + other person first."},{wrong:"My brother, he works in London.",correct:"My brother works in London.",hint:"Don't use both a noun and a pronoun as subject."},{wrong:"The team, they won the match.",correct:"The team won the match.",hint:"Remove the redundant pronoun."},{wrong:"Is very far from here.",correct:"It is very far from here.",hint:"Distance expressions need it as subject."}]}]},

{id:"articles",title:"Articles",subtitle:"a, an, the \u2014 and zero article",intro:"Three small words that cause enormous difficulty. Learn the core logic here.",desc:"Articles are among the hardest things in English for speakers of languages without them \u2014 Russian, Ukrainian, Polish, Turkish, Chinese. But there is a clear logic.",tip:"The biggest problem for most students is <strong>no article at all</strong>. \"I love music.\" \"Life is short.\" \"She's from Spain.\" Don't add <em>the</em> when you're talking about things in general.",explanation:"<p>English has three article choices: <strong>a/an</strong> (indefinite), <strong>the</strong> (definite), and <strong>zero article</strong> (no article at all). The choice depends on whether the noun is specific or general.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>A / an</strong> \u2014 one unspecified member of a category. Use when the listener does not know exactly which one you mean, or when you introduce something for the first time. <em>A before consonant sounds, an before vowel sounds</em> \u2014 it is about <strong>sound, not spelling</strong>. <em>\"An hour\"</em> (h is silent). <em>\"A university\"</em> (sounds like <em>yoo</em>).</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>The</strong> \u2014 a specific noun that both speaker and listener know about. Either it was mentioned before (<em>\"I bought a book. The book was great.\"</em>), or there is only one in context (<em>\"Pass me the salt.\"</em> / <em>\"The sun is out.\"</em>).</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Zero article (no article)</strong> \u2014 used with uncountable nouns and plurals when talking about things <em>in general</em>. <em>\"I love music.\"</em> / <em>\"Dogs are friendly.\"</em> / <em>\"Water is essential.\"</em> Do not add <em>the</em> here \u2014 <em>\"I love the music\"</em> means specific music, not music in general.</div></div>\n<div class=\"note\"><strong>Common fixed expressions with zero article:</strong> at home, at work, at school, at university, by car, by bus, go to bed, go to hospital (British), have breakfast/lunch/dinner.</div>",table:{headers:["Article","Use","Example"],rows:[["a","First mention, singular countable","I saw a dog in the street."],["an","Same \u2014 noun starts with vowel sound","She is an engineer. It's an hour."],["the","Specific noun already known or unique","The dog was barking all night."],["the","Unique things in the world","the sun, the internet, the government"],["\u00d8","Uncountable / plural used generally","I love music. Dogs are friendly."],["\u00d8","Most proper nouns","I live in Spain. She's from Kyiv."]]},examples:[{type:"pos",eng:"I bought a book. The book was excellent.",note:"A on first mention \u2192 the when already known."},{type:"pos",eng:"She's an honest person.",note:"\"An\" before silent h \u2014 \"an hour\", \"an honour\"."},{type:"pos",eng:"The moon is bright tonight.",note:"Unique \u2014 only one moon. Always the."},{type:"neg",eng:"I don't like the coffee here.",note:"\"The\" = this specific coffee in this place."},{type:"q",eng:"Is there a bank near here?",note:"Unspecified \u2014 any bank. Use a."},{type:"q",eng:"Can you close the window?",note:"\"The\" = the specific window we can both see."}],errors:[{bad:"She is teacher.",good:"She is a teacher.",reason:"Jobs and roles need \"a\" or \"an\"."},{bad:"I need an information.",good:"I need some information.",reason:"\"Information\" is uncountable. Never \"an information\"."},{bad:"The life is short.",good:"Life is short.",reason:"Abstract uncountable nouns used generally take zero article."},{bad:"I live in the France.",good:"I live in France.",reason:"Most country names take zero article."}],realUse:["\"Have you got a pen?\" \u2014 any pen. \"Have you got the pen I lent you?\" \u2014 that specific pen.","Headlines drop \"the\": \"President visits Spain\".","\"The\" with instruments: \"She plays the piano.\"","First mention \u2192 the: \"A man walked in. The man sat down.\""],exercises:[{type:"gap",title:"a, an, the, or nothing?",sub:"Fill each gap with a, an, the, or \u2014 (write \u2014 for no article).",items:[{answer:"a",before:"I want ",after:" coffee, please."},{answer:"an",before:"She is ",after:" architect."},{answer:"\u2014",before:"I love ",after:" music."},{answer:"the",before:"Can you open ",after:" door?"},{answer:"the",before:"He works in ",after:" United States."},{answer:"an",before:"I need ",after:" hour to finish."},{answer:"\u2014",before:"She lives in ",after:" Paris."},{answer:"the",before:"Who invented ",after:" telephone?"}]},{type:"mc",title:"First mention vs second mention",sub:"Choose the correct article.",items:[{q:"I saw ___ dog in the park. ___ dog was very big.",opts:["a / A","the / The","a / The","the / A"],answer:"a / The",explanation:"First mention = a (unspecified). Second mention = the (now we know which dog)."},{q:"She plays ___ piano every evening.",opts:["a","an","the","\u2014"],answer:"the",explanation:"Musical instruments always use the."},{q:"___ sun is very strong today.",opts:["A","An","The","\u2014"],answer:"The",explanation:"The sun is unique \u2014 there is only one. Always the."},{q:"I'm looking for ___ job.",opts:["the","a","an","\u2014"],answer:"a",explanation:"Any job, not a specific one \u2192 a."}]},{type:"categorise",title:"Which article?",sub:"Click a phrase, then click the correct column.",categories:[{name:"a / an",items:["an umbrella","a job","an engineer","a university","an hour","a book"]},{name:"the",items:["the moon","the internet","the Nile","the same thing","the best one"]},{name:"no article (\u00d8)",items:["music","France","water","love","Kyiv","happiness"]}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"She is teacher.",keyword:"a",answer:"She is a teacher."},{original:"I play guitar.",keyword:"the",answer:"I play the guitar."},{original:"The love is complicated.",keyword:"\u00d8",answer:"Love is complicated."},{original:"I need advice.",keyword:"some",answer:"I need some advice."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She is a honest woman.",correct:"She is an honest woman.",hint:"The h in \"honest\" is silent."},{wrong:"I live in the France.",correct:"I live in France.",hint:"Most country names take zero article."},{wrong:"He gave me an advice.",correct:"He gave me some advice.",hint:"\"Advice\" is uncountable."},{wrong:"The music is a powerful force.",correct:"Music is a powerful force.",hint:"General abstract noun \u2014 zero article."},{wrong:"Can I have water? I want a water.",correct:"Can I have some water?",hint:"\"Water\" is uncountable \u2014 use \"some\", not \"a\"."},{wrong:"She plays a piano.",correct:"She plays the piano.",hint:"Musical instruments always use the."}]}]},

{id:"plurals",title:"Plural nouns",subtitle:"Regular and common irregular forms",intro:"Adding -s is just the start. English plurals have more rules than most learners expect.",desc:"Forming plurals in English is mostly predictable \u2014 but there are important spelling rules and irregular forms every A1 learner needs to control.",tip:"Three plurals come up in almost every class: <strong>child \u2192 children</strong>, <strong>woman \u2192 women</strong>, <strong>person \u2192 people</strong>. Learn these three first. \"Childrens\" and \"womans\" are not words in English.",explanation:"<p>The basic rule is: add <strong>-s</strong> to most nouns. But several spelling rules change how the plural is formed.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Nouns ending in -s, -ss, -sh, -ch, -x, -z</strong> \u2014 add <em>-es</em> (this adds a syllable so you can say it). bus \u2192 bus<strong>es</strong>, church \u2192 church<strong>es</strong>, box \u2192 box<strong>es</strong>, watch \u2192 watch<strong>es</strong>.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Nouns ending in consonant + y</strong> \u2014 change <em>y</em> to <em>-ies</em>. city \u2192 cit<strong>ies</strong>, baby \u2192 bab<strong>ies</strong>, story \u2192 stor<strong>ies</strong>. (But vowel + y just adds -s: day \u2192 days, boy \u2192 boys.)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Nouns ending in -f or -fe</strong> \u2014 change to <em>-ves</em>. knife \u2192 kni<strong>ves</strong>, leaf \u2192 lea<strong>ves</strong>, half \u2192 hal<strong>ves</strong>. Exceptions: roof \u2192 roofs, chef \u2192 chefs.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Irregular plurals</strong> \u2014 must be memorised. man \u2192 men, woman \u2192 women, child \u2192 children, tooth \u2192 teeth, foot \u2192 feet, mouse \u2192 mice, person \u2192 people, sheep \u2192 sheep, fish \u2192 fish.</div></div>\n<div class=\"note\"><strong>Uncountable nouns</strong> have no plural at all: <em>information, advice, furniture, luggage, money, homework, news, water, music</em>. Never add -s to these. <em>\"Two informations\"</em> and <em>\"an advice\"</em> are always wrong.</div>",table:{headers:["Rule","Singular","Plural","Notes"],rows:[["Most nouns + s","cat / book","cats / books","Default rule"],["-s/-sh/-ch/-x + es","bus / church","buses / churches","Adds a syllable"],["Consonant + y \u2192 ies","city / baby","cities / babies","Vowel + y = just add s: boys"],["-f/-fe \u2192 ves","knife / leaf","knives / leaves","Not all: roofs, chiefs"],["Irregular","man / woman / child","men / women / children","Must be memorised"],["Same form","sheep / fish","sheep / fish","No change"]]},examples:[{type:"pos",eng:"The children are playing in the park.",note:"\"Children\" is the plural of \"child\" \u2014 not \"childs\"."},{type:"pos",eng:"There are three women in the meeting.",note:"\"Women\" \u2014 not \"womans\"."},{type:"pos",eng:"The leaves are falling.",note:"\"Leaf\" \u2192 \"leaves\": f/fe \u2192 ves."},{type:"neg",eng:"There aren't any buses on Sundays.",note:"\"Buses\" = bus + es."},{type:"q",eng:"How many people were there?",note:"\"People\" is already plural."},{type:"q",eng:"Are there any fish in this lake?",note:"\"Fish\" \u2014 same singular and plural form."}],errors:[{bad:"I have three childs.",good:"I have three children.",reason:"\"Children\" is the irregular plural of \"child\"."},{bad:"The informations are...",good:"The information is...",reason:"\"Information\" is uncountable \u2014 no plural."},{bad:"Two womans applied.",good:"Two women applied.",reason:"\"Women\" is the plural of \"woman\"."},{bad:"She gave me good advices.",good:"She gave me some good advice.",reason:"\"Advice\" is uncountable."}],realUse:["\"People\" is almost always used as plural: \"People say...\", \"A lot of people think...\"","Collective nouns (team, family) can take plural verbs in British English.","\"Data\" is now commonly used as uncountable singular in everyday English.","\"The media are reporting...\" (plural) vs \"The media is biased\" (singular) \u2014 both used."],exercises:[{type:"gap",title:"Write the plural",sub:"Write the plural form of the word in brackets.",items:[{answer:"children",before:"She has three ",after:" (child)."},{answer:"women",before:"How many ",after:" (woman) are in the class?"},{answer:"leaves",before:"All the ",after:" (leaf) have fallen."},{answer:"buses",before:"There are two ",after:" (bus) per hour."},{answer:"people",before:"A lot of ",after:" (person) were waiting."},{answer:"teeth",before:"The ",after:" (tooth) are very white."},{answer:"cities",before:"How many ",after:" (city) have you visited?"},{answer:"shelves",before:"The ",after:" (shelf) are full of books."}]},{type:"categorise",title:"Categorise",sub:"Click a word, then click the correct column.",categories:[{name:"Regular plural (-s / -es)",items:["book","bus","day","girl","church","box"]},{name:"Irregular plural",items:["child","woman","tooth","foot","mouse"]},{name:"Uncountable (no plural)",items:["information","advice","music","water","homework"]}]},{type:"mc",title:"Multiple choice",sub:"Choose the correct option.",items:[{q:"She has five _____ in her bag.",opts:["knife","knifes","knives","knifeies"],answer:"knives",explanation:"\"Knife\" ends in -fe \u2192 change to -ves: knives."},{q:"There are many _____ in the park.",opts:["childs","children","childrens","child"],answer:"children",explanation:"\"Children\" is the only correct irregular plural of \"child\"."},{q:"How many _____ do you have?",opts:["informations","information","an information","informings"],answer:"information",explanation:"\"Information\" is uncountable \u2014 no plural."},{q:"Two _____ applied for the job.",opts:["man","mans","men","mens"],answer:"men",explanation:"\"Man\" \u2192 \"men\". Completely irregular."}]},{type:"match",title:"Match singular to plural",sub:"Match each singular noun to its correct plural form.",leftHead:"Singular",rightHead:"Plural",pairs:[{left:"child",right:"children"},{left:"woman",right:"women"},{left:"foot",right:"feet"},{left:"tooth",right:"teeth"},{left:"mouse",right:"mice"},{left:"leaf",right:"leaves"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I have three childs.",correct:"I have three children.",hint:"Irregular plural."},{wrong:"Can you give me an advice?",correct:"Can you give me some advice?",hint:"Uncountable noun \u2014 no article a/an."},{wrong:"She bought two new furnitures.",correct:"She bought some new furniture.",hint:"\"Furniture\" is uncountable."},{wrong:"There are a lot of peoples here.",correct:"There are a lot of people here.",hint:"\"People\" is already plural."},{wrong:"I need some informations.",correct:"I need some information.",hint:"\"Information\" is uncountable."}]}]},

{id:"demonstratives",title:"Demonstratives",subtitle:"this, that, these, those",intro:"Four words that point. Distance in space \u2014 and sometimes in time.",desc:"Demonstratives allow speakers to point at things physically or reference things in conversation. The two-way system (near/far) is simple but very productive.",tip:"On the phone, always say <strong>\"This is John.\"</strong> \u2014 not \"I am John.\" It sounds strange, but it's what English speakers say every time. Try it!",explanation:"<p>English demonstratives work on two axes: <strong>distance</strong> (near vs far) and <strong>number</strong> (singular vs plural).</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>This / these</strong> \u2014 near the speaker. <em>\"This is my coat.\"</em> (holding it) / <em>\"These are my keys.\"</em> (in your hand).</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>That / those</strong> \u2014 away from the speaker. <em>\"That building over there.\"</em> / <em>\"Those mountains in the distance.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Singular vs plural:</strong> this/that = singular noun. these/those = plural noun. Mixing them up is the most common error: <em>\"This are my friends\"</em> \u2717 \u2192 <em>\"These are my friends.\"</em> \u2713</div></div>\n<div class=\"note\"><strong>Distance can be psychological, not just physical:</strong> <em>\"Those were the days\"</em> \u2014 referring to a distant past. <em>\"This is John\"</em> on the phone \u2014 pulling someone into the conversation. <em>\"That's a great idea\"</em> \u2014 acknowledging something just said.</div>",table:{headers:["","Near (here)","Far (there)"],rows:[["Singular","this","that"],["Plural","these","those"],["Example (sing.)","This book is mine.","That book is yours."],["Example (pl.)","These bags are heavy.","Those bags are hers."]]},examples:[{type:"pos",eng:"This is my friend, Maria.",note:"\"This\" draws them into the conversation space."},{type:"pos",eng:"Those mountains are beautiful.",note:"The mountains are far away \u2014 use those."},{type:"pos",eng:"These days, everything is expensive.",note:"\"These days\" = the present period \u2014 temporal use."},{type:"neg",eng:"I don't like this weather.",note:"\"This\" because the weather is immediate and current."},{type:"q",eng:"Is this seat taken?",note:"The seat is right here \u2014 use this."},{type:"q",eng:"What's that smell?",note:"Smell noticed at slight distance or uncertainty."}],errors:[{bad:"These is my book.",good:"This is my book.",reason:"\"This\" = singular. \"These\" must be followed by a plural noun."},{bad:"I want those one.",good:"I want that one.",reason:"\"That one\" = singular. \"Those\" is plural."},{bad:"This are my friends.",good:"These are my friends.",reason:"\"Friends\" is plural \u2014 use \"these\", not \"this\"."},{bad:"That book over here is mine.",good:"This book over here is mine.",reason:"If it's physically near you, use this/these."}],realUse:["\"Hello? This is John.\" \u2014 on the phone. Always \"this is\", never \"I am\".","\"That's a great point.\" \u2014 \"that\" to acknowledge something just said.","\"Those were the days.\" \u2014 \"those\" for a distant past period.","In shops: \"I'll take this one.\" vs \"Can I see that one?\""],exercises:[{type:"gap",title:"This, that, these or those?",sub:"Fill each gap with the correct demonstrative.",items:[{answer:"This",before:"",after:" is my sister. (She's standing next to me.)"},{answer:"those",before:"Can you see ",after:" birds up in the sky?"},{answer:"those",before:"I love ",after:" shoes you're wearing."},{answer:"These",before:"",after:" days, everyone uses a smartphone."},{answer:"that",before:"What's ",after:" smell? It's wonderful!"},{answer:"those",before:"Are ",after:" your keys on the table?"},{answer:"this",before:"Is ",after:" seat free? (asking about the seat next to you)"},{answer:"that",before:"Who is ",after:" woman over there?"}]},{type:"mc",title:"Near or far?",sub:"Choose the correct demonstrative.",items:[{q:"___ is my coat. (You're holding it.)",opts:["This","That","These","Those"],answer:"This",explanation:"You're holding it \u2014 it's near. Use this (singular)."},{q:"___ buildings over there are very old.",opts:["This","That","These","Those"],answer:"Those",explanation:"Over there = far away. Plural buildings \u2192 those."},{q:"___ were the days! (a happy memory)",opts:["This","That","These","Those"],answer:"Those",explanation:"\"Those were the days\" \u2014 fixed expression for a distant happy past."},{q:"Can I try on ___ shoes in the window?",opts:["this","that","these","those"],answer:"those",explanation:"The shoes are in the shop window \u2014 not near you. Plural \u2192 those."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["this","is","my","sister"],answer:"this is my sister",context:"Introduce someone standing next to you."},{words:["those","are","my","keys"],answer:"those are my keys",context:"The keys are on the table across the room."},{words:["these","days","everything","is","expensive"],answer:"these days everything is expensive",context:"Make a sentence about the present period."},{words:["is","that","your","bag","?"],answer:"is that your bag ?",context:"Ask about a bag on the floor near the door."},{words:["I","don't","like","this","weather"],answer:"I don't like this weather",context:"Talk about the current weather."}]},{type:"tf",title:"True, False, or Not given",sub:"Is the statement true, false, or not given?",items:[{context:"This is my coat.",statement:"The coat is near the speaker.",answer:"True",explanation:"\"This\" = near the speaker."},{context:"Those were the days.",statement:"The speaker is talking about the present.",answer:"False",explanation:"\"Those were the days\" refers to a happy time in the past."},{context:"These shoes are comfortable.",statement:"The speaker is wearing the shoes.",answer:"Not given",explanation:"The shoes are nearby (\"these\"), but we don't know if they're being worn."},{context:"That's a great idea.",statement:"The idea was just mentioned by someone else.",answer:"True",explanation:"\"That\" acknowledges something just said."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"These is my book.",correct:"This is my book.",hint:"\"This\" = singular."},{wrong:"I want those one, please.",correct:"I want that one, please.",hint:"Singular \u2192 that, not those."},{wrong:"This are my friends.",correct:"These are my friends.",hint:"Plural noun \u2192 these."},{wrong:"Look at those tree over there.",correct:"Look at that tree over there.",hint:"Singular noun \u2192 that."},{wrong:"These days is very stressful.",correct:"These days are very stressful.",hint:"\"These days\" is plural \u2014 needs are."}]}]},

{id:"presentsimple",title:"Present simple",subtitle:"I work, she works, do/does",intro:"The workhorse tense. Habits, routines, facts, and scheduled events.",desc:"The present simple is used far more than most learners realise \u2014 not just for daily routines, but for facts, general truths, and timetabled future events.",tip:"Don't forget the <strong>-s</strong> for he, she, and it. <em>She works. He plays. It starts.</em> And if you use <em>does</em> in a question, the main verb has no -s: <strong>\"Does she work?\"</strong> \u2014 not \"Does she works?\"",explanation:"<p>The present simple is used for <strong>habits and routines</strong>, <strong>general truths and facts</strong>, and <strong>timetabled future events</strong>. It is not used for things happening right now \u2014 that is the present continuous.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>He / she / it always gets -s (or -es).</strong> This is the most important spelling rule in the present simple. work \u2192 work<strong>s</strong>, play \u2192 play<strong>s</strong>. Verbs ending in -s, -sh, -ch, -x, -o add -es: watch \u2192 watch<strong>es</strong>, go \u2192 go<strong>es</strong>, do \u2192 do<strong>es</strong>. Consonant + y: study \u2192 stud<strong>ies</strong>. Irregular: have \u2192 <strong>has</strong>.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Questions and negatives use do / does.</strong> Once <em>does</em> is in the sentence, the main verb returns to its base form \u2014 no -s. <em>\"Does she work?\"</em> \u2014 NOT <em>\"Does she works?\"</em> The <em>does</em> already carries the third person.</div></div>\n<div class=\"note\"><strong>State verbs</strong> (know, like, love, want, need, understand, believe, prefer, own) describe states, not actions. They are almost never used in the continuous form \u2014 even when talking about right now. <em>\"I understand.\"</em> / <em>\"She wants coffee.\"</em> \u2014 never <em>\"I am understanding\"</em> or <em>\"She is wanting\".</em></div>",table:{headers:["Form","I / You / We / They","He / She / It"],rows:[["Positive","I work / you play","She works / he plays"],["Negative","I don't work","She doesn't work"],["Question","Do you work?","Does she work?"],["Short answer","Yes, I do. / No, I don't.","Yes, she does. / No, she doesn't."]]},examples:[{type:"pos",eng:"She works in a hospital.",note:"-s added for she. Irregular: go \u2192 goes, do \u2192 does, have \u2192 has."},{type:"pos",eng:"We have English class on Mondays.",note:"Scheduled, regular event."},{type:"neg",eng:"He doesn't like coffee.",note:"\"Doesn't\" = does + not. Main verb stays base form."},{type:"neg",eng:"They don't watch TV.",note:"\"Don't\" = do + not."},{type:"q",eng:"Does she speak French?",note:"\"Does\" takes the -s so the main verb doesn't."},{type:"q",eng:"What time do you start work?",note:"\"Do\" in questions with I/you/we/they."}],errors:[{bad:"She work in a bank.",good:"She works in a bank.",reason:"He/she/it always need the -s ending."},{bad:"Does she works here?",good:"Does she work here?",reason:"\"Does\" already carries the third person \u2014 main verb must be base form."},{bad:"He don't like it.",good:"He doesn't like it.",reason:"\"Don't\" is for I/you/we/they. He/she/it use \"doesn't\"."},{bad:"I'm not understand.",good:"I don't understand.",reason:"\"Understand\" is a state verb \u2014 not used in continuous form."}],realUse:["\"She teaches English.\" / \"He runs his own business.\" \u2014 jobs.","\"The train leaves at 6.\" \u2014 timetabled future.","\"I don't understand.\" / \"I agree.\" \u2014 state verbs.","\"He passes to Mbapp\u00e9 \u2014 scores!\" \u2014 live sports commentary."],exercises:[{type:"gap",title:"Positive sentences",sub:"Fill each gap with the correct present simple form.",items:[{answer:"works",before:"She ",after:" in a hospital. (work)"},{answer:"goes",before:"He ",after:" to the gym every day. (go)"},{answer:"have",before:"We ",after:" English class on Mondays. (have)"},{answer:"starts",before:"The film ",after:" at eight. (start)"},{answer:"speak",before:"They ",after:" three languages. (speak)"},{answer:"studies",before:"She ",after:" medicine at university. (study)"},{answer:"finishes",before:"He ",after:" work at six. (finish)"},{answer:"live",before:"I ",after:" near the city centre. (live)"}]},{type:"gap",title:"Negatives and questions",sub:"Fill each gap with the correct negative or question form.",items:[{answer:"doesn't eat",before:"He ",after:" meat. (not eat)"},{answer:"don't understand",before:"I ",after:" the question. (not understand)"},{answer:"Do",before:"",after:" you speak Spanish? (question)"},{answer:"Does",before:"",after:" he live near here? (question)"},{answer:"don't like",before:"They ",after:" cold weather. (not like)"},{answer:"doesn't have",before:"She ",after:" a car. (not have)"}]},{type:"mc",title:"Short answers",sub:"Choose the correct short answer.",items:[{q:"Do you like coffee? \u2014 ___",opts:["Yes, I like.","Yes, I do.","Yes, do I.","Yes, I does."],answer:"Yes, I do.",explanation:"Short answer with do/does: Yes, I do."},{q:"Does she work here? \u2014 ___",opts:["No, she doesn't.","No, she don't.","No, she doesn't work.","No, doesn't she."],answer:"No, she doesn't.",explanation:"Short answer for she: No, she doesn't."},{q:"Do they speak English? \u2014 ___",opts:["Yes, they speak.","Yes, they does.","Yes, they do.","Yes, do they."],answer:"Yes, they do.",explanation:"Short answer for they: Yes, they do."},{q:"Does he have a brother? \u2014 ___",opts:["Yes, he has.","Yes, he does.","Yes, does he.","Yes, he do."],answer:"Yes, he does.",explanation:"Short answer for he: Yes, he does."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"Maria works in a bank.",keyword:"doesn't",answer:"Maria doesn't work in a bank."},{original:"They play tennis every Sunday.",keyword:"Do",answer:"Do they play tennis every Sunday?"},{original:"She doesn't like coffee.",keyword:"likes",answer:"She likes coffee."},{original:"He lives near here.",keyword:"Does",answer:"Does he live near here?"},{original:"I understand the question.",keyword:"don't",answer:"I don't understand the question."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"He work in a restaurant.",correct:"He works in a restaurant.",hint:"He/she/it \u2192 add -s."},{wrong:"Does she works here?",correct:"Does she work here?",hint:"\"Does\" + base form, no -s."},{wrong:"They doesn't have a car.",correct:"They don't have a car.",hint:"\"They\" \u2192 \"don't\", not \"doesn't\"."},{wrong:"I'm not understand.",correct:"I don't understand.",hint:"State verb \u2014 simple form only."},{wrong:"She go to work by bus.",correct:"She goes to work by bus.",hint:"She \u2192 add -es to go."},{wrong:"Do he speak French?",correct:"Does he speak French?",hint:"He/she/it \u2192 does in questions."}]}]},

{id:"presentcontinuous",title:"Present continuous",subtitle:"I'm working, she's reading",intro:"What's happening right now \u2014 or around now.",desc:"The present continuous describes actions happening at the moment of speaking, or temporary situations in the current period.",tip:"Some verbs don't normally use the -ing form. The most common: <strong>know, love, understand, want, need</strong>. Say <strong>\"I know\"</strong> \u2014 not \"I'm knowing.\" <strong>\"I understand\"</strong> \u2014 not \"I'm understanding.\"",explanation:"<p>The present continuous is formed with <strong>be + verb-ing</strong>. It is used for actions <strong>happening right now</strong> and <strong>temporary situations</strong> around the present period.</p>\n<p><strong>-ing spelling rules:</strong> most verbs just add -ing. Verbs ending in -e drop it: come \u2192 com<strong>ing</strong>, have \u2192 hav<strong>ing</strong>. Short verbs ending in single vowel + consonant double the consonant: run \u2192 run<strong>n</strong>ing, sit \u2192 sit<strong>t</strong>ing.</p>\n<div class=\"note\"><strong>State verbs do not use the -ing form \u2014 even right now.</strong><br>\nState verbs describe mental states, feelings, senses, and possession \u2014 not actions in progress. The most important ones to remember: <em>know, understand, believe, think (= have an opinion), like, love, hate, prefer, want, need, own, have (= possess), see, hear, smell, taste.</em><br>\n<em>\"I know the answer.\"</em> \u2713 &nbsp;&nbsp; <em>\"I am knowing the answer.\"</em> \u2717<br>\n<em>\"She wants coffee.\"</em> \u2713 &nbsp;&nbsp; <em>\"She is wanting coffee.\"</em> \u2717</div>",table:{headers:["Form","Example","Notes"],rows:[["Positive","I am working / She is eating","Contraction: I'm, she's, they're"],["Negative","He isn't listening","= is not listening"],["Question","Are you coming?","Invert subject and be"],["Spelling: -e","come \u2192 coming","Drop the -e before -ing"],["Spelling: CVC","run \u2192 running","Double the final consonant"]]},examples:[{type:"pos",eng:"I'm studying English.",note:"Happening right now."},{type:"pos",eng:"She's staying with friends this week.",note:"Temporary situation."},{type:"neg",eng:"He isn't listening to me.",note:"Be + not + -ing."},{type:"neg",eng:"We aren't going to the party.",note:"Future arrangement being cancelled."},{type:"q",eng:"What are you doing?",note:"The most common present continuous question."},{type:"q",eng:"Is it raining?",note:"Weather happening now."}],errors:[{bad:"I'm not understanding this.",good:"I don't understand this.",reason:"Understand is a state verb \u2014 it describes a mental state, not an action. Never used in the continuous."},{bad:"She is wanting a coffee.",good:"She wants a coffee.",reason:"Want is a state verb \u2014 use the present simple."},{bad:"I am knowing the answer.",good:"I know the answer.",reason:"Know is a state verb \u2014 never used in continuous form."},{bad:"They are having a car.",good:"They have a car.",reason:"Have (= possess) is a state verb. Have (= eat/experience) CAN be continuous: 'They are having lunch.'"}],realUse:["\"What are you up to?\" / \"Just watching TV.\"","\"And she's crossing the finish line...\" \u2014 live events.","\"You're always losing your keys!\" \u2014 with \"always\" = annoying habit.","\"Things are getting better.\" \u2014 ongoing change."],exercises:[{type:"gap",title:"Present continuous \u2014 positive",sub:"Fill each gap with the present continuous form. Use contractions where possible.",items:[{answer:"is raining",before:"It ",after:" outside. (rain)"},{answer:"'m studying",before:"I ",after:" for an exam right now. (study)"},{answer:"are watching",before:"They ",after:" a film at the moment. (watch)"},{answer:"is cooking",before:"She ",after:" dinner. (cook)"},{answer:"'m working",before:"I ",after:" from home this week. (work)"},{answer:"is getting",before:"The weather ",after:" better. (get)"},{answer:"are playing",before:"The children ",after:" in the garden. (play)"},{answer:"is sitting",before:"He ",after:" next to me. (sit)"}]},{type:"gap",title:"Negatives and questions",sub:"Fill each gap \u2014 negative or question form of the present continuous.",items:[{answer:"isn't listening",before:"He ",after:" to me. (not listen)"},{answer:"aren't coming",before:"They ",after:" to the party. (not come)"},{answer:"Are",before:"",after:" you coming tomorrow? (question)"},{answer:"Is",before:"",after:" she still working? (question)"},{answer:"aren't sleeping",before:"The children ",after:" \u2014 they're playing! (not sleep)"}]},{type:"categorise",title:"Action verb or state verb?",sub:"Click a verb, then click the correct column.",categories:[{name:"Action verb \u2713 (can use -ing)",items:["run","eat","talk","sleep","write","watch","cook","study"]},{name:"State verb \u2717 (avoid -ing)",items:["know","love","understand","want","believe","need","hate","prefer"]}]},{type:"mc",title:"Present simple or present continuous?",sub:"Choose the correct form.",items:[{q:"She _____ a great book at the moment.",opts:["reads","is reading","read","reading"],answer:"is reading",explanation:"Temporary activity in progress right now \u2192 present continuous."},{q:"I _____ what you mean.",opts:["'m not understanding","don't understand","not understand","isn't understanding"],answer:"don't understand",explanation:"\"Understand\" is a state verb \u2014 always use simple form."},{q:"He _____ in London temporarily.",opts:["lives","is living","living","live"],answer:"is living",explanation:"Temporary situation \u2192 present continuous."},{q:"She _____ tennis every Saturday.",opts:["is playing","plays","playing","play"],answer:"plays",explanation:"Regular, repeated activity \u2192 present simple."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I'm knowing the answer.",correct:"I know the answer.",hint:"State verb \u2014 no -ing."},{wrong:"She's haveing lunch.",correct:"She's having lunch.",hint:"Drop the -e before -ing."},{wrong:"They runing in the park.",correct:"They are running in the park.",hint:"Need be + -ing. Double the n in run."},{wrong:"He is not understand.",correct:"He doesn't understand.",hint:"State verb \u2014 use simple, not continuous."},{wrong:"Is she work today?",correct:"Is she working today?",hint:"Present continuous question needs -ing."}]}]},

{id:"imperatives",title:"Imperatives",subtitle:"Do this. Don't do that.",intro:"Short, direct, and powerful. Imperatives do a lot of work in English.",desc:"Imperatives are formed from the base verb \u2014 no subject, no auxiliary. They're used for instructions, requests, commands, warnings, advice, and invitations.",tip:"A short imperative can sound rude. Just add <strong>please</strong> to make it polite: \"Sit down.\" \u2192 \"Please sit down.\" Very easy, very important \u2014 especially in English.",explanation:"<p>The imperative uses the <strong>base form of the verb</strong> with no subject and no auxiliary. It works for instructions, commands, requests, warnings, advice, and invitations.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Positive:</strong> base verb only. <em>\"Sit down.\"</em> / <em>\"Open your books.\"</em> / <em>\"Turn left.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Negative:</strong> don't + base verb. <em>\"Don't move.\"</em> / <em>\"Don't be late.\"</em> \u2014 never <em>\"Don't to move\"</em> or <em>\"Don't moving\"</em>.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Let's + base verb</strong> \u2014 a suggestion including yourself. <em>\"Let's go!\"</em> / <em>\"Let's have a break.\"</em> \u2014 never <em>\"Let's to go\"</em>.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Please</strong> makes any imperative more polite. <em>\"Sit down.\"</em> \u2192 <em>\"Please sit down.\"</em> or <em>\"Sit down, please.\"</em></div></div>\n<div class=\"note\">A bare imperative can sound rude in English \u2014 context and tone matter. <em>\"Could you sit down?\"</em> or <em>\"Would you mind sitting down?\"</em> are softer alternatives when you need to be polite to someone you do not know well.</div>",table:{headers:["Form","Example","Use"],rows:[["Positive imperative","Sit down. / Open your books.","Instructions, commands"],["Negative imperative","Don't move. / Don't be late.","Prohibitions, warnings"],["With please","Please be quiet.","Polite requests"],["With do","Do sit down!","Emphasis or warmth"],["With let's","Let's go! / Let's have a break.","First person plural suggestion"]]},examples:[{type:"pos",eng:"Turn left at the traffic lights.",note:"Giving directions."},{type:"pos",eng:"Don't forget your passport!",note:"Reminder/warning."},{type:"pos",eng:"Let's meet at seven.",note:"\"Let's\" = let us \u2014 a shared suggestion."},{type:"neg",eng:"Don't be so hard on yourself.",note:"Giving emotional advice."},{type:"q",eng:"Could you open the window?",note:"Polite alternative to bare imperative."},{type:"q",eng:"Would you mind closing the door?",note:"Most polite form."}],errors:[{bad:"You go straight on.",good:"Go straight on.",reason:"Imperatives have no subject \u2014 drop you."},{bad:"Don't to smoke here.",good:"Don't smoke here.",reason:"\"Don't\" + base verb, no \"to\"."},{bad:"Let's to go to the beach.",good:"Let's go to the beach.",reason:"\"Let's\" + base verb, no \"to\"."},{bad:"Please to sit down.",good:"Please sit down.",reason:"\"Please\" + base verb, no \"to\"."}],realUse:["Recipes: \"Add the onions. Stir for two minutes.\"","Signs: \"Push.\" / \"Keep out.\" / \"Do not disturb.\"","\"Come on!\" / \"Look out!\" / \"Hang on.\" \u2014 high-frequency spoken imperatives.","\"Get some rest.\" / \"Don't overthink it.\" \u2014 advice."],exercises:[{type:"gap",title:"Positive and negative imperatives",sub:"Fill each gap with the correct imperative form of the verb in brackets.",items:[{answer:"Turn",before:"",after:" right at the traffic lights. (turn)"},{answer:"Don't forget",before:"",after:" your keys! (not forget)"},{answer:"Sit",before:"",after:" down, please. (sit)"},{answer:"Don't be",before:"",after:" late! (not be)"},{answer:"Open",before:"",after:" your books to page ten. (open)"},{answer:"Don't touch",before:"",after:" that! It's hot! (not touch)"}]},{type:"match",title:"Match imperative to function",sub:"Match each imperative sentence to its function.",leftHead:"Sentence",rightHead:"Function",pairs:[{left:"Turn left at the lights.",right:"Giving directions"},{left:"Don't touch that!",right:"Warning / prohibition"},{left:"Let's have a break.",right:"Suggestion (we)"},{left:"Please come in.",right:"Polite invitation"},{left:"Add the onions and stir.",right:"Recipe instruction"},{left:"Get some rest.",right:"Giving advice"}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["turn","right","at","the","corner"],answer:"turn right at the corner",context:"Giving directions."},{words:["don't","be","late","!"],answer:"don't be late !",context:"A warning."},{words:["let's","go","to","the","cinema"],answer:"let's go to the cinema",context:"A suggestion."},{words:["please","don't","make","noise"],answer:"please don't make noise",context:"A polite prohibition."},{words:["always","check","your","work"],answer:"always check your work",context:"Advice with 'always'."}]},{type:"mc",title:"Polite or direct?",sub:"Choose the most appropriate form.",items:[{q:"You're in a meeting. You want someone to be quiet. You say:",opts:["Shut up!","Please be quiet.","You be quiet.","Don't to talk."],answer:"Please be quiet.",explanation:"Please + imperative = polite request. Much more appropriate in a professional context."},{q:"You want to suggest going to lunch together. You say:",opts:["Go to lunch.","You go to lunch.","Let's go to lunch.","Don't go to lunch."],answer:"Let's go to lunch.",explanation:"Let's = joint suggestion including yourself."},{q:"You see someone about to touch a hot pan. You say:",opts:["Please don't touch it.","Don't touch it!","You don't touch it.","Not touch it!"],answer:"Don't touch it!",explanation:"Urgent warning \u2014 no 'please' needed. Direct is correct here."},{q:"A guest arrives. You want them to enter. You say:",opts:["Enter!","You come in.","Please come in.","Come in please you."],answer:"Please come in.",explanation:"Please come in \u2014 polite invitation to enter."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Don't to worry about it.",correct:"Don't worry about it.",hint:"Don't + base verb, no \"to\"."},{wrong:"Let's to have a break.",correct:"Let's have a break.",hint:"Let's + base verb, no \"to\"."},{wrong:"You turn left at the lights.",correct:"Turn left at the lights.",hint:"Imperatives have no subject."},{wrong:"Please to come in.",correct:"Please come in.",hint:"Please + base verb, no \"to\"."},{wrong:"Don't forgot your keys.",correct:"Don't forget your keys.",hint:"Don't + base form. Not past tense."}]}]},
