{id:"thereisare",title:"There is / There are",subtitle:"Saying something exists",intro:"How to say that something exists \u2014 or doesn't \u2014 in a place.",desc:"There is and there are are used to introduce or confirm the existence of something. The choice depends on whether the noun that follows is singular or plural.",tip:"\"There's a park near here.\" This is how English says something exists. Don't say \"It is a park near here.\" That's a translation. Use <strong>there is / there are</strong> to introduce new information.",explanation:"<p>We use <strong>there is / there are</strong> to say that something exists. The verb agrees with the noun that follows it \u2014 not with the word <em>there</em>.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>There is / there's</strong> \u2014 singular or uncountable noun follows. <em>\"There is a park near here.\"</em> / <em>\"There's a problem.\"</em> / <em>\"There isn't any milk.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>There are</strong> \u2014 plural noun follows. <em>\"There are twenty students.\"</em> / <em>\"There aren't any seats left.\"</em> / <em>\"Are there any messages?\"</em></div></div>\n<div class=\"note\"><strong>Don't confuse there is with it is.</strong> <em>\"There is a bank near here.\"</em> = it exists. <em>\"It is a bank\"</em> = describing what something is. Use <em>there is/are</em> to introduce new information about existence \u2014 this is not the same as a description.<br>\n<strong>Short answers never contract:</strong> <em>\"Is there a chemist nearby?\" \"Yes, there is.\"</em> \u2014 NOT <em>\"Yes, there's.\"</em></div>",table:{headers:["Form","Singular","Plural"],rows:[["Positive","There is a park. / There's...","There are three bedrooms."],["Negative","There isn't a bus stop here.","There aren't any seats left."],["Question","Is there a chemist nearby?","Are there any restaurants?"],["Short answer","Yes, there is. / No, there isn't.","Yes, there are. / No, there aren't."]]},examples:[{type:"pos",eng:"There's a great cafe on the corner.",note:"Introducing new information."},{type:"pos",eng:"There are twenty students in the class.",note:"Plural noun \u2192 there are."},{type:"neg",eng:"There isn't any milk in the fridge.",note:"Uncountable noun \u2192 there isn't."},{type:"neg",eng:"There aren't any tickets left.",note:"Plural noun \u2192 there aren't."},{type:"q",eng:"Is there a pharmacy near here?",note:"Singular question \u2014 answer: \"Yes, there is.\""},{type:"q",eng:"Are there any messages for me?",note:"Plural question with any."}],errors:[{bad:"It is a bank near here.",good:"There is a bank near here.",reason:"Use \"there is\" to introduce the existence of something."},{bad:"There is five people waiting.",good:"There are five people waiting.",reason:"\"Five people\" is plural \u2014 use \"there are\"."},{bad:"Are there a swimming pool?",good:"Is there a swimming pool?",reason:"\"A swimming pool\" is singular \u2014 use \"is there\"."},{bad:"There are a lot of noise.",good:"There is a lot of noise.",reason:"\"Noise\" is uncountable \u2014 use \"there is\"."}],realUse:["\"There's been an accident.\" \u2014 present perfect form.","\"Are there any questions?\" \u2014 standard way to close a presentation.","\"Was there a message for me?\" \u2014 past form.","\"There will be delays.\" \u2014 future form with will."],exercises:[{type:"gap",title:"There is or there are?",sub:"Fill each gap with there is, there are, there isn't, or there aren't.",items:[{answer:"There's",before:"",after:" a great park near my house."},{answer:"There are",before:"",after:" twenty students in this class."},{answer:"There isn't",before:"",after:" any milk in the fridge."},{answer:"Is there",before:"",after:" a pharmacy near here?"},{answer:"There aren't",before:"",after:" any tickets left."},{answer:"There are",before:"",after:" a lot of people waiting."},{answer:"Are there",before:"",after:" any seats available?"},{answer:"There is",before:"",after:" a problem with my order."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue \u2014 use there is, there are, is there or are there.",lines:[{speaker:"A",text:"Excuse me, [is there] a pharmacy near here?"},{speaker:"B",text:"Yes, [there is] one on the next street."},{speaker:"A",text:"And [are there] any cash machines nearby?"},{speaker:"B",text:"[There are] two \u2014 one in the supermarket and one outside the bank."},{speaker:"A",text:"Great. [Is there] a cafe too? I need a coffee."},{speaker:"B",text:"Of course! [There are] three cafes on the main square."}]},{type:"mc",title:"Short answers",sub:"Choose the correct short answer.",items:[{q:"Is there a bank near here? \u2014 ___",opts:["Yes, there's.","Yes, there is.","Yes, is there.","Yes, there are."],answer:"Yes, there is.",explanation:"Short answers with there is never contract."},{q:"Are there any questions? \u2014 ___",opts:["No, there isn't.","No, aren't.","No, there aren't.","No, there aren't any."],answer:"No, there aren't.",explanation:"Short answer for there are: No, there aren't."},{q:"___ any milk in the fridge?",opts:["Is there","Are there","There is","There are"],answer:"Is there",explanation:"Milk is uncountable (singular) \u2192 is there."},{q:"___ a lot of noise outside.",opts:["There are","Are there","There is","Is there"],answer:"There is",explanation:"Noise is uncountable \u2192 there is."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"A bank is on the corner.",keyword:"there",answer:"There is a bank on the corner."},{original:"Are any seats available?",keyword:"there",answer:"Are there any seats available?"},{original:"No milk is in the fridge.",keyword:"there",answer:"There is no milk in the fridge."},{original:"Twenty students are in the class.",keyword:"there",answer:"There are twenty students in the class."},{original:"Were any problems?",keyword:"there",answer:"Were there any problems?"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"It is a bank near here.",correct:"There is a bank near here.",hint:"Use \"there is\" not \"it is\" to say something exists."},{wrong:"There is five people waiting.",correct:"There are five people waiting.",hint:"Five people = plural \u2192 there are."},{wrong:"Are there a swimming pool?",correct:"Is there a swimming pool?",hint:"Singular noun \u2192 is there."},{wrong:"There are a lot of noise.",correct:"There is a lot of noise.",hint:"Noise is uncountable \u2192 there is."},{wrong:"Yes, there's.",correct:"Yes, there is.",hint:"Short answers with there is never contract."}]}]},

{id:"possessives",title:"Possessive adjectives & pronouns",subtitle:"my/your/his... and mine/yours/his...",intro:"Whose is it? Two overlapping systems \u2014 adjectives before nouns, pronouns that stand alone.",desc:"English has two ways to express possession. Possessive adjectives (my, your, his) always come before a noun. Possessive pronouns (mine, yours, his) stand alone.",tip:"Very common mistake: <strong>\"This bag is my.\"</strong> Wrong. You need <strong>\"This bag is mine.\"</strong> When the word stands alone \u2014 no noun after it \u2014 use <em>mine, yours, hers, his, ours, theirs</em>.",explanation:"<p>English has two ways to express possession. Choosing the wrong one is a very common mistake.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Possessive adjectives</strong> (my, your, his, her, its, our, their) \u2014 always come <em>before</em> a noun. They describe the noun. <em>\"My book.\"</em> / <em>\"Her car.\"</em> / <em>\"Their house.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Possessive pronouns</strong> (mine, yours, his, hers, ours, theirs) \u2014 stand <em>alone</em>, with no noun after them. They replace the whole noun phrase. <em>\"The book is mine.\"</em> / <em>\"Is this yours?\"</em> / <em>\"The house is theirs.\"</em></div></div>\n<div class=\"note\"><strong>The most common error:</strong> <em>\"This bag is my.\"</em> \u2717 \u2014 <em>my</em> needs a noun after it. When standing alone, you need the pronoun: <em>\"This bag is mine.\"</em> \u2713<br>\n<strong>Its vs it's:</strong> <em>its</em> (no apostrophe) = possessive adjective: <em>\"The dog wagged its tail.\"</em> &nbsp; <em>it's</em> (with apostrophe) = it is: <em>\"It's cold today.\"</em></div>",table:{headers:["Subject","Possessive adjective","Possessive pronoun"],rows:[["I","my \u2014 my book","mine \u2014 the book is mine"],["you","your \u2014 your car","yours \u2014 the car is yours"],["he","his \u2014 his coat","his \u2014 the coat is his"],["she","her \u2014 her bag","hers \u2014 the bag is hers"],["it","its \u2014 its tail","(its \u2014 rarely used alone)"],["we","our \u2014 our house","ours \u2014 the house is ours"],["they","their \u2014 their children","theirs \u2014 the children are theirs"]]},examples:[{type:"pos",eng:"That's my coat.",note:"Possessive adjective before noun."},{type:"pos",eng:"The blue one is mine.",note:"Possessive pronoun \u2014 stands alone."},{type:"pos",eng:"Their house is bigger than ours.",note:"Two possessive pronouns in one sentence."},{type:"neg",eng:"That bag isn't hers.",note:"Possessive pronoun after negative be."},{type:"q",eng:"Is this your passport?",note:"Possessive adjective in a question."},{type:"q",eng:"Whose coat is this? \u2014 It's mine.",note:"Possessive pronoun as a standalone answer."}],errors:[{bad:"This is my.",good:"This is mine.",reason:"Possessive adjectives cannot stand alone."},{bad:"It's dog is friendly.",good:"Its dog is friendly.",reason:"\"It's\" = it is. \"Its\" (no apostrophe) = possessive."},{bad:"Their house is bigger than our.",good:"Their house is bigger than ours.",reason:"Possessive pronoun needed, not adjective."},{bad:"The bag is her.",good:"The bag is hers.",reason:"Possessive pronoun \"hers\" needed."}],realUse:["\"Is this yours?\" / \"No, it's hers.\" \u2014 everyday conversation.","\"Mind your own business.\" \u2014 fixed expression.","\"John's car\" / \"Spain's capital\" \u2014 proper nouns + apostrophe-s.","\"Ours is bigger.\" \u2014 possessive pronoun replacing a whole noun phrase."],exercises:[{type:"gap",title:"Possessive adjectives",sub:"Fill each gap with the correct possessive adjective.",items:[{answer:"my",before:"I forgot ",after:" keys again."},{answer:"their",before:"They are visiting ",after:" parents this weekend."},{answer:"her",before:"Maria loves ",after:" job."},{answer:"its",before:"The dog wagged ",after:" tail."},{answer:"our",before:"We love ",after:" new apartment."},{answer:"his",before:"He left ",after:" phone at home."},{answer:"your",before:"Is this ",after:" bag?"},{answer:"their",before:"The children forgot ",after:" lunch."}]},{type:"gap",title:"Possessive pronouns",sub:"Fill each gap with the correct possessive pronoun.",items:[{answer:"yours",before:"That's not my coat \u2014 it must be ",after:"."},{answer:"hers",before:"The red bag is ",after:"."},{answer:"ours",before:"Their garden is smaller than ",after:"."},{answer:"his",before:"I have my ticket. Does he have ",after:"?"},{answer:"mine",before:"This is not your problem \u2014 it's ",after:"."},{answer:"theirs",before:"Our car is new. ",after:" is old."}]},{type:"match",title:"Adjective to pronoun",sub:"Match each possessive adjective to its pronoun form.",leftHead:"Adjective (+ noun)",rightHead:"Pronoun (alone)",pairs:[{left:"my book",right:"mine"},{left:"your car",right:"yours"},{left:"his coat",right:"his"},{left:"her bag",right:"hers"},{left:"our house",right:"ours"},{left:"their children",right:"theirs"}]},{type:"mc",title:"Adjective or pronoun?",sub:"Choose the correct possessive form.",items:[{q:"This is not your coat \u2014 it's ___.",opts:["my","mine","me","I"],answer:"mine",explanation:"Stands alone (no noun after it) \u2192 possessive pronoun: mine."},{q:"The cat hurt ___ paw.",opts:["it's","its","their","hers"],answer:"its",explanation:"\"Its\" (no apostrophe) = possessive adjective for it."},{q:"Our team won. ___ team lost.",opts:["Their","Theirs","They","Them"],answer:"Their",explanation:"Before a noun (team) \u2192 possessive adjective: their."},{q:"Whose keys are these? \u2014 They're ___.",opts:["her","hers","she","herself"],answer:"hers",explanation:"Stands alone \u2014 possessive pronoun: hers."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"This bag is my.",correct:"This bag is mine.",hint:"Stands alone \u2192 possessive pronoun."},{wrong:"It's tail is wagging.",correct:"Its tail is wagging.",hint:"\"Its\" (no apostrophe) = possessive."},{wrong:"Their apartment is bigger than our.",correct:"Their apartment is bigger than ours.",hint:"Possessive pronoun needed."},{wrong:"I have my ticket. Do you have your?",correct:"Do you have yours?",hint:"Stands alone \u2192 yours, not your."},{wrong:"She lost her bag. The bag is her.",correct:"The bag is hers.",hint:"Stands alone \u2192 hers."}]}]},

{id:"preposplace",title:"Prepositions of place",subtitle:"in, on, at, above, under, next to...",intro:"Where is it? English has a rich system for locating things in space.",desc:"Prepositions of place are one of those areas where direct translation from other languages regularly fails. The in/on/at trio alone causes problems for years if not understood from the beginning.",tip:"Think of the three main ones like this: <strong>in</strong> = inside something. <strong>On</strong> = on a surface. <strong>At</strong> = at a point or place. \"I'm in the kitchen.\" \"The keys are on the table.\" \"See you at the station.\"",explanation:"<p>The three key prepositions of place are <strong>in</strong>, <strong>on</strong>, and <strong>at</strong>. Many errors come from translating directly from another language \u2014 English does not always match.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>In</strong> \u2014 enclosed or surrounded: inside a space, a city, a country. <em>\"In the room.\"</em> / <em>\"In London.\"</em> / <em>\"In a taxi.\"</em> / <em>\"In bed.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>On</strong> \u2014 a surface, a line, or a floor. <em>\"On the table.\"</em> / <em>\"On the bus.\"</em> / <em>\"On the third floor.\"</em> / <em>\"On the right.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>At</strong> \u2014 a point or destination. Often used with places where you do an activity. <em>\"At home.\"</em> / <em>\"At work.\"</em> / <em>\"At school.\"</em> / <em>\"At the station.\"</em> / <em>\"At the airport.\"</em></div></div>\n<div class=\"note\"><strong>Transport:</strong> <em>on</em> the bus / train / plane / bike (public transport). <em>in</em> a taxi / car (private vehicle).<br>\n<strong>Fixed expressions:</strong> <em>at home, at work, at school</em> \u2014 no article, always <em>at</em>. <em>\"I'm at home\"</em> \u2014 never <em>\"I'm in the home\"</em> or <em>\"I'm in home\"</em>.</div>",table:{headers:["Preposition","Use","Examples"],rows:[["in","enclosed, inside","in the room, in London, in a box"],["on","surface, line","on the table, on the bus, on the third floor"],["at","point, destination","at home, at work, at the station"],["above","higher than","the picture above the fireplace"],["under / below","lower than","under the table, below sea level"],["next to / beside","immediately to the side","next to the door, beside me"],["between","in the middle of two things","between the bank and the caf\u00e9"]]},examples:[{type:"pos",eng:"She's in the kitchen.",note:"Enclosed space \u2192 in."},{type:"pos",eng:"The keys are on the table.",note:"Surface \u2192 on."},{type:"pos",eng:"I'll meet you at the station.",note:"Destination point \u2192 at."},{type:"pos",eng:"The cat is under the sofa.",note:"Below and in contact \u2192 under."},{type:"q",eng:"Where's the remote control?",note:"Asking for location."},{type:"q",eng:"Is there a pharmacy at the airport?",note:"\"At\" the airport \u2014 a destination point."}],errors:[{bad:"She is on the kitchen.",good:"She is in the kitchen.",reason:"Rooms and enclosed spaces use in."},{bad:"I live in the third floor.",good:"I live on the third floor.",reason:"Floors in buildings use on."},{bad:"I'm in home.",good:"I'm at home.",reason:"\"At home\" is a fixed expression."},{bad:"The book is in the shelf.",good:"The book is on the shelf.",reason:"A shelf is a surface \u2192 on."}],realUse:["\"I'm on the bus.\" / \"I'm in a taxi.\" \u2014 on for public transport, in for private vehicles.","\"I'll be there in five minutes.\" \u2014 \"in\" + time period.","\"She's at the doctor's.\" \u2014 \"at\" for appointments.","\"The meeting is on Tuesday, at 3pm, in the conference room.\" \u2014 all three."],exercises:[{type:"gap",title:"In, on or at?",sub:"Fill each gap with in, on, or at.",items:[{answer:"in",before:"She's ",after:" the kitchen."},{answer:"on",before:"The book is ",after:" the table."},{answer:"at",before:"I'll see you ",after:" the station."},{answer:"on",before:"My office is ",after:" the third floor."},{answer:"in",before:"I'm ",after:" a taxi right now."},{answer:"at",before:"She's ",after:" work today."},{answer:"on",before:"They met ",after:" the bus."},{answer:"in",before:"He was born ",after:" Rome."}]},{type:"gap",title:"More prepositions of place",sub:"Fill each gap with under, above, next to, between, or behind.",items:[{answer:"under",before:"The cat is sleeping ",after:" the sofa."},{answer:"next to",before:"The bank is ",after:" the supermarket."},{answer:"above",before:"There's a shelf ",after:" the desk."},{answer:"between",before:"The caf\u00e9 is ",after:" the bank and the post office."},{answer:"behind",before:"The car park is ",after:" the shopping centre."}]},{type:"categorise",title:"Categorise",sub:"Click a phrase, then click the correct column.",categories:[{name:"in",items:["the kitchen","a taxi","London","a box","the sky","the fridge"]},{name:"on",items:["the table","the bus","the third floor","the wall","the right"]},{name:"at",items:["home","work","the station","school","the airport","the doctor's"]}]},{type:"mc",title:"Choose the correct preposition",sub:"Choose the correct preposition.",items:[{q:"I'm ___ the bus, I'll be there soon.",opts:["in","on","at","under"],answer:"on",explanation:"Public transport uses on: on the bus, on the train, on the plane."},{q:"She's waiting ___ the bus stop.",opts:["in","on","at","next to"],answer:"at",explanation:"A bus stop is a point/destination \u2192 at."},{q:"He works ___ a hospital.",opts:["on","in","at","under"],answer:"in",explanation:"A hospital is an enclosed space/building \u2192 in."},{q:"The keys are ___ your coat pocket.",opts:["on","at","in","above"],answer:"in",explanation:"Inside a pocket \u2192 in."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She is on the kitchen.",correct:"She is in the kitchen.",hint:"Rooms use in."},{wrong:"I live in the third floor.",correct:"I live on the third floor.",hint:"Floors use on."},{wrong:"I'm in home.",correct:"I'm at home.",hint:"\"At home\" is fixed."},{wrong:"The book is in the shelf.",correct:"The book is on the shelf.",hint:"Surfaces use on."},{wrong:"He's at the garden.",correct:"He's in the garden.",hint:"The garden is an enclosed space \u2192 in."}]}]},

{id:"prepostime",title:"Prepositions of time",subtitle:"at, in, on \u2014 with time expressions",intro:"At three o'clock. On Monday. In January. Three prepositions cover most time reference at A1.",desc:"The same three prepositions (at, in, on) that locate things in space also locate them in time \u2014 but with different rules.",tip:"Simple guide: <strong>at</strong> for times (at 6pm), <strong>on</strong> for days (on Monday), <strong>in</strong> for months and years (in March, in 2019). And no preposition with <em>next, last, this</em>: \"See you next Monday\" \u2014 not \"on next Monday.\"",explanation:"<p>The same three prepositions \u2014 <em>at, on, in</em> \u2014 also locate things in time. The rules are different from their place meanings and must be learnt separately.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>At</strong> \u2014 specific clock times and fixed time points. <em>\"At 6pm.\"</em> / <em>\"At midnight.\"</em> / <em>\"At noon.\"</em> / <em>\"At Christmas.\"</em> / <em>\"At the weekend.\"</em> (British English)</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>On</strong> \u2014 days and dates. <em>\"On Monday.\"</em> / <em>\"On 5th March.\"</em> / <em>\"On my birthday.\"</em> / <em>\"On New Year's Day.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>In</strong> \u2014 months, years, seasons, and times of day. <em>\"In January.\"</em> / <em>\"In 2019.\"</em> / <em>\"In winter.\"</em> / <em>\"In the morning.\"</em> / <em>\"In the evening.\"</em> Exception: <em>at night</em> (not <em>in the night</em>).</div></div>\n<div class=\"note\"><strong>No preposition</strong> with <em>next, last, this, every</em> + time word: <em>\"See you next Monday\"</em> \u2014 NOT <em>\"on next Monday\"</em>. <em>\"I'll call you this evening\"</em> \u2014 NOT <em>\"in this evening\"</em>.<br>\n<strong>Useful distinction:</strong> <em>in time</em> = with enough time to spare. <em>on time</em> = exactly at the scheduled moment.</div>",table:{headers:["Preposition","Use","Examples"],rows:[["at","Clock times + fixed points","at 6pm, at noon, at midnight, at Christmas, at the weekend"],["on","Days and dates","on Monday, on 12th April, on my birthday, on New Year's Day"],["in","Months, years, seasons, times of day","in March, in 2019, in winter, in the morning"],["no prep.","This / next / last + time word","this Monday, next week, last year"]]},examples:[{type:"pos",eng:"The class starts at half past nine.",note:"\"At\" + clock time."},{type:"pos",eng:"We met on a cold Tuesday in November.",note:"Day (on) + month (in) \u2014 both in one sentence."},{type:"pos",eng:"I was born in 1990.",note:"\"In\" + year."},{type:"neg",eng:"I don't work on Sundays.",note:"\"On\" + day of the week."},{type:"q",eng:"What time does it start?",note:"Answer: \"At seven o'clock.\""},{type:"q",eng:"When do you have English class?",note:"Answer: \"On Tuesdays, at six in the evening.\""}],errors:[{bad:"The party is in Friday.",good:"The party is on Friday.",reason:"Days of the week use on."},{bad:"I was born on 1992.",good:"I was born in 1992.",reason:"Years use in."},{bad:"She arrived at the morning.",good:"She arrived in the morning.",reason:"Parts of the day use in. Exception: at night."},{bad:"See you on next Monday.",good:"See you next Monday.",reason:"No preposition with next, last, this + time word."}],realUse:["\"At the moment\" / \"at present\" \u2014 common discourse markers.","\"In time\" = with enough time to spare. \"On time\" = exactly at the scheduled time.","\"At the weekend\" (British) / \"on the weekend\" (American).","\"In the end\" = finally. \"At the end\" = at the final point of something."],exercises:[{type:"categorise",title:"At, in or on?",sub:"Click a time expression, then click the correct column.",categories:[{name:"at",items:["6 o'clock","midnight","Christmas","the weekend","noon","night"]},{name:"on",items:["Monday","14th April","my birthday","New Year's Day","a Tuesday","Saturday morning"]},{name:"in",items:["March","2019","winter","the morning","the 20th century","the evening"]}]},{type:"gap",title:"Fill the gaps",sub:"Fill each blank with at, in, on, or \u2014 (no preposition).",items:[{answer:"on",before:"The meeting is ",after:" Tuesday."},{answer:"in",before:"I was born ",after:" 1988."},{answer:"at",before:"The class starts ",after:" nine o'clock."},{answer:"in",before:"She always goes jogging ",after:" the morning."},{answer:"\u2014",before:"I'll see you ",after:" next Friday."},{answer:"at",before:"We always have dinner together ",after:" Christmas."},{answer:"on",before:"She started university ",after:" 5th September."},{answer:"in",before:"It gets dark early ",after:" winter."}]},{type:"mc",title:"At, in, on \u2014 or nothing?",sub:"Choose the correct option.",items:[{q:"I'll call you ___ the morning.",opts:["at","on","in","\u2014"],answer:"in",explanation:"Times of day (morning, afternoon, evening) use in."},{q:"We met ___ a Thursday evening in July.",opts:["at","on","in","\u2014"],answer:"on",explanation:"Specific day \u2192 on. The month and time of day follow separately."},{q:"She always works late ___ night.",opts:["in","on","at","\u2014"],answer:"at",explanation:"At night is a fixed expression \u2014 unlike other times of day which use in."},{q:"See you ___ next week.",opts:["in","on","at","\u2014"],answer:"\u2014",explanation:"No preposition before next/last/this + time word."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue with at, in, on, or \u2014 (no preposition).",lines:[{speaker:"A",text:"When is the party? [On] Saturday?"},{speaker:"B",text:"Yes, [on] Saturday evening. It starts [at] eight."},{speaker:"A",text:"And where exactly? I know it's [in] the city centre."},{speaker:"B",text:"Yes, [at] the Grand Hotel. I'll send you the address [in] the morning."},{speaker:"A",text:"Great. See you [\u2014] Saturday then!"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"The concert is in Saturday.",correct:"The concert is on Saturday.",hint:"Days of the week \u2192 on."},{wrong:"I started this job on 2019.",correct:"I started this job in 2019.",hint:"Years \u2192 in."},{wrong:"She arrived at the morning.",correct:"She arrived in the morning.",hint:"Morning/afternoon/evening \u2192 in."},{wrong:"See you on next Tuesday.",correct:"See you next Tuesday.",hint:"No preposition with next/last/this."},{wrong:"I usually go to the gym in Monday.",correct:"I usually go to the gym on Monday.",hint:"Days of the week \u2192 on."}]}]},

{id:"quantifiers",title:"Quantifiers",subtitle:"some, any, much, many, a lot of",intro:"How much? How many? The key words for talking about quantity at A1.",desc:"Quantifiers express quantity without using numbers. The some/any distinction alone accounts for a huge number of errors among beginners.",tip:"Simple rule: <strong>some</strong> in positive sentences, <strong>any</strong> in negatives and questions. \"I have some milk.\" \"I don't have any milk.\" One exception: offers. \"Would you like <strong>some</strong> coffee?\" \u2014 because you expect yes.",explanation:"<p>Quantifiers express quantity without using numbers. The most important distinction at A1 is <strong>some vs any</strong>.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Some</strong> \u2014 positive statements: <em>\"I have some milk.\"</em> / <em>\"There are some students.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Any</strong> \u2014 negative sentences and most questions: <em>\"I don't have any money.\"</em> / <em>\"Are there any seats?\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Much</strong> \u2014 with uncountable nouns, mainly in negatives and questions: <em>\"There isn't much time.\"</em> / <em>\"How much does it cost?\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Many</strong> \u2014 with countable plural nouns, mainly in negatives and questions: <em>\"There aren't many people.\"</em> / <em>\"How many students?\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>A lot of</strong> \u2014 both countable and uncountable, in positive sentences: <em>\"I have a lot of work.\"</em> / <em>\"There are a lot of people.\"</em></div></div>\n<div class=\"note\"><strong>Exception \u2014 some in offers and requests:</strong> Use <em>some</em> (not <em>any</em>) in questions when you expect the answer to be yes, especially in offers and requests. <em>\"Would you like some coffee?\"</em> / <em>\"Can I have some water?\"</em> \u2014 you are expecting a yes, so <em>some</em> feels more natural.</div>",table:{headers:["Quantifier","With","Use / example"],rows:[["some","count (pl.) + uncount","I need some milk. / There are some students."],["any","count (pl.) + uncount","I don't have any money. / Are there any seats?"],["much","uncountable","There isn't much time. / How much does it cost?"],["many","countable (plural)","There aren't many people. / How many students?"],["a lot of","both","I have a lot of work. / There are a lot of people."],]},examples:[{type:"pos",eng:"There's some coffee in the kitchen.",note:"\"Some\" in a positive statement."},{type:"pos",eng:"I have a lot of homework tonight.",note:"\"A lot of\" in positive sentences."},{type:"neg",eng:"There isn't any bread left.",note:"\"Any\" in a negative sentence."},{type:"neg",eng:"There aren't many students today.",note:"\"Many\" with plural countable noun."},{type:"q",eng:"Have you got any questions?",note:"\"Any\" in a standard question."},{type:"q",eng:"Would you like some tea?",note:"\"Some\" in an offer \u2014 we expect yes."}],errors:[{bad:"There are much people here.",good:"There are many people here.",reason:"Many with countable nouns. Much is for uncountable: much noise, much time."},{bad:"I don't have no money.",good:"I don't have any money.",reason:"Double negative \u2014 English only allows one negative per clause. Use any after don't/doesn't."},{bad:"I need some informations.",good:"I need some information.",reason:"Information is uncountable \u2014 no plural form, even with some."},{bad:"How many sugar do you take?",good:"How much sugar do you take?",reason:"Sugar is uncountable \u2192 how much, not how many."}],realUse:["\"Can I have some water, please?\" \u2014 polite request.","\"Is there any news?\" \u2014 singular uncountable noun with any."],exercises:[{type:"categorise",title:"Countable or uncountable?",sub:"Click a word, then click the correct column.",categories:[{name:"Countable",items:["students","books","cars","questions","friends","bottles"]},{name:"Uncountable",items:["information","music","water","advice","homework","money"]}]},{type:"gap",title:"Some, any, much or many?",sub:"Fill each gap with some, any, much, or many.",items:[{answer:"some",before:"There's ",after:" coffee in the kitchen."},{answer:"any",before:"Is there ",after:" milk left?"},{answer:"any",before:"I don't have ",after:" money."},{answer:"many",before:"How ",after:" students are in your class?"},{answer:"much",before:"There isn't ",after:" time before the exam."},{answer:"some",before:"Would you like ",after:" tea?"},{answer:"any",before:"There aren't ",after:" seats left."},{answer:"many",before:"There aren't ",after:" people here today."}]},{type:"mc",title:"Multiple choice",sub:"Choose the correct quantifier.",items:[{q:"I don't have _____ money.",opts:["some","any","much","many"],answer:"any",explanation:"Negative sentence \u2192 any."},{q:"How _____ people came to the party?",opts:["much","many","some","any"],answer:"many",explanation:"\"People\" is plural countable \u2192 how many."},{q:"Would you like _____ coffee?",opts:["any","some","many","much"],answer:"some",explanation:"Offer \u2192 use some, not any."},{q:"There isn't _____ time before the exam.",opts:["many","some","much","any"],answer:"much",explanation:"\"Time\" is uncountable \u2192 much in negatives."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue with some, any, much, or many.",lines:[{speaker:"A",text:"Is there [any] milk in the fridge?"},{speaker:"B",text:"Yes, there's [some] \u2014 not [much] though. Why?"},{speaker:"A",text:"I want to make coffee. How [many] cups do you want?"},{speaker:"B",text:"Just one for me. And are there [any] biscuits left?"},{speaker:"A",text:"No, there aren't [any]. I need to go shopping."},{speaker:"B",text:"Can you get [some] eggs too? We don't have [many]."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I need some informations.",correct:"I need some information.",hint:"\"Information\" is uncountable \u2014 no plural."},{wrong:"There are much people here.",correct:"There are many people here.",hint:"\"People\" is countable \u2192 many."},{wrong:"I don't have some money.",correct:"I don't have any money.",hint:"\"Any\" in negative sentences."},{wrong:"How many money do you have?",correct:"How much money do you have?",hint:"\"Money\" is uncountable \u2192 much."},{wrong:"There isn't many milk.",correct:"There isn't much milk.",hint:"\"Milk\" is uncountable \u2192 much."}]}]},

{id:"wh",title:"Wh- questions",subtitle:"who, what, where, when, why, how",intro:"Six question words that unlock almost every conversation.",desc:"Wh- questions are the engine of real communication. At A1, students need to produce them accurately and fast \u2014 not just recognise them. Word order is the key challenge.",tip:"The most common mistake: <strong>\"What means this word?\"</strong> Wrong. It should be <strong>\"What does this word mean?\"</strong> With do/does questions, the verb goes at the end: question word + does/do + subject + verb.",explanation:"<p>Wh- questions are formed by placing a question word at the start, followed by the auxiliary verb, then the subject, then the main verb. <strong>Word order is the key challenge.</strong></p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Standard word order:</strong> Question word + auxiliary (do/does/is/are/did/can/will) + subject + main verb. <em>\"Where do you live?\"</em> / <em>\"What does she do?\"</em> / <em>\"When did they arrive?\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Subject questions \u2014 the exception.</strong> When the question word IS the subject (asking about who or what does the action), there is no inversion and no auxiliary. <em>\"Who called?\"</em> \u2014 NOT <em>\"Who did call?\"</em> The <em>who</em> is already the subject. <em>\"What happened?\"</em> \u2014 same rule.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>How + adjective/adverb</strong> combinations: how much, how many, how long, how often, how far, how old. These all follow the same word order as other wh- questions.</div></div>\n<div class=\"note\"><strong>The most common word order mistake:</strong> <em>\"What means this word?\"</em> \u2717 &nbsp; \u2014 the question word is the object, not the subject, so you need an auxiliary: <em>\"What does this word mean?\"</em> \u2713</div>",table:{headers:["Question word","Asks about","Example"],rows:[["Who","person","Who is she? / Who did you meet?"],["What","thing, action","What is this? / What do you do?"],["Where","place","Where do you live?"],["When","time","When does the class start?"],["Why","reason","Why are you late?"],["How","manner, degree","How are you? / How far is it?"],["Which","choice","Which one do you prefer?"],["Whose","possession","Whose bag is this?"]]},examples:[{type:"q",eng:"What do you do for a living?",note:"Asking about job. \"Do\" is both auxiliary and main verb here."},{type:"q",eng:"Where does she work?",note:"\"Does\" for she + base verb."},{type:"q",eng:"Who called last night?",note:"\"Who\" is the subject \u2014 no inversion, no auxiliary."},{type:"q",eng:"How many languages do you speak?",note:"\"How\" + adjective/adverb = more specific question."},{type:"q",eng:"Why are you laughing?",note:"Present continuous question \u2014 invert be and subject."},{type:"q",eng:"What time is it?",note:"Fixed expression."}],errors:[{bad:"Where you live?",good:"Where do you live?",reason:"Wh- questions need an auxiliary verb. Without be/have as main verb, add do/does/did."},{bad:"What means this word?",good:"What does this word mean?",reason:"Mean is not the auxiliary \u2014 add does, and move mean to the end."},{bad:"How old has she?",good:"How old is she?",reason:"Age uses the verb to be: How old are you? How old is she?"},{bad:"Who did call you?",good:"Who called you?",reason:"Subject question \u2014 who IS the subject. No auxiliary needed. Who called? not Who did call?"}],realUse:["\"What do you do?\" = What is your job?","\"How come?\" = informal why.","\"What's it like?\" = asking for a description.","\"Who knows?\" = rhetorical question meaning nobody knows."],exercises:[{type:"gap",title:"Question words",sub:"Fill each gap with the correct question word (what, where, when, who, why, how).",items:[{answer:"Where",before:"",after:" do you live?"},{answer:"What",before:"",after:" do you do? (asking about job)"},{answer:"When",before:"",after:" does the class start?"},{answer:"Why",before:"",after:" are you laughing?"},{answer:"Who",before:"",after:" is your favourite teacher?"},{answer:"How",before:"",after:" are you?"},{answer:"Which",before:"",after:" one do you prefer \u2014 tea or coffee?"},{answer:"Whose",before:"",after:" bag is this?"}]},{type:"gap",title:"Full question formation",sub:"Fill each gap to complete the question correctly.",items:[{answer:"does",before:"Where ",after:" she work?"},{answer:"do",before:"What time ",after:" you usually wake up?"},{answer:"are",before:"How old ",after:" you?"},{answer:"did",before:"Why ",after:" she leave early?"},{answer:"does",before:"How many languages ",after:" he speak?"},{answer:"is",before:"Where ",after:" your brother from?"}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order to make a wh- question.",items:[{words:["where","do","you","live","?"],answer:"where do you live ?",context:"Asking about location."},{words:["what","does","she","do","?"],answer:"what does she do ?",context:"Asking about someone's job."},{words:["why","are","you","laughing","?"],answer:"why are you laughing ?",context:"Asking for a reason."},{words:["how","many","students","are","in","your","class","?"],answer:"how many students are in your class ?",context:"Asking about quantity."},{words:["what","time","does","the","film","start","?"],answer:"what time does the film start ?",context:"Asking about time."}]},{type:"mc",title:"Choose the question word",sub:"Select the correct wh- word.",items:[{q:"_____ is your name?",opts:["Who","What","Where","When"],answer:"What",explanation:"What = asking about things and names."},{q:"_____ do you live?",opts:["What","Who","Where","When"],answer:"Where",explanation:"Where = asking about place."},{q:"_____ is your birthday?",opts:["Where","Who","When","How"],answer:"When",explanation:"When = asking about time."},{q:"_____ is your English teacher?",opts:["What","When","Where","Who"],answer:"Who",explanation:"Who = asking about people."},{q:"_____ much does it cost?",opts:["What","How","Who","When"],answer:"How",explanation:"How much = price or quantity."},{q:"_____ do you go to work \u2014 by car or by bus?",opts:["How","When","Where","Why"],answer:"How",explanation:"How = asking about manner or method."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"What means this word?",correct:"What does this word mean?",hint:"Auxiliary + subject + verb after wh- word."},{wrong:"Where you live?",correct:"Where do you live?",hint:"Need auxiliary \"do\"."},{wrong:"How old you are?",correct:"How old are you?",hint:"Invert subject and \"be\"."},{wrong:"Why did she left early?",correct:"Why did she leave early?",hint:"After \"did\", base form \u2014 not past tense."},{wrong:"What time starts the film?",correct:"What time does the film start?",hint:"Use do/does + subject + verb."}]}]},

{id:"can",title:"Can and can't",subtitle:"Ability and permission at A1",intro:"The most important modal verb. Simple, versatile, and everywhere.",desc:"Can is probably the most useful modal verb at A1. It covers ability, permission, and requests.",tip:"Never use <strong>to</strong> after <em>can</em>: <strong>\"I can swim.\"</strong> Not \"I can to swim.\" And <em>can</em> never adds -s: \"She <strong>can</strong>\" \u2014 not \"she cans.\" Same rule for all modal verbs.",explanation:"<p><strong>Can</strong> is a modal verb \u2014 it is followed directly by the <strong>base form</strong>. No <em>to</em>, no <em>-ing</em>, no <em>-s</em> for third person.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Ability</strong> \u2014 something you know how to do or are physically capable of. <em>\"I can swim.\"</em> / <em>\"She can speak three languages.\"</em> / <em>\"Can you drive?\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Permission</strong> \u2014 asking if something is allowed, or giving/refusing permission. <em>\"Can I open the window?\"</em> / <em>\"You can sit here.\"</em> / <em>\"You can't park here.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Requests</strong> \u2014 asking someone to do something. <em>\"Can you help me?\"</em> / <em>\"Can you say that again?\"</em> <em>Could you...?</em> is slightly more polite.</div></div>\n<div class=\"note\"><strong>The most important rule:</strong> modal verbs are always followed by the base form \u2014 never <em>to</em> + infinitive and never <em>-ing</em>.<br>\n<em>\"I can swim.\"</em> \u2713 &nbsp; <em>\"I can to swim.\"</em> \u2717 &nbsp; <em>\"I can swimming.\"</em> \u2717<br>\n<em>\"She can't drive.\"</em> \u2713 &nbsp; <em>\"She can't to drive.\"</em> \u2717<br>\nThis rule applies to all modal verbs: can, could, will, would, should, must.</div>",table:{headers:["Form","Example","Use"],rows:[["can + base verb","I can speak French.","Ability"],["can't + base verb","She can't drive yet.","Inability"],["Can + subject...?","Can I use your phone?","Permission / request"],["Could + subject...?","Could you help me?","More polite request"],["Short answer","Yes, I can. / No, I can't.","Always base form"]]},examples:[{type:"pos",eng:"He can play three instruments.",note:"Natural ability."},{type:"pos",eng:"Can I sit here?",note:"Asking for permission \u2014 very common at A1."},{type:"neg",eng:"I can't find my keys.",note:"\"Can't\" = can + not, always contracted in speech."},{type:"neg",eng:"Sorry, you can't park here.",note:"Denying permission."},{type:"q",eng:"Can you help me with this?",note:"Request \u2014 polite and common."},{type:"q",eng:"What can I do for you?",note:"Offering help \u2014 fixed expression."}],errors:[{bad:"I can to swim.",good:"I can swim.",reason:"Modal verbs never followed by \"to\" + infinitive."},{bad:"She cans speak English.",good:"She can speak English.",reason:"\"Can\" never adds -s."},{bad:"I can't to understand.",good:"I can't understand.",reason:"No \"to\" after modal verbs."},{bad:"Can you to pass the salt?",good:"Can you pass the salt?",reason:"No \"to\" in requests."}],realUse:["\"Can I have the bill, please?\" \u2014 natural restaurant request.","\"You can't be serious!\" \u2014 expressing disbelief.","\"Can you hear me?\" \u2014 checking in video calls.","\"Could you...?\" \u2014 slightly more polite than \"Can you...?\""],exercises:[{type:"gap",title:"Can or can't?",sub:"Fill each gap with can or can't.",items:[{answer:"can",before:"She ",after:" play the guitar really well."},{answer:"can't",before:"I ",after:" find my passport anywhere."},{answer:"can't",before:"Sorry, you ",after:" park here."},{answer:"can",before:"What ",after:" I do for you?"},{answer:"can",before:"He ",after:" speak four languages."},{answer:"can't",before:"I ",after:" come to the party \u2014 I'm busy."},{answer:"can",before:"",after:" you help me with this?"},{answer:"can't",before:"She ",after:" drive yet. She's only sixteen."}]},{type:"gap",title:"Requests and permission",sub:"Fill each gap with Can or Could.",items:[{answer:"Can",before:"",after:" I use your charger for a minute?"},{answer:"Could",before:"Excuse me, ",after:" you help me with this? (more polite)"},{answer:"Can",before:"",after:" I open the window? It's very hot."},{answer:"Could",before:"",after:" you speak more slowly, please? (more polite)"}]},{type:"mc",title:"Short answers and structures",sub:"Choose the correct option.",items:[{q:"Can you swim? \u2014 ___",opts:["Yes, I can.","Yes, I can swim.","Yes, can.","Yes, I could."],answer:"Yes, I can.",explanation:"Short answer with can: Yes, I can. (no main verb repeated)"},{q:"Can she drive? \u2014 ___",opts:["No, she can't drive.","No, she can't.","No, can't she.","No, she couldn't."],answer:"No, she can't.",explanation:"Short negative answer: No, she can't."},{q:"He ___ play the piano \u2014 he's amazing!",opts:["can to","cans","can","is can"],answer:"can",explanation:"Can + base verb. No -s, no to."},{q:"___ you speak up? I can't hear you.",opts:["Are","Do","Can","Is"],answer:"Can",explanation:"Can you...? = polite request."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using can or can't.",lines:[{speaker:"A",text:"Excuse me, [can] you help me? I'm completely lost."},{speaker:"B",text:"Of course! Where do you want to go?"},{speaker:"A",text:"[Can] you tell me where the station is?"},{speaker:"B",text:"Sure \u2014 go straight and turn left. You [can't] miss it."},{speaker:"A",text:"[Can] I walk there, or is it too far?"},{speaker:"B",text:"You [can] walk \u2014 it's only five minutes."},{speaker:"A",text:"Great, thank you!"},{speaker:"B",text:"No problem. And if you [can't] find it, just ask again."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I can to drive.",correct:"I can drive.",hint:"No \ // ── STICKY LESSON BAR ──
function updateSticky(l){
  document.getElementById('sticky-title').textContent = l.title;
  document.getElementById('sticky-intro').textContent = l.intro.replace(/<[^>]+>/g,'');
  document.getElementById('sticky-level').textContent = document.querySelector('.level-tag') ? document.querySelector('.level-tag').textContent : '';
}
const stickyBar = document.getElementById('lesson-sticky');
const heroObserver = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    stickyBar.classList.toggle('visible', !e.isIntersecting);
  });
},{threshold:0,rootMargin:'-53px 0px 0px 0px'});
function observeHero(){
  const hero = document.querySelector('.lesson-hero');
  if(hero) heroObserver.observe(hero);
}

// ── PRINT ──
function printLesson(){
  const labels = document.querySelectorAll('.section-label');
  const wasCollapsed = [];
  labels.forEach((label,i)=>{
    const body = label.nextElementSibling;
    wasCollapsed[i] = label.classList.contains('collapsed');
    if(wasCollapsed[i]){
      label.classList.remove('collapsed');
      if(body) body.classList.remove('collapsed');
    }
  });
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      labels.forEach((label,i)=>{
        if(wasCollapsed[i]){
          label.classList.add('collapsed');
          const body = label.nextElementSibling;
          if(body) body.classList.add('collapsed');
        }
      });
    }, 500);
  }, 150);
}

// ── COLLAPSIBLE SECTIONS ──
function toggleAllSections(btn){
  const isOpen = btn.textContent === 'Open all';
  document.querySelectorAll('.section-label').forEach(label=>{
    const body = label.nextElementSibling;
    if(body && body.classList.contains('section-body')){
      if(isOpen){ label.classList.remove('collapsed'); body.classList.remove('collapsed'); }
      else { label.classList.add('collapsed'); body.classList.add('collapsed'); }
    }
  });
  btn.textContent = isOpen ? 'Close all' : 'Open all';
}

function toggleSection(label){
  label.classList.toggle('collapsed');
  const body = label.nextElementSibling;
  if(body && body.classList.contains('section-body')){
    body.classList.toggle('collapsed');
  }
}
// ── DONE STATE ──
const done = JSON.parse(localStorage.getItem('jpe-a1-done')||'[]');
let current = 0;

// ── SIDEBAR ──
function buildSidebar(){
  const nav = document.getElementById('topic-nav');
  nav.innerHTML = lessons.map((l,i)=>`
    <button class="topic-link${i===current?' active':''}${done.includes(l.id)?' done':''}" onclick="goto(${i})">
      <span class="tl-num">${String(i+1).padStart(2,'0')}</span>
      <span class="tl-check">${done.includes(l.id)?'✓':''}</span>
      <span class="tl-name">${l.title}<br><small style="font-size:11px;opacity:.6">${l.subtitle}</small></span>
    </button>`).join('');
  const pct = (done.length/lessons.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done.length}/${lessons.length}`;
}

// ── BUILD LESSON ──
function buildLesson(l, idx){
  const isLast = idx===lessons.length-1;
  const isDone = done.includes(l.id);

  const tableHTML = `<table class="form-table">
    <thead><tr>${l.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${l.table.rows.map(r=>`<tr>${r.map((c,ci)=>`<td class="${ci===0?'subject':ci===1?'form':ci===2?'neg':'example'}">${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;

  const exHTML = l.examples.map(e=>`
    <div class="example-item">
      <div class="ex-marker ${e.type}">${e.type==='pos'?'+':e.type==='neg'?'−':'?'}</div>
      <div><div class="ex-eng">${e.eng}</div><div class="ex-note">${e.note}</div></div>
    </div>`).join('');

  const errHTML = l.errors.map(e=>`
    <div class="error-row">
      <div class="error-bad"><div class="error-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Wrong</div><div class="error-text">${e.bad}</div></div>
      <div class="error-good"><div class="error-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Correct</div><div class="error-text">${e.good}</div></div>
    </div>
    `).join('');

  const realHTML = l.realUse.map(r=>`<li>${r}</li>`).join('');

  const exerciseHTML = l.exercises.map((ex,ei)=>{

    // ── GAP FILL ──
    if(ex.type==='gap'){
      const items = ex.items.map((it,ii)=>`
        <div class="gap-sentence">
          <span class="gap-num">${ii+1}.</span>
          <span>${(it.before||'').replace(/_+\s*$/,'').trimEnd()}</span>
          <span class="gap-wrap">
            <input class="gap-input" id="gap-${l.id}-${ei}-${ii}" data-answer="${it.answer}" placeholder="" autocomplete="off" style="width:${Math.max(4,it.answer.length+1)}ch">
            <span class="gap-reveal" id="gap-rev-${l.id}-${ei}-${ii}"></span>
          </span>
          <span>${(it.after||'').replace(/^\s*_+/,'').trimStart()}</span>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Gap fill</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkGap('${l.id}',${ei},${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetGap('${l.id}',${ei},${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-gap-${l.id}-${ei}"></div>
        </div></div>`;
    }

    // ── MULTIPLE CHOICE ──
    if(ex.type==='mc'){
      const items = ex.items.map((it,ii)=>`
        <div class="mc-question" id="mc-${l.id}-${ei}-${ii}">
          <div class="mc-text">${ii+1}. ${it.q}</div>
          <div class="mc-options">${it.opts.map(o=>`<button class="mc-opt" onclick="pickMC('${l.id}',${ei},${ii},'${o.replace(/'/g,"'")}','${it.answer.replace(/'/g,"'")}','${it.explanation.replace(/'/g,"'")}')" data-opt="${o}">${o}</button>`).join('')}</div>
          <div class="mc-feedback" id="mcfb-${l.id}-${ei}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Multiple choice</span>
        </div>
        <div class="ex-card-body">${items}</div></div>`;
    }

    // ── ERROR CORRECTION ──
    if(ex.type==='ec'){
      const items = ex.items.map((it,ii)=>`
        <div class="ec-item">
          <div class="ec-sentence">✗ ${it.wrong}</div>
          <div class="ec-input-row">
            <input class="ec-input" id="ec-${l.id}-${ei}-${ii}" data-answer="${it.correct}" placeholder="Write the correct sentence…">
          </div>
          <div style="font-size:11px;color:var(--ink3);margin-top:4px">Hint: ${it.hint}</div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Error correction</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkEC('${l.id}',${ei},${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetEC('${l.id}',${ei},${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-ec-${l.id}-${ei}"></div>
        </div></div>`;
    }

    // ── SENTENCE BUILDER ──
    if(ex.type==='builder'){
      const sid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>{
        const shuffled = [...it.words].sort(()=>Math.random()-.5);
        const wordBtns = shuffled.map((w,wi)=>`<button class="sb-word" id="sbw-${sid}-${ii}-${wi}" data-word="${w}" onclick="sbClick('${sid}',${ii},${wi})">${w}</button>`).join('');
        return `<div class="sb-sentence" id="sb-sent-${sid}-${ii}">
          <div class="sb-sentence-num">${ii+1}.</div>
          ${it.context?`<div class="sb-context">${it.context}</div>`:''}
          <div class="sb-slot" id="sb-slot-${sid}-${ii}"></div>
          <div class="sb-bank" id="sb-bank-${sid}-${ii}">${wordBtns}</div>
          <div class="sb-result" id="sb-res-${sid}-${ii}"></div>
        </div>`;
      }).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Sentence builder</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkBuilder('${sid}',${ex.items.length},${JSON.stringify(ex.items.map(i=>i.answer)).replace(/"/g,'&quot;')})">Check answers</button>
            <button class="btn-reset" onclick="resetBuilder('${sid}',${ex.items.length},${JSON.stringify(ex.items.map(i=>i.words)).replace(/"/g,'&quot;')})">Reset</button>
          </div>
          <div class="score-badge" id="score-sb-${sid}"></div>
        </div></div>`;
    }

    // ── MATCHING ──
    if(ex.type==='match'){
      const mid = `${l.id}-${ei}`;
      const leftBtns = ex.pairs.map((p,pi)=>`<button class="match-item" id="ml-${mid}-${pi}" data-idx="${pi}" data-side="left" onclick="matchClick('${mid}',${pi},'left')">${p.left}</button>`).join('');
      const rightShuffled = ex.pairs.map((p,pi)=>({text:p.right,idx:pi})).sort(()=>Math.random()-.5);
      const rightBtns = rightShuffled.map((p,ri)=>`<button class="match-item" id="mr-${mid}-${ri}" data-idx="${p.idx}" data-side="right" onclick="matchClick('${mid}',${ri},'right')">${p.text}</button>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Matching</span>
        </div>
        <div class="ex-card-body">
          <div class="match-cols">
            <div><div class="match-col-head">${ex.leftHead||'A'}</div>${leftBtns}</div>
            <div><div class="match-col-head">${ex.rightHead||'B'}</div>${rightBtns}</div>
          </div>
          <div class="score-badge" id="score-match-${mid}"></div>
        </div></div>`;
    }

    // ── TRANSFORMATION ──
    if(ex.type==='transform'){
      const tid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>`
        <div class="transform-item">
          <div class="transform-original">${ii+1}. ${it.original}<br><span style="font-size:12px;color:var(--ink3)">Use: <span class="transform-keyword">${it.keyword}</span></span></div>
          <input class="transform-input" id="tr-${tid}-${ii}" data-answer="${it.answer}" placeholder="Rewrite the sentence…">
          <div class="transform-reveal" id="tr-rev-${tid}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Transformation</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkTransform('${tid}',${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetTransform('${tid}',${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-tr-${tid}"></div>
        </div></div>`;
    }

    // ── CATEGORISATION ──
    if(ex.type==='categorise'){
      const cid = `${l.id}-${ei}`;
      const allWords = ex.categories.flatMap((c,ci)=>c.items.map(w=>({w,ci}))).sort(()=>Math.random()-.5);
      const wordBtns = allWords.map((item,wi)=>`<button class="cat-word" id="cw-${cid}-${wi}" data-cat="${item.ci}" onclick="catClick('${cid}',${wi})">${item.w}</button>`).join('');
      const cols = ex.categories.map((c,ci)=>`
        <div class="cat-col" id="cc-${cid}-${ci}" onclick="catColClick('${cid}',${ci})" style="cursor:pointer">
          <div class="cat-col-head" style="color:${['var(--sky)','var(--sea)','var(--sun)','var(--lav)'][ci]||'var(--ink3)'}">${c.name}</div>
          <div class="cat-col-items" id="cc-items-${cid}-${ci}"></div>
        </div>`).join('');
      const colStyle = `grid-template-columns:repeat(${ex.categories.length},1fr)`;
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Categorise</span>
        </div>
        <div class="ex-card-body">
          <div class="cat-bank" id="cb-${cid}">${wordBtns}</div>
          <div class="cat-columns" style="${colStyle}">${cols}</div>
          <div class="check-row">
            <button class="btn-check" onclick="checkCat('${cid}',${ex.categories.length})">Check answers</button>
            <button class="btn-reset" onclick="resetCat('${cid}',${ex.categories.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-cat-${cid}"></div>
        </div></div>`;
    }

    // ── CONVERSATION FILL ──
    if(ex.type==='convo'){
      const cvid = `${l.id}-${ei}`;
      let gapCount = 0;
      const lines = ex.lines.map((line,li)=>{
        const spk = line.speaker==='A'?'a':'b';
        const text = line.text.replace(/\[([^\]]+)\]/g,(match,ans)=>{
          const gi = gapCount++;
          return `<span class="convo-gwrap"><input class="convo-input" id="cv-${cvid}-${gi}" data-answer="${ans}" autocomplete="off" style="width:${Math.max(4,ans.replace(/\//g,'').split('/')[0].length+1)}ch"><span class="convo-reveal" id="cv-rev-${cvid}-${gi}"></span></span>`;
        });
        return `<div class="convo-line"><span class="convo-speaker ${spk}">${line.speaker}</span><span class="convo-text">${text}</span></div>`;
      }).join('');
      const total = gapCount;
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Conversation</span>
        </div>
        <div class="ex-card-body">
          <div class="convo-wrap">${lines}</div>
          <div class="check-row">
            <button class="btn-check" onclick="checkConvo('${cvid}',${total})">Check answers</button>
            <button class="btn-reset" onclick="resetConvo('${cvid}',${total})">Reset</button>
          </div>
          <div class="score-badge" id="score-cv-${cvid}"></div>
        </div></div>`;
    }

    // ── TRUE / FALSE / NOT GIVEN ──
    if(ex.type==='tf'){
      const tfid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>`
        <div class="tf-item">
          ${it.context?`<div class="tf-context">"${it.context}"</div>`:''}
          <div class="tf-statement">${ii+1}. ${it.statement}</div>
          <div class="tf-options">
            ${['True','False','Not given'].map(opt=>`<button class="tf-btn" onclick="pickTF('${tfid}',${ii},'${opt}','${it.answer}','${it.explanation.replace(/'/g,"'")}') ">${opt}</button>`).join('')}
          </div>
          <div class="tf-feedback" id="tf-fb-${tfid}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">True / False</span>
        </div>
        <div class="ex-card-body">${items}</div></div>`;
    }

  }).join('');

  return `
  <div class="lesson-hero">
    <div class="lesson-meta">
      <span class="level-tag">A1</span>
      <span class="lesson-num">Topic ${idx+1} of ${lessons.length}</span>

        ${isDone?'✓ Completed':'Mark as complete'}

    </div>
  </div>
  <div class="lesson-body">

      <div class="section-body collapsed">
        <div class="explain-card">
          <div class="explain-lead">${l.intro}</div>
          <div class="explain-body">${l.explanation}</div>
        </div>
        ${tip(l.tip)}
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span><h2>Form & structure</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>

// ── NAVIGATION ──
function goto(i){
  current=i;
  const main=document.getElementById('main');
  main.innerHTML=buildLesson(lessons[i],i);
  updateSticky(lessons[i]);
  observeHero();
  main.style.animation='none';
  main.offsetHeight;
  main.style.animation='fadeUp .25s ease forwards';
  document.getElementById('breadcrumb-topic').textContent=lessons[i].title;
  buildSidebar();
  window.scrollTo(0,0);
}

// ── MARK DONE ──
function markDone(id,idx){
  if(!done.includes(id)){done.push(id);localStorage.setItem('jpe-a1-done',JSON.stringify(done));}
  goto(idx);
}

// ── GAP FILL ──
function checkGap(lid,ei,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`gap-${lid}-${ei}-${i}`);
    const rev=document.getElementById(`gap-rev-${lid}-${ei}-${i}`);
    const accepted=inp.dataset.answer.toLowerCase().split('/').map(a=>a.trim());
    const val=inp.value.toLowerCase().trim();
    const ok=accepted.includes(val)||(val===''&&accepted.includes('—'));
    if(ok){inp.className='gap-input correct';rev.className='gap-reveal';correct++;}
    else{inp.className='gap-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='gap-reveal show';}
  }
  const badge=document.getElementById(`score-gap-${lid}-${ei}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetGap(lid,ei,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`gap-${lid}-${ei}-${i}`);
    const rev=document.getElementById(`gap-rev-${lid}-${ei}-${i}`);
    inp.value='';inp.className='gap-input';rev.textContent='';rev.className='gap-reveal';
  }
  document.getElementById(`score-gap-${lid}-${ei}`).className='score-badge';
}

// ── MULTIPLE CHOICE ──
function pickMC(lid,ei,qi,choice,answer,explanation){
  const container=document.getElementById(`mc-${lid}-${ei}-${qi}`);
  container.querySelectorAll('.mc-opt').forEach(o=>{
    o.classList.remove('correct-ans','wrong-ans');
    if(o.dataset.opt===answer) o.classList.add('correct-ans');
    if(o.dataset.opt===choice&&choice!==answer) o.classList.add('wrong-ans');
  });
  const fb=document.getElementById(`mcfb-${lid}-${ei}-${qi}`);
  fb.textContent=explanation;
  fb.className=`mc-feedback show ${choice===answer?'ok':'bad'}`;
}

// ── ERROR CORRECTION ──
function checkEC(lid,ei,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`ec-${lid}-${ei}-${i}`);
    const ans=inp.dataset.answer.toLowerCase().replace(/[.!?,]/g,'').trim();
    const val=inp.value.toLowerCase().replace(/[.!?,]/g,'').trim();
    if(val===ans){inp.className='ec-input correct';correct++;}
    else inp.className='ec-input wrong';
  }
  const badge=document.getElementById(`score-ec-${lid}-${ei}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetEC(lid,ei,count){
  for(let i=0;i<count;i++){const inp=document.getElementById(`ec-${lid}-${ei}-${i}`);inp.value='';inp.className='ec-input';}
  document.getElementById(`score-ec-${lid}-${ei}`).className='score-badge';
}

// ── SENTENCE BUILDER ──
const sbState={};
function sbClick(sid,si,wi){
  if(!sbState[sid]) sbState[sid]={};
  if(!sbState[sid][si]) sbState[sid][si]=[];
  const wordEl=document.getElementById(`sbw-${sid}-${si}-${wi}`);
  const word=wordEl.dataset.word;
  sbState[sid][si].push({word,wi});
  wordEl.classList.add('used');
  const slot=document.getElementById(`sb-slot-${sid}-${si}`);
  const placed=document.createElement('button');
  placed.className='sb-placed';
  placed.textContent=word;
  placed.onclick=()=>sbRemove(sid,si,wi,placed);
  slot.appendChild(placed);
}
function sbRemove(sid,si,wi,el){
  const wordEl=document.getElementById(`sbw-${sid}-${si}-${wi}`);
  wordEl.classList.remove('used');
  sbState[sid][si]=sbState[sid][si].filter(x=>x.wi!==wi);
  el.remove();
}
function checkBuilder(sid,count,answersJson){
  const answers=JSON.parse(answersJson.replace(/&quot;/g,'"'));
  let correct=0;
  for(let i=0;i<count;i++){
    const placed=(sbState[sid]&&sbState[sid][i])||[];
    const built=placed.map(x=>x.word).join(' ').toLowerCase().trim();
    const ans=answers[i].toLowerCase().trim();
    const res=document.getElementById(`sb-res-${sid}-${i}`);
    if(built===ans){res.textContent='✓ Correct!';res.className='sb-result show ok';correct++;}
    else{res.textContent=`✗ Answer: ${answers[i]}`;res.className='sb-result show bad';}
  }
  const badge=document.getElementById(`score-sb-${sid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetBuilder(sid,count,wordsJson){
  const words=JSON.parse(wordsJson.replace(/&quot;/g,'"'));
  sbState[sid]={};
  for(let i=0;i<count;i++){
    document.getElementById(`sb-slot-${sid}-${i}`).innerHTML='';
    document.getElementById(`sb-res-${sid}-${i}`).className='sb-result';
    const bank=document.getElementById(`sb-bank-${sid}-${i}`);
    const shuffled=[...words[i]].sort(()=>Math.random()-.5);
    bank.innerHTML=shuffled.map((w,wi)=>`<button class="sb-word" id="sbw-${sid}-${i}-${wi}" data-word="${w}" onclick="sbClick('${sid}',${i},${wi})">${w}</button>`).join('');
  }
  document.getElementById(`score-sb-${sid}`).className='score-badge';
}

// ── MATCHING ──
const matchState={};
function matchClick(mid,idx,side){
  if(!matchState[mid]) matchState[mid]={left:null,right:null};
  const elId=side==='left'?`ml-${mid}-${idx}`:`mr-${mid}-${idx}`;
  const el=document.getElementById(elId);
  if(el.classList.contains('matched')) return;
  // deselect same side
  document.querySelectorAll(`[id^="m${side==='left'?'l':'r'}-${mid}-"]`).forEach(e=>{if(!e.classList.contains('matched'))e.classList.remove('selected')});
  el.classList.add('selected');
  matchState[mid][side]={idx,elId};
  const ms=matchState[mid];
  if(ms.left&&ms.right){
    const leftEl=document.getElementById(ms.left.elId);
    const rightEl=document.getElementById(ms.right.elId);
    const leftDataIdx=leftEl.dataset.idx;
    const rightDataIdx=rightEl.dataset.idx;
    if(leftDataIdx===rightDataIdx){
      leftEl.classList.remove('selected');rightEl.classList.remove('selected');
      leftEl.classList.add('matched');rightEl.classList.add('matched');
      // check if all matched
      const total=document.querySelectorAll(`[id^="ml-${mid}-"]`).length;
      const matched=document.querySelectorAll(`[id^="ml-${mid}-"].matched`).length;
      const badge=document.getElementById(`score-match-${mid}`);
      if(matched===total){badge.textContent=`${total}/${total} — all matched! 🎉`;badge.className='score-badge show full';}
    } else {
      leftEl.classList.add('wrong-flash');rightEl.classList.add('wrong-flash');
      setTimeout(()=>{leftEl.classList.remove('wrong-flash','selected');rightEl.classList.remove('wrong-flash','selected');},600);
    }
    matchState[mid]={left:null,right:null};
  }
}

// ── TRANSFORMATION ──
function checkTransform(tid,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`tr-${tid}-${i}`);
    const rev=document.getElementById(`tr-rev-${tid}-${i}`);
    const ans=inp.dataset.answer.toLowerCase().replace(/[.!?,]/g,'').trim();
    const val=inp.value.toLowerCase().replace(/[.!?,]/g,'').trim();
    if(val===ans){inp.className='transform-input correct';rev.className='transform-reveal';correct++;}
    else{inp.className='transform-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='transform-reveal show';}
  }
  const badge=document.getElementById(`score-tr-${tid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetTransform(tid,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`tr-${tid}-${i}`);
    const rev=document.getElementById(`tr-rev-${tid}-${i}`);
    inp.value='';inp.className='transform-input';rev.textContent='';rev.className='transform-reveal';
  }
  document.getElementById(`score-tr-${tid}`).className='score-badge';
}

// ── CATEGORISATION ──
const catState={};
function catClick(cid,wi){
  if(!catState[cid]) catState[cid]={selected:null,placed:{}};
  const cs=catState[cid];
  const wordEl=document.getElementById(`cw-${cid}-${wi}`);
  if(wordEl.classList.contains('placed')) return;
  // find which column was most recently clicked (use a pending col)
  if(cs.pendingCol===undefined||cs.pendingCol===null){
    // first select the word
    document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>e.style.outline='');
    wordEl.style.outline='2px solid var(--sky)';
    cs.selectedWord={wi,word:wordEl.textContent,cat:parseInt(wordEl.dataset.cat)};
  }
}
function catColClick(cid,ci){
  if(!catState[cid]) catState[cid]={selectedWord:null,placed:{}};
  const cs=catState[cid];
  if(!cs.selectedWord) return;
  const {wi,word}=cs.selectedWord;
  const wordEl=document.getElementById(`cw-${cid}-${wi}`);
  wordEl.classList.add('placed');
  wordEl.style.outline='';
  const colItems=document.getElementById(`cc-items-${cid}-${ci}`);
  const placed=document.createElement('button');
  placed.className='cat-placed';
  placed.textContent=word;
  placed.dataset.wi=wi;
  placed.dataset.ci=String(ci);
  placed.dataset.correctCat=String(cs.selectedWord.cat);
  placed.style.background='var(--a1bg)';placed.style.borderColor='var(--sky)';placed.style.color='var(--sky)';
  placed.onclick=()=>{
    wordEl.classList.remove('placed');wordEl.style.outline='';
    placed.remove();
    if(catState[cid].placed[wi]) delete catState[cid].placed[wi];
  };
  colItems.appendChild(placed);
  cs.placed[wi]={ci,correctCat:cs.selectedWord.cat};
  cs.selectedWord=null;
  document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>e.style.outline='');
}
function checkCat(cid,numCols){
  const cs=catState[cid]||{placed:{}};
  let correct=0,total=0;
  // check each placed item
  for(const wi in cs.placed){
    const {ci,correctCat}=cs.placed[wi];
    const wordEl=document.getElementById(`cw-${cid}-${wi}`);
    total++;
    if(ci===correctCat) correct++;
  }
  // also count unplaced items (wrong — left in bank)
  document.querySelectorAll(`[id^="cw-${cid}-"]:not(.placed)`).forEach(()=>total++);
  // colour the columns
  for(let ci=0;ci<numCols;ci++){
    const col=document.getElementById(`cc-${cid}-${ci}`);
    const items=document.getElementById(`cc-items-${cid}-${ci}`);
    let colCorrect=true;
    items.querySelectorAll('.cat-placed').forEach(p=>{
      const correctCat=parseInt(p.dataset.correctCat);
      const placedIn=parseInt(p.dataset.ci);
      if(correctCat!==placedIn){colCorrect=false;p.style.background='#FFF0F0';p.style.borderColor='var(--coral)';p.style.color='var(--coral)';}
      else{p.style.background='#E8F8F5';p.style.borderColor='var(--sea)';p.style.color='#0F7A6A';}
    });
  }
  const badge=document.getElementById(`score-cat-${cid}`);
  const pct=total>0?Math.round((correct/total)*100):0;
  badge.textContent=`${correct}/${total} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetCat(cid,numCols){
  catState[cid]={selectedWord:null,placed:{}};
  document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>{e.classList.remove('placed');e.style.outline='';});
  for(let ci=0;ci<numCols;ci++) document.getElementById(`cc-items-${cid}-${ci}`).innerHTML='';
  document.getElementById(`score-cat-${cid}`).className='score-badge';
}

// ── CONVERSATION FILL ──
function checkConvo(cvid,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`cv-${cvid}-${i}`);
    const rev=document.getElementById(`cv-rev-${cvid}-${i}`);
    const accepted=inp.dataset.answer.toLowerCase().split('/').map(a=>a.trim());
    const val=inp.value.toLowerCase().trim();
    if(accepted.includes(val)){inp.className='convo-input correct';rev.className='convo-reveal';correct++;}
    else{inp.className='convo-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='convo-reveal show';}
  }
  const badge=document.getElementById(`score-cv-${cvid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetConvo(cvid,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`cv-${cvid}-${i}`);
    const rev=document.getElementById(`cv-rev-${cvid}-${i}`);
    inp.value='';inp.className='convo-input';rev.textContent='';rev.className='convo-reveal';
  }
  document.getElementById(`score-cv-${cvid}`).className='score-badge';
}

// ── TRUE / FALSE / NOT GIVEN ──
function pickTF(tfid,qi,choice,answer,explanation){
  const item=document.getElementById(`tf-fb-${tfid}-${qi}`).parentElement;
  item.querySelectorAll('.tf-btn').forEach(b=>{
    b.classList.remove('correct-ans','wrong-ans');
    if(b.textContent===answer) b.classList.add('correct-ans');
    if(b.textContent===choice&&choice!==answer) b.classList.add('wrong-ans');
  });
  const fb=document.getElementById(`tf-fb-${tfid}-${qi}`);
  fb.textContent=explanation;
  fb.className=`tf-feedback show ${choice===answer?'ok':'bad'}`;
}

// ── INIT ──
buildSidebar();
goto(0);

</script>
