<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C1 Grammar — JohnPlusEnglish</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#2176FF;--sea:#1DD3B0;--coral:#FF6B6B;--sun:#FFB347;--lav:#9B72CF;
  --cream:#F7F6F3;--ink:#2D3047;--ink2:#4A4E6B;--ink3:#8B8FA8;
  --a1:#2176FF;--a1bg:#EEF4FF;--a1dark:#0C44A0;
  --radius:14px;--radius-sm:8px;
  --card-shadow:0 1px 3px rgba(45,48,71,.07),0 4px 16px rgba(45,48,71,.05);
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:15px}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:13px 32px;background:#fff;border-bottom:1px solid #E8E6E0;position:sticky;top:0;z-index:200;}
.logo{font-weight:900;font-size:17px;letter-spacing:-0.02em}
.logo span{color:var(--sky)}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;padding:6px 12px;border-radius:20px;border:1px solid #E8E6E0;background:transparent;transition:all .15s;font-family:'Outfit',sans-serif;}
.nav-back:hover{background:var(--cream);color:var(--ink)}
.nav-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)}
.nav-breadcrumb span{color:var(--sky);font-weight:600}
.nav-breadcrumb .sep{opacity:.4;color:var(--ink3)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 53px)}
.sidebar{background:#fff;border-right:1px solid #E8E6E0;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-head{padding:20px 20px 14px;border-bottom:1px solid #F0EEE8;}
.level-pill{display:inline-flex;align-items:center;gap:5px;background:var(--a1bg);color:var(--a1);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px;}
.sidebar-head h2{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
.sidebar-head p{font-size:12px;color:var(--ink3);margin-top:3px;line-height:1.45}
.topic-nav{padding:8px 0;flex:1}
.topic-link{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background .12s;border:none;background:transparent;width:100%;text-align:left;font-family:'Outfit',sans-serif;}
.topic-link:hover{background:#F7F6F3}
.topic-link.active{background:var(--a1bg)}
.topic-link.done .tl-check{background:var(--sea);border-color:var(--sea);color:#fff}
.tl-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3);width:16px;flex-shrink:0}
.tl-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #D4D2CA;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;color:var(--sea);transition:all .2s;}
.topic-link.active .tl-check{border-color:var(--a1)}
.tl-name{font-size:13px;color:var(--ink2);font-weight:400;line-height:1.3}
.topic-link.active .tl-name{color:var(--a1);font-weight:600}
.topic-link.done .tl-name{color:var(--ink3)}
.sidebar-foot{padding:14px 20px;border-top:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.prog-bar{flex:1;height:4px;background:#E8E6E0;border-radius:2px;margin-right:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--sea);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-text{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink3);white-space:nowrap}
.main{padding:0;overflow:visible}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-hero{padding:36px 40px 28px;border-bottom:1px solid #E8E6E0;background:linear-gradient(135deg,#fff 0%,#F2F7FF 100%);}
.lesson-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.level-tag{background:var(--a1bg);color:var(--a1);font-weight:700}
.lesson-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3)}
.lesson-hero h1{font-size:32px;font-weight:900;letter-spacing:-.03em;color:var(--ink);line-height:1.1;margin-bottom:8px}
.lesson-hero p{font-size:15px;color:var(--ink2);line-height:1.6;max-width:580px}
.lesson-toolbar{display:flex;align-items:center;gap:8px;margin-top:20px;}
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--sky);color:#fff}
.btn-primary:hover{background:#1a6ae8;transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--ink2);border:1px solid #E0DED8}
.btn-ghost:hover{background:var(--cream)}
.btn-done{background:var(--sea);color:#fff}
.btn-done:hover{background:#17b89e;transform:translateY(-1px)}
.lesson-body{padding:32px 40px;display:flex;flex-direction:column;gap:8px}
.section-label{display:flex;align-items:center;gap:10px;margin-bottom:0;margin-top:8px;padding:9px 14px;background:var(--ink);border-radius:6px;cursor:pointer;user-select:none;transition:background .15s;}
.section-label:hover{background:#2D3047}
.btn-toggle-all{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);background:transparent;border:1px solid #D8D6D0;border-radius:20px;padding:5px 14px;cursor:pointer;transition:all .15s;}
.btn-toggle-all:hover{background:var(--cream);color:var(--ink);border-color:#B0AEA6;}
.section-label-chevron{margin-left:auto;display:flex;align-items:center;color:rgba(255,255,255,.5);transition:transform .2s;}
.section-label.collapsed .section-label-chevron{transform:rotate(-90deg)}
.section-body{overflow:visible;transition:max-height .25s ease,opacity .2s ease,margin-top .2s ease;max-height:4000px;opacity:1;margin-top:14px;}
.section-body.collapsed{max-height:0;opacity:0;margin-top:0;overflow:hidden;}
.section-label-icon{display:flex;align-items:center;color:#fff;flex-shrink:0}
.section-label h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#fff}
.explain-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;padding:26px 28px;box-shadow:var(--card-shadow);}
.explain-lead{font-size:16px;font-weight:600;color:var(--ink);line-height:1.55;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #F0EEE8;}
.explain-lead em{font-style:normal;color:var(--sky);font-weight:700}
.explain-body{font-size:14px;color:var(--ink2);line-height:1.8}
.explain-body p{margin-bottom:14px}
.explain-body p:last-child{margin-bottom:0}
.explain-body .rule{display:flex;gap:14px;align-items:flex-start;background:var(--cream);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
.explain-body .rule:last-of-type{margin-bottom:0}


.explain-body .rule-text{font-size:14px;color:var(--ink2);line-height:1.7}
.explain-body .rule-text strong{color:var(--ink)}
.explain-body .rule-text em{font-style:normal;color:var(--a1);font-weight:600}
.explain-body .rule-num:empty{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--a1);margin-top:6px;}
.explain-body .rule-num:not(:empty){flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--a1);font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.explain-body .note{background:var(--a1bg);border-left:3px solid var(--a1);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:14px;font-size:13px;color:var(--ink2);line-height:1.65}
.explain-body .note strong{color:var(--ink)}
.form-table{width:100%;border-collapse:collapse;font-size:14px}
.form-table th{background:#EEF2FF;color:var(--ink);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;text-align:left;}
.form-table th:first-child{border-radius:8px 0 0 0}
.form-table th:last-child{border-radius:0 8px 0 0}
.form-table td{padding:11px 14px;border-bottom:1px solid #F0EEE8;color:var(--ink2);font-size:14px}
.form-table tr:last-child td{border-bottom:none}
.form-table tr:nth-child(even) td{background:#FAFAF8}
.form-table .subject{font-weight:700;color:var(--ink)}
.form-table .form{color:var(--ink2)}
.form-table .neg{color:var(--ink2)}
.form-table .example{color:var(--ink2);font-style:italic}
.form-table .example{color:var(--ink2);font-style:italic}
.examples-grid{display:grid;gap:10px}
.example-item{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.ex-marker{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px;}
.ex-marker.pos{background:#E8F8F5;color:var(--sea)}
.ex-marker.neg{background:#FFF0F0;color:var(--coral)}
.ex-marker.q{background:var(--a1bg);color:var(--sky)}
.ex-eng{font-size:14px;font-weight:600;color:var(--ink)}
.ex-note{font-size:12px;color:var(--ink3);margin-top:2px}
.error-card{background:#fff;border-radius:var(--radius);padding:20px 22px;border:1px solid #E0DED8;}
.error-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:14px}
.error-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.error-bad,.error-good{border-radius:var(--radius-sm);padding:11px 14px}
.error-bad{background:#FFF5F5;border:1px solid #FCDADA}
.error-good{background:#F0FBF8;border:1px solid #C0EDE4}
.error-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.error-bad .error-label{color:var(--coral)}
.error-good .error-label{color:#0F7A6A}
.error-text{font-size:14px;color:var(--ink);font-weight:500;font-style:italic}
.error-bad .error-text{color:#B84040}
.error-good .error-text{color:#0F5A4A}
.error-reason{font-size:13px;color:var(--ink3);margin-top:10px;margin-bottom:4px;grid-column:1/-1;padding:0 2px}
.exercise-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;overflow:visible;box-shadow:var(--card-shadow);}
.ex-card-header{padding:16px 20px;border-bottom:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.ex-card-title{font-size:14px;font-weight:700;color:var(--ink)}
.ex-card-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.ex-type-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:#F0F0F0;color:var(--ink3)}
.ex-card-body{padding:20px}
.gap-sentence{font-size:15px;color:var(--ink);line-height:2.4;margin-bottom:4px;display:flex;align-items:baseline;flex-wrap:wrap;gap:4px;}
.gap-sentence:last-child{margin-bottom:0}
.gap-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-right:4px}
.gap-input{display:inline-block;border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.gap-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.gap-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.gap-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.gap-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:baseline}
.gap-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.gap-reveal.show{opacity:1}
.mc-question{margin-bottom:20px}
.mc-question:last-child{margin-bottom:0}
.mc-text{font-size:14px;color:var(--ink);margin-bottom:10px;font-weight:500}
.mc-options{display:flex;flex-wrap:wrap;gap:8px}
.mc-opt{font-family:'Outfit',sans-serif;font-size:13px;padding:7px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.mc-opt:hover{border-color:var(--sky);color:var(--sky);background:var(--a1bg)}
.mc-opt.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600}
.mc-opt.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.mc-feedback{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:6px;display:none}
.mc-feedback.show{display:block}
.mc-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.mc-feedback.bad{background:#FFF0F0;color:#B84040}
.ec-item{margin-bottom:16px}
.ec-item:last-child{margin-bottom:0}
.ec-sentence{font-size:14px;background:#FFF8F0;border:1px solid #FFD8B0;border-radius:var(--radius-sm);padding:11px 14px;color:var(--ink);font-weight:500;margin-bottom:8px;}
.ec-input-row{display:flex;gap:8px;align-items:center}
.ec-input{flex:1;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.ec-input:focus{border-color:var(--sky)}
.ec-input.correct{border-color:var(--sea);background:#F0FBF8}
.ec-input.wrong{border-color:var(--coral);background:#FFF5F5}
.check-row{display:flex;gap:8px;margin-top:16px}
.btn-check{background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 20px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-check:hover{background:#1a6ae8}
.btn-reset{background:var(--cream);color:var(--ink3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:20px;border:1px solid #E0DED8;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#EDEBE5;color:var(--ink)}
.score-badge{display:none;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;margin-top:12px;}
.score-badge.show{display:inline-flex}
.score-badge.full{background:#E8F8F5;color:#0F7A6A}
.score-badge.partial{background:#FFF8E8;color:#8B6000}
.score-badge.low{background:#FFF0F0;color:#B84040}
.lesson-footer{padding:24px 40px;border-top:1px solid #E8E6E0;display:flex;align-items:center;justify-content:space-between;background:#fff;}
.footer-hint{font-size:12px;color:var(--ink3)}
.footer-nav{display:flex;gap:8px}
.real-use{background:linear-gradient(135deg,var(--a1bg) 0%,#F8F0FF 100%);border-radius:var(--radius);border:1px solid #C8DEFF;padding:20px 24px;}
.real-use h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sky);margin-bottom:12px}
.real-use ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.real-use li{font-size:13px;color:var(--ink2);line-height:1.6;padding-left:20px;position:relative;}
.real-use li::before{content:'→';position:absolute;left:0;color:var(--sky);font-weight:700}

/* ── JOHN\'S TIP ── */
.johns-tip{
  background:#FFFBF0;border:1.5px solid #FFD97A;border-radius:var(--radius);
  padding:18px 20px;display:flex;gap:14px;align-items:flex-start;
}
.tip-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--sky);color:#fff;
  font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:-.02em;
}
.tip-body{}
.tip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#B8860B;margin-bottom:5px}
.tip-text{font-size:13px;color:#5A4500;line-height:1.65}
.tip-text strong{color:#3A2D00;font-weight:700}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .lesson-hero{padding:24px 20px 20px}
  .lesson-body{padding:24px 20px}
  .lesson-footer{padding:16px 20px}
  .error-row{grid-template-columns:1fr}
}

/* ── SENTENCE BUILDER ── */
.sb-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:12px;}
.sb-word{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.sb-word:hover{border-color:var(--sky);color:var(--sky)}
.sb-word.used{opacity:.3;pointer-events:none;}
.sb-slot{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:10px 12px;border:2px dashed #C8DEFF;border-radius:var(--radius-sm);background:#FAFCFF;margin-bottom:12px;align-items:center;}
.sb-placed{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:var(--a1bg);border:1.5px solid var(--sky);border-radius:20px;cursor:pointer;color:var(--sky);user-select:none;transition:all .15s;}
.sb-placed:hover{background:#FFE8E8;border-color:var(--coral);color:var(--coral)}
.sb-sentence{margin-bottom:20px}
.sb-sentence:last-child{margin-bottom:0}
.sb-sentence-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-bottom:6px}
.sb-context{font-size:13px;color:var(--ink3);margin-bottom:8px;font-style:italic}
.sb-result{font-size:12px;margin-top:6px;padding:6px 12px;border-radius:6px;display:none}
.sb-result.show{display:block}
.sb-result.ok{background:#E8F8F5;color:#0F7A6A}
.sb-result.bad{background:#FFF0F0;color:#B84040}

/* ── MATCHING ── */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.match-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:8px;}
.match-item{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid #E0DED8;cursor:pointer;transition:all .15s;background:#fff;color:var(--ink2);font-family:'Outfit',sans-serif;text-align:left;width:100%;margin-bottom:6px;display:block;}
.match-item:last-child{margin-bottom:0}
.match-item:hover{border-color:var(--sky);color:var(--sky)}
.match-item.selected{border-color:var(--sky);background:var(--a1bg);color:var(--sky);font-weight:600}
.match-item.matched{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600;pointer-events:none;cursor:default;}
.match-item.wrong-flash{border-color:var(--coral)!important;background:#FFF0F0!important;color:var(--coral)!important}
.match-pairs{margin-top:12px;}
.match-pair-line{font-size:12px;display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #F0EEE8;color:var(--ink3);}
.match-pair-line:last-child{border-bottom:none}

/* ── TRANSFORMATION ── */
.transform-item{margin-bottom:16px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.transform-item:last-child{margin-bottom:0}
.transform-original{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:8px;line-height:1.5}
.transform-keyword{display:inline-block;background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin:0 2px;}
.transform-input{width:100%;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.transform-input:focus{border-color:var(--sky)}
.transform-input.correct{border-color:var(--sea);background:#F0FBF8}
.transform-input.wrong{border-color:var(--coral);background:#FFF5F5}
.transform-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:5px;opacity:0;transition:opacity .2s;min-height:16px}
.transform-reveal.show{opacity:1}

/* ── CATEGORISATION ── */
.cat-bank{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:14px;min-height:48px;}
.cat-word{font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.cat-word:hover{border-color:var(--sky);color:var(--sky)}
.cat-word.placed{opacity:.3;pointer-events:none;}
.cat-columns{display:grid;gap:10px;margin-bottom:12px;}
.cat-col{border-radius:var(--radius-sm);border:2px dashed #D0CEC8;padding:10px 12px;min-height:80px;transition:border-color .2s;}
.cat-col-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #E0DED8;}
.cat-placed{font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:4px 11px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;user-select:none;transition:all .15s;display:inline-block;margin:3px;}
.cat-placed:hover{opacity:.65}
.cat-col.checked-correct .cat-col-head{color:#0F7A6A}
.cat-col.checked-correct{border-color:var(--sea);border-style:solid;}
.cat-col.checked-wrong{border-color:var(--coral);border-style:solid;}

/* ── CONVERSATION FILL ── */
.convo-wrap{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;overflow:hidden;margin-bottom:12px;}
.convo-line{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid #F5F3EF;}
.convo-line:last-child{border-bottom:none}
.convo-speaker{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;width:28px;flex-shrink:0;padding-top:3px;}
.convo-speaker.a{color:var(--sky)}
.convo-speaker.b{color:var(--lav)}
.convo-text{font-size:14px;color:var(--ink);line-height:1.7;flex:1}
.convo-input{border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.convo-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.convo-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.convo-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.convo-gwrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:middle}
.convo-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.convo-reveal.show{opacity:1}

/* ── TRUE / FALSE / NOT GIVEN ── */
.tf-item{margin-bottom:10px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.tf-item:last-child{margin-bottom:0}
.tf-context{font-size:12px;color:var(--ink3);margin-bottom:6px;font-style:italic;line-height:1.5}
.tf-statement{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:10px;line-height:1.5}
.tf-options{display:flex;gap:8px;flex-wrap:wrap;}
.tf-btn{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.tf-btn:hover{border-color:var(--sky);background:var(--a1bg);color:var(--sky)}
.tf-btn.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A}
.tf-btn.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.tf-feedback{font-size:12px;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.tf-feedback.show{display:block}
.tf-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.tf-feedback.bad{background:#FFF0F0;color:#B84040}

// ── HELPER ──

// ── LESSON DATA ──
const lessons = [
{id:"subjunctive",title:"Subjunctive & mandative",subtitle:"It is essential that she be informed",intro:"A verb form that survived in formal English \u2014 and matters enormously in C1 writing.",desc:"The subjunctive is the base form of the verb used in certain subordinate clauses \u2014 regardless of subject and tense. It appears after mandative verbs (suggest, recommend, insist, demand) and in fixed formal expressions. At C1 it is expected in formal writing.",tip:"Many students use <em>should</em> instead of the subjunctive \u2014 and this is acceptable in British English: <em>\"I suggest that he should attend\"</em> is correct. But the bare subjunctive <em>\"I suggest that he attend\"</em> is more formal and more impressive at C1. Both are valid; knowing both gives you register flexibility.",explanation:"<p>The subjunctive uses the <strong>base form of the verb</strong> for all subjects and in all tenses \u2014 no -s for third person, no was (use were), no negative auxiliary.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Mandative subjunctive</strong> \u2014 after verbs and adjectives of recommendation, requirement, suggestion, and demand. The pattern is: verb/adjective + <em>that</em> + subject + <strong>base form</strong>.<br>\n<em>\"The committee recommended that the proposal be rejected.\"</em><br>\n<em>\"It is essential that every candidate submit their application by Friday.\"</em><br>\n<em>\"She insisted that he attend in person.\"</em><br>\nMandative verbs: <em>suggest, recommend, insist, demand, require, request, propose, urge, ask.</em><br>\nMandative adjectives: <em>essential, vital, important, necessary, imperative, advisable, crucial.</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Were-subjunctive</strong> \u2014 <em>were</em> for all subjects in hypothetical clauses, regardless of number. Already seen in second conditional. At C1 it extends to other structures:<br>\n<em>\"If this were to happen, the consequences would be severe.\"</em><br>\n<em>\"Were she to resign, the company would face a crisis.\"</em> (formal inversion)<br>\n<em>\"I wish it were different.\"</em> / <em>\"As it were.\"</em> (fixed expression)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Fixed formal expressions with subjunctive:</strong><br>\n<em>So be it. / Be that as it may. / Come what may. / Far be it from me to... / Suffice it to say. / As it were.</em><br>\nThese are fixed \u2014 memorise them as chunks. They appear in formal speech and writing.</div></div>\n<div class=\"note\"><strong>British vs American English:</strong><br>\nAmerican English strongly prefers the bare subjunctive: <em>\"It is essential that he be present.\"</em><br>\nBritish English accepts both the subjunctive <em>and</em> <em>should</em>: <em>\"It is essential that he should be present.\"</em><br>\nFor C1 exams (CAE), the subjunctive is marked as correct and impressive. The <em>should</em> alternative is also accepted.<br>\n<strong>Negative subjunctive:</strong> <em>not</em> comes directly before the base form \u2014 no auxiliary: <em>\"She insisted that he not be told.\"</em></div>",table:{headers:["Pattern","Example","Register"],rows:[["verb + that + subj + base form","She recommended that he apply.","Formal"],["adj + that + subj + base form","It is vital that this be addressed.","Formal/written"],["Were-subjunctive (hypothetical)","Were this to continue, action would follow.","Formal"],["Negative subjunctive","She demanded that he not attend.","Formal"],["Should alternative (British)","It is essential that he should be told.","Formal (both correct)"],["Fixed expressions","Be that as it may. / Come what may.","Formal/idiomatic"]]},examples:[{type:"pos",eng:"The board insisted that the CEO resign immediately.",note:"Mandative insist + that + base form \u2014 no -s on resign."},{type:"pos",eng:"It is imperative that all staff be notified before the announcement.",note:"Adjective + that + base form \u2014 be, not is/are."},{type:"pos",eng:"Were the situation to deteriorate, emergency measures would be activated.",note:"Were-subjunctive with formal inversion \u2014 hypothetical conditional."},{type:"pos",eng:"She demanded that the report not be released to the press.",note:"Negative subjunctive \u2014 not directly before base form, no auxiliary."},{type:"pos",eng:"Be that as it may, the decision has been made and we must act accordingly.",note:"Fixed expression \u2014 acknowledging a point while moving past it."},{type:"pos",eng:"The contract stipulates that all disputes be referred to arbitration.",note:"Legal/formal register \u2014 subjunctive in contractual language."}],errors:[{bad:"The committee recommended that he attends the hearing.",good:"The committee recommended that he attend the hearing.",reason:"Mandative subjunctive \u2014 base form for all subjects. No -s on third person."},{bad:"It is essential that she is informed immediately.",good:"It is essential that she be informed immediately.",reason:"Adjective + that clause \u2014 subjunctive be, not is."},{bad:"She insisted that he didn't attend.",good:"She insisted that he not attend.",reason:"Negative subjunctive uses not + base form directly \u2014 no auxiliary didn't."},{bad:"Were he to arrived late, the interview would be cancelled.",good:"Were he to arrive late, the interview would be cancelled.",reason:"Were + subject + to + base form \u2014 arrive, not arrived."},{bad:"Be that as it may be, we must proceed.",good:"Be that as it may, we must proceed.",reason:"Fixed expression \u2014 be that as it may (no second be)."}],realUse:["\"It is vital that the findings be published.\" \u2014 academic/scientific writing.","\"The constitution requires that the president be a natural-born citizen.\" \u2014 legal/formal.","\"Were this policy to be implemented, significant opposition would follow.\" \u2014 political commentary.","\"Come what may, we will honour our commitments.\" \u2014 formal pledge."],exercises:[{type:"gap",title:"Mandative subjunctive",sub:"Fill each gap with the correct subjunctive form.",items:[{answer:"be",before:"It is essential that every applicant ",after:" interviewed in person."},{answer:"attend",before:"The professor insisted that all students ",after:" the final lecture."},{answer:"submit",before:"The guidelines require that each participant ",after:" a written report."},{answer:"not be",before:"She demanded that the information ",after:" shared with the press."},{answer:"have",before:"It is advisable that the patient ",after:" a full medical examination."},{answer:"were",before:"If this ",after:" to happen, the consequences would be severe."},{answer:"resign",before:"The board recommended that the director ",after:" from his position."},{answer:"be notified",before:"It is crucial that all affected parties ",after:" before the deadline."}]},{type:"mc",title:"Subjunctive or not?",sub:"Choose the correct form.",items:[{q:"It is vital that the document _____ signed before midnight.",opts:["is","be","was","should be"],answer:"be",explanation:"Mandative adjective + that clause \u2192 subjunctive be, not is. (Should be is also acceptable in British English but bare subjunctive is preferred at C1.)"},{q:"The regulations stipulate that no employee _____ discriminated against.",opts:["is","be","was","were"],answer:"be",explanation:"Formal/legal mandative context \u2192 subjunctive be."},{q:"_____ this prove impossible, a contingency plan is in place.",opts:["If","Should","Were","Had"],answer:"Should",explanation:"Should + subject + base verb = formal conditional inversion for possibility."},{q:"She insisted that he _____ present at the meeting.",opts:["is","was","be","being"],answer:"be",explanation:"Insist + that + subjunctive: he be (not is/was)."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"My advice: she should apply for the position.",keyword:"recommend",answer:"I recommend that she apply for the position."},{original:"All staff must be informed before the announcement.",keyword:"essential",answer:"It is essential that all staff be informed before the announcement."},{original:"He told us not to use the back entrance.",keyword:"insisted",answer:"He insisted that we not use the back entrance."},{original:"If this situation continues, action will be taken.",keyword:"Were",answer:"Were this situation to continue, action would be taken."},{original:"The report should not be released. (She demanded this.)",keyword:"demanded",answer:"She demanded that the report not be released."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["it","is","imperative","that","the","results","be","published","immediately"],answer:"it is imperative that the results be published immediately",context:"Adjective + that + subjunctive be."},{words:["the","board","recommended","that","he","not","be","given","a","second","chance"],answer:"the board recommended that he not be given a second chance",context:"Negative mandative subjunctive."},{words:["were","this","policy","to","be","implemented","opposition","would","follow"],answer:"were this policy to be implemented opposition would follow",context:"Formal were-subjunctive inversion."},{words:["be","that","as","it","may","we","must","honour","our","commitments"],answer:"be that as it may we must honour our commitments",context:"Fixed subjunctive expression."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"The committee recommended that he attends the hearing.",correct:"The committee recommended that he attend the hearing.",hint:"Mandative subjunctive \u2014 base form, no -s."},{wrong:"It is essential that she is notified immediately.",correct:"It is essential that she be notified immediately.",hint:"Adjective + that clause \u2014 subjunctive be."},{wrong:"She insisted that he didn't attend.",correct:"She insisted that he not attend.",hint:"Negative subjunctive: not + base form, no auxiliary."},{wrong:"Were he to arrived late, the meeting would start without him.",correct:"Were he to arrive late, the meeting would start without him.",hint:"Were + to + base form \u2014 not past tense."},{wrong:"Be that as it may be, we must continue.",correct:"Be that as it may, we must continue.",hint:"Fixed expression \u2014 be that as it may (no second be)."}]}]},

{id:"participle",title:"Participle clauses",subtitle:"Having finished the report, she left / Left alone, he panicked",intro:"Compressing two clauses into one \u2014 concision, style, and precision.",desc:"Participle clauses replace full subordinate clauses with a participle phrase, making sentences more economical and formal. They are extremely common in academic writing, journalism, and literary prose \u2014 and a clear marker of C1 proficiency.",tip:"The subject of the participle clause must be the same as the subject of the main clause. This is the most important rule \u2014 and the most commonly broken one. <em>\"Walking down the street, a dog bit me\"</em> is wrong because the dog wasn't walking down the street. The subject of <em>walking</em> and the subject of <em>bit</em> must be the same person.",explanation:"<p>Participle clauses use a participle (present, past, or perfect) to compress a subordinate clause. They are more economical than full clauses and carry a formal register.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Present participle clause (-ing)</strong> \u2014 active meaning, often simultaneous or causal.<br>\nSimultaneous: <em>\"She sat at her desk, reading the report.\"</em> (= while she read)<br>\nCausal: <em>\"Not knowing what to say, he remained silent.\"</em> (= because he didn't know)<br>\nSequential: <em>\"Opening the door, she stepped inside.\"</em> (= after/as she opened)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Past participle clause (-ed/irregular)</strong> \u2014 passive meaning.<br>\n<em>\"Exhausted by the journey, she went straight to bed.\"</em> (= because she was exhausted)<br>\n<em>\"Founded in 1854, the company has grown considerably.\"</em> (= which was founded)<br>\n<em>\"Left alone, he began to panic.\"</em> (= when/because he was left)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Perfect participle clause (having + pp)</strong> \u2014 action completed before the main clause.<br>\n<em>\"Having submitted the report, she felt relieved.\"</em> (= after she had submitted)<br>\n<em>\"Having been told the news, he sat in silence.\"</em> (= passive perfect \u2014 after being told)<br>\nUse when the time sequence between the two actions matters.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Negative participle clauses</strong> \u2014 <em>not</em> before the participle.<br>\n<em>\"Not wanting to cause offence, she said nothing.\"</em><br>\n<em>\"Not having received a reply, he sent a follow-up.\"</em></div></div>\n<div class=\"note\"><strong>The subject rule \u2014 the most important constraint:</strong><br>\nThe subject of the participle clause and the main clause MUST be the same.<br>\n<em>\"Walking to work, I saw an accident.\"</em> \u2713 \u2014 I was walking, I saw it.<br>\n<em>\"Walking to work, an accident occurred.\"</em> \u2717 \u2014 The accident wasn't walking.<br>\nThis error is called a <strong>dangling participle</strong> \u2014 very common in student writing at all levels.<br>\n<strong>With/without + participle</strong>: <em>\"He left without saying goodbye.\"</em> / <em>\"She sat with her arms folded.\"</em></div>",table:{headers:["Type","Meaning","Example"],rows:[["Present (-ing)","Active \u2014 simultaneous or causal","Not knowing the answer, she guessed."],["Past (-ed/pp)","Passive \u2014 causal or relative","Damaged in the storm, the car was written off."],["Perfect (having + pp)","Active \u2014 completed before main action","Having read the report, he called a meeting."],["Perfect passive (having been + pp)","Passive \u2014 completed before main action","Having been warned, she proceeded with caution."],["Negative","Not before the participle","Not wishing to intrude, he waited outside."],["With/without + -ing","Manner or accompanying circumstance","She left without leaving a note."]]},examples:[{type:"pos",eng:"Turning to face the audience, she paused before speaking.",note:"Present participle \u2014 sequential, same subject throughout."},{type:"pos",eng:"Devastated by the news, he couldn't bring himself to speak.",note:"Past participle \u2014 passive meaning, causal."},{type:"pos",eng:"Having spent three years on the project, the team was proud of the result.",note:"Perfect participle \u2014 completed before main verb."},{type:"pos",eng:"Not having received any response, she decided to follow up in person.",note:"Negative perfect participle."},{type:"pos",eng:"Having been shortlisted twice before, she was quietly confident.",note:"Perfect passive participle \u2014 she was shortlisted (passive), before being confident."},{type:"neg",eng:"Seen from above, the city looks completely different.",note:"Past participle with passive meaning \u2014 the city is seen."}],errors:[{bad:"Walking down the street, a dog bit me.",good:"Walking down the street, I was bitten by a dog.",reason:"Dangling participle \u2014 the subject of walking and the main clause must match. A dog wasn't walking."},{bad:"Having finished the work, the office was locked up.",good:"Having finished the work, she locked up the office.",reason:"The office didn't finish the work. The subject must be the same throughout."},{bad:"Exhausting from the journey, he went straight to bed.",good:"Exhausted by the journey, he went straight to bed.",reason:"Past participle for passive meaning \u2014 exhausted (he was exhausted), not exhausting."},{bad:"Not having been told about the meeting, so she didn't attend.",good:"Not having been told about the meeting, she didn't attend.",reason:"Participle clause already acts as the reason \u2014 don't add so as well."}],realUse:["\"Faced with rising costs, the company had little choice.\" \u2014 journalistic.","\"Having considered all the evidence, the judge reached her verdict.\" \u2014 legal/formal.","\"Not wishing to alarm anyone, I mention this only as a precaution.\" \u2014 diplomatic.","\"Built in the 1920s, the building is now a listed structure.\" \u2014 descriptive/formal."],exercises:[{type:"gap",title:"Form the participle clause",sub:"Fill each gap with the correct participle form of the verb in brackets.",items:[{answer:"Having submitted",before:"",after:" the application, she waited anxiously for a response. (submit \u2014 perfect)"},{answer:"Exhausted",before:"",after:" by weeks of negotiations, the delegates finally reached an agreement. (exhaust \u2014 passive)"},{answer:"Not knowing",before:"",after:" what to say, he remained silent. (know \u2014 negative present)"},{answer:"Having been warned",before:"",after:" about the risks, she proceeded carefully. (warn \u2014 perfect passive)"},{answer:"Turning",before:"",after:" to face the audience, the speaker paused. (turn \u2014 present)"},{answer:"Founded",before:"",after:" in 1892, the institution has a long and distinguished history. (found \u2014 passive)"},{answer:"Not having received",before:"",after:" a reply, she sent a follow-up message. (receive \u2014 negative perfect)"},{answer:"Damaged",before:"",after:" beyond repair, the building was eventually demolished. (damage \u2014 passive)"}]},{type:"mc",title:"Which participle form?",sub:"Choose the correct participle clause.",items:[{q:"_____ by the scale of the response, the organisers decided to extend the event.",opts:["Overwhelming","Overwhelmed","Having overwhelmed","Being overwhelming"],answer:"Overwhelmed",explanation:"Passive meaning \u2014 the organisers were overwhelmed \u2192 past participle."},{q:"_____ three hours on the problem, she finally found a solution.",opts:["Spending","Spent","Having spent","Been spending"],answer:"Having spent",explanation:"Completed action before the main verb \u2192 having + past participle."},{q:"_____ how to respond, he said nothing.",opts:["Not knowing","Not known","Not having known","Unknown"],answer:"Not knowing",explanation:"Negative present participle \u2014 simultaneous/causal: because he didn't know."},{q:"_____ the report, the board called an emergency meeting.",opts:["Reading","Having read","Read","Been reading"],answer:"Having read",explanation:"The reading was completed before the meeting \u2014 perfect participle."}]},{type:"tf",title:"Dangling or not?",sub:"Is the participle clause correctly attached to the right subject?",items:[{context:"Walking through the park, I noticed the flowers were in bloom.",statement:"This sentence is grammatically correct \u2014 the subjects match.",answer:"True",explanation:"I was walking, and I noticed \u2014 same subject throughout. \u2713"},{context:"Having finished the exam, the room fell silent.",statement:"This sentence is grammatically correct.",answer:"False",explanation:"Dangling participle \u2014 the room didn't finish the exam. Should be: Having finished the exam, the students fell silent."},{context:"Devastated by the result, the coach resigned immediately.",statement:"The coach was devastated.",answer:"True",explanation:"Past participle (passive) \u2014 the coach was devastated. Same subject as resigned. \u2713"},{context:"Sitting by the window, the rain began to fall.",statement:"This sentence contains a dangling participle.",answer:"True",explanation:"The rain wasn't sitting by the window. The subject of sitting and the subject of began don't match."},{context:"Not having been informed of the changes, she arrived unprepared.",statement:"She had been informed of the changes.",answer:"False",explanation:"Not having been informed = she had NOT been informed. The negative perfect passive."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using a participle clause.",items:[{original:"Because she had read the report, she was well prepared.",keyword:"Having read",answer:"Having read the report, she was well prepared."},{original:"Because he was exhausted by the journey, he went to bed early.",keyword:"Exhausted",answer:"Exhausted by the journey, he went to bed early."},{original:"She didn't know what to say, so she said nothing.",keyword:"Not knowing",answer:"Not knowing what to say, she said nothing."},{original:"After they had finished the meeting, the team went for dinner.",keyword:"Having finished",answer:"Having finished the meeting, the team went for dinner."},{original:"Because she hadn't been told about the change, she was confused.",keyword:"Not having been",answer:"Not having been told about the change, she was confused."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Walking down the street, a car nearly hit me.",correct:"Walking down the street, I was nearly hit by a car.",hint:"Dangling participle \u2014 the subject must be the same in both clauses."},{wrong:"Having finished the work, the office was locked.",correct:"Having finished the work, she locked the office.",hint:"The office didn't finish the work \u2014 fix the subject."},{wrong:"Exhausting from the climb, they rested at the summit.",correct:"Exhausted by the climb, they rested at the summit.",hint:"Passive meaning \u2014 exhausted (by), not exhausting."},{wrong:"Not having been told, so she missed the meeting.",correct:"Not having been told, she missed the meeting.",hint:"Participle clause gives the reason \u2014 don't add so."},{wrong:"Having been submitting the report, she felt relieved.",correct:"Having submitted the report, she felt relieved.",hint:"Perfect participle: having + past participle \u2014 not having been + -ing."}]}]},

{id:"advcond",title:"Advanced conditionals: inversion",subtitle:"Were she to resign... / Had it not been for... / Should you need...",intro:"Formal conditional structures that drop the word if entirely.",desc:"At B2 you learnt third and mixed conditionals. At C1, the key addition is the formal inversion of conditional clauses \u2014 dropping <em>if</em> and moving the auxiliary to the front. This appears constantly in formal correspondence, legal language, and academic writing. It signals sophistication.",tip:"The three main patterns cover the three conditional types: <strong>Should</strong> (first/open conditional), <strong>Were...to</strong> (second conditional), <strong>Had</strong> (third conditional). Each replaces the corresponding <em>if</em> construction. Recognising and producing all three is a C1 target.",explanation:"<p>Formal conditional inversion removes <em>if</em> and fronts the auxiliary. The meaning is identical to the standard conditional \u2014 only the register changes.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Should + subject + base verb</strong> \u2014 formal first conditional (possibility). Replaces <em>if + present simple</em>.<br>\n<em>\"Should you require further information, please do not hesitate to contact us.\"</em><br>\n<em>\"Should the situation change, we will inform you immediately.\"</em><br>\nVery common in formal correspondence. The result clause uses will/would/imperative.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Were + subject + to + base verb</strong> \u2014 formal second conditional (hypothetical). Replaces <em>if + past simple</em>.<br>\n<em>\"Were the company to collapse, thousands of jobs would be lost.\"</em><br>\n<em>\"Were she to discover the truth, the consequences would be serious.\"</em><br>\nAlso: <em>\"Were it not for your support, we would have failed.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Had + subject + past participle</strong> \u2014 formal third conditional (imaginary past). Replaces <em>if + past perfect</em>.<br>\n<em>\"Had the report been submitted on time, this crisis would have been avoided.\"</em><br>\n<em>\"Had it not been for her intervention, the situation could have escalated.\"</em><br>\nThe result clause uses would have / could have / might have + past participle.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Were it not for / Had it not been for</strong> \u2014 expressing what prevents or prevented something. Extremely common in formal and literary English.<br>\n<em>\"Were it not for the generous funding, this research would be impossible.\"</em><br>\n<em>\"Had it not been for her courage, the situation would have been far worse.\"</em></div></div>\n<div class=\"note\"><strong>Register note:</strong> These inversions are formal and written. In spoken English, the <em>if</em> versions are always natural and preferred. Using <em>\"Should you require...\"</em> in casual conversation would sound strange.<br>\n<strong>No inversion in the result clause:</strong> The inversion applies only to the condition clause \u2014 the result clause keeps normal word order.<br>\n<em>\"Were this to fail, we would need a new strategy.\"</em> \u2014 inversion in condition only.</div>",table:{headers:["Inversion","Standard equivalent","Register"],rows:[["Should + subject + base verb","If + present simple","Formal \u2014 possibility"],["Were + subject + to + base","If + past simple (hypothetical)","Formal \u2014 hypothetical"],["Had + subject + past participle","If + past perfect","Formal \u2014 imaginary past"],["Were it not for + noun","If it were not for + noun","Formal \u2014 preventing factor (present)"],["Had it not been for + noun","If it had not been for + noun","Formal \u2014 preventing factor (past)"]]},examples:[{type:"pos",eng:"Should you have any questions, please feel free to contact our team.",note:"Should inversion \u2014 formal correspondence opening."},{type:"pos",eng:"Were the project to exceed its budget, additional approval would be required.",note:"Were...to inversion \u2014 hypothetical consequence."},{type:"pos",eng:"Had the vaccine been available earlier, countless lives would have been saved.",note:"Had inversion \u2014 imaginary past."},{type:"pos",eng:"Were it not for the team's dedication, the launch would not have been possible.",note:"Were it not for \u2014 what prevents the negative outcome."},{type:"pos",eng:"Had it not been for her quick thinking, the accident could have been fatal.",note:"Had it not been for \u2014 what prevented the worse outcome in the past."},{type:"pos",eng:"Should the need arise, we are fully prepared to take decisive action.",note:"Should inversion \u2014 formal contingency."}],errors:[{bad:"Were she discover the truth, the consequences would be severe.",good:"Were she to discover the truth, the consequences would be severe.",reason:"Were + subject + to + base verb \u2014 to is required between were and the verb."},{bad:"Should you will need assistance, please call this number.",good:"Should you need assistance, please call this number.",reason:"Should inversion uses the base form \u2014 no will after should."},{bad:"Had the report been submitted on time, this crisis would avoid.",good:"Had the report been submitted on time, this crisis would have been avoided.",reason:"Third conditional result: would have + past participle."},{bad:"Were it not for her, we would failed.",good:"Were it not for her, we would have failed.",reason:"Hypothetical result about the past needs would have + pp."},{bad:"Should this happened, we would respond immediately.",good:"Should this happen, we would respond immediately.",reason:"Should inversion: base form \u2014 happen, not happened."}],realUse:["\"Should you wish to unsubscribe, please click the link below.\" \u2014 formal email.","\"Were this bill to pass, it would represent the most significant reform in decades.\" \u2014 political.","\"Had it not been for the whistleblower, the fraud would never have been discovered.\" \u2014 journalistic.","\"Were I to begin again, I would do many things differently.\" \u2014 reflective/literary."],exercises:[{type:"gap",title:"Formal conditional inversion",sub:"Rewrite the if-clause using formal inversion.",items:[{answer:"Should you require",before:"If you require further information \u2192 ",after:" further information, please contact us."},{answer:"Were the company to collapse",before:"If the company collapsed \u2192 ",after:", thousands would lose their jobs."},{answer:"Had the decision been made earlier",before:"If the decision had been made earlier \u2192 ",after:", the crisis would have been avoided."},{answer:"Were it not for",before:"If it were not for their support \u2192 ",after:" their support, we would have failed."},{answer:"Should the situation change",before:"If the situation changes \u2192 ",after:", you will be notified immediately."},{answer:"Had it not been for",before:"If it had not been for her intervention \u2192 ",after:" her intervention, things could have been much worse."}]},{type:"mc",title:"Which inversion?",sub:"Choose the correct formal conditional.",items:[{q:"_____ any problems arise, please contact the helpdesk immediately.",opts:["Were","Had","Should","If"],answer:"Should",explanation:"Should + subject + base verb = formal first conditional (open possibility)."},{q:"_____ the merger to go ahead, significant restructuring would follow.",opts:["Should","Had","Were","If"],answer:"Were",explanation:"Were + subject + to + base verb = formal second conditional (hypothetical)."},{q:"_____ the warning been heeded, the disaster would have been prevented.",opts:["Were","Should","Had","If"],answer:"Had",explanation:"Had + subject + pp = formal third conditional (imaginary past)."},{q:"_____ it not been for the rain, the outdoor event would have been perfect.",opts:["Were","Had","Should","If"],answer:"Had",explanation:"Had it not been for = if it had not been for \u2014 past preventing factor."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite each sentence using formal conditional inversion.",items:[{original:"If you need any assistance, please do not hesitate to call.",keyword:"Should",answer:"Should you need any assistance, please do not hesitate to call."},{original:"If the policy were to change, we would need to reconsider our position.",keyword:"Were",answer:"Were the policy to change, we would need to reconsider our position."},{original:"If she had known about the problem, she would have acted sooner.",keyword:"Had",answer:"Had she known about the problem, she would have acted sooner."},{original:"If it were not for the funding, this project would be impossible.",keyword:"Were it",answer:"Were it not for the funding, this project would be impossible."},{original:"If it had not been for his quick thinking, the situation could have been fatal.",keyword:"Had it",answer:"Had it not been for his quick thinking, the situation could have been fatal."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["should","you","wish","to","cancel","your","subscription","please","notify","us","in","writing"],answer:"should you wish to cancel your subscription please notify us in writing",context:"Should inversion \u2014 formal correspondence."},{words:["were","this","legislation","to","be","passed","the","consequences","would","be","far-reaching"],answer:"were this legislation to be passed the consequences would be far-reaching",context:"Were...to inversion \u2014 hypothetical."},{words:["had","it","not","been","for","her","testimony","the","case","would","have","collapsed"],answer:"had it not been for her testimony the case would have collapsed",context:"Had it not been for \u2014 past preventing factor."},{words:["were","it","not","for","public","pressure","the","inquiry","would","never","have","been","launched"],answer:"were it not for public pressure the inquiry would never have been launched",context:"Were it not for \u2014 present preventing factor."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Were she discover the truth, the consequences would be severe.",correct:"Were she to discover the truth, the consequences would be severe.",hint:"Were + subject + to + base verb \u2014 don't forget to."},{wrong:"Should you will need help, call this number.",correct:"Should you need help, call this number.",hint:"Should inversion: base form \u2014 no will."},{wrong:"Had the report submitted on time, this would have been avoided.",correct:"Had the report been submitted on time, this would have been avoided.",hint:"Passive: had + subject + been + past participle."},{wrong:"Were it not for her, we would failed completely.",correct:"Were it not for her, we would have failed completely.",hint:"Hypothetical past result: would have + past participle."},{wrong:"Should this happened, immediate action would be taken.",correct:"Should this happen, immediate action would be taken.",hint:"Should inversion: base form \u2014 happen, not happened."}]}]},

{id:"nounclauses",title:"Advanced noun clauses",subtitle:"the fact that, what struck me, it being the case that",intro:"Clauses that function as nouns \u2014 as subjects, objects, and complements.",desc:"Noun clauses replace nouns in a sentence \u2014 they can be the subject, object, or complement of a clause. At C1 the challenge is the more complex structures: abstract noun + that-clause, the fact that, it-extraposition, and nominal wh-clauses.",tip:"The most useful C1 skill here is <strong>it-extraposition</strong> \u2014 moving a heavy subject to the end of the sentence for naturalness. <em>\"That the results are inconclusive is disappointing\"</em> is grammatically correct but feels heavy. <em>\"It is disappointing that the results are inconclusive\"</em> is what a native speaker would write. At C1, choosing the right structure for readability matters.",explanation:"<p>Noun clauses function as the subject, object, or complement of a sentence. At C1 they appear in complex academic and formal constructions.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Abstract noun + that-clause (appositives)</strong> \u2014 a noun followed by a that-clause that explains or specifies it.<br>\n<em>\"The fact that she refused surprised everyone.\"</em><br>\n<em>\"The possibility that the results are wrong cannot be ignored.\"</em><br>\n<em>\"His claim that the data was fabricated proved unfounded.\"</em><br>\nCommon nouns: <em>fact, idea, possibility, claim, suggestion, belief, hope, fear, news, evidence, assumption, conclusion.</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>It-extraposition</strong> \u2014 moving a heavy subject noun clause to the end, replacing it with <em>it</em> at the front. Much more natural in English than a fronted clause.<br>\n<em>\"It is disappointing that no progress has been made.\"</em> (= That no progress has been made is disappointing.)<br>\n<em>\"It remains to be seen whether the policy will succeed.\"</em><br>\n<em>\"It is not yet clear what the implications are.\"</em><br>\nPattern: It + be/seem/appear/remain + adjective/past participle + that/whether/what clause.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Nominal wh-clauses</strong> \u2014 wh-word + clause functioning as a noun.<br>\n<em>\"What struck me most was her composure.\"</em> (subject)<br>\n<em>\"No one knows who is responsible.\"</em> (object)<br>\n<em>\"The question is whether we can afford it.\"</em> (complement)<br>\n<em>\"How the decision was reached remains unclear.\"</em> (subject)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Whether vs if in noun clauses</strong> \u2014 both introduce indirect yes/no questions, but differ in some contexts.<br>\n<em>Whether</em> \u2014 preferred in formal writing; used as subject, after prepositions, before <em>to</em>, and with <em>or not</em> directly after.<br>\n<em>If</em> \u2014 more informal; only as object, not as subject or after prepositions.<br>\n<em>\"Whether to proceed is the key question.\"</em> (subject \u2014 whether only)<br>\n<em>\"It depends on whether the funding comes through.\"</em> (after preposition \u2014 whether only)</div></div>\n<div class=\"note\"><strong>Avoiding heavy subjects:</strong><br>\nHeavy (grammatically correct but stylistically poor): <em>\"That the project failed to meet its targets is a matter of concern.\"</em><br>\nNatural (extraposed): <em>\"It is a matter of concern that the project failed to meet its targets.\"</em><br>\nAs a rule of thumb: if the subject clause is longer than the predicate, extrapose it.<br>\n<strong>Sequence of tenses:</strong> After past reporting/thinking verbs, the that-clause normally backshifts: <em>\"She believed that the report was accurate.\"</em> No backshift if still true: <em>\"She noted that water boils at 100\u00b0C.\"</em></div>",table:{headers:["Type","Structure","Example"],rows:[["Abstract noun + that-clause","noun + that + clause","The possibility that he lied disturbs me."],["It-extraposition","It + be + adj + that/whether","It is unclear whether the plan will work."],["Nominal wh-clause (subject)","What/How/Whether + clause + verb","What matters most is consistency."],["Nominal wh-clause (object)","verb + what/whether/how + clause","No one knows what happened next."],["Whether vs if (formal)","whether as subject / after prepositions","Whether to proceed is the key decision."],["Sequence of tenses","past verb \u2192 backshift in that-clause","She said that the results had been promising."]]},examples:[{type:"pos",eng:"The fact that no one raised objections suggests unanimous agreement.",note:"Abstract noun + that-clause as subject."},{type:"pos",eng:"It remains to be seen whether the new measures will have any effect.",note:"It-extraposition with remains to be seen \u2014 fixed formal phrase."},{type:"pos",eng:"What concerns me most is not the outcome but the process.",note:"Nominal wh-clause as subject \u2014 cleft-like structure."},{type:"pos",eng:"The assumption that growth would continue proved unfounded.",note:"Abstract noun + that-clause \u2014 appositive."},{type:"pos",eng:"It is widely accepted that early intervention produces better outcomes.",note:"It-extraposition \u2014 moving heavy subject to end."},{type:"pos",eng:"Whether the policy achieves its stated aims is, at this point, uncertain.",note:"Whether-clause as subject \u2014 formal written English."}],errors:[{bad:"It is important that she is told immediately.",good:"It is important that she be told immediately.",reason:"After it is important that \u2014 mandative subjunctive: be, not is."},{bad:"The fact that he refused to comment it suggests guilt.",good:"The fact that he refused to comment suggests guilt.",reason:"Don't add a pronoun (it) after the appositive that-clause \u2014 it is already the subject."},{bad:"No one knows if this is the right decision or not.",good:"No one knows whether this is the right decision or not.",reason:"Or not directly after if is not standard \u2014 use whether or not / whether...or not."},{bad:"What does she want is unclear.",good:"What she wants is unclear.",reason:"Noun clauses use statement word order \u2014 no inversion, no auxiliary does."}],realUse:["\"It is worth noting that the data predates the pandemic.\" \u2014 academic hedging.","\"The suggestion that corners were cut demands a thorough investigation.\" \u2014 formal.","\"What remains unclear is the extent of the damage.\" \u2014 news register.","\"It goes without saying that confidentiality must be maintained.\" \u2014 formal fixed phrase."],exercises:[{type:"gap",title:"Complete the noun clause structure",sub:"Fill each gap with the correct word or phrase.",items:[{answer:"that",before:"The fact ",after:" she resigned surprised the whole industry."},{answer:"whether",before:"It remains to be seen ",after:" the reform will achieve its aims."},{answer:"What",before:"",after:" struck me most was her absolute composure under pressure."},{answer:"It is widely believed",before:"",after:" that the decision was politically motivated."},{answer:"whether",before:"The question of ",after:" to proceed now divides the committee."},{answer:"that",before:"The possibility ",after:" the figures had been manipulated was deeply troubling."},{answer:"What",before:"",after:" matters in the long term is consistency, not short-term gain."},{answer:"It remains unclear",before:"",after:" how the breach occurred."}]},{type:"mc",title:"It-extraposition or noun clause?",sub:"Choose the most natural or correct form.",items:[{q:"_____ the economy will recover quickly seems unlikely.",opts:["It","That","What","Whether"],answer:"That",explanation:"That-clause as subject \u2014 grammatically fine, though it-extraposition would be more natural: 'It seems unlikely that the economy will recover quickly.'"},{q:"_____ is not yet clear what caused the failure.",opts:["That","What","It","Whether"],answer:"It",explanation:"It-extraposition: It + is/remains/seems + adjective + what-clause."},{q:"She was unaware of _____ the contract had been terminated.",opts:["that","what","whether","if"],answer:"whether",explanation:"After a preposition (of), use whether not if or that."},{q:"_____ she did next shocked everyone in the room.",opts:["That","It","What","Whether"],answer:"What",explanation:"Nominal wh-clause as subject: What + subject + verb = noun clause."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"That no agreement was reached is extremely disappointing.",keyword:"It is",answer:"It is extremely disappointing that no agreement was reached."},{original:"She said the results were very promising.",keyword:"that",answer:"She said that the results were very promising."},{original:"The most important thing is consistency.",keyword:"What",answer:"What matters most is consistency."},{original:"Her assumption: the funding would continue. It proved wrong.",keyword:"The assumption that",answer:"The assumption that the funding would continue proved wrong."},{original:"We don't know if the project will succeed or not.",keyword:"whether",answer:"We don't know whether the project will succeed or not."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"The fact that he refused it suggests he is hiding something.",correct:"The fact that he refused suggests he is hiding something.",hint:"Don't add a pronoun (it) after the appositive that-clause."},{wrong:"What does she want is a matter of debate.",correct:"What she wants is a matter of debate.",hint:"Noun clause: statement word order \u2014 no auxiliary does."},{wrong:"It depends on if the funding comes through.",correct:"It depends on whether the funding comes through.",hint:"After a preposition, use whether, not if."},{wrong:"It is important that she is present.",correct:"It is important that she be present.",hint:"It is important that \u2192 mandative subjunctive: be."},{wrong:"The possibility that he was guilty it was never fully investigated.",correct:"The possibility that he was guilty was never fully investigated.",hint:"Don't repeat the subject with a pronoun after the that-clause."}]}]},

{id:"fronting",title:"Fronting",subtitle:"Only then did she realise / What he did was unacceptable",intro:"Moving elements to the front of a sentence for emphasis, contrast, or focus.",desc:"Fronting places a non-subject element at the beginning of a clause for emphasis or stylistic effect. At C1 it is expected as a mark of sophisticated writing and formal register. It often triggers inversion of subject and auxiliary.",tip:"Fronting and inversion overlap significantly \u2014 many B2 inversion structures (Never have I, Not only did she) are a type of fronting. At C1, fronting extends further: fronting of objects, complements, adverbials, and wh-clauses. The key is knowing <em>when</em> inversion is required (after negative/restrictive adverbials) and when it is not (after fronted objects and complements).",explanation:"<p>Fronting moves an element to the beginning of a clause for focus, contrast, or rhetorical emphasis.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Fronted object (topicalisation)</strong> \u2014 no inversion required. The object moves to the front but word order in the rest stays normal.<br>\n<em>\"This I cannot accept.\"</em> (= I cannot accept this.)<br>\n<em>\"The report, she had never seen.\"</em> (= She had never seen the report.)<br>\n<em>\"His work I admire enormously, but his personality leaves something to be desired.\"</em><br>\nCommon in literary and rhetorical contexts. Signals contrast or strong emphasis.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Fronted complement</strong> \u2014 adjective or noun complement moved to the front. No inversion.<br>\n<em>\"Remarkable was her composure under pressure.\"</em><br>\n<em>\"Central to the argument is the question of accountability.\"</em><br>\n<em>\"More worrying still is the lack of transparency.\"</em><br>\nCommon in formal written English \u2014 particularly academic and journalistic.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Fronted adverbial \u2014 with inversion</strong> \u2014 negative and restrictive adverbials trigger subject-auxiliary inversion. (Covered in B2 inversion lesson \u2014 extended here.)<br>\n<em>\"Under no circumstances will this be tolerated.\"</em><br>\n<em>\"On no account should you sign without reading.\"</em><br>\n<em>\"Only then did she realise the scale of the problem.\"</em><br>\n<em>\"In no way does this represent the company's position.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Fronted wh-clause</strong> \u2014 a nominal wh-clause placed first for emphasis.<br>\n<em>\"What he did next shocked everyone.\"</em> (no inversion \u2014 the wh-clause is the subject)<br>\n<em>\"What I find most impressive is her resilience.\"</em> (wh-cleft \u2014 covered in B2)</div></div>\n<div class=\"note\"><strong>When does inversion occur?</strong><br>\n\u2713 After negative/restrictive adverbials: <em>never, rarely, only, not only, under no circumstances, on no account, in no way, at no time, seldom, hardly, no sooner.</em><br>\n\u2717 After fronted objects: <em>\"This I cannot accept.\"</em> \u2014 no inversion.<br>\n\u2717 After fronted complements: <em>\"Remarkable was her composure.\"</em> \u2014 inversion of be/linking verb only, not do-support.<br>\n<strong>Stylistic caution:</strong> Fronting is a powerful rhetorical tool. Overuse weakens its effect. Reserve it for moments of genuine emphasis or contrast.</div>",table:{headers:["Type","Inversion?","Example"],rows:[["Fronted object","No","This offer, I cannot refuse."],["Fronted complement (adj)","Linking verb only","Central to this is the question of trust."],["Fronted negative adverbial","Yes (full inversion)","Under no circumstances will this be accepted."],["Fronted restrictive adverbial","Yes","Only after the meeting did she understand."],["Fronted wh-clause (subject)","No","What concerns me is the lack of data."],["Fronted prepositional phrase","Sometimes","In this context, the decision makes sense."]]},examples:[{type:"pos",eng:"The consequences of this decision, we are only beginning to understand.",note:"Fronted object \u2014 no inversion, strong emphasis."},{type:"pos",eng:"Central to the entire debate is the question of who bears responsibility.",note:"Fronted complement \u2014 be inverts, no do-support needed."},{type:"pos",eng:"Under no circumstances should personal data be shared with third parties.",note:"Fronted negative adverbial \u2014 should inverts before subject."},{type:"pos",eng:"Only after years of research did the team arrive at a credible explanation.",note:"Only after \u2014 fronted adverbial triggering inversion."},{type:"pos",eng:"More troubling still is the apparent lack of any oversight mechanism.",note:"Fronted comparative complement \u2014 formal journalistic register."},{type:"pos",eng:"In no way does this statement reflect the views of the organisation.",note:"In no way \u2014 negative fronted adverbial with do-support."}],errors:[{bad:"Under no circumstances we will accept this offer.",good:"Under no circumstances will we accept this offer.",reason:"Negative fronted adverbial triggers inversion \u2014 will before we."},{bad:"Only then she realised the full extent of the problem.",good:"Only then did she realise the full extent of the problem.",reason:"Only then triggers inversion \u2014 did before she."},{bad:"This I will not to accept.",good:"This I will not accept.",reason:"Fronted object \u2014 no inversion, and no to after will."},{bad:"Central to the argument is being the question of trust.",good:"Central to the argument is the question of trust.",reason:"Fronted complement: adjective + is + subject \u2014 no being."}],realUse:["\"At no point did the company admit liability.\" \u2014 legal/formal.","\"What she achieved in those conditions was nothing short of extraordinary.\" \u2014 rhetorical.","\"More significant, however, is the long-term implication.\" \u2014 academic discourse.","\"Only by working together can we address the scale of this challenge.\" \u2014 political speech."],exercises:[{type:"gap",title:"Complete the fronted structure",sub:"Fill each gap to complete the fronted sentence.",items:[{answer:"will this",before:"Under no circumstances ",after:" be permitted."},{answer:"did she",before:"Only then ",after:" understand what had really happened."},{answer:"is the question of accountability",before:"Central to the entire argument ",after:"."},{answer:"does this",before:"In no way ",after:" reflect our official position."},{answer:"I cannot",before:"This offer, ",after:" refuse."},{answer:"should you",before:"On no account ",after:" sign without reading the full contract."},{answer:"was her composure",before:"Remarkable throughout the entire ordeal ",after:"."},{answer:"did the team",before:"Only after months of analysis ",after:" reach a conclusion."}]},{type:"mc",title:"Fronting \u2014 inversion required or not?",sub:"Choose the correct sentence.",items:[{q:"Under no circumstances _____ this be disclosed to the public.",opts:["is","should","we should","that"],answer:"should",explanation:"Negative fronted adverbial \u2192 inversion: should before the subject (implied 'it')."},{q:"His courage _____ but his judgement leaves much to be desired.",opts:["I admire","do I admire","admire I","I do admire"],answer:"I admire",explanation:"Fronted object \u2014 no inversion. Normal subject-verb order in the rest of the clause."},{q:"Central to the problem _____ the lack of communication.",opts:["is","does lie","it is","there is"],answer:"is",explanation:"Fronted complement \u2014 be inverts with subject (the lack of communication is central \u2192 fronted: Central... is the lack...)."},{q:"Only when she read the letter _____ the full truth.",opts:["she understood","understood she","did she understand","she did understand"],answer:"did she understand",explanation:"Only when triggers inversion: did + she + base form."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using fronting.",items:[{original:"We will not accept this under any circumstances.",keyword:"Under no circumstances",answer:"Under no circumstances will we accept this."},{original:"The question of trust is central to the entire argument.",keyword:"Central",answer:"Central to the entire argument is the question of trust."},{original:"She only understood the truth after reading the report.",keyword:"Only after",answer:"Only after reading the report did she understand the truth."},{original:"This decision I find completely unacceptable.",keyword:"This decision",answer:"This decision I find completely unacceptable."},{original:"We will not tolerate this in any way.",keyword:"In no way",answer:"In no way will we tolerate this."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Under no circumstances we will reveal this information.",correct:"Under no circumstances will we reveal this information.",hint:"Negative adverbial \u2192 inversion: will before we."},{wrong:"Only then she realised the truth.",correct:"Only then did she realise the truth.",hint:"Only then \u2192 inversion: did before she."},{wrong:"This I will not to accept.",correct:"This I will not accept.",hint:"Fronted object \u2014 no to after will."},{wrong:"Central to the argument is being the question of trust.",correct:"Central to the argument is the question of trust.",hint:"No being \u2014 just is + subject."},{wrong:"In no way this reflects our position.",correct:"In no way does this reflect our position.",hint:"Negative adverbial \u2192 inversion with do: does this reflect."}]}]},

{id:"gerundnominal",title:"Gerund clauses: nominal use",subtitle:"His refusing to cooperate / There is no point in our discussing",intro:"Gerunds functioning as full noun phrases \u2014 subjects, objects, and complements.",desc:"At B1/B2 you learnt which verbs take gerunds or infinitives. At C1 the gerund extends to its full nominal function: as a subject, as the object of a preposition in complex noun phrases, and crucially with a possessive or object pronoun before it. This is where learners at C1 commonly make errors.",tip:"The possessive + gerund is the key C1 distinction. <em>\"I don't mind him being late\"</em> (informal \u2014 object pronoun) vs <em>\"I don't mind his being late\"</em> (formal \u2014 possessive). Both are grammatically valid. In formal writing, the possessive is preferred. Most learners only know the informal version \u2014 knowing both is a C1 marker.",explanation:"<p>At C1, gerunds are used as full noun phrases in complex grammatical roles beyond simple verb complementation.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Gerund as subject</strong> \u2014 a gerund phrase can be the subject of a sentence. More formal than an infinitive subject with <em>it</em>.<br>\n<em>\"Reaching a consensus proved more difficult than expected.\"</em><br>\n<em>\"Overlooking such an obvious error is inexcusable.\"</em><br>\n<em>\"Having made the commitment, withdrawing now would be embarrassing.\"</em> (perfect gerund as subject)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Possessive + gerund</strong> \u2014 the gerund has its own subject, marked with a possessive (formal) or object pronoun (informal).<br>\nFormal: <em>\"His refusing to cooperate complicated matters.\"</em><br>\nInformal: <em>\"Him refusing to cooperate complicated matters.\"</em><br>\nFormal: <em>\"I resent his constantly interrupting.\"</em><br>\nInformal: <em>\"I resent him constantly interruptin
