// ── NAVIGATION ──
function goto(i){
  current=i;
  const main=document.getElementById('main');
  main.innerHTML=buildLesson(lessons[i],i);
  updateSticky(lessons[i]);
  observeHero();
  updateSticky(lessons[i]);
  observeHero();
  main.style.animation='none';
  main.offsetHeight;
  main.style.animation='fadeUp .25s ease forwards';
  document.getElementById('breadcrumb-topic').textContent=lessons[i].title;
  buildSidebar();
  window.scrollTo(0,0);
}

// ── MARK DONE ──
function markDone(id,idx){
  if(!done.includes(id)){done.push(id);localStorage.setItem('jpe-c1-done',JSON.stringify(done));}
  goto(idx);
}

// ── GAP FILL ──
function checkGap(lid,ei,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`gap-${lid}-${ei}-${i}`);
    const rev=document.getElementById(`gap-rev-${lid}-${ei}-${i}`);
    const accepted=inp.dataset.answer.toLowerCase().split('/').map(a=>a.trim());
    const val=inp.value.toLowerCase().trim();
    const ok=accepted.includes(val)||(val===''&&accepted.includes('—'));
    if(ok){inp.className='gap-input correct';rev.className='gap-reveal';correct++;}
    else{inp.className='gap-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='gap-reveal show';}
  }
  const badge=document.getElementById(`score-gap-${lid}-${ei}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetGap(lid,ei,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`gap-${lid}-${ei}-${i}`);
    const rev=document.getElementById(`gap-rev-${lid}-${ei}-${i}`);
    inp.value='';inp.className='gap-input';rev.textContent='';rev.className='gap-reveal';
  }
  document.getElementById(`score-gap-${lid}-${ei}`).className='score-badge';
}

// ── MULTIPLE CHOICE ──
function pickMC(lid,ei,qi,choice,answer,explanation){
  const container=document.getElementById(`mc-${lid}-${ei}-${qi}`);
  container.querySelectorAll('.mc-opt').forEach(o=>{
    o.classList.remove('correct-ans','wrong-ans');
    if(o.dataset.opt===answer) o.classList.add('correct-ans');
    if(o.dataset.opt===choice&&choice!==answer) o.classList.add('wrong-ans');
  });
  const fb=document.getElementById(`mcfb-${lid}-${ei}-${qi}`);
  fb.textContent=explanation;
  fb.className=`mc-feedback show ${choice===answer?'ok':'bad'}`;
}

// ── ERROR CORRECTION ──
function checkEC(lid,ei,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`ec-${lid}-${ei}-${i}`);
    const ans=inp.dataset.answer.toLowerCase().replace(/[.!?,]/g,'').trim();
    const val=inp.value.toLowerCase().replace(/[.!?,]/g,'').trim();
    if(val===ans){inp.className='ec-input correct';correct++;}
    else inp.className='ec-input wrong';
  }
  const badge=document.getElementById(`score-ec-${lid}-${ei}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetEC(lid,ei,count){
  for(let i=0;i<count;i++){const inp=document.getElementById(`ec-${lid}-${ei}-${i}`);inp.value='';inp.className='ec-input';}
  document.getElementById(`score-ec-${lid}-${ei}`).className='score-badge';
}

// ── SENTENCE BUILDER ──
const sbState={};
function sbClick(sid,si,wi){
  if(!sbState[sid]) sbState[sid]={};
  if(!sbState[sid][si]) sbState[sid][si]=[];
  const wordEl=document.getElementById(`sbw-${sid}-${si}-${wi}`);
  const word=wordEl.dataset.word;
  sbState[sid][si].push({word,wi});
  wordEl.classList.add('used');
  const slot=document.getElementById(`sb-slot-${sid}-${si}`);
  const placed=document.createElement('button');
  placed.className='sb-placed';
  placed.textContent=word;
  placed.onclick=()=>sbRemove(sid,si,wi,placed);
  slot.appendChild(placed);
}
function sbRemove(sid,si,wi,el){
  const wordEl=document.getElementById(`sbw-${sid}-${si}-${wi}`);
  wordEl.classList.remove('used');
  sbState[sid][si]=sbState[sid][si].filter(x=>x.wi!==wi);
  el.remove();
}
function checkBuilder(sid,count,answersJson){
  const answers=JSON.parse(answersJson.replace(/&quot;/g,'"'));
  let correct=0;
  for(let i=0;i<count;i++){
    const placed=(sbState[sid]&&sbState[sid][i])||[];
    const built=placed.map(x=>x.word).join(' ').toLowerCase().trim();
    const ans=answers[i].toLowerCase().trim();
    const res=document.getElementById(`sb-res-${sid}-${i}`);
    if(built===ans){res.textContent='✓ Correct!';res.className='sb-result show ok';correct++;}
    else{res.textContent=`✗ Answer: ${answers[i]}`;res.className='sb-result show bad';}
  }
  const badge=document.getElementById(`score-sb-${sid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetBuilder(sid,count,wordsJson){
  const words=JSON.parse(wordsJson.replace(/&quot;/g,'"'));
  sbState[sid]={};
  for(let i=0;i<count;i++){
    document.getElementById(`sb-slot-${sid}-${i}`).innerHTML='';
    document.getElementById(`sb-res-${sid}-${i}`).className='sb-result';
    const bank=document.getElementById(`sb-bank-${sid}-${i}`);
    const shuffled=[...words[i]].sort(()=>Math.random()-.5);
    bank.innerHTML=shuffled.map((w,wi)=>`<button class="sb-word" id="sbw-${sid}-${i}-${wi}" data-word="${w}" onclick="sbClick('${sid}',${i},${wi})">${w}</button>`).join('');
  }
  document.getElementById(`score-sb-${sid}`).className='score-badge';
}

// ── MATCHING ──
const matchState={};
function matchClick(mid,idx,side){
  if(!matchState[mid]) matchState[mid]={left:null,right:null};
  const elId=side==='left'?`ml-${mid}-${idx}`:`mr-${mid}-${idx}`;
  const el=document.getElementById(elId);
  if(el.classList.contains('matched')) return;
  // deselect same side
  document.querySelectorAll(`[id^="m${side==='left'?'l':'r'}-${mid}-"]`).forEach(e=>{if(!e.classList.contains('matched'))e.classList.remove('selected')});
  el.classList.add('selected');
  matchState[mid][side]={idx,elId};
  const ms=matchState[mid];
  if(ms.left&&ms.right){
    const leftEl=document.getElementById(ms.left.elId);
    const rightEl=document.getElementById(ms.right.elId);
    const leftDataIdx=leftEl.dataset.idx;
    const rightDataIdx=rightEl.dataset.idx;
    if(leftDataIdx===rightDataIdx){
      leftEl.classList.remove('selected');rightEl.classList.remove('selected');
      leftEl.classList.add('matched');rightEl.classList.add('matched');
      // check if all matched
      const total=document.querySelectorAll(`[id^="ml-${mid}-"]`).length;
      const matched=document.querySelectorAll(`[id^="ml-${mid}-"].matched`).length;
      const badge=document.getElementById(`score-match-${mid}`);
      if(matched===total){badge.textContent=`${total}/${total} — all matched! 🎉`;badge.className='score-badge show full';}
    } else {
      leftEl.classList.add('wrong-flash');rightEl.classList.add('wrong-flash');
      setTimeout(()=>{leftEl.classList.remove('wrong-flash','selected');rightEl.classList.remove('wrong-flash','selected');},600);
    }
    matchState[mid]={left:null,right:null};
  }
}

// ── TRANSFORMATION ──
function checkTransform(tid,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`tr-${tid}-${i}`);
    const rev=document.getElementById(`tr-rev-${tid}-${i}`);
    const ans=inp.dataset.answer.toLowerCase().replace(/[.!?,]/g,'').trim();
    const val=inp.value.toLowerCase().replace(/[.!?,]/g,'').trim();
    if(val===ans){inp.className='transform-input correct';rev.className='transform-reveal';correct++;}
    else{inp.className='transform-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='transform-reveal show';}
  }
  const badge=document.getElementById(`score-tr-${tid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetTransform(tid,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`tr-${tid}-${i}`);
    const rev=document.getElementById(`tr-rev-${tid}-${i}`);
    inp.value='';inp.className='transform-input';rev.textContent='';rev.className='transform-reveal';
  }
  document.getElementById(`score-tr-${tid}`).className='score-badge';
}

// ── CATEGORISATION ──
const catState={};
function catClick(cid,wi){
  if(!catState[cid]) catState[cid]={selected:null,placed:{}};
  const cs=catState[cid];
  const wordEl=document.getElementById(`cw-${cid}-${wi}`);
  if(wordEl.classList.contains('placed')) return;
  // find which column was most recently clicked (use a pending col)
  if(cs.pendingCol===undefined||cs.pendingCol===null){
    // first select the word
    document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>e.style.outline='');
    wordEl.style.outline='2px solid var(--sky)';
    cs.selectedWord={wi,word:wordEl.textContent,cat:parseInt(wordEl.dataset.cat)};
  }
}
function catColClick(cid,ci){
  if(!catState[cid]) catState[cid]={selectedWord:null,placed:{}};
  const cs=catState[cid];
  if(!cs.selectedWord) return;
  const {wi,word}=cs.selectedWord;
  const wordEl=document.getElementById(`cw-${cid}-${wi}`);
  wordEl.classList.add('placed');
  wordEl.style.outline='';
  const colItems=document.getElementById(`cc-items-${cid}-${ci}`);
  const placed=document.createElement('button');
  placed.className='cat-placed';
  placed.textContent=word;
  placed.dataset.wi=wi;
  placed.dataset.ci=String(ci);
  placed.dataset.correctCat=String(cs.selectedWord.cat);
  placed.style.background='var(--a1bg)';placed.style.borderColor='var(--sky)';placed.style.color='var(--sky)';
  placed.onclick=()=>{
    wordEl.classList.remove('placed');wordEl.style.outline='';
    placed.remove();
    if(catState[cid].placed[wi]) delete catState[cid].placed[wi];
  };
  colItems.appendChild(placed);
  cs.placed[wi]={ci,correctCat:cs.selectedWord.cat};
  cs.selectedWord=null;
  document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>e.style.outline='');
}
function checkCat(cid,numCols){
  const cs=catState[cid]||{placed:{}};
  let correct=0,total=0;
  // check each placed item
  for(const wi in cs.placed){
    const {ci,correctCat}=cs.placed[wi];
    const wordEl=document.getElementById(`cw-${cid}-${wi}`);
    total++;
    if(ci===correctCat) correct++;
  }
  // also count unplaced items (wrong — left in bank)
  document.querySelectorAll(`[id^="cw-${cid}-"]:not(.placed)`).forEach(()=>total++);
  // colour the columns
  for(let ci=0;ci<numCols;ci++){
    const col=document.getElementById(`cc-${cid}-${ci}`);
    const items=document.getElementById(`cc-items-${cid}-${ci}`);
    let colCorrect=true;
    items.querySelectorAll('.cat-placed').forEach(p=>{
      const correctCat=parseInt(p.dataset.correctCat);
      const placedIn=parseInt(p.dataset.ci);
      if(correctCat!==placedIn){colCorrect=false;p.style.background='#FFF0F0';p.style.borderColor='var(--coral)';p.style.color='var(--coral)';}
      else{p.style.background='#E8F8F5';p.style.borderColor='var(--sea)';p.style.color='#0F7A6A';}
    });
  }
  const badge=document.getElementById(`score-cat-${cid}`);
  const pct=total>0?Math.round((correct/total)*100):0;
  badge.textContent=`${correct}/${total} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetCat(cid,numCols){
  catState[cid]={selectedWord:null,placed:{}};
  document.querySelectorAll(`[id^="cw-${cid}-"]`).forEach(e=>{e.classList.remove('placed');e.style.outline='';});
  for(let ci=0;ci<numCols;ci++) document.getElementById(`cc-items-${cid}-${ci}`).innerHTML='';
  document.getElementById(`score-cat-${cid}`).className='score-badge';
}

// ── CONVERSATION FILL ──
function checkConvo(cvid,count){
  let correct=0;
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`cv-${cvid}-${i}`);
    const rev=document.getElementById(`cv-rev-${cvid}-${i}`);
    const accepted=inp.dataset.answer.toLowerCase().split('/').map(a=>a.trim());
    const val=inp.value.toLowerCase().trim();
    if(accepted.includes(val)){inp.className='convo-input correct';rev.className='convo-reveal';correct++;}
    else{inp.className='convo-input wrong';rev.textContent='→ '+inp.dataset.answer;rev.className='convo-reveal show';}
  }
  const badge=document.getElementById(`score-cv-${cvid}`);
  const pct=Math.round((correct/count)*100);
  badge.textContent=`${correct}/${count} correct (${pct}%)`;
  badge.className=`score-badge show ${pct===100?'full':pct>=50?'partial':'low'}`;
}
function resetConvo(cvid,count){
  for(let i=0;i<count;i++){
    const inp=document.getElementById(`cv-${cvid}-${i}`);
    const rev=document.getElementById(`cv-rev-${cvid}-${i}`);
    inp.value='';inp.className='convo-input';rev.textContent='';rev.className='convo-reveal';
  }
  document.getElementById(`score-cv-${cvid}`).className='score-badge';
}

// ── TRUE / FALSE / NOT GIVEN ──
function pickTF(tfid,qi,choice,answer,explanation){
  const item=document.getElementById(`tf-fb-${tfid}-${qi}`).parentElement;
  item.querySelectorAll('.tf-btn').forEach(b=>{
    b.classList.remove('correct-ans','wrong-ans');
    if(b.textContent===answer) b.classList.add('correct-ans');
    if(b.textContent===choice&&choice!==answer) b.classList.add('wrong-ans');
  });
  const fb=document.getElementById(`tf-fb-${tfid}-${qi}`);
  fb.textContent=explanation;
  fb.className=`tf-feedback show ${choice===answer?'ok':'bad'}`;
}

// ── INIT ──
buildSidebar();
goto(0);

</script>
