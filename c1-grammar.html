g.\"</em><br>\nWith nouns: <em>\"The team's winning the contract surprised everyone.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Preposition + gerund phrase</strong> \u2014 after prepositions, the gerund is required. At C1 these appear in more complex noun phrases.<br>\n<em>\"There is no possibility of resolving this quickly.\"</em><br>\n<em>\"The decision was taken without there being any consultation.\"</em><br>\n<em>\"The risk of misunderstanding the data is significant.\"</em><br>\n<em>\"In spite of having been warned, she proceeded.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Gerund in complex noun phrases</strong> \u2014 gerund as the complement of abstract nouns.<br>\n<em>\"There is no point in prolonging the discussion.\"</em><br>\n<em>\"There is no denying that mistakes were made.\"</em><br>\n<em>\"There is little prospect of reaching an agreement.\"</em><br>\n<em>\"The idea of starting over was daunting.\"</em></div></div>\n<div class=\"note\"><strong>Gerund vs infinitive as subject \u2014 register difference:</strong><br>\nGerund subject (more formal, more concise): <em>\"Reaching consensus proved difficult.\"</em><br>\nIt + infinitive (natural, common): <em>\"It proved difficult to reach consensus.\"</em><br>\nBoth are correct \u2014 the gerund subject feels more literary/academic.<br>\n<strong>Negative gerund:</strong> <em>not</em> before the gerund: <em>\"Not telling her was a mistake.\"</em> / <em>\"His not having replied suggested disinterest.\"</em></div>",table:{headers:["Pattern","Example","Register"],rows:[["Gerund as subject","Ignoring the evidence is not an option.","Formal/written"],["Possessive + gerund (formal)","His refusing to answer was suspicious.","Formal"],["Object pronoun + gerund (informal)","I don't mind him being late.","Informal/spoken"],["Preposition + gerund phrase","There is no chance of resolving this.","Neutral/formal"],["There is no + gerund","There is no denying the scale of the problem.","Fixed formal patterns"],["Negative gerund","Not finishing the work on time was unacceptable.","Formal"]]},examples:[{type:"pos",eng:"His refusing to provide a statement only deepened suspicion.",note:"Possessive + gerund as subject \u2014 formal register."},{type:"pos",eng:"There is no question of the project being abandoned at this stage.",note:"There is no question of + gerund \u2014 fixed formal pattern."},{type:"pos",eng:"The team's winning the contract came as a complete surprise to the industry.",note:"Noun possessive + gerund as subject."},{type:"pos",eng:"I strongly object to his being given preferential treatment.",note:"Object + possessive + gerund after preposition to."},{type:"pos",eng:"There is no denying that the situation has deteriorated significantly.",note:"There is no denying \u2014 fixed C1 pattern."},{type:"pos",eng:"Not having raised the issue earlier proved to be a costly oversight.",note:"Negative perfect gerund as subject."}],errors:[{bad:"His refuse to cooperate was noted.",good:"His refusing to cooperate was noted.",reason:"Possessive + gerund \u2014 the gerund form (refusing), not the base noun form (refusal/refuse)."},{bad:"There is no point to discuss this further.",good:"There is no point in discussing this further.",reason:"There is no point in + gerund \u2014 preposition in is required, then gerund."},{bad:"I resent him to interrupt me constantly.",good:"I resent him interrupting me constantly.",reason:"Resent + object + gerund \u2014 not infinitive."},{bad:"The idea to start over was daunting.",good:"The idea of starting over was daunting.",reason:"Abstract noun + of + gerund \u2014 not to + infinitive with idea here."},{bad:"Not telling she the news was a mistake.",good:"Not telling her the news was a mistake.",reason:"Object pronoun (her), not subject pronoun (she) before gerund."}],realUse:["\"There is no escaping the conclusion that reform is necessary.\" \u2014 academic.","\"Her having accepted the role surprised many in the industry.\" \u2014 formal narrative.","\"There was little prospect of the two sides reaching an agreement.\" \u2014 journalistic.","\"The very act of acknowledging the problem is a step forward.\" \u2014 rhetorical."],exercises:[{type:"gap",title:"Gerund nominal structures",sub:"Fill each gap with the correct gerund construction.",items:[{answer:"his refusing",before:"",after:" to comply was seen as a serious breach of protocol."},{answer:"in discussing",before:"There is no point ",after:" this further until we have the full data."},{answer:"of the situation improving",before:"There is little prospect ",after:" in the short term."},{answer:"her constantly interrupting",before:"I strongly object to ",after:" the proceedings."},{answer:"Not having been",before:"",after:" consulted, she felt understandably aggrieved."},{answer:"of starting",before:"The idea ",after:" again from scratch was deeply unappealing."},{answer:"There is no denying",before:"",after:" that significant mistakes were made."},{answer:"the team's winning",before:"",after:" the contract was a remarkable achievement."}]},{type:"mc",title:"Possessive or object pronoun?",sub:"Choose the more formal option, unless informal is specified.",items:[{q:"_____ refusing to cooperate was noted in the report. (formal)",opts:["Him","His","He","Himself"],answer:"His",explanation:"Possessive + gerund = formal. His refusing (not him refusing)."},{q:"I don't mind _____ being here. (informal, spoken)",opts:["his","he","him","himself"],answer:"him",explanation:"Object pronoun + gerund = informal. Both are correct; informal speech prefers him."},{q:"There is no point _____ arguing about this.",opts:["to","in","of","for"],answer:"in",explanation:"There is no point in + gerund \u2014 preposition in is fixed."},{q:"The prospect _____ reaching agreement seems remote.",opts:["to","for","of","in"],answer:"of",explanation:"Abstract noun prospect + of + gerund \u2014 prospect of reaching."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"He refused to cooperate and that complicated matters. (formal)",keyword:"His",answer:"His refusing to cooperate complicated matters."},{original:"There is no possibility that this will be resolved quickly.",keyword:"of",answer:"There is no possibility of this being resolved quickly."},{original:"It is pointless to continue the debate.",keyword:"There is no point",answer:"There is no point in continuing the debate."},{original:"She had not been informed and that was inexcusable.",keyword:"Not having been",answer:"Not having been informed was inexcusable."},{original:"I object to the fact that he receives preferential treatment.",keyword:"his",answer:"I object to his receiving preferential treatment."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"His refuse to answer was suspicious.",correct:"His refusing to answer was suspicious.",hint:"Possessive + gerund \u2014 refusing (the -ing form), not refuse."},{wrong:"There is no point to continue this discussion.",correct:"There is no point in continuing this discussion.",hint:"There is no point in + gerund."},{wrong:"I resent him to interrupt me constantly.",correct:"I resent him interrupting me constantly.",hint:"Resent + object pronoun + gerund \u2014 not infinitive."},{wrong:"The idea to start over seemed impossible.",correct:"The idea of starting over seemed impossible.",hint:"Idea + of + gerund \u2014 not to + infinitive."},{wrong:"Not telling she the full story was a mistake.",correct:"Not telling her the full story was a mistake.",hint:"Object pronoun before gerund \u2014 her, not she."}]}]},

{id:"concession",title:"Concession structures",subtitle:"Much as I admire her / For all his talent / Be that as it may",intro:"Sophisticated ways of acknowledging a point while maintaining a contrasting position.",desc:"Concession structures acknowledge something is true while arguing for a different conclusion. At C1 they go well beyond although and despite to include much as, for all, whatever, however + adjective/adverb, and a range of formal fixed expressions. These are the hallmark of academic argument.",tip:"The key C1 skill is choosing the right concession structure for the right context. <em>Although</em> is always safe. <em>Much as</em> signals genuine admiration while disagreeing. <em>For all that</em> is more dismissive. <em>Be that as it may</em> is the most formal \u2014 it acknowledges a point entirely and moves past it. Each carries a different degree of concession and a different rhetorical weight.",explanation:"<p>C1 concession structures allow more nuanced acknowledgement of opposing points \u2014 essential for formal argument and academic writing.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Much as / Much though</strong> \u2014 conceding genuine admiration or acknowledgement, followed by a contrast. More emphatic and personal than although.<br>\n<em>\"Much as I admire her work, I cannot endorse this particular decision.\"</em><br>\n<em>\"Much as it pains me to admit it, the evidence is compelling.\"</em><br>\n<em>\"Much though I respect his opinion, I must disagree.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>For all + noun phrase / For all that</strong> \u2014 despite all of something; often carries a slightly dismissive tone.<br>\n<em>\"For all his talent, he has never fulfilled his potential.\"</em><br>\n<em>\"For all the progress made, significant challenges remain.\"</em><br>\n<em>\"For all that, the plan is fundamentally flawed.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Whatever / However / Whoever + clause</strong> \u2014 universal concession covering all possibilities.<br>\n<em>\"Whatever the outcome, we must stand by our decision.\"</em><br>\n<em>\"However persuasive the argument, the facts speak for themselves.\"</em> (however + adjective/adverb, no inversion)<br>\n<em>\"Wherever she goes, she leaves a strong impression.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Be that as it may / That said / Granted</strong> \u2014 fixed formal expressions acknowledging a point before pivoting.<br>\n<em>\"Be that as it may, the decision has been made.\"</em> (acknowledges fully, moves on \u2014 most formal)<br>\n<em>\"Granted, the methodology has limitations. Nevertheless, the findings are significant.\"</em><br>\n<em>\"That said, there are good reasons to be cautious.\"</em> (informal equivalent)</div></div>\n<div class=\"note\"><strong>However + adjective \u2014 no inversion:</strong><br>\n<em>\"However persuasive the argument may be, the data does not support it.\"</em> \u2713<br>\n<em>\"However persuasive be the argument...\"</em> \u2717 \u2014 no inversion after however used this way.<br>\nCompare: <em>However</em> at the start of a new sentence (B1/B2) = contrast connector, followed by comma.<br>\n<em>However + adjective/adverb</em> = concession = whatever degree of + adjective. Different structure, different meaning.</div>",table:{headers:["Structure","Use","Example"],rows:[["Much as + clause","Genuine admiration/acknowledgement + contrast","Much as I respect him, I disagree."],["For all + noun","Despite all of \u2014 slightly dismissive","For all his experience, he made errors."],["For all that","Despite everything already said","For all that, the proposal is flawed."],["Whatever/However/Wherever","Universal concession","Whatever the cost, we must proceed."],["However + adj/adv + clause","Regardless of the degree","However convincing, the argument fails."],["Be that as it may","Full acknowledgement + move on (very formal)","Be that as it may, we must act."],["Granted / Admittedly","Partial concession before main argument","Granted, there are limitations."]]},examples:[{type:"pos",eng:"Much as the committee appreciated the gesture, it could not be accepted.",note:"Much as \u2014 genuine acknowledgement before refusal."},{type:"pos",eng:"For all its apparent simplicity, the problem resists easy solution.",note:"For all its + noun \u2014 despite the quality."},{type:"pos",eng:"Whatever the personal cost, she refused to compromise her principles.",note:"Whatever + noun phrase \u2014 universal concession."},{type:"pos",eng:"However compelling the evidence may appear, it must be independently verified.",note:"However + adjective \u2014 regardless of the degree."},{type:"pos",eng:"Be that as it may, the organisation cannot continue under the current leadership.",note:"Formal pivot \u2014 acknowledges the preceding point entirely."},{type:"pos",eng:"Granted, the sample size is limited. Nevertheless, the findings warrant attention.",note:"Granted \u2014 partial formal concession, followed by nevertheless."}],errors:[{bad:"Much as I admire her, but I cannot agree.",good:"Much as I admire her, I cannot agree.",reason:"Much as already expresses contrast \u2014 don't add but as well."},{bad:"For all that his talent, he has failed to deliver.",good:"For all his talent, he has failed to deliver.",reason:"For all + noun phrase \u2014 not for all that + possessive + noun."},{bad:"However the argument is convincing, the data is clear.",good:"However convincing the argument, the data is clear.",reason:"However + adjective/adverb + (subject) \u2014 the adjective comes directly after however."},{bad:"Whatever is the outcome, we must accept it.",good:"Whatever the outcome, we must accept it.",reason:"Whatever + noun phrase \u2014 no auxiliary is needed here."}],realUse:["\"Much as we value your contribution, the position has been filled.\" \u2014 formal rejection.","\"For all the rhetoric, very little has actually changed.\" \u2014 political commentary.","\"However well-intentioned the policy, its implementation has been disastrous.\" \u2014 academic critique.","\"Be that as it may, the law is the law.\" \u2014 legal/formal."],exercises:[{type:"gap",title:"Concession structures",sub:"Fill each gap with the correct concession form.",items:[{answer:"Much as",before:"",after:" I appreciate your concern, the decision stands."},{answer:"For all his",before:"",after:" experience, he struggled with the technical aspects."},{answer:"Whatever",before:"",after:" the difficulties involved, this must be addressed."},{answer:"However convincing",before:"",after:" the case, I remain unconvinced."},{answer:"Be that as it may",before:"",after:", the organisation must move forward."},{answer:"Granted",before:"",after:", the evidence is not conclusive. Nevertheless, it points in one direction."},{answer:"For all that",before:"",after:", the fundamental problem has not been resolved."},{answer:"However",before:"",after:" significant the short-term costs, the long-term benefits justify them."}]},{type:"mc",title:"Which concession structure?",sub:"Choose the most appropriate option.",items:[{q:"_____ her considerable experience, she struggled to manage the team.",opts:["Much as","For all","Whatever","Although"],answer:"For all",explanation:"For all + her considerable experience = despite all of it \u2014 slightly dismissive of the quality."},{q:"_____ I respect his opinion, I cannot support this proposal.",opts:["For all","Whatever","Much as","However"],answer:"Much as",explanation:"Much as + clause = genuinely conceding admiration while disagreeing."},{q:"_____ the outcome, the process must be transparent.",opts:["Much as","For all","Whatever","However"],answer:"Whatever",explanation:"Whatever + noun = regardless of what the outcome turns out to be."},{q:"_____ persuasive the argument may be, it is not supported by evidence.",opts:["Whatever","However","For all","Much as"],answer:"However",explanation:"However + adjective/adverb = regardless of the degree (however persuasive = no matter how persuasive)."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"Although I admire her work greatly, I cannot endorse this decision.",keyword:"Much as",answer:"Much as I admire her work, I cannot endorse this decision."},{original:"Despite all his talent, he has never achieved his potential.",keyword:"For all",answer:"For all his talent, he has never achieved his potential."},{original:"No matter what the cost, this must be done.",keyword:"Whatever",answer:"Whatever the cost, this must be done."},{original:"Despite how convincing the evidence appears, it must be verified.",keyword:"However",answer:"However convincing the evidence appears, it must be verified."},{original:"I acknowledge the point you have made, but the decision stands.",keyword:"Be that as it may",answer:"Be that as it may, the decision stands."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Much as I admire her, but I must disagree.",correct:"Much as I admire her, I must disagree.",hint:"Much as already signals contrast \u2014 don't add but."},{wrong:"For all that his talent, he has underperformed.",correct:"For all his talent, he has underperformed.",hint:"For all + noun phrase directly \u2014 not for all that + possessive."},{wrong:"However the argument is compelling, the evidence does not support it.",correct:"However compelling the argument, the evidence does not support it.",hint:"However + adjective + subject \u2014 the adjective comes directly after however."},{wrong:"Whatever is the outcome, we shall proceed.",correct:"Whatever the outcome, we shall proceed.",hint:"Whatever + noun phrase \u2014 no auxiliary is needed."},{wrong:"Granted the evidence is limited, but the findings are significant.",correct:"Granted, the evidence is limited. Nevertheless, the findings are significant.",hint:"Granted is a sentence adverb followed by comma \u2014 then use nevertheless, not but."}]}]},

{id:"reportedadv",title:"Reported structures: advanced",subtitle:"is alleged to have, be reported to be, was said to have been",intro:"Passive reporting structures used in formal, journalistic, and academic English.",desc:"At B2 you learnt active reporting verbs and basic backshift. At C1 the focus is the passive impersonal reporting structure \u2014 used to distance the speaker from a claim, attribute information without committing to it, and signal that something is widely believed or alleged. This is the grammar of journalism, law, and academic writing.",tip:"The two parallel structures \u2014 <em>It is said that...</em> and <em>He is said to...</em> \u2014 look similar but work differently. The first uses a full that-clause; the second uses an infinitive. The tense of the infinitive signals whether the reported event is simultaneous (to be) or prior (to have been). Getting this distinction right is a genuine C1 marker.",explanation:"<p>Passive impersonal reporting structures attribute claims without committing to their truth. Two parallel forms exist for each reporting verb.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>It + passive reporting verb + that-clause</strong> \u2014 impersonal, fronted with it.<br>\n<em>\"It is believed that the suspect fled the country.\"</em><br>\n<em>\"It has been reported that the company faces insolvency.\"</em><br>\n<em>\"It was alleged that funds had been misappropriated.\"</em><br>\nCommon verbs: <em>believe, say, think, report, claim, allege, expect, understand, know, assume.</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Subject + passive reporting verb + infinitive</strong> \u2014 subject is focused, infinitive follows.<br>\nPresent infinitive (= happening now/generally): <em>\"The suspect is believed to be in hiding.\"</em><br>\nPerfect infinitive (= happened before the reporting): <em>\"The suspect is believed to have fled the country.\"</em><br>\nPerfect passive infinitive: <em>\"The funds are alleged to have been misappropriated.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Tense of the infinitive \u2014 the key distinction:</strong><br>\n<em>to be</em> / <em>to have</em> \u2014 present situation: <em>\"She is thought to be in Madrid.\"</em><br>\n<em>to have + pp</em> \u2014 past action (before the reporting): <em>\"She is thought to have left last week.\"</em><br>\n<em>to have been + pp</em> \u2014 passive past: <em>\"He is alleged to have been involved in the fraud.\"</em><br>\n<em>to be + -ing</em> \u2014 ongoing action at time of reporting: <em>\"They are believed to be negotiating a settlement.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Passive reporting in academic and formal writing</strong> \u2014 used to attribute without endorsing.<br>\n<em>\"It has been argued that...\"</em> / <em>\"It is widely held that...\"</em> / <em>\"It has been suggested that...\"</em><br>\n<em>\"The data are considered to support...\"</em> / <em>\"The theory is generally accepted to be...\"</em></div></div>\n<div class=\"note\"><strong>Choosing between the two structures:</strong><br>\nBoth are correct \u2014 the choice is about focus and rhythm.<br>\n<em>It is believed that the company is struggling.</em> \u2014 neutral, impersonal.<br>\n<em>The company is believed to be struggling.</em> \u2014 subject (the company) is foregrounded.<br>\nUse the subject-focused form when the subject is the topic of the discourse.<br>\n<strong>Register:</strong> Both structures are formal. The <em>it</em>-structure is slightly more common in speech; the subject structure is more common in written reportage.</div>",table:{headers:["Structure","Tense signal","Example"],rows:[["It + passive + that-clause","Tense in that-clause","It is reported that talks have stalled."],["Subject + passive + to be","Present/ongoing","He is said to be in good health."],["Subject + passive + to have + pp","Past action (before reporting)","She is alleged to have taken the money."],["Subject + passive + to have been + pp","Passive past action","The data are thought to have been manipulated."],["Subject + passive + to be + -ing","Ongoing at time of report","They are believed to be in negotiations."],["Academic: It has been argued/suggested","Attribution in writing","It has been argued that the approach is flawed."]]},examples:[{type:"pos",eng:"It is widely believed that the decision was politically motivated.",note:"It + passive + that \u2014 neutral, impersonal attribution."},{type:"pos",eng:"The prime minister is understood to be considering her resignation.",note:"Subject + passive + to be + -ing \u2014 ongoing at time of reporting."},{type:"pos",eng:"Three officials are alleged to have accepted bribes.",note:"Subject + passive + to have + pp \u2014 past action prior to reporting."},{type:"pos",eng:"It has been argued that the current model is no longer sustainable.",note:"Academic attribution \u2014 distancing the claim from the writer."},{type:"pos",eng:"The missing funds are believed to have been transferred to offshore accounts.",note:"Passive perfect infinitive \u2014 funds were transferred (passive), before the reporting."},{type:"pos",eng:"The treatment is considered to be highly effective in early-stage cases.",note:"Subject + passive + to be \u2014 present state."}],errors:[{bad:"It is believed that the suspect flees the country.",good:"It is believed that the suspect has fled the country.",reason:"The fleeing happened before the reporting \u2014 backshift: present perfect or past in that-clause."},{bad:"She is said living in Paris.",good:"She is said to live in Paris.",reason:"Subject + passive reporting + to + base form \u2014 not -ing directly."},{bad:"It is alleged him to have taken the money.",good:"He is alleged to have taken the money.",reason:"Subject form: subject + is alleged + to + perfect infinitive."},{bad:"The company is believed that it will collapse.",good:"The company is believed to be on the verge of collapse.",reason:"Subject + passive reporting + infinitive \u2014 no that-clause after the subject form."}],realUse:["\"The two sides are understood to be close to an agreement.\" \u2014 diplomatic/journalistic.","\"It is claimed that the experiment was never properly conducted.\" \u2014 academic qualification.","\"He is alleged to have defrauded investors of over \u00a32 million.\" \u2014 legal/news.","\"The treatment is thought to work by blocking specific receptors.\" \u2014 scientific writing."],exercises:[{type:"gap",title:"Passive reporting structures",sub:"Rewrite each sentence using the structure indicated.",items:[{answer:"It is believed that the company is in financial difficulty.",before:"People believe the company is in financial difficulty. \u2192 ",after:"(It + passive + that)"},{answer:"The company is believed to be in financial difficulty.",before:"People believe the company is in financial difficulty. \u2192 ",after:"(Subject + passive + to be)"},{answer:"He is alleged to have committed fraud.",before:"Police allege he committed fraud. \u2192 ",after:"(Subject + passive + to have + pp)"},{answer:"It has been reported that talks have broken down.",before:"Reports say talks have broken down. \u2192 ",after:"(It + passive + that)"},{answer:"The suspects are understood to be in custody.",before:"Authorities understand the suspects are in custody. \u2192 ",after:"(Subject + passive + to be)"},{answer:"The funds are believed to have been transferred abroad.",before:"Investigators believe the funds were transferred abroad. \u2192 ",after:"(Subject + passive + to have been + pp)"}]},{type:"mc",title:"Which infinitive form?",sub:"Choose the correct passive reporting structure.",items:[{q:"She _____ to _____ the country last Tuesday. (fled \u2014 past action)",opts:["is believed / flee","is believed / have fled","was believed / fleeing","is believed / be fleeing"],answer:"is believed / have fled",explanation:"Past action prior to reporting \u2192 to have + past participle: is believed to have fled."},{q:"The two sides _____ to _____ a deal. (currently negotiating)",opts:["are said / negotiate","are said / have negotiated","are said / be negotiating","were said / negotiate"],answer:"are said / be negotiating",explanation:"Ongoing action \u2192 to be + -ing: are said to be negotiating."},{q:"The data _____ to _____ been altered before publication.",opts:["is thought / be","is thought / have","is thought / have been","was thought / being"],answer:"is thought / have been",explanation:"Passive past action \u2192 to have been + past participle: is thought to have been altered."},{q:"It _____ that the policy has had little effect.",opts:["is suggested","suggests","is suggesting","has suggested"],answer:"is suggested",explanation:"It + passive reporting verb + that-clause: it is suggested that."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"People say he is hiding in the mountains.",keyword:"is said",answer:"He is said to be hiding in the mountains."},{original:"Journalists report that three ministers resigned.",keyword:"It is reported",answer:"It is reported that three ministers resigned."},{original:"Investigators believe the money was laundered.",keyword:"is believed",answer:"The money is believed to have been laundered."},{original:"Experts consider the approach to be outdated.",keyword:"is considered",answer:"The approach is considered to be outdated."},{original:"It is alleged that the official accepted payments.",keyword:"alleged to",answer:"The official is alleged to have accepted payments."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She is said living in Madrid.",correct:"She is said to live in Madrid.",hint:"Subject + passive reporting + to + base form."},{wrong:"It is believed that the suspect flees last night.",correct:"It is believed that the suspect fled last night.",hint:"The action happened in the past \u2014 past simple or perfect in that-clause."},{wrong:"The company is believed that it will recover.",correct:"The company is believed to recover.",hint:"Subject form: subject + is believed + infinitive \u2014 no that-clause."},{wrong:"He is alleged to committed the crime.",correct:"He is alleged to have committed the crime.",hint:"Past action \u2192 to have + past participle."},{wrong:"It is reported him to have left.",correct:"He is reported to have left.",hint:"Subject form: he (not it + him)."}]}]},

{id:"extraposition",title:"It-extraposition & appositives",subtitle:"It is worth noting that... / the possibility that...",intro:"Two core structures of formal English prose \u2014 extraposition and abstract noun + that-clause.",desc:"These two structures are the scaffolding of formal written English. It-extraposition makes heavy subjects manageable. Abstract noun + appositive that-clause allows dense, precise expression of complex ideas. Both appear constantly in academic writing, journalism, and formal correspondence \u2014 and both require exact grammatical control.",tip:"The most common error with both structures is introducing a double subject. <em>\"The fact that he lied, it surprised everyone\"</em> \u2014 the <em>it</em> is wrong because <em>the fact that he lied</em> is already the subject. Similarly: <em>\"It is important that she is present\"</em> \u2014 the subjunctive <em>be</em> is needed after <em>it is important that</em>.",explanation:"<p>Two complementary structures that give formal English its precision and weight.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>It-extraposition</strong> \u2014 moving a heavy subject clause to the end of the sentence and replacing it with <em>it</em> at the front. More natural than a fronted subject clause in most contexts.<br>\n<em>\"It is widely accepted that early intervention produces better outcomes.\"</em><br>\n<em>\"It remains to be seen whether the approach will work.\"</em><br>\n<em>\"It is not entirely clear what caused the failure.\"</em><br>\n<em>\"It goes without saying that transparency is essential.\"</em> (fixed)<br>\n<em>\"It is worth noting that the data predates the reform.\"</em> (fixed)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Extraposition with adjective + infinitive</strong> \u2014 the extraposed clause is a to-infinitive.<br>\n<em>\"It is difficult to overstate the significance of this finding.\"</em><br>\n<em>\"It proved impossible to reach a consensus.\"</em><br>\n<em>\"It would be premature to draw firm conclusions.\"</em><br>\nCompare: <em>\"To overstate the significance is difficult.\"</em> \u2014 grammatically correct but much less natural.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Abstract noun + appositive that-clause</strong> \u2014 a noun followed by a that-clause that restates its content.<br>\n<em>\"The possibility that the data was compromised has not been ruled out.\"</em><br>\n<em>\"There is growing evidence that the approach is counterproductive.\"</em><br>\n<em>\"His insistence that the findings be verified delayed the publication.\"</em><br>\nCommon nouns: <em>fact, possibility, evidence, claim, assumption, suggestion, belief, hope, fear, risk, chance, likelihood, prospect, news, realisation, conclusion, view.</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>Fixed formal expressions with it-extraposition</strong> \u2014 useful chunks for academic and formal writing.<br>\n<em>It is worth noting that... / It is important to bear in mind that... / It goes without saying that... / It remains to be seen whether... / It stands to reason that... / It is no coincidence that... / It is not uncommon for + noun + to...</em></div></div>\n<div class=\"note\"><strong>Double subject error \u2014 the most common mistake:</strong><br>\n<em>\"The fact that he resigned, it shocked everyone.\"</em> \u2717 \u2014 don't add <em>it</em> after the subject clause.<br>\n<em>\"The fact that he resigned shocked everyone.\"</em> \u2713<br>\n<strong>After it is + adjective + that</strong> \u2014 mandative subjunctive may apply:<br>\n<em>\"It is essential that all data be verified.\"</em> \u2014 essential/vital/important/necessary + that \u2192 subjunctive.<br>\n<em>\"It is interesting that she chose this approach.\"</em> \u2014 interesting/clear/obvious/surprising \u2192 indicative.</div>",table:{headers:["Pattern","Example","Notes"],rows:[["It + be + adj + that-clause","It is clear that the situation has worsened.","Most common extraposition"],["It + be + adj + to-infinitive","It is difficult to assess the full impact.","Heavy infinitive subject extraposed"],["It + verb + that-clause","It appears that a deal has been reached.","Verb can be appear/seem/follow/transpire"],["It + remains/remains to be seen","It remains to be seen whether it works.","Fixed formal expression"],["Abstract noun + that (appositive)","The risk that costs will rise is real.","Dense noun phrase for formal writing"],["Fixed expressions","It goes without saying that... / It is worth noting that...","High-frequency formal chunks"]]},examples:[{type:"pos",eng:"It is widely acknowledged that the current system is no longer fit for purpose.",note:"It + passive adjective + that-clause \u2014 impersonal formal claim."},{type:"pos",eng:"It would be premature to reach any conclusions at this stage.",note:"It + adj + to-infinitive \u2014 extraposed heavy infinitive subject."},{type:"pos",eng:"The likelihood that the two sides will reach an agreement appears remote.",note:"Abstract noun + appositive that-clause as subject."},{type:"pos",eng:"It goes without saying that all information must be treated as confidential.",note:"Fixed expression \u2014 extremely common in formal correspondence."},{type:"pos",eng:"It remains to be seen whether the reforms will produce the intended results.",note:"Fixed expression \u2014 uncertainty about future outcome."},{type:"pos",eng:"There is a growing consensus that the approach requires fundamental revision.",note:"There is + abstract noun + that-clause \u2014 common academic structure."}],errors:[{bad:"The fact that she refused, it was surprising.",good:"The fact that she refused was surprising.",reason:"Don't add it after the noun clause subject \u2014 it is already the subject."},{bad:"It is important that all candidates are informed promptly.",good:"It is important that all candidates be informed promptly.",reason:"It is important that + mandative subjunctive \u2014 be, not are."},{bad:"It is clear what should we do next.",good:"It is clear what we should do next.",reason:"Extraposed noun clause \u2014 statement word order, no inversion after the wh-word."},{bad:"The possibility of that the plan will fail is real.",good:"The possibility that the plan will fail is real.",reason:"Abstract noun + that (not of that) \u2014 appositive that-clause, no preposition."}],realUse:["\"It is worth emphasising that this is not a criticism of individuals.\" \u2014 academic hedging.","\"The possibility that the results were fabricated has not been ruled out.\" \u2014 research.","\"It goes without saying that the highest standards of integrity are expected.\" \u2014 formal.","\"It is no coincidence that the announcement came on the eve of the election.\" \u2014 analytical."],exercises:[{type:"gap",title:"It-extraposition & appositives",sub:"Fill each gap to complete the formal structure.",items:[{answer:"It is widely accepted",before:"",after:" that early childhood education has a lasting impact."},{answer:"It would be premature",before:"",after:" to draw any firm conclusions from the initial data."},{answer:"The possibility that",before:"",after:" the contract was awarded unfairly is being investigated."},{answer:"It goes without saying",before:"",after:" that patient confidentiality must be maintained at all times."},{answer:"It remains to be seen",before:"",after:" whether the new policy will achieve its stated aims."},{answer:"There is growing evidence",before:"",after:" that the intervention has had a positive effect."},{answer:"The assumption that",before:"",after:" growth would continue indefinitely proved unfounded."},{answer:"It is not uncommon for",before:"",after:" students to struggle with this distinction."}]},{type:"mc",title:"Correct structure?",sub:"Choose the grammatically correct sentence.",items:[{q:"Which is correct?",opts:["The fact that he lied, it shocked everyone.","The fact that he lied shocked everyone.","It shocked everyone the fact that he lied.","The fact of him lying it shocked everyone."],answer:"The fact that he lied shocked everyone.",explanation:"Abstract noun + that-clause as subject \u2014 no pronoun repetition."},{q:"After 'it is essential that' \u2014 which form?",opts:["It is essential that she attends.","It is essential that she attend.","It is essential for her to attend.","It is essential that she should attend."],answer:"It is essential that she attend.",explanation:"Mandative: it is essential that + subjunctive (base form). She attend, not attends. (She should attend also acceptable in British English.)"},{q:"Which uses extraposition correctly?",opts:["It is difficult to overstate this.","It is difficult overstate this.","To overstate this it is difficult.","This is difficult it to overstate."],answer:"It is difficult to overstate this.",explanation:"It + be + adjective + to-infinitive \u2014 standard extraposition of heavy subject."},{q:"Which appositive is correct?",opts:["The risk of that costs will rise is real.","The risk that costs will rise is real.","The risk of costs rising it is real.","The risk if costs rise is real."],answer:"The risk that costs will rise is real.",explanation:"Abstract noun + that (no preposition before the appositive that-clause)."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using it-extraposition or appositive structure.",items:[{original:"That the policy has failed is now undeniable.",keyword:"It is",answer:"It is now undeniable that the policy has failed."},{original:"To reach a consensus at this stage would be premature.",keyword:"It would",answer:"It would be premature to reach a consensus at this stage."},{original:"Nobody knows whether the plan will work.",keyword:"It remains",answer:"It remains to be seen whether the plan will work."},{original:"He claimed that he had not been informed. This claim proved false.",keyword:"His claim that",answer:"His claim that he had not been informed proved false."},{original:"Confidentiality must be maintained. This goes without saying.",keyword:"It goes",answer:"It goes without saying that confidentiality must be maintained."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"The fact that she refused, it was unexpected.",correct:"The fact that she refused was unexpected.",hint:"Don't repeat the subject with it after the noun clause."},{wrong:"It is essential that all staff are notified.",correct:"It is essential that all staff be notified.",hint:"It is essential that \u2192 mandative subjunctive: be."},{wrong:"It is clear what should we prioritise.",correct:"It is clear what we should prioritise.",hint:"Noun clause after extraposition: statement word order, no inversion."},{wrong:"The possibility of that a breach occurred is being investigated.",correct:"The possibility that a breach occurred is being investigated.",hint:"Abstract noun + that \u2014 no of before the appositive clause."},{wrong:"It is difficult assess the full impact.",correct:"It is difficult to assess the full impact.",hint:"It + adjective + to + infinitive \u2014 don't omit to."}]}]},

{id:"prepcomplements",title:"Preposition + gerund / noun clause complements",subtitle:"on condition that, by virtue of, in the event of",intro:"Fixed prepositional structures that introduce complex conditions, reasons, and qualifications.",desc:"Prepositions and prepositional phrases introduce subordinate ideas in formal English. At C1 the challenge is the range of complex prepositional phrases \u2014 many semi-fixed in form \u2014 that take gerund or clause complements. These are the connectors of formal legal, business, and academic discourse.",tip:"The key distinction to master: after a preposition, you need a gerund (not an infinitive or a that-clause). <em>\"In spite of to fail\"</em> is wrong. <em>\"In spite of failing\"</em> is correct. But some complex prepositional phrases take <em>that-clauses</em> directly: <em>\"on condition that\", \"in the event that\", \"given that\"</em>. Knowing which takes which is the C1 target.",explanation:"<p>Complex prepositional phrases introduce formal conditions, concessions, causes, and qualifications. Each takes either a gerund or a that-clause complement.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Preposition/prep phrase + gerund</strong> \u2014 after a simple preposition, always gerund.<br>\n<em>in spite of / despite + gerund:</em> <em>\"In spite of having no experience, she excelled.\"</em><br>\n<em>by virtue of + gerund/noun:</em> <em>\"By virtue of being the oldest, she assumed responsibility.\"</em><br>\n<em>with a view to + gerund:</em> <em>\"He contacted us with a view to establishing a partnership.\"</em><br>\n<em>for the purpose of + gerund:</em> <em>\"The data was collected for the purpose of analysing trends.\"</em><br>\n<em>on the grounds of + gerund/noun:</em> <em>\"She appealed on the grounds of insufficient evidence.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Complex prepositional phrase + that-clause</strong> \u2014 certain compound prepositions take that-clauses directly.<br>\n<em>on condition that:</em> <em>\"I'll agree on condition that the terms are revised.\"</em><br>\n<em>in the event that/of:</em> <em>\"In the event that the proposal is rejected, we will appeal.\"</em><br>\n<em>given that:</em> <em>\"Given that resources are limited, priorities must be set.\"</em><br>\n<em>provided/providing that:</em> <em>\"I'll support the plan provided that the budget is approved.\"</em><br>\n<em>on the understanding that:</em> <em>\"She accepted the role on the understanding that she would have full autonomy.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>With a view to / with the aim of / for fear of</strong> \u2014 purpose and caution structures.<br>\n<em>\"They restructured with a view to reducing costs.\"</em> (purpose \u2014 gerund)<br>\n<em>\"He said nothing for fear of causing offence.\"</em> (caution \u2014 gerund)<br>\n<em>\"She applied with the aim of securing a promotion.\"</em> (purpose \u2014 gerund)</div></div>\n<div class=\"rule\"><div class=\"rule-num\">4</div><div class=\"rule-text\"><strong>In terms of / with regard to / as regards / in light of</strong> \u2014 focus and reference structures.<br>\n<em>\"In terms of methodology, the study is exemplary.\"</em><br>\n<em>\"With regard to your enquiry, please find the relevant details below.\"</em><br>\n<em>\"In light of recent developments, the decision must be revisited.\"</em><br>\n<em>\"As regards the second point, I would refer you to clause 4.\"</em></div></div>\n<div class=\"note\"><strong>With a view to \u2014 common error:</strong><br>\n<em>\"With a view to improve productivity.\"</em> \u2717 \u2014 to here is a preposition, not part of an infinitive.<br>\n<em>\"With a view to improving productivity.\"</em> \u2713 \u2014 gerund after the preposition to.<br>\nThis also applies to: <em>look forward to, be committed to, be accustomed to, object to, resort to, be used to, in addition to.</em><br>\n<strong>Provided / providing / as long as / on condition that</strong> are all interchangeable in meaning (conditional), but differ in formality \u2014 <em>on condition that</em> is most formal, <em>as long as</em> most informal.</div>",table:{headers:["Structure","Takes","Example"],rows:[["In spite of / despite","gerund or noun","In spite of failing twice, she persisted."],["By virtue of","gerund or noun","By virtue of her position, she had access."],["With a view to","gerund (to = preposition)","With a view to expanding operations."],["For fear of","gerund","He said nothing for fear of offending."],["On condition that","that-clause","I'll help on condition that you reciprocate."],["In the event that/of","that-clause / noun","In the event of a dispute, refer to clause 5."],["Given that","that-clause","Given that funds are limited, we must prioritise."],["Provided/providing that","that-clause","I'll agree, provided that changes are made."],["In terms of / with regard to","noun phrase","In terms of quality, it is exceptional."],["In light of","noun phrase","In light of the evidence, action is needed."]]},examples:[{type:"pos",eng:"She agreed to the arrangement on condition that her travel expenses would be reimbursed.",note:"On condition that + that-clause \u2014 formal conditional agreement."},{type:"pos",eng:"The data was archived with a view to facilitating future research.",note:"With a view to + gerund \u2014 to is a preposition here."},{type:"pos",eng:"In the event that the primary contractor fails to deliver, a penalty clause will apply.",note:"In the event that + clause \u2014 formal contractual language."},{type:"pos",eng:"By virtue of her extensive experience, she was considered the natural choice.",note:"By virtue of + noun/gerund \u2014 by reason of."},{type:"pos",eng:"Given that the deadline has passed, an extension will need to be formally requested.",note:"Given that + clause \u2014 formal concessive/causal."},{type:"pos",eng:"He remained silent for fear of jeopardising the delicate negotiations.",note:"For fear of + gerund \u2014 caution structure."}],errors:[{bad:"She applied with a view to get a promotion.",good:"She applied with a view to getting a promotion.",reason:"With a view to \u2014 to is a preposition here, requiring a gerund, not an infinitive."},{bad:"On condition of the terms are revised, I will agree.",good:"On condition that the terms are revised, I will agree.",reason:"On condition that + that-clause \u2014 not on condition of + clause."},{bad:"In light of the new evidence, the verdict it must be reviewed.",good:"In light of the new evidence, the verdict must be reviewed.",reason:"Don't add a subject pronoun (it) after the noun phrase subject."},{bad:"Given that, resources are limited, we must choose carefully.",good:"Given that resources are limited, we must choose carefully.",reason:"Given that introduces a clause directly \u2014 no comma after that."}],realUse:["\"The contract was signed on the understanding that delivery would take place within 30 days.\" \u2014 commercial.","\"In light of your comments, we have revised our approach accordingly.\" \u2014 formal correspondence.","\"With a view to resolving the matter amicably, we propose mediation.\" \u2014 legal.","\"Given that no consensus has been reached, the matter will be deferred.\" \u2014 minutes/formal."],richLabel:"Prepositional reference",richContent:"\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Preposition/phrase + gerund</div>\n<table class=\"rich-table\"><thead><tr><th>Structure</th><th>Example</th></tr></thead><tbody>\n<tr><td>in spite of / despite</td><td><em>In spite of having no experience, she excelled.</em></td></tr>\n<tr><td>by virtue of</td><td><em>By virtue of her position, she had access.</em></td></tr>\n<tr><td>with a view to</td><td><em>With a view to expanding the business.</em> (to = preposition)</td></tr>\n<tr><td>for the purpose of</td><td><em>For the purpose of analysing the data.</em></td></tr>\n<tr><td>for fear of</td><td><em>He said nothing for fear of causing offence.</em></td></tr>\n<tr><td>with the aim of</td><td><em>She applied with the aim of securing a promotion.</em></td></tr>\n<tr><td>on the grounds of</td><td><em>She appealed on the grounds of insufficient evidence.</em></td></tr>\n<tr><td>in addition to</td><td><em>In addition to managing the team, she handles accounts.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Complex phrase + that-clause</div>\n<table class=\"rich-table\"><thead><tr><th>Structure</th><th>Example</th></tr></thead><tbody>\n<tr><td>on condition that</td><td><em>I'll agree on condition that the terms are revised.</em></td></tr>\n<tr><td>in the event that</td><td><em>In the event that the plan fails, we will appeal.</em></td></tr>\n<tr><td>given that</td><td><em>Given that resources are limited, priorities must be set.</em></td></tr>\n<tr><td>provided / providing that</td><td><em>I'll support it provided that the budget is approved.</em></td></tr>\n<tr><td>on the understanding that</td><td><em>She accepted on the understanding that she had full autonomy.</em></td></tr>\n<tr><td>assuming that</td><td><em>Assuming that the vote passes, work begins Monday.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">Reference / focus structures + noun phrase</div>\n<table class=\"rich-table\"><thead><tr><th>Structure</th><th>Use</th></tr></thead><tbody>\n<tr><td>in terms of</td><td><em>In terms of quality, the work is exemplary.</em></td></tr>\n<tr><td>with regard to / as regards</td><td><em>With regard to your enquiry, please see below.</em></td></tr>\n<tr><td>in light of</td><td><em>In light of recent events, a review is necessary.</em></td></tr>\n<tr><td>in view of</td><td><em>In view of the difficulties, more time was granted.</em></td></tr>\n<tr><td>by means of</td><td><em>The data was collected by means of a survey.</em></td></tr>\n</tbody></table>\n</div>\n<div class=\"rich-section\">\n<div class=\"rich-heading\">\u26a0 to as preposition \u2014 always gerund after these</div>\n<table class=\"rich-table\"><tbody>\n<tr><td>with a view <strong>to</strong></td><td>...to <strong>improving</strong> \u2713 &nbsp; ...to improve \u2717</td></tr>\n<tr><td>look forward <strong>to</strong></td><td>...to <strong>hearing</strong> \u2713 &nbsp; ...to hear \u2717</td></tr>\n<tr><td>be committed <strong>to</strong></td><td>...to <strong>resolving</strong> \u2713 &nbsp; ...to resolve \u2717</td></tr>\n<tr><td>object <strong>to</strong></td><td>...to <strong>being</strong> treated \u2713 &nbsp; ...to be treated \u2717</td></tr>\n<tr><td>in addition <strong>to</strong></td><td>...to <strong>managing</strong> \u2713 &nbsp; ...to manage \u2717</td></tr>\n</tbody></table>\n</div>",exercises:[{type:"gap",title:"Prepositional complements",sub:"Fill each gap with the correct preposition structure and form.",items:[{answer:"with a view to expanding",before:"The company restructured ",after:" its operations into new markets."},{answer:"on condition that",before:"She agreed to cooperate ",after:" her identity would be protected."},{answer:"In the event of",before:"",after:" a dispute, the matter shall be referred to arbitration."},{answer:"for fear of",before:"He refused to comment ",after:" prejudicing the ongoing investigation."},{answer:"By virtue of",before:"",after:" his seniority, he was granted additional privileges."},{answer:"Given that",before:"",after:" the evidence is inconclusive, no decision can be made at this stage."},{answer:"in terms of",before:"The project was a success ",after:" both quality and cost-effectiveness."},{answer:"on the understanding that",before:"She accepted the role ",after:" she would have full editorial control."}]},{type:"mc",title:"Gerund or that-clause?",sub:"Choose the correct completion.",items:[{q:"She left early for fear of _____.",opts:["that she missed the train","missing the train","to miss the train","she would miss the train"],answer:"missing the train",explanation:"For fear of + preposition \u2192 gerund."},{q:"I'll agree _____ the price is reduced.",opts:["on condition of","on condition that","with a view to","by virtue of that"],answer:"on condition that",explanation:"On condition that + that-clause \u2014 the clause specifies the condition."},{q:"The report was written with a view to _____ the situation.",opts:["clarify","to clarify","clarifying","be clarified"],answer:"clarifying",explanation:"With a view to + gerund \u2014 to is a preposition here, not part of an infinitive."},{q:"_____ the new legislation, all contracts must be reviewed.",opts:["Given that","In light of","With a view to","For the purpose to"],answer:"In light of",explanation:"In light of + noun phrase \u2014 refers to a concrete recent development as reason for action."}]},{type:"categorise",title:"Gerund or that-clause?",sub:"Click each phrase, then click the correct column.",categories:[{name:"+ gerund",items:["with a view to","in spite of","by virtue of","for the purpose of","for fear of","with the aim of"]},{name:"+ that-clause",items:["on condition that","given that","provided that","in the event that","on the understanding that"]},{name:"+ noun phrase",items:["in light of","in terms of","with regard to","as regards","in view of"]}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite using the keyword.",items:[{original:"He said nothing because he was afraid of causing offence.",keyword:"for fear of",answer:"He said nothing for fear of causing offence."},{original:"I'll agree if the deadline is extended.",keyword:"on condition that",answer:"I'll agree on condition that the deadline is extended."},{original:"She restructured the department because she wanted to improve efficiency.",keyword:"with a view to",answer:"She restructured the department with a view to improving efficiency."},{original:"Because the evidence is strong, the charges should proceed.",keyword:"Given that",answer:"Given that the evidence is strong, the charges should proceed."},{original:"They negotiated privately because they didn't want to attract publicity.",keyword:"with a view to",answer:"They negotiated privately with a view to avoiding publicity."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She applied with a view to get a better salary.",correct:"She applied with a view to getting a better salary.",hint:"With a view to + gerund \u2014 to is a preposition here."},{wrong:"I'll cooperate on condition of the terms are changed.",correct:"I'll cooperate on condition that the terms are changed.",hint:"On condition that + that-clause."},{wrong:"In light of the new evidence, the verdict it must be reviewed.",correct:"In light of the new evidence, the verdict must be reviewed.",hint:"Don't repeat subject with it."},{wrong:"Given that, resources are limited we must prioritise.",correct:"Given that resources are limited, we must prioritise.",hint:"Given that introduces the clause directly \u2014 no comma after that."},{wrong:"For the purpose of to analyse the data, a new framework was developed.",correct:"For the purpose of analysing the data, a new framework was developed.",hint:"For the purpose of + gerund \u2014 not to + infinitive."}]}]}

// ── STICKY LESSON BAR ──
function updateSticky(l){
  document.getElementById('sticky-title').textContent = l.title;
  document.getElementById('sticky-intro').textContent = l.intro.replace(/<[^>]+>/g,'');
  document.getElementById('sticky-level').textContent = document.querySelector('.level-tag') ? document.querySelector('.level-tag').textContent : '';
}
const stickyBar = document.getElementById('lesson-sticky');
const heroObserver = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    stickyBar.classList.toggle('visible', !e.isIntersecting);
  });
},{threshold:0,rootMargin:'-53px 0px 0px 0px'});
function observeHero(){
  const hero = document.querySelector('.lesson-hero');
  if(hero) heroObserver.observe(hero);
}

// ── PRINT ──
function printLesson(){
  const labels = document.querySelectorAll('.section-label');
  const wasCollapsed = [];
  labels.forEach((label,i)=>{
    const body = label.nextElementSibling;
    wasCollapsed[i] = label.classList.contains('collapsed');
    if(wasCollapsed[i]){
      label.classList.remove('collapsed');
      if(body) body.classList.remove('collapsed');
    }
  });
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      labels.forEach((label,i)=>{
        if(wasCollapsed[i]){
          label.classList.add('collapsed');
          const body = label.nextElementSibling;
          if(body) body.classList.add('collapsed');
        }
      });
    }, 500);
  }, 150);
}

// ── COLLAPSIBLE SECTIONS ──
function toggleAllSections(btn){
  const isOpen = btn.textContent === 'Open all';
  document.querySelectorAll('.section-label').forEach(label=>{
    const body = label.nextElementSibling;
    if(body && body.classList.contains('section-body')){
      if(isOpen){ label.classList.remove('collapsed'); body.classList.remove('collapsed'); }
      else { label.classList.add('collapsed'); body.classList.add('collapsed'); }
    }
  });
  btn.textContent = isOpen ? 'Close all' : 'Open all';
}

function toggleSection(label){
  label.classList.toggle('collapsed');
  const body = label.nextElementSibling;
  if(body && body.classList.contains('section-body')){
    body.classList.toggle('collapsed');
  }
}
// ── DONE STATE ──
const done = JSON.parse(localStorage.getItem('jpe-c1-done')||'[]');
let current = 0;

// ── SIDEBAR ──
function buildSidebar(){
  const nav = document.getElementById('topic-nav');
  nav.innerHTML = lessons.map((l,i)=>`
    <button class="topic-link${i===current?' active':''}${done.includes(l.id)?' done':''}" onclick="goto(${i})">
      <span class="tl-num">${String(i+1).padStart(2,'0')}</span>
      <span class="tl-check">${done.includes(l.id)?'✓':''}</span>
      <span class="tl-name">${l.title}<br><small style="font-size:11px;opacity:.6">${l.subtitle}</small></span>
    </button>`).join('');
  const pct = (done.length/lessons.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done.length}/${lessons.length}`;
}

// ── BUILD LESSON ──
function buildLesson(l, idx){
  const isLast = idx===lessons.length-1;
  const isDone = done.includes(l.id);

  const tableHTML = `<table class="form-table">
    <thead><tr>${l.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${l.table.rows.map(r=>`<tr>${r.map((c,ci)=>`<td class="${ci===0?'subject':ci===1?'form':ci===2?'neg':'example'}">${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;

  const exHTML = l.examples.map(e=>`
    <div class="example-item">
      <div class="ex-marker ${e.type}">${e.type==='pos'?'+':e.type==='neg'?'−':'?'}</div>
      <div><div class="ex-eng">${e.eng}</div><div class="ex-note">${e.note}</div></div>
    </div>`).join('');

  const errHTML = l.errors.map(e=>`
    <div class="error-row">
      <div class="error-bad"><div class="error-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Wrong</div><div class="error-text">${e.bad}</div></div>
      <div class="error-good"><div class="error-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Correct</div><div class="error-text">${e.good}</div></div>
    </div>
    `).join('');

  const realHTML = l.realUse.map(r=>`<li>${r}</li>`).join('');

  const exerciseHTML = l.exercises.map((ex,ei)=>{

    // ── GAP FILL ──
    if(ex.type==='gap'){
      const items = ex.items.map((it,ii)=>`
        <div class="gap-sentence">
          <span class="gap-num">${ii+1}.</span>
          <span>${(it.before||'').replace(/_+\s*$/,'').trimEnd()}</span>
          <span class="gap-wrap">
            <input class="gap-input" id="gap-${l.id}-${ei}-${ii}" data-answer="${it.answer}" placeholder="" autocomplete="off" style="width:${Math.max(4,it.answer.length+1)}ch">
            <span class="gap-reveal" id="gap-rev-${l.id}-${ei}-${ii}"></span>
          </span>
          <span>${(it.after||'').replace(/^\s*_+/,'').trimStart()}</span>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Gap fill</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkGap('${l.id}',${ei},${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetGap('${l.id}',${ei},${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-gap-${l.id}-${ei}"></div>
        </div></div>`;
    }

    // ── MULTIPLE CHOICE ──
    if(ex.type==='mc'){
      const items = ex.items.map((it,ii)=>`
        <div class="mc-question" id="mc-${l.id}-${ei}-${ii}">
          <div class="mc-text">${ii+1}. ${it.q}</div>
          <div class="mc-options">${it.opts.map(o=>`<button class="mc-opt" onclick="pickMC('${l.id}',${ei},${ii},'${o.replace(/'/g,"'")}','${it.answer.replace(/'/g,"'")}','${it.explanation.replace(/'/g,"'")}')" data-opt="${o}">${o}</button>`).join('')}</div>
          <div class="mc-feedback" id="mcfb-${l.id}-${ei}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Multiple choice</span>
        </div>
        <div class="ex-card-body">${items}</div></div>`;
    }

    // ── ERROR CORRECTION ──
    if(ex.type==='ec'){
      const items = ex.items.map((it,ii)=>`
        <div class="ec-item">
          <div class="ec-sentence">✗ ${it.wrong}</div>
          <div class="ec-input-row">
            <input class="ec-input" id="ec-${l.id}-${ei}-${ii}" data-answer="${it.correct}" placeholder="Write the correct sentence…">
          </div>
          <div style="font-size:11px;color:var(--ink3);margin-top:4px">Hint: ${it.hint}</div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Error correction</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkEC('${l.id}',${ei},${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetEC('${l.id}',${ei},${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-ec-${l.id}-${ei}"></div>
        </div></div>`;
    }

    // ── SENTENCE BUILDER ──
    if(ex.type==='builder'){
      const sid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>{
        const shuffled = [...it.words].sort(()=>Math.random()-.5);
        const wordBtns = shuffled.map((w,wi)=>`<button class="sb-word" id="sbw-${sid}-${ii}-${wi}" data-word="${w}" onclick="sbClick('${sid}',${ii},${wi})">${w}</button>`).join('');
        return `<div class="sb-sentence" id="sb-sent-${sid}-${ii}">
          <div class="sb-sentence-num">${ii+1}.</div>
          ${it.context?`<div class="sb-context">${it.context}</div>`:''}
          <div class="sb-slot" id="sb-slot-${sid}-${ii}"></div>
          <div class="sb-bank" id="sb-bank-${sid}-${ii}">${wordBtns}</div>
          <div class="sb-result" id="sb-res-${sid}-${ii}"></div>
        </div>`;
      }).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Sentence builder</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkBuilder('${sid}',${ex.items.length},${JSON.stringify(ex.items.map(i=>i.answer)).replace(/"/g,'&quot;')})">Check answers</button>
            <button class="btn-reset" onclick="resetBuilder('${sid}',${ex.items.length},${JSON.stringify(ex.items.map(i=>i.words)).replace(/"/g,'&quot;')})">Reset</button>
          </div>
          <div class="score-badge" id="score-sb-${sid}"></div>
        </div></div>`;
    }

    // ── MATCHING ──
    if(ex.type==='match'){
      const mid = `${l.id}-${ei}`;
      const leftBtns = ex.pairs.map((p,pi)=>`<button class="match-item" id="ml-${mid}-${pi}" data-idx="${pi}" data-side="left" onclick="matchClick('${mid}',${pi},'left')">${p.left}</button>`).join('');
      const rightShuffled = ex.pairs.map((p,pi)=>({text:p.right,idx:pi})).sort(()=>Math.random()-.5);
      const rightBtns = rightShuffled.map((p,ri)=>`<button class="match-item" id="mr-${mid}-${ri}" data-idx="${p.idx}" data-side="right" onclick="matchClick('${mid}',${ri},'right')">${p.text}</button>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Matching</span>
        </div>
        <div class="ex-card-body">
          <div class="match-cols">
            <div><div class="match-col-head">${ex.leftHead||'A'}</div>${leftBtns}</div>
            <div><div class="match-col-head">${ex.rightHead||'B'}</div>${rightBtns}</div>
          </div>
          <div class="score-badge" id="score-match-${mid}"></div>
        </div></div>`;
    }

    // ── TRANSFORMATION ──
    if(ex.type==='transform'){
      const tid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>`
        <div class="transform-item">
          <div class="transform-original">${ii+1}. ${it.original}<br><span style="font-size:12px;color:var(--ink3)">Use: <span class="transform-keyword">${it.keyword}</span></span></div>
          <input class="transform-input" id="tr-${tid}-${ii}" data-answer="${it.answer}" placeholder="Rewrite the sentence…">
          <div class="transform-reveal" id="tr-rev-${tid}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Transformation</span>
        </div>
        <div class="ex-card-body">${items}
          <div class="check-row">
            <button class="btn-check" onclick="checkTransform('${tid}',${ex.items.length})">Check answers</button>
            <button class="btn-reset" onclick="resetTransform('${tid}',${ex.items.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-tr-${tid}"></div>
        </div></div>`;
    }

    // ── CATEGORISATION ──
    if(ex.type==='categorise'){
      const cid = `${l.id}-${ei}`;
      const allWords = ex.categories.flatMap((c,ci)=>c.items.map(w=>({w,ci}))).sort(()=>Math.random()-.5);
      const wordBtns = allWords.map((item,wi)=>`<button class="cat-word" id="cw-${cid}-${wi}" data-cat="${item.ci}" onclick="catClick('${cid}',${wi})">${item.w}</button>`).join('');
      const cols = ex.categories.map((c,ci)=>`
        <div class="cat-col" id="cc-${cid}-${ci}" onclick="catColClick('${cid}',${ci})" style="cursor:pointer">
          <div class="cat-col-head" style="color:${['var(--sky)','var(--sea)','var(--sun)','var(--lav)'][ci]||'var(--ink3)'}">${c.name}</div>
          <div class="cat-col-items" id="cc-items-${cid}-${ci}"></div>
        </div>`).join('');
      const colStyle = `grid-template-columns:repeat(${ex.categories.length},1fr)`;
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Categorise</span>
        </div>
        <div class="ex-card-body">
          <div class="cat-bank" id="cb-${cid}">${wordBtns}</div>
          <div class="cat-columns" style="${colStyle}">${cols}</div>
          <div class="check-row">
            <button class="btn-check" onclick="checkCat('${cid}',${ex.categories.length})">Check answers</button>
            <button class="btn-reset" onclick="resetCat('${cid}',${ex.categories.length})">Reset</button>
          </div>
          <div class="score-badge" id="score-cat-${cid}"></div>
        </div></div>`;
    }

    // ── CONVERSATION FILL ──
    if(ex.type==='convo'){
      const cvid = `${l.id}-${ei}`;
      let gapCount = 0;
      const lines = ex.lines.map((line,li)=>{
        const spk = line.speaker==='A'?'a':'b';
        const text = line.text.replace(/\[([^\]]+)\]/g,(match,ans)=>{
          const gi = gapCount++;
          return `<span class="convo-gwrap"><input class="convo-input" id="cv-${cvid}-${gi}" data-answer="${ans}" autocomplete="off" style="width:${Math.max(4,ans.replace(/\//g,'').split('/')[0].length+1)}ch"><span class="convo-reveal" id="cv-rev-${cvid}-${gi}"></span></span>`;
        });
        return `<div class="convo-line"><span class="convo-speaker ${spk}">${line.speaker}</span><span class="convo-text">${text}</span></div>`;
      }).join('');
      const total = gapCount;
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">Conversation</span>
        </div>
        <div class="ex-card-body">
          <div class="convo-wrap">${lines}</div>
          <div class="check-row">
            <button class="btn-check" onclick="checkConvo('${cvid}',${total})">Check answers</button>
            <button class="btn-reset" onclick="resetConvo('${cvid}',${total})">Reset</button>
          </div>
          <div class="score-badge" id="score-cv-${cvid}"></div>
        </div></div>`;
    }

    // ── TRUE / FALSE / NOT GIVEN ──
    if(ex.type==='tf'){
      const tfid = `${l.id}-${ei}`;
      const items = ex.items.map((it,ii)=>`
        <div class="tf-item">
          ${it.context?`<div class="tf-context">"${it.context}"</div>`:''}
          <div class="tf-statement">${ii+1}. ${it.statement}</div>
          <div class="tf-options">
            ${['True','False','Not given'].map(opt=>`<button class="tf-btn" onclick="pickTF('${tfid}',${ii},'${opt}','${it.answer}','${it.explanation.replace(/'/g,"'")}') ">${opt}</button>`).join('')}
          </div>
          <div class="tf-feedback" id="tf-fb-${tfid}-${ii}"></div>
        </div>`).join('');
      return `<div class="exercise-card">
        <div class="ex-card-header">
          <div><div class="ex-card-title">${ex.title}</div><div class="ex-card-sub">${ex.sub}</div></div>
          <span class="ex-type-badge">True / False</span>
        </div>
        <div class="ex-card-body">${items}</div></div>`;
    }

  }).join('');

  return `
  <div class="lesson-hero">
    <div class="lesson-meta">
      <span class="level-tag">A1</span>
      <span class="lesson-num">Topic ${idx+1} of ${lessons.length}</span>
    </div>
    <h1>${l.title} <span style="color:var(--ink3);font-weight:400;font-size:22px">— ${l.subtitle}</span></h1>

    <div class="lesson-toolbar">
      <button class="btn ${isDone?'btn-done':'btn-primary'}" onclick="markDone('${l.id}',${idx})" id="done-btn-${l.id}">
        ${isDone?'✓ Completed':'Mark as complete'}
      </button>

    </div>
  </div>
  <div class="lesson-body">

      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span><h2>Explanation</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        <div class="explain-card">
          <div class="explain-lead">${l.intro}</div>
          <div class="explain-body">${l.explanation}</div>
        </div>
        ${tip(l.tip)}
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span><h2>${l.richContent ? (l.richLabel||'Reference') : 'Form & structure'}</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">
        ${l.richContent ? `<div class="explain-card">${l.richContent}</div>` : `<div class="explain-card" style="padding:0;overflow:hidden">${tableHTML}</div>`}
      </div>
    </div>

    <div>
      <div class="section-label collapsed" onclick="toggleSection(this)"><span class="section-label-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span><h2>Examples</h2><span class="section-label-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
      <div class="section-body collapsed">

      <div class="section-body collapsed">

  <div class="lesson-footer">

      ${!isLast?`<button class="btn btn-primary" onclick="goto(${idx+1})">Next topic →</button>`:`<button class="btn btn-done" onclick="alert('You\'ve completed the full C1 course! 🎉')">Finish C1 🎉</button>`}
