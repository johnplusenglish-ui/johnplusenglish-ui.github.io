<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Activity · John+English</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sun:#FFB347;--sky:#2176FF;--sky-light:#E8EEFF;--sea:#1DD3B0;--sea-light:#E4FBF7;
  --coral:#FF6B6B;--coral-light:#FFE8E8;--lavender:#9B72CF;--lavender-light:#F0E8FA;
  --mint:#5DDEA0;--sand:#FFF5E6;--cream:#F7F6F3;--ink:#2D3047;--muted:#7A7D8E;
  --border:#E8E5DF;--card:#fff;--radius:14px;
  --shadow-sm:0 1px 3px rgba(45,48,71,.06);--shadow-md:0 4px 12px rgba(45,48,71,.08)
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:28px 28px;opacity:.4;pointer-events:none;z-index:0}

/* TOPNAV */
.topnav{position:fixed;top:0;left:0;right:0;height:52px;z-index:200;background:rgba(247,246,243,.88);backdrop-filter:blur(16px);border-bottom:1.5px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-.02em;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--sky)}
.topnav-links{display:flex;gap:1.2rem;align-items:center}
.topnav-links a{font-size:.8rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .2s}
.topnav-links a:hover{color:var(--sky)}

/* BACK + HERO */
.back-link-wrap{max-width:1200px;margin:0 auto;padding:4.2rem 2rem 0;position:relative;z-index:1}
.wf-back-link{display:inline-flex;align-items:center;gap:.35rem;font-size:.82rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .15s}
.wf-back-link:hover{color:var(--ink)}
.hero{position:relative;padding:1.4rem 2rem 1.2rem;max-width:1200px;margin:0 auto;text-align:center;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .9rem;border-radius:20px;margin-bottom:.7rem;color:var(--sea);background:var(--sea-light)}
.hero h1{font-family:'Outfit',sans-serif;font-size:clamp(1.8rem,3.6vw,2.6rem);line-height:1.1;letter-spacing:-.02em;margin-bottom:.6rem;font-weight:900;color:var(--ink)}
.hero-sub{font-size:.95rem;color:var(--muted);max-width:520px;margin:0 auto;line-height:1.6}

/* MAIN LAYOUT */
.main-wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 2rem 4rem;display:grid;grid-template-columns:260px 1fr 260px;gap:0;align-items:start}

/* LEFT SIDEBAR */
.sidebar{padding:0 1.5rem 0 0}
.sidebar-inner{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow-y:auto;max-height:calc(100vh - 80px);box-shadow:var(--shadow-sm);position:sticky;top:68px}
.sb-head{padding:1.1rem 1.4rem .8rem;border-bottom:1px solid var(--border)}
.sb-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.pack-header{font-family:'JetBrains Mono',monospace;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.9rem 1.4rem .4rem;display:flex;align-items:center;gap:.5rem}
.pack-header::after{content:'';flex:1;height:1px;background:var(--border)}
.sc-list{padding:.6rem .9rem .9rem}
.scenario-card{border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1rem;margin-bottom:.45rem;cursor:pointer;transition:all .15s;background:var(--cream)}
.scenario-card:hover{border-color:var(--sea);background:var(--sea-light)}
.scenario-card.active{border-color:var(--sea);background:var(--sea-light)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.35rem}
.sc-title{font-size:1rem;font-weight:700;color:var(--ink);line-height:1.3}
.sc-level{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;padding:.2rem .5rem;border-radius:4px;flex-shrink:0;margin-top:2px}
.sc-level.b2{background:var(--sky-light);color:var(--sky)}
.sc-level.c1{background:var(--lavender-light);color:var(--lavender)}
.sc-desc{font-size:.87rem;color:var(--muted);line-height:1.5}

/* PHONE COLUMN */
.phone-col{display:flex;flex-direction:column;align-items:center;gap:1.6rem}
.phone-row{display:flex;align-items:flex-start;gap:10px}


/* PHONE FRAME — iPhone 17 style */
.phone-frame{
  width:375px;
  border-radius:54px;
  border:3px solid #3a3a3c;
  background:#1c1c1e;
  box-shadow:
    0 0 0 1px #555 inset,
    0 0 0 2px #1c1c1e inset,
    0 32px 80px rgba(0,0,0,.5),
    0 4px 16px rgba(0,0,0,.3);
  flex-shrink:0;
  position:relative;
  /* NO overflow:hidden here — lets pseudo buttons render outside */
}
/* Clip the screen content inside frame */
.phone-inner{
  border-radius:51px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  height:780px;
}
/* Side buttons — left: silent + vol */
.phone-frame::before{
  content:'';
  position:absolute;
  left:-5px;top:100px;
  width:3px;height:34px;
  background:#3a3a3c;
  border-radius:2px 0 0 2px;
  box-shadow:0 52px 0 #3a3a3c, 0 100px 0 #3a3a3c
}
/* Side button — right: power */
.phone-frame::after{
  content:'';
  position:absolute;
  right:-5px;top:140px;
  width:3px;height:72px;
  background:#3a3a3c;
  border-radius:0 2px 2px 0
}

/* iOS status bar area with Dynamic Island */
.ios-statusbar{
  height:54px;
  background:#000;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  padding:16px 24px 0;
  flex-shrink:0;
  position:relative
}
.ios-time{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  font-size:15px;
  font-weight:600;
  color:#fff;
  letter-spacing:-.01em;
  line-height:1
}
.dynamic-island{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:11px;
  width:126px;
  height:36px;
  background:#000;
  border-radius:20px;
  box-shadow:0 0 0 1.5px #222 inset
}
.ios-status-icons{
  display:flex;
  align-items:center;
  gap:6px;
  line-height:1;
  margin-top:1px
}
.ios-status-icons svg{fill:#fff}

/* Screen area — fills remaining height */
.phone-screen{
  background:#fff;
  display:flex;
  flex-direction:column;
  flex:1;
  min-height:0;
  overflow:hidden;
}
.phone-screen-scroll{overflow-y:scroll;flex:1;scrollbar-width:none;min-height:0}
.phone-screen-scroll::-webkit-scrollbar{display:none}
.phone-home-bar{
  height:30px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0
}
.home-bar-pill{width:130px;height:5px;background:#1a1a1a;border-radius:5px;opacity:.22}


.hint-strip{text-align:center;font-size:.85rem;font-weight:500;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:.6rem;letter-spacing:.01em}
.hint-line{width:20px;height:0;border-bottom:1.5px dotted rgba(45,48,71,.3)}

/* SCROLL TRACK */
.scroll-track{width:14px;display:flex;flex-direction:column;align-items:center;height:780px;flex-shrink:0;padding:2px 0;align-self:flex-start}
.scroll-rail{width:8px;height:100%;background:var(--border);border-radius:6px;position:relative;cursor:pointer}
.scroll-thumb{width:8px;background:var(--sea);border-radius:6px;position:absolute;top:0;left:0;min-height:36px;transition:top .06s linear;cursor:grab}
.scroll-thumb:active{cursor:grabbing}

/* WA HEADER */
.wa-header{background:#075E54;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.wa-back{color:rgba(255,255,255,.8);font-size:20px;line-height:1;flex-shrink:0}
.wa-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}
.wa-info{flex:1}
.wa-name{font-size:15px;font-weight:600;color:#fff;line-height:1.2;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}
.wa-status{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}
.wa-icons{display:flex;gap:16px}
.wa-icons svg{width:20px;height:20px;stroke:rgba(255,255,255,.85);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* CHAT */
.chat-window{padding:8px 8px 16px;display:flex;flex-direction:column;gap:2px;background-color:#E9F0EB}
.date-chip{align-self:center;background:rgba(255,255,255,.82);border-radius:8px;padding:5px 14px;font-size:12.5px;color:#555;margin:6px 0 8px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.msg-row{display:flex;align-items:flex-end;gap:0;max-width:88%;margin-bottom:2px}
.msg-row.them{align-self:flex-start}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse}
.msg-row.grouped{margin-bottom:1px}
.sender-label{font-size:13px;font-weight:600;color:#075E54;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;margin:6px 0 2px;padding-left:14px}
.bubble-wrap{display:flex;flex-direction:column}
.msg-row.them .bubble-wrap{align-items:flex-start}
.msg-row.me .bubble-wrap{align-items:flex-end}

/* Bubble */
.bubble{
  position:relative;
  padding:7px 10px 6px 12px;
  border-radius:18px;
  font-size:16px;
  line-height:1.42;
  word-break:break-word;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  letter-spacing:-.01em;
  max-width:100%;
  overflow:hidden
}
.bubble.them{
  background:#fff;
  border-bottom-left-radius:0;
  color:#1a1a1a;
  box-shadow:0 1px 1px rgba(0,0,0,.1)
}
.bubble.me{
  background:#DCF8C6;
  border-bottom-right-radius:0;
  color:#1a1a1a;
  box-shadow:0 1px 1px rgba(0,0,0,.08)
}
/* Grouped bubbles — restore radius on all corners when no tail */
.bubble.them.grouped-top{border-bottom-left-radius:18px}
.bubble.me.grouped-top{border-bottom-right-radius:18px}

/* Timestamp block — sits after text, pushed to bottom-right */
.bubble-time{
  display:inline-flex;
  align-items:center;
  gap:3px;
  float:right;
  margin-left:6px;
  margin-bottom:-3px;
  position:relative;
  bottom:-1px;
  line-height:1
}
.btime{font-size:11.5px;color:rgba(0,0,0,.38);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;white-space:nowrap}
.bticks svg{width:18px;height:11px;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block}
.bticks.blue svg{stroke:#53BDEB}
.bticks.grey svg{stroke:#aaa}

/* CLICKABLE PHRASES */
.hl{
  border-bottom:1px dotted rgba(0,0,0,.35);
  cursor:pointer;
  padding-bottom:0px;
  text-decoration:none
}
.bubble.me .hl{border-bottom-color:rgba(0,0,0,.28)}

/* DEFINITION PANEL */
.def-col{padding:0 0 0 1.4rem;width:260px;flex-shrink:0;position:relative}
.def-panel{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:1.6rem 1.6rem 1.4rem;position:fixed;top:80px;width:250px;opacity:0;pointer-events:none;transition:opacity .18s;z-index:50}
.def-panel.show{opacity:1;pointer-events:auto}
.def-phrase{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;color:#0a7d6a;text-transform:lowercase;margin-bottom:1rem;letter-spacing:.02em}
.def-body{font-size:1rem;color:var(--ink);line-height:1.7;margin-bottom:1rem}
.def-ex{font-size:.93rem;color:var(--muted);line-height:1.65;font-style:italic;border-left:3px solid var(--border);padding-left:.8rem;margin-top:.2rem}
.def-close{display:flex;justify-content:flex-end;margin-top:1.2rem}
.def-close-btn{font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;color:var(--muted);background:none;border:1.5px solid var(--border);border-radius:8px;padding:.35rem .8rem;cursor:pointer;transition:all .15s}
.def-close-btn:hover{border-color:var(--ink);color:var(--ink)}

/* Phrase dropdown under phone */
.phrase-dropdown{width:100%;max-width:399px}
.phrase-toggle{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:.75rem 1.1rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.87rem;font-weight:600;color:var(--ink);transition:border-color .15s;box-shadow:var(--shadow-sm)}
.phrase-toggle:hover{border-color:#0a7d6a}
.phrase-toggle-label{display:flex;align-items:center;gap:.5rem}
.phrase-toggle-count{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;background:var(--sea-light);color:#0a7d6a;padding:.15rem .45rem;border-radius:4px}
.phrase-toggle-chevron{color:var(--muted);font-size:.75rem;transition:transform .2s;flex-shrink:0}
.phrase-toggle-chevron.open{transform:rotate(180deg)}
.phrase-body{display:none;background:var(--card);border:1.5px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:.5rem 0;box-shadow:var(--shadow-sm)}
.phrase-body.open{display:block}
.pi-item{padding:.9rem 1.4rem;border-bottom:1px solid rgba(232,229,223,.5);cursor:pointer;transition:background .12s}
.pi-item:last-child{border-bottom:none}
.pi-item:hover{background:var(--cream)}
.pi-phrase{font-size:.95rem;font-weight:700;color:#0a7d6a;margin-bottom:.3rem}
.pi-def{font-size:.84rem;color:var(--muted);line-height:1.5}

/* Topic filter chips */
.filter-row{padding:.7rem 1rem .5rem;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:.3rem}
.filter-chip{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.3rem .65rem;border-radius:100px;border:1.5px solid var(--border);background:var(--cream);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-chip:hover{border-color:#0a7d6a;color:#0a7d6a}
.filter-chip.active{background:#0a7d6a;color:#fff;border-color:#0a7d6a}
.sc-hidden{display:none}

/* Print button */
.print-btn-wrap{display:flex;justify-content:flex-end;gap:.5rem;width:100%;max-width:399px;margin-bottom:.5rem}
.print-btn{display:inline-flex;align-items:center;gap:.4rem;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;color:var(--muted);background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:.45rem .9rem;cursor:pointer;transition:all .15s}
.print-btn:hover{border-color:var(--ink);color:var(--ink)}
.print-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media print{
  .topnav,.back-link-wrap,.hero,.sidebar,.scroll-track,.hint-strip,.phrase-dropdown,.def-col,.print-btn-wrap,.ios-statusbar,.phone-home-bar,.wa-icons,.wa-back{display:none!important}
  body,html{background:#fff!important}
  body::before{display:none!important}
  .main-wrap{display:block!important;padding:0!important;max-width:none!important}
  .phone-col{align-items:flex-start}
  .phone-frame{border:none!important;box-shadow:none!important;border-radius:0!important;width:100%!important}
  .phone-inner{border-radius:0!important;height:auto!important}
  .phone-screen{overflow:visible!important}
  .phone-screen-scroll{overflow:visible!important;height:auto!important;max-height:none!important}
  .chat-window{background:#E9F0EB!important;padding:12px!important}
  .wa-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .bubble.me{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hl{border-bottom:none!important}
}

@media(max-width:1100px){
  .main-wrap{grid-template-columns:230px 1fr 230px}
  .def-col{width:230px}
}
@media(max-width:900px){
  .main-wrap{grid-template-columns:1fr;gap:1.5rem}
  .sidebar{padding:0}
  .sidebar-inner{position:static}
  .phone-col{position:static}
  .def-col{width:100%;padding:0}
  .def-panel{position:static;opacity:1;pointer-events:auto}
  .def-panel:not(.show){display:none}
}
@media(max-width:500px){
  .topnav{padding:0 1.2rem}
  .back-link-wrap,.hero,.main-wrap{padding-left:1.2rem;padding-right:1.2rem}
  .phone-frame{width:100%;max-width:340px}
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="nav-logo">john<span>+</span>english</a>
  <div class="topnav-links">
    <a href="index.html">Home</a>
    <a href="index.html#group-fun">Fun Tools</a>
  </div>
</nav>

<div class="back-link-wrap">
  <a href="index.html" class="wf-back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Home
  </a>
</div>

<section class="hero">
  <span class="hero-badge">Fun Tools</span>
  <h1>Chat Activity</h1>
  <p class="hero-sub">Read real WhatsApp conversations. Tap any underlined phrase to see what it means and how it is used.</p>
</section>

<div class="main-wrap">

  <!-- LEFT: scenario list -->
  <div class="sidebar">
    <div class="sidebar-inner">
      <div class="sb-head"><div class="sb-label">Scenarios</div></div>
      <div class="filter-row" id="filterRow"></div>
      <div class="sc-list" id="scenarioList"></div>
    </div>
  </div>

  <!-- CENTRE: phone -->
  <div class="phone-col">
    <div class="phone-row">
      <div class="phone-frame">
        <div class="phone-inner">
        <!-- iOS status bar with Dynamic Island -->
        <div class="ios-statusbar">
          <div class="ios-time">9:41</div>
          <div class="dynamic-island"></div>
          <div class="ios-status-icons">
            <!-- Signal bars -->
            <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="3" height="8" rx=".8"/><rect x="4.5" y="2.5" width="3" height="9.5" rx=".8"/><rect x="9" y="1" width="3" height="11" rx=".8"/><rect x="13.5" y="0" width="3" height="12" rx=".8"/></svg>
            <!-- WiFi -->
            <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/><path d="M4.5 7.5a5 5 0 017 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M1.5 4.5a9 9 0 0113 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
            <!-- Battery -->
            <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="#fff" stroke-width="1.2" fill="none"/><rect x="1.5" y="2.5" width="18" height="7" rx="2" fill="#fff"/><path d="M23.5 4v4a2 2 0 000-4z" fill="#fff"/></svg>
          </div>
        </div>
        <div class="phone-screen">
          <div class="wa-header">
            <div class="wa-back">&#8592;</div>
            <div class="wa-avatar" id="wa-avatar">S</div>
            <div class="wa-info">
              <div class="wa-name" id="wa-name">Sara</div>
              <div class="wa-status" id="wa-status">online</div>
            </div>
            <div class="wa-icons">
              <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
              <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
              <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </div>
          </div>
          <div class="phone-screen-scroll" id="phoneScroll">
            <div class="chat-window" id="chatWindow"></div>
          </div>
        </div>
        <div class="phone-home-bar"><div class="home-bar-pill"></div></div>
        </div><!-- /phone-inner -->

var currentId = 0;
var activeKey = null;
var activeFilter = 'all';

var TOPICS = ['all','Work','Social','Home','Relationships','Dating','Family'];

function buildFilterChips() {
  var row = document.getElementById('filterRow');
  var html = '';
  TOPICS.forEach(function(t) {
    var label = t === 'all' ? 'All' : t;
    html += '<button class="filter-chip'+(t===activeFilter?' active':'')+'" onclick="setFilter(\''+t+'\')">'+label+'</button>';
  });
  row.innerHTML = html;
}

function setFilter(topic) {
  activeFilter = topic;
  buildFilterChips();
  buildScenarioList();
}

function buildScenarioList() {
  var packs = {'B2':[],'C1':[]};
  SCENARIOS.forEach(function(sc){
    // Filter by topic tag
    if (activeFilter !== 'all') {
      var match = sc.tags.some(function(t){ return t === activeFilter; });
      if (!match) return;
    }
    packs[sc.level==='b2'?'B2':'C1'].push(sc);
  });
  var html = '';
  ['B2','C1'].forEach(function(key) {
    if (!packs[key].length) return;
    html += '<div class="pack-header">' + key + '</div>';
    packs[key].forEach(function(sc) {
      html += '<div class="scenario-card" onclick="loadScenario('+sc.id+')" id="sc-card-'+sc.id+'">';
      html += '<div class="sc-title">'+sc.title+'</div>';
      html += '<div class="sc-desc">'+sc.desc+'</div>';
      html += '</div>';
    });
  });
  if (!html) html = '<div style="padding:.8rem 1rem;font-size:.84rem;color:var(--muted)">No scenarios in this topic.</div>';
  document.getElementById('scenarioList').innerHTML = html;
  // Re-mark active card if still visible
  var activeCard = document.getElementById('sc-card-'+currentId);
  if (activeCard) activeCard.classList.add('active');
}

function buildPhraseDropdown(vocab, sc) {
  var body = document.getElementById('phraseBody');
  var count = document.getElementById('phraseCount');
  var keys = Object.keys(vocab);
  count.textContent = keys.length;
  if (!keys.length) { body.innerHTML = ''; return; }
  var html = '';
  keys.forEach(function(k) {
    html += '<div class="pi-item" onclick="showDefinition(\''+escAttr(k)+'\',SCENARIOS.find(function(s){return s.id==='+sc.id+'}).vocab[\''+escAttr(k)+'\'])">';
    html += '<div class="pi-phrase">'+escHtml(k)+'</div>';
    html += '<div class="pi-def">'+escHtml(vocab[k].def.split('.')[0])+'</div>';
    html += '</div>';
  });
  body.innerHTML = html;
  // close dropdown on scenario switch
  body.classList.remove('open');
  document.getElementById('phraseChevron').classList.remove('open');
}

function togglePhraseDropdown() {
  var body = document.getElementById('phraseBody');
  var chevron = document.getElementById('phraseChevron');
  var open = body.classList.toggle('open');
  chevron.classList.toggle('open', open);
}

function buildMessage(msg, isMe, senderName, vocab, showSender, isGrouped, tickColor) {
  var row = document.createElement('div');
  row.className = 'msg-row ' + (isMe ? 'me' : 'them') + (isGrouped ? ' grouped' : '');

  tickColor = tickColor || 'blue';
  var ticksHtml = (isMe && tickColor !== 'none')
    ? '<span class="bticks '+tickColor+'"><svg viewBox="0 0 24 10"><polyline points="1 5 5 9 13 1"/><polyline points="9 5 13 9 21 1"/></svg></span>'
    : '';

  var content = '';
  msg.text.forEach(function(part) {
    if (part.p !== undefined && part.k && vocab[part.k]) {
      content += '<span class="hl" data-key="'+escAttr(part.k)+'">'+escHtml(part.p)+'</span>';
    } else if (part.t) {
      content += escHtml(part.t);
    }
  });

  // Tail — only on last bubble of a group (not grouped-top)
  // Tail: right edge is perfectly straight (butts against bubble wall), outer edge curves away
  var tailThem = isGrouped ? '' : '<svg width="10" height="20" viewBox="0 0 10 20" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;align-self:flex-end;display:block;margin-right:-2px;z-index:1;position:relative"><path d="M10 0 L10 20 L0 20 Q2 16 3 12 Q6 6 10 0 Z" fill="#fff"/></svg>';
  var tailMe   = isGrouped ? '' : '<svg width="10" height="20" viewBox="0 0 10 20" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;align-self:flex-end;display:block;margin-left:-2px;z-index:1;position:relative"><path d="M0 0 L0 20 L10 20 Q8 16 7 12 Q4 6 0 0 Z" fill="#DCF8C6"/></svg>';

  var senderHtml = (showSender && !isMe) ? '<div class="sender-label">'+senderName+'</div>' : '';

  // Bubble class — grouped-top removes the tail corner
  var bubbleClass = 'bubble ' + (isMe ? 'me' : 'them') + (isGrouped ? ' grouped-top' : '');

  // Footer placed AFTER content so it floats to bottom-right
  var footer = '<span class="bubble-time"><span class="btime">'+msg.time+'</span>'+ticksHtml+'</span>';

  row.innerHTML = '<div class="bubble-wrap">'
    + senderHtml
    + '<div style="display:flex;align-items:flex-end;gap:0;overflow:visible">'
    + (isMe ? '' : tailThem)
    + '<div class="'+bubbleClass+'">'+content+' '+footer+'</div>'
    + (isMe ? tailMe : '')
    + '</div>'
    + '</div>';
  return row;
}

function loadScenario(id) {
  currentId = id;
  var sc = SCENARIOS.find(function(s){ return s.id===id; });
  if (!sc) return;
  document.querySelectorAll('.scenario-card').forEach(function(c){
    c.classList.toggle('active', c.id==='sc-card-'+id);
  });
  document.getElementById('wa-name').textContent = sc.nameB;
  document.getElementById('wa-avatar').textContent = sc.nameB.charAt(0).toUpperCase();
  document.getElementById('wa-avatar').style.background = sc.avatarColor;
  document.getElementById('wa-status').textContent = sc.status || 'online';
  var cw = document.getElementById('chatWindow');
  cw.innerHTML = '';
  var chip = document.createElement('div');
  chip.className = 'date-chip';
  chip.textContent = 'Today';
  cw.appendChild(chip);
  sc.messages.forEach(function(msg, i) {
    var isMe = msg.who === 'A';
    var senderName = msg.who === 'A' ? sc.nameA : sc.nameB;
    var prev = sc.messages[i - 1];
    var next = sc.messages[i + 1];
    var showSender = !isMe && (!prev || prev.who !== msg.who);
    var isGrouped = next && next.who === msg.who;
    cw.appendChild(buildMessage(msg, isMe, senderName, sc.vocab, showSender, isGrouped, sc.ticks || 'blue'));
  });
  cw.querySelectorAll('.hl').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var key = el.getAttribute('data-key');
      if (activeKey === key) { hideDefinition(); return; }
      if (sc.vocab[key]) showDefinition(key, sc.vocab[key]);
    });
  });
  hideDefinition();
  buildPhraseDropdown(sc.vocab, sc);
  var ps = document.getElementById('phoneScroll');
  ps.scrollTop = 0;
  setTimeout(updateThumb, 50);
}

function showDefinition(phrase, entry) {
  activeKey = phrase;
  document.getElementById('def-phrase').textContent = phrase;
  document.getElementById('def-body').textContent = entry.def;
  var exEl = document.getElementById('def-ex');
  exEl.textContent = entry.ex ? entry.ex : '';
  exEl.style.display = entry.ex ? 'block' : 'none';
  var panel = document.getElementById('defPanel');
  // Position fixed relative to def-col
  var col = document.querySelector('.def-col');
  if (col) {
    var rect = col.getBoundingClientRect();
    panel.style.left = rect.left + 'px';
    panel.style.width = rect.width + 'px';
  }
  panel.classList.add('show');
}

function hideDefinition() {
  activeKey = null;
  document.getElementById('defPanel').classList.remove('show');
}

document.addEventListener('click', function(e) {
  if (!e.target.classList.contains('hl') && !e.target.closest('#defPanel')) hideDefinition();
});

function updateThumb() {
  var ps = document.getElementById('phoneScroll');
  var thumb = document.getElementById('scrollThumb');
  var rail = document.getElementById('scrollRail');
  if (!ps||!thumb||!rail) return;
  var railH = rail.offsetHeight;
  var scrollH = ps.scrollHeight;
  var clientH = ps.clientHeight;
  if (scrollH <= clientH) { thumb.style.height='0'; return; }
  var thumbH = Math.max(36, (clientH/scrollH)*railH);
  var maxTop = railH - thumbH;
  var ratio = ps.scrollTop / (scrollH - clientH);
  thumb.style.height = thumbH+'px';
  thumb.style.top = (ratio*maxTop)+'px';
}

document.addEventListener('DOMContentLoaded', function() {
  var ps = document.getElementById('phoneScroll');
  if (ps) ps.addEventListener('scroll', updateThumb);
  var thumb = document.getElementById('scrollThumb');
  var dragging = false, startY = 0, startTop = 0;
  if (thumb) {
    thumb.addEventListener('mousedown', function(e) {
      dragging = true; startY = e.clientY;
      startTop = document.getElementById('phoneScroll').scrollTop;
      e.preventDefault();
    });
  }
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var ps2 = document.getElementById('phoneScroll');
    var rail = document.getElementById('scrollRail');
    var thumb2 = document.getElementById('scrollThumb');
    var railH = rail.offsetHeight;
    var thumbH = parseFloat(thumb2.style.height)||36;
    var maxTop = railH - thumbH;
    var dy = e.clientY - startY;
    var scrollRange = ps2.scrollHeight - ps2.clientHeight;
    ps2.scrollTop = startTop + (dy/maxTop)*scrollRange;
  });
  document.addEventListener('mouseup', function(){ dragging=false; });
  window.addEventListener('resize', function() {
    var panel = document.getElementById('defPanel');
    if (panel.classList.contains('show')) {
      var col = document.querySelector('.def-col');
      if (col) {
        var rect = col.getBoundingClientRect();
        panel.style.left = rect.left + 'px';
        panel.style.width = rect.width + 'px';
      }
    }
  });
  // Click on rail to jump
  var rail = document.getElementById('scrollRail');
  if (rail) {
    rail.addEventListener('click', function(e) {
      if (e.target === rail) {
        var ps2 = document.getElementById('phoneScroll');
        var railRect = rail.getBoundingClientRect();
        var ratio = (e.clientY - railRect.top) / railRect.height;
        ps2.scrollTop = ratio * (ps2.scrollHeight - ps2.clientHeight);
      }
    });
  }
});

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

buildFilterChips();
buildScenarioList();
loadScenario(0);

function exportPng() {
  var btn = document.getElementById('exportPngBtn');
  btn.textContent = 'Generating...';
  btn.disabled = true;

  // Temporarily expand phone screen to show full chat
  var scroll = document.getElementById('phoneScroll');
  var inner = document.querySelector('.phone-inner');
  var origHeight = inner.style.height;
  var origOverflow = scroll.style.overflow;
  var fullH = scroll.scrollHeight + 54 + 56 + 30; // statusbar + header + homebar
  inner.style.height = fullH + 'px';
  scroll.style.overflow = 'visible';
  scroll.style.height = 'auto';
  scroll.style.maxHeight = 'none';

  // Load html2canvas on demand
  if (typeof html2canvas === 'undefined') {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = function(){ doCapture(); };
    document.head.appendChild(s);
  } else {
    doCapture();
  }

  function doCapture() {
    var frame = document.querySelector('.phone-frame');
    html2canvas(frame, {
      scale: 2,
      useCORS: true,
      backgroundColor: null,
      logging: false
    }).then(function(canvas) {
      // Restore
      inner.style.height = origHeight;
      scroll.style.overflow = origOverflow;
      scroll.style.height = '';
      scroll.style.maxHeight = '';

      var link = document.createElement('a');
      var sc = SCENARIOS.find(function(s){ return s.id === currentId; });
      link.download = (sc ? sc.title.toLowerCase().replace(/\s+/g,'-') : 'chat') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();

      btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Save as PNG';
      btn.disabled = false;
    }).catch(function() {
      inner.style.height = origHeight;
      scroll.style.overflow = origOverflow;
      scroll.style.height = '';
      btn.textContent = 'Save as PNG';
      btn.disabled = false;
    });
  }
}
