 \u2014 obligation, it is the law.<br>\n<em>\"You mustn't smoke here.\"</em> \u2014 prohibition, it is not allowed.<br>\n<em>\"You shouldn't smoke so much.\"</em> \u2014 advice against it, but not forbidden.</div>",table:{headers:["Form","Example","What it means"],rows:[["should + base verb","You should see a doctor.","I recommend it \u2014 it's a good idea"],["shouldn't + base verb","You shouldn't drive if you're tired.","I advise against it \u2014 bad idea, not forbidden"],["Should + subject + base verb?","Should I apologise? / What should I wear?","Asking for advice or a recommendation"],["Short answers","Yes, you should. / No, you shouldn't.","Never: Yes, you should to."],["should vs must","You should exercise more. (advice)","You must wear a seatbelt. (law/rule)"],["shouldn't vs mustn't","You shouldn't eat so much. (bad idea)","You mustn't smoke here. (prohibited, forbidden)"]]},examples:[{type:"pos",eng:"You should see a doctor.",note:"Giving advice."},{type:"pos",eng:"We should book early \u2014 it gets busy.",note:"Recommendation."},{type:"pos",eng:"Children should eat more vegetables.",note:"General recommendation."},{type:"neg",eng:"You shouldn't stay up so late.",note:"Advising against something."},{type:"q",eng:"Should I apologise?",note:"Asking for advice."},{type:"q",eng:"What should I wear?",note:"Asking for a recommendation."}],errors:[{bad:"You should to rest.",good:"You should rest.",reason:"No to after modal verbs."},{bad:"She shoulds call him.",good:"She should call him.",reason:"Should never adds -s for third person."},{bad:"You shouldn't to worry.",good:"You shouldn't worry.",reason:"Shouldn't + base form, no to."},{bad:"Should I to bring anything?",good:"Should I bring anything?",reason:"No to after should in questions."}],realUse:["\"You should try it \u2014 it's amazing.\" \u2014 enthusiastic recommendation.","\"I really think you should talk to her.\" \u2014 strong but tactful advice.","\"You should have called.\" \u2014 past advice (should have + past participle).","\"Shouldn't you be at work?\" \u2014 questioning someone's actions."],exercises:[{type:"gap",title:"Should or shouldn't?",sub:"Fill each gap with should or shouldn't.",items:[{answer:"should",before:"You ",after:" see a doctor about that cough."},{answer:"shouldn't",before:"You ",after:" eat so much junk food."},{answer:"should",before:"We ",after:" book the tickets in advance."},{answer:"shouldn't",before:"Children ",after:" spend too much time on screens."},{answer:"should",before:"I think you ",after:" apologise."},{answer:"shouldn't",before:"You ",after:" drive if you're tired."},{answer:"should",before:"She ",after:" call her parents more often."},{answer:"shouldn't",before:"He ",after:" work so hard \u2014 it's not healthy."}]},{type:"mc",title:"Giving advice",sub:"Choose the best option.",items:[{q:"I have a headache. What _____ I do?",opts:["should","shall","must","am"],answer:"should",explanation:"Asking for advice \u2014 should."},{q:"You look exhausted. You _____ take a break.",opts:["should to","should","shouldn't to","shoulds"],answer:"should",explanation:"Should + base form."},{q:"It's very hot. You _____ drink more water.",opts:["should","shouldn't","mustn't","should to"],answer:"should",explanation:"Recommendation \u2014 should."},{q:"He _____ stay up late \u2014 he has an exam tomorrow.",opts:["shouldn't","should","must","should to"],answer:"shouldn't",explanation:"Advising against \u2014 shouldn't."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue with should or shouldn't.",lines:[{speaker:"A",text:"I've got a really bad cold. What [should] I do?"},{speaker:"B",text:"You [should] rest and drink lots of fluids."},{speaker:"A",text:"[Should] I go to work tomorrow?"},{speaker:"B",text:"No, you [shouldn't]. You [should] stay at home."},{speaker:"A",text:"And [should] I take any medicine?"},{speaker:"B",text:"You [should] take something for the fever, but you [shouldn't] take too many pills."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"My advice is: see a doctor.",keyword:"should",answer:"You should see a doctor."},{original:"It's not a good idea to eat before swimming.",keyword:"shouldn't",answer:"You shouldn't eat before swimming."},{original:"What's the best thing to do?",keyword:"should",answer:"What should I do?"},{original:"Taking a jacket is a good idea.",keyword:"should",answer:"You should take a jacket."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"You should to rest.",correct:"You should rest.",hint:"No to after modal verbs."},{wrong:"She shoulds call him.",correct:"She should call him.",hint:"Should never adds -s."},{wrong:"You shouldn't to worry.",correct:"You shouldn't worry.",hint:"Shouldn't + base form, no to."},{wrong:"Should I to bring anything?",correct:"Should I bring anything?",hint:"No to in questions either."},{wrong:"He should resting more.",correct:"He should rest more.",hint:"Should + base form, not -ing."}]}]},

{id:"musthaveto",title:"Modal: must / have to",subtitle:"You must stop, I have to work",intro:"Obligation and necessity \u2014 and the important difference between them.",desc:"Both express obligation, but they come from different sources. Must is internal \u2014 the speaker imposes it. Have to is external \u2014 rules, laws, or circumstances impose it.",tip:"The key distinction: <strong>must</strong> = I am telling you (my authority), <strong>have to</strong> = the rules/situation require it. For day-to-day necessity in speech, <em>have to</em> is more common than <em>must</em>.",explanation:"<p>Both express <strong>obligation</strong> \u2014 something that is necessary. The key question is: <em>who is imposing it?</em></p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Must</strong> \u2014 the obligation comes from <em>the speaker</em>. Your own strong feeling, or you imposing the rule. <em>\"You must try this cake!\"</em> (my insistence). <em>\"I must call her.\"</em> (my strong feeling).</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Have to</strong> \u2014 the obligation comes from <em>outside</em>: rules, laws, other people, schedules. <em>\"I have to be at work by 9.\"</em> (the company's rule). <em>\"She has to take medication.\"</em> (doctor's orders).</div></div>\n<div class=\"note\"><strong>The negatives mean completely different things:</strong><br>\n<strong>Mustn't</strong> = PROHIBITED \u2014 it is not allowed. <em>\"You mustn't park here.\"</em><br>\n<strong>Don't have to</strong> = NOT NECESSARY \u2014 optional, your choice. <em>\"You don't have to wear a tie.\"</em><br>\nConfusing these two is one of the most common grammar mistakes at A2.</div>\n<p style=\"margin-top:14px\">Have to conjugates normally: <em>I/you/we/they have to</em>, <em>he/she/it has to</em>. Past: <strong>had to</strong> (must has no past form).</p>",table:{headers:["Form","Example","What it means / source of obligation"],rows:[["must + base verb","You must try this! / I must call her.","Obligation from the speaker or strong personal feeling"],["have to / has to + base verb","I have to work Saturdays. / She has to take medicine.","Obligation from external rules, laws, or circumstances"],["mustn't + base verb","You mustn't park here.","PROHIBITED \u2014 it is not allowed at all"],["don't / doesn't have to + base verb","You don't have to wear a tie.","NOT NECESSARY \u2014 optional, your choice, no obligation"],["had to + base verb (past)","I had to wait two hours. / She had to cancel.","Past obligation (must has no past form)"],["Key question","\u2014","Who is imposing it?  Me \u2192 must.  Rules/situation \u2192 have to."]]},examples:[{type:"pos",eng:"You must try this \u2014 it's incredible.",note:"Personal strong recommendation."},{type:"pos",eng:"I have to be at work by 8.",note:"External obligation \u2014 work schedule."},{type:"pos",eng:"She has to take medicine three times a day.",note:"Has to for he/she/it."},{type:"neg",eng:"You mustn't smoke in here.",note:"Prohibition \u2014 it is forbidden."},{type:"neg",eng:"You don't have to wear a tie.",note:"Not necessary \u2014 but you can if you want."},{type:"q",eng:"Do you have to work on Saturdays?",note:"Question about external obligation."}],errors:[{bad:"I must to go now.",good:"I have to go now.",reason:"Must + base form \u2014 no to. For external necessity, have to is more natural."},{bad:"She have to work on Sundays.",good:"She has to work on Sundays.",reason:"He/she/it \u2192 has to."},{bad:"I had must leave early.",good:"I had to leave early.",reason:"Past of must \u2192 had to."},{bad:"You don't must park here.",good:"You mustn't park here.",reason:"Negative of must \u2192 mustn't."}],realUse:["\"You must come to dinner sometime.\" \u2014 strong social invitation.","\"I really have to go \u2014 my train leaves in ten minutes.\" \u2014 external pressure.","\"You don't have to do this.\" \u2014 reassurance that something is optional.","\"She had to cancel everything.\" \u2014 past obligation with had to."],exercises:[{type:"gap",title:"Must or have to?",sub:"Fill each gap with the correct form of must or have to.",items:[{answer:"must",before:"You ",after:" try this cake \u2014 it's amazing!"},{answer:"have to",before:"I ",after:" be at the airport by six. (external rule)"},{answer:"has to",before:"She ",after:" take this medication every day."},{answer:"must",before:"You ",after:" see this film \u2014 it's incredible."},{answer:"had to",before:"We ",after:" wait two hours for the bus yesterday."},{answer:"have to",before:"Do you ",after:" work on weekends?"},{answer:"has to",before:"He ",after:" wear a uniform at work."},{answer:"must",before:"I ",after:" remember to call my mother."}]},{type:"gap",title:"Mustn't or don't have to?",sub:"Fill each gap \u2014 prohibition (mustn't) or not necessary (don't/doesn't have to)?",items:[{answer:"mustn't",before:"You ",after:" smoke in this building. (prohibited)"},{answer:"don't have to",before:"You ",after:" wear a tie \u2014 it's casual. (not necessary)"},{answer:"mustn't",before:"Students ",after:" use phones during the exam. (prohibited)"},{answer:"doesn't have to",before:"She ",after:" cook tonight \u2014 we're going out. (not necessary)"},{answer:"mustn't",before:"You ",after:" tell anyone \u2014 it's a secret. (prohibited)"},{answer:"don't have to",before:"You ",after:" pay now \u2014 you can pay later. (not necessary)"}]},{type:"mc",title:"Choose the correct form",sub:"Choose must, mustn't, have to, or don't have to.",items:[{q:"The sign says: No entry. You _____ go in there.",opts:["don't have to","must","mustn't","have to"],answer:"mustn't",explanation:"Mustn't = it is prohibited."},{q:"It's Sunday \u2014 I _____ get up early.",opts:["mustn't","must","don't have to","had to"],answer:"don't have to",explanation:"Don't have to = not necessary."},{q:"I _____ renew my passport before the trip. It expires next month.",opts:["must","mustn't","don't have to","should to"],answer:"must",explanation:"Personal strong necessity \u2014 must."},{q:"She _____ be at the office at 9 \u2014 it's company policy.",opts:["must","has to","mustn't","should"],answer:"has to",explanation:"External rule/policy \u2014 has to."}]},{type:"tf",title:"True, False, or Not given",sub:"Read the sentence. Is the statement true, false, or not given?",items:[{context:"You don't have to come.",statement:"Coming is forbidden.",answer:"False",explanation:"Don't have to means it is not necessary \u2014 not that it is forbidden."},{context:"She must call him.",statement:"The obligation comes from the speaker or a strong personal feeling.",answer:"True",explanation:"Must expresses the speaker's authority or strong feeling."},{context:"I had to work late.",statement:"This happened in the past.",answer:"True",explanation:"Had to is the past form of have to."},{context:"You mustn't park here.",statement:"Parking here is permitted if you pay.",answer:"False",explanation:"Mustn't means it is prohibited \u2014 full stop."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I must to go now.",correct:"I must go now.",hint:"Must + base form, no to."},{wrong:"She have to work on Sundays.",correct:"She has to work on Sundays.",hint:"He/she/it \u2192 has to."},{wrong:"I had must leave early.",correct:"I had to leave early.",hint:"Past of must \u2192 had to."},{wrong:"You don't must park here.",correct:"You mustn't park here.",hint:"Negative of must \u2192 mustn't."},{wrong:"He must to wear a uniform.",correct:"He has to wear a uniform.",hint:"External rule \u2192 have to. And no to after must."}]}]},

{id:"adverbsfreq",title:"Adverbs of frequency",subtitle:"always, usually, often, sometimes, never",intro:"How often? Adverbs that describe the frequency of an action.",desc:"Adverbs of frequency are easy to understand but students often put them in the wrong position in the sentence.",tip:"Position is the key thing: adverbs of frequency go <strong>before the main verb</strong> but <strong>after the verb to be</strong>. <em>\"I always eat breakfast.\"</em> But: <em>\"I am always tired on Mondays.\"</em>",explanation:"<p>Adverbs of frequency say <strong>how often</strong> something happens. The meaning is easy \u2014 the difficulty is <strong>position</strong>.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Before the main verb:</strong> I <em>always</em> have breakfast. &nbsp;She <em>never</em> eats meat. &nbsp;We <em>often</em> go out.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>After the verb to be (am/is/are/was/were):</strong> She <em>is always</em> late. &nbsp;He <em>was never</em> happy. \u2014 The opposite of rule 1, and where most mistakes happen.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>In negatives \u2014 between auxiliary and main verb:</strong> I <em>don't usually</em> drink coffee. \u2014 NOT <em>I usually don't drink coffee.</em></div></div>\n<div class=\"note\"><em>Sometimes, usually</em> and <em>often</em> can also go at the start of a sentence for emphasis: <em>\"Sometimes I regret it.\"</em> But mid-sentence is always safe for all adverbs.</div>",table:{headers:["Adverb","Rough frequency","Example sentence"],rows:[["always","100% \u2014 every time","I always have coffee in the morning."],["usually / normally","~80% \u2014 most of the time","She usually walks to work."],["often / frequently","~60% \u2014 more often than not","We often eat out at the weekend."],["sometimes","~40% \u2014 roughly half the time","I sometimes work late."],["occasionally","~20\u201330%","He occasionally misses class."],["rarely / seldom","~10%","She rarely complains."],["hardly ever","~5% \u2014 close to never","I hardly ever watch TV."],["never","0% \u2014 not once","I never eat fast food."],["Rule: with to be","AFTER am/is/are/was/were","She is always tired. / He was never happy."],["Rule: with other verbs","BEFORE the main verb","I always check my email. / She never eats meat."],["Rule: in negatives","between auxiliary and verb","I don't usually drink coffee late."]]},examples:[{type:"pos",eng:"I always check my email first thing.",note:"Before the main verb (check)."},{type:"pos",eng:"She is usually tired on Mondays.",note:"After to be (is)."},{type:"pos",eng:"We often eat out at the weekend.",note:"Before the main verb (eat)."},{type:"neg",eng:"I don't usually drink coffee in the evening.",note:"Between don't and the main verb."},{type:"q",eng:"Do you often cook at home?",note:"Often goes after the subject in questions."},{type:"q",eng:"How often do you go to the gym?",note:"How often = asking about frequency."}],errors:[{bad:"I go always to the gym on Mondays.",good:"I always go to the gym on Mondays.",reason:"Adverbs of frequency go before the main verb, not after it."},{bad:"He never is happy.",good:"He is never happy.",reason:"After to be \u2014 never comes after is/am/are/was/were."},{bad:"She is often arriving late.",good:"She often arrives late.",reason:"Adverbs of frequency go with the simple form, not continuous."},{bad:"Do you go often to the cinema?",good:"Do you often go to the cinema?",reason:"Often goes before the main verb in questions."}],realUse:["\"I hardly ever...\" = almost never \u2014 very natural in British English.","\"How often do you...?\" \u2014 the question form for frequency.","\"Once/twice/three times a week\" \u2014 specific frequency expressions.","\"Every day / every week\" \u2014 can replace or complement adverbs."],exercises:[{type:"gap",title:"Position of adverbs of frequency",sub:"Add the adverb in brackets in the correct position.",items:[{answer:"I always have coffee in the morning.",before:"always: I ",after:" have coffee in the morning."},{answer:"She is usually late.",before:"usually: She ",after:" is late."},{answer:"We often go out at the weekend.",before:"often: We ",after:" go out at the weekend."},{answer:"He is never happy.",before:"never: He ",after:" is happy."},{answer:"They sometimes eat out.",before:"sometimes: They ",after:" eat out."},{answer:"She rarely complains.",before:"rarely: She ",after:" complains."}]},{type:"mc",title:"Choose the correct position",sub:"Where does the adverb go?",items:[{q:"I ___ eat breakfast before 7am. (always)",opts:["always eat","eat always","am always eating","always am eating"],answer:"always eat",explanation:"Before the main verb (eat)."},{q:"She ___ late for meetings. (is / never)",opts:["never is","is never","is always","never are"],answer:"is never",explanation:"After the verb to be: is never."},{q:"They ___ to the cinema. (go / sometimes)",opts:["sometimes go","go sometimes","sometimes goes","goes sometimes"],answer:"sometimes go",explanation:"Before the main verb (go)."},{q:"Do you ___ exercise? (often)",opts:["often","often do","do often","does often"],answer:"often",explanation:"In questions, the adverb comes after the subject."}]},{type:"categorise",title:"How frequent?",sub:"Click an adverb, then click the correct column.",categories:[{name:"High frequency (60\u2013100%)",items:["always","usually","normally","often","frequently"]},{name:"Medium frequency (~40%)",items:["sometimes","occasionally"]},{name:"Low frequency (0\u201320%)",items:["rarely","seldom","hardly ever","never"]}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue with an adverb of frequency.",lines:[{speaker:"A",text:"How often do you cook at home?"},{speaker:"B",text:"I [usually] cook during the week, but at weekends I [sometimes] go out."},{speaker:"A",text:"Do you [always] eat breakfast?"},{speaker:"B",text:"Yes, I [always] have something \u2014 even just a coffee."},{speaker:"A",text:"And do you eat fast food?"},{speaker:"B",text:"I [rarely] eat it \u2014 maybe once a month. I [never] eat it before an exam!"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I go always to the gym on Mondays.",correct:"I always go to the gym on Mondays.",hint:"Adverbs of frequency go before the main verb."},{wrong:"She never is late.",correct:"She is never late.",hint:"After to be \u2014 never comes after is/am/are."},{wrong:"He is often arriving late.",correct:"He often arrives late.",hint:"Use simple form, not continuous."},{wrong:"Do you go often to the cinema?",correct:"Do you often go to the cinema?",hint:"Often goes before the main verb."},{wrong:"I usually don't like it.",correct:"I don't usually like it.",hint:"Between auxiliary and main verb in negatives."}]}]},

{id:"relativeclauses",title:"Relative clauses",subtitle:"who, which, that",intro:"Adding information about a noun using who, which, and that.",desc:"Relative clauses allow you to add information about a person or thing without starting a new sentence. They make speech and writing much more fluent.",tip:"The key decision is <strong>who vs which</strong>: <em>who</em> for people, <em>which</em> for things. <em>That</em> can replace either. At A2, focus on defining clauses where the information is essential to identify which person or thing you mean.",explanation:"<p>A relative clause adds information about a noun \u2014 attached directly, without starting a new sentence. It makes sentences flow naturally instead of sounding choppy.</p>\n<p><strong>Choosing the right pronoun:</strong></p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>who</strong> \u2014 for people. <em>\"The teacher who helped me.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>which</strong> \u2014 for things and animals. <em>\"The book which I recommended.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>that</strong> \u2014 for both people and things (in defining clauses). <em>\"The man that I met.\"</em> &nbsp;/&nbsp; <em>\"The film that won.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>where</strong> \u2014 for places. <em>\"The city where I grew up.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>whose</strong> \u2014 for possession. <em>\"The student whose essay won\"</em> = the student's essay won.</div></div>\n<div class=\"note\"><strong>Critical rule:</strong> Do not repeat the subject pronoun inside the clause.<br><em>\"The house where I grew up <u>it</u> is old.\"</em> \u2014 remove the <em>it</em>. The relative pronoun has already replaced it.</div>",table:{headers:["Pronoun","Used for","Example","Can use 'that' instead?"],rows:[["who","people","the teacher who helped me","yes \u2014 'the teacher that helped me'"],["which","things / animals","the book which I lent you","yes \u2014 'the book that I lent you'"],["that","people or things (defining)","the man that I met / the film that won","\u2014"],["where","places","the caf\u00e9 where we met","no"],["whose","possession \u2014 who something belongs to","the student whose essay won","no"],["when","points in time","the day when I arrived","sometimes"],["Rule: no repeated subject","\u2014","The house where I grew up is old. \u2713","NOT: The house where I grew up it is old. \u2717"]]},examples:[{type:"pos",eng:"She's the teacher who changed my life.",note:"Who for a person."},{type:"pos",eng:"That's the film which won the Oscar.",note:"Which for a thing."},{type:"pos",eng:"This is the caf\u00e9 where we first met.",note:"Where for a place."},{type:"pos",eng:"I have a friend whose father is a doctor.",note:"Whose = possession."},{type:"q",eng:"What's the name of the man who called?",note:"Relative clause in a question."},{type:"q",eng:"Is this the book that you recommended?",note:"That can replace which."}],errors:[{bad:"She's the woman which called.",good:"She's the woman who called.",reason:"Who for people, which for things."},{bad:"That's the film who won the award.",good:"That's the film which won the award.",reason:"Which for things, who for people."},{bad:"The house where I grew up it is in the north.",good:"The house where I grew up is in the north.",reason:"Don't repeat the subject \u2014 the relative clause replaces it."},{bad:"He's a friend which I trust completely.",good:"He's a friend who I trust completely.",reason:"Who or that for people."}],realUse:["\"The reason why I came here.\" \u2014 why as relative pronoun for reasons.","\"The day when I met her.\" \u2014 when as relative pronoun for time.","\"Everything that glitters is not gold.\" \u2014 proverb with that.","\"That's what I mean.\" \u2014 what as relative pronoun."],exercises:[{type:"gap",title:"Who, which, where, or whose?",sub:"Fill each gap with who, which, where, or whose.",items:[{answer:"who",before:"She's the teacher ",after:" helped me most."},{answer:"which",before:"That's the film ",after:" won the Oscar."},{answer:"where",before:"This is the caf\u00e9 ",after:" we first met."},{answer:"whose",before:"He's the student ",after:" work was the best."},{answer:"who",before:"Do you know the man ",after:" called this morning?"},{answer:"which",before:"I've lost the keys ",after:" you gave me."},{answer:"where",before:"That's the hotel ",after:" we stayed last year."},{answer:"who",before:"The woman ",after:" lives next door is a doctor."}]},{type:"builder",title:"Sentence builder",sub:"Combine the two sentences using a relative clause.",items:[{words:["the","man","who","called","is","my","brother"],answer:"the man who called is my brother",context:"A man called. He is my brother."},{words:["that's","the","book","which","I","recommended"],answer:"that's the book which I recommended",context:"That's a book. I recommended it."},{words:["she","works","in","a","hospital","which","is","very","famous"],answer:"she works in a hospital which is very famous",context:"She works in a hospital. The hospital is very famous."},{words:["he's","a","teacher","whose","classes","I","love"],answer:"he's a teacher whose classes I love",context:"He's a teacher. I love his classes."},{words:["that's","the","city","where","I","was","born"],answer:"that's the city where I was born",context:"That's a city. I was born there."}]},{type:"mc",title:"Who, which, that, or where?",sub:"Choose the correct relative pronoun.",items:[{q:"The man _____ I spoke to was very helpful.",opts:["which","whose","who","where"],answer:"who",explanation:"The man is a person \u2014 who or that."},{q:"The hotel _____ we stayed was beautiful.",opts:["which","who","that","where"],answer:"where",explanation:"A place \u2014 where."},{q:"I bought a book _____ explains everything clearly.",opts:["who","whose","which","where"],answer:"which",explanation:"A book is a thing \u2014 which or that."},{q:"She's the student _____ got the highest mark.",opts:["which","whose","where","who"],answer:"who",explanation:"A student is a person \u2014 who or that."}]},{type:"tf",title:"True, False, or Not given",sub:"Is the statement true, false, or not given?",items:[{context:"She's the teacher who changed my life.",statement:"The relative clause tells us which teacher is meant.",answer:"True",explanation:"This is a defining relative clause \u2014 it identifies which specific teacher."},{context:"That's the film which won the Oscar.",statement:"We could replace 'which' with 'who' here.",answer:"False",explanation:"Film is a thing \u2014 we must use which or that, not who."},{context:"The house where I grew up is in the north.",statement:"The speaker grew up in the north.",answer:"True",explanation:"The house where they grew up is in the north."},{context:"I have a friend whose father is a doctor.",statement:"The speaker's father is a doctor.",answer:"False",explanation:"Whose refers to the friend's father, not the speaker's."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She's the woman which called.",correct:"She's the woman who called.",hint:"Who for people."},{wrong:"That's the film who won the award.",correct:"That's the film which won the award.",hint:"Which for things."},{wrong:"The house where I grew up it is old.",correct:"The house where I grew up is old.",hint:"Don't repeat the subject."},{wrong:"He's a friend which I trust.",correct:"He's a friend who I trust.",hint:"Who or that for people."},{wrong:"The city who I was born in is Madrid.",correct:"The city where I was born is Madrid.",hint:"Where for places."}]}]},

{id:"conjunctions",title:"Conjunctions",subtitle:"because, so, but, although, when, if",intro:"Joining ideas together to make complex, natural sentences.",desc:"Conjunctions are what make sentences flow. Without them, every idea lives in isolation. With them, you can express cause, contrast, result, condition and more.",tip:"The most common confusion is between <strong>because</strong> and <strong>so</strong>. They are opposites in structure: <em>because</em> introduces the reason, <em>so</em> introduces the result. Same meaning, opposite order.",explanation:"<p>Conjunctions join two clauses into one sentence. The conjunction signals the <strong>logical relationship</strong> between the ideas.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Because vs so</strong> \u2014 both express cause and effect, from opposite directions. <em>Because</em> = the reason. <em>So</em> = the result. <em>\"I stayed home because I was ill.\"</em> &nbsp;/&nbsp; <em>\"I was ill, so I stayed home.\"</em> Same situation, opposite structure. Comma before <em>so</em>.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>But vs although</strong> \u2014 both express contrast. <em>But</em> joins two equal ideas. <em>Although/even though</em> introduces the surprising part. <strong>Never use both together</strong> \u2014 <em>\"Although it was cold, but I went out\"</em> is wrong. One conjunction is enough.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Unless</strong> = if not. <em>\"I won't go unless you come\"</em> = <em>\"I won't go if you don't come.\"</em></div></div>\n<div class=\"note\"><strong>After time conjunctions (when, before, after, until, as soon as)</strong> \u2014 use <strong>present simple</strong> for future meaning, never will.<br><em>\"I'll call you when I arrive.\"</em> &nbsp;NOT&nbsp; <em>\"when I will arrive.\"</em></div>",table:{headers:["Conjunction","Logical relationship","Example","Key note"],rows:[["because","introduces the reason/cause","I left because I was tired.","Answers 'why?' \u2014 no comma needed before because"],["so","introduces the result/effect","I was tired, so I left.","Comma before so"],["but","simple contrast \u2014 unexpected idea","I like him, but he's annoying.","Comma before but"],["although / even though","strong contrast \u2014 surprising fact","Although it was cold, we went out.","Never use with but in same clause"],["if","condition \u2014 one thing depends on another","I'll come if I finish early.","Present simple after if for future"],["unless","negative condition (= if not)","I won't go unless you come.","= I won't go if you don't come"],["when","time \u2014 future event will happen","Call me when you arrive.","Present simple NOT will \u2014 never 'when I will arrive'"],["while","two actions at the same time","She reads while she eats.","Often used with continuous tense"],["before / after","sequence of events","Wash your hands before you eat.","Present simple for future after these too"]]},examples:[{type:"pos",eng:"I couldn't sleep because it was too hot.",note:"Because introduces the reason."},{type:"pos",eng:"It was too hot, so I couldn't sleep.",note:"So introduces the result."},{type:"pos",eng:"I like him, but he can be very annoying.",note:"But introduces a contrast."},{type:"pos",eng:"Although it was expensive, I bought it.",note:"Although at the start of a sentence."},{type:"q",eng:"Why did you leave? \u2014 Because I was tired.",note:"Because answers a why question."},{type:"q",eng:"Will you come if I invite you?",note:"If introduces a condition."}],errors:[{bad:"I was tired. Because I worked all day.",good:"I was tired because I worked all day.",reason:"Because cannot start a standalone sentence \u2014 it must join two clauses."},{bad:"Although it was cold, but I went out.",good:"Although it was cold, I went out.",reason:"Don't use although and but together \u2014 one is enough."},{bad:"I'll call you if I'll arrive.",good:"I'll call you when I arrive.",reason:"After time conjunctions (when, before, after), use present simple \u2014 not will."},{bad:"I like coffee. So I drink it every day.",good:"I like coffee, so I drink it every day.",reason:"So should join the clauses with a comma, not a full stop."}],realUse:["\"Because of\" + noun vs \"because\" + clause \u2014 both correct, different structure.","\"Even though\" is stronger than \"although\" \u2014 both correct at A2.","\"Unless = if not\": \"I won't go unless you come\" = \"I won't go if you don't come.\"","\"However\" = but, used at the start of a new sentence with a comma."],exercises:[{type:"gap",title:"Choose the conjunction",sub:"Fill each gap with because, so, but, although, if, or when.",items:[{answer:"because",before:"I stayed home ",after:" I was ill."},{answer:"so",before:"I was ill, ",after:" I stayed home."},{answer:"but",before:"I like him, ",after:" he can be very annoying."},{answer:"Although",before:"",after:" it was cold, we went for a walk."},{answer:"if",before:"I'll come ",after:" I finish early."},{answer:"when",before:"Call me ",after:" you arrive."},{answer:"because",before:"She was happy ",after:" she got the job."},{answer:"so",before:"It was raining, ",after:" we took a taxi."}]},{type:"mc",title:"Because, so, but, or although?",sub:"Choose the most natural conjunction.",items:[{q:"I was exhausted, _____ I went to bed early.",opts:["because","although","so","but"],answer:"so",explanation:"Result clause \u2014 so."},{q:"I went to bed early _____ I was exhausted.",opts:["so","although","but","because"],answer:"because",explanation:"Reason clause \u2014 because."},{q:"She studied hard, _____ she failed the exam.",opts:["so","because","but","although"],answer:"but",explanation:"Unexpected contrast \u2014 but."},{q:"_____ she studied hard, she failed the exam.",opts:["Because","So","But","Although"],answer:"Although",explanation:"Contrast at the start of a sentence \u2014 although."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"I was tired. I worked all day.",keyword:"because",answer:"I was tired because I worked all day."},{original:"It was expensive. I bought it.",keyword:"although",answer:"Although it was expensive, I bought it."},{original:"She was tired. She went to bed early.",keyword:"so",answer:"She was tired, so she went to bed early."},{original:"I won't go if you don't come.",keyword:"unless",answer:"I won't go unless you come."},{original:"He arrived. I called him.",keyword:"when",answer:"I called him when he arrived."}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue with because, so, although, or when.",lines:[{speaker:"A",text:"Why did you leave the party early?"},{speaker:"B",text:"[Because] I wasn't feeling well. I had a headache, [so] I went home."},{speaker:"A",text:"That's a shame. [Although] it was a good party, I left early too."},{speaker:"B",text:"[When] did you get home?"},{speaker:"A",text:"Around midnight. [Although] I was tired, I couldn't sleep."},{speaker:"B",text:"Me neither \u2014 [because] of the headache I was awake until three."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I was tired. Because I worked all day.",correct:"I was tired because I worked all day.",hint:"Because can't start a standalone sentence."},{wrong:"Although it was cold, but I went out.",correct:"Although it was cold, I went out.",hint:"Don't use although and but together."},{wrong:"I'll call you when I'll arrive.",correct:"I'll call you when I arrive.",hint:"After when/if/before/after, use present simple."},{wrong:"I like coffee. So I drink it every day.",correct:"I like coffee, so I drink it every day.",hint:"So joins clauses \u2014 use a comma."},{wrong:"She went out although the rain.",correct:"She went out although it was raining.",hint:"Although introduces a clause, not a noun."}]}]},

{id:"preposmovement",title:"Prepositions of movement",subtitle:"into, out of, along, past, through",intro:"Where are you going? Prepositions that describe movement through space.",desc:"Prepositions of place say where something is. Prepositions of movement say where something is going. They often pair with verbs like go, walk, run, drive, come.",tip:"The most common confusion is <strong>in vs into</strong> and <strong>on vs onto</strong>. <em>In/on</em> = static position. <em>Into/onto</em> = movement in that direction. \"The cat is in the box.\" (position) vs \"The cat jumped into the box.\" (movement).",explanation:"<p>Prepositions of movement describe <strong>direction and path</strong> \u2014 where something is going, not where it is. They pair with movement verbs: walk, run, drive, jump, get, go, come, fly, swim, climb.</p>\n<div class=\"note\"><strong>Position vs movement \u2014 the most important distinction:</strong><br>\n<em>In / on / at</em> = where something <em>is</em> (static). &nbsp;<em>\"The cat is in the box.\"</em><br>\n<em>Into / onto</em> = movement <em>towards</em> that position. &nbsp;<em>\"The cat jumped into the box.\"</em><br>\nThis is the most common error \u2014 using <em>in</em> when you mean <em>into</em>.</div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Through vs across</strong> \u2014 both mean from one side to the other. <em>Through</em> = enclosed space (a tunnel, a forest, a crowd). <em>Across</em> = open flat surface (a lake, a road, a field).</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Transport fixed expressions:</strong> <em>get on / get off</em> = public transport (bus, train, plane, bike). <em>Get into / get out of</em> = private vehicles (car, taxi). These are fixed \u2014 <em>get in the bus</em> sounds wrong.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Along</strong> = following the length of something: a road, a river, a corridor, a beach. <em>\"We walked along the river.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Past</strong> = movement beyond a point without stopping. Common in directions: <em>\"Go past the church and turn left.\"</em> \u2014 turn left / right, no preposition needed with <em>turn</em>.</div></div>",table:{headers:["Preposition","Direction / path","Example","Contrast / note"],rows:[["into","towards the inside of something","She walked into the room.","vs in = static: she is in the room"],["out of","from inside to outside","He came out of the building.","opposite of into"],["onto","towards a surface","The cat jumped onto the table.","vs on = static: the cat is on the table"],["off","away from a surface or vehicle","She got off the bus.","get off = public transport"],["through","inside an enclosed space, one side to the other","They drove through the tunnel.","enclosed / surrounded"],["across","one side to the other over an open surface","She swam across the lake.","flat, open surface"],["along","following the length of something","We walked along the river.","a path, road, corridor, beach"],["past","beyond a fixed point without stopping","Go past the school and turn left.","directions"],["up / down","towards a higher or lower point","He ran up the stairs.","vertical movement"],["around","in a circuit or loop","They walked around the lake.","circular path"]]},examples:[{type:"pos",eng:"She walked into the caf\u00e9.",note:"Movement to the inside of somewhere."},{type:"pos",eng:"He got off the train at Madrid.",note:"Movement away from public transport."},{type:"pos",eng:"We drove through the mountains.",note:"Movement passing through a space."},{type:"pos",eng:"Go along this road and turn right.",note:"Following a path."},{type:"q",eng:"How do I get to the station?",note:"Asking for directions \u2014 uses movement prepositions in the answer."},{type:"q",eng:"Did you walk through the park?",note:"Through for movement that enters and exits."}],errors:[{bad:"She went in the shop.",good:"She went into the shop.",reason:"Movement towards the inside \u2014 into (not in)."},{bad:"He jumped on the bus.",good:"He got on the bus.",reason:"For public transport: get on/off."},{bad:"Go past the traffic lights and turn on the left.",good:"Go past the traffic lights and turn left.",reason:"Turn left/right \u2014 no on."},{bad:"They walked trough the park.",good:"They walked through the park.",reason:"Spelling: through."}],realUse:["\"Get on/off\" \u2014 bus, train, plane, bike. \"Get in/out of\" \u2014 car, taxi.","\"Walk past\" = pass by without stopping. \"Go through\" = enter and exit.","\"Up and down the street.\" \u2014 common phrase for describing movement.","\"Turn left/right\" \u2014 no preposition needed with turn."],exercises:[{type:"gap",title:"Prepositions of movement",sub:"Fill each gap with the correct preposition of movement.",items:[{answer:"into",before:"She walked ",after:" the room."},{answer:"out of",before:"He came ",after:" the building."},{answer:"along",before:"We cycled ",after:" the river path."},{answer:"past",before:"Go ",after:" the church and turn right."},{answer:"through",before:"They drove ",after:" the tunnel."},{answer:"up",before:"She ran ",after:" the stairs."},{answer:"across",before:"We walked ",after:" the bridge."},{answer:"around",before:"They walked ",after:" the old city."}]},{type:"mc",title:"In or into? On or onto?",sub:"Choose the correct preposition.",items:[{q:"She walked _____ the room without knocking.",opts:["in","into","to","at"],answer:"into",explanation:"Movement towards the inside \u2014 into."},{q:"The cat jumped _____ the sofa.",opts:["on","onto","into","over"],answer:"onto",explanation:"Movement towards a surface \u2014 onto."},{q:"He got _____ the bus at the last stop.",opts:["in","into","on","onto"],answer:"on",explanation:"Get on the bus \u2014 standard expression for public transport."},{q:"She got _____ the taxi outside the hotel.",opts:["on","onto","in","into"],answer:"into",explanation:"Get into a car/taxi \u2014 enclosed private vehicle."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order to describe movement.",items:[{words:["she","walked","into","the","caf\u00e9"],answer:"she walked into the caf\u00e9",context:"Describing entry into a place."},{words:["go","past","the","school","and","turn","left"],answer:"go past the school and turn left",context:"Giving directions."},{words:["we","drove","through","the","mountains"],answer:"we drove through the mountains",context:"Describing a route."},{words:["he","ran","out","of","the","building"],answer:"he ran out of the building",context:"Describing exit from a place."},{words:["they","walked","along","the","beach"],answer:"they walked along the beach",context:"Describing movement following a path."}]},{type:"categorise",title:"Position or movement?",sub:"Click a phrase, then click the correct column.",categories:[{name:"Position (static)",items:["in the room","on the table","at the station","under the bridge","next to the door"]},{name:"Movement (direction)",items:["into the room","onto the table","past the station","through the tunnel","along the river"]}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She went in the shop.",correct:"She went into the shop.",hint:"Movement towards inside \u2014 into."},{wrong:"He got in the bus.",correct:"He got on the bus.",hint:"Public transport: get on/off."},{wrong:"They walked trough the park.",correct:"They walked through the park.",hint:"Spelling: through."},{wrong:"Go past the lights and turn on the left.",correct:"Go past the lights and turn left.",hint:"Turn left \u2014 no on."},{wrong:"She jumped on the pool.",correct:"She jumped into the pool.",hint:"Movement towards inside of water \u2014 into."}]}]},

{id:"questiontags",title:"Question tags",subtitle:"isn't it?, don't you?, can't she?",intro:"Short questions added to the end of a statement to check or confirm.",desc:"Question tags are very common in spoken British English. They are used to check information, invite agreement, or keep conversation flowing.",tip:"The rule has two parts: <strong>positive statement \u2192 negative tag</strong>. <strong>Negative statement \u2192 positive tag</strong>. And the tag always uses the same auxiliary as the main sentence. <em>\"She can swim, can't she?\"</em> Not \"doesn't she\".",explanation:"<p>A question tag is a short question added to a statement to <strong>check information or invite agreement</strong>. Very common in spoken British English.</p>\n<p><strong>Two steps to build any question tag:</strong></p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Find the auxiliary verb</strong> in the main clause (be, have, do/does/did, can, will, etc.). If there is no auxiliary, use <em>do/does</em> (present) or <em>did</em> (past).</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Reverse the polarity.</strong> Positive main clause \u2192 negative tag. Negative main clause \u2192 positive tag. Always use a pronoun, never a noun.</div></div>\n<p style=\"margin-top:14px\"><strong>Worked examples:</strong> <em>\"She can swim, ___?\"</em> \u2192 auxiliary: <em>can</em> \u2192 positive \u2192 tag: <em>can't she?</em> &nbsp;|&nbsp; <em>\"They don't know, ___?\"</em> \u2192 auxiliary: <em>don't</em> \u2192 negative \u2192 tag: <em>do they?</em></p>\n<div class=\"note\"><strong>Two special cases to memorise:</strong><br>\n<em>I am right,</em> \u2192 <strong>aren't I?</strong> (not <em>amn't I</em> \u2014 this form does not exist)<br>\n<em>Let's go,</em> \u2192 <strong>shall we?</strong> (fixed expression)</div>",table:{headers:["Main clause","Step 1: auxiliary","Step 2: polarity","Full question tag"],rows:[["She is French,","is","positive \u2192 negative","isn't she?"],["They aren't ready,","aren't","negative \u2192 positive","are they?"],["You can drive,","can","positive \u2192 negative","can't you?"],["It will be fine,","will","positive \u2192 negative","won't it?"],["He likes football, (no auxiliary)","add does","positive \u2192 negative doesn't","doesn't he?"],["She doesn't know, (no auxiliary)","add does","negative \u2192 positive does","does she?"],["They went home, (past simple)","add did","positive \u2192 negative didn't","didn't they?"],["I'm right, (special case)","am","positive \u2192 aren't (irregular)","aren't I?"],["Let's go, (special case)","\u2014","fixed form","shall we?"]]},examples:[{type:"pos",eng:"It's a beautiful day, isn't it?",note:"Positive statement \u2192 negative tag."},{type:"pos",eng:"You haven't seen this, have you?",note:"Negative statement \u2192 positive tag."},{type:"pos",eng:"She can drive, can't she?",note:"Modal verb can \u2192 can't in tag."},{type:"neg",eng:"They didn't come, did they?",note:"Past simple negative \u2192 positive did."},{type:"q",eng:"You're coming to the party, aren't you?",note:"Checking/confirming a plan."},{type:"q",eng:"It doesn't matter, does it?",note:"Seeking agreement."}],errors:[{bad:"She works here, isn't she?",good:"She works here, doesn't she?",reason:"The tag must use the same auxiliary as the main verb. Works = present simple \u2192 does/doesn't."},{bad:"They are coming, aren't they not?",good:"They are coming, aren't they?",reason:"Question tags only have one negative. Not isn't they not \u2014 just aren't they."},{bad:"He can swim, can he?",good:"He can swim, can't he?",reason:"Positive statement \u2192 negative tag. Can \u2192 can't."},{bad:"I am right, amn't I?",good:"I am right, aren't I?",reason:"There is no 'amn't' in standard English. The only correct form is aren't I?"}],realUse:["\"Nice weather, isn't it?\" \u2014 classic British conversation opener.","\"You're not serious, are you?\" \u2014 expressing disbelief.","\"Let's take a break, shall we?\" \u2014 fixed tag for let's.","\"I'm right, aren't I?\" \u2014 the irregular I am tag."],exercises:[{type:"gap",title:"Complete the question tag",sub:"Fill each gap with the correct question tag.",items:[{answer:"isn't it",before:"It's cold today, ",after:"?"},{answer:"aren't they",before:"They're coming tonight, ",after:"?"},{answer:"doesn't she",before:"She speaks French, ",after:"?"},{answer:"can't you",before:"You can drive, ",after:"?"},{answer:"didn't he",before:"He called yesterday, ",after:"?"},{answer:"have they",before:"They haven't arrived yet, ",after:"?"},{answer:"is it",before:"It isn't ready, ",after:"?"},{answer:"shall we",before:"Let's take a break, ",after:"?"}]},{type:"mc",title:"Choose the correct tag",sub:"Choose the correct question tag.",items:[{q:"She is Spanish, _____?",opts:["is she","isn't she","doesn't she","wasn't she"],answer:"isn't she",explanation:"Positive is \u2192 negative isn't."},{q:"They don't like it, _____?",opts:["do they","don't they","are they","did they"],answer:"do they",explanation:"Negative don't \u2192 positive do."},{q:"You can speak French, _____?",opts:["can you","don't you","can't you","aren't you"],answer:"can't you",explanation:"Positive can \u2192 negative can't."},{q:"He went home early, _____?",opts:["isn't he","does he","didn't he","wasn't he"],answer:"didn't he",explanation:"Past simple \u2192 didn't in tag."}]},{type:"builder",title:"Build the tag question",sub:"Put the words in the correct order.",items:[{words:["it's","cold","today",",","isn't","it","?"],answer:"it's cold today , isn't it ?",context:"Positive statement \u2192 negative tag."},{words:["she","doesn't","like","coffee",",","does","she","?"],answer:"she doesn't like coffee , does she ?",context:"Negative statement \u2192 positive tag."},{words:["they","went","home",",","didn't","they","?"],answer:"they went home , didn't they ?",context:"Past simple \u2192 didn't tag."},{words:["you","can","help","me",",","can't","you","?"],answer:"you can help me , can't you ?",context:"Modal verb \u2192 negative modal tag."},{words:["let's","go",",","shall","we","?"],answer:"let's go , shall we ?",context:"Fixed tag for let's."}]},{type:"tf",title:"True, False, or Not given",sub:"Is the statement true, false, or not given?",items:[{context:"You haven't called her, have you?",statement:"The tag is grammatically correct.",answer:"True",explanation:"Negative statement \u2192 positive tag. Correct."},{context:"He likes football, isn't he?",statement:"This sentence contains a grammar error.",answer:"True",explanation:"No auxiliary in the main clause \u2192 should be doesn't he, not isn't he."},{context:"Let's go, shall we?",statement:"This is the standard tag for let's.",answer:"True",explanation:"Let's \u2192 shall we? is a fixed form."},{context:"She is French, isn't she?",statement:"The speaker is certain she is French.",answer:"Not given",explanation:"Tags can express either certainty seeking confirmation or genuine uncertainty \u2014 we cannot tell."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She is French, isn't she not?",correct:"She is French, isn't she?",hint:"Isn't already contains the negative."},{wrong:"He likes football, isn't he?",correct:"He likes football, doesn't he?",hint:"No auxiliary \u2014 use does/doesn't."},{wrong:"You can swim, can you?",correct:"You can swim, can't you?",hint:"Positive statement \u2192 negative tag."},{wrong:"They went, didn't they not?",correct:"They went, didn't they?",hint:"Didn't already contains the negative."},{wrong:"It's nice, doesn't it?",correct:"It's nice, isn't it?",hint:"The tag must match the auxiliary in the main clause (is)."}]}]},

{id:"countableuncountable",title:"Countable & uncountable nouns",subtitle:"a bottle of water, a piece of advice",intro:"Extend your knowledge of countable and uncountable nouns \u2014 and how to quantify them.",desc:"You saw the basics at A1. At A2 we add the partitive structures that let you talk about quantities of uncountable nouns: a piece of, a bottle of, a cup of, and more.",tip:"The most common error is applying a/an to uncountable nouns: <strong>\"an information\"</strong>, <strong>\"an advice\"</strong>, <strong>\"a furniture\"</strong>. None of these work. For uncountable nouns you need either no article (general), some/any, or a partitive expression: <em>a piece of advice</em>.",explanation:"<p>At A1 you learnt the basics: uncountable nouns cannot use <em>a/an</em> and have no plural. At A2 we focus on how to <strong>talk about quantities</strong> of uncountable nouns using partitive expressions.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Partitive expressions</strong> give uncountable nouns a countable unit: container/measure word + <em>of</em> + uncountable noun. <em>\"A glass of water.\"</em> / <em>\"A piece of advice.\"</em> / <em>\"A bit of luck.\"</em> The container takes the plural \u2014 the uncountable noun stays the same.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Common uncountable nouns students try to count:</strong> advice, information, news, furniture, luggage, equipment, knowledge, research, traffic, progress, weather, homework, money. None can take <em>a/an</em> or -s. <em>\"An advice\"</em>, <em>\"two furnitures\"</em>, <em>\"a homework\"</em> \u2014 all wrong.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>How much vs how many:</strong> <em>how much</em> + uncountable noun. <em>how many</em> + countable noun. <em>\"How much luggage?\"</em> / <em>\"How many bags?\"</em> / <em>\"How many pieces of luggage?\"</em></div></div>\n<div class=\"note\"><strong>Partitive plurals:</strong> the container word takes the plural, not the uncountable noun. <em>\"Two glasses of water\"</em> \u2713 &nbsp; <em>\"Two glass of waters\"</em> \u2717 &nbsp; <em>\"Two waters\"</em> \u2717</div>",table:{headers:["Partitive expression","Used with which uncountable nouns?","Example"],rows:[["a piece of","advice, information, news, paper, music, bread, cake, furniture, pizza","a piece of advice / a piece of cake"],["a glass of","water, juice, wine, milk","a glass of water / two glasses of juice"],["a cup of","tea, coffee","a cup of coffee / three cups of tea"],["a bottle of","water, wine, beer, juice, oil","a bottle of water / two bottles of wine"],["a bit of / a little","luck, help, news, fun, advice, trouble","a bit of luck / a little help"],["a loaf of","bread","a loaf of bread / two loaves of bread"],["a slice of","bread, pizza, cake, ham","a slice of pizza / two slices of cake"],["a bag of","rice, flour, sugar, crisps","a bag of rice / two bags of flour"],["How much + uncountable","\u2014","How much advice did she give you?"],["How many + countable / partitive","\u2014","How many pieces of advice? / How many bags?"]]},examples:[{type:"pos",eng:"Can I have a piece of cake?",note:"Piece of for a portion of an uncountable food."},{type:"pos",eng:"She gave me some good advice.",note:"Some + uncountable, or a piece of advice."},{type:"pos",eng:"I need a bit of help.",note:"A bit of + uncountable."},{type:"neg",eng:"I don't have any information about that.",note:"Any + uncountable in negatives."},{type:"q",eng:"How much time do we have?",note:"How much + uncountable."},{type:"q",eng:"Could I have a glass of water, please?",note:"Partitive in a polite request."}],errors:[{bad:"Can you give me an advice?",good:"Can you give me some advice?",reason:"Advice is uncountable \u2014 no a/an. Use some or a piece of advice."},{bad:"I need an information.",good:"I need some information.",reason:"Information is uncountable \u2014 no a/an."},{bad:"She has a lot of furnitures.",good:"She has a lot of furniture.",reason:"Furniture is uncountable \u2014 no plural."},{bad:"How many homeworks do we have?",good:"How much homework do we have?",reason:"Homework is uncountable \u2014 how much, not how many."}],realUse:["\"A word of warning / advice / thanks.\" \u2014 formal partitive expressions.","\"A stroke of luck / genius.\" \u2014 fixed expressions.","\"Two rounds of drinks.\" \u2014 pub/bar expression.","\"Could I get a round of applause?\" \u2014 performance expression."],exercises:[{type:"gap",title:"Partitive expressions",sub:"Fill each gap with the correct partitive expression.",items:[{answer:"a piece of",before:"Can I have ",after:" cake?"},{answer:"a cup of",before:"Would you like ",after:" coffee?"},{answer:"a glass of",before:"Can I have ",after:" water, please?"},{answer:"a bit of",before:"I need ",after:" help with this."},{answer:"a loaf of",before:"Can you buy ",after:" bread?"},{answer:"a slice of",before:"She only had ",after:" pizza."},{answer:"a bottle of",before:"We need ",after:" water for the trip."},{answer:"a piece of",before:"Let me give you ",after:" advice."}]},{type:"categorise",title:"Countable or uncountable?",sub:"Click a word, then click the correct column.",categories:[{name:"Countable (can use a/an, has plural)",items:["book","chair","idea","problem","friend","suggestion"]},{name:"Uncountable (no a/an, no plural)",items:["furniture","advice","information","luggage","money","knowledge"]}]},{type:"mc",title:"A/an, some, or a piece of?",sub:"Choose the correct option.",items:[{q:"She gave me _____ advice.",opts:["an","a","some","a piece"],answer:"some",explanation:"Advice is uncountable \u2014 use some or a piece of advice."},{q:"I need _____ piece of information.",opts:["a","an","some","any"],answer:"a",explanation:"A piece of information \u2014 the partitive piece is countable."},{q:"Could I have _____ glass of water?",opts:["some","any","a","an"],answer:"a",explanation:"A glass of water \u2014 a + partitive noun."},{q:"How _____ luggage do you have?",opts:["many","much","a lot","few"],answer:"much",explanation:"Luggage is uncountable \u2014 how much."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"Can you give me some advice?",keyword:"piece",answer:"Can you give me a piece of advice?"},{original:"I'd like some water.",keyword:"glass",answer:"I'd like a glass of water."},{original:"She gave me some very useful information.",keyword:"piece",answer:"She gave me a very useful piece of information."},{original:"We need some bread.",keyword:"loaf",answer:"We need a loaf of bread."},{original:"Can I have some coffee?",keyword:"cup",answer:"Can I have a cup of coffee?"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Can you give me an advice?",correct:"Can you give me some advice?",hint:"Advice is uncountable \u2014 no a/an."},{wrong:"I need an information.",correct:"I need some information.",hint:"Information is uncountable."},{wrong:"She has a lot of furnitures.",correct:"She has a lot of furniture.",hint:"Furniture is uncountable \u2014 no plural."},{wrong:"How many homeworks do we have?",correct:"How much homework do we have?",hint:"Homework is uncountable \u2014 how much."},{wrong:"We bought two luggages.",correct:"We bought two pieces of luggage.",hint:"Luggage is uncountable \u2014 use pieces of luggage."}]}]}
