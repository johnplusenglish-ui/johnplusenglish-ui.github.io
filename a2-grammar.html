<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2 Grammar — JohnPlusEnglish</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#2176FF;--sea:#1DD3B0;--coral:#FF6B6B;--sun:#FFB347;--lav:#9B72CF;
  --cream:#F7F6F3;--ink:#2D3047;--ink2:#4A4E6B;--ink3:#8B8FA8;
  --a1:#5C9BD6;--a1bg:#EBF3FB;--a1dark:#2E6DA4;
  --radius:14px;--radius-sm:8px;
  --card-shadow:0 1px 3px rgba(45,48,71,.07),0 4px 16px rgba(45,48,71,.05);
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:15px}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:13px 32px;background:#fff;border-bottom:1px solid #E8E6E0;position:sticky;top:0;z-index:200;}
.logo{font-weight:900;font-size:17px;letter-spacing:-0.02em}
.logo span{color:var(--sky)}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;padding:6px 12px;border-radius:20px;border:1px solid #E8E6E0;background:transparent;transition:all .15s;font-family:'Outfit',sans-serif;}
.nav-back:hover{background:var(--cream);color:var(--ink)}
.nav-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)}
.nav-breadcrumb span{color:var(--sky);font-weight:600}
.nav-breadcrumb .sep{opacity:.4;color:var(--ink3)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 53px)}
.sidebar{background:#fff;border-right:1px solid #E8E6E0;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-head{padding:20px 20px 14px;border-bottom:1px solid #F0EEE8;}
.level-pill{display:inline-flex;align-items:center;gap:5px;background:var(--a1bg);color:var(--a1);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px;}
.sidebar-head h2{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
.sidebar-head p{font-size:12px;color:var(--ink3);margin-top:3px;line-height:1.45}
.topic-nav{padding:8px 0;flex:1}
.topic-link{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background .12s;border:none;background:transparent;width:100%;text-align:left;font-family:'Outfit',sans-serif;}
.topic-link:hover{background:#F7F6F3}
.topic-link.active{background:var(--a1bg)}
.topic-link.done .tl-check{background:var(--sea);border-color:var(--sea);color:#fff}
.tl-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3);width:16px;flex-shrink:0}
.tl-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #D4D2CA;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;color:var(--sea);transition:all .2s;}
.topic-link.active .tl-check{border-color:var(--a1)}
.tl-name{font-size:13px;color:var(--ink2);font-weight:400;line-height:1.3}
.topic-link.active .tl-name{color:var(--a1);font-weight:600}
.topic-link.done .tl-name{color:var(--ink3)}
.sidebar-foot{padding:14px 20px;border-top:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.prog-bar{flex:1;height:4px;background:#E8E6E0;border-radius:2px;margin-right:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--sea);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-text{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink3);white-space:nowrap}
.main{padding:0;overflow:visible}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-hero{padding:36px 40px 28px;border-bottom:1px solid #E8E6E0;background:linear-gradient(135deg,#fff 0%,#F2F7FF 100%);}
.lesson-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.level-tag{background:var(--a1bg);color:var(--a1);font-weight:700}
.lesson-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3)}
.lesson-hero h1{font-size:32px;font-weight:900;letter-spacing:-.03em;color:var(--ink);line-height:1.1;margin-bottom:8px}
.lesson-hero p{font-size:15px;color:var(--ink2);line-height:1.6;max-width:580px}
.lesson-toolbar{display:flex;align-items:center;gap:8px;margin-top:20px;}
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--sky);color:#fff}
.btn-primary:hover{background:#1a6ae8;transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--ink2);border:1px solid #E0DED8}
.btn-ghost:hover{background:var(--cream)}
.btn-done{background:var(--sea);color:#fff}
.btn-done:hover{background:#17b89e;transform:translateY(-1px)}
.lesson-body{padding:32px 40px;display:flex;flex-direction:column;gap:8px}
.section-label{display:flex;align-items:center;gap:10px;margin-bottom:0;margin-top:8px;padding:9px 14px;background:var(--ink);border-radius:6px;cursor:pointer;user-select:none;transition:background .15s;}
.section-label:hover{background:#2D3047}
.btn-toggle-all{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);background:transparent;border:1px solid #D8D6D0;border-radius:20px;padding:5px 14px;cursor:pointer;transition:all .15s;}
.btn-toggle-all:hover{background:var(--cream);color:var(--ink);border-color:#B0AEA6;}
.section-label-chevron{margin-left:auto;display:flex;align-items:center;color:rgba(255,255,255,.5);transition:transform .2s;}
.section-label.collapsed .section-label-chevron{transform:rotate(-90deg)}
.section-body{overflow:visible;transition:max-height .25s ease,opacity .2s ease,margin-top .2s ease;max-height:4000px;opacity:1;margin-top:14px;}
.section-body.collapsed{max-height:0;opacity:0;margin-top:0;overflow:hidden;}
.section-label-icon{display:flex;align-items:center;color:#fff;flex-shrink:0}
.section-label h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#fff}
.explain-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;padding:26px 28px;box-shadow:var(--card-shadow);}
.explain-lead{font-size:16px;font-weight:600;color:var(--ink);line-height:1.55;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #F0EEE8;}
.explain-lead em{font-style:normal;color:var(--sky);font-weight:700}
.explain-body{font-size:14px;color:var(--ink2);line-height:1.8}
.explain-body p{margin-bottom:14px}
.explain-body p:last-child{margin-bottom:0}
.explain-body strong{color:var(--ink)}
.explain-body .rule{display:flex;gap:14px;align-items:flex-start;background:var(--cream);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
.explain-body .rule:last-child{margin-bottom:0}


.explain-body .rule-text{font-size:14px;color:var(--ink2);line-height:1.7}
.explain-body .rule-text strong{color:var(--ink)}
.explain-body .rule-text em{font-style:normal;color:var(--a1);font-weight:600}
.explain-body .rule-num:empty{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--a1);margin-top:6px;}
.explain-body .rule-num:not(:empty){flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--a1);font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.explain-body .note{background:var(--a1bg);border-left:3px solid var(--a1);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:12px;font-size:13px;color:var(--ink2);line-height:1.6}
.explain-body .note strong{color:var(--ink)}
.form-table{width:100%;border-collapse:collapse;font-size:14px}
.form-table th{background:#EEF2FF;color:var(--ink);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;text-align:left;}
.form-table th:first-child{border-radius:8px 0 0 0}
.form-table th:last-child{border-radius:0 8px 0 0}
.form-table td{padding:11px 14px;border-bottom:1px solid #F0EEE8;color:var(--ink2);font-size:14px}
.form-table tr:last-child td{border-bottom:none}
.form-table tr:nth-child(even) td{background:#FAFAF8}
.form-table .subject{font-weight:700;color:var(--ink)}
.form-table .form{color:var(--ink2)}
.form-table .neg{color:var(--ink2)}
.form-table .example{color:var(--ink2);font-style:italic}
.form-table .example{color:var(--ink2);font-style:italic}
.examples-grid{display:grid;gap:10px}
.example-item{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.ex-marker{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px;}
.ex-marker.pos{background:#E8F8F5;color:var(--sea)}
.ex-marker.neg{background:#FFF0F0;color:var(--coral)}
.ex-marker.q{background:var(--a1bg);color:var(--sky)}
.ex-eng{font-size:14px;font-weight:600;color:var(--ink)}
.ex-note{font-size:12px;color:var(--ink3);margin-top:2px}
.error-card{background:#fff;border-radius:var(--radius);padding:20px 22px;border:1px solid #E0DED8;}
.error-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:14px}
.error-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.error-bad,.error-good{border-radius:var(--radius-sm);padding:11px 14px}
.error-bad{background:#FFF5F5;border:1px solid #FCDADA}
.error-good{background:#F0FBF8;border:1px solid #C0EDE4}
.error-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.error-bad .error-label{color:var(--coral)}
.error-good .error-label{color:#0F7A6A}
.error-text{font-size:14px;color:var(--ink);font-weight:500;font-style:italic}
.error-bad .error-text{color:#B84040}
.error-good .error-text{color:#0F5A4A}
.error-reason{font-size:13px;color:var(--ink3);margin-top:10px;margin-bottom:4px;grid-column:1/-1;padding:0 2px}
.exercise-card{background:#fff;border-radius:var(--radius);border:1px solid #E8E6E0;overflow:visible;box-shadow:var(--card-shadow);}
.ex-card-header{padding:16px 20px;border-bottom:1px solid #F0EEE8;display:flex;align-items:center;justify-content:space-between;}
.ex-card-title{font-size:14px;font-weight:700;color:var(--ink)}
.ex-card-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.ex-type-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:#F0F0F0;color:var(--ink3)}
.ex-card-body{padding:20px}
.gap-sentence{font-size:15px;color:var(--ink);line-height:2.4;margin-bottom:4px;display:flex;align-items:baseline;flex-wrap:wrap;gap:4px;}
.gap-sentence:last-child{margin-bottom:0}
.gap-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-right:4px}
.gap-input{display:inline-block;border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.gap-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.gap-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.gap-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.gap-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:baseline}
.gap-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.gap-reveal.show{opacity:1}
.mc-question{margin-bottom:20px}
.mc-question:last-child{margin-bottom:0}
.mc-text{font-size:14px;color:var(--ink);margin-bottom:10px;font-weight:500}
.mc-options{display:flex;flex-wrap:wrap;gap:8px}
.mc-opt{font-family:'Outfit',sans-serif;font-size:13px;padding:7px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.mc-opt:hover{border-color:var(--sky);color:var(--sky);background:var(--a1bg)}
.mc-opt.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600}
.mc-opt.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.mc-feedback{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:6px;display:none}
.mc-feedback.show{display:block}
.mc-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.mc-feedback.bad{background:#FFF0F0;color:#B84040}
.ec-item{margin-bottom:16px}
.ec-item:last-child{margin-bottom:0}
.ec-sentence{font-size:14px;background:#FFF8F0;border:1px solid #FFD8B0;border-radius:var(--radius-sm);padding:11px 14px;color:var(--ink);font-weight:500;margin-bottom:8px;}
.ec-input-row{display:flex;gap:8px;align-items:center}
.ec-input{flex:1;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.ec-input:focus{border-color:var(--sky)}
.ec-input.correct{border-color:var(--sea);background:#F0FBF8}
.ec-input.wrong{border-color:var(--coral);background:#FFF5F5}
.check-row{display:flex;gap:8px;margin-top:16px}
.btn-check{background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 20px;border-radius:20px;border:none;cursor:pointer;transition:all .15s}
.btn-check:hover{background:#1a6ae8}
.btn-reset{background:var(--cream);color:var(--ink3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:20px;border:1px solid #E0DED8;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#EDEBE5;color:var(--ink)}
.score-badge{display:none;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;margin-top:12px;}
.score-badge.show{display:inline-flex}
.score-badge.full{background:#E8F8F5;color:#0F7A6A}
.score-badge.partial{background:#FFF8E8;color:#8B6000}
.score-badge.low{background:#FFF0F0;color:#B84040}
.lesson-footer{padding:24px 40px;border-top:1px solid #E8E6E0;display:flex;align-items:center;justify-content:space-between;background:#fff;}
.footer-hint{font-size:12px;color:var(--ink3)}
.footer-nav{display:flex;gap:8px}
.real-use{background:linear-gradient(135deg,var(--a1bg) 0%,#F8F0FF 100%);border-radius:var(--radius);border:1px solid #C8DEFF;padding:20px 24px;}
.real-use h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sky);margin-bottom:12px}
.real-use ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.real-use li{font-size:13px;color:var(--ink2);line-height:1.6;padding-left:20px;position:relative;}
.real-use li::before{content:'→';position:absolute;left:0;color:var(--sky);font-weight:700}

/* ── JOHN\'S TIP ── */
.johns-tip{
  background:#FFFBF0;border:1.5px solid #FFD97A;border-radius:var(--radius);
  padding:18px 20px;display:flex;gap:14px;align-items:flex-start;
}
.tip-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--sky);color:#fff;
  font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:-.02em;
}
.tip-body{}
.tip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#B8860B;margin-bottom:5px}
.tip-text{font-size:13px;color:#5A4500;line-height:1.65}
.tip-text strong{color:#3A2D00;font-weight:700}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .lesson-hero{padding:24px 20px 20px}
  .lesson-body{padding:24px 20px}
  .lesson-footer{padding:16px 20px}
  .error-row{grid-template-columns:1fr}
}

/* ── SENTENCE BUILDER ── */
.sb-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:12px;}
.sb-word{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.sb-word:hover{border-color:var(--sky);color:var(--sky)}
.sb-word.used{opacity:.3;pointer-events:none;}
.sb-slot{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:10px 12px;border:2px dashed #C8DEFF;border-radius:var(--radius-sm);background:#FAFCFF;margin-bottom:12px;align-items:center;}
.sb-placed{font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:6px 14px;background:var(--a1bg);border:1.5px solid var(--sky);border-radius:20px;cursor:pointer;color:var(--sky);user-select:none;transition:all .15s;}
.sb-placed:hover{background:#FFE8E8;border-color:var(--coral);color:var(--coral)}
.sb-sentence{margin-bottom:20px}
.sb-sentence:last-child{margin-bottom:0}
.sb-sentence-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);margin-bottom:6px}
.sb-context{font-size:13px;color:var(--ink3);margin-bottom:8px;font-style:italic}
.sb-result{font-size:12px;margin-top:6px;padding:6px 12px;border-radius:6px;display:none}
.sb-result.show{display:block}
.sb-result.ok{background:#E8F8F5;color:#0F7A6A}
.sb-result.bad{background:#FFF0F0;color:#B84040}

/* ── MATCHING ── */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.match-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:8px;}
.match-item{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid #E0DED8;cursor:pointer;transition:all .15s;background:#fff;color:var(--ink2);font-family:'Outfit',sans-serif;text-align:left;width:100%;margin-bottom:6px;display:block;}
.match-item:last-child{margin-bottom:0}
.match-item:hover{border-color:var(--sky);color:var(--sky)}
.match-item.selected{border-color:var(--sky);background:var(--a1bg);color:var(--sky);font-weight:600}
.match-item.matched{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A;font-weight:600;pointer-events:none;cursor:default;}
.match-item.wrong-flash{border-color:var(--coral)!important;background:#FFF0F0!important;color:var(--coral)!important}
.match-pairs{margin-top:12px;}
.match-pair-line{font-size:12px;display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #F0EEE8;color:var(--ink3);}
.match-pair-line:last-child{border-bottom:none}

/* ── TRANSFORMATION ── */
.transform-item{margin-bottom:16px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.transform-item:last-child{margin-bottom:0}
.transform-original{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:8px;line-height:1.5}
.transform-keyword{display:inline-block;background:var(--sky);color:#fff;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin:0 2px;}
.transform-input{width:100%;border:1.5px solid #E0DED8;border-radius:var(--radius-sm);padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
.transform-input:focus{border-color:var(--sky)}
.transform-input.correct{border-color:var(--sea);background:#F0FBF8}
.transform-input.wrong{border-color:var(--coral);background:#FFF5F5}
.transform-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:5px;opacity:0;transition:opacity .2s;min-height:16px}
.transform-reveal.show{opacity:1}

/* ── CATEGORISATION ── */
.cat-bank{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid #E0DED8;margin-bottom:14px;min-height:48px;}
.cat-word{font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;background:#fff;border:1.5px solid #E0DED8;border-radius:20px;cursor:pointer;transition:all .15s;color:var(--ink2);user-select:none;}
.cat-word:hover{border-color:var(--sky);color:var(--sky)}
.cat-word.placed{opacity:.3;pointer-events:none;}
.cat-columns{display:grid;gap:10px;margin-bottom:12px;}
.cat-col{border-radius:var(--radius-sm);border:2px dashed #D0CEC8;padding:10px 12px;min-height:80px;transition:border-color .2s;}
.cat-col-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #E0DED8;}
.cat-placed{font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:4px 11px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;user-select:none;transition:all .15s;display:inline-block;margin:3px;}
.cat-placed:hover{opacity:.65}
.cat-col.checked-correct .cat-col-head{color:#0F7A6A}
.cat-col.checked-correct{border-color:var(--sea);border-style:solid;}
.cat-col.checked-wrong{border-color:var(--coral);border-style:solid;}

/* ── CONVERSATION FILL ── */
.convo-wrap{background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;overflow:hidden;margin-bottom:12px;}
.convo-line{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid #F5F3EF;}
.convo-line:last-child{border-bottom:none}
.convo-speaker{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;width:28px;flex-shrink:0;padding-top:3px;}
.convo-speaker.a{color:var(--sky)}
.convo-speaker.b{color:var(--lav)}
.convo-text{font-size:14px;color:var(--ink);line-height:1.7;flex:1}
.convo-input{border:none;border-bottom:2px dashed #BBAEF0;background:transparent;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;color:var(--ink);outline:none;padding:2px 6px;transition:all .15s;text-align:center;vertical-align:baseline;}
.convo-input:focus{border-bottom-color:var(--sky);background:rgba(33,118,255,.05);}
.convo-input.correct{color:#3FB87A;border-bottom-color:var(--sea);border-bottom-style:solid;background:rgba(29,211,176,.08);}
.convo-input.wrong{color:var(--coral);border-bottom-color:var(--coral);border-bottom-style:solid;background:rgba(239,35,60,.06);}
.convo-gwrap{display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:middle}
.convo-reveal{font-size:11px;color:var(--sea);font-weight:600;font-family:'JetBrains Mono',monospace;height:14px;opacity:0;transition:opacity .2s}
.convo-reveal.show{opacity:1}

/* ── TRUE / FALSE / NOT GIVEN ── */
.tf-item{margin-bottom:10px;background:#fff;border-radius:var(--radius-sm);border:1px solid #E8E6E0;padding:14px 16px;}
.tf-item:last-child{margin-bottom:0}
.tf-context{font-size:12px;color:var(--ink3);margin-bottom:6px;font-style:italic;line-height:1.5}
.tf-statement{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:10px;line-height:1.5}
.tf-options{display:flex;gap:8px;flex-wrap:wrap;}
.tf-btn{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;border:1.5px solid #E0DED8;background:#fff;cursor:pointer;transition:all .15s;color:var(--ink2);}
.tf-btn:hover{border-color:var(--sky);background:var(--a1bg);color:var(--sky)}
.tf-btn.correct-ans{border-color:var(--sea);background:#E8F8F5;color:#0F7A6A}
.tf-btn.wrong-ans{border-color:var(--coral);background:#FFF0F0;color:#B84040}
.tf-feedback{font-size:12px;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.tf-feedback.show{display:block}
.tf-feedback.ok{background:#E8F8F5;color:#0F7A6A}
.tf-feedback.bad{background:#FFF0F0;color:#B84040}

.lesson-sticky{position:sticky;top:53px;z-index:100;background:#fff;border-bottom:1px solid #E8E6E0;padding:10px 40px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-100%);opacity:0;transition:transform .2s ease,opacity .2s ease;pointer-events:none;}
.lesson-sticky.visible{transform:translateY(0);opacity:1;pointer-events:auto;}
.sticky-title{font-size:14px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}
.sticky-sep{color:var(--ink3);font-size:13px;flex-shrink:0}
.sticky-intro{font-size:13px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.sticky-level{background:var(--a1bg);color:var(--a1);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
@media(max-width:600px){.lesson-sticky{padding:10px 16px;}.sticky-intro{display:none;}}

// ── HELPER ──

// ── LESSON DATA ──
const lessons = [
{id:"pastsimple",title:"Past simple",subtitle:"I worked, she went, did you see?",intro:"The most important past tense. Regular verbs are easy \u2014 the irregulars need learning.",desc:"The past simple is used for completed actions in the past. Regular verbs add -ed. Irregular verbs change completely \u2014 there is no shortcut except learning them.",tip:"The most common mistake: <strong>\"Did she went?\"</strong> Wrong. With <em>did</em>, the main verb must be the base form: <strong>\"Did she go?\"</strong> Once you use <em>did</em>, it carries the past \u2014 the main verb goes back to base form.",explanation:"<p>The past simple describes <strong>completed actions in the past</strong> \u2014 things that started and finished at a specific time.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Regular verbs</strong> \u2014 add <em>-ed</em>: work \u2192 worked, play \u2192 played, arrive \u2192 arrived. Spelling: stop \u2192 stop<strong>p</strong>ed (short vowel + consonant = double it), study \u2192 stud<strong>ied</strong> (consonant + y \u2192 ied).</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Irregular verbs</strong> \u2014 change completely: go \u2192 went, see \u2192 saw, have \u2192 had, come \u2192 came, buy \u2192 bought. No rule \u2014 must be memorised. The most common verbs in English are irregular, so you will encounter them constantly.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Questions and negatives</strong> use <em>did/didn't</em> + the base form. Once <em>did</em> is in the sentence, the main verb returns to its dictionary form \u2014 no past tense ending.</div></div>\n<div class=\"note\"><strong>The most important rule:</strong> did/didn't + BASE form \u2014 never past tense.<br>\n<em>\"Did she go?\"</em> \u2713 &nbsp; <em>\"Did she went?\"</em> \u2717<br>\n<em>\"I didn't eat.\"</em> \u2713 &nbsp; <em>\"I didn't ate.\"</em> \u2717<br>\n<strong>Time words that signal past simple:</strong> yesterday, last week, in 2019, two days ago, when I was a child \u2014 whenever you name a specific finished time, use past simple, not present perfect.</div>",table:{headers:["","Positive","Negative","Question"],rows:[["Regular verb","I worked / She played","I didn't work / She didn't play","Did you work? / Did she play?"],["Irregular verb","I went / He saw / She had","I didn't go / He didn't see","Did she go? / Did he see?"],["Short answer","\u2014","No, I didn't.","Yes, I did."],["Key rule","verb changes form","didn't + BASE form (not past)","Did + subject + BASE form"],["Time words","yesterday, last week, in 2019, two days ago","\u2014","\u2014"]]},examples:[{type:"pos",eng:"I visited Rome last summer.",note:"Regular verb: visit + ed."},{type:"pos",eng:"She went to the gym yesterday.",note:"Irregular verb: go \u2192 went."},{type:"neg",eng:"They didn't watch the match.",note:"Negative: didn't + base form."},{type:"neg",eng:"He didn't know the answer.",note:"Irregular know \u2014 but base form after didn't."},{type:"q",eng:"Did you enjoy the film?",note:"Did + subject + base form."},{type:"q",eng:"Where did she go last night?",note:"Wh- question: question word + did + subject + base form."}],errors:[{bad:"Did she went to the party?",good:"Did she go to the party?",reason:"After did/didn't, use the base form \u2014 never past tense."},{bad:"I didn't went home.",good:"I didn't go home.",reason:"Same rule \u2014 didn't + base form."},{bad:"She goed to school.",good:"She went to school.",reason:"Go is irregular \u2014 past simple is went, not goed."},{bad:"Yesterday I have seen him.",good:"Yesterday I saw him.",reason:"Yesterday signals a completed past action \u2014 use past simple, not present perfect."}],realUse:["\"I went to...\", \"She said...\", \"We had...\" \u2014 the three most common irregular past forms.","\"Did you know that...?\" \u2014 common way to start an interesting fact.","\"It happened so fast.\" \u2014 describing a sudden past event.","\"I had no idea.\" \u2014 fixed expression using past simple of have."],exercises:[{type:"gap",title:"Regular past simple",sub:"Fill each gap with the past simple form of the verb in brackets.",items:[{answer:"visited",before:"We ",after:" Paris last year. (visit)"},{answer:"finished",before:"She ",after:" work at six. (finish)"},{answer:"studied",before:"He ",after:" English at university. (study)"},{answer:"arrived",before:"They ",after:" late to the meeting. (arrive)"},{answer:"stopped",before:"The bus ",after:" suddenly. (stop)"},{answer:"played",before:"I ",after:" tennis every Saturday as a child. (play)"},{answer:"watched",before:"We ",after:" a great film last night. (watch)"},{answer:"decided",before:"She ",after:" to change jobs. (decide)"}]},{type:"gap",title:"Irregular past simple",sub:"Fill each gap with the correct irregular past form.",items:[{answer:"went",before:"I ",after:" to the gym this morning. (go)"},{answer:"saw",before:"We ",after:" a great film last night. (see)"},{answer:"had",before:"She ",after:" a wonderful time. (have)"},{answer:"came",before:"He ",after:" home very late. (come)"},{answer:"knew",before:"I ",after:" the answer immediately. (know)"},{answer:"took",before:"It ",after:" three hours to get there. (take)"},{answer:"told",before:"She ",after:" me the truth. (tell)"},{answer:"made",before:"He ",after:" a big mistake. (make)"}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue using past simple forms.",lines:[{speaker:"A",text:"[Did] you have a good weekend?"},{speaker:"B",text:"Yes! I [went] to the coast with friends. We [had] a fantastic time."},{speaker:"A",text:"[Did] you swim?"},{speaker:"B",text:"I [tried], but the water [was] freezing! We [ended] up walking along the beach."},{speaker:"A",text:"[Was] the weather good?"},{speaker:"B",text:"It [rained] on Saturday but Sunday [was] perfect."},{speaker:"A",text:"[Did] you eat out anywhere?"},{speaker:"B",text:"We [found] a great little restaurant. I [had] the best fish I've ever eaten."}]},{type:"match",title:"Match verb to past form",sub:"Match each verb to its irregular past simple form.",leftHead:"Base form",rightHead:"Past simple",pairs:[{left:"go",right:"went"},{left:"see",right:"saw"},{left:"come",right:"came"},{left:"buy",right:"bought"},{left:"think",right:"thought"},{left:"speak",right:"spoke"},{left:"write",right:"wrote"},{left:"find",right:"found"}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"Did she went to the party?",correct:"Did she go to the party?",hint:"Did + base form."},{wrong:"I didn't went home.",correct:"I didn't go home.",hint:"Didn't + base form."},{wrong:"She goed to school by bus.",correct:"She went to school by bus.",hint:"Go is irregular \u2014 went."},{wrong:"Yesterday I have seen him.",correct:"Yesterday I saw him.",hint:"Yesterday = completed past \u2014 past simple."},{wrong:"We didn't ate anything.",correct:"We didn't eat anything.",hint:"Didn't + base form."},{wrong:"Did they enjoyed the concert?",correct:"Did they enjoy the concert?",hint:"Did + base form."}]}]},

{id:"pastcontinuous",title:"Past continuous",subtitle:"I was working, they were sleeping",intro:"What was already in progress when something else happened.",desc:"The past continuous describes an action that was in progress at a specific moment in the past, or an ongoing background action that was interrupted.",tip:"The most common use at A2 is the <strong>interrupted action</strong> pattern: <em>\"I was cooking when the phone rang.\"</em> The continuous gives the background \u2014 the simple gives the interruption. The two tenses work as a pair.",explanation:"<p>The past continuous describes an action that was <strong>already in progress</strong> at a specific past moment \u2014 not when it started or finished, but what was happening in the middle.</p>\n<p>Formed with <strong>was/were + verb-ing</strong>. Same spelling rules as present continuous: drop -e (come \u2192 coming), double the consonant on short vowel words (run \u2192 running, sit \u2192 sitting).</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Interrupted action pattern</strong> \u2014 the most important use at A2. A longer background action (past continuous) is interrupted by a shorter sudden event (past simple). <em>\"I was cooking when the phone rang.\"</em> Cooking was already happening \u2014 the phone rang and cut across it.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Two simultaneous actions</strong> \u2014 both continuous, joined with <em>while</em>. <em>\"While I was cooking, she was setting the table.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Background scene-setting</strong> \u2014 describing what was happening at a moment in a story. <em>\"It was raining. The streets were empty. A man was walking towards the station.\"</em></div></div>\n<div class=\"note\"><strong>While vs when:</strong> <em>While</em> typically introduces the continuous (background) action. <em>When</em> typically introduces the interruption (past simple). You can swap the clause order without changing the meaning: <em>\"When the phone rang, I was cooking.\"</em> \u2014 same as above.</div>",table:{headers:["","I / He / She / It","You / We / They"],rows:[["Positive","was + verb-ing (was working)","were + verb-ing (were working)"],["Negative","wasn't + verb-ing (wasn't listening)","weren't + verb-ing (weren't waiting)"],["Question","Was she + verb-ing? (Was she cooking?)","Were they + verb-ing? (Were they waiting?)"],["Short answer","Yes, she was. / No, she wasn't.","Yes, they were. / No, they weren't."],["Interrupted action","I was reading (background)","...when he called. (interruption \u2014 past simple)"],["Two simultaneous","While I was cooking...","...she was setting the table."]]},examples:[{type:"pos",eng:"I was sleeping at midnight.",note:"In progress at a specific past time."},{type:"pos",eng:"She was studying when I called.",note:"Background action interrupted by a past simple."},{type:"pos",eng:"They were having dinner at 8pm.",note:"What was happening at a specific moment."},{type:"neg",eng:"He wasn't listening to the teacher.",note:"Wasn't = was not."},{type:"q",eng:"What were you doing when it happened?",note:"Question asking for background context."},{type:"q",eng:"Was she working late last night?",note:"Yes/No question."}],errors:[{bad:"I was cook when you called.",good:"I was cooking when you called.",reason:"Past continuous needs the -ing form of the verb."},{bad:"She were sleeping.",good:"She was sleeping.",reason:"She/he/it \u2192 was. Were is for you/we/they."},{bad:"While I walked, it started to rain.",good:"While I was walking, it started to rain.",reason:"The ongoing background action needs the continuous."},{bad:"I was working yesterday.",good:"I worked yesterday.",reason:"A general past statement about yesterday uses simple, not continuous."}],realUse:["\"What were you doing at 10pm?\" \u2014 police procedural question.","\"I was just thinking about you!\" \u2014 coincidence with continuous.","\"While I was living in London...\" \u2014 past continuous for extended background.","\"It was raining when I left.\" \u2014 setting the scene."],exercises:[{type:"gap",title:"Past continuous \u2014 positive",sub:"Fill each gap with the past continuous form.",items:[{answer:"was sleeping",before:"She ",after:" when the alarm went off. (sleep)"},{answer:"were watching",before:"They ",after:" TV all evening. (watch)"},{answer:"was raining",before:"It ",after:" when we arrived. (rain)"},{answer:"were having",before:"We ",after:" dinner at eight. (have)"},{answer:"was working",before:"He ",after:" late again. (work)"},{answer:"were waiting",before:"The students ",after:" outside the classroom. (wait)"}]},{type:"gap",title:"Past simple vs past continuous",sub:"Fill each gap \u2014 decide whether to use past simple or past continuous.",items:[{answer:"was cooking",before:"I ",after:" when the fire alarm rang. (cook)"},{answer:"rang",before:"I was cooking when the fire alarm ",after:". (ring)"},{answer:"were playing",before:"The children ",after:" in the garden when it started to rain. (play)"},{answer:"started",before:"The children were playing when it ",after:" to rain. (start)"},{answer:"was driving",before:"She ",after:" when she heard the news. (drive)"},{answer:"heard",before:"She was driving when she ",after:" the news. (hear)"}]},{type:"mc",title:"Which tense?",sub:"Choose the correct form.",items:[{q:"I _____ a shower when you called.",opts:["had","was having","have","were having"],answer:"was having",explanation:"Background action in progress when interrupted \u2014 past continuous."},{q:"While she _____, the power went off.",opts:["worked","was working","is working","works"],answer:"was working",explanation:"While + ongoing background action \u2014 past continuous."},{q:"What _____ at 9pm last night?",opts:["did you do","were you doing","you were doing","you did"],answer:"were you doing",explanation:"Asking what was in progress at a specific time \u2014 past continuous question."},{q:"He _____ the door and _____ in.",opts:["opened / walked","was opening / was walking","opened / was walking","was opening / walked"],answer:"opened / walked",explanation:"Two completed sequential actions \u2014 both past simple."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["I","was","reading","when","you","called"],answer:"I was reading when you called",context:"Background + interruption."},{words:["were","they","sleeping","at","midnight","?"],answer:"were they sleeping at midnight ?",context:"Question about a specific time."},{words:["she","wasn't","listening","to","the","teacher"],answer:"she wasn't listening to the teacher",context:"Negative past continuous."},{words:["while","I","was","cooking","he","arrived"],answer:"while I was cooking he arrived",context:"Two overlapping past events."},{words:["what","were","you","doing","when","it","happened","?"],answer:"what were you doing when it happened ?",context:"Wh- question with past continuous."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I was cook dinner when he arrived.",correct:"I was cooking dinner when he arrived.",hint:"Was + -ing form."},{wrong:"She were working late.",correct:"She was working late.",hint:"She \u2014 was, not were."},{wrong:"While I walked, my phone rang.",correct:"While I was walking, my phone rang.",hint:"Background action \u2014 past continuous."},{wrong:"They was watching TV all evening.",correct:"They were watching TV all evening.",hint:"They \u2014 were, not was."},{wrong:"I was working yesterday all day.",correct:"I worked all day yesterday.",hint:"General statement about the whole day \u2014 past simple."}]}]},

{id:"presentperfect",title:"Present perfect",subtitle:"I have been, she has seen",intro:"A bridge between past and present. The past with a connection to now.",desc:"The present perfect is often the trickiest tense for A2 learners because it does not exist in many languages. The key is that the action has a connection to the present.",tip:"The classic mistake is using the present perfect with a specific past time: <strong>\"I have seen him yesterday.\"</strong> Wrong. If you can say <em>when</em> it happened, use past simple. Present perfect = past action, no specific time, relevant now.",explanation:"<p>The present perfect connects a past action to <strong>right now</strong>. The action happened in the past, but it still matters \u2014 because of its result, its relevance, or because the time is still open. Formed with <strong>have/has + past participle</strong>.</p>\n<div class=\"note\"><strong>The golden rule:</strong> If you mention a specific finished time (yesterday, in 2019, last week, an hour ago) \u2192 use <strong>past simple</strong>. No specific time, or time still ongoing \u2192 use <strong>present perfect</strong>. These two never mix: <em>I have seen him yesterday</em> is always wrong.</div>\n<p style=\"margin-top:14px\"><strong>For vs since</strong> \u2014 both used with present perfect for ongoing situations:</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>for</strong> + a duration of time: <em>for two years, for a long time, for ages</em>. Ask yourself: \"How long?\" \u2192 for.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>since</strong> + a starting point: <em>since 2018, since last Tuesday, since I was a child</em>. Ask yourself: \"Since when?\" \u2192 since.</div></div>",table:{headers:["Use","Key word(s)","Example","Important note"],rows:[["Life experience \u2014 any time up to now","ever (questions) / never (negatives)","Have you ever been to Japan? / I've never tried it.","No specific time mentioned"],["Very recent action","just","She's just arrived. / He's just called.","Just goes between have and participle"],["Action not yet done, but expected","yet","I haven't finished yet. / Have you eaten yet?","Yet goes at the end"],["Action done sooner than expected","already","I've already seen that film.","Already goes between have and participle"],["Unfinished time \u2014 duration","for + length of time","I've lived here for three years.","Still living here now"],["Unfinished time \u2014 starting point","since + point in time","I've worked here since 2020.","Still working here now"],["NOT for finished past times","past simple instead","I saw him yesterday. \u2713   I've seen him yesterday. \u2717","Yesterday/last week/ago \u2192 past simple"]]},examples:[{type:"pos",eng:"I've been to Spain three times.",note:"Life experience \u2014 no specific time mentioned."},{type:"pos",eng:"She's just arrived.",note:"Very recent action \u2014 just + present perfect."},{type:"pos",eng:"Have you ever tried sushi?",note:"Ever in questions about life experience."},{type:"neg",eng:"I haven't finished yet.",note:"Yet in negatives \u2014 action expected but not done."},{type:"q",eng:"Have you done your homework?",note:"Asking if an action is complete or not."},{type:"q",eng:"How long have you lived here?",note:"For / since \u2014 unfinished time period."}],errors:[{bad:"I have seen him yesterday.",good:"I saw him yesterday.",reason:"Yesterday is a specific past time \u2014 use past simple."},{bad:"Did you ever been to Paris?",good:"Have you ever been to Paris?",reason:"Ever with life experience \u2014 present perfect, not past simple."},{bad:"She has gone there an hour ago.",good:"She went there an hour ago.",reason:"Specific time (an hour ago) \u2014 past simple."},{bad:"I live here since 2019.",good:"I have lived here since 2019.",reason:"Since + unfinished time period \u2014 present perfect."}],realUse:["\"I've never done that.\" \u2014 life experience with never.","\"Have you heard the news?\" \u2014 present perfect for very recent events.","\"I've already eaten.\" / \"I haven't eaten yet.\" \u2014 already/yet contrast.","\"She's been working here for ten years.\" \u2014 ongoing duration."],exercises:[{type:"gap",title:"Present perfect \u2014 positive",sub:"Fill each gap with the present perfect form.",items:[{answer:"have been",before:"I ",after:" to Japan twice. (be)"},{answer:"has just arrived",before:"She ",after:". (just arrive)"},{answer:"have never tried",before:"I ",after:" sushi. (never try)"},{answer:"has won",before:"Our team ",after:" three trophies this year. (win)"},{answer:"have lived",before:"They ",after:" here since 2018. (live)"},{answer:"has already finished",before:"He ",after:" the report. (already finish)"},{answer:"have visited",before:"We ",after:" fifteen countries. (visit)"},{answer:"has changed",before:"Everything ",after:" so much. (change)"}]},{type:"gap",title:"Present perfect or past simple?",sub:"Fill each gap \u2014 choose the correct tense.",items:[{answer:"Have you ever been",before:"",after:" to Paris? (ever be \u2014 present perfect question)"},{answer:"went",before:"I ",after:" to Paris in 2019. (go \u2014 past simple)"},{answer:"saw",before:"I ",after:" that film last week. (see \u2014 past simple)"},{answer:"haven't seen",before:"I ",after:" that film yet. (not see \u2014 present perfect)"},{answer:"has just called",before:"She ",after:". (just call \u2014 present perfect)"},{answer:"called",before:"She ",after:" an hour ago. (call \u2014 past simple)"}]},{type:"mc",title:"Ever, never, already, yet, just",sub:"Choose the correct time word.",items:[{q:"Have you _____ been to Australia?",opts:["already","yet","ever","just"],answer:"ever",explanation:"Ever = at any time in your life. Used in questions about life experience."},{q:"I've _____ finished \u2014 I started five minutes ago!",opts:["yet","just","ever","never"],answer:"just",explanation:"Just = very recently, moments ago."},{q:"Have you called her _____?",opts:["ever","just","never","yet"],answer:"yet",explanation:"Yet = by now. Used in questions and negatives."},{q:"I've _____ eaten sushi \u2014 I hate fish.",opts:["just","yet","ever","never"],answer:"never",explanation:"Never = at no time in your life."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"She arrived an hour ago.",keyword:"just",answer:"She has just arrived."},{original:"Did you ever try Thai food?",keyword:"Have",answer:"Have you ever tried Thai food?"},{original:"I started working here in 2020 and still work here.",keyword:"since",answer:"I have worked here since 2020."},{original:"He finished the report. (already)",keyword:"already",answer:"He has already finished the report."},{original:"I didn't finish yet.",keyword:"haven't",answer:"I haven't finished yet."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I have seen him yesterday.",correct:"I saw him yesterday.",hint:"Specific past time \u2014 past simple."},{wrong:"Did you ever been to Rome?",correct:"Have you ever been to Rome?",hint:"Life experience \u2014 present perfect."},{wrong:"She has gone there last year.",correct:"She went there last year.",hint:"Last year = specific time \u2014 past simple."},{wrong:"I live here since 2019.",correct:"I have lived here since 2019.",hint:"Since + unfinished period \u2014 present perfect."},{wrong:"Have you finished yet? Yes, I finished.",correct:"Yes, I have.",hint:"Short answer for present perfect \u2014 Yes, I have."}]}]},

{id:"goingto",title:"Future: going to",subtitle:"I'm going to study, she's going to leave",intro:"Plans and predictions based on what you can already see.",desc:"Going to is used for intentions and plans you have already decided on, and for predictions based on present evidence.",tip:"Students often confuse <em>going to</em> and <em>will</em>. Simple rule: if you have <strong>already decided</strong> or you can <strong>see the evidence</strong> right now, use <em>going to</em>. If it is a spontaneous decision or general prediction, use <em>will</em>.",explanation:"<p><strong>Going to</strong> is formed with <strong>am/is/are + going to + base verb</strong>. It is used when there is already <em>evidence</em> for the future \u2014 either a prior decision, or something you can see.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Pre-decided plans and intentions.</strong> The decision was made before this conversation \u2014 you are not deciding now, you are reporting a decision already made. <em>\"I'm going to study medicine.\"</em> (decided before we spoke).</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Predictions based on present evidence.</strong> You can see or sense something right now that tells you what is about to happen. <em>\"Look at those clouds \u2014 it's going to rain!\"</em> (the evidence is visible).</div></div>\n<div class=\"note\"><strong>Going to vs will:</strong><br>\nEvidence behind the prediction or decision? \u2192 <strong>going to</strong><br>\nDeciding something right now, in this moment? \u2192 <strong>will</strong><br>\nGeneral prediction based on opinion, no specific evidence? \u2192 <strong>will</strong></div>",table:{headers:["Form","Structure","Example"],rows:[["Positive","am/is/are + going to + base verb","I'm going to study. / She's going to leave. / They're going to win."],["Negative","am/is/are + not + going to + base verb","I'm not going to go. / He isn't going to call. / We aren't going to stay."],["Question","Am/Is/Are + subject + going to + base verb?","Are you going to come? / Is she going to stay?"],["Short answer","Yes/No + subject + am/is/are (not)","Yes, I am. / No, she isn't. / Yes, they are."],["Use 1: pre-decided plan","decision was made before speaking","I'm going to quit. (decided earlier)"],["Use 2: evidence prediction","something visible signals the outcome","Look \u2014 it's going to rain! (I can see the clouds)"],["vs will \u2014 spontaneous decision","deciding right now, no prior plan","'The phone's ringing.' 'I'll get it.'"]]},examples:[{type:"pos",eng:"I'm going to study medicine.",note:"Decided plan \u2014 already know what you want to do."},{type:"pos",eng:"Look at those clouds! It's going to rain.",note:"Prediction from present evidence \u2014 you can see the clouds."},{type:"pos",eng:"She's going to have a baby.",note:"Planned / inevitable future event."},{type:"neg",eng:"I'm not going to eat meat anymore.",note:"Decided intention."},{type:"q",eng:"Are you going to come to the party?",note:"Asking about someone's plans."},{type:"q",eng:"What are you going to do after university?",note:"Asking about future intentions."}],errors:[{bad:"I going to study tonight.",good:"I'm going to study tonight.",reason:"Going to needs the verb to be: am/is/are going to."},{bad:"She is go to leave.",good:"She is going to leave.",reason:"Full form: is going to + base verb."},{bad:"Look \u2014 he going to fall!",good:"Look \u2014 he's going to fall!",reason:"Present evidence prediction still needs is/are."},{bad:"Are you going to went?",good:"Are you going to go?",reason:"Going to is always followed by the base form."}],realUse:["\"I'm going to quit.\" \u2014 announcing a big decision.","\"It's going to be a long day.\" \u2014 prediction at the start of a difficult day.","\"What are you going to do?\" \u2014 common conversational question.","\"This is going to hurt.\" \u2014 prediction based on what you can see coming."],exercises:[{type:"gap",title:"Going to \u2014 positive",sub:"Fill each gap with the going to form of the verb in brackets.",items:[{answer:"'m going to study",before:"I ",after:" medicine. (study)"},{answer:"is going to rain",before:"Look at those clouds \u2014 it ",after:". (rain)"},{answer:"are going to miss",before:"If we don't hurry, we ",after:" the train. (miss)"},{answer:"'s going to be",before:"This ",after:" a great party! (be)"},{answer:"are going to buy",before:"They ",after:" a new house next year. (buy)"},{answer:"is going to leave",before:"She ",after:" the company at the end of the month. (leave)"},{answer:"'m going to cook",before:"I ",after:" dinner tonight. (cook)"},{answer:"are going to win",before:"Look at the score \u2014 they ",after:". (win)"}]},{type:"gap",title:"Negatives and questions",sub:"Fill each gap \u2014 negative or question form.",items:[{answer:"aren't going to come",before:"They ",after:" to the party. (not come)"},{answer:"isn't going to be",before:"It ",after:" easy. (not be)"},{answer:"Are you going to",before:"",after:" apply for the job?"},{answer:"Is she going to",before:"",after:" stay for dinner?"},{answer:"aren't going to finish",before:"We ",after:" in time. (not finish)"}]},{type:"mc",title:"Will or going to?",sub:"Choose the most natural option.",items:[{q:"Look out! You _____ drop that!",opts:["will drop","are going to drop","drop","are dropping"],answer:"are going to drop",explanation:"You can see it about to happen \u2014 present evidence \u2014 going to."},{q:"The phone is ringing. OK, I _____ get it.",opts:["am going to get","get","will get","am getting"],answer:"will get",explanation:"Spontaneous decision made at the moment of speaking \u2014 will."},{q:"She _____ study in Paris next year. She applied last month.",opts:["will study","is going to study","studies","studied"],answer:"is going to study",explanation:"Already decided and planned \u2014 going to."},{q:"I think it _____ be cold tomorrow.",opts:["is going to","goes to","will","is"],answer:"will",explanation:"General prediction without specific present evidence \u2014 will."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["she","is","going","to","leave","the","company"],answer:"she is going to leave the company",context:"An announced plan."},{words:["are","you","going","to","come","tonight","?"],answer:"are you going to come tonight ?",context:"Asking about plans."},{words:["he","isn't","going","to","pass","the","exam"],answer:"he isn't going to pass the exam",context:"Negative prediction from evidence."},{words:["we","are","going","to","buy","a","new","car"],answer:"we are going to buy a new car",context:"A decided intention."},{words:["look","it","is","going","to","rain","!"],answer:"look it is going to rain !",context:"Immediate prediction from evidence."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I going to study tonight.",correct:"I'm going to study tonight.",hint:"Need am/is/are before going to."},{wrong:"She is go to leave next week.",correct:"She is going to leave next week.",hint:"Is going to \u2014 not is go to."},{wrong:"Are you going to went to the party?",correct:"Are you going to go to the party?",hint:"Going to + base form."},{wrong:"Look \u2014 he going to fall!",correct:"Look \u2014 he's going to fall!",hint:"Still needs is/are in the structure."},{wrong:"We not going to be late.",correct:"We aren't going to be late.",hint:"Negative needs aren't/isn't/am not."}]}]},

{id:"will",title:"Future: will",subtitle:"I will call, she won't come",intro:"Spontaneous decisions, promises, offers, and predictions.",desc:"Will is one of those modal verbs students pick up quickly but then overuse. The key is knowing when going to is more natural.",tip:"Will is for <strong>spontaneous decisions</strong> made at the moment of speaking. If you thought about it before \u2014 use <em>going to</em>. \"I'll have the pasta\" (deciding right now). \"I'm going to make pasta tonight\" (decided this morning).",explanation:"<p><strong>Will</strong> is a modal verb + base form \u2014 no <em>to</em>, no <em>-ing</em>, no <em>-s</em> for third person. Contraction: <em>'ll</em>. Negative: <em>won't</em>.</p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Spontaneous decisions</strong> \u2014 you decide at the exact moment of speaking, no prior plan. <em>\"The milk is finished.\" \"I'll buy some.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Promises and offers</strong> \u2014 <em>\"I'll be there, I promise.\"</em> &nbsp;/&nbsp; <em>\"I'll carry that for you.\"</em></div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Suggestions</strong> \u2014 <em>Shall I...?</em> (offering to do something) &nbsp;/&nbsp; <em>Shall we...?</em> (suggesting a joint action). More British, slightly more formal.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>General predictions</strong> \u2014 based on opinion, not visible evidence. <em>\"I think things will get better.\"</em></div></div>\n<div class=\"note\"><strong>Will vs going to for predictions:</strong> Can you point to evidence right now? \u2192 <strong>going to</strong>. &nbsp;General belief or opinion? \u2192 <strong>will</strong>.</div>",table:{headers:["Use","Structure","Example"],rows:[["Spontaneous decision (now)","will + base verb","'The phone's ringing.' 'I'll get it.'"],["Promise","will / won't + base verb","I'll be there. / I won't tell anyone."],["Offer","I'll + base verb  OR  Shall I + base verb?","I'll carry that. / Shall I open the window?"],["Joint suggestion","Shall we + base verb?","Shall we get a coffee?"],["General prediction","I think/probably + will","I think it will rain later. / It'll probably be fine."],["vs going to","visible evidence now \u2192 going to","Look \u2014 it's going to rain! (I can see the clouds)"],["Contraction forms","'ll = will  /  won't = will not","I'll call. / She won't come. / They'll be late."]]},examples:[{type:"pos",eng:"I'll call you later.",note:"Spontaneous decision or promise."},{type:"pos",eng:"It will be cold in December.",note:"General prediction \u2014 no specific evidence."},{type:"pos",eng:"Don't worry \u2014 I'll help you.",note:"Offer made in the moment."},{type:"neg",eng:"She won't be there, I'm sure.",note:"Won't = will not."},{type:"q",eng:"Will you marry me?",note:"Famous will question \u2014 a request/proposal."},{type:"q",eng:"Will it rain tomorrow?",note:"Asking for a prediction."}],errors:[{bad:"I will to call you later.",good:"I will call you later.",reason:"Will is a modal verb \u2014 always followed by the base form. Never will + to + infinitive."},{bad:"She is going to will get the job.",good:"She is going to get the job.",reason:"Going to and will are alternatives \u2014 never use both together."},{bad:"Will you to help me?",good:"Will you help me?",reason:"Modal + base form \u2014 no to between will and the verb."},{bad:"I think it wills rain tomorrow.",good:"I think it will rain tomorrow.",reason:"Modal verbs never take -s for third person. Will is the same for all subjects."}],realUse:["\"I'll get it!\" \u2014 answering the door or phone spontaneously.","\"I won't tell anyone, I promise.\" \u2014 a strong promise.","\"Will you be quiet, please?\" \u2014 polite but firm request.","\"Things will get better.\" \u2014 reassurance about the future."],exercises:[{type:"gap",title:"Will \u2014 positive, negative, questions",sub:"Fill each gap with will, won't, or the contracted form.",items:[{answer:"I'll",before:"",after:" call you later."},{answer:"won't",before:"She ",after:" be at the party \u2014 she's busy."},{answer:"Will",before:"",after:" you help me with this?"},{answer:"'ll",before:"Don't worry \u2014 it ",after:" be fine."},{answer:"won't",before:"I ",after:" tell anyone, I promise."},{answer:"Will",before:"",after:" they be late?"},{answer:"'ll",before:"I ",after:" have the pasta, please."},{answer:"won't",before:"He ",after:" change his mind \u2014 he never does."}]},{type:"mc",title:"Will or going to?",sub:"Choose the most natural option for each context.",items:[{q:"There's no milk. OK, I _____ buy some. (spontaneous decision)",opts:["'m going to buy","'ll buy","bought","buy"],answer:"'ll buy",explanation:"Spontaneous decision made at that moment \u2014 will."},{q:"What are your plans for summer? I _____ travel around Spain. (already planned)",opts:["will travel","'ll travel","'m going to travel","travelled"],answer:"'m going to travel",explanation:"Already planned before the conversation \u2014 going to."},{q:"I think robots _____ do most jobs in the future. (general prediction)",opts:["are going to do","go to do","will do","are doing"],answer:"will do",explanation:"General prediction without current evidence \u2014 will."},{q:"Look! She _____ fall! (prediction from current evidence)",opts:["will fall","is going to fall","falls","fell"],answer:"is going to fall",explanation:"You can see it happening right now \u2014 going to."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"I promise I won't be late.",keyword:"will",answer:"I will not be late, I promise."},{original:"She is not going to come.",keyword:"won't",answer:"She won't come."},{original:"Do you want to eat out tonight?",keyword:"Shall",answer:"Shall we eat out tonight?"},{original:"I think the weather will be good.",keyword:"will",answer:"The weather will be good, I think."},{original:"Would you like me to help?",keyword:"Shall",answer:"Shall I help?"}]},{type:"convo",title:"Fill the conversation",sub:"Complete the dialogue with will, won't, or shall.",lines:[{speaker:"A",text:"I can't carry all these bags."},{speaker:"B",text:"Don't worry \u2014 I [will] help you."},{speaker:"A",text:"Thank you. [Shall] we take a taxi?"},{speaker:"B",text:"Good idea. I [won't] be able to walk far with my ankle."},{speaker:"A",text:"[Will] it take long to get there?"},{speaker:"B",text:"No, it [won't] \u2014 maybe ten minutes."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"I will to call you tomorrow.",correct:"I will call you tomorrow.",hint:"No to after will."},{wrong:"She won't to come.",correct:"She won't come.",hint:"Won't + base form, no to."},{wrong:"Will she comes to the party?",correct:"Will she come to the party?",hint:"Will + base form \u2014 no -s."},{wrong:"I'll to have the chicken, please.",correct:"I'll have the chicken, please.",hint:"No to after will/I'll."},{wrong:"They will be arrive at six.",correct:"They will arrive at six.",hint:"Will + base form directly."}]}]},

{id:"comparatives",title:"Comparative adjectives",subtitle:"bigger, more interesting, better",intro:"Comparing two things. Short adjectives add -er, long ones use more.",desc:"Comparatives are used to compare two things. The structure is simple but the rules for forming them trip students up \u2014 especially the irregular forms.",tip:"The word <strong>than</strong> is key \u2014 and it is often missed. <strong>\"Madrid is bigger than Valencia.\"</strong> Not \"Madrid is bigger Valencia.\" Also watch out for double comparatives: never \"more bigger\" \u2014 it is one or the other.",explanation:"<p>Comparatives compare <strong>two things</strong>. Structure: <strong>subject + verb + comparative + than + second thing</strong>. The word <em>than</em> is essential \u2014 never leave it out.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Short adjectives (1 syllable)</strong> \u2014 add <em>-er</em>: tall \u2192 taller, fast \u2192 faster. Ends in <em>-e</em>? Just add <em>-r</em>: nice \u2192 nicer. Ends in single vowel + consonant (big, hot, thin)? <strong>Double the final consonant</strong>: big \u2192 bigger, hot \u2192 hotter. The doubling protects the short vowel \u2014 without it, <em>biger</em> would sound different.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Adjectives ending in -y</strong> \u2014 change -y to -ier: happy \u2192 happier, easy \u2192 easier, busy \u2192 busier.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Long adjectives (2+ syllables)</strong> \u2014 put <em>more</em> in front. Never add -er to a long adjective. more interesting, more comfortable, more expensive. <em>Interestinger</em> is not a word.</div></div>\n<div class=\"note\"><strong>Irregular forms \u2014 must be memorised:</strong> good \u2192 better &nbsp;\u00b7&nbsp; bad \u2192 worse &nbsp;\u00b7&nbsp; far \u2192 further</div>",table:{headers:["Rule","Adjective type","How to form","Examples"],rows:[["Rule 1a","1 syllable (most)","add -er","tall \u2192 taller,  fast \u2192 faster,  cheap \u2192 cheaper"],["Rule 1b","1 syllable ending in -e","add -r only","nice \u2192 nicer,  large \u2192 larger,  safe \u2192 safer"],["Rule 1c","1 syllable: single vowel + consonant","double consonant + -er","big \u2192 bigger,  hot \u2192 hotter,  thin \u2192 thinner,  sad \u2192 sadder"],["Rule 2","2 syllables ending in -y","change y \u2192 ier","happy \u2192 happier,  easy \u2192 easier,  busy \u2192 busier"],["Rule 3","2 or more syllables (not -y)","more + adjective","more interesting,  more expensive,  more comfortable"],["Irregular","\u2014","must be memorised","good \u2192 better,  bad \u2192 worse,  far \u2192 further"],["Structure","\u2014","comparative + than + second thing","Madrid is bigger than Valencia."]]},examples:[{type:"pos",eng:"This city is bigger than my hometown.",note:"Short adjective: big \u2192 bigger."},{type:"pos",eng:"Spanish is more difficult than English for me.",note:"Long adjective: more + adjective."},{type:"pos",eng:"She speaks English better than her brother.",note:"Irregular: good \u2192 better."},{type:"neg",eng:"The new phone isn't cheaper than the old one.",note:"Negative comparison."},{type:"q",eng:"Is the north route faster?",note:"Asking for a comparison."},{type:"q",eng:"Which is more comfortable \u2014 the train or the bus?",note:"Choosing between two options."}],errors:[{bad:"She is more tall than her sister.",good:"She is taller than her sister.",reason:"Short adjectives (1 syllable) use -er, not more. Never more + -er together."},{bad:"This is more better than the other one.",good:"This is better than the other one.",reason:"Better is already the comparative of good. Never more + comparative form."},{bad:"Madrid is hotter that Paris.",good:"Madrid is hotter than Paris.",reason:"Comparatives require than, not that."},{bad:"She is the most tallest in the class.",good:"She is the tallest in the class.",reason:"The most + superlative is a double superlative. Tallest already IS the superlative."}],realUse:["\"It's easier said than done.\" \u2014 fixed expression with comparative.","\"The older I get, the wiser I become.\" \u2014 double comparative structure.","\"Better late than never.\" \u2014 common proverb.","\"She's getting better and better.\" \u2014 repeated comparative for gradual change."],exercises:[{type:"gap",title:"Form the comparative",sub:"Fill each gap with the correct comparative form of the adjective in brackets.",items:[{answer:"taller",before:"He is ",after:" than his father. (tall)"},{answer:"more interesting",before:"This book is ",after:" than the last one. (interesting)"},{answer:"better",before:"Her English is ",after:" than mine. (good)"},{answer:"hotter",before:"July is ",after:" than June here. (hot)"},{answer:"more expensive",before:"The restaurant is ",after:" than I expected. (expensive)"},{answer:"worse",before:"The traffic is ",after:" today than yesterday. (bad)"},{answer:"happier",before:"She looks ",after:" than she did before. (happy)"},{answer:"further",before:"The station is ",after:" than I thought. (far)"}]},{type:"categorise",title:"How do you form the comparative?",sub:"Click an adjective, then click the correct column.",categories:[{name:"add -er",items:["tall","fast","cheap","warm","young"]},{name:"more + adjective",items:["interesting","comfortable","expensive","popular","difficult"]},{name:"irregular",items:["good","bad","far","little","much"]}]},{type:"mc",title:"Multiple choice",sub:"Choose the correct comparative form.",items:[{q:"My bag is _____ than yours.",opts:["more heavy","heavier","heavyer","more heavier"],answer:"heavier",explanation:"Heavy \u2192 change y to i + er: heavier."},{q:"She is _____ than her sister.",opts:["more tall","taller","more taller","tallier"],answer:"taller",explanation:"Tall is one syllable \u2192 taller."},{q:"This job is _____ than my last one.",opts:["satisfying more","more satisfying","satisfyinger","more satisfyinger"],answer:"more satisfying",explanation:"Satisfying has 4 syllables \u2192 more + adjective."},{q:"He drives _____ than me.",opts:["more good","gooder","better","more better"],answer:"better",explanation:"Good \u2192 better. Always irregular."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order to make a comparison.",items:[{words:["Spanish","is","more","difficult","than","English"],answer:"Spanish is more difficult than English",context:"Comparing difficulty."},{words:["she","is","taller","than","her","brother"],answer:"she is taller than her brother",context:"Comparing height."},{words:["which","city","is","bigger","Madrid","or","Barcelona","?"],answer:"which city is bigger Madrid or Barcelona ?",context:"Asking for a comparison."},{words:["the","new","model","is","more","expensive","than","the","old","one"],answer:"the new model is more expensive than the old one",context:"Comparing prices."},{words:["my","English","is","getting","better","and","better"],answer:"my English is getting better and better",context:"Gradual improvement."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She is more tall than her sister.",correct:"She is taller than her sister.",hint:"One syllable \u2014 -er."},{wrong:"This is the more good option.",correct:"This is the better option.",hint:"Good \u2192 better (irregular)."},{wrong:"Madrid is bigger Valencia.",correct:"Madrid is bigger than Valencia.",hint:"Need than after comparative."},{wrong:"He is more fast than me.",correct:"He is faster than me.",hint:"Fast is one syllable \u2014 faster."},{wrong:"The weather is more bad than yesterday.",correct:"The weather is worse than yesterday.",hint:"Bad \u2192 worse (irregular)."}]}]},

{id:"superlatives",title:"Superlative adjectives",subtitle:"the biggest, the most beautiful",intro:"The extreme end. The best, the worst, the most interesting in a group.",desc:"Superlatives describe the extreme quality of something within a group. They always use the.",tip:"Always use <strong>the</strong> before a superlative \u2014 students often leave it out. <strong>\"She is the best student in the class.\"</strong> Not \"She is best student.\" The is mandatory because a superlative singles out one unique thing.",explanation:"<p>Superlatives describe the <strong>extreme end of a scale</strong> within a group. They always use <strong>the</strong> \u2014 because they point to something unique.</p>\n<p>The formation rules are the same as comparatives \u2014 just replace <em>-er</em> with <em>-est</em> and <em>more</em> with <em>the most</em>. If you know the comparative, you know the superlative.</p>\n<div class=\"rule\"><div class=\"rule-num\">1</div><div class=\"rule-text\"><strong>Short adjectives:</strong> the + -est &nbsp;\u2192&nbsp; tall \u2192 the tallest, fast \u2192 the fastest, big \u2192 the biggest.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">2</div><div class=\"rule-text\"><strong>Ending in -y:</strong> the + -iest &nbsp;\u2192&nbsp; happy \u2192 the happiest, easy \u2192 the easiest.</div></div>\n<div class=\"rule\"><div class=\"rule-num\">3</div><div class=\"rule-text\"><strong>Long adjectives:</strong> the most + adjective &nbsp;\u2192&nbsp; the most interesting, the most expensive.</div></div>\n<div class=\"note\"><strong>Irregular:</strong> good \u2192 the best &nbsp;\u00b7&nbsp; bad \u2192 the worst &nbsp;\u00b7&nbsp; far \u2192 the furthest<br><strong>In vs of:</strong> use <em>in</em> for places/groups (the best player <em>in</em> the team) \u2014 use <em>of</em> for sets/time (the best film <em>of</em> the year).</div>",table:{headers:["Rule","Adjective type","Comparative","Superlative"],rows:[["Rule 1a","1 syllable (most)","taller","the tallest"],["Rule 1c","1 syllable: vowel + consonant","hotter","the hottest"],["Rule 2","ending in -y","happier","the happiest"],["Rule 3","2+ syllables","more interesting","the most interesting"],["Irregular","good","better","the best"],["Irregular","bad","worse","the worst"],["Irregular","far","further","the furthest"],["Structure","\u2014","comparative + than","the + superlative + in/of"]]},examples:[{type:"pos",eng:"It's the tallest building in the city.",note:"Short adjective \u2192 the + -est."},{type:"pos",eng:"That was the most interesting lecture I've attended.",note:"Long adjective \u2192 the most + adjective."},{type:"pos",eng:"She's the best player on the team.",note:"Irregular: good \u2192 the best."},{type:"pos",eng:"It's the hottest day of the year.",note:"Short CVC adjective \u2192 double consonant + -est."},{type:"q",eng:"What's the most popular sport in Spain?",note:"Most popular \u2014 long adjective superlative."},{type:"q",eng:"Who is the fastest runner in the group?",note:"Short adjective superlative in a question."}],errors:[{bad:"She is best student in the class.",good:"She is the best student in the class.",reason:"Superlatives always need the."},{bad:"It's the most tall building.",good:"It's the tallest building.",reason:"Tall is one syllable \u2192 the tallest."},{bad:"That was the baddest film.",good:"That was the worst film.",reason:"Bad \u2192 the worst. Always irregular."},{bad:"He's the most good player.",good:"He's the best player.",reason:"Good \u2192 the best. Always irregular."}],realUse:["\"The best of both worlds.\" \u2014 fixed expression.","\"At the latest, at the earliest.\" \u2014 superlatives in time expressions.","\"She did her best.\" \u2014 best as a pronoun.","\"It's the least I could do.\" \u2014 least = opposite of most."],exercises:[{type:"gap",title:"Form the superlative",sub:"Fill each gap with the correct superlative form.",items:[{answer:"the tallest",before:"He is ",after:" person in the family. (tall)"},{answer:"the most interesting",before:"That was ",after:" film I've seen. (interesting)"},{answer:"the best",before:"She is ",after:" player on the team. (good)"},{answer:"the hottest",before:"July is ",after:" month of the year here. (hot)"},{answer:"the worst",before:"That was ",after:" meal I've ever had. (bad)"},{answer:"the most expensive",before:"This is ",after:" restaurant in the city. (expensive)"},{answer:"the happiest",before:"It was ",after:" day of my life. (happy)"},{answer:"the furthest",before:"That is ",after:" I've ever run. (far)"}]},{type:"mc",title:"Comparative or superlative?",sub:"Choose the correct form.",items:[{q:"She is _____ student in the class.",opts:["the best","better","the better","best"],answer:"the best",explanation:"Comparing to all students \u2014 superlative with the."},{q:"London is _____ than Madrid.",opts:["the biggest","bigger","the bigger","most big"],answer:"bigger",explanation:"Comparing two cities \u2014 comparative (no the)."},{q:"This is _____ film I've ever seen!",opts:["the most boring","more boring","the more boring","most boring"],answer:"the most boring",explanation:"Superlative of life experience \u2014 the most boring."},{q:"She speaks _____ than her brother.",opts:["the most fluently","more fluent","more fluently","the fluenter"],answer:"more fluently",explanation:"Comparing two people \u2014 comparative adverb."}]},{type:"transform",title:"Sentence transformation",sub:"Rewrite the second sentence so it has the same meaning as the first. Use the keyword given.",items:[{original:"No other building in the city is as tall as this one.",keyword:"the tallest",answer:"This is the tallest building in the city."},{original:"No other student works as hard as Maria.",keyword:"the hardest",answer:"Maria works the hardest in the class."},{original:"I have never eaten a better meal.",keyword:"the best",answer:"It's the best meal I've ever eaten."},{original:"Nothing is worse than cold coffee.",keyword:"the worst",answer:"Cold coffee is the worst."},{original:"I've never seen a more interesting film.",keyword:"the most",answer:"It's the most interesting film I've ever seen."}]},{type:"builder",title:"Sentence builder",sub:"Put the words in the correct order.",items:[{words:["it","is","the","best","film","I","have","ever","seen"],answer:"it is the best film I have ever seen",context:"Superlative + ever."},{words:["this","is","the","most","expensive","restaurant","in","the","city"],answer:"this is the most expensive restaurant in the city",context:"Long adjective superlative."},{words:["she","is","the","tallest","person","in","her","family"],answer:"she is the tallest person in her family",context:"Short adjective superlative."},{words:["what","is","the","worst","thing","about","your","job","?"],answer:"what is the worst thing about your job ?",context:"Irregular superlative in a question."},{words:["July","is","the","hottest","month","of","the","year"],answer:"July is the hottest month of the year",context:"CVC adjective superlative."}]},{type:"ec",title:"Error correction",sub:"One error per sentence.",items:[{wrong:"She is best student in the class.",correct:"She is the best student in the class.",hint:"Superlatives need the."},{wrong:"It's the most tall building in the city.",correct:"It's the tallest building in the city.",hint:"Tall is one syllable \u2014 the tallest."},{wrong:"That was the baddest film ever.",correct:"That was the worst film ever.",hint:"Bad \u2192 the worst (irregular)."},{wrong:"He is the most good cook I know.",correct:"He is the best cook I know.",hint:"Good \u2192 the best (irregular)."},{wrong:"This is the expensivest restaurant here.",correct:"This is the most expensive restaurant here.",hint:"Expensive has 3 syllables \u2014 the most expensive."}]}]},

{id:"should",title:"Modal: should / shouldn't",subtitle:"You should rest, she shouldn't worry",intro:"Advice, recommendations, and mild obligation.",desc:"Should is the go-to verb for giving advice in English. It is softer than must and more polite than need to \u2014 which makes it the most socially versatile modal at A2.",tip:"Students often want to say <strong>\"You should to rest.\"</strong> No \u2014 like all modal verbs, should is followed directly by the base form: <strong>\"You should rest.\"</strong> No to, no -ing, no -s for third person.",explanation:"<p><strong>Should</strong> is a modal verb \u2014 base form only, no <em>to</em>, no <em>-ing</em>, no <em>-s</em> for third person. <em>She should</em> \u2014 never <em>she shoulds</em>. <em>You should rest</em> \u2014 never <em>you should to rest</em>.</p>\n<p>Should expresses that something is a <strong>good idea</strong> \u2014 the speaker's advice or recommendation. Think of it as meaning <em>\"in my opinion, it would be a good idea to...\"</em></p>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Advice and recommendations</strong> \u2014 <em>\"You should see a doctor.\"</em> / <em>\"We should book early.\"</em> The speaker believes it is the right thing to do.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Asking for advice</strong> \u2014 <em>\"What should I do?\"</em> / <em>\"Should I tell her?\"</em> These invite a recommendation. Answer with <em>should</em> or <em>shouldn't</em>.</div></div>\n<div class=\"rule\"><div class=\"rule-num\"></div><div class=\"rule-text\"><strong>Shouldn't</strong> = bad idea, advise against it. Not the same as forbidden. <em>\"You shouldn't eat so much sugar\"</em> = bad idea, but no rule stops you.</div></div>\n<div class=\"note\"><strong>Should vs must vs mustn't:</strong><br>\n<em>\"You should exercise more.\"</em> \u2014 advice, good idea.<br>\n<em>\"You must wear a seatbelt.\"</em>
